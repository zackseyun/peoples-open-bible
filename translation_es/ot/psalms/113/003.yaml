translation:
  language: es
  text: Desde la salida del sol hasta su puesta[a], el nombre de Yahvé[b] ha de ser alabado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el oriente hasta el occidente»; literalmente, «desde la salida del sol hasta su puesta».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: מִמִּזְרַח
  english_pob_choice: from the rising
  chosen_spanish: desde la salida
  alternatives_spanish:
  - desde el oriente
  - desde el amanecer
  lexicon: HALOT
  rationale: En el merismo poético con מְבוֹאוֹ, la idea temporal de la salida del sol comunica mejor el movimiento del texto que una mera ubicación geográfica.
- source_word: שֶׁמֶשׁ
  english_pob_choice: of the sun
  chosen_spanish: del sol
  alternatives_spanish:
  - del astro solar
  lexicon: HALOT
  rationale: '"Sol" es el equivalente natural y fiel en español para שֶׁמֶשׁ en este paralelismo poético.'
- source_word: מְבוֹאוֹ
  english_pob_choice: its setting
  chosen_spanish: su ocaso
  alternatives_spanish:
  - su puesta
  - su entrada
  lexicon: HALOT
  rationale: La forma hebrea literalmente alude a su "ir entrando"; en español, "ocaso" expresa con dignidad poética el final del recorrido del sol sin perder la imagen del merismo.
- source_word: מְהֻלָּל
  english_pob_choice: is to be praised
  chosen_spanish: es digno de alabanza
  alternatives_spanish:
  - debe ser alabado
  - es alabado
  lexicon: HALOT
  rationale: La pasiva participial mantiene el valor general y normativo del hebreo. "Digno de alabanza" conserva la fuerza descriptiva y, a la vez, la invitación implícita al culto.
- source_word: שֵׁם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - la fama
  - la reputación
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal, que en hebreo puede referirse al nombre revelado y a la identidad reconocida de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto en español, evitando la sustitución por un título genérico.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - el SEÑOR
  rationale: La elección preserva el nombre propio del pacto, en vez de ocultarlo con un título. En el contexto de este versículo, el lector español recibe la misma transparencia que ofrece el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of מְהֻלָּל in context
  english_pob_reading: is to be praised
  chosen_spanish_reading: es digno de alabanza
  alternative_spanish_readings:
  - es alabado
  - sea alabado
  rationale: El hebreo expresa una cualidad general con matiz exhortativo implícito; "digno de alabanza" conserva esa tensión sin convertir el enunciado en un imperativo directo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather than resolve it
translation_notes:
  revision_awareness: La versión previa fue corregida para anclar todos los marcadores de nota dentro del texto español. Se conservó el merismo poético, pero se ajustó la puntuación y la formulación para que las notas a y b queden explícitamente vinculadas a las palabras correspondientes.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió un giro español natural («desde la salida del sol hasta su ocaso») que mantiene el paralelismo hebreo sin sobrecargarlo con calcos.
  - «Digno de alabanza» preserva el valor descriptivo/normativo de מְהֻלָּל en un registro bíblico claro y moderno.
