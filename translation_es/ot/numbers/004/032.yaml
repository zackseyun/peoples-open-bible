    text: 'O, más fluidamente: «ustedes asignarán por nombre el equipo que cada uno debe llevar».'
    reason: alternative_reading
  revision_rationale: Se corrigió la sintaxis para que el objeto de «asignarán por nombre» sean los objetos/equipo, no personas implícitas. Se reemplazó «custodia» por «encargo» para reflejar mejor מִשְׁמֶרֶת en este contexto de responsabilidad asignada. También se cambió «labor» por «servicio» para conservar el matiz levítico de עֲבֹדָה y se suavizó la frase inicial a un español más natural.
