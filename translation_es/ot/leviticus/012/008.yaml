translation:
  language: es
  text: Pero si no tiene medios suficientes para un cordero[a], entonces tomará dos tórtolas o dos pichones, uno para holocausto y otro para ofrenda por el pecado[b]; y el sacerdote hará expiación por ella, y quedará limpia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «su mano no halla lo suficiente para un cordero»; la expresión hebrea indica falta de recursos económicos.
    reason: lexical_alternative
  - marker: b
    text: O «ofrenda de purificación» para חַטָּאת; en este contexto, la ofrenda trata la impureza ritual después del parto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִמְצָא יָדָהּ דֵּי שֶׂה
  english_pob_choice: she cannot afford a lamb
  chosen_spanish: no puede conseguir un cordero
  alternatives_spanish:
  - no le alcanzan los recursos para un cordero
  - no puede pagar un cordero
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se refiere a no disponer de medios suficientes. En español, «no puede conseguir» comunica de manera natural esa limitación económica sin perder el sentido del texto.
- source_word: שֶׂה
  english_pob_choice: a lamb
  chosen_spanish: un cordero
  alternatives_spanish:
  - una oveja
  - un animal del rebaño
  lexicon: HALOT
  rationale: En este contexto sacrificial, «cordero» es la equivalencia más natural y específica en español, manteniendo la referencia al animal esperado para la ofrenda.
- source_word: שְׁתֵּי תֹרִים
  english_pob_choice: two turtledoves
  chosen_spanish: dos tórtolas
  alternatives_spanish:
  - dos palomas torcaces
  - dos tórtolas silvestres
  lexicon: HALOT
  rationale: תֹרִים designa tórtolas, no palomas en general. «Tórtolas» preserva mejor la precisión léxica que una traducción genérica.
- source_word: שְׁנֵי בְּנֵי יוֹנָה
  english_pob_choice: two young pigeons
  chosen_spanish: dos pichones
  alternatives_spanish:
  - dos polluelos de paloma
  - dos palominos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para aves jóvenes. «Pichones» transmite esa idea de manera breve y natural en español, aunque «polluelos de paloma» sigue siendo una alternativa posible.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda encendida
  lexicon: HALOT
  rationale: «Holocausto» es el término tradicional y preciso para עֹלָה en el registro sacrificial bíblico. Aunque hoy puede tener asociaciones modernas no bíblicas, sigue siendo el equivalente técnico más asentado en español bíblico.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de purificación
  - ofrenda por el pecado/purificación
  lexicon: HALOT
  rationale: He mantenido «ofrenda por el pecado» en el texto principal para reflejar la forma habitual del término sacrificial, pero el contexto de Levítico 12 es purificatorio; por eso se preserva la alternativa «ofrenda de purificación» en la nota.
- source_word: וְכִפֶּר עָלֶיהָ
  english_pob_choice: the priest shall make atonement for her
  chosen_spanish: el sacerdote hará expiación por ella
  alternatives_spanish:
  - el sacerdote hará propiciación por ella
  - el sacerdote la reconciliará ritual­mente
  lexicon: HALOT
  rationale: «Expiación» conserva el sentido cultual de כפר sin reducirlo a un solo matiz doctrinal. Es fiel y comprensible en español bíblico.
- source_word: וְטָהֵרָה
  english_pob_choice: she shall be clean
  chosen_spanish: quedará limpia
  alternatives_spanish:
  - será limpia
  - será purificada
  lexicon: HALOT
  rationale: El hebreo indica el resultado de quedar ritualmente limpia. «Quedará limpia» comunica bien la culminación del proceso en español contemporáneo.
theological_decisions:
- issue: חַטָּאת en un contexto de purificación tras el parto
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  rationale: Aunque el contexto subraya impureza ritual y no culpa moral, el término sacrificial conserva la carga tradicional de «ofrenda por el pecado». Para no borrar la tensión cultual del texto, se mantiene esa traducción en el cuerpo y se deja constancia de la alternativa contextual «ofrenda de purificación».
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (Consistencia de términos clave o excepción documentada) y §3 (Preservar la tensión teológica)
- issue: עֹלָה como término sacrificial técnico
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  rationale: Se conserva el término técnico tradicional en español bíblico para no diluir la categoría sacrificial específica de עֹלָה. La opción descriptiva sería posible, pero menos estable en el sistema terminológico de la obra.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (Terminología clave)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se introdujeron cambios respecto del pasaje base auditado, y el contenido sigue el mismo estado de alta concordancia confirmado en la evaluación cruzada.'
  spanish_consistency_notes:
  - 'Se mantiene el sistema terminológico del proyecto: Yahvé no aparece en este versículo; no se sustituye ningún término divino.'
  - «Holocausto» y «exp(i)ación» preservan el registro sacrificial técnico de Levítico.
  - Se evita calcar la sintaxis hebrea cuando el español requiere una formulación más natural, sin agregar información no contenida en el texto.
