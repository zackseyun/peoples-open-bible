translation:
  language: es
  text: La tierra gime y se marchita; el mundo languidece y se marchita; los encumbrados[a] de la tierra languidecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los nobles de la tierra». El hebreo habla literalmente de la «altura» o «exaltación» del pueblo de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבְלָה
  english_pob_choice: mourns
  chosen_spanish: gime
  alternatives_spanish:
  - llora
  - guarda duelo
  - lamenta
  lexicon: HALOT
  rationale: El hebreo expresa duelo o lamento personificando a la tierra. En español, 'gime' conserva esa dimensión afectiva y resulta natural en un registro poético; 'lamenta' sería más abstracto y 'llora' más concreto de lo que el texto exige.
- source_word: נָבְלָה
  english_pob_choice: withers
  chosen_spanish: se marchita
  alternatives_spanish:
  - se desvanece
  - se agosta
  - se seca
  lexicon: HALOT
  rationale: El verbo sugiere desvanecerse, decaer o marchitarse. 'Se marchita' mantiene la imagen orgánica y encaja bien con el paralelismo del versículo. Se repite al final de la línea para conservar la repetición enfática del hebreo.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra habitada
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede significar 'tierra' o 'país', el paralelo con תֵּבֵל y el alcance amplio del contexto favorecen el sentido cósmico. En español 'la tierra' comunica mejor esa amplitud que 'el país'.
- source_word: אֻמְלְלָה
  english_pob_choice: wastes away
  chosen_spanish: se desvanece
  alternatives_spanish:
  - languidece
  - se debilita
  - se consume
  lexicon: HALOT
  rationale: Este verbo denota volverse débil, extenuarse o consumirse. 'Se desvanece' distingue este término de נבל y conserva la progresión poética sin sobrecargar el verso con sinónimos demasiado técnicos.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra
  lexicon: HALOT
  rationale: תֵּבֵל alude al mundo ordenado o habitado. 'El mundo' es el equivalente natural en español y mantiene el paralelismo con 'la tierra'.
- source_word: אֻמְלָלוּ
  english_pob_choice: waste away
  chosen_spanish: se desvanecen
  alternatives_spanish:
  - languidecen
  - se consumen
  - se debilitan
  lexicon: HALOT
  rationale: La forma plural repite el mismo campo semántico de אֻמְלְלָה. 'Se desvanecen' permite mantener la cohesión con la línea anterior y refleja la pluralidad del sujeto.
- source_word: מְרוֹם עַם הָאָרֶץ
  english_pob_choice: the exalted people of the earth
  chosen_spanish: los encumbrados de la tierra
  alternatives_spanish:
  - los nobles de la tierra
  - la altura del pueblo de la tierra
  - los altos del pueblo de la tierra
  lexicon: HALOT
  rationale: מְרוֹם literalmente significa 'altura' o 'exaltación'. En castellano, 'los encumbrados' conserva la idea de quienes están elevados social o políticamente, sin decidir de manera más específica 'nobles'. 'De la tierra' respeta el genitivo del hebreo y la amplitud del contexto.
theological_decisions:
- issue: Alcance de הארץ / תבל
  english_pob_reading: cosmic scope ('earth' / 'world') rather than merely local land
  chosen_spanish_reading: 'alcance cósmico: ''la tierra'' / ''el mundo'''
  alternative_spanish_readings:
  - 'alcance local: ''la tierra'' entendida como ''el país'''
  - '''la tierra'' y ''el mundo'' como meros paralelos poéticos sin alcance universal'
  rationale: Siguiendo la lectura auditada del POB, el paralelismo con תֵּבֵל y el marco de Isaías 24 favorecen una referencia amplia, no solo territorial. Por eso se evita 'el país' y se conserva un horizonte universal en español.
  doctrine_reference: Translation philosophy §1, primacía del idioma original sobre la tradición de traducción
- issue: Traducción de מְרוֹם עַם הָאָרֶץ
  english_pob_reading: 'the exalted people of the earth / alternative: the nobles of the earth'
  chosen_spanish_reading: los encumbrados de la tierra
  alternative_spanish_readings:
  - los nobles de la tierra
  - los altos de la tierra
  - la altura del pueblo de la tierra
  rationale: El hebreo literalmente habla de 'altura/exaltación' asociada con 'el pueblo de la tierra'. El español 'los encumbrados' preserva esa imagen y evita imponer una jerarquía social más concreta de la que el hebreo exige. Así se mantiene la tensión entre metáfora de elevación y referencia a élite humana.
  doctrine_reference: HALOT; mantenimiento de la metáfora y de la ambigüedad lexical
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no hubo cambios necesarios y el inglés POB mantiene un acuerdo alto con el texto base. Esta versión preserva la repetición verbal y la ambigüedad de מְרוֹם sin forzar una identificación exclusiva con ''nobles''.'
  spanish_consistency_notes:
  - Se mantiene 'la tierra' y 'el mundo' para reflejar הארץ / תבל con alcance amplio.
  - Se conserva la repetición de 'se marchita' para נבל, como en el patrón del hebreo.
  - '''Los encumbrados'' traduce el valor de exaltación/altura sin agregar un título social no explícito en el hebreo.'
  - Registro poético y bíblico, pero en español contemporáneo claro.
