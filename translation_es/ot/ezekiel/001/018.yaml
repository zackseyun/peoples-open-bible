translation:
  language: es
  text: En cuanto a sus aros, eran altos y temibles[a], y los cuatro tenían aros llenos de ojos por todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «impresionantes»; el hebreo puede expresar algo que inspira temor, pavor o asombro.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּבֵּי הֶן / גַּבֹּתָם
  english_pob_choice: their rims / all four had rims
  chosen_spanish: sus aros / aros
  alternatives_spanish:
  - sus bordes
  - sus anillos
  - sus llantas
  lexicon: HALOT
  rationale: En el contexto de las ruedas de Ezequiel 1:15–21, גב alude al elemento circular exterior de la rueda. En español, «aros» comunica esa parte visible y circular con naturalidad y evita la literalidad opaca de «bordes». «Llantas» podría sonar demasiado moderno o ambiguo en algunos registros, y «anillos» sugiere un objeto distinto al de una rueda.
- source_word: גֹבַהּ
  english_pob_choice: high
  chosen_spanish: eran altos
  alternatives_spanish:
  - eran elevados
  - tenían altura
  lexicon: HALOT
  rationale: El sustantivo denota altura; en español, la predicación «eran altos» reproduce con claridad la idea descriptiva del hebreo sin forzar una construcción nominal poco natural.
- source_word: יִרְאָה
  english_pob_choice: fearsome
  chosen_spanish: temibles
  alternatives_spanish:
  - asombrosos
  - terribles
  - dreadful
  lexicon: HALOT
  rationale: El término expresa algo que inspira temor o pavor. «Temibles» conserva esa fuerza semántica mejor que «asombrosos», que podría debilitar el matiz de temor. Se mantiene la tensión entre lo impresionante y lo aterrador, como en la nota inglesa con «awesome / fearsome».
- source_word: מְלֵאֹת עֵינַיִם
  english_pob_choice: full of eyes
  chosen_spanish: llenos de ojos
  alternatives_spanish:
  - cubiertos de ojos
  - repletos de ojos
  lexicon: HALOT
  rationale: La imagen hebrea es directa y extraña; «llenos de ojos» la conserva sin suavizarla. «Cubiertos de ojos» interpreta más de lo que dice el texto.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - en todo derredor
  lexicon: HALOT
  rationale: «Todo alrededor» es idiomático en español y reproduce la extensión completa de la distribución de los ojos.
- source_word: לְאַרְבַּעְתָּן
  english_pob_choice: of all four
  chosen_spanish: los cuatro
  alternatives_spanish:
  - de los cuatro
  - para los cuatro
  lexicon: Hebrew grammar
  rationale: 'El hebreo tiene un valor distributivo referido a las cuatro ruedas. En español, «los cuatro» en la segunda cláusula conserva esa referencia de modo natural: «los cuatro tenían aros llenos de ojos todo alrededor».'
translation_notes:
  revision_awareness: Este borrador sigue de cerca el packet hebreo y preserva la decisión inglesa de mantener el matiz de temor de יִרְאָה. La revisión inglesa simplificó la segunda mitad a una formulación más natural («all four had rims»); en español se adopta una solución igualmente natural para evitar una repetición rígida, manteniendo el paralelismo y la imaginería de las ruedas.
  spanish_consistency_notes:
  - Se mantiene «aros» para גב en toda la unidad de Ezequiel 1:15–21, coherente con el contexto de las ruedas.
  - Se preserva el contraste semántico entre altura e inspiración de temor sin convertir יִרְאָה en una mera cualidad estética.
  - El orden de la frase busca ser publicable en español sin perder la rareza intencional de la imagen de los ojos.
