translation:
  language: es
  text: Y en cuanto a las ciudades de los levitas[a], las casas en las ciudades de su posesión podrán ser redimidas permanentemente por los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «un derecho perpetuo de redención será para los levitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עָרֵי
  english_pob_choice: As for the cities
  chosen_spanish: Y en cuanto a las ciudades
  alternatives_spanish:
  - Y las ciudades
  - Ahora bien, las ciudades
  lexicon: HALOT
  rationale: La conjunción abre un nuevo caso dentro de la legislación; en español, «en cuanto a» marca mejor el cambio de tópico sin perder la referencia a «ciudades».
- source_word: הַ/לְוִיִּם
  english_pob_choice: of the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - pertenecientes a los levitas
  lexicon: HALOT
  rationale: El constructo señala pertenencia/relación. «De los levitas» es natural y fiel en español.
- source_word: בָּתֵּי
  english_pob_choice: the houses
  chosen_spanish: las casas
  alternatives_spanish:
  - las viviendas
  lexicon: HALOT
  rationale: La palabra designa casas reales dentro de las ciudades; «casas» conserva la concreción legal del texto.
- source_word: עָרֵי אֲחֻזָּתָם
  english_pob_choice: in the cities of their possession
  chosen_spanish: en las ciudades de su posesión
  alternatives_spanish:
  - en las ciudades de su propiedad
  - en las ciudades de su heredad
  lexicon: HALOT
  rationale: אֲחֻזָּה expresa una posesión heredada o tenencia legal. «Posesión» mantiene ese sentido jurídico sin añadir demasiada interpretación.
- source_word: גְּאֻלַּת
  english_pob_choice: may be redeemed
  chosen_spanish: tendrán redención
  alternatives_spanish:
  - podrán ser redimidas
  - habrá derecho de rescate
  lexicon: HALOT
  rationale: El sustantivo forma con el verbo una cláusula legal de disponibilidad permanente. «Tendrán redención» conserva la fuerza jurídica en español; la alternativa más formal se reserva para nota.
- source_word: עוֹלָם
  english_pob_choice: permanently
  chosen_spanish: perpetua
  alternatives_spanish:
  - para siempre
  - en perpetuidad
  lexicon: HALOT
  rationale: En contexto legal, עוֹלָם expresa duración continua. «Perpetua» es breve, solemne y exacta.
- source_word: תִּהְיֶה
  english_pob_choice: may be
  chosen_spanish: tendrán
  alternatives_spanish:
  - será
  - habrá
  lexicon: HALOT
  rationale: Aunque el verbo es singular, en español la construcción nominal se vierte mejor con «tendrán» para hacer explícito que el derecho de redención pertenece a los levitas respecto de esas casas.
- source_word: לַ/לְוִיִּם
  english_pob_choice: by the Levites
  chosen_spanish: para los levitas
  alternatives_spanish:
  - a favor de los levitas
  - de parte de los levitas
  lexicon: HALOT
  rationale: El lamed indica aquí la parte beneficiaria del derecho. «Para los levitas» expresa adecuadamente que la redención les pertenece.
theological_decisions:
- issue: Naturaleza del derecho de redención en la cláusula legal
  english_pob_reading: The verse grants the Levites an ongoing right to redeem houses in their cities.
  chosen_spanish_reading: El versículo establece un derecho perpetuo de redención para los levitas respecto de las casas en sus ciudades.
  alternative_spanish_readings:
  - Las casas de las ciudades levíticas pueden ser redimidas continuamente por los levitas.
  - Existe para los levitas una redención perpetua.
  rationale: El hebreo גְּאֻלַּת עוֹלָם תִּהְיֶה לַ/לְוִיִּם es una cláusula jurídica de vigencia continua. En español conviene expresar de manera clara que se trata de un derecho permanente, sin diluir el valor legal del sustantivo «redención» ni convertirlo en una simple posibilidad abstracta.
  doctrine_reference: Translation philosophy §1, §5, §6
translation_notes:
  revision_awareness: 'La redacción sigue el sentido jurídico del hebreo y el audit trail en inglés: el énfasis no está en una mera posibilidad, sino en un derecho continuo de redención para los levitas. No se detectaron revisiones posteriores que exigieran ajustar la lectura.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «levitas» en minúscula para el etnónimo común en español; el contexto legal evita usar «sacerdotes» o terminología eclesiástica ajena al texto.
  - «Redención» se mantuvo como término técnico; «rescate» queda como alternativa semántica posible, pero no fue preferida por consistencia con el léxico del proyecto.
