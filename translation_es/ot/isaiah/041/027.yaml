    reason: alternative_reading
  - marker: c
    text: 'O: «Miren, aquí están».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «Daré a Jerusalén un mensajero que trae buenas noticias».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el valor de ל en el segundo miembro con 'a Jerusalén', añade la nota alternativa omitida para la frase del mensajero, y ajusta la nota del inicio para reflejar la alternativa documentada sobre la expresión difícil רִאשׁוֹן לְצִיּוֹן. También mejora levemente la naturalidad con 'le dice a Sión' sin expandir indebidamente el sujeto implícito.
