  yaml_path: translation/ot/judges/008/021.yaml
  text: Then Zebah and Zalmunna said[a], “Rise yourself and strike us down, for as the man is, so is his strength.” So Gideon rose and killed Zebah and Zalmunna[c][b], and he took the crescent ornaments that were on the necks of their camels.
  footnotes:
  - marker: a
    text: Or, “Rise yourself and kill us,” with וּפְגַע בָּנוּ understood more explicitly as a lethal blow in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew, “for as the man is, so is his strength,” a proverbial way of saying that a man's strength matches his stature or valor.
    reason: cultural_note
  - marker: c
    text: Or, “the crescents” or “moon-shaped ornaments.”
    reason: lexical_alternative
