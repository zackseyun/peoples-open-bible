revisions:
- from: Los avvitas[a] hicieron Nibhaz y Tartac, y los sefarvitas quemaban a sus hijos en el fuego para Adramélec y Anamélec[b], los dioses de Sefarváim.
  to: Los avvitas[a] hicieron Nibhaz y Tartac, y los sefarvitas quemaron a sus hijos varones en el fuego para Adramélec y Anamélec[b], los dioses de Sefarváim.
  rationale: Se ajusta 'quemaban' a 'quemaron' para seguir la revisión auditada del POB y mejorar la correspondencia con la secuencia narrativa. Se cambia 'sus hijos' por 'sus hijos varones' para preservar la especificidad masculina de בְּנֵיהֶם conforme a la política de precisión de género del proyecto. Se afina la nota cultural para reflejar más de cerca la explicación inglesa sin ampliar el sentido principal. No se requiere adjudicación adicional.
