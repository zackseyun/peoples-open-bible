revisions:
- from: 'Y dijeron[a], cada uno a su compañero: «Venid, echemos suertes para que sepamos por causa de quién nos ha venido este mal». Y echaron suertes, y la suerte cayó sobre Jonás.'
  to: 'Y dijeron, cada uno a su compañero: «Vamos, echemos suertes para que sepamos por causa de quién nos ha venido este mal[a]». Y echaron suertes, y la suerte cayó sobre Jonás.'
  rationale: 'Se realiza una reparación menor: se cambia «Venid» por «Vamos» para ajustarse al español neutro latinoamericano sin perder la fuerza exhortativa del hebreo, y se reubica la nota léxica al término «mal», que es el elemento que la nota explica. El resto del texto puede mantenerse por su buena fidelidad al hebreo y a la auditoría inglesa.'
