translation:
  language: es
  text: En ti, Yahvé, he tomado refugio; que nunca sea avergonzado. En tu rectitud[a], líbrame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'En tu justicia, líbrame'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּךָ
  english_pob_choice: In you
  chosen_spanish: En ti
  alternatives_spanish:
  - En ti solo
  - En ti confío
  lexicon: HALOT
  rationale: La preposición ב con sufijo de 2ms aquí mantiene una imagen locativa/metafórica de refugio. 'En ti' conserva esa metáfora y sigue de cerca el hebreo sin convertirla en una paráfrasis explícita de confianza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrama se vierte según la convención del proyecto como 'Yahvé', preservando el nombre propio divino y evitando la sustitución por un título. 'Yahveh' es una variante ortográfica posible, pero 'Yahvé' es la forma adoptada aquí.
- source_word: חָסִיתִי
  english_pob_choice: I have taken refuge
  chosen_spanish: he tomado refugio
  alternatives_spanish:
  - me he refugiado
  - confío
  lexicon: HALOT
  rationale: El qatal expresa una acción/estado ya asumido. 'He tomado refugio' preserva el sentido concreto de buscar amparo; 'me he refugiado' también es válido, pero 'he tomado refugio' deja más visible la imagen del refugio.
- source_word: אֵבוֹשָׁה
  english_pob_choice: be put to shame
  chosen_spanish: sea yo avergonzado
  alternatives_spanish:
  - sea yo puesto en vergüenza
  - quede avergonzado
  - sea yo avergonzado/avergonzada
  lexicon: HALOT
  rationale: En un contexto de súplica, בוש comunica vergüenza/deshonra por fracaso. 'Sea yo avergonzado' es natural en español bíblico actual y conserva el matiz de vergüenza pública sin endurecerlo excesivamente.
- source_word: לְעוֹלָם
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - por siempre
  lexicon: HALOT
  rationale: En esta petición negativa, la idea idiomática es absoluta. 'Nunca' expresa con naturalidad el valor de 'no en ningún momento', equivalente a la fuerza de la construcción hebrea en español.
- source_word: בְּצִדְקָתְךָ
  english_pob_choice: In your righteousness
  chosen_spanish: En tu justicia
  alternatives_spanish:
  - En tu rectitud
  - Por tu justicia
  - En tu justicia/righteousness
  lexicon: HALOT
  rationale: La preposición ב puede ser local o instrumental. Se eligió 'En tu justicia' para conservar la forma hebrea y porque el verbo de liberación queda enmarcado por el carácter justo de Dios. 'Justicia' mantiene la amplitud semántica y evita restringir el término a una sola acepción.
- source_word: פַלְּטֵנִי
  english_pob_choice: deliver me
  chosen_spanish: líbrame
  alternatives_spanish:
  - rescátame
  - sálvame
  - hazme escapar
  lexicon: HALOT
  rationale: El imperativo piel pide rescate activo. 'Líbrame' es breve, idiomático y fiel al registro de súplica del salmo; 'rescátame' también es posible, pero 'líbrame' funciona mejor en español litúrgico y actual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - oh Yahveh
  - SEÑOR
  rationale: Se conserva el nombre propio divino en vez de sustituirlo por un título. El vocativo 'oh' se añade por naturalidad del español en la invocación poética, manteniendo la relación personal y reverente del salmo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh; principio de preservar el nombre divino'
- issue: צִדְקָה aplicada al acto salvador de Dios
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  - bondad
  rationale: '''Justicia'' conserva la amplitud covenantal/legal del término y su conexión con la acción salvadora de Dios. No se reduce a mera retribución, sino que mantiene la base moral y fiel de la intervención divina.'
  doctrine_reference: Translation philosophy §5; principio de no borrar tensiones léxicas entre justicia y rectitud
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que hubo alto acuerdo entre revisiones. Esta propuesta sigue esa lectura estable, conservando la estructura paralela del hebreo y las decisiones léxicas ya auditadas en el inglés POB.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יְהוָה.
  - Se traduce ב con valor locativo como 'en' para conservar la imagen de refugio.
  - Se usa 'justicia' para צִדְקָה, sin borrar su dimensión de rectitud/carácter justo.
  - 'El imperativo final se expresa con un español natural y breve: ''líbrame''.'
