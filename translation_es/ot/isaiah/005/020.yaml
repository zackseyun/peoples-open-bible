revisions:
- from: ¡Ay de los que llaman al mal bien y al bien mal[a], que hacen de la oscuridad luz y de la luz oscuridad[b], que hacen de lo amargo dulce y de lo dulce amargo!
  to: ¡Ay de los que llaman al mal bien y al bien mal[a], que ponen la oscuridad por luz y la luz por oscuridad[b], que ponen lo amargo por dulce y lo dulce por amargo!
  rationale: Se ajusta la redacción para lograr un español más natural y digno sin perder la concisión ni el paralelismo del hebreo. «Ponen … por …» comunica con mayor claridad la inversión moral descrita por שָׂמִים + לְ. También se limpia la puntuación de la nota [a].
