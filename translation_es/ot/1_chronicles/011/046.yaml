  rationale: El gentilicio con artículo se vierte de forma directa como identificador epitético. Se preserva el valor relacional del hebreo sin convertirlo en una descripción vaga.
translation_notes:
  revision_awareness: El pasaje está en fuerte acuerdo con el audit trail inglés; no se requieren revisiones sustantivas. Se mantuvo el orden nominal y el valor gentilicio/epitético de los dos nombres finales, con notas para las variantes de transliteración documentadas.
  spanish_consistency_notes:
  - Se eligió 'el mahavita' para reflejar el artículo hebreo y la función de gentilicio.
  - Se prefirió 'hijos de' en lugar de 'los hijos de' para evitar añadir determinación que el español no necesita en esta secuencia nominal.
  - Se añadió acento en 'Joshavías' e 'Ithmá' por conveniencia ortográfica española, sin cambiar la identificación del nombre.
