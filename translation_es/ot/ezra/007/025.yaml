revisions:
- from: Y tú, Esdras, según la sabiduría de tu Dios que está en tu mano[a], nombra magistrados y jueces para que juzguen a todo el pueblo que está más allá del Río[b], a todos los que conocen las leyes de tu Dios; y a los que no las conocen, enséñales.
  to: Y tú, Esdras, según la sabiduría de tu Dios que está en tu mano[a], nombra magistrados y jueces que juzguen a todo el pueblo que está más allá del Río[b], a todos los que conocen las leyes de tu Dios; y a los que no las conocen, enséñales.
  rationale: 'Se hizo una reparación menor para alinear mejor la sintaxis española con la estructura del original y del POB inglés: «que juzguen» fluye mejor que «para que juzguen» en esta cadena relativa, y se mantiene el alcance correcto sobre «todo el pueblo... a todos los que conocen las leyes de tu Dios». También se normalizó levemente el estilo de la nota a con «O:».'
