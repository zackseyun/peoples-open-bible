translation:
  language: es
  text: y un décimo[a] por cada cordero, por los siete corderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un décimo»; en este contexto sacrificial, normalmente se entiende como un décimo de efa.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעִשָּׂרוֹן
  english_pob_choice: and one-tenth
  chosen_spanish: y una décima
  alternatives_spanish:
  - y una décima parte
  - y un décimo
  lexicon: HALOT
  rationale: עִשָּׂרוֹן designa una medida de un décimo; en este contexto sacrificial, el español natural y fiel es «una décima». Se mantiene la concisión del hebreo sin añadir «de un efa» al texto principal.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - un
  lexicon: HALOT
  rationale: El numeral concuerda con «décima» en español. Aunque el hebreo dice literalmente «uno», la concordancia gramatical exige «una».
- source_word: לַכֶּבֶשׂ הָאֶחָד
  english_pob_choice: for each lamb
  chosen_spanish: por cada cordero
  alternatives_spanish:
  - para cada cordero
  - para el cordero
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para el cordero uno», con fuerza distributiva. «Por cada cordero» expresa con naturalidad en español que la porción indicada aplica a cada animal individual.
- source_word: לְשִׁבְעַת הַכְּבָשִׂים
  english_pob_choice: for the seven lambs
  chosen_spanish: para los siete corderos
  alternatives_spanish:
  - para siete corderos
  lexicon: HALOT
  rationale: Se conserva el sentido colectivo del grupo sacrificial ya determinado en el contexto. «Los siete corderos» refleja esa referencia definida sin sobrecargar la frase.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente sin cambios sustantivos (high_agreement, 0.98). La redacción española sigue de cerca el hebreo y el análisis POB: medida concisa, fuerza distributiva y grupo definido.'
  spanish_consistency_notes:
  - Se prefiere «cordero» para כֶּבֶשׂ, coherente con el registro sacrificial.
  - Se usa «décima» en lugar de «décimo» para concordancia natural con la medida implícita.
  - Se evita añadir «de un efa» en el texto principal; la aclaración queda en nota, como en el audit trail inglés.
