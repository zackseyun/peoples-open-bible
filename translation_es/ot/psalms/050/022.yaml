review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: imperativo plural exhortativo («Comprendan»), partícula de ruego («por favor»), vocativo participial («ustedes que olvidan a Dios»), advertencia con פֶּן («no sea que»), imagen fuerte de juicio en אֶטְרֹף («despedace»), y ausencia de rescatador («no haya quien rescate»). La nota también preserva correctamente la alternativa más literal sin objeto explícito.'
  spanish_quality_summary: El español es claro y fiel, pero «despedace» suena menos preciso para la imagen predatoria de טרף que «desgarre» o «haga pedazos». Además, en un registro bíblico natural, «y no haya quien los rescate» hace explícito el objeto implícito ya presente en «los», mejora la fluidez y evita una leve aspereza. El resto del verso es plenamente legible y digno.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלוֹהַּ se vierte correctamente como «Dios». No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de mantener la metáfora fuerte de juicio está alineada con la filosofía documentada, aunque en español conviene afinarla léxicamente.'
  issues:
  - severity: medium
    issue: «los despedace» no es la mejor equivalencia española para la imagen de טרף
    rationale: El hebreo apunta a desgarrar/descoyuntar como una fiera a su presa. «Despedazar» mantiene violencia, pero «desgarrar» conserva mejor la imaginería de rasgar o hacer presa, más cercana al matiz teológico y poético documentado.
  - severity: low
    issue: Falta de objeto explícito en «y no haya quien rescate»
    rationale: La construcción española es comprensible, pero «quien los rescate» suena más completa y natural, y refleja mejor que nadie podrá librar a los destinatarios del juicio anunciado.
