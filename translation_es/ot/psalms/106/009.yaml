translation:
  language: es
  text: Reprendió al mar Rojo[a], y se secó; los condujo por los abismos como por el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mar de Juncos». Hebreo yam suph.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְעַר
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - recriminó
  - reprobó
  - reprendió con severidad
  lexicon: HALOT
  rationale: גער expresa reprensión o reprender. «Reprendió» conserva la imagen poética de una palabra autoritativa dirigida al mar, sin rebajarla a un simple mandato.
- source_word: בְּיַם סוּף
  english_pob_choice: the Red Sea
  chosen_spanish: el Mar Rojo
  alternatives_spanish:
  - el Mar de Juncos
  lexicon: HALOT
  rationale: El POB inglés usa el nombre geográfico tradicional por su fuerza referencial en el relato del éxodo. En español, «Mar Rojo» es el equivalente convencional y más reconocible; la alternativa literal se preserva como nota.
- source_word: וַיֶּחֱרָב
  english_pob_choice: it dried up
  chosen_spanish: se secó
  alternatives_spanish:
  - se volvió seco
  - quedó seco
  - se secó por completo
  lexicon: HALOT
  rationale: חרב aquí describe el mar volviéndose seco. «Se secó» reproduce bien el sentido intransitivo y mantiene la concisión poética del hebreo.
- source_word: וַיּוֹלִיכֵם
  english_pob_choice: he led them
  chosen_spanish: los condujo
  alternatives_spanish:
  - los llevó
  - los guió
  - los hizo andar
  lexicon: HALOT
  rationale: 'El hifil de הלך es causativo: hacer avanzar o conducir. «Los condujo» suena natural en español y conserva la idea de guía divina.'
- source_word: בַּתְּהֹמֹות
  english_pob_choice: through the depths
  chosen_spanish: por los abismos
  alternatives_spanish:
  - por las profundidades
  - entre los abismos
  - a través de las profundidades
  lexicon: HALOT
  rationale: תְּהֹמוֹת alude a las grandes profundidades acuáticas. «Abismos» mantiene la fuerza poética y la sensación de peligro; el plural se refleja en «los abismos».
- source_word: כַּמִּדְבָּר
  english_pob_choice: as through the wilderness
  chosen_spanish: como por el desierto
  alternatives_spanish:
  - como en el desierto
  - como por un desierto
  - igual que por el desierto
  lexicon: HALOT
  rationale: La comparación comunica que el paso por el mar fue tan transitable como cruzar el desierto. «Como por el desierto» conserva la simetría y el valor comparativo de כְּ.
theological_decisions:
- issue: Identificación de יַם סוּף en la alusión al éxodo
  english_pob_reading: the Red Sea
  chosen_spanish_reading: el Mar Rojo
  alternative_spanish_readings:
  - el Mar de Juncos
  rationale: La línea poética evoca el acto salvador del éxodo con una designación tradicional que los lectores identifican de inmediato. La alternativa literal se mantiene en nota porque el hebreo permite esa traducción y el POB inglés la documenta.
  doctrine_reference: Éxodo 14; Salmo 106:7-12
translation_notes:
  revision_awareness: El pasaje coincide con el texto base y con el audit trail inglés; no hubo revisiones aplicadas en la fuente inglesa más reciente, y la traducción española mantiene la misma estructura poética y las mismas decisiones léxicas clave.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal del hebreo con tres miembros coordinados.
  - Se usó «Mar Rojo» como nombre tradicional, pero se documentó la alternativa literal para preservar la tensión lexical.
  - «Abismos» conserva el tono poético y más solemne que «profundidades», sin perder el sentido de תְּהֹמוֹת.
  - No se introdujo terminología eclesiástica ajena al hebreo; la formulación sigue el registro narrativo-poético del salmo.
