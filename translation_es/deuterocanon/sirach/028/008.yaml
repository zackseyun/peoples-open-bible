translation:
  language: es
  text: Apártate de la contienda, y pecarás menos;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀπόσχου
  english_pob_choice: Keep away from
  chosen_spanish: Apártate de
  alternatives_spanish:
  - Evita
  - Mantente alejado de
  - Abstente de
  lexicon: BDAG
  rationale: El imperativo exhorta a retirarse deliberadamente de algo. «Apártate de» comunica bien esa retirada activa en español moderno y conserva el tono exhortativo sin volverse demasiado literal ni demasiado técnico.
- source_word: μάχης
  english_pob_choice: strife
  chosen_spanish: la contienda
  alternatives_spanish:
  - la pelea
  - la discordia
  - el conflicto
  lexicon: LSJ
  rationale: En este contexto sapiencial, μάχη no se limita a combate físico; apunta a disputa o querella que desemboca en pecado. «Contienda» es una opción sobria y bíblica en español que mantiene el sentido de disputa interpersonal.
- source_word: ἐλαττώσεις
  english_pob_choice: you will lessen
  chosen_spanish: disminuirás
  alternatives_spanish:
  - reducirás
  - minorarás
  - habrá menos
  lexicon: LSJ
  rationale: 'El futuro expresa resultado: apartarse de la contienda produce menos pecado. «Disminuirás» conserva el valor resultativo y suena natural en español.'
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - el pecado
  - las faltas
  - las ofensas
  lexicon: BDAG
  rationale: El griego está en plural, por lo que conviene mantener el plural en español. «Los pecados» respeta la referencia a actos concretos de pecado, no solo a una condición abstracta.
theological_decisions:
- issue: Relación causal entre evitar la contienda y la disminución del pecado
  english_pob_reading: Avoiding strife leads to fewer sins.
  chosen_spanish_reading: Apartarse de la contienda reduce los pecados.
  alternative_spanish_readings:
  - Apartarse de la contienda hará que peque menos.
  - Si te apartas de la contienda, pecarás menos.
  rationale: 'La línea sapiencial presenta una relación de sabiduría práctica: la conducta de evitar la disputa reduce la probabilidad y frecuencia del pecado. El español mantiene esa causalidad sin convertirla en una promesa absoluta ni en una interpretación moralizante adicional.'
  doctrine_reference: Sabiduría práctica / ética sapiencial; no introduce una doctrina específica adicional.
translation_notes:
  revision_awareness: Se siguió el sentido del griego de Swete LXX 1909 y el acuerdo alto del control cruzado; no se introdujeron revisiones textuales ni notas de variante porque el contexto de auditoría no señala divergencias significativas.
  spanish_consistency_notes:
  - Se prefirió «contienda» para mantener un registro bíblico y amplio, en lugar de «pelea» o «disputa», que estrechan más el sentido.
  - Se conservó el plural «pecados» para reflejar ἁμαρτίας.
  - La estructura breve y proverbial se mantuvo sin añadir explicaciones al texto principal.
