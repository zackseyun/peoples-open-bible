  yaml_path: translation/deuterocanon/prayer_of_manasseh/001/010.yaml
  text: I am bent down with many iron bonds[a], so that I cannot lift up my head, and there is no relief for me; because I provoked your wrath and did what is evil before you[b], setting up abominations and multiplying offenses.
  footnotes:
