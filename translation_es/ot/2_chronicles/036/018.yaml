translation:
  language: es
  text: Y todos los utensilios de la casa de Dios, grandes y pequeños, y los tesoros de la casa de Yahvé, y los tesoros del rey y de sus oficiales—todo lo llevó a Babilonia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And all
  chosen_spanish: Y todos
  alternatives_spanish:
  - Y todo
  - Y cada uno de
  lexicon: HALOT
  rationale: El hebreo introduce una suma total de los bienes enumerados; en español, «todos» conserva la idea colectiva y fluye mejor ante un sustantivo plural.
- source_word: כְּלֵי
  english_pob_choice: vessels
  chosen_spanish: utensilios
  alternatives_spanish:
  - vasos
  - objetos
  - instrumentos
  lexicon: HALOT
  rationale: En el contexto del saqueo del templo, el término abarca implementos y objetos cultuales; «utensilios» es amplio y natural en español sin restringir indebidamente el sentido.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo «casa de Dios», que es fiel y claro; «templo» sería más interpretativo.
- source_word: הַגְּדֹלִים וְהַקְּטַנִּים
  english_pob_choice: great and small
  chosen_spanish: grandes y pequeños
  alternatives_spanish:
  - grandes y chicos
  - de gran tamaño y de pequeño tamaño
  lexicon: HALOT
  rationale: La pareja hebrea expresa amplitud de tamaño o importancia. «Grandes y pequeños» reproduce ese contraste de forma idiomática en español.
- source_word: וְאֹצְרוֹת
  english_pob_choice: and the treasures
  chosen_spanish: y los tesoros
  alternatives_spanish:
  - y las tesorerías
  - y los depósitos
  lexicon: HALOT
  rationale: Aquí el sustantivo designa los bienes almacenados, no solo los lugares de depósito; por eso «tesoros» comunica mejor el contenido llevado a Babilonia.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Conforme al criterio español del proyecto, el Tetragrámaton se vierte «Yahvé» para preservar el nombre divino en el texto principal.
- source_word: וְאֹצְרוֹת הַמֶּלֶךְ וְשָׂרָיו
  english_pob_choice: and the treasures of the king and of his officials
  chosen_spanish: y los tesoros del rey y de sus oficiales
  alternatives_spanish:
  - y los tesoros del rey y de sus príncipes
  - y los tesoros del rey y de sus ministros
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a funcionarios, jefes u oficiales. «Oficiales» expresa bien el rango administrativo sin forzar una lectura aristocrática como «príncipes».
- source_word: הַכֹּל
  english_pob_choice: all this
  chosen_spanish: todo
  alternatives_spanish:
  - todo esto
  - el total
  lexicon: HALOT
  rationale: La forma resumptiva final recoge la lista precedente; «todo» en inciso final funciona de manera breve y natural, manteniendo la idea de totalidad.
- source_word: הֵבִיא
  english_pob_choice: he brought
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo trajo
  - lo transportó
  lexicon: HALOT
  rationale: En este contexto de traslado forzoso de botín, «lo llevó» comunica el desplazamiento efectivo hacia Babilonia sin añadir matices no presentes en el hebreo.
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: HALOT
  rationale: «Babilonia» es la forma castellana habitual y transparente del topónimo en textos bíblicos.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El proyecto español indica «Yahvé» como forma principal para יהוה. Se evita la sustitución por «SEÑOR» para no enmascarar el nombre del pacto, manteniendo la transparencia auditada del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La base inglesa fue revisada y quedó sin cambios según el último pase; por eso la redacción española sigue de cerca sus decisiones léxicas, pero adapta el orden y la naturalidad al español sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se mantuvo «casa de Dios» y «casa de Yahvé» para conservar la distinción entre ambas expresiones hebreas.
  - Se eligió un singular final implícito con «todo»/«lo llevó» por la resumptividad del hebreo, evitando añadir sujeto explícito que no aparece en el verso.
  - Se prefirió «oficiales» sobre «príncipes» para no estrechar el campo semántico de שָׂרִים.
