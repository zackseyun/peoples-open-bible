base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/013.yaml
  text: May Yahweh do so to Jonathan[a], and more also, if my father intends evil against you and I do not disclose it to you and send you away, so that you may go in peace. And may Yahweh be with you[c][b], as he has been with my father.
  footnotes:
  - marker: a
    text: Hebrew literally, 'uncover your ear,' an idiom meaning 'inform you' or 'disclose it to you.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'if it is good to my father [to do] the evil against you,' that is, 'if my father is pleased/intends to harm you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and I do not disclose it to you and send you away'.
    reason: previous_rendering
