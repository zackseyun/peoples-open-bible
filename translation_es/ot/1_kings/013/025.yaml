translation:
  language: es
  text: Y, miren[a], unos hombres pasaban y vieron el cadáver[b] arrojado en el camino, y al león que estaba junto al cadáver; y llegaron y lo reportaron[c] en la ciudad donde vivía el profeta anciano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he aquí». El hebreo conserva un marcador narrativo de atención repentina.
    reason: source_note
  - marker: b
    text: «Cadáver» traduce con precisión el cuerpo humano muerto que el contexto requiere; no «carcasa».
    reason: lexical_alternative
  - marker: c
    text: O «hablaron de ello en la ciudad». El verbo hebreo dice simplemente «hablaron», pero en contexto se refiere a reportar el incidente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí[a]
  alternatives_spanish:
  - Y miren
  - Y he aquí
  lexicon: HALOT
  rationale: Conserva el marcador narrativo de sorpresa y atención sin omitir la fuerza discursiva del hebreo. En español, «he aquí» mantiene bien el matiz formal y bíblico, y el marcador es útil para reflejar el efecto retórico del original.
- source_word: אֲנָשִׁים עֹבְרִים
  english_pob_choice: men were passing by
  chosen_spanish: unos hombres que pasaban
  alternatives_spanish:
  - hombres que iban pasando
  - algunos hombres pasaban
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural, y el participio expresa acción en curso. «Unos hombres que pasaban» conserva ambos rasgos con naturalidad en español.
- source_word: הַנְּבֵלָה
  english_pob_choice: the corpse
  chosen_spanish: el cadáver
  alternatives_spanish:
  - el cuerpo muerto
  - el cuerpo
  lexicon: HALOT
  rationale: En este contexto se trata de un ser humano muerto, por lo que «cadáver» es más preciso que «carcasa» o «cuerpo muerto», y más idiomático en español actual.
- source_word: מֻשְׁלֶכֶת
  english_pob_choice: thrown
  chosen_spanish: echado
  alternatives_spanish:
  - arrojado
  - tirado
  lexicon: HALOT
  rationale: El pasivo participial de שׁלך indica que fue lanzado o depositado con fuerza. «Echado» funciona bien en español bíblico y conserva la imagen sin sonar excesivamente técnico.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - sobre el camino
  - en la senda
  lexicon: HALOT
  rationale: «Camino» reproduce de forma natural דֶּרֶךְ y evita un literalismo innecesario de «carretera» o «ruta».
- source_word: הָאַרְיֵה עֹמֵד אֵצֶל הַנְּבֵלָה
  english_pob_choice: the lion standing beside the corpse
  chosen_spanish: al león que estaba junto al cadáver
  alternatives_spanish:
  - al león de pie junto al cadáver
  - al león parado junto al cadáver
  lexicon: HALOT
  rationale: «Junto a» expresa bien אֵצֶל. Añadir «que estaba» hace natural en español la construcción participial con עֹמֵד, sin perder la imagen de posición vigilante.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and they came
  chosen_spanish: y llegaron
  alternatives_spanish:
  - y vinieron
  - y fueron
  lexicon: HALOT
  rationale: En contexto, el verbo introduce su llegada a la ciudad. «Llegaron» es más natural en español que repetir «vinieron».
- source_word: וַיְדַבְּרוּ בָעִיר
  english_pob_choice: and reported it in the city
  chosen_spanish: y lo comunicaron en la ciudad
  alternatives_spanish:
  - y hablaron de ello en la ciudad
  - y dieron noticia en la ciudad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hablaron», pero el contexto muestra que informaron del incidente. «Lo comunicaron» mantiene esa función sin ocultar el matiz verbal básico.
- source_word: אֲשֶׁר הַנָּבִיא הַזָּקֵן יֹשֵׁב בָּהּ
  english_pob_choice: where the old prophet lived
  chosen_spanish: donde habitaba el profeta anciano
  alternatives_spanish:
  - donde vivía el profeta anciano
  - en la que moraba el profeta anciano
  lexicon: HALOT
  rationale: יֹשֵׁב בָּהּ indica residencia. «Habitaba» mantiene un tono bíblico claro y fiel, y «profeta anciano» preserva el orden atributivo del hebreo con naturalidad.
theological_decisions:
- issue: Naturaleza del impacto narrativo de וְהִנֵּה
  english_pob_reading: And behold
  chosen_spanish_reading: Y he aquí
  alternative_spanish_readings:
  - Y miren
  - He aquí
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión de tono bíblico: se conserva el llamado de atención del narrador sin suavizarlo ni omitirlo.'
  doctrine_reference: none
translation_notes:
  revision_awareness: El texto sigue de cerca el estado final del audit trail inglés, sin cambios de sentido respecto de la traducción inglesa aprobada; se han ajustado las elecciones para que suenen naturales y fieles en español, especialmente en el valor discursivo de וְהִנֵּה, el participio de acción continua y el verbo de reporte final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se usa «profeta anciano» para reproducir el atributo hebreo de edad sin añadir connotaciones despectivas.
  - «Lo comunicaron» refleja el contexto de reporte; no introduce objeto adicional en el sentido, solo lo hace explícito por exigencia del español idiomático.
