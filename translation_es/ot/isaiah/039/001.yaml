translation:
  language: es
  text: En aquel tiempo, Merodac-baladán, hijo de Baladán, rey de Babilonia, envió cartas y un regalo a Ezequías, porque oyó que había estado enfermo y se había recuperado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «se había fortalecido» o «se había hecho fuerte»; el hebreo usa esta expresión para referirse a la recuperación después de una enfermedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִוא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La fórmula introduce el marco narrativo de manera natural en español y conserva el valor temporal amplio del hebreo sin volverlo excesivamente interpretativo.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: «Enviar» es el equivalente más directo y sobrio para un acto diplomático de remisión de mensajeros o escritos.
- source_word: מְרֹדַךְ בַּלְאֲדָן
  english_pob_choice: Merodach-baladan
  chosen_spanish: Merodac-baladán
  alternatives_spanish:
  - Marduc-baladán
  - Merodac-Baladán
  lexicon: HALOT
  rationale: Se sigue la transliteración habitual en español bíblico, ajustada a la acentuación española; mantiene la correspondencia reconocible con la forma hebrea y con la tradición de uso.
- source_word: בֶּן בַּלְאֲדָן
  english_pob_choice: son of Baladan
  chosen_spanish: hijo de Baladán
  alternatives_spanish:
  - descendiente de Baladán
  lexicon: HALOT
  rationale: La construcción de filiación se traduce de forma directa y formal, sin añadir matices genealógicos no presentes en el texto.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: HALOT
  rationale: Título regia simple y directo; «rey de Babilonia» reproduce con claridad la relación nominal del hebreo.
- source_word: סְפָרִים
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - misivas
  - escritos
  lexicon: HALOT
  rationale: En contexto cortesano/diplomático, «cartas» es la equivalencia más natural para correspondencia escrita, conservando la especificidad del plural hebreo.
- source_word: וּמִנְחָה
  english_pob_choice: and a gift
  chosen_spanish: y una ofrenda
  alternatives_spanish:
  - y un regalo
  - y un presente
  lexicon: HALOT
  rationale: Aquí la POB inglesa opta por «gift» por el contexto diplomático; en español, «ofrenda» mantiene el posible matiz de obsequio presentado solemnemente sin forzar un tono cultual que el contexto no requiere. Se conserva la tensión semántica del término hebreo.
- source_word: אֶל חִזְקִיָּהוּ
  english_pob_choice: to Hezekiah
  chosen_spanish: a Ezequías
  alternatives_spanish:
  - hacia Ezequías
  lexicon: HALOT
  rationale: La preposición hebrea indica dirección al destinatario; en español, la forma más natural es «a Ezequías».
- source_word: וַיִּשְׁמַע
  english_pob_choice: for he heard
  chosen_spanish: porque oyó
  alternatives_spanish:
  - y oyó
  - pues oyó
  lexicon: HALOT
  rationale: La relación causal/explanatoria del hebreo se expresa con «porque» para conservar la conexión lógica que motiva el envío.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido de lo oído; «que» es la solución española más natural y precisa.
- source_word: חָלָה
  english_pob_choice: had been sick
  chosen_spanish: había estado enfermo
  alternatives_spanish:
  - estaba enfermo
  - había enfermado
  lexicon: HALOT
  rationale: El perfecto se refleja en pasado compuesto pluscuamperfecto para ubicar la enfermedad anterior al anuncio.
- source_word: וַיֶּחֱזָק
  english_pob_choice: had recovered
  chosen_spanish: se había fortalecido
  alternatives_spanish:
  - había recobrado fuerzas
  - se había recuperado
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea de «hacerse fuerte» en vez de nivelarla del todo a «recuperarse», porque el audit trail inglés ya señaló esa tensión lexical. En español, «se había fortalecido» comunica el sentido idiomático y mantiene el enlace con la raíz de fuerza.
translation_notes:
  revision_awareness: El texto español sigue de cerca el packet hebreo y el audit trail inglés. Se conservó la tensión de וַיֶּחֱזָק como imagen de fortalecimiento, evitando una normalización total a «recuperó la salud». No hay revisiones aplicadas en el paquete fuente; la redacción final se ajusta al acuerdo de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «Ezequías» y las transliteraciones bíblicas en forma estable para coherencia con el proyecto.
  - Se conserva «ofrenda» por el posible matiz de מִנְחָה, aunque el contexto sea diplomático, para no borrar la amplitud semántica del hebreo.
  - Se prefirió la pluscuamperfecta española («había estado», «se había fortalecido») para reflejar la anterioridad relativa indicada por el contexto narrativo.
