revisions:
- from: 'Entonces Faraón llamó a Moisés y dijo[a]: «Vayan, sirvan a Yahvé. Solo queden atrás[b] sus flocks y sus ganados; incluso sus pequeños pueden ir con ustedes».'
  to: 'Entonces Faraón llamó a Moisés y dijo: «Vayan, sirvan a Yahvé. Solo queden atrás[a] sus rebaños y sus vacadas; incluso sus pequeños[b] pueden ir con ustedes».'
  rationale: 'Se corrige el anglicismo «flocks» por «rebaños», se mejora la naturalidad de בקר con «vacadas», y se reubican las notas para que correspondan a las alternativas léxicas relevantes preservadas en la auditoría inglesa: «queden atrás / permanezcan atrás» y «sus pequeños / sus niños». Se elimina la nota innecesaria sobre «llamó».'
