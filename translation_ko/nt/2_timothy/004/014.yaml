  text: Ἀλέξανδρος ὁ χαλκεὺς πολλά μοι κακὰ ἐνεδείξατο— ⸀ἀποδώσει αὐτῷ ὁ κύριος κατὰ τὰ ἔργα αὐτοῦ—
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/014.yaml
  text: Alexander the metalworker showed me many evils; the Lord will repay him according to his works.
translation:
  language: ko
  text: 구리 세공인[a] 알렉산더가 나에게 많은 해를 끼쳤습니다. 주께서 그의 행위대로 그에게 갚으실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「구리 대장장이」. 헬라어 χαλκεύς는 구리·청동을 다루는 금속 세공인을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλέξανδρος
  english_pob_choice: Alexander
  chosen_korean: 알렉산더
  alternatives_korean:
  - 알렉산드로스
  lexicon: BDAG
  rationale: 글로사리 지침 및 한국 성서 전통을 따른다.
- source_word: ὁ χαλκεὺς
  english_pob_choice: the metalworker
  chosen_korean: 구리 세공인
  alternatives_korean:
  - 구리 대장장이
  - 동장이
  lexicon: BDAG
  rationale: χαλκεύς는 구리·청동 금속 세공인. 「구리 세공인」이 본 직업의 구체성을 자연스럽게 담는다.
- source_word: πολλά μοι κακὰ ἐνεδείξατο
  english_pob_choice: showed me many evils
  chosen_korean: 나에게 많은 해를 끼쳤습니다
  alternatives_korean:
  - 나에게 많은 악을 행하였습니다
  - 나에게 큰 해를 입혔습니다
  lexicon: BDAG
  rationale: ἐνδείκνυμι의 「드러내 보임·행함」은 본 문맥에서 적대적 행위를 가리킨다. 「해를 끼치다」가 자연스럽다.
- source_word: ἀποδώσει αὐτῷ ὁ κύριος κατὰ τὰ ἔργα αὐτοῦ
  english_pob_choice: the Lord will repay him according to his works
  chosen_korean: 주께서 그의 행위대로 그에게 갚으실 것입니다
  alternatives_korean:
  - 주께서 그의 행위에 따라 그에게 갚으시기를 빕니다
  - 주께서 그의 행한 대로 갚으실 것입니다
  lexicon: BDAG
  rationale: 일부 사본은 가정법(「갚으시기를 빕니다」)으로 읽으나 SBLGNT 본문은 미래 직설법으로 「갚으실 것입니다」(예언적 단언). 시편 62:12 등의 구약적 정형 표현과 호응한다.
