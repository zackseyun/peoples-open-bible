translation:
  language: es
  text: Entonces Ezequías tomó las cartas[a] de mano de los mensajeros[b] y las leyó; luego subió a la casa de Yahvé, y Ezequías las extendió delante de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «documentos» o «rollos»; el término hebreo puede abarcar materiales escritos más amplios que una carta personal.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de mano de los mensajeros», un modismo que significa simplemente «de los mensajeros».
    reason: lexical_alternative
  - marker: c
    text: Es decir, presentó las cartas delante de Yahvé como acto de oración.
    reason: cultural_note
lexical_decisions:
- source_word: הַסְּפָרִים
  english_pob_choice: the letters
  chosen_spanish: las cartas
  alternatives_spanish:
  - los documentos
  - los escritos
  - los rollos
  lexicon: HALOT
  rationale: En este contexto narrativo, ספרים designa el mensaje escrito entregado por los enviados. «Cartas» es el equivalente español más natural y preciso; conserva el valor de escrito remitido sin reducir innecesariamente el término a «documentos» o «rollos».
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de mano de
  alternatives_spanish:
  - de
  - de parte de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y concreta. «De mano de» conserva la imagen de procedencia inmediata sin sonar tan pesado como un calco rígido en español.
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los enviados
  - los ángeles
  lexicon: HALOT
  rationale: Aquí מַלְאָכִים se refiere a portadores humanos del mensaje, no a seres celestiales. «Mensajeros» reproduce bien ese valor contextual y evita la ambigüedad de «ángeles».
- source_word: וַיִּקְרָאֵם
  english_pob_choice: and read them
  chosen_spanish: y las leyó
  alternatives_spanish:
  - y las leyó en voz alta
  - y las leyó
  lexicon: HALOT
  rationale: El sufijo pronominal es plural y concuerda con las cartas. En español, «las leyó» expresa de manera natural la acción sin añadir detalles no presentes en el hebreo.
- source_word: וַיַּעַל
  english_pob_choice: and he went up
  chosen_spanish: luego subió
  alternatives_spanish:
  - y subió
  - y fue hacia arriba
  lexicon: HALOT
  rationale: עלה conserva el sentido literal de ascender, especialmente por el movimiento hacia la casa de Yahvé. «Subió» preserva esa imagen y resulta idiomático en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la expresión transparente «casa de Yahvé» en lugar de sustituirla por «templo», porque el hebreo dice literalmente «casa de Yahvé» y el contexto permite la referencia cultual sin perder la forma del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto, de acuerdo con la política del proyecto. «Yahvé» es la forma establecida en español para el Tetragrámaton en esta traducción.
- source_word: וַיִּפְרְשֵׂהוּ
  english_pob_choice: spread them
  chosen_spanish: las extendió
  alternatives_spanish:
  - las desplegó
  - las puso extendidas
  lexicon: HALOT
  rationale: פרשׂ describe el acto físico de desplegar o extender el escrito ante Dios. Como el referente inmediato son las cartas, el plural femenino «las» en español expresa mejor la concordancia y evita la ambigüedad del singular unitario.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: «Delante de Yahvé» reproduce la fuerza espacial e idiomática de לִפְנֵי sin volver la frase innecesariamente técnica. Mantiene el sentido de presentar el escrito ante Dios.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El versículo usa el Tetragrámaton de manera directa. En español, «Yahvé» preserva el nombre propio de Dios en lugar de sustituirlo por un título, alineándose con la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre las cartas y el acto de presentarlas ante Dios
  english_pob_reading: that is, he laid out the letter(s) before the LORD in prayer
  chosen_spanish_reading: las extendió delante de Yahvé
  alternative_spanish_readings:
  - las presentó delante de Yahvé en oración
  - las puso delante de Yahvé
  rationale: El hebreo narra el acto físico; la dimensión orante es contextual, no explícita en la forma verbal. Por eso la traducción principal conserva la acción concreta sin introducir una glosa interpretativa en el texto base.
  doctrine_reference: Narrative context and POB cultural note on presenting the letters before Yahweh
- issue: Número del objeto extendido en וַיִּפְרְשֵׂהוּ
  english_pob_reading: spread them
  chosen_spanish_reading: las extendió
  alternative_spanish_readings:
  - la extendió
  - los extendió
  rationale: Aunque el sufijo hebreo es singular, el antecedente inmediato plural («las cartas») y la revisión del inglés POB favorecen una referencia plural. En español, el plural femenino concuerda con el antecedente contextual y evita perder esa corrección textual.
  doctrine_reference: Revision-aware agreement with the audited English POB update
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para cambiar el objeto de singular a plural («it» → «them») a fin de concordar con «letters». La presente redacción española refleja esa revisión con «las extendió» y mantiene la pluralidad en todo el versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma uniforme para יהוה.
  - Se eligió «mensajeros» para מַלְאָכִים por el contexto histórico, no «ángeles».
  - «Casa de Yahvé» mantiene la transparencia formal del hebreo sin sustituirla por «templo».
  - 'El plural de referencia se mantiene coherente: «las cartas», «las leyó», «las extendió».'
  - «De mano de» preserva el giro idiomático hebreo con fluidez en español.
