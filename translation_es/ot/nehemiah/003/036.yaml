translation:
  language: es
  text: Escucha[a], nuestro Dios, porque somos despreciados. Haz volver su oprobio sobre sus propias cabezas, y entrégalos[c] como botín en una tierra de cautiverio[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «óyenos». El hebreo usa un imperativo dirigido a Dios; el objeto está implícito por el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «dales»; también «entrégalos para botín» o «hazlos botín». La idea es ponerlos en manos de otros para despojo.
    reason: lexical_alternative
  - marker: d
    text: O «en la tierra de cautiverio». El hebreo puede entenderse de manera indefinida o más específica según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha, por favor
  - Atiende
  lexicon: HALOT
  rationale: Imperativo dirigido a Dios. En español, «Escucha» conserva la fuerza orante de «Hear» y suena natural en una súplica directa sin añadir contenido no explícito.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - oh nuestro Dios
  - Dios nuestro
  lexicon: HALOT
  rationale: El sufijo posesivo plural se mantiene de forma directa como «nuestro Dios». No se necesita un vocativo artificial en español para conservar el sentido de invocación.
- source_word: הָיִינוּ בוּזָה
  english_pob_choice: we are despised
  chosen_spanish: somos despreciados
  alternatives_spanish:
  - hemos quedado despreciados
  - hemos sido despreciados
  - llegamos a ser objeto de desprecio
  lexicon: HALOT
  rationale: La revisión inglesa optó por un presente de estado para reflejar con naturalidad el hebreo. En español, «somos despreciados» preserva ese estado resultante sin forzar un perfecto perifrástico que sonaría menos directo.
- source_word: וְהָשֵׁב
  english_pob_choice: Turn ... back
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Devuelve
  - Haz volver
  - Retorna
  lexicon: HALOT
  rationale: El imperativo causativo de שוב se expresa bien con «vuelve» en la locución «vuelve … sobre». Aunque «devuelve» también es posible, «vuelve» sigue más de cerca la imagen de reversión sobre el adversario.
- source_word: חֶרְפָּתָם
  english_pob_choice: their reproach
  chosen_spanish: su oprobio
  alternatives_spanish:
  - su reproche
  - su vergüenza
  - su afrenta
  lexicon: HALOT
  rationale: «חרפה» abarca reproche, afrenta, deshonra. «Oprobio» es una opción digna y bíblica en español que conserva el peso de vergüenza pública del término hebreo sin volverlo demasiado coloquial.
- source_word: אֶל רֹאשָׁם
  english_pob_choice: on their own heads
  chosen_spanish: sobre su propia cabeza
  alternatives_spanish:
  - sobre sus propias cabezas
  - en su propia cabeza
  - encima de su cabeza
  lexicon: HALOT
  rationale: La idiomática de retribución se mantiene en singular colectivo con «su propia cabeza», que refleja el hebreo y suena natural en español. La idea de reversión del ultraje queda clara.
- source_word: וּתְנֵם
  english_pob_choice: give them over
  chosen_spanish: entrégalos
  alternatives_spanish:
  - dales
  - ponlos
  - entrégales
  lexicon: HALOT
  rationale: El verbo נתן con objeto pronominal y complemento predicativo se traduce de modo funcional como «entrégalos», que comunica la idea de ponerlos en manos de otros para juicio o despojo.
- source_word: לְבִזָּה
  english_pob_choice: as plunder
  chosen_spanish: como botín
  alternatives_spanish:
  - para botín
  - como presa
  - como despojo
  lexicon: HALOT
  rationale: «ביזה» es botín/plunder. «Como botín» preserva el valor predicativo del hebreo tras el verbo y es claro en español bíblico contemporáneo.
- source_word: בְּאֶרֶץ שִׁבְיָה
  english_pob_choice: in a land of captivity
  chosen_spanish: en una tierra de cautiverio
  alternatives_spanish:
  - en la tierra de cautiverio
  - en tierra de cautiverio
  - en una tierra de exilio
  lexicon: HALOT
  rationale: La lectura indefinida del hebreo se refleja con «una tierra de cautiverio», siguiendo la nota inglesa. «Cautiverio» conserva la concreción del sustantivo mejor que una paráfrasis como «exilio».
theological_decisions:
- issue: Petición imprecatoria de retribución
  english_pob_reading: Retain the prayer for retributive justice in direct form
  chosen_spanish_reading: Conservar la súplica retributiva sin suavizarla
  alternative_spanish_readings:
  - Suavizarla como una petición general de justicia
  - Interpretarla solo como lenguaje figurado
  rationale: El hebreo pide explícitamente que el oprobio sea revertido y que los enemigos sean entregados como botín. La traducción española mantiene la fuerza de la imprecación, como hace el audit trail inglés, sin atenuarla por motivos de comodidad teológica.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que ajustó «we have become despised» a «we are despised» por mayor naturalidad. La redacción española refleja ese mismo estado presente con «somos despreciados». También se conservó la fuerza imprecatoria y la lectura indefinida de «a land of captivity».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto; aquí no aparece porque el versículo usa אֱלֹהֵינוּ («nuestro Dios»).
  - Se prefirió «botín» para לְבִזָּה por ser el equivalente español más natural y auditable en este contexto.
  - «Oprobio» conserva el tono bíblico de חֶרְפָּה sin introducir una interpretación doctrinal distinta.
