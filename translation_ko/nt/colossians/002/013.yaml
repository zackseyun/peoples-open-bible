id: COL.2.13
reference: Colossians 2:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὑμᾶς νεκροὺς ὄντας ⸀ἐν τοῖς παραπτώμασιν καὶ τῇ ἀκροβυστίᾳ τῆς σαρκὸς ὑμῶν, συνεζωοποίησεν ὑμᾶς σὺν αὐτῷ· χαρισάμενος ἡμῖν πάντα τὰ παραπτώματα,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/013.yaml
  text: And you, being dead in your trespasses and the uncircumcision of your flesh, he made alive together with him, having forgiven us all our trespasses,
translation:
  language: ko
  text: 또한 범죄들[a] 가운데서 죽어 있었고 여러분의 육체의 무할례 가운데 있던 여러분을, 하나님께서 그분과 함께 살리셨으며, 우리[b]의 모든 범죄를 은혜로 사하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「허물들」. 헬라어 παράπτωμα는 「범죄·허물·잘못」을 함께 담는다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어는 「여러분」에서 「우리」로 인칭이 바뀐다. 바울이 골로새 성도에서 모든 신자(자신 포함)로 시야를 넓힌 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: νεκροὺς ὄντας
  english_pob_choice: being dead
  chosen_korean: 죽어 있었고
  alternatives_korean:
  - 죽은 자였던
  - 죽음에 처해 있던
  lexicon: BDAG
  rationale: 분사 구문을 한국어 종속절 「죽어 있었고」로 자연스럽게 옮긴다.
- source_word: ἐν τοῖς παραπτώμασιν
  english_pob_choice: in your trespasses
  chosen_korean: 범죄들 가운데서
  alternatives_korean:
  - 허물들 안에서
  - 범죄로 인하여
  lexicon: BDAG
  rationale: 「범죄」는 παράπτωμα의 표준 한국어 등가어이며, 「가운데서」로 ἐν의 영역적 의미를 보존한다.
- source_word: τῇ ἀκροβυστίᾳ τῆς σαρκὸς ὑμῶν
  english_pob_choice: the uncircumcision of your flesh
  chosen_korean: 여러분의 육체의 무할례 가운데
  alternatives_korean:
  - 너희 육신의 할례받지 않음 가운데
  - 너희 몸의 무할례에
  lexicon: BDAG
  rationale: 한국 교회의 정립된 「무할례」를 사용한다. σάρξ는 글로사리 「육체」.
- source_word: συνεζωοποίησεν ὑμᾶς σὺν αὐτῷ
  english_pob_choice: he made alive together with him
  chosen_korean: 하나님께서 그분과 함께 살리셨으며
  alternatives_korean:
  - 그분과 함께 다시 살리셨으며
  - 그분과 함께 살게 하셨으며
  lexicon: BDAG
  rationale: 함의된 주어(하나님)를 명시하여 한국어 자연성 살림. 「함께」 보존.
- source_word: χαρισάμενος ἡμῖν πάντα τὰ παραπτώματα
  english_pob_choice: having forgiven us all our trespasses
  chosen_korean: 우리의 모든 범죄를 은혜로 사하셨습니다
  alternatives_korean:
  - 우리에게 모든 허물을 은혜로 용서하셨습니다
  - 우리의 모든 범죄를 값없이 용서하셨습니다
  lexicon: BDAG
  rationale: χαρίζομαι의 「은혜로 베풀어 줌」을 「은혜로 사하셨습니다」로 살린다. 헬라어 1인칭 「우리」 전환을 보존한다.
theological_decisions:
- issue: σάρξ의 의미
  chosen_reading: 「육체」(문자적, 신학적 함의 보존)
  alternative_readings:
  - 「죄성」(비유적)
  rationale: 「육체의 무할례」는 본 문맥(2:11의 할례 언어)에서 일차적으로 육체적 무할례를 가리킨다. 「죄성」으로 옮기면 본문에 없는 결정을 들여오게 된다.
  doctrine_reference: 'DOCTRINE.md: σάρξ — 「육체」(literal) / 「죄성」(metaphorical); preserve tension'
- issue: 인칭 전환(여러분→우리)
  chosen_reading: 헬라어 그대로 「우리」로 옮김
  alternative_readings:
  - 「여러분」으로 통일
  rationale: 헬라어는 의도적으로 인칭을 바꾸어 골로새 성도에서 모든 신자로 시야를 넓힌다. 본 번역도 이를 보존한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy'
