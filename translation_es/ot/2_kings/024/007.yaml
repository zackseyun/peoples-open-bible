base_translation:
  language: en
  yaml_path: translation/ot/2_kings/024/007.yaml
  text: And the king of Egypt did not go out again from his land[a], because the king of Babylon had taken all that belonged to the king of Egypt, from the Brook of Egypt to the Euphrates River.
  footnotes:
