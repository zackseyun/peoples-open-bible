translation:
  language: es
  text: si sus lomos[b] no me han bendecido, y si no se calentó con el vellón[a] de mis ovejas—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de la lana de mis ovejas'. El hebreo puede referirse al vellón o a la lana esquilada.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''sus lomos'', una expresión corporal que alude al cuerpo del necesitado vestido y abrigado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: if ... not
  chosen_spanish: si ... no
  alternatives_spanish:
  - ciertamente no
  - si no es que
  lexicon: HALOT
  rationale: En esta fórmula de juramento condicional, el hebreo mantiene la estructura de 'si no...'; en español, 'si ... no' conserva mejor el valor de autoimprecación que una paráfrasis declarativa.
- source_word: בֵרֲכוּנִי
  english_pob_choice: have not blessed me
  chosen_spanish: me han bendecido
  alternatives_spanish:
  - me bendijeron
  - me dieron las gracias
  lexicon: HALOT
  rationale: ברך en piel conserva el sentido de 'bendecir'; aunque el contexto implica gratitud del necesitado, 'bendecido' preserva el giro hebreo y evita reducirlo solo a 'agradecer'.
- source_word: חֲלָצָיו
  english_pob_choice: his loins
  chosen_spanish: sus lomos
  alternatives_spanish:
  - su cuerpo
  - sus caderas
  - su cintura
  lexicon: HALOT
  rationale: '''Lomos'' es el equivalente más directo y tradicional en español para la zona de los riñones/cintura que el hebreo usa metonímicamente para la persona necesitada y su cuerpo abrigado.'
- source_word: וּמִגֵּז
  english_pob_choice: by the fleece
  chosen_spanish: con el vellón
  alternatives_spanish:
  - de la lana
  - de la esquila
  lexicon: HALOT
  rationale: גֵּז puede referirse al vellón o a la lana esquilada; 'vellón' conserva la imagen concreta y la relación instrumental con el verbo de calentar.
- source_word: כְּבָשַׂי
  english_pob_choice: my sheep
  chosen_spanish: de mis ovejas
  alternatives_spanish:
  - de mis corderos
  lexicon: HALOT
  rationale: En este contexto posesivo y productivo, 'ovejas' suena natural en español y mantiene el referente del rebaño del que procede el vellón.
- source_word: יִתְחַמָּם
  english_pob_choice: he was not warmed
  chosen_spanish: se calentó
  alternatives_spanish:
  - se abrigó
  - entró en calor
  lexicon: HALOT
  rationale: El hitpael de חם expresa volverse cálido; en español 'se calentó' refleja el cambio de estado sin agregar una capa interpretativa excesiva.
theological_decisions:
- issue: Valor metonímico de 'sus lomos'
  english_pob_reading: Hebrew 'his loins,' a bodily expression referring to the needy person's body being clothed and warmed.
  chosen_spanish_reading: '''sus lomos'' conserva la expresión corporal hebrea y su referencia metonímica al necesitado entero que recibe abrigo.'
  alternative_spanish_readings:
  - '''su cuerpo'' explícita la referencia metonímica'
  - '''su cintura'' suaviza el arcaísmo pero pierde la imagen'
  rationale: La imagen corporal forma parte de la fuerza retórica del juramento de Job; mantenerla en español respeta la tensión entre literalidad y sentido contextual.
  doctrine_reference: Job 31:20; uso metonímico hebreo del cuerpo como la persona entera.
- issue: Sentido de 'bendecir' frente a 'agradecer'
  english_pob_reading: '''have not blessed me'' preserves the Hebrew idiom and emotional/theological register better than flattening to ''thanked me.'''
  chosen_spanish_reading: '''me han bendecido'' mantiene el verbo de bendecir, aun cuando el acto esperado sea agradecimiento.'
  alternative_spanish_readings:
  - '''me han dado las gracias'' explicita el sentido social'
  - '''me han agradecido'' clarifica la reacción del pobre'
  rationale: El hebreo documenta el verbo bendecir; traducirlo por agradecer borraría una tensión lexical importante que el texto y la tradición exegética dejan ver.
  doctrine_reference: Lexical idiom ברך en contextos humanos; Job 31:20.
translation_notes:
  revision_awareness: El cotejo con el texto hebreo y el expediente inglés muestra alta concordancia (0,95) y sin revisiones sustantivas; la única tensión leve está en el valor de גֵּז ('vellón' / 'lana esquilada') y en la imagen corporal de חֲלָצָיו, preservada mediante notas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma normal del Tetragrámaton en el proyecto, aunque este versículo no lo contiene.
  - Se conserva 'bendecido' en vez de 'agradecido' para no borrar el verbo ברך documentado en el original.
  - '''Lomos'' se usa de forma consistente para חֲלָצִים cuando el contexto exige la imagen corporal metonímica.'
  - '''Vellón'' traduce el valor concreto de גֵּז y encaja con el participio de calentarse en español natural.'
