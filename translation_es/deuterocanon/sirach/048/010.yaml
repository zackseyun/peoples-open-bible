  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Israel' en el texto principal y la nota sobre la variante griega 'Jacob' están bien conceptualmente. El mantenimiento del idiomático bíblico 'volver el corazón' concuerda con la decisión teológica documentada.
