review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: secuencia narrativa («Entonces»), interlocutor («a Dios»), escenario proyectado, «los hijos de Israel», «El Dios de sus padres», y la pregunta final. Sin embargo, hay dos ajustes de fidelidad importantes: בָא se auditó como «come», no «go», por lo que en español conviene «venga» en vez de «vaya»; y מַה שְּׁמוֹ se traduce mejor como «¿Qué nombre tiene?» o equivalente más directo que «¿Cuál es su nombre?», que es aceptable pero algo menos ceñido al hebreo/POB. Además, el futuro final «¿qué les diré?» funciona, pero «¿qué les diré yo?» no es necesario; el texto actual está bien en ese punto.'
  spanish_quality_summary: 'El español es claro, natural y de registro digno. «He aquí» encaja con el tono elevado. «Los hijos de Israel» y «El Dios de sus padres» son legibles y fieles. El principal problema de calidad es semántico más que estilístico: «cuando yo vaya» introduce una perspectiva de alejamiento menos adecuada que «cuando yo venga» para בָא. También puede mejorarse la pregunta citada para sonar más directa y natural en español bíblico moderno: «¿Qué nombre tiene?»'
  glossary_alignment: 'El borrador sigue bien las pautas del proyecto: אֱלֹהִים como «Dios», preserva «los hijos de Israel» según la decisión de género/forma colectiva, y mantiene «padres» en vez de «antepasados». No aparecen términos del glosario mayor en conflicto. La nota al pie sobre «los israelitas» está bien anclada y justificada.'
  issues:
  - severity: medium
    issue: «vaya» para בָא
    rationale: La evidencia fuente y la auditoría inglesa optan por «come» por la perspectiva de acercamiento. «Vaya» cambia la deixis y se aparta de la decisión léxica documentada. «venga» preserva mejor el sentido.
  - severity: low
    issue: «¿Cuál es su nombre?» puede afinarse
    rationale: No es incorrecto, pero el hebreo מַה שְּׁמוֹ y la POB inglesa «What is his name?» quedan más directos en español con «¿Qué nombre tiene?»; evita una formulación algo más libre o catequética.
  revised_spanish_text: 'Entonces Moisés dijo a Dios[a]: «He aquí, cuando yo venga a los hijos de Israel y les diga: “El Dios de sus padres me ha enviado a ustedes”, y ellos me digan: “¿Qué nombre tiene?”, ¿qué les diré?»'
  revised_footnotes:
