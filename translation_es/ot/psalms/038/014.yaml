    rationale: El texto fuente usa יִפְתַּח פִּיו («abre su boca»), y el audit trail inglés documenta explícitamente esa lectura como alternativa importante. Aunque el texto principal puede seguir la revisión final en primera persona, la revisión española debe conservar esa información en nota.
  - severity: low
    issue: «No abro mi boca» suena menos natural que «no abro la boca».
    rationale: En español general y bíblico moderno, «no abro la boca» expresa mejor el idiomatismo sin perder sentido ni solemnidad.
  revised_spanish_text: Pero yo, como un sordo, no oigo; y como un mudo[a], no abro la boca.
