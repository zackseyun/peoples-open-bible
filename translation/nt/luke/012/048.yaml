id: LUK.12.48
reference: Luke 12:48
source:
  edition: SBLGNT
  text: ὁ δὲ μὴ γνοὺς ποιήσας δὲ ἄξια πληγῶν δαρήσεται ὀλίγας. παντὶ δὲ ᾧ ἐδόθη πολύ, πολὺ ζητηθήσεται παρ’ αὐτοῦ, καὶ ᾧ παρέθεντο πολύ, περισσότερον αἰτήσουσιν αὐτόν.
translation:
  text: But the one who did not know[a], yet did what deserved blows, will receive few. From everyone to whom much was given, much will be required, and from the one to whom they entrusted much[b], they will ask even more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be beaten with few blows.' The Greek verb is explicit about beating; the translation 'will receive few' leaves 'blows' understood from the preceding phrase for smoother English.
    reason: lexical_alternative
  - marker: b
    text: Or 'much will be demanded from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ... μὴ γνοὺς
  chosen: the one who did not know
  alternatives:
  - the one who was ignorant
  - the one who did not understand
  lexicon: BDAG
  rationale: Substantival participle with μή and aorist participle of γινώσκω; 'the one who did not know' is natural English and preserves the sense of lacking knowledge without overstating culpability.
- source_word: ποιήσας ... ἄξια πληγῶν
  chosen: did what deserved blows
  alternatives:
  - having done things worthy of blows
  - having done what merited a beating
  lexicon: BDAG
  rationale: ἄξια with genitive πληγῶν means actions deserving punishment. 'Did what deserved blows' keeps the causal relation and avoids archaic phrasing.
- source_word: πληγῶν
  chosen: blows
  alternatives:
  - stripes
  - lashes
  - beating
  lexicon: BDAG
  rationale: In this disciplinary context πληγή refers to strokes/blows inflicted as punishment. 'Blows' is clear modern English; 'stripes' is archaic, while 'lashes' may imply a specific instrument not stated.
- source_word: δαρήσεται ὀλίγας
  chosen: will receive few
  alternatives:
  - will be beaten with few blows
  - will be flogged lightly
  lexicon: BDAG
  rationale: The verb δέρω means to beat/strike. Because 'blows' is already supplied in the prior clause, English can idiomatically say 'will receive few' with the object understood. This preserves the comparative contrast with the previous verse while remaining readable.
- source_word: παντὶ ... ᾧ ἐδόθη πολύ
  chosen: From everyone to whom much was given
  alternatives:
  - To everyone who was given much
  - Everyone to whom much was given
  lexicon: BDAG
  rationale: The dative relative construction introduces a general principle. 'From everyone to whom much was given' anticipates the following passive 'will be required' and matches the sense of accountability.
- source_word: πολὺ ζητηθήσεται παρ’ αὐτοῦ
  chosen: much will be required from him
  alternatives:
  - much will be demanded from him
  - much will be sought from him
  lexicon: BDAG
  rationale: ζητέω in passive here carries the sense of demanding or requiring accountability. 'Required' is idiomatic and fits the moral principle. 'From him' reflects παρά with genitive.
- source_word: παρέθεντο
  chosen: they entrusted
  alternatives:
  - they placed in trust
  - they committed
  lexicon: BDAG
  rationale: παρατίθημι in this context means to entrust something to someone's care. 'Entrusted' best captures delegated responsibility.
- source_word: περισσότερον αἰτήσουσιν αὐτόν
  chosen: they will ask even more of him
  alternatives:
  - they will demand more from him
  - they will require still more of him
  lexicon: BDAG
  rationale: αἰτέω can mean ask or demand depending on context. Here delegated stewardship implies expectation rather than mere request. 'Ask even more of him' preserves the verbal distinction from ζητηθήσεται while still conveying heightened accountability; 'even more' renders περισσότερον.
