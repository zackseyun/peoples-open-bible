revisions:
- from: 'Habla a toda la congregación de Israel[a], y di: “El día diez de este mes cada hombre tomará para sí un cordero, según la casa de sus padres; un cordero para la casa.”'
  to: 'Hablen a toda la congregación de Israel,[a] diciendo: «El día diez de este mes cada hombre tomará para sí un cordero, según la casa de sus padres; un cordero para la familia».'
  rationale: Se corrige el imperativo inicial a plural para ajustarlo al hebreo דַּבְּרוּ; se cambia la introducción de la cita a ‘diciendo’ para acompañar naturalmente ese plural; y se reemplaza ‘para la casa’ por ‘para la familia’ porque el contexto y la decisión léxica auditada apuntan a la unidad doméstica, no al edificio. Se conserva ‘congregación’ y la nota sobre שֶׂה.
