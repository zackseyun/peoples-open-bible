    text: O 'hacen pesados sus corazones' / 'hicieron pesados sus corazones'. El hebreo usa el modismo de 'hacer pesado' aplicado al corazón para expresar endurecimiento.
    reason: lexical_alternative
  - marker: b
    text: El 'ellos' de 'actuó severamente con ellos' se refiere a Egipto y Faraón; el 'los' de 'los dejaron ir' se refiere a Israel.
    reason: cross_reference
  revision_rationale: Se revisa el plural de 'corazones' para reflejar mejor el hebreo y la auditoría POB; se sustituye 'los despidieron' por 'los dejaron ir' para representar mejor שלח en el contexto del éxodo; se añade la nota b para preservar la aclaración referencial del POB inglés; y se simplifica 'el Faraón' a 'Faraón', más natural en español bíblico.
