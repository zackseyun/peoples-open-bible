translation:
  language: es
  text: Porque su alma era agradable a Yahvé; por eso lo sacó apresuradamente de en medio de la maldad[a]. Pero la gente, viendo y no entendiendo, ni considerando tal cosa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de en medio del mal». El griego πονηρία puede traducirse como «maldad» o «mal», y la frase conserva la idea de sacar a alguien de una esfera de corrupción moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρεστὴ
  english_pob_choice: pleasing
  chosen_spanish: agradable
  alternatives_spanish:
  - placentera
  - grata
  lexicon: LSJ
  rationale: ἀρεστός/ἀρεστή expresa lo que agrada o es aceptable. «Agradable» mantiene el sentido relacional sin sonar artificial en español bíblico moderno.
- source_word: Κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: En este proyecto, el nombre divino se vierte como «Yahvé». Aunque el griego dice Κυρίῳ, el contexto corresponde al nombre divino, no a un mero título humano.
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  lexicon: LSJ
  rationale: En Sabiduría, ψυχή puede abarcar la vida interior o la persona. «Alma» conserva la carga antropológica y teológica que el inglés POB preserva con «soul».
- source_word: ἔσπευσεν
  english_pob_choice: he hastened him out of
  chosen_spanish: lo apresuró a salir de
  alternatives_spanish:
  - lo sacó rápidamente de
  - lo dio prisa para salir de
  lexicon: LSJ
  rationale: El verbo subraya prisa/urgencia. «Lo apresuró a salir de» conserva la acción divina implícita y el matiz de rapidez sin volverlo demasiado explicativo.
- source_word: ἐκ μέσου πονηρίας
  english_pob_choice: out of the midst of wickedness
  chosen_spanish: de en medio de la maldad
  alternatives_spanish:
  - de en medio del mal
  - de entre la maldad
  lexicon: LSJ
  rationale: La imagen espacial de ser sacado desde dentro de una esfera moral se conserva con «de en medio de la maldad». «Maldad» traduce πονηρία de forma natural y con fuerza moral.
- source_word: λαοὶ
  english_pob_choice: the people
  chosen_spanish: la gente
  alternatives_spanish:
  - el pueblo
  - las gentes
  lexicon: LSJ
  rationale: Aunque el griego es plural, el contexto en español fluye mejor con un sustantivo colectivo. «La gente» evita forzar un plural poco natural y refleja observadores humanos en conjunto.
- source_word: ἰδόντες καὶ μὴ νοήσαντες
  english_pob_choice: seeing and not understanding
  chosen_spanish: viendo y no entendiendo
  alternatives_spanish:
  - al ver y no comprender
  - viendo, pero sin entender
  lexicon: LSJ
  rationale: La construcción participial se conserva de modo sobrio. «Entendiendo» reproduce bien νοήσαντες sin añadir una interpretación excesiva.
- source_word: μηδὲ θέντες ἐπὶ διανοίᾳ
  english_pob_choice: nor taking ... to heart
  chosen_spanish: ni poniendo tal cosa en su pensamiento
  alternatives_spanish:
  - ni tomándolo a pecho
  - ni considerándolo
  lexicon: LSJ
  rationale: El giro literal «poner sobre la mente» se refleja con «poniendo tal cosa en su pensamiento», evitando «tomar a pecho», que podría sugerir una emoción no explícita. Se preserva la fuerza de no reflexionar seriamente.
- source_word: τὸ τοιοῦτο
  english_pob_choice: such a thing
  chosen_spanish: tal cosa
  alternatives_spanish:
  - una cosa así
  - algo de este tipo
  lexicon: LSJ
  rationale: «Tal cosa» es una equivalencia natural para τὸ τοιοῦτο y encaja bien con el final suspendido de la frase.
theological_decisions:
- issue: Sujeto implícito de ἔσπευσεν
  english_pob_reading: 'God/the Lord is the implied subject: ''he hastened him out of the midst of wickedness.'''
  chosen_spanish_reading: 'Yahvé es el sujeto implícito: «lo apresuró a salir de en medio de la maldad».'
  alternative_spanish_readings:
  - se apresuró a sacarlo de en medio de la maldad
  - fue removido rápidamente de en medio de la maldad
  rationale: El verso anterior nombra a Yahvé/Κυρίῳ; por eso el sujeto implícito se entiende como acción divina. La formulación española mantiene esa atribución sin convertirla en paráfrasis.
  doctrine_reference: Transparencia textual y lectura contextual del sujeto implícito en sabiduría bíblica.
- issue: Valor de πονηρία
  english_pob_reading: wickedness/evil are both possible renderings
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - mal
  - maldad o mal
  rationale: En español, «maldad» comunica mejor la esfera moral corrupta que el contexto describe. «Mal» sería posible, pero menos preciso aquí y más abstracto.
  doctrine_reference: Lexical choice based on semantic range in context, not doctrinal smoothing.
translation_notes:
  revision_awareness: La redacción sigue la lectura del texto griego adjudicado de Sabiduría 4:14 y el ajuste del inglés POB que mantiene el sujeto implícito como acción divina. También toma en cuenta la revisión inglesa que prefirió «the people» sobre «the peoples»; en español, por naturalidad, se usa «la gente» como colectivo sin perder el valor de observadores humanos. No se ha expandido el final fragmentario del versículo más allá del texto fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para Κυρίῳ conforme a la norma del proyecto.
  - Se conserva el paralelismo y la tensión del final truncado del versículo.
  - «Maldad» se mantiene como equivalente de πονηρία, con nota de alternativa «mal».
  - El estilo evita formas eclesiásticas arcaizantes donde no añaden fidelidad semántica.
