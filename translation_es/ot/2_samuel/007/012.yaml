base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/007/012.yaml
  text: When your days are fulfilled and you lie down with your fathers[a], I will raise up your offspring after you, who will come from your own body[b], and I will establish his kingdom.
  footnotes:
