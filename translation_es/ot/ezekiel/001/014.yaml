translation:
  language: es
  text: Y los seres vivientes corrían de un lado a otro[a], como el aspecto de un relámpago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «los seres vivientes corrían y volvían, como el aspecto de un relámpago».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחַיּוֹת
  english_pob_choice: And the living creatures
  chosen_spanish: Y los seres vivientes
  alternatives_spanish:
  - Y las criaturas vivientes
  - Y los seres vivos
  lexicon: HALOT
  rationale: חַיּוֹת designa seres vivientes dentro de la visión de Ezequiel. «Seres vivientes» conserva el carácter descriptivo y visionario mejor que un equivalente más técnico o eclesiástico.
- source_word: רָצוֹא וָשׁוֹב
  english_pob_choice: were running back and forth
  chosen_spanish: corrían de un lado a otro
  alternatives_spanish:
  - iban y venían
  - corrían de aquí para allá
  - corrían y volvían
  lexicon: HALOT
  rationale: La construcción hebrea expresa movimiento rápido y repetido. «Corrían de un lado a otro» comunica bien la iteración y el dinamismo sin volverse demasiado literal o torpe en español.
- source_word: כְּמַרְאֵה
  english_pob_choice: like the appearance of
  chosen_spanish: como la apariencia de
  alternatives_spanish:
  - como el aspecto de
  - como la visión de
  lexicon: HALOT
  rationale: «מַרְאֶה» tiene el sentido de apariencia o aspecto visual. Mantener «apariencia» preserva el lenguaje de visión y evita suavizar la imagen profética.
- source_word: הַבָּזָק
  english_pob_choice: lightning
  chosen_spanish: relámpago
  alternatives_spanish:
  - rayo
  - destello de relámpago
  lexicon: HALOT
  rationale: בָּזָק designa el fulgor del relámpago o un relámpago. «Relámpago» es natural en español y mantiene la fuerza visual de la comparación.
theological_decisions:
- issue: Naturaleza de los seres de la visión
  english_pob_reading: living creatures
  chosen_spanish_reading: seres vivientes
  alternative_spanish_readings:
  - criaturas vivientes
  - seres vivos
  rationale: No se introduce una identificación posterior ni una terminología más doctrinal que la del texto. «Seres vivientes» refleja con sobriedad la visión de Ezequiel.
  doctrine_reference: Ezequiel 1:5, 10:20
- issue: Ritmo de la comparación visionaria
  english_pob_reading: like the appearance of lightning
  chosen_spanish_reading: como la apariencia del relámpago
  alternative_spanish_readings:
  - como el aspecto del relámpago
  - como la visión del relámpago
  rationale: Se conserva la comparación visual sin explicar ni intensificar la imagen más allá de lo que el hebreo permite.
  doctrine_reference: Ezequiel 1:14
translation_notes:
  revision_awareness: La traducción inglesa revisó 'were darting back and forth' a 'were running back and forth' para acercarse más al sentido directo del hebreo. La versión española sigue esa revisión con «corrían de un lado a otro», manteniendo el matiz iterativo y la comparación visual formal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se conserva el lenguaje de visión («apariencia») en lugar de una paráfrasis interpretativa.
  - «Relámpago» da una imagen natural y fiel al hebreo, sin desplazar el foco hacia una explicación teológica.
