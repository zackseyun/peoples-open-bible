review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: una esperanza proverbial para el árbol aun si es cortado, con regeneración posterior y continuidad del brote. Sin embargo, las notas al pie a y b quedaron invertidas respecto de las decisiones auditadas en inglés: la alternativa de «renew itself» corresponde a יַחֲלִיף, no a יִכָּרֵת; y para יֹנַקְתּוֹ falta preservar la alternativa documentada («brote tierno / renuevo»). Además, «no dejará de surgir» es entendible, pero se aleja un poco del más directo לֹא תֶחְדָּל y del inglés auditado «will not cease».'
  spanish_quality_summary: El español es claro y digno. «Porque hay esperanza para un árbol» y «volverá a brotar» son naturales. «Su renuevo» funciona bien, aunque «brote» también sería posible. La frase final suena mejor y más fiel como «su renuevo no cesará» o «no dejará de brotar»; «no dejará de surgir» añade un matiz menos botánico.
  glossary_alignment: No hay términos del glosario mayor en conflicto. Las decisiones léxicas principales son apropiadas para Job 14:7. La corrección necesaria es de alineación con la auditoría léxica y de precisión poética en la cláusula final.
  issues:
  - severity: high
    issue: La nota [a] está asignada al segmento equivocado.
    rationale: El inglés POB pone la alternativa «it will renew itself» en יַחֲלִיף («volverá a brotar»), no en «si es cortado». La nota española actual sobre «será derribado» no corresponde a la evidencia auditada.
  - severity: high
    issue: Falta una nota para la alternativa de וְיֹנַקְתּוֹ.
    rationale: La auditoría inglesa conserva alternativas para «its shoot» («its tender shoot» / «its sprout»). El español debe preservar esa variación léxica con una nota en «su renuevo» o equivalente.
  - severity: medium
    issue: «No dejará de surgir» es menos exacto que el hebreo y el POB auditado.
    rationale: לֹא תֶחְדָּל significa «no cesará / no dejará de», referido al renuevo. «Surgir» introduce una reformulación interpretativa; «no cesará» conserva mejor la fuerza poética y la sencillez formal.
  revised_spanish_text: 'Porque hay esperanza para un árbol: si es cortado, volverá a brotar[a], y su renuevo[b] no cesará.'
  revised_footnotes:
  - marker: a
    text: O «volverá a renovarse». El verbo hebreo puede expresar renovación; en este contexto arbóreo, se traduce concretamente como nuevo brote.
    reason: lexical_alternative
  - marker: b
    text: O «su brote tierno» o «su brote».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la ubicación y el contenido de las notas para que coincidan con la evidencia auditada: la alternativa de renovación pertenece a «volverá a brotar», y se añade la alternativa léxica para «su renuevo». También se ajusta la cláusula final a «no cesará» para reflejar con más fidelidad לֹא תֶחְדָּל y mantener un español más sobrio y poético.'
