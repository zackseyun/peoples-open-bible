revisions:
- from: Y el sacerdote lo examinará, y he aquí, si la erupción escamosa se ha extendido sobre la piel, el sacerdote lo declarará impuro; es lepra[a].
  to: Y el sacerdote lo examinará; y si ve que la erupción escamosa se ha extendido en la piel, el sacerdote lo declarará impuro; es lepra[a].
  rationale: Se suavizó una literalidad poco natural ('y he aquí, si') para un español más claro y fiel al uso procedimental del hebreo en contexto diagnóstico. Se mantuvo 'lepra' por conformidad con la decisión final del expediente inglés y se conservó la nota aclaratoria para evitar un anacronismo médico. También se ajustó 'sobre la piel' a 'en la piel' por mejor idiomaticidad.
  reviewer_model: gpt-5.4
