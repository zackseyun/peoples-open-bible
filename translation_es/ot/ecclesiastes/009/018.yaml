translation:
  language: es
  text: La sabiduría es mejor que las armas de guerra, pero[a] un solo pecador destruye mucho bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “y un solo pecador destruye mucho bien”. La conjunción hebrea puede leerse simplemente como “y”, pero el sentido en contexto es contrastivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹבָה
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - buena
  - más buena
  lexicon: HALOT
  rationale: El hebreo funciona comparativamente con מִן; en español, 'mejor' expresa de manera natural esa comparación. 'Buena' no recoge la relación comparativa del verso.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - prudencia
  lexicon: HALOT
  rationale: '''Sabiduría'' es la correspondencia normal y mantiene el tema recurrente de Qohelet. ''Prudencia'' estrecha demasiado el alcance.'
- source_word: מִכְלֵי קְרָב
  english_pob_choice: than weapons of war
  chosen_spanish: que las armas de guerra
  alternatives_spanish:
  - que los instrumentos de guerra
  - que las armas para la batalla
  lexicon: HALOT
  rationale: כְּלֵי designa utensilios/implementos, pero en este contexto militar la expresión natural en español es 'armas de guerra'. Conserva el contraste proverbial sin sonar forzado.
- source_word: וְחוֹטֶא
  english_pob_choice: but one sinner
  chosen_spanish: pero un solo pecador
  alternatives_spanish:
  - y un solo pecador
  - pero un pecador
  lexicon: HALOT
  rationale: El hebreo lleva וְ formalmente 'y', pero el sentido discursivo es adversativo según el contexto; por eso 'pero'. 'Pecador' refleja el participio sustantivado חוֹטֶא.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un solo
  alternatives_spanish:
  - uno
  - un
  lexicon: HALOT
  rationale: '''Un solo'' preserva el énfasis en que una persona basta para causar el daño descrito.'
- source_word: יְאַבֵּד
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - hace perecer
  lexicon: HALOT
  rationale: El piel de אבד tiene fuerza causativa/destructiva; 'destruye' es fuerte, claro y adecuado para el proverbio.
- source_word: טוֹבָה הַרְבֵּה
  english_pob_choice: much good
  chosen_spanish: mucho bien
  alternatives_spanish:
  - mucho bueno
  - gran bien
  lexicon: HALOT
  rationale: '''Bien'' expresa con naturalidad el beneficio o provecho acumulado que el hebreo comunica. ''Mucho bien'' es idiomático y amplia el alcance moral y práctico.'
theological_decisions:
- issue: Relación adversativa de וְ al inicio de la segunda cola
  english_pob_reading: but one sinner destroys much good
  chosen_spanish_reading: pero un solo pecador destruye mucho bien
  alternative_spanish_readings:
  - y un solo pecador destruye mucho bien
  - aunque un solo pecador destruye mucho bien
  rationale: La estructura hebrea permite una lectura coordinante con 'y', pero el paralelismo y la lógica del proverbio exigen contraste. 'Pero' transmite mejor la tensión retórica sin borrar la posibilidad formal del 'y' hebreo.
  doctrine_reference: observación discursiva/proverbial, no doctrinal
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios, con acuerdo alto entre revisores. La versión española sigue esa lectura estable y conserva la alternativa de la conjunción hebrea en nota, igual que el audit trail inglés.
  spanish_consistency_notes:
  - Se prefirió 'sabiduría' para חָכְמָה, manteniendo la terminología estándar del libro.
  - '''Pecador'' se eligió por el valor sustantivado del participio חוֹטֶא.'
  - '''Bien'' se usa en sentido amplio de beneficio/provecho, no solo de bondad moral.'
  - 'Se mantiene el orden proverbial natural en español: comparación, contraste y resultado.'
