id: GEN.21.17
reference: Genesis 21:17
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע אֱלֹהִים֮ אֶת ק֣וֹל הַ/נַּעַר֒ וַ/יִּקְרָא֩ מַלְאַ֨ךְ אֱלֹהִ֤ים אֶל הָגָר֙ מִן הַ/שָּׁמַ֔יִם וַ/יֹּ֥אמֶר לָ֖/הּ מַה לָּ֣/ךְ הָגָ֑ר אַל תִּ֣ירְאִ֔י כִּֽי שָׁמַ֧ע אֱלֹהִ֛ים אֶל ק֥וֹל הַ/נַּ֖עַר בַּ/אֲשֶׁ֥ר הוּא שָֽׁם־׀־־־־־־־׃
translation:
  text: And God heard the boy’s voice[a], and the angel of God called to Hagar from heaven and said to her, “What is the matter with you, Hagar? Do not fear, for God has heard the boy’s voice where he is.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the boy’s cry' for 'the boy’s voice' in both occurrences; Hebrew qol can denote the audible cry of distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע אֱלֹהִים
  chosen: And God heard
  alternatives:
  - And God listened
  - Then God heard
  lexicon: HALOT
  rationale: שׁמע in the qal commonly means 'hear.' 'Heard' preserves the narrative sequence and the theological sense that God responds to the cry without overinterpreting it as 'answered.'
- source_word: אֶת קוֹל הַנַּעַר
  chosen: the boy’s voice
  alternatives:
  - the voice of the boy
  - the boy’s cry
  lexicon: HALOT
  rationale: קוֹל is literally 'voice/sound.' In context it refers to the audible distress of Ishmael, but 'voice' keeps the lexical link with the repeated phrase later in the verse. 'Cry' is possible contextually but slightly more interpretive.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the lad
  - the youth
  lexicon: HALOT
  rationale: נַעַר here refers to Ishmael as a young male. 'Boy' is natural modern English and fits the context better than the archaic 'lad' or the less precise 'youth.'
- source_word: וַיִּקְרָא מַלְאַךְ אֱלֹהִים
  chosen: and the angel of God called
  alternatives:
  - and an angel of God called
  - and God’s angel called
  lexicon: HALOT
  rationale: מַלְאַךְ אֱלֹהִים is most straightforwardly 'the angel of God' in this narrative context. The construct phrase is preserved rather than paraphrased. 'The' fits the specificity of the messenger in the story.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - out of heaven
  lexicon: HALOT
  rationale: Though morphologically plural, שׁמים is commonly rendered idiomatically as singular 'heaven' in English in locative expressions. This is standard and readable.
- source_word: מַה לָּךְ
  chosen: What troubles you
  alternatives:
  - What is the matter with you
  - What is wrong with you
  lexicon: HALOT
  rationale: The idiom מַה לָּךְ asks what is wrong or what troubles someone. 'What troubles you' is natural, compassionate in tone, and avoids the potentially harsh English nuance of 'What is wrong with you.'
- source_word: אַל תִּירְאִי
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Both are valid. 'Do not fear' is slightly more formal and concise, matching the directness of the Hebrew imperative while remaining natural English.
- source_word: כִּי שָׁמַע אֱלֹהִים
  chosen: for God has heard
  alternatives:
  - because God has heard
  - for God heard
  lexicon: HALOT
  rationale: 'The perfect can be rendered as present-resultative in English: God has heard. ''For'' fits the reassurance introduced by כִּי.'
- source_word: אֶל קוֹל הַנַּעַר
  chosen: the boy’s voice
  alternatives:
  - the voice of the boy
  - the boy’s cry
  lexicon: HALOT
  rationale: Repeated with the same English wording for consistency, preserving the lexical repetition of קוֹל and הַנַּעַר within the verse.
- source_word: בַּאֲשֶׁר הוּא שָׁם
  chosen: where he is
  alternatives:
  - in the place where he is
  - where he is there
  lexicon: HALOT
  rationale: This phrase is locative and idiomatic. 'Where he is' is the most natural English equivalent and preserves the sense that God has heard him in his present condition/location without unnecessary literal awkwardness.
