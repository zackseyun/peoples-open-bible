translation:
  language: es
  text: 'Yahvé fijó un tiempo[a], diciendo: «Mañana Yahvé hará esta cosa en el país».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un tiempo señalado» o «un tiempo fijado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: set
  chosen_spanish: fijó
  alternatives_spanish:
  - estableció
  - señaló
  lexicon: HALOT
  rationale: El hebreo שׂוּם aquí expresa la acción de establecer o fijar una ocasión. En español, «fijó» comunica bien esa idea con naturalidad y conserva el sentido de una determinación precisa de tiempo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrámaton, conforme a la terminología POB para יְהוָה. «Yahvé» conserva la referencia personal al nombre revelado y evita la sustitución por un título.
- source_word: מוֹעֵד
  english_pob_choice: a time
  chosen_spanish: un tiempo
  alternatives_spanish:
  - un tiempo señalado
  - un momento fijado
  - una ocasión
  lexicon: HALOT
  rationale: מוֹעֵד puede significar tiempo señalado, cita u ocasión fijada. Dado el verbo «fijó», «un tiempo» mantiene la sencillez del hebreo y permite que el contexto de «Mañana» precise el matiz de plazo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Es la forma narrativa estándar que introduce el discurso directo. «Diciendo» es fiel y fluido en español.
- source_word: מָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Al día siguiente
  lexicon: HALOT
  rationale: El adverbio temporal se traduce de manera directa. «Mañana» preserva la inmediatez del anuncio y encaja naturalmente dentro de la cita.
- source_word: יַעֲשֶׂה
  english_pob_choice: will do
  chosen_spanish: hará
  alternatives_spanish:
  - llevará a cabo
  - cumplirá
  lexicon: HALOT
  rationale: עָשָׂה es amplio, pero aquí la construcción sencilla del hebreo se reproduce mejor con «hará», sin añadir una interpretación más específica que el texto no exige.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este hecho
  lexicon: HALOT
  rationale: דָּבָר puede abarcar cosa, asunto o palabra. «Esta cosa» sigue de cerca la formulación hebrea y conserva la referencia concreta al acto anunciado, aunque suene menos abstracto que «asunto».
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra, país o territorio. «En la tierra» reproduce la amplitud del hebreo y evita añadir «de Egipto», que el contexto ya hace evidente.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La política POB para el Tetragrámaton es preservar el nombre divino en la forma transliterada. En español, «Yahvé» es la forma de uso más estable y reverente dentro de esa convención, y mantiene visible el nombre propio en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: No se detectaron cambios posteriores en el pasaje respecto del texto fuente y del audit trail inglés; se conservó la lectura de alta concordancia. La única decisión relevante fue la adaptación natural al español de la secuencia «set a time» como «fijó un tiempo».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - «Tierra» se conservó sin especificar «Egipto» porque el contexto inmediato lo hace implícito.
  - «Esta cosa» reproduce la concisión de הַדָּבָר הַזֶּה sin interpretarlo como «asunto» o «hecho».
