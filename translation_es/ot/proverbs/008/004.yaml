translation:
  language: es
  text: A ustedes[a], oh hombres, llamo, y mi voz es para los hijos del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los seres humanos» / «la humanidad». El hebreo dice «los hijos del hombre», una expresión común para referirse a los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲלֵיכֶם
  english_pob_choice: To you
  chosen_spanish: A ustedes
  alternatives_spanish:
  - A vosotros
  - Para ustedes
  lexicon: HALOT
  rationale: El sufijo de 2.ª persona plural marca un llamado directo a los oyentes. En español, «A ustedes» comunica bien ese vocativo sin calco extraño y mantiene el tono de dirección inmediata.
- source_word: אִישִׁים
  english_pob_choice: O men
  chosen_spanish: oh varones
  alternatives_spanish:
  - oh hombres
  - varones
  lexicon: HALOT
  rationale: אִישִׁים es un plural masculino explícito. «Varones» conserva el rasgo de género con dignidad literaria; «oh» expresa el vocativo. Se evita neutralizarlo como «personas» para no borrar el paralelismo masculino del hebreo.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: llamo
  alternatives_spanish:
  - clamo
  - proclamo
  lexicon: HALOT
  rationale: El qal imperfecto 1cs de קרא aquí indica una acción de llamar o dirigirse a alguien. «Llamo» es natural en español y conserva el acto de convocatoria sin añadir intensidad no exigida por el texto.
- source_word: וְקוֹלִי
  english_pob_choice: and my voice
  chosen_spanish: y mi voz
  alternatives_spanish:
  - y mi sonido
  - y alzo mi voz
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «voz» para preservar el paralelismo poético con «llamo». No se convierte en una paráfrasis verbal, porque el hebreo conserva el sustantivo con sufijo posesivo.
- source_word: אֶל
  english_pob_choice: is to / to
  chosen_spanish: para
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Después de «mi voz», «para» resulta más idiomático en español que una traducción rígida de la preposición. Conserva la dirección del enunciado sin forzar una copula explícita.
- source_word: בְּנֵי אָדָם
  english_pob_choice: the sons of mankind
  chosen_spanish: los hijos de la humanidad
  alternatives_spanish:
  - los hijos del hombre
  - la humanidad
  - los seres humanos
  lexicon: HALOT
  rationale: La expresión hebrea es un giro común para los seres humanos. En español, «los hijos de la humanidad» refleja mejor el valor colectivo que «los hijos del hombre», y evita sonar excesivamente literal sin perder la imagen genealógica.
- source_word: אָדָם
  english_pob_choice: man / mankind
  chosen_spanish: la humanidad
  alternatives_spanish:
  - el hombre
  - mankind
  lexicon: HALOT
  rationale: Dentro de בְּנֵי אָדָם, אָדָם funciona de forma colectiva. «Humanidad» comunica el alcance genérico del hebreo en un español claro, mientras el masculino explícito del primer hemistiquio ya queda preservado en «varones».
theological_decisions:
- issue: Paralelismo de lenguaje masculino y posible neutralización inclusiva
  english_pob_reading: 'Retain masculine forms in the main text: ''O men'' and ''the sons of mankind.'''
  chosen_spanish_reading: 'Conservar un masculino explícito en el primer hemistiquio y una expresión colectiva en el segundo: «oh varones» ... «los hijos de la humanidad».'
  alternative_spanish_readings:
  - oh hombres ... los hijos del hombre
  - oh personas ... los seres humanos
  rationale: El hebreo usa dos expresiones masculinas distintas en paralelismo poético. La primera se mantiene con fuerza de género; la segunda se vuelve colectiva porque en español eso expresa mejor el alcance general sin perder la imagen original. Así se evita a la vez la neutralización total y la literalidad áspera.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; contested terms on אָדָם'
translation_notes:
  revision_awareness: 'El inglés auditado pasó de «sons of man» a «sons of mankind» por naturalidad, manteniendo el paralelismo con «men». La presente redacción sigue esa misma intención: conservar el llamado directo y el contraste poético, pero con un español más natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural directo «A ustedes» para reflejar el vocativo.
  - «Varones» preserva el matiz masculino explícito de אִישִׁים sin volver el texto arcaico.
  - «Los hijos de la humanidad» intenta equilibrar fidelidad y naturalidad frente al hebreo בְּנֵי אָדָם.
  - No se introduce «SEÑOR» ni terminología teológica ajena al versículo.
