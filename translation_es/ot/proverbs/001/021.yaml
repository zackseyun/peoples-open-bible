  text: בְּ/רֹ֥אשׁ הֹמִיּ֗וֹת תִּ֫קְרָ֥א בְּ/פִתְחֵ֖י שְׁעָרִ֥ים בָּ/עִ֗יר אֲמָרֶ֥י/הָ תֹאמֵֽר׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/001/021.yaml
  text: 'At the head of the noisy streets she cries out[c][b][a]; at the entrances of the gates in the city she speaks her words:'
  footnotes:
  - marker: a
    text: Or 'At the top of the tumultuous places she calls out.' The Hebrew expression may emphasize either the most prominent location or an elevated/foremost point within the public commotion.
    reason: lexical_alternative
  - marker: b
    text: City gates were the main public gathering places, where commerce, legal matters, and civic life were conducted.
    reason: cultural_note
  - marker: c
    text: Or 'she says her sayings.' The Hebrew is literally 'she says her words,' an idiom for public speech.
    reason: lexical_alternative
