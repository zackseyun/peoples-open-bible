    rationale: El texto principal ya usa «sumo sacerdote», y la nota solo justifica esa equivalencia. Según la disciplina de notas, deben preservarse alternativas significativas o aclaraciones necesarias, no repetir la decisión principal sin necesidad.
  - severity: medium
