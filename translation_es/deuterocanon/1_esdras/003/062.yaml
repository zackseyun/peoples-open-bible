translation:
  language: es
  text: Y la verdad permanece[a] y es fuerte para siempre, y vive y prevalece por los siglos de los siglos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdura» para «permanece».
    reason: lexical_alternative
  - marker: b
    text: La frase griega es literalmente «hasta el siglo del siglo», un giro intensificado que significa «por los siglos de los siglos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - la verdad
  - verdad
  lexicon: BDAG
  rationale: «Verdad» conserva el sustantivo abstracto/personificado del griego y suena natural en español. Mantiene el carácter casi himnico de la frase sin convertirla en una explicación abstracta.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - permanece
  - abide
  lexicon: BDAG
  rationale: «Permanece» comunica continuidad estable y es un equivalente natural de μένει. «Abide» no es idiomático en español y «subsiste» sería más técnico de lo necesario.
- source_word: ἰσχύει
  english_pob_choice: is strong
  chosen_spanish: es fuerte
  alternatives_spanish:
  - tiene fuerza
  - prevalece
  lexicon: BDAG
  rationale: 'Se conserva la distinción con κρατεῖ: ἰσχύει expresa fuerza/capacidad, por eso «es fuerte» funciona mejor que «prevalece», que ya anticiparía el segundo verbo.'
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: BDAG
  rationale: «Para siempre» es la forma natural y fiel en español para este giro temporal idiomático, sin perder la duración ilimitada.
- source_word: ζῇ
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está viva
  - tiene vida
  lexicon: BDAG
  rationale: «Vive» preserva la personificación de la verdad y corresponde directamente al verbo griego.
- source_word: κρατεῖ
  english_pob_choice: prevails
  chosen_spanish: prevalece
  alternatives_spanish:
  - domina
  - vence
  lexicon: BDAG
  rationale: «Prevalece» refleja mejor la idea de eficacia victoriosa o dominio efectivo y evita repetir la noción de fuerza ya expresada por ἰσχύει.
- source_word: εἰς τὸν αἰῶνα τοῦ αἰῶνος
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y para siempre
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre jamás
  lexicon: BDAG
  rationale: Se opta por una equivalencia muy transparente del superlativo griego. «Por los siglos de los siglos» es tradicional, pero aquí «para siempre y para siempre» mantiene la intensificación sin introducir un registro litúrgico fijo no exigido por el griego.
theological_decisions:
- issue: Personificación de la verdad
  english_pob_reading: Retain personified predicates ('remains,' 'is strong,' 'lives,' 'prevails') without converting the line into a mere abstract statement.
  chosen_spanish_reading: Mantener los predicados personales sobre «la verdad» (“permanece”, “es fuerte”, “vive”, “prevalece”) sin reducir la línea a una simple afirmación conceptual.
  alternative_spanish_readings:
  - La verdad perdura y es poderosa
  - La verdad es permanente y triunfa
  rationale: El griego encadena verbos finitos sobre ἡ ἀλήθεια con tono retórico e himnico. La traducción española conserva esa personificación, que es parte del efecto del texto, sin añadir interpretaciones doctrinales ajenas.
  doctrine_reference: Conservar la tensión literaria y teológica del original; no neutralizar la personificación.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado muestran alta concordancia con la versión inglesa de referencia; no se detectaron revisiones textuales relevantes ni cambios sustantivos en la línea. La versión española sigue esa misma lectura, preservando la personificación y la intensificación temporal del cierre.
  spanish_consistency_notes:
  - Se mantiene «verdad» como abstracción personificada, sin articularla como sujeto doctrinal distinto.
  - «Para siempre y para siempre» se usa para reflejar el énfasis del griego αἰῶνα τοῦ αἰῶνος, evitando una simplificación que pierda la intensificación.
  - Se conserva la distinción entre «es fuerte» e «prevalece» para no fusionar los dos verbos griegos en una sola idea.
