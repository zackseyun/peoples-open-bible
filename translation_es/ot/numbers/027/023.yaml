revisions:
- from: Él le impuso[a] las manos y le dio encargo[b], tal como Yahvé había hablado por medio de Moisés.
  to: Él le impuso las manos y le encargó[a], tal como Yahvé había hablado por medio de Moisés[b].
  rationale: Se conserva «impuso las manos» por fidelidad idiomática al gesto ritual de סמך. Se cambia «le dio encargo» por «le encargó» para recuperar una forma verbal más natural y más cercana a צוה, manteniendo el matiz contextual de encargo formal sin alejarse del audit trail. Se añade la nota al modismo «por medio de Moisés» y se reubica la nota léxica principal al verbo correcto. No se requiere adjudicación adicional porque el ajuste es pequeño y está bien respaldado por la evidencia y la revisión inglesa.
