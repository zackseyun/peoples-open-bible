lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Mantiene el valor causal del hebreo y suena natural en español al introducir la razón de la acción divina.
- source_word: יָבִינוּ
  english_pob_choice: they do not understand
  chosen_spanish: no entienden
  alternatives_spanish:
  - no comprenden
  - no disciernen
  lexicon: HALOT
  rationale: בין expresa entendimiento/discernimiento; 'entienden' conserva ese sentido con claridad moderna sin perder fuerza cognitiva.
- source_word: אֶל פְּעֻלֹּת
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las acciones
  lexicon: HALOT
  rationale: '''Obras'' es el equivalente más natural para פְּעֻלֹּת y conserva el paralelo con ''la obra'' en la segunda cola.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino; se mantiene 'Yahvé' según la terminología base del proyecto, en vez de sustituirlo por un título.
- source_word: מַעֲשֵׂה יָדָיו
  english_pob_choice: the work of his hands
  chosen_spanish: la obra de sus manos
  alternatives_spanish:
  - el trabajo de sus manos
  - lo que sus manos han hecho
  lexicon: HALOT
  rationale: '''Obra'' conserva el singular del hebreo y el paralelismo con ''obras''; ''sus manos'' refleja el sufijo posesivo del texto fuente.'
- source_word: יֶהֶרְסֵם
  english_pob_choice: he will tear them down
  chosen_spanish: él los derribará
  alternatives_spanish:
  - los destruirá
  - los demolerá
  lexicon: HALOT
  rationale: הרס suele describir demolición/derribo; 'derribará' preserva la imagen estructural y prepara la antítesis con 'edificará'.
- source_word: וְלֹא יִבְנֵם
  english_pob_choice: and not build them up
  chosen_spanish: y no los edificará
  alternatives_spanish:
  - y no los volverá a edificar
  - y no los construirá
  lexicon: HALOT
  rationale: '''Edificar'' conserva la correspondencia verbal con el derribo y es un registro bíblico claro en español; el hebreo no exige explícitamente ''volver a''.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrama como nombre propio, evitando la sustitución por un título y manteniendo la referencia personal al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; se ha mantenido la lectura base del auditable inglés, ajustándola solo a la terminología española del proyecto (Yahvé) y a la sintaxis natural del español.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre el plural 'las obras' y el singular 'la obra'.
  - Se evitó 'Señor' o 'SEÑOR' para no ocultar el Nombre divino, conforme a la política del proyecto.
  - '''Derribará'' y ''edificará'' mantienen la imaginería de demolición/construcción del hebreo.'
  - La nota al pie recoge la alternativa semántica documentada en el audit trail inglés ('regard the works').
