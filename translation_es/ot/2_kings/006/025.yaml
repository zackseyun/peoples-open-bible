translation:
  language: es
  text: Y hubo una gran hambre en Samaria; y he aquí, la sitiaban hasta que la cabeza de un asno valía ochenta piezas de plata, y la cuarta parte de un cab[b] de estiércol de paloma[a] valía cinco piezas de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estiércol de paloma»; algunos intérpretes entienden la expresión literalmente como excremento, mientras que otros la toman como el nombre de un alimento barato o de un producto vegetal vendido durante la hambruna.
    reason: lexical_alternative
  - marker: b
    text: Se conserva «cab» como medida antigua de grano; el hebreo nombra una unidad de capacidad seca que no tiene un equivalente moderno seguro en este contexto.
    reason: cultural_note
lexical_decisions:
- source_word: רָעָב גָּדוֹל
  english_pob_choice: a great famine
  chosen_spanish: una gran hambre
  alternatives_spanish:
  - una gran hambruna
  - una severa hambruna
  lexicon: HALOT
  rationale: En español bíblico, "hambre" comunica de manera natural el fenómeno de escasez extrema; "gran" conserva la intensidad de גָּדוֹל sin añadir una interpretación más amplia que el hebreo no exige.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en la región de Samaria
  lexicon: HALOT
  rationale: El valor locativo del hebreo se expresa de forma directa y natural con "en Samaria".
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: '"Y he aquí" preserva el marcador discursivo de sorpresa/enfasis sin diluirlo en una simple coordinación narrativa.'
- source_word: צָרִים עָלֶיהָ
  english_pob_choice: they were besieging it
  chosen_spanish: la sitiaban
  alternatives_spanish:
  - la estaban sitiando
  - la tenían sitiada
  lexicon: HALOT
  rationale: El participio durativo expresa una acción continua de sitio; "la sitiaban" es breve y fiel, y mantiene el objeto pronominal femenino de la ciudad.
- source_word: רֹאשׁ חֲמוֹר
  english_pob_choice: a donkey’s head
  chosen_spanish: la cabeza de un asno
  alternatives_spanish:
  - la cabeza de un burro
  - la cabeza de un jumento
  lexicon: HALOT
  rationale: '"Asno" conserva un registro bíblico digno y claro; traduce el sustantivo sin suavizar la imagen chocante de alimento en tiempo de hambre.'
- source_word: בִּשְׁמֹנִים כֶּסֶף
  english_pob_choice: eighty pieces of silver
  chosen_spanish: ochenta piezas de plata
  alternatives_spanish:
  - ochenta de plata
  - ochenta siclos de plata
  lexicon: HALOT
  rationale: '"Piezas de plata" sigue de cerca el valor monetario sin introducir una unidad no explicitada en el texto hebreo; evita sobreespecificar con "siclos".'
- source_word: רֹבַע הַקַּב
  english_pob_choice: a fourth of a kab
  chosen_spanish: la cuarta parte de un cab
  alternatives_spanish:
  - un cuarto de un cab
  - la cuarta parte del cab
  lexicon: HALOT
  rationale: Se conserva la unidad antigua "cab" para no reemplazarla por un equivalente moderno incierto; "la cuarta parte" reproduce רֹבַע con claridad.
- source_word: חרי יונים
  english_pob_choice: dove’s dung
  chosen_spanish: estiércol de paloma
  alternatives_spanish:
  - excremento de paloma
  - estiércol de paloma[a]
  lexicon: HALOT
  rationale: La lectura más directa del hebreo nombra un desecho animal, y en español "estiércol de paloma" es la opción más transparente; la nota preserva la alternativa interpretativa debatida en el POB inglés.
- source_word: בַּחֲמִשָּׁה כָסֶף
  english_pob_choice: five pieces of silver
  chosen_spanish: cinco piezas de plata
  alternatives_spanish:
  - cinco de plata
  lexicon: HALOT
  rationale: Se mantiene el mismo patrón monetario que en la primera cifra, sin añadir una denominación de moneda ausente en el hebreo.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la repetición de «was worth» para volver más literal la frase de precios; en español también se omite una repetición equivalente y se deja la cláusula de precio en forma directa, manteniendo el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; en este versículo no aparece.
  - «Mesías/Cristo» no aplica aquí.
  - Se mantiene el registro bíblico formal con verbos simples y construcciones directas.
  - «Asno» y «cab» se conservan por precisión lexical y por evitar sustituciones interpretativas.
