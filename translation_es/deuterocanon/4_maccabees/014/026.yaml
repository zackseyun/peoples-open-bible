  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales están bien encaminadas. La única corrección relevante es estilístico-lexical en φιλοστοργίαν / ἐπιφυτευομένην: conviene usar ''afecto'' y ''plantado en su interior'' en lugar de ''cariño afectuoso'' e ''injertado en sí''.'
