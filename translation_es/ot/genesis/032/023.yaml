translation:
  language: es
  text: Aquella noche se levantó y tomó a sus dos esposas, a sus dos siervas[a], y a sus once hijos, y cruzó el vado del Jaboc.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus dos esclavas'. El hebreo שִׁפְחֹתָיו se refiere a mujeres de estatus subordinado dentro de la casa; aquí 'siervas' se usa como español actual claro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: he arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El verbo קום en este contexto narrativo expresa levantarse/iniciar acción. 'Se levantó' es natural en español y conserva el registro narrativo sin forzar un giro arcaico.
- source_word: בַּלַּיְלָה הוּא
  english_pob_choice: That night
  chosen_spanish: Aquella noche
  alternatives_spanish:
  - esa noche
  - durante la noche
  lexicon: HALOT
  rationale: La expresión temporal marca un momento concreto con el pronombre enfático implícito. 'Aquella noche' reproduce bien la deixis narrativa del hebreo en español natural.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó consigo
  - se llevó
  lexicon: HALOT
  rationale: לקח aquí significa tomar/llevar consigo a los miembros de su casa. 'Tomó' conserva la sencillez del verbo hebreo sin añadir más de lo que el texto exige.
- source_word: שְׁתֵּי נָשָׁיו
  english_pob_choice: his two wives
  chosen_spanish: sus dos esposas
  alternatives_spanish:
  - sus dos mujeres
  lexicon: HALOT
  rationale: נָשִׁים aquí se refiere claramente a las esposas de Jacob. 'Esposas' comunica con precisión y claridad el vínculo conyugal en español.
- source_word: שְׁתֵּי שִׁפְחֹתָיו
  english_pob_choice: his two female servants
  chosen_spanish: sus dos siervas
  alternatives_spanish:
  - sus dos sirvientas
  - sus dos esclavas
  lexicon: HALOT
  rationale: שִׁפְחָה denota una mujer de estatus subordinado en la casa; el inglés POB eligió 'female servants' con una nota que preserva la posibilidad de esclavitud. En español, 'siervas' mantiene la subordinación social sin imponer de entrada una palabra más fuerte que el contexto inmediato no explicita por sí mismo.
- source_word: אַחַד עָשָׂר יְלָדָיו
  english_pob_choice: his eleven children
  chosen_spanish: sus once hijos
  alternatives_spanish:
  - sus once niños
  - sus once descendientes
  lexicon: HALOT
  rationale: יְלָדִים significa hijos/descendencia, pero en este pasaje la referencia concreta de Jacob es a su prole masculina reunida para el viaje. 'Hijos' es el equivalente natural y narrativamente preciso en español, y evita una posible ambigüedad de 'niños'.
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed
  chosen_spanish: cruzó
  alternatives_spanish:
  - pasó
  - atravesó
  lexicon: HALOT
  rationale: עבר en contexto de desplazamiento geográfico se expresa con 'cruzar'. 'Cruzó' es breve, claro y fiel al movimiento de pasar al otro lado.
- source_word: אֵת מַעֲבַר יַבֹּק
  english_pob_choice: the ford of the Jabbok
  chosen_spanish: el vado del Jaboc
  alternatives_spanish:
  - el vado del Yaboc
  - el cruce del Jaboc
  lexicon: HALOT
  rationale: מַעֲבַר designa un lugar de paso, un vado. 'Vado' es el término español más exacto y tradicionalmente comprensible. Se usa 'Jaboc' como transliteración del nombre propio hebreo en una forma española estable.
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente sin cambios sustantivos: alta concordancia entre el texto hebreo, la versión inglesa POB y el expediente de auditoría. No se detectaron problemas textuales ni decisiones teológicas adicionales en este versículo.'
  spanish_consistency_notes:
  - Se mantiene 'Yaboc/Jaboc' como transliteración española del nombre propio hebreo יַבֹּק, evitando la forma inglesa.
  - Se conserva 'siervas' en el texto principal por claridad y dignidad, con nota que preserva la alternativa 'esclavas' dada la fuerza social de שִׁפְחָה.
  - '''Aquella noche'' reproduce la deixis narrativa sin introducir un matiz temporal distinto.'
  - No se añade ningún contenido interpretativo sobre el número de hijos más allá del hebreo y el expediente inglés.
