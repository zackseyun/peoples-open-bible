- from: Así que subí por el wadi[a] de noche e inspeccioné el muro. Luego me di la vuelta y entré por la Puerta del Valle[b], y regresé.
  to: Entonces subí por el wadi[b] de noche e inspeccioné[a] la muralla. Luego volví atrás, entré por la Puerta del Valle, y regresé.
  rationale: Se corrigió la colocación de las notas para reflejar el expediente inglés y la decisión léxica clave de שֹׂבֵר; se sustituyó «muro» por «muralla» para mayor precisión contextual; y se elevó ligeramente el registro narrativo con «Entonces» y «volví atrás».
