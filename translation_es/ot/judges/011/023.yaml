    text: O ‘ha expulsado’ / ‘ha hecho perder la posesión’. El hebreo expresa el desplazamiento de un pueblo respecto de la tierra.
    reason: lexical_alternative
  - marker: b
    text: O ‘la vas a heredar’ / ‘vas a poseerla’. El verbo hebreo puede expresar recibir o tomar posesión de una tierra.
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal para que el español exprese con más naturalidad la pérdida de posesión territorial implicada por הוֹרִישׁ, y se explicita el referente femenino territorial del objeto en la pregunta final para evitar ambigüedad. Se conserva 'Yahvé' y la estructura retórica del original.
