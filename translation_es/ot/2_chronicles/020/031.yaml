translation:
  language: es
  text: Y Josafat reinó sobre Judá. Tenía treinta y cinco años cuando comenzó a reinar, y reinó veinticinco años en Jerusalén. Y el nombre de su madre fue Azubah, hija de Shilhi.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - fue rey
  lexicon: HALOT
  rationale: La forma verbal introduce la fórmula regnal; en español, "reinó" reproduce de manera natural y precisa ese valor, manteniendo la sobriedad del registro histórico.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre el pueblo de
  - en
  lexicon: HALOT
  rationale: Con מלך, עַל marca el ámbito gobernado. "Sobre Judá" conserva la relación de dominio sin añadir elementos que el hebreo no expresa.
- source_word: בֶּן שְׁלֹשִׁים וְחָמֵשׁ שָׁנָה
  english_pob_choice: thirty-five years old
  chosen_spanish: treinta y cinco años
  alternatives_spanish:
  - de treinta y cinco años
  - hijo de treinta y cinco años
  lexicon: HALOT
  rationale: En español, la fórmula de edad se expresa de modo natural con "tenía treinta y cinco años"; no conviene trasladar literalmente la construcción hebrea de "hijo de".
- source_word: בְּמָלְכ֗וֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - al comenzar a reinar
  - cuando llegó a reinar
  lexicon: HALOT
  rationale: El infinitivo con prefijo temporal indica el momento de la entronización. "Cuando comenzó a reinar" conserva la función temporal y suena idiomático en español.
- source_word: וְעֶשְׂרִים וְחָמֵשׁ שָׁנָה מָלַךְ
  english_pob_choice: he reigned twenty-five years
  chosen_spanish: reinó veinticinco años
  alternatives_spanish:
  - fue rey veinticinco años
  - gobernó veinticinco años
  lexicon: HALOT
  rationale: La duración del reinado se expresa de forma directa con "reinó ... años", que corresponde bien al uso cronístico y evita sobrecargar el verbo.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo transliterado al español convencional; la preposición local corresponde literalmente al hebreo.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: And his mother’s name was
  chosen_spanish: Y el nombre de su madre fue
  alternatives_spanish:
  - Y su madre se llamaba
  - Y el nombre de su madre era
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica hebrea de manera transparente, sin perder naturalidad en español.
- source_word: עֲזוּבָה
  english_pob_choice: Azubah
  chosen_spanish: Azubá
  alternatives_spanish:
  - Azuba
  - Azubah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acentuación gráfica para reflejar la pronunciación habitual y facilitar la lectura.
- source_word: בַּת שִׁלְחִי
  english_pob_choice: daughter of Shilhi
  chosen_spanish: hija de Siljí
  alternatives_spanish:
  - hija de Shiljí
  - hija de Siljí
  lexicon: HALOT
  rationale: בת expresa filiación; se mantiene con "hija de". El nombre propio se adapta a transliteración española coherente con el sistema de acentuación del texto.
translation_notes:
  revision_awareness: El inglés auditado muestra alta concordancia y no registra revisiones textuales o de sentido; por tanto, la versión española sigue de cerca la fórmula regnal del hebreo y la solución inglesa aprobada, ajustando solo la sintaxis necesaria para una lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa "reinó" para la fórmula regnal y no "fue rey", siguiendo el registro histórico del pasaje.
  - 'Los nombres propios se transliteran para lectura en español: Jehoshaphat/Jehoshafat como "Jehosafat", Azubah como "Azubá", Shilhi como "Siljí".'
