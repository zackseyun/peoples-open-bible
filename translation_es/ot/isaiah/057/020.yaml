revisions:
- from: Pero los impíos son como el mar agitado[a], porque no puede aquietarse[b], y sus aguas levantan lodo y cieno.
  to: Pero los impíos son como el mar agitado[a], porque no puede aquietarse, y sus aguas arrojan[b] lodo y cieno.
  rationale: Se corrige el anclaje de la nota [b] para que corresponda a la cláusula final, en conformidad con el audit trail inglés. También se reemplaza «levantan» por «arrojan» para reflejar mejor el valor de expulsar/cast up de וַיִּגְרְשׁוּ, sin perder naturalidad en español. El resto del versículo puede mantenerse.
