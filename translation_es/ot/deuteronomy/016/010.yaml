translation:
  language: es
  text: Entonces celebrarás la Fiesta de las Semanas para Yahvé tu Dios con el tributo de una ofrenda voluntaria de tu mano[a], que darás según lo que Yahvé tu Dios te haya bendecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según la proporción de una ofrenda voluntaria de tu mano»; la expresión hebrea enfatiza que el don es voluntario y proporcionado a lo que Dios ha provisto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: Then you shall celebrate
  chosen_spanish: Entonces celebrarás
  alternatives_spanish:
  - Y harás
  - Y observarás
  lexicon: HALOT
  rationale: Con חג en contexto festivo, עשה expresa celebrar/guardar la fiesta, no “hacer” literalmente. “Entonces” conserva el valor secuencial del waw y suena natural en español.
- source_word: חַג שָׁבֻעוֹת
  english_pob_choice: the Feast of Weeks
  chosen_spanish: la Fiesta de las Semanas
  alternatives_spanish:
  - la festividad de las Semanas
  - la Fiesta de las Sietes
  lexicon: HALOT
  rationale: “Fiesta” comunica bien el sentido de חג en un marco litúrgico. “Semanas” mantiene el plural hebreo y la relación con el conteo del tiempo de la festividad.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: para Yahvé tu Dios
  alternatives_spanish:
  - a Yahvé tu Dios
  - para el Señor tu Dios
  lexicon: HALOT
  rationale: La preposición ל señala dirección/dedicación, por lo que “para” expresa bien la orientación cultual de la fiesta. Se mantiene “Yahvé” conforme a la decisión doctrinal del proyecto para יְהוָה.
- source_word: מִסַּת
  english_pob_choice: a tribute of
  chosen_spanish: como tributo
  alternatives_spanish:
  - en la medida de
  - según la proporción de
  lexicon: HALOT
  rationale: El término puede expresar medida/suficiencia/proporción, pero la revisión inglesa decidió “tribute of” para captar mejor el contexto. En español, “como tributo” refleja la ofrenda presentada y evita una formulación demasiado técnica o pesada.
- source_word: נִדְבַת יָדְךָ
  english_pob_choice: a freewill offering from your hand
  chosen_spanish: una ofrenda voluntaria de tu mano
  alternatives_spanish:
  - una ofrenda libre de tu mano
  - tu ofrenda voluntaria
  lexicon: HALOT
  rationale: נִדְבָה denota voluntariedad; “ofrenda voluntaria” conserva ese matiz. “De tu mano” reproduce el hebraísmo que subraya la donación personal y concreta.
- source_word: אֲשֶׁר תִּתֵּן
  english_pob_choice: which you shall give
  chosen_spanish: que darás
  alternatives_spanish:
  - la cual darás
  - que tú darás
  lexicon: HALOT
  rationale: La cláusula relativa es directa y exige un futuro/modal en el marco legal. “Que darás” es natural y fiel.
- source_word: כַּאֲשֶׁר יְבָרֶכְךָ
  english_pob_choice: according to how Yahweh your God blesses you
  chosen_spanish: conforme a cómo Yahvé tu Dios te bendiga
  alternatives_spanish:
  - según cómo Yahvé tu Dios te bendiga
  - en proporción a cómo Yahvé tu Dios te bendiga
  lexicon: HALOT
  rationale: La frase indica proporción basada en la bendición divina. “Conforme a cómo” conserva esa relación proporcional con claridad en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto en español, se traduce por “Yahvé” para preservar el nombre del pacto y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que prefirió “a tribute of” para מִסַּת en vez de “the measure of”. Por eso evité una traducción demasiado abstracta y opté por “como tributo”, manteniendo a la vez el matiz de ofrenda proporcional y voluntaria que el aparato inglés quiso preservar.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” de forma consistente para יְהוָה, conforme a la política doctrinal indicada.
  - “Fiesta de las Semanas” sigue el nombre tradicional de la festividad sin sustituirlo por una paráfrasis.
  - “Ofrenda voluntaria” conserva el valor de נִדְבָה; no se rebajó a simple “donación”.
  - “De tu mano” se dejó explícito por ser un hebraísmo significativo y no redundante.
