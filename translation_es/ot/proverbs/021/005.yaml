translation:
  language: es
  text: Los planes de la persona diligente ciertamente conducen a la abundancia[a], pero todo el que se apresura[b] ciertamente termina en la pobreza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: "conducen al provecho"; לְמוֹתָר puede denotar excedente, ventaja o ganancia.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: "todo el que corre" o "todo el que va de prisa"; אָץ subraya la rapidez impulsiva o precipitada.'
    reason: lexical_alternative
  - marker: c
    text: 'O también: "termina en la carencia"; לְמַחְסוֹר puede referirse de manera amplia a falta, necesidad o empobrecimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְשְׁב֣וֹת
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - proyectos
  - designios
  lexicon: HALOT
  rationale: En Proverbios, el sustantivo suele referirse a diseños intencionales o propósitos concretos, no solo a pensamientos internos. "Planes" es claro, natural y conserva el sentido práctico del texto sapiencial.
- source_word: חָ֭רוּץ
  english_pob_choice: the diligent
  chosen_spanish: el diligente
  alternatives_spanish:
  - el industrioso
  - el trabajador constante
  - el aplicado
  lexicon: HALOT
  rationale: El término describe a una persona marcada por diligencia y constancia. "El diligente" mantiene el valor caracterizador del participio y encaja bien en español contemporáneo.
- source_word: אַךְ
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - solo
  - verdaderamente
  - sin duda
  lexicon: HALOT
  rationale: Aquí la partícula expresa énfasis y certeza, no restricción. "Ciertamente" reproduce bien el valor proverbial de seguridad del resultado.
- source_word: לְמוֹתָר
  english_pob_choice: lead to abundance
  chosen_spanish: conducen a la abundancia
  alternatives_spanish:
  - conducen al provecho
  - llevan al aumento
  - resultan en abundancia
  lexicon: HALOT
  rationale: מוֹתָר puede significar excedente, ventaja, ganancia o abundancia. En el paralelismo con "necesidad", "abundancia" preserva el contraste concreto y natural en español.
- source_word: וְכָל
  english_pob_choice: but everyone who
  chosen_spanish: pero todo el que
  alternatives_spanish:
  - y todo el que
  - pero cada uno que
  - y cualquiera que
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente "y", el paralelismo antitético pide en español una relación adversativa más explícita. "Todo el que" expresa el valor distributivo del hebreo con fluidez.
- source_word: אָץ
  english_pob_choice: is hasty
  chosen_spanish: se apresura
  alternatives_spanish:
  - corre
  - actúa con prisa
  - va de prisa
  lexicon: HALOT
  rationale: El participio describe a quien actúa con prisa o precipitación, más que un acto aislado. "Se apresura" conserva ese rasgo de conducta habitual.
- source_word: לְמַחְסוֹר
  english_pob_choice: comes to want
  chosen_spanish: llega a la necesidad
  alternatives_spanish:
  - llega a la pobreza
  - cae en carencia
  - termina en falta
  lexicon: HALOT
  rationale: מַחְסוֹר puede referirse a falta, necesidad o empobrecimiento. "Necesidad" es amplio y fiel al rango semántico; evita estrechar el sentido solo a pobreza material.
translation_notes:
  revision_awareness: 'Sin cambios respecto al último pase: la lectura sigue el texto hebreo masorético y mantiene el contraste sapiencial entre diligencia y prisa, con las mismas opciones léxicas documentadas en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió "diligente" como equivalente estable para חָרוּץ, en armonía con el criterio del proyecto y el uso del pasaje.
  - Se conserva el paralelismo antitético con "pero" para hacer explícita la oposición implícita del hebreo en español.
