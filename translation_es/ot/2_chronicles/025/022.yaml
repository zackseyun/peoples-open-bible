    rationale: La nota explica el modismo hebreo «cada hombre a su tienda», no el verbo «fue derrotado». Según las reglas del proyecto, el marcador exacto debe aparecer en la frase relevante dentro de `spanish_text`.
  - severity: low
    issue: «Delante de Israel» es algo menos idiomático que «ante Israel» en contexto militar.
    rationale: Aunque «delante de» es aceptable y fiel al hebreo לִפְנֵי, «ante» suena más natural en español bíblico moderno sin pérdida semántica.
  revised_spanish_text: Y Judá fue derrotado ante Israel, y cada hombre huyó a su tienda[a].
