translation:
  language: es
  text: 'Por favor, no te apartes de aquí hasta que vuelva a ti, saque mi ofrenda[a] y la ponga delante de ti». Y él dijo: «Me quedaré hasta que regreses».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi regalo» o «mi tributo»; el término hebreo puede referirse en general a un don presentado y, en algunos contextos, a una ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָמֻשׁ
  english_pob_choice: depart
  chosen_spanish: te apartes
  alternatives_spanish:
  - te vayas
  - te retires
  - te alejes
  lexicon: HALOT
  rationale: El verbo expresa apartarse o irse del lugar; en español, «te apartes» suena natural y conserva la petición de no moverse de allí.
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - de este lugar
  - de acá
  lexicon: HALOT
  rationale: La expresión deíctica señala el lugar presente. «De aquí» es idiomática y precisa en español.
- source_word: עַד בֹּאִי אֵלֶיךָ
  english_pob_choice: until I come to you
  chosen_spanish: hasta que yo vaya a ti
  alternatives_spanish:
  - hasta que venga a ti
  - hasta mi llegada a ti
  lexicon: HALOT
  rationale: El constructo verbal con sufijo se vierte con una cláusula finita natural en español. «Vaya a ti» refleja el movimiento hacia el interlocutor.
- source_word: וְהֹצֵאתִי
  english_pob_choice: and bring out
  chosen_spanish: saque
  alternatives_spanish:
  - traiga afuera
  - traiga
  - saque fuera
  lexicon: HALOT
  rationale: El hifil de יצא aquí significa sacar o traer fuera algo preparado en el interior. «Saque» es claro y mantiene el gesto de presentar algo desde dentro hacia afuera.
- source_word: מִנְחָתִי
  english_pob_choice: my offering
  chosen_spanish: mi ofrenda
  alternatives_spanish:
  - mi regalo
  - mi tributo
  - mi presente
  lexicon: HALOT
  rationale: מִנְחָה puede ser regalo, tributo u ofrenda. En este contexto narrativo la presentación adquiere un matiz religioso; «ofrenda» preserva esa amplitud sin limitarla indebidamente.
- source_word: וְהִנַּחְתִּי לְפָנֶיךָ
  english_pob_choice: and set it before you
  chosen_spanish: la ponga delante de ti
  alternatives_spanish:
  - la coloque delante de ti
  - la deje delante de ti
  - la ponga ante ti
  lexicon: HALOT
  rationale: El idiomatismo hebreo expresa colocar algo en la presencia de alguien. «Delante de ti» es natural y fiel; «poner» conserva el tono simple del original.
- source_word: אָנֹכִי אֵשֵׁב
  english_pob_choice: I will stay
  chosen_spanish: Yo me quedaré
  alternatives_spanish:
  - Yo permaneceré
  - Yo me sentaré
  - Yo estaré
  lexicon: HALOT
  rationale: Aunque literalmente significa «sentarse», aquí la acción es permanecer en el lugar. «Me quedaré» comunica mejor la intención contextual en español.
- source_word: עַד שׁוּבֶךָ
  english_pob_choice: until you return
  chosen_spanish: hasta que tú regreses
  alternatives_spanish:
  - hasta tu regreso
  - hasta que vuelvas
  lexicon: HALOT
  rationale: El infinitivo con sufijo se expresa de forma más idiomática con una cláusula finita. «Regreses» mantiene el movimiento de vuelta implícito.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Ira
  - Por caridad
  lexicon: HALOT
  rationale: «נא» introduce una súplica cortés. «Por favor» reproduce bien ese tono en español moderno y digno.
theological_decisions:
- issue: Alcance de מִנְחָה en la presentación de Gedeón
  english_pob_reading: offering
  chosen_spanish_reading: ofrenda
  alternative_spanish_readings:
  - regalo
  - presente
  - tributo
  - ofrenda de cereal
  rationale: En la escena, la palabra puede referirse a un don presentado con resonancia cultual, sin necesidad de especificarlo como una ofrenda de cereal. «Ofrenda» conserva la ambigüedad y el peso religioso que el contexto sugiere, evitando restringir el término más de lo que permite el hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Sin cambios respecto del último pase auditado; el inglés POB también mantuvo la lectura amplia de מִנְחָה con nota de alternativas léxicas, y la revisión más reciente indicó que no hacían falta cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el hebreo subyacente lo exige; aquí no aparece.
  - Se usa «ofrenda» para מִנְחָה en coherencia con la nota inglesa sobre la amplitud semántica del término.
  - «Me quedaré» y «hasta que tú regreses» reflejan una solución idiomática similar a la del inglés auditado, sin perder el valor contextual de ישב y שוב.
