translation:
  language: es
  text: Atrapen para nosotros[a] los zorros, los zorros pequeños, que arruinan las viñas[b]; porque nuestras viñas están en flor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שׁוּעָלִים también puede entenderse como 'chacales' en algunos contextos.
    reason: lexical_alternative
  - marker: b
    text: O 'que echan a perder las viñas'.
    reason: lexical_alternative
  - marker: c
    text: O 'están en pleno florecimiento' o, menos probablemente, 'tienen uvas tiernas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶֽחֱזוּ
  english_pob_choice: Catch
  chosen_spanish: Atrapen
  alternatives_spanish:
  - Agarren
  - Prendan
  - Tomen
  lexicon: HALOT
  rationale: El imperativo plural pide una acción directa y urgente. En español, 'Atrapen' comunica bien la idea de aprehender animales sin sonar forzado, y conserva el tono exhortativo del hebreo.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para mí
  - en nuestro favor
  lexicon: HALOT
  rationale: El sufijo de primera persona plural debe mantenerse en español para conservar la voz colectiva del poema. 'Para nosotros' es la forma más natural y fiel.
- source_word: שׁוּעָלִים
  english_pob_choice: foxes
  chosen_spanish: zorras
  alternatives_spanish:
  - zorros
  - chacales
  lexicon: HALOT
  rationale: En español 'zorro' es el término común, pero 'zorra' mantiene el valor genérico para el animal en un registro más natural al plural colectivo. La alternativa 'chacales' se preserva solo como posibilidad léxica del hebreo, no como elección principal.
- source_word: שׁוּעָלִים קְטַנִּים
  english_pob_choice: the little foxes
  chosen_spanish: las zorras pequeñas
  alternatives_spanish:
  - las zorras jóvenes
  - zorras pequeñas
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo con artículo y adjetivo. 'Pequeñas' reproduce mejor la matización del texto que 'jóvenes', que sería más interpretativa.
- source_word: מְחַבְּלִים
  english_pob_choice: that ruin
  chosen_spanish: que arruinan
  alternatives_spanish:
  - que dañan
  - que echan a perder
  - que destruyen
  lexicon: HALOT
  rationale: '''Arruinan'' transmite acción dañina continua sin exagerar a destrucción total. Es una correspondencia natural para el participio hebreo en este contexto agrícola.'
- source_word: כְּרָמִים
  english_pob_choice: the vineyards
  chosen_spanish: las viñas
  alternatives_spanish:
  - los viñedos
  lexicon: HALOT
  rationale: '''Viñas'' es el término más directo y bíblicamente transparente en español para כְּרָמִים, y conserva mejor la imagen poética que ''viñedos'', que suena más técnico.'
- source_word: וּכְרָמֵינוּ
  english_pob_choice: for our vineyards
  chosen_spanish: nuestras viñas
  alternatives_spanish:
  - y nuestras viñas
  lexicon: HALOT
  rationale: El hebreo tiene una coordinación que en español se integra con naturalidad en la segunda mención del mismo sustantivo. Se mantiene el posesivo plural para reflejar el sufijo de primera persona plural.
- source_word: סְמָדַר
  english_pob_choice: are in blossom
  chosen_spanish: están en flor
  alternatives_spanish:
  - están en floración
  - están brotando
  - tienen uvas tiernas
  lexicon: HALOT
  rationale: '''Están en flor'' es la manera más idiomática y fiel de expresar el estado de la vid en floración. Se preserva la imagen de la etapa temprana de crecimiento sin imponer la lectura menos probable de ''uvas tiernas''.'
theological_decisions:
- issue: Sentido de la imagen agrícola como exhortación poética, no como alegoría doctrinal explícita
  english_pob_reading: The verse is translated straightforwardly as a vineyard image with lexical ambiguity preserved in notes.
  chosen_spanish_reading: El versículo se presenta como imagen poética del viñedo, sin convertirlo en alegoría doctrinal ni suavizar su fuerza verbal.
  alternative_spanish_readings:
  - interpretación alegórica explícita
  - paráfrasis devocional
  rationale: El hebreo y el POB inglés sostienen una imagen concreta con posibles matices léxicos; la traducción española debe mantener esa concreción y no añadir una interpretación teológica no solicitada.
  doctrine_reference: Principio de sobriedad exegética y respeto al género poético
- issue: Ambigüedad léxica de שׁוּעָלִים
  english_pob_reading: Foxes, with a footnote noting jackals as a lexical alternative.
  chosen_spanish_reading: zorras, con nota sobre la alternativa de 'chacales'.
  alternative_spanish_readings:
  - zorros
  - chacales
  rationale: La tradición de traducción en inglés favorece 'foxes', pero el hebreo admite debate léxico. En español conviene conservar el término principal más natural y señalar la alternativa para no borrar la tensión documentada.
  doctrine_reference: Transparencia textual y preservación de alternativas léxicas
- issue: Valor de סְמָדַר
  english_pob_reading: are in blossom, with alternatives 'in bloom' or less likely 'have tender grapes'.
  chosen_spanish_reading: están en flor, con nota sobre 'en floración' y 'uvas tiernas'.
  alternative_spanish_readings:
  - están en floración
  - tienen uvas tiernas
  rationale: '''Están en flor'' comunica el estado descrito sin introducir una imagen más específica de la que el texto asegura. La alternativa tradicional de ''uvas tiernas'' se mantiene solo como posibilidad interpretativa secundaria.'
  doctrine_reference: Precisión semántica y honestidad ante la ambigüedad del término
translation_notes:
  revision_awareness: El texto inglés revisado añadió 'the' antes de 'vineyards' para reflejar mejor el plural genérico; en español ese ajuste queda naturalmente absorbido por 'las viñas' y por la repetición interna del sustantivo en la línea. La decisión final conserva la fuerza imperativa, la repetición enfática y la ambigüedad léxica documentada en la audit trail.
  spanish_consistency_notes:
  - Se mantiene 'viñas' en lugar de 'viñedos' por consistencia poética y para reflejar el campo semántico agrícola del hebreo.
  - Se conserva la repetición de 'zorras' para representar la duplicación del sustantivo en el hebreo.
  - El verbo 'atrapen' se eligió por naturalidad en imperativo plural y por concordar con la acción concreta sobre animales.
  - Las notas preservan las alternativas léxicas documentadas sin sobrecargar el texto principal.
