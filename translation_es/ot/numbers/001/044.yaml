review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: identifica a los contados, mantiene a Moisés y Aarón como quienes realizaron el censo, conserva a los líderes de Israel como doce hombres representativos y retiene la referencia a la casa paterna. Sin embargo, hay dos desajustes de fidelidad/idiomaticidad: «los contados» suena forzado en español bíblico natural, y «estuvieron con ellos» introduce un matiz más eventivo/temporal que el simple הָיוּ copulativo; «eran/estaban con ellos» o una reestructuración más natural representa mejor el sentido.'
  spanish_quality_summary: 'La redacción actual es comprensible, pero la puntuación y la sintaxis resultan algo torpes: el uso de dos signos de puntuación fuertes («:» y raya) en la misma cadena entorpece la lectura, y «los contados» no suena natural en español amplio. Una pequeña revisión mejora mucho la fluidez sin perder literalidad.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Líderes de Israel», «doce hombres» y «casa de sus padres» están alineados con el expediente inglés y con el hebreo. La mejoría principal es preferir «los que fueron contados» frente a «los contados» por naturalidad en español, manteniendo la nota alternativa sobre «numerados».
  issues:
  - severity: medium
    issue: «los contados» es poco natural en español
    rationale: Aunque formalmente posible, no suena idiomático en español bíblico moderno y puede distraer. «Los que fueron contados» preserva la referencia personal del participio pasivo con mayor claridad.
  - severity: medium
    issue: «estuvieron con ellos» no es la mejor representación de הָיוּ en este contexto
    rationale: «Estuvieron» sugiere un evento puntual o temporal. Aquí el verbo funciona más bien como copulativo que cierra la identificación de los doce hombres representativos. «estaban con ellos» suena más natural, o mejor aún una reestructuración que integre la frase incidental.
  - severity: low
    issue: Puntuación algo pesada con dos puntos y raya
    rationale: 'La secuencia «Israel: doce hombres...—estuvieron con ellos» se siente trabada. Comas y rayas parentéticas leen mejor en español eclesial general.'
