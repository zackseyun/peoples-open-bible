translation:
  language: es
  text: y desde el día en que nombré jueces sobre mi pueblo Israel. Y te he dado descanso de todos tus enemigos. Yahvé te anuncia que Yahvé hará una casa para ti.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te edificará una casa». Aquí «casa» probablemente incluye la idea de una dinastía real, a la vez que hace eco del deseo de David de construir una casa (templo) para Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְמִן הַיּוֹם
  english_pob_choice: and from the day
  chosen_spanish: y desde el día
  alternatives_spanish:
  - y a partir del día
  - y desde aquel día
  lexicon: HALOT
  rationale: La secuencia preposicional marca un punto de inicio temporal. «Desde el día» conserva ese valor sin añadir matices no presentes; el conector «y» mantiene la continuidad discursiva.
- source_word: צִוִּיתִי שֹׁפְטִים
  english_pob_choice: I appointed judges
  chosen_spanish: nombré jueces
  alternatives_spanish:
  - designé jueces
  - instituí jueces
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar «mandar», en esta construcción con «jueces» sobre Israel el sentido es de instituir/poner en función. «Nombré» comunica bien esa acción en español sin perder el matiz de designación.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  english_pob_choice: over my people Israel
  chosen_spanish: sobre mi pueblo Israel
  alternatives_spanish:
  - para mi pueblo Israel
  lexicon: HALOT
  rationale: «Sobre» preserva el sentido de jurisdicción o gobierno que acompaña a los jueces, no solo el de beneficio indirecto.
- source_word: וַהֲנִיחֹתִי לְךָ מִכָּל אֹיְבֶיךָ
  english_pob_choice: and I have given you rest from all your enemies
  chosen_spanish: Y te he dado reposo de todos tus enemigos
  alternatives_spanish:
  - Y te he concedido descanso de todos tus enemigos
  - Y te he hecho descansar de todos tus enemigos
  lexicon: HALOT
  rationale: El hifil de נוח expresa dar descanso/alivio. «Reposo» conserva la idea de descanso concedido por Dios y resulta natural en español bíblico contemporáneo.
- source_word: וְהִגִּיד לְךָ יְהוָה
  english_pob_choice: Yahweh declares to you
  chosen_spanish: Yahvé te declara
  alternatives_spanish:
  - Yahvé te dice
  - Yahvé te anuncia
  lexicon: HALOT
  rationale: נגד en hifil significa declarar/anunciar. «Te declara» conserva el tono solemne de una comunicación formal y covenantal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la convención del proyecto, en lugar de sustituirlo por un título.
- source_word: כִּי בַיִת יַעֲשֶׂה לְּךָ יְהוָה
  english_pob_choice: that Yahweh will make a house for you
  chosen_spanish: que Yahvé hará una casa para ti
  alternatives_spanish:
  - que Yahvé te edificará una casa
  - que Yahvé formará una casa para ti
  lexicon: HALOT
  rationale: «Casa» conserva la ambigüedad intencional del hebreo entre edificio y dinastía. «Hará» sigue la formulación de la fuente sin resolver el juego de sentido hacia una sola interpretación.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: La convención del proyecto pide conservar el nombre propio divino. En español, «Yahvé» comunica ese nombre sin la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de בַּיִת en la promesa davídica
  english_pob_reading: house with dynastic implication preserved
  chosen_spanish_reading: casa con implicación dinástica preservada
  alternative_spanish_readings:
  - dinastía
  - casa real
  - templo
  rationale: La frase mantiene la tensión entre la casa como edificio y como linaje. Traducir solo «dinastía» resolvería demasiado pronto el doble sentido; «casa» lo preserva.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió el ajuste de revisión que separa la cláusula tras «Israel» y omite cualquier añadido equivalente a «also», no respaldado por el hebreo. También se mantuvo la ambigüedad de בַּיִת como «casa» y el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene el paralelismo verbal de dos enunciados principales separados por punto.
  - «Casa» se conserva sin aclararla en el cuerpo para no eliminar la tensión semántica; la nota explica la alternativa.
  - El registro es sobrio y bíblico contemporáneo, evitando calcos innecesarios pero sin parafrasear el contenido.
