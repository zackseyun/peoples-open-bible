base_translation:
  language: en
  yaml_path: translation/ot/2_kings/025/011.yaml
  text: Nebuzaradan the captain of the guard carried into exile the rest of the people who remained in the city[a], the deserters who had defected to the king of Babylon[c][b], and the rest of the multitude.
  footnotes:
  - marker: a
    text: Or 'the defectors who had gone over to the king of Babylon'; literally, 'the ones who had fallen to the king of Babylon.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'chief of the slaughterers'; likely an official title for the commander of the royal guard.
    reason: cultural_note
  - marker: c
    text: Or 'the rest of the crowd' or 'the rest of the population' for 'the rest of the multitude.'
    reason: lexical_alternative
