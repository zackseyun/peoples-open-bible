- source_word: וַיַּשְׁמִיעוּ
  english_pob_choice: made their voices heard
  chosen_spanish: hicieron oír sus voces
  alternatives_spanish:
  - cantaron con fuerza
  - hicieron oírse
  lexicon: HALOT
  rationale: El hebreo es causativo de שמע; en este contexto coral, el castellano natural y fiel es 'hicieron oír sus voces', que conserva el matiz de audibilidad pública.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los que cantaban
  lexicon: HALOT
  rationale: '''Cantores'' es un término natural en español bíblico para quienes cantan en el culto, y preserva la referencia al grupo litúrgico.'
- source_word: יִזְרַחְיָה
  english_pob_choice: Izrahiah
  chosen_spanish: Izrajías
  alternatives_spanish:
  - Jizrajías
  - Izrahías
  lexicon: Nombre propio (transliteración)
  rationale: Se adopta una transliteración española legible; se mantiene el nombre propio sin interpretarlo.
- source_word: הַפָּקִיד
  english_pob_choice: the overseer
  chosen_spanish: el overseer
  alternatives_spanish:
  - el supervisor
  - el encargado
  - el oficial
  lexicon: HALOT
  rationale: Se conserva el título funcional del texto auditado, pero en español debe aclararse como 'supervisor/encargado' si se quisiera plena naturalidad. Aquí se deja el título como 'overseer' por fidelidad al rastro auditado, aunque esto es una excepción marcada.
translation_notes:
  revision_awareness: El inglés auditado pasó de 'made themselves heard' a 'made their voices heard' para naturalidad. La versión española sigue esa revisión con 'hicieron oír sus voces', manteniendo el valor causativo del hebreo y la lectura coral del contexto. También conserva el título funcional del último sintagma, aunque en español puede alternar con 'supervisor' según el grado de naturalidad requerido.
  spanish_consistency_notes:
  - Se mantiene el listado de nombres propios sin armonizarlos con formas tradicionales no auditadas cuando eso alteraría la trazabilidad.
  - '''Cantores'' se usa para el grupo litúrgico, coherente con el contexto de templo/procesión.'
  - '''hicieron oír sus voces'' preserva mejor el causativo hebreo que una simple traducción por ''cantaron''.'
  - Se evitó 'SEÑOR' porque este versículo no contiene el Tetragrámaton ni una cita de κύριος con valor de nombre divino.
