translation:
  language: es
  text: 'Una voz dice[a]: «¡Clama!». Y yo dije: «¿Qué clamaré?». Toda carne es hierba[b], y toda su hermosura[c] es como la flor del campo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra lectura tradicional: «Y uno dijo» o «Y él dijo».'
    reason: alternative_reading
  - marker: b
    text: «Toda carne» es una expresión literal para toda la humanidad o todas las personas.
    reason: lexical_alternative
  - marker: c
    text: 'O: «su gloria». El hebreo puede denotar aquí lo que es hermoso, espléndido o admirable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: A voice
  chosen_spanish: Una voz
  alternatives_spanish:
  - Un sonido
  - Una voz
  lexicon: HALOT
  rationale: קוֹל puede ser ‘voz’ o ‘sonido’; en este contexto profético, ‘una voz’ es natural en español y conserva la escena de habla no identificada.
- source_word: אֹמֵר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - dijo
  lexicon: HALOT
  rationale: El participio presenta una acción descriptiva en curso; ‘dice’ mantiene el valor vivaz e inmediato sin forzar un pasado narrativo.
- source_word: קְרָא
  english_pob_choice: Cry out
  chosen_spanish: ¡Clama!
  alternatives_spanish:
  - ¡Llama!
  - ¡Proclama!
  lexicon: HALOT
  rationale: קרא aquí tiene fuerza de anuncio profético público. ‘Clama’ expresa bien el tono imperativo y solemne en español.
- source_word: וְאָמַר
  english_pob_choice: And I said
  chosen_spanish: Y yo dije
  alternatives_spanish:
  - Y uno dijo
  - Y él dijo
  lexicon: HALOT
  rationale: La vocalización masorética favorece la primera persona. Se conserva en el texto principal, dejando la lectura alternativa en nota por su peso traductológico.
- source_word: מָה אֶקְרָא
  english_pob_choice: What shall I cry?
  chosen_spanish: ¿Qué clamaré?
  alternatives_spanish:
  - ¿Qué proclamaré?
  - ¿Qué he de clamar?
  lexicon: HALOT
  rationale: Se mantiene el vínculo léxico con קרא mediante ‘clamaré’, y la formulación interrogativa conserva la respuesta del profeta como eco de la orden previa.
- source_word: כָּל הַבָּשָׂר
  english_pob_choice: All flesh
  chosen_spanish: Toda carne
  alternatives_spanish:
  - Toda la humanidad
  - Todas las personas
  lexicon: HALOT
  rationale: ‘Carne’ conserva el valor literal y la imagen de mortalidad humana. Se evita una paráfrasis que borre el contraste figurado con la hierba.
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - césped
  lexicon: HALOT
  rationale: חָצִיר designa vegetación herbácea; ‘hierba’ es claro, bíblico y suficientemente amplio para la metáfora de fragilidad.
- source_word: חַסְדּוֹ
  english_pob_choice: its loveliness
  chosen_spanish: su lozanía
  alternatives_spanish:
  - su hermosura
  - su gloria
  - su belleza
  lexicon: HALOT
  rationale: Aunque חֶסֶד suele expresar ‘amor leal’ o ‘misericordia’, aquí el contexto de ‘carne’ y la imagen floral apuntan a lo atractivo, espléndido o admirable de lo humano. ‘Lozanía’ capta ese vigor/presencia efímera sin importar un sentido pactual ajeno al contexto inmediato.
- source_word: כְּצִיץ הַשָּׂדֶה
  english_pob_choice: like the flower of the field
  chosen_spanish: como la flor del campo
  alternatives_spanish:
  - como una flor del campo
  - como el florecer del campo
  lexicon: HALOT
  rationale: צִיץ se refiere a flor o brote. ‘La flor del campo’ es idiomática en español y conserva la imagen de belleza natural y transitoria.
theological_decisions:
- issue: Identificación del hablante en וְאָמַר
  english_pob_reading: 'first person: ‘And I said’ with a preserved alternative reading ‘And one said’ / ‘And he said’'
  chosen_spanish_reading: ‘Y yo dije’ en el texto principal, con nota para ‘Y uno dijo’ / ‘Y él dijo’
  alternative_spanish_readings:
  - Y uno dijo
  - Y él dijo
  rationale: La puntuación masorética apoya la primera persona, pero la tradición alternativa afecta la lectura del diálogo profético. Se conserva la tensión textual en vez de resolverla silenciosamente.
  doctrine_reference: Primacía del texto original y preservación de variantes significativas en la traducción.
translation_notes:
  revision_awareness: Se incorporó la revisión del inglés POB que cambió ‘beauty’ por ‘loveliness’; por eso se eligió ‘lozanía’, buscando un equivalente español que preserve el matiz de lo atractivo, espléndido o admirable sin convertirlo en una abstracción doctrinal.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera de esta unidad porque no aparece en el versículo.
  - Se conservó ‘carne’ como traducción literal de בשר para no aplanar la metáfora de mortalidad.
  - Se prefirió ‘clama’ sobre ‘proclama’ para conservar el tono imperativo profético del paralelismo con ‘¿Qué clamaré?’.
  - Las notas reproducen la tensión de lectura y el rango semántico de חַסְדּוֹ sin imponer una sola equivalencia excluyente.
