translation:
  language: es
  text: 'Y le quitará toda la grosura al toro del sacrificio por el pecado: la grosura que cubre las entrañas y toda la grosura que está sobre las entrañas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el toro del sacrificio de purificación”. El término hebreo חַטָּאת puede denotar tanto “pecado” como la ofrenda asociada con quitar la impureza o el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda la
  - la totalidad de la
  lexicon: HALOT
  rationale: Conserva la fuerza inclusiva de כָּל con una forma natural en español dentro de la frase nominal 'toda la grosura'.
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grosura
  alternatives_spanish:
  - grasa
  - sebo
  - las porciones grasas
  lexicon: HALOT
  rationale: En contexto sacrificial, 'grosura' comunica mejor que 'grasa' la porción cultual destinada a ser retirada; evita una impresión meramente culinaria y mantiene la especificidad ritual sin perder inteligibilidad.
- source_word: פַּר הַחַטָּאת
  english_pob_choice: the bull of the sin offering
  chosen_spanish: el toro del sacrificio por el pecado
  alternatives_spanish:
  - el toro de la ofrenda por el pecado
  - el toro de la ofrenda de expiación
  - el toro del sacrificio por la purificación
  lexicon: HALOT
  rationale: Se conserva la relación posesiva del hebreo con una construcción natural en español. 'Sacrificio por el pecado' mantiene el valor tradicional de חַטָּאת que la POB en inglés retiene como 'sin offering', sin ocultar la tensión lexical con la posible idea de purificación.
- source_word: יָרִים
  english_pob_choice: he shall remove
  chosen_spanish: quitará
  alternatives_spanish:
  - retirará
  - separará
  - alzará
  lexicon: HALOT
  rationale: Aunque el verbo base puede significar 'alzar', en el procedimiento sacrificial el sentido es la extracción/separación de las porciones; 'quitará' es claro y no introduce una imagen extraña en español.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de ello
  - de este
  - de la víctima
  lexicon: HALOT
  rationale: El pronombre se refiere al toro sacrificial; en español, 'de él' sigue la referencia al animal sin resultar rebuscado.
- source_word: הַמְכַסֶּה
  english_pob_choice: that covers
  chosen_spanish: que cubre
  alternatives_spanish:
  - cubridora
  - que tapa
  lexicon: HALOT
  rationale: El participio funciona adjetivalmente; la relativa 'que cubre' reproduce bien su función descriptiva en español.
- source_word: קֶּרֶב
  english_pob_choice: entrails
  chosen_spanish: las entrañas
  alternatives_spanish:
  - los intestinos
  - las vísceras
  - el interior
  lexicon: HALOT
  rationale: '''Las entrañas'' es la equivalencia más natural y bíblicamente inteligible en español para el contexto anatómico sacrificial, con un tono digno y tradicional.'
- source_word: אֲשֶׁר עַל הַקֶּרֶב
  english_pob_choice: that is on the entrails
  chosen_spanish: que está sobre las entrañas
  alternatives_spanish:
  - que está encima de las entrañas
  - que va sobre las entrañas
  - que está sobre el interior
  lexicon: HALOT
  rationale: '''Sobre'' preserva el valor espacial de עַל sin añadir explicación; la relativa mantiene la distinción entre la grasa que cubre y la grasa situada encima de las entrañas.'
theological_decisions:
- issue: חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: sacrificio por el pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de expiación
  - sacrificio de purificación
  rationale: La POB en inglés mantiene 'sin offering' y anota la posible lectura de purificación. En español, 'sacrificio por el pecado' conserva la referencia tradicional y explícita al pecado, mientras deja abierta la tensión lexical documentada en la nota.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without erasing documented lexical tension.'
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail inglés, que prefirió 'bull of the sin offering' por su relación posesiva más natural y formal. En español se reflejó esa misma relación con 'el toro del sacrificio por el pecado', manteniendo la especificidad cultual sin mecanicismo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - '''las entrañas'' conserva coherencia con el registro anatómico-cultual del pasaje y evita el tecnicismo excesivo de ''vísceras''.'
  - '''grosura'' se usa aquí para la grasa sacrificial específica, no para grasa en sentido culinario general.'
