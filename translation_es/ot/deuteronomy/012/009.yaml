translation:
  language: es
  text: Porque aún no han llegado al lugar de reposo[a] y a la heredad que Yahvé tu Dios te da.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el reposo». El hebreo מְנוּחָה puede denotar tanto «reposo» en sentido abstracto como un «lugar de reposo»; aquí el contexto de la tierra favorece la lectura concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del enunciado anterior; «porque» conserva esa fuerza causal de manera natural en español.
- source_word: בָּאתֶם
  english_pob_choice: have come
  chosen_spanish: han llegado
  alternatives_spanish:
  - han venido
  - han entrado
  lexicon: HALOT
  rationale: «Llegar» comunica bien el movimiento hacia un destino en español y evita restringir innecesariamente el hebreo a «entrar».
- source_word: עַד עָתָּה
  english_pob_choice: not yet
  chosen_spanish: aún no
  alternatives_spanish:
  - todavía no
  - hasta ahora no
  lexicon: HALOT
  rationale: La combinación negativa expresa una acción no realizada hasta el presente; «aún no» es idiomático y fiel al valor temporal.
- source_word: הַמְּנוּחָה
  english_pob_choice: the resting place
  chosen_spanish: el lugar de reposo
  alternatives_spanish:
  - el reposo
  - el lugar de descanso
  lexicon: HALOT
  rationale: En este contexto de entrada a la tierra, la referencia es concreta; «lugar de reposo» mantiene la posibilidad lexical documentada sin reducirla a un estado abstracto.
- source_word: הַנַּחֲלָה
  english_pob_choice: the inheritance
  chosen_spanish: la heredad
  alternatives_spanish:
  - la herencia
  - la posesión heredada
  lexicon: HALOT
  rationale: «Heredad» conserva el matiz bíblico de posesión asignada por herencia y suena natural en registro bíblico español. «Herencia» también sería posible, pero «heredad» enlaza mejor con el lenguaje de reparto territorial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor predeterminado del proyecto para el Nombre divino, preservándolo explícitamente en lugar de enmascararlo como «SEÑOR».
- source_word: נֹתֵן
  english_pob_choice: is giving
  chosen_spanish: les da
  alternatives_spanish:
  - les está dando
  - les está dando
  lexicon: HALOT
  rationale: El participio presenta la acción como vigente o en curso desde la perspectiva del hablante; en español, el presente simple («les da») expresa con naturalidad ese valor de promesa en marcha.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente; se mantiene el Nombre divino en forma audible y no se sustituye por un título en mayúsculas. «Yahvé» es la opción base del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto auditado en inglés no requirió cambios de revisión; la versión española mantiene las decisiones léxicas y teológicas esenciales del POB, especialmente el valor concreto de מְנוּחָה, la carga territorial de נַחֲלָה y la preservación explícita del Nombre divino.
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - «Lugar de reposo» y «heredad» mantienen una coherencia terminológica útil para pasajes relacionados en Deuteronomio y Josué.
  - No se usa «SEÑOR» como sustituto del Nombre divino, conforme al criterio del proyecto.
