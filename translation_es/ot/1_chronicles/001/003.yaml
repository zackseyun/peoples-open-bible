- source_word: לָמֶךְ
  english_pob_choice: Lamech
  chosen_spanish: Lamec
  alternatives_spanish:
  - Lameq
  - Lamech
  lexicon: HALOT
  rationale: Nombre propio. En español bíblico es común «Lamec»; mantiene la identificación del personaje sin cargar una grafía innecesariamente anglicada.
- source_word: — (genealogical sequence)
  english_pob_choice: comma-separated list
  chosen_spanish: lista de nombres separada por comas
  alternatives_spanish:
