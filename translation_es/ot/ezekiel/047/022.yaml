translation:
  language: es
  text: Y sucederá que la repartirán como herencia para ustedes y para los extranjeros residentes[a] que residen entre ustedes, que han tenido hijos[b] entre ustedes; y serán para ustedes como un nativo[c] entre los hijos de Israel. Con ustedes recibirán herencia entre las tribus de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'forasteros' o 'residentes extranjeros'; גֵּר se refiere a una persona no nativa que vive entre Israel con reconocimiento social y legal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'han engendrado hijos' o 'han engendrado hijos varones'.
    reason: lexical_alternative
  - marker: c
    text: O 'como un nacido de la tierra' o 'como un nativo de nacimiento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּפִּלוּ / יִפְּלוּ (נפל in Hiphil/Qal with נַחֲלָה)
  english_pob_choice: allot / receive an inheritance
  chosen_spanish: repartirán como herencia / recibirán herencia
  alternatives_spanish:
  - asignarán / recibirán una herencia
  - dividirán / obtendrán una porción
  - echarán suertes / caerán en herencia
  lexicon: HALOT
  rationale: En español, 'repartir como herencia' comunica el acto causativo de asignar la tierra; 'recibir herencia' conserva el resultado para el segundo verbo. Así se mantiene la relación idiomática con נַחֲלָה sin sonar artificial.
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - posesión heredada
  - patrimonio
  lexicon: HALOT
  rationale: En este contexto de reparto de tierra, 'herencia' es la forma más natural y fiel para la asignación territorial. 'Heredad' sería más tradicional, pero menos transparente para el lector moderno.
- source_word: הַגֵּרִים
  english_pob_choice: sojourners
  chosen_spanish: forasteros
  alternatives_spanish:
  - residentes extranjeros
  - extranjeros residentes
  - forasteros residentes
  lexicon: HALOT
  rationale: La POB inglesa opta por 'sojourners' para reflejar el estatus legal del גֵּר. En español, 'forasteros' es el equivalente más amplio y natural, pero se mantiene la nota para no perder el matiz de residencia reconocida; 'residentes extranjeros' sería más técnico, aunque menos bíblico y menos fluido.
- source_word: הַגָּרִים בְּתוֹכְכֶם
  english_pob_choice: who sojourn among you
  chosen_spanish: que residen entre ustedes
  alternatives_spanish:
  - que viven entre ustedes
  - que moran entre ustedes
  - que habitan en medio de ustedes
  lexicon: HALOT
  rationale: '''Residen entre ustedes'' expresa la permanencia del participio y corresponde bien a בְּתוֹכְכֶם. Evita el calco pesado de ''sojornan'' y conserva la idea de presencia estable dentro de la comunidad.'
- source_word: הוֹלִדוּ בָנִים
  english_pob_choice: have fathered children
  chosen_spanish: han engendrado hijos
  alternatives_spanish:
  - han tenido hijos
  - han engendrado niños
  - han procreado hijos
  lexicon: HALOT
  rationale: '''Han engendrado hijos'' reproduce el valor del hiphil con fuerza genealógica. ''Hijos'' mantiene el paralelismo con בָנִים, mientras que ''niños'' sería impropio y ''tener hijos'' suavizaría demasiado el verbo.'
- source_word: כְּאֶזְרָח
  english_pob_choice: like a native
  chosen_spanish: como un nativo
  alternatives_spanish:
  - como un natural del país
  - como un ciudadano
  - como un nacido allí
  lexicon: HALOT
  rationale: '''Como un nativo'' conserva la comparación de כְּ y el sentido de pertenencia al pueblo/tierra. ''Ciudadano'' introduciría un marco moderno no presente en el hebreo.'
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - entre los israelitas
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la fórmula familiar-nacional del hebreo con 'hijos de Israel', que es clara y concordante con el texto fuente. 'Israelitas' sería más idiomático, pero menos transparente para el eco bíblico.
- source_word: אִתְּכֶם
  english_pob_choice: With you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto con ustedes
  - al lado de ustedes
  - junto a ustedes
  lexicon: HALOT
  rationale: '''Con ustedes'' mantiene la inclusión compartida en el reparto, de manera breve y natural. Es suficiente para expresar la co-participación que el hebreo subraya.'
- source_word: בְּתוֹךְ שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: among the tribes of Israel
  chosen_spanish: entre las tribus de Israel
  alternatives_spanish:
  - en medio de las tribus de Israel
  - dentro de las tribus de Israel
  lexicon: HALOT
  rationale: '''Entre las tribus de Israel'' reproduce bien el valor distributivo de בְּתוֹךְ y la estructura tribal del reparto. Es más natural en español que ''en medio de'' sin perder precisión.'
theological_decisions:
- issue: Status de los גֵּרִים en el reparto de la tierra restaurada
  english_pob_reading: The verse grants resident sojourners with established families inheritance rights alongside native Israelites.
  chosen_spanish_reading: El versículo concede a los forasteros residentes, con familia establecida, derecho a herencia junto con los israelitas nativos.
  alternative_spanish_readings:
  - El versículo solo les concede residencia o protección, no herencia territorial.
  - El versículo tiene un sentido simbólico y no habla de un reparto real de tierra.
  rationale: La acumulación de vocabulario de herencia y reparto exige conservar la inclusión efectiva en la distribución territorial. La traducción mantiene esa fuerza sin resolverla con sistemas posteriores de interpretación.
  doctrine_reference: Mantener la tensión del texto original; primacía del hebreo sobre la tradición de traducción.
- issue: Valor de בָנִים en la frase sobre descendencia
  english_pob_reading: Generic offspring is intended, rendered 'children.'
  chosen_spanish_reading: Se traduce con 'hijos' para conservar la forma más cercana del hebreo, dejando abierta la referencia a descendencia establecida.
  alternative_spanish_readings:
  - '''hijos'' como literal formal'
  - '''descendencia'' para un sentido más general'
  rationale: '''Hijos'' sigue de cerca בָנִים y funciona con naturalidad en español. No se fuerza una neutralización excesiva; el contexto genealógico ya hace claro el valor generacional.'
  doctrine_reference: Precisión léxica con sensibilidad al uso bíblico familiar.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el auditable de la POB inglesa, manteniendo el doble movimiento de asignar/recibir herencia y el matiz legal del גֵּר. Se ajusta el español para que suene natural, pero sin borrar las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se usa 'herencia' de manera consistente para נַחֲלָה.
  - Se conserva 'hijos' para בָנִים y 'tribus de Israel' para שִׁבְטֵי יִשְׂרָאֵל.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - El marcador [a] se ancla en 'forasteros' y [b], [c] en la cláusula comparativa correspondiente, respetando el orden de las notas.
