base_translation:
  language: en
  yaml_path: translation/ot/leviticus/022/002.yaml
  text: Speak to Aaron and to his sons[a], that they keep themselves from the holy things of the sons of Israel, and not profane my holy name, which they sanctify to me[c][b]. I am Yahweh.
  footnotes:
  - marker: a
    text: Or 'separate themselves from' or 'abstain from' the holy things of the sons of Israel.
    reason: lexical_alternative
  - marker: b
    text: '''The sons of Israel'' is the formal Hebrew expression; alternatively, ''the people of Israel'' or ''the Israelites.'''
    reason: lexical_alternative
  - marker: c
    text: That is, the holy things that the Israelites consecrate to the LORD.
    reason: cross_reference
