review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Yahvé actúa «como un enemigo», mata a todos los deseables/agradables a la vista en la tienda de la hija de Sion, y derrama su furor como fuego. Sin embargo, falla de forma importante en dos puntos: deja sin traducir כְּצָר como «foe», lo cual rompe la fidelidad y legibilidad, y «su mano derecha se alzó» no representa bien נִצָּב יְמִינוֹ, que expresa estar colocada/firme/lista más que levantarse.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero contiene un anglicismo inadmisible («foe») en el texto bíblico. Además, la nota [a] está mal anclada: el marcador aparece sobre «un» en vez de sobre la frase relevante de la mano derecha. «Sion» es eclesialmente inteligible, aunque el proyecto usa «Yahvé» para el nombre divino cuando aparece; aquí no aplica. Conviene también mejorar «agradables a la vista» con una nota que preserve la amplitud semántica de מַחֲמַדֵּי עָיִן.'
  glossary_alignment: No hay conflicto con las directrices mayores de glosario salvo la necesidad de mantener la personificación «hija de Sion» y las dos comparaciones hostiles distintas. «Furor» para חֲמָתוֹ es aceptable. «Como un adversario» funciona bien para כְּצָר y evita repetir exactamente «enemigo» sin introducir extranjerismos.
  issues:
  - severity: high
    issue: «foe» quedó sin traducir en el texto principal.
    rationale: El texto español no puede contener una palabra inglesa no adaptada. Además, el hebreo כְּצָר exige una traducción española clara y fiel, p. ej. «como un adversario» o «como un enemigo».
  - severity: medium
    issue: «su mano derecha se alzó» no refleja con precisión נִצָּב יְמִינוֹ.
    rationale: El participio נִצָּב denota estar apostado, firme o listo. «Se alzó» sugiere movimiento ascendente, no postura preparada. «Su mano derecha estaba lista» o «se mantuvo firme» comunica mejor el sentido bélico.
  - severity: medium
    issue: La nota [a] está mal ubicada y la anotación resulta confusa.
    rationale: El marcador aparece tras «un», pero la nota explica la frase de la mano derecha. Los marcadores deben anclarse exactamente al elemento comentado.
  - severity: low
    issue: La amplitud semántica de מַחֲמַדֵּי עָיִן podría preservarse mejor con una nota léxica.
    rationale: «Los que eran agradables a la vista» sigue la decisión inglesa, pero una nota ayuda a conservar la alternativa «todo lo que era deleitable/precioso a la vista».
  revised_spanish_text: Él tensó su arco como un enemigo; su mano derecha estaba lista como un adversario, y mató a todos los que eran agradables a la vista[a] en la tienda de la hija de Sion; derramó su furor como fuego.
  revised_footnotes:
