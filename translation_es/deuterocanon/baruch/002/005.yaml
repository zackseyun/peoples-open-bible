    issue: «quedaron» debilita el matiz de devenir/resultar de ἐγενήθησαν
    rationale: El griego marca que llegaron a una condición rebajada, no solo que permanecieron en ella. «Llegaron a estar» o «llegaron a quedar» refleja mejor el valor resultativo.
  - severity: high
