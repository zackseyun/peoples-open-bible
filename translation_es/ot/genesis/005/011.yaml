  text: Así, todos los días de Enosh fueron novecientos cinco años, y murió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  - resultaron ser
  lexicon: HALOT
  rationale: En este resumen genealógico, el verbo funciona idiomáticamente para expresar la duración total de la vida; en español, 'fueron' comunica esa suma de años de manera natural y fiel al valor de estado/resultado del hebreo.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - toda la vida de
  - la totalidad de los días de
  lexicon: HALOT
  rationale: La fórmula hebrea es la expresión genealógica habitual para el total de la vida. 'Todos los días de' conserva la estructura del original sin sonar forzado en español.
- source_word: אֱנוֹשׁ
  english_pob_choice: Enosh
  chosen_spanish: Enós
  alternatives_spanish:
  - Enosh
  - Enos
  lexicon: transliteration convention
  rationale: Se usa una transliteración cercana al hebreo con adaptación gráfica al español; 'Enós' es legible y conserva la forma bíblica sin depender de la tradición castellana de 'Enós/Enos' como forma litúrgica fija.
- source_word: חָמֵשׁ שָׁנִים וּתְשַׁע מֵאוֹת שָׁנָה
  english_pob_choice: nine hundred and five years
  chosen_spanish: novecientos cinco años
  alternatives_spanish:
  - cinco años y novecientos años
  - nueve cientos y cinco años
  lexicon: HALOT
  rationale: El hebreo suma la edad total en 905 años. El español idiomático expresa el total como 'novecientos cinco años'; invertir el orden literal sería antinatural y menos claro.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y murió él
  - entonces murió
  lexicon: HALOT
  rationale: La fórmula conclusiva de Génesis 5 se traduce de forma directa y sobria. En español, el sujeto implícito es suficiente y evita redundancia.
theological_decisions:
- issue: Fórmula genealógica de muerte y fin de vida
  english_pob_reading: and he died
  chosen_spanish_reading: y murió
  alternative_spanish_readings:
  - y falleció
  - y expiró
  rationale: El hebreo presenta una clausura narrativa simple y repetida en la genealogía; 'murió' preserva la sobriedad y la repetición literaria sin introducir matices devocionales no presentes en el texto.
  doctrine_reference: Génesis 5; patrón genealógico de mortalidad humana
