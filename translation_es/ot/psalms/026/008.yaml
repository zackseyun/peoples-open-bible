review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la mayor parte del sentido: יְהוָה se refleja correctamente como «Yahvé», se conserva «tu casa» en vez de sobreinterpretar «templo», y «el lugar donde habita tu gloria» transmite con claridad la reexpresión óptimo-equivalente de מִשְׁכַּן כְּבוֹדֶךָ. Sin embargo, «te amo la morada de tu casa» no corresponde al hebreo, porque אָהַבְתִּי tiene como objeto «la morada de tu casa», no a Yahvé como objeto indirecto/directo. En español debe ser «amo la morada de tu casa» o, con vocativo explícito, «Oh Yahvé, amo la morada de tu casa…».'
  spanish_quality_summary: La frase actual es poco natural y gramaticalmente defectuosa en español por el uso de «te amo» con un complemento nominal posterior no regido. El resto del verso es legible y digno. Conviene añadir vocativo («Oh Yahvé») para reflejar mejor la invocación inglesa y el hebreo inicial, y ajustar la nota para que no herede el mismo problema sintáctico. «Morada» funciona bien; «habita tu gloria» también es natural y reverente.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: «Yahvé» para יהוה, «gloria» para כָּבוֹד, y retención de «casa» frente a «templo». La decisión española para אָהַבְתִּי debe corregirse de «te amo» a «amo», pues el verbo no toma a Yahvé como objeto. La nota alternativa debe conservar la opción formal con «he amado» y la estructura nominal más cercana al hebreo.'
  issues:
  - severity: high
    issue: Uso incorrecto de «te amo»
    rationale: El hebreo dice «he amado/amo la morada de tu casa»; «te amo la morada…» cambia la sintaxis y distorsiona la relación semántica del verbo con su objeto.
  - severity: medium
    issue: Falta de vocativo explícito
    rationale: Con יְהוָה al inicio en contexto de dirección, «Oh Yahvé» o «Yahvé,» refleja mejor la invocación. No es estrictamente obligatorio, pero mejora la fidelidad discursiva.
  - severity: medium
    issue: La nota al pie reproduce la sintaxis defectuosa
    rationale: «te he amado la morada…» mantiene el mismo error; la alternativa formal debe decir «he amado la morada de tu casa…».
