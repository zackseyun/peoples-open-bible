    rationale: En este contexto no funciona como título mesiánico ni nombre propio, sino como vocativo común repetido a Ezequiel. En español bíblico resulta más apropiado «hijo de hombre» en minúscula; la mayúscula inicial dentro de la frase puede sugerir un título técnico innecesario.
  - severity: low
    issue: La justificación afirma que «Hijo de hombre» suena natural en español
    rationale: Esa afirmación es discutible. La forma puede preservarse por fidelidad literaria, pero no porque sea naturalmente idiomática en español moderno. Conviene corregir el texto aunque no hace falta adjudicación mayor.
