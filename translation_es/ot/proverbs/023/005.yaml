translation:
  language: es
  text: ¿Dejarás que tus ojos vuelen hacia eso, y ya no está? Porque ciertamente se hace alas; como águila[a], vuela a los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como buitre’; el hebreo nesher puede referirse más ampliamente a una gran ave de rapiña.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתָעוּף
  english_pob_choice: Will you let ... fly
  chosen_spanish: ¿Dejarás que ... vuelen
  alternatives_spanish:
  - ¿Volarán tus ojos
  - ¿Harás volar tus ojos
  - ¿Echarás una mirada
  lexicon: HALOT
  rationale: El verbo hebreo en hifil conserva la imagen de ‘hacer volar’. En español, ‘dejarás que ... vuelen’ mantiene la fuerza figurada y suena natural; ‘echar una mirada’ sería más idiomático, pero suaviza demasiado la metáfora.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu mirada
  - tu vista
  lexicon: HALOT
  rationale: Se conserva el hebraísmo visual y concreto. ‘Tus ojos’ refleja mejor la imagen del texto que una abstracción como ‘mirada’.
- source_word: בּוֹ
  english_pob_choice: to it
  chosen_spanish: hacia eso
  alternatives_spanish:
  - sobre eso
  - en eso
  lexicon: HALOT
  rationale: El referente es la riqueza mencionada en el contexto inmediato. ‘Hacia eso’ comunica el movimiento de la mirada sin imponer una localización extraña en español.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: and it is gone
  chosen_spanish: y ya no esté
  alternatives_spanish:
  - y ya no está
  - y desaparezca
  - y no esté allí
  lexicon: HALOT
  rationale: La frase hebrea expresa ausencia repentina. ‘Ya no esté’ conserva esa desaparición súbita con un español natural y breve.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la desaparición. ‘Porque’ reproduce bien el valor explicativo del hebreo.
- source_word: עָשֹׂה יַעֲשֶׂה
  english_pob_choice: it surely makes
  chosen_spanish: ciertamente se hace
  alternatives_spanish:
  - seguramente hace
  - sin duda se hace
  - de hecho se hace
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la acción. En español, ‘ciertamente se hace’ preserva la intensificación y la idea reflexiva implícita del pronombre לּוֹ.
- source_word: לּוֹ
  english_pob_choice: for itself
  chosen_spanish: para sí
  alternatives_spanish:
  - para sí mismo
  - para él mismo
  lexicon: HALOT
  rationale: El dativo pronominal indica que el sujeto se provee alas a sí mismo. ‘Para sí’ es breve y fiel.
- source_word: כְנָפַיִם
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - plumas
  - alas propias
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘alas’, en español ‘se hace alas’ sería posible pero menos natural; ‘alas’ mantiene la imagen sin añadir explicaciones.
- source_word: כְּנֶשֶׁר
  english_pob_choice: like an eagle
  chosen_spanish: como águila
  alternatives_spanish:
  - como un águila
  - como buitre
  lexicon: HALOT
  rationale: Se conserva la imagen tradicional y poética. El artículo puede omitirse en español poético; se mantiene la apertura a la alternativa zoológica documentada por la POB en nota.
- source_word: וְעָף
  english_pob_choice: it flies
  chosen_spanish: vuela
  alternatives_spanish:
  - y vuela
  - sale volando
  lexicon: HALOT
  rationale: El verbo completa la secuencia poética de movimiento rápido. En español, ‘vuela’ es conciso y claro; el contexto ya aporta el valor resultativo.
- source_word: הַשָּׁמָיִם
  english_pob_choice: to the heavens
  chosen_spanish: a los cielos
  alternatives_spanish:
  - al cielo
  - a los cielos del cielo
  lexicon: HALOT
  rationale: ‘Los cielos’ conserva el plural hebreo y el registro poético sin cargar el término con una lectura doctrinal ajena al proverbio.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete; la versión inglesa más reciente quedó sin cambios, así que el español se ajusta directamente al hebreo y al trazado auditado sin necesidad de reconciliar variantes textuales o editoriales adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’/‘Yahvé’ fuera de este versículo porque no aparecen en el texto.
  - Se conserva el registro poético con verbos breves y una estructura interrogativa directa.
  - ‘A los cielos’ refleja el plural hebreo הַשָּׁמָיִם y evita singularizar innecesariamente.
