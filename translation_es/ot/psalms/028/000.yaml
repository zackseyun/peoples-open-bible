  name: Spanish
  variant: neutral Latin American
source:
  edition: WLC
  text: לְ/דָוִ֡ד אֵ֘לֶ֤י/ךָ יְהוָ֨ה אֶקְרָ֗א צוּרִ/י֮ אַֽל תֶּחֱרַ֪שׁ מִ֫מֶּ֥/נִּי פֶּן תֶּֽחֱשֶׁ֥ה מִמֶּ֑/נִּי וְ֝/נִמְשַׁ֗לְתִּי עִם י֥וֹרְדֵי בֽוֹר׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/028/000.yaml
  text: Of David[a]. To you, Yahweh, I call; my rock, do not be deaf to me, lest if you are silent to me[c][b], I become like those going down to the pit.
  footnotes:
  - marker: a
    text: Or, 'do not be silent toward me.' The first verb may overlap with the next clause's idea of silence; the main text preserves a distinction between not hearing and not answering.
    reason: lexical_alternative
  - marker: b
    text: '''The pit'' can refer to the grave or the realm of the dead.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lest, if you are silent to me,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:19Z'
    unchanged: false
    changes_summary: 'Expanded the draft to include the full verse content from the source: invocation to Yahweh, address to ''my rock,'' plea not to be deaf/silent, and comparison with those going down to the pit. Also rendered יְהוָה as ''Yahweh'' per policy.'
translation:
  language: es
  text: De David[a]. A ti, Yahvé, clamo; mi roca, no seas sordo a mi clamor, no sea que guardes silencio conmigo[c][b] y yo llegue a ser como los que descienden a la fosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Salmo de David». La frase hebrea puede funcionar como atribución o encabezado breve.'
    reason: lexical_alternative
  - marker: b
    text: «La fosa» puede referirse a la tumba o al ámbito de los muertos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «no sea que calles conmigo». El hebreo usa aquí un verbo distinto del anterior: primero expresa no oír, y luego guardar silencio o no responder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David.
  chosen_spanish: De David.
  alternatives_spanish:
  - Salmo de David.
  - Para David.
  lexicon: אין
  rationale: La preposición lamed + nombre propio introduce atribución; «De David» conserva la brevedad y la función de encabezado sin añadir una glosa interpretativa. «Salmo de David» sería más explícito, pero el hebreo aquí solo dice «de David».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: Tetragrámaton
  rationale: Siguiendo la política del proyecto, se vierte el nombre divino como «Yahvé» para no enmascararlo con una convención tipográfica. El contexto es una invocación directa al nombre propio.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: clamo
  alternatives_spanish:
  - llamo
  - invoco
  lexicon: קרא
  rationale: «Clamo» transmite mejor el sentido de una llamada urgente y orante en un salmo de súplica; «llamo» sería correcto pero menos marcado, y «invoco» desplaza el matiz hacia fórmula cultual.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi refugio
  lexicon: צוּר
  rationale: «Mi roca» reproduce la metáfora de firmeza y apoyo. «Peña» es posible, pero «roca» es más natural en español contemporáneo y mantiene la imagen.
- source_word: אַל תֶּחֱרַשׁ מִמֶּנִּי
  english_pob_choice: do not be deaf to me
  chosen_spanish: no seas sordo para conmigo
  alternatives_spanish:
  - no guardes silencio ante mí
  - no me seas indiferente
  lexicon: חרשׁ
  rationale: El inglés POB opta por la fuerza de «deaf», no por «silent», para distinguir este verbo del siguiente. En español, «no seas sordo para conmigo» preserva esa fuerza auditiva y el carácter relacional del ruego.
- source_word: תֶּחֱשֶׁה מִמֶּנִּי
  english_pob_choice: you are silent to me
  chosen_spanish: calles ante mí
  alternatives_spanish:
  - guardes silencio ante mí
  - permanezcas callado ante mí
  lexicon: חשׁה
  rationale: 'Se mantiene la distinción con el verbo anterior: aquí el problema no es la sordera sino el silencio. «Calles ante mí» es natural en español y conserva la idea de ausencia de respuesta.'
- source_word: יֹרְדֵי בוֹר
  english_pob_choice: those going down to the pit
  chosen_spanish: los que descienden a la fosa
  alternatives_spanish:
  - los que bajan a la fosa
  - los que descienden al sepulcro
  lexicon: בור
  rationale: «Fosa» traduce bien el hebreo en un registro poético y puede abarcar sepulcro/abismo; «descienden» conserva el movimiento de descenso. Se evita fijar demasiado el referente para no borrar la amplitud semántica documentada por el inglés POB.
theological_decisions:
- issue: Nombre divino en una súplica directa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La traducción mantiene el nombre propio en la oración directa, en coherencia con la política del proyecto y con la forma fuente del Tetragrámaton. No se sustituye por un título eclesiástico o una máscara tipográfica.
  doctrine_reference: Tetragrámaton / onomástica bíblica
- issue: Ambigüedad de בּוֹר ('pit')
  english_pob_reading: The pit can refer to the grave or the realm of the dead.
  chosen_spanish_reading: la fosa
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  rationale: «Fosa» permite conservar la tensión entre tumba y ámbito de muerte sin elegir prematuramente una sola interpretación. La nota explica la amplitud semántica que el POB inglés preserva.
  doctrine_reference: Antropología bíblica / muerte y seol
- issue: Distinción entre 'deaf' y 'silent'
  english_pob_reading: do not be deaf to me / lest you be silent to me
  chosen_spanish_reading: no seas sordo para conmigo / calles ante mí
  alternative_spanish_readings:
  - no me ignores / guardes silencio ante mí
  rationale: 'La fuente hebrea usa dos verbos distintos y el POB inglés preserva esa tensión. El español mantiene la diferencia para no colapsar dos matices: incapacidad de oír y abstención de responder.'
  doctrine_reference: Hermenéutica poética / paralelismo hebreo
translation_notes:
  revision_awareness: Se integró el contenido completo de la fuente hebrea y se reflejó la revisión inglesa que aclaró la relación entre la cláusula de silencio y el resultado temido. También se respetó la decisión auditada de mantener una distinción léxica entre «sordo» y «calles/silencio», y el nombre divino se tradujo como Yahvé según la política del proyecto.
  spanish_consistency_notes:
  - Se mantuvo la segunda persona singular en toda la súplica.
  - Se conservó el paralelismo poético con una sintaxis clara y natural en español.
  - Se evitó «SEÑOR» para el Tetragrámaton, conforme a la terminología del proyecto.
  - «Fosa» se usó de forma consistente para no cerrar indebidamente el alcance de בוֹר.
