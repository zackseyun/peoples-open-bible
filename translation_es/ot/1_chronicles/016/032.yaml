translation:
  language: es
  text: ¡Que truene el mar[a], y todo lo que lo llena[b]; que exulte el campo, y todo lo que está en él!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ruja». El verbo hebreo puede expresar un sonido fuerte, de retumbo o rugido.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su plenitud»; es decir, todo lo que llena el mar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְעַם
  english_pob_choice: thunder
  chosen_spanish: truene
  alternatives_spanish:
  - retumbe
  - ruja
  lexicon: HALOT
  rationale: El hebreo comunica un sonido fuerte, retumbante, de tipo tormentoso. «Truene» conserva mejor esa imagen vívida que un mero «ruja», y en español funciona de manera natural con el mar como sujeto poético.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «the sea», en español «el mar» es el equivalente más natural y poético para יָם, sin perder el referente bíblico.
- source_word: וּמְלוֹאוֹ
  english_pob_choice: all that fills it
  chosen_spanish: todo lo que lo llena
  alternatives_spanish:
  - su plenitud
  - todo lo que hay en él
  lexicon: HALOT
  rationale: La base semántica es «plenitud» o «lo que llena». «Todo lo que lo llena» mantiene el sentido concreto y la referencia al mar, y además conserva la relación de llenado implícita en el hebreo.
- source_word: יַעֲלֹץ
  english_pob_choice: exult
  chosen_spanish: exulte
  alternatives_spanish:
  - se alegre
  - rebose de gozo
  lexicon: HALOT
  rationale: עלץ expresa júbilo exaltado. «Exulte» preserva mejor el tono poético elevado que «se alegre», sin añadir contenido ajeno.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo abierto
  - la campiña
  lexicon: HALOT
  rationale: «Campo» es el equivalente directo y natural de שָׂדֶה en este paralelismo con el mar. En español suena más amplio y bíblicamente reconocible que «el campo abierto».
- source_word: וְכָל אֲשֶׁר בּוֹ
  english_pob_choice: and all that is in it
  chosen_spanish: y todo lo que está en él
  alternatives_spanish:
  - y todo lo que hay en él
  - y cuanto hay en él
  lexicon: HALOT
  rationale: La construcción relativa hebrea apunta a la totalidad de lo contenido en el campo. «Todo lo que está en él» reproduce con claridad y naturalidad esa totalidad.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la lectura auditada del POB en inglés; no se introdujeron revisiones textuales ni cambios de sentido sustantivos.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético entre mar/campo con verbos en subjuntivo exhortativo («truene», «exulte»).
  - Se evitó traducir «מְלוֹאוֹ» como una abstracción desnuda; se aclaró su sentido con una nota para conservar la tensión entre «plenitud» y «todo lo que llena».
  - El registro es bíblico y moderno a la vez, sin recurrir a fórmulas eclesiásticas innecesarias.
