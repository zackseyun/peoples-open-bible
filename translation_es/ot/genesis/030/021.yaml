  glossary_alignment: No hay términos del glosario mayor en juego. «Dina» es una forma española aceptable para דִּינָה. La elección actual «le puso por nombre» es fiel, pero «la llamó Dina» expresa con más naturalidad el modismo hebreo sin pérdida de sentido en español.
