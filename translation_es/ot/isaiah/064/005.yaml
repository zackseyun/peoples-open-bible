translation:
  language: es
  text: Todos nosotros nos volvimos como uno que es impuro, y todas nuestras obras de justicia son como ropa inmunda[a]; todos nosotros nos marchitamos como una hoja, y nuestras iniquidades nos llevan como el viento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «como una prenda de impureza menstrual».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנְּהִי
  english_pob_choice: we all became
  chosen_spanish: todos nosotros nos volvimos
  alternatives_spanish:
  - todos nosotros llegamos a ser
  - todos nosotros hemos llegado a ser
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de היה expresa un cambio de estado. «Nos volvimos» comunica bien ese paso a una condición nueva, y «todos nosotros» conserva el énfasis del sujeto plural.
- source_word: כַטָּמֵא
  english_pob_choice: like one who is unclean
  chosen_spanish: como uno que es impuro
  alternatives_spanish:
  - como un impuro
  - como uno inmundo
  lexicon: HALOT
  rationale: טָמֵא puede referir impureza ritual y, en este contexto confesional, también carga moral/metafórica. «Impuro» mantiene esa amplitud sin forzar una lectura doctrinal más estrecha.
- source_word: כֻּלָּנוּ
  english_pob_choice: we all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - nosotros todos
  - todos
  lexicon: HALOT
  rationale: La duplicación enfática del pronombre se conserva de forma natural en español con «todos nosotros».
- source_word: וּכְבֶגֶד עִדִּים
  english_pob_choice: like a filthy garment
  chosen_spanish: como un vestido inmundo
  alternatives_spanish:
  - como un vestido impuro
  - como un paño de impureza menstrual
  lexicon: HALOT
  rationale: «Vestido inmundo» reproduce el valor de contaminación del hebreo sin perder legibilidad. Se evita reducir el sintagma a una sola explicación interpretativa en el texto principal.
- source_word: כָּל צִדְקֹתֵינוּ
  english_pob_choice: all our righteous deeds
  chosen_spanish: todas nuestras obras de justicia
  alternatives_spanish:
  - todas nuestras justicias
  - todas nuestras obras justas
  lexicon: HALOT
  rationale: El plural צִדְקוֹת aquí apunta a actos concretos. «Obras de justicia» preserva el plural y la referencia a acciones, no a una abstracción.
- source_word: וַנָּבֶל
  english_pob_choice: we all wither
  chosen_spanish: todos nosotros nos marchitamos
  alternatives_spanish:
  - todos nosotros nos secamos
  - todos nosotros nos desvanecemos
  lexicon: HALOT
  rationale: El verbo evoca el marchitarse de la vegetación; «nos marchitamos» encaja con la imagen de la hoja y transmite deterioro visible.
- source_word: כֶּעָלֶה
  english_pob_choice: like a leaf
  chosen_spanish: como una hoja
  alternatives_spanish:
  - como una hoja seca
  lexicon: HALOT
  rationale: La comparación es directa y singular; «una hoja» conserva la imagen simple del hebreo.
- source_word: וַעֲוֺנֵינוּ
  english_pob_choice: our iniquities
  chosen_spanish: nuestras iniquidades
  alternatives_spanish:
  - nuestros pecados
  - nuestra culpa
  lexicon: HALOT
  rationale: «Iniquidades» mantiene el peso moral y la distinción léxica de עָוֹן, que puede incluir culpa o consecuencia de culpa.
- source_word: כָרוּחַ
  english_pob_choice: like the wind
  chosen_spanish: como el viento
  alternatives_spanish:
  - como el aire
  lexicon: HALOT
  rationale: La comparación con el viento es simple y transparente en español; no requiere expansión.
- source_word: יִשָּׂאֻנוּ
  english_pob_choice: carry us away
  chosen_spanish: nos arrebatan
  alternatives_spanish:
  - nos llevan
  - nos arrastran
  lexicon: HALOT
  rationale: נשא aquí expresa ser llevados o removidos con fuerza. «Nos arrebatan» comunica la violencia del arrastre causada por el viento sin añadir un objeto explícito ausente en el hebreo.
theological_decisions:
- issue: Naturaleza de la impureza y del vestido inmundo
  english_pob_reading: Render the imagery as 'unclean' and 'filthy garment' without narrowing it to exclusively ritual impurity or exclusively moral depravity.
  chosen_spanish_reading: Traducir con «impuro» y «vestido inmundo» sin restringir el pasaje a una sola categoría (ritual o moral).
  alternative_spanish_readings:
  - «inmundo» en sentido puramente ceremonial
  - «pecaminoso» como afirmación doctrinal sistemática
  rationale: El texto es una confesión poética que usa imágenes de impureza. La traducción debe conservar esa tensión y no resolverla con una precisión interpretativa que el hebreo no exige.
  doctrine_reference: Mantener la tensión léxica y teológica del original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: No hay cambios posteriores relevantes en el pasaje; el consenso de revisión indica alta concordancia y no requiere ajustes sustanciales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el tetragrámaton.
  - «Impuro/inmundo» se usa para preservar la amplitud semántica de טָמֵא y עִדִּים sin homogeneizarlas.
  - «Iniquidades» conserva el registro bíblico y la carga moral de עָוֹן.
  - El estilo busca ser publicable en español neutro, con sintaxis natural y sin depender de calcos ingleses.
