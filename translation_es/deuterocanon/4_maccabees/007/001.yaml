    rationale: Esto produce una referencia errónea y rompe la trazabilidad entre texto y nota exigida por el proyecto.
  - severity: medium
    issue: '''piloto'' no reproduce tan específicamente la imagen de κυβερνήτης como ''timonel''.'
    rationale: El griego combina 'helmsman' con el participio πηδαλιουχῶν, por lo que una terminología más centrada en el timón preserva mejor la metáfora.
  - severity: medium
    issue: '''que gobernaba'' es menos concreto que el valor de πηδαλιουχῶν.'
    rationale: La idea no es solo dirigir en sentido amplio, sino llevar el timón/maniobrar la nave; 'guiaba con el timón' o 'timoneaba' comunica mejor esa acción.
  revised_spanish_text: Porque, así como el razonamiento de nuestro padre Eleazar era un excelente timonel, que guiaba con el timón la nave de la piedad[a] en el mar de las pasiones[b],
