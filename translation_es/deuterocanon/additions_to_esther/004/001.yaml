translation:
  language: es
  text: Y aconteció al tercer día, cuando dejó de orar, que se quitó las vestiduras de su servicio[a] y se vistió de su esplendor[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las vestiduras de su atención» o «de su práctica devocional». El griego θεραπεία puede denotar servicio, atención o práctica devocional.
    reason: lexical_alternative
  - marker: b
    text: O «su gloria». Aquí δόξα probablemente se refiere a su atuendo regio o a su magnificencia visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενήθη
  english_pob_choice: it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa se expresa de modo natural y elevado en español con «aconteció», que conserva el giro idiomático sin volverlo arcaico en exceso.
- source_word: ἐν τῇ ἡμέρᾳ τῇ τρίτῃ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  lexicon: BDAG
  rationale: «Al tercer día» es la forma española más idiomática y fiel para la expresión temporal griega.
- source_word: ὡς ἐπαύσατο προσευχομένη
  english_pob_choice: when she had stopped praying
  chosen_spanish: cuando había terminado de orar
  alternatives_spanish:
  - cuando cesó de orar
  - después de haber orado
  lexicon: BDAG
  rationale: La construcción marca una acción concluida antes de las que siguen; «había terminado de orar» preserva bien ese valor aspectual. «Orar» comunica mejor el acto devocional que una traducción más técnica o abstracta.
- source_word: ἐξεδύσατο
  english_pob_choice: she took off
  chosen_spanish: se quitó
  alternatives_spanish:
  - se despojó de
  - se sacó
  lexicon: BDAG
  rationale: «Se quitó» es la equivalencia verbal natural en español para quitarse ropa, sin añadir énfasis innecesario.
- source_word: τὰ ἱμάτια
  english_pob_choice: the garments
  chosen_spanish: las vestiduras
  alternatives_spanish:
  - las ropas
  - las prendas
  lexicon: BDAG
  rationale: «Vestiduras» mantiene el registro solemne del pasaje mejor que «ropa» o «prendas».
- source_word: τῆς θεραπείας
  english_pob_choice: of her service
  chosen_spanish: de su servicio
  alternatives_spanish:
  - de su atención
  - de su devoción
  - de su adoración
  lexicon: LSJ
  rationale: El sustantivo griego puede abarcar servicio, atención o práctica devocional. «Servicio» conserva esa amplitud sin forzar un matiz más cultual del que el contexto exige.
- source_word: περιεβάλετο
  english_pob_choice: put on
  chosen_spanish: se vistió de
  alternatives_spanish:
  - se puso
  - se cubrió con
  lexicon: BDAG
  rationale: «Se vistió de» reproduce bien la acción de colocarse la nueva indumentaria y encaja con el paralelo de quitarse/ponerse ropa.
- source_word: τὴν δόξαν αὐτῆς
  english_pob_choice: her splendor
  chosen_spanish: su esplendor
  alternatives_spanish:
  - su gloria
  - su magnificencia
  lexicon: BDAG
  rationale: Aquí δόξα probablemente alude al adorno real o al porte visible, no a «gloria» en sentido abstracto. «Esplendor» comunica esa magnificencia exterior de manera clara en español.
theological_decisions:
- issue: Sentido de τῆς θεραπείας en el cambio de vestiduras de Esther
  english_pob_reading: Rendered as 'of her service' to describe the attire associated with her prayerful observance.
  chosen_spanish_reading: «de su servicio», entendido como las vestiduras ligadas a su práctica devocional o de atención.
  alternative_spanish_readings:
  - de su adoración
  - de su devoción
  - de su atención
  rationale: El contexto presenta a Esther dejando la oración y cambiándose de ropa. «Servicio» mantiene la amplitud semántica sin convertir el término en un tecnicismo litúrgico que el griego no obliga a adoptar.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión lexical cuando el original permite varias lecturas; no resolverla artificialmente.'
- issue: Sentido de τὴν δόξαν αὐτῆς
  english_pob_reading: Rendered as 'her splendor' as a reference to regal adornment.
  chosen_spanish_reading: «su esplendor», como referencia a su adorno o magnificencia real.
  alternative_spanish_readings:
  - su gloria
  - su magnificencia
  rationale: En el contexto de presentarse ante el rey, la palabra apunta más naturalmente al brillo o porte visible que a una «gloria» abstracta. «Esplendor» conserva la fuerza imagética y evita una lectura demasiado teológica.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original y claridad moderna; conservar la referencia contextual del término.'
translation_notes:
  revision_awareness: 'La versión sigue de cerca el griego de Swete y armoniza con la decisión inglesa ya auditada: fórmula narrativa idiomática, acción completada antes de la siguiente, θεραπεία con amplitud semántica y δόξα como esplendor/ornato visible. No se detectaron revisiones aplicadas en el contexto inglés reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada para el nombre divino, aunque este versículo no lo contiene.
  - «Servicio» se usa aquí en sentido amplio; no se sustituye por «adoración» para no restringir indebidamente θεραπεία.
  - Se evita «Cristo»/«Mesías» por no aparecer en el texto.
  - La puntuación y el orden responden al español natural sin alterar la secuencia de acciones del griego.
