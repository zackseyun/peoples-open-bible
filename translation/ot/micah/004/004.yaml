id: MIC.4.4
reference: Micah 4:4
source:
  edition: WLC
  text: וְ/יָשְׁב֗וּ אִ֣ישׁ תַּ֧חַת גַּפְנ֛/וֹ וְ/תַ֥חַת תְּאֵנָת֖/וֹ וְ/אֵ֣ין מַחֲרִ֑יד כִּי פִ֛י יְהוָ֥ה צְבָא֖וֹת דִּבֵּֽר־׃
translation:
  text: And each will sit under his vine and under his fig tree[a], and there will be no one to make them afraid[b], for the mouth of Yahweh of Armies has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'each one will sit under his vine and under his fig tree.' The Hebrew has 'each man,' a masculine singular form used distributively.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of hosts.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָשְׁבוּ
  chosen: And ... will sit
  alternatives:
  - will dwell
  - will live
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit,' but in prophetic peace imagery it can also imply settled dwelling. 'Will sit' preserves the concrete image while remaining natural in English.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - everyone
  - each one
  lexicon: HALOT
  rationale: The singular distributive אִישׁ after a plural verb conveys 'each man' or 'each one.' Because the Hebrew is grammatically masculine and representative, 'each man' best reflects the source under the project's gender-accurate policy.
- source_word: תַּחַת גַּפְנוֹ
  chosen: under his vine
  alternatives:
  - beneath his vine
  lexicon: HALOT
  rationale: A standard idiom for secure prosperity. 'Under his vine' is the conventional and transparent rendering of the Hebrew prepositional phrase.
- source_word: וְתַחַת תְּאֵנָתוֹ
  chosen: and under his fig tree
  alternatives:
  - and beneath his fig tree
  lexicon: HALOT
  rationale: Paired with 'vine,' this forms a stock image of peace, safety, and settled abundance. The literal rendering is clear and preserves the biblical imagery.
- source_word: וְאֵין מַחֲרִיד
  chosen: and there will be no one to make them afraid
  alternatives:
  - and none will terrify them
  - with no one frightening them
  lexicon: HALOT
  rationale: The participle מַחֲרִיד denotes one who causes trembling or fear. Rendering it with an explicit agent ('no one to make them afraid') communicates the Hebrew sense naturally in English. The plural object 'them' reflects the distributive sense of the preceding clause.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or assurance for the promise. 'For' fits the prophetic explanatory force well.
- source_word: פִּי יְהוָה צְבָאוֹת
  chosen: the mouth of the LORD of Armies
  alternatives:
  - the mouth of the LORD of hosts
  - the LORD of Armies
  lexicon: HALOT
  rationale: פִּי is literally 'mouth,' a Hebrew idiom emphasizing the certainty of divine speech; retaining it preserves the force of the expression. Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'of Armies' is more transparent to modern readers than the traditional 'of hosts,' while preserving the martial/cosmic sense.
- source_word: דִּבֵּר
  chosen: has spoken
  alternatives:
  - has said
  - spoke
  lexicon: HALOT
  rationale: The perfect verb underscores the certainty of the declaration. 'Has spoken' is idiomatic in English prophetic formulae and preserves the solemnity of the divine utterance.
