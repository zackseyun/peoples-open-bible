base_translation:
  language: en
  yaml_path: translation/ot/isaiah/058/011.yaml
  text: And Yahweh will guide you continually[a], and satisfy your soul in parched places, and strengthen your bones; and you will be like a well-watered garden[c][b], and like a spring of water whose waters do not fail.
  footnotes:
  - marker: a
    text: Or 'in parched regions' or 'in dry places.' The Hebrew refers to scorched, arid conditions.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'whose waters do not lie'—that is, waters that do not fail or disappoint.
    reason: lexical_alternative
  - marker: c
    text: Or 'refresh your bones.' The Hebrew verb is uncommon here and may convey strengthening or invigorating.
    reason: lexical_alternative
