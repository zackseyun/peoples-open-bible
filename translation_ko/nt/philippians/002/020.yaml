id: PHP.2.20
reference: Philippians 2:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐδένα γὰρ ἔχω ἰσόψυχον ὅστις γνησίως τὰ περὶ ὑμῶν μεριμνήσει,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/020.yaml
  text: 'For I have no one like him who will genuinely care about your welfare,'
translation:
  language: ko
  text: 나에게는 그처럼 마음이 같은[a] 사람이 없습니다. 여러분의 안위[b]를 진심으로 돌볼 사람 말입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「영혼이 같은」, 문자적으로 「영혼이 동등한」. 헬라어 ἰσόψυχον은 디모데가 바울과 한마음으로 묶여 있음을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「여러분에 관한 일들을 진심으로 걱정할 사람」.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_korean: ~없습니다
  alternatives_korean:
  - 왜냐하면
  - 사실
  lexicon: BDAG
  rationale: 앞 절에 대한 설명적 근거. 한국어 자연 문장 흐름에서 「~없습니다」 자체가 그 설명적 연결을 담으므로 별도 접속어를 두지 않고 자연스럽게 흐르도록 한다.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_korean: 없다
  alternatives_korean:
  - 아무도 없다
  - 한 사람도 없다
  lexicon: BDAG
  rationale: ἔχω의 부정 직접 목적어. 「없다」가 가장 직접적이고 자연스럽다.
- source_word: ἔχω
  english_pob_choice: I have
  chosen_korean: 나에게는 ~없다
  alternatives_korean:
  - 내가 가지고 있지 않다
  lexicon: BDAG
  rationale: 단순 현재. 한국어 관용 구문 「나에게는 ~없다」로 자연스럽게 옮긴다.
- source_word: ἰσόψυχον
  english_pob_choice: so like-minded
  chosen_korean: 그처럼 마음이 같은
  alternatives_korean:
  - 영혼이 같은
  - 한마음의
  - 동일한 영혼의
  lexicon: BDAG
  rationale: 영어 POB와 같이 디모데가 바울과 내적 지향이 같음을 한국어로 분명히 드러낸다. 직역의 「영혼이 같은」은 각주로 보존한다.
- source_word: ὅστις
  english_pob_choice: who
  chosen_korean: ~할 사람
  alternatives_korean:
  - 그러한
  lexicon: BDAG
  rationale: 한국어 관계 구문으로 자연스럽게 옮긴다.
- source_word: γνησίως
  english_pob_choice: genuinely
  chosen_korean: 진심으로
  alternatives_korean:
  - 진실로
  - 참으로
  lexicon: BDAG
  rationale: 진정한 진심을 가리키는 부사. 「진심으로」가 한국어로 자연스럽다.
- source_word: τὰ περὶ ὑμῶν
  english_pob_choice: your welfare
  chosen_korean: 여러분의 안위
  alternatives_korean:
  - 여러분에 관한 일들
  - 여러분의 형편
  - 여러분의 일
  lexicon: BDAG
  rationale: 본 구절은 빌립보 성도의 처지·관심사를 가리킨다. 「안위」가 목회적 어조를 자연스럽게 담는다.
- source_word: μεριμνήσει
  english_pob_choice: will care about
  chosen_korean: 돌보다
  alternatives_korean:
  - 마음을 쓰다
  - 염려하다
  lexicon: BDAG
  rationale: 본 문맥에서는 죄악된 염려가 아닌 긍정적 목회적 관심. 「돌보다」가 자연스러운 한국어이다.
