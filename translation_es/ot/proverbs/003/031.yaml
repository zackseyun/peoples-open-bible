    rationale: 'El hebreo בְאִישׁ חָמָס presenta un individuo-tipo indefinido: «a un hombre violento». En español, el definido puede sonar genérico pero aquí resulta menos natural y ligeramente menos preciso.'
  - severity: medium
    issue: 'Nota al pie con alternativa poco idiomática: «celoso de un hombre violento»'
    rationale: Aunque refleja la idea de jealousy, en español esa construcción suena extraña. Es mejor «tener celos de un hombre violento» para expresar la alternativa léxica sin ambigüedad.
