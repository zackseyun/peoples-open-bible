translation:
  language: es
  text: Y consultó con sus oficiales y con sus valientes para tapar las aguas de los manantiales[a] que estaban fuera de la ciudad, y ellos le ayudaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tomó consejo con sus oficiales y sus valientes para tapar las aguas de los manantiales fuera de la ciudad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  english_pob_choice: he consulted
  chosen_spanish: consultó
  alternatives_spanish:
  - tomó consejo
  - deliberó
  lexicon: HALOT
  rationale: El nifal de יעץ aquí expresa buscar consejo junto con otros. En español, «consultó» conserva bien la idea de deliberación compartida y suena natural y digno.
- source_word: שָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus jefes
  - sus gobernantes
  lexicon: HALOT
  rationale: En este contexto administrativo-militar, «oficiales» transmite una función de autoridad y mando sin sugerir realeza; además, evita el matiz más limitado de «príncipes».
- source_word: וְגִבֹּרָיו
  english_pob_choice: his mighty men
  chosen_spanish: sus valientes
  alternatives_spanish:
  - sus guerreros
  - sus hombres poderosos
  - sus hombres valientes
  lexicon: HALOT
  rationale: «גִבּוֹרִים» remite a hombres de valor y fuerza, a menudo con matiz militar. En español, «valientes» conserva el valor idiomático y resulta más natural que una calca literal.
- source_word: לִסְתּוֹם
  english_pob_choice: about stopping up
  chosen_spanish: sobre cerrar
  alternatives_spanish:
  - sobre tapar
  - sobre bloquear
  - para cerrar
  lexicon: HALOT
  rationale: La forma verbal expresa el propósito de impedir el paso del agua. «Cerrar» funciona en español para la acción física de clausurar un conducto o manantial, sin sobrecargar el texto.
- source_word: מֵימֵי הָעֲיָנוֹת
  english_pob_choice: the waters of the springs
  chosen_spanish: las aguas de los manantiales
  alternatives_spanish:
  - las aguas de las fuentes
  - el agua de los manantiales
  - las aguas de las surgencias
  lexicon: HALOT
  rationale: «Manantiales» es el equivalente más claro y natural para עֲיָנוֹת en un contexto geográfico. Mantiene la imagen de fuentes de agua sin recurrir a «fuentes», que en español puede sonar menos preciso o más ambiguo.
- source_word: אֲשֶׁר מִחוּץ לָעִיר
  english_pob_choice: that were outside the city
  chosen_spanish: que estaban fuera de la ciudad
  alternatives_spanish:
  - que estaban fuera de la ciudad
  - que quedaban fuera de la ciudad
  - que estaban más allá de la ciudad
  lexicon: HALOT
  rationale: La cláusula relativa sitúa los manantiales fuera del perímetro urbano. «Fuera de la ciudad» es claro y fiel, y «estaban» mantiene la ubicación explícita del hebreo.
- source_word: וַיַּעְזְרֻהוּ
  english_pob_choice: and they helped him
  chosen_spanish: y ellos le ayudaron
  alternatives_spanish:
  - y le ayudaron
  - y lo asistieron
  - y le prestaron ayuda
  lexicon: HALOT
  rationale: עזר significa ayudar de manera directa. «Le ayudaron» conserva la sencillez del hebreo; se añade «ellos» para hacer explícito el sujeto plural del verbo.
translation_notes:
  revision_awareness: La traducción inglesa auditada usa «he consulted» y «his officials and his mighty men»; el español sigue esa lectura, pero opta por una formulación más natural para «לִסְתּוֹם» y para «מֵימֵי הָעֲיָנוֹת», sin perder el sentido de cerrar las fuentes de agua fuera de la ciudad. No se registraron revisiones sustantivas en el pasaje fuente-auditoría.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evita «príncipes» para שָׂרִים, porque el contexto sugiere funcionarios o jefes de gobierno y guerra más que nobleza.
  - «Valientes» preserva el matiz de guerreros de élite sin forzar una traducción militar técnica que el contexto no exige.
  - «Manantiales» es preferible a «fuentes» por claridad geográfica en español actual.
