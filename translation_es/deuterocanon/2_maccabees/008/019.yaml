revisions:
- from: Y también les recordó las ayudas[a] que habían venido sobre sus antepasados, y la de Senaquerib[b], cómo perecieron ciento ochenta y cinco mil.
  to: Y también les recordó los auxilios que habían recibido sus antepasados, y la intervención contra Senaquerib[a], cómo perecieron ciento ochenta y cinco mil.[b]
  rationale: Se revisa «ayudas» a «auxilios» para un registro más natural y bíblico; se reemplaza «que habían venido sobre sus antepasados» por «que habían recibido sus antepasados» para evitar un calco poco idiomático y preservar el sentido de asistencia experimentada sin añadir explícitamente el agente divino. También se explicita la elipsis como «la intervención contra Senaquerib», que suena más claro en español que «la de Senaquerib». Las notas se reubican para corresponder mejor con sus anclajes.
