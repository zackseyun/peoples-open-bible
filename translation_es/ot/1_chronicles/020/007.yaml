  to: Y se burló[a] de Israel, y Jonatán, hijo de Simea, hermano de David, lo hirió de muerte.
  rationale: Se ajusta la primera cláusula para reflejar mejor el matiz de provocación hostil y burlesca de חרף, sin perder la alternativa «desafió» ya documentada. También se elimina la subordinación temporal innecesaria para conservar mejor la secuencia narrativa hebrea. Se mantiene «lo hirió de muerte» como una forma española natural que expresa el golpe letal sin sobreinterpretar con «lo mató».
