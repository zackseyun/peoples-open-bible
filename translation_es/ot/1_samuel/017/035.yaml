translation:
  language: es
  text: Salí tras él, lo golpeé y la rescaté de su boca[a]; y cuando se levantó contra mí, lo sujeté por la barba[b], lo golpeé y lo maté.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tras él» / «de su boca»; el hebreo usa sufijos masculinos singulares para el animal. El objeto de «rescaté» está implícito en el contexto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «por su barba»; algunas traducciones interpretan esto como «por su melena» o «por su mandíbula».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָאתִי
  english_pob_choice: I went out
  chosen_spanish: Salí
  alternatives_spanish:
  - Fui
  - Salí fuera
  lexicon: HALOT
  rationale: יצא en esta secuencia narrativa expresa salida o desplazamiento; «Salí» es natural en español y conserva la acción concreta sin añadir matices innecesarios.
- source_word: אַחֲרָיו
  english_pob_choice: after it
  chosen_spanish: tras él
  alternatives_spanish:
  - tras ello
  - después de él
  lexicon: HALOT
  rationale: El sufijo masculino singular del hebreo apunta al animal mencionado antes. «Tras él» mantiene esa referencia y deja oír la forma pronominal del original; en español puede sonar menos chocante que «tras ello» y más cercano al antecedente narrativo.
- source_word: וְהִכִּתִיו
  english_pob_choice: struck it
  chosen_spanish: lo golpeé
  alternatives_spanish:
  - lo golpeé con fuerza
  - lo herí
  lexicon: HALOT
  rationale: נכה es un verbo amplio de golpear/abatir. «Lo golpeé» conserva la fuerza física sin forzar todavía una lectura mortal, que el hebreo reserva para el verbo final.
- source_word: וְהִצַּלְתִּי
  english_pob_choice: rescued
  chosen_spanish: lo rescaté
  alternatives_spanish:
  - lo libré
  - lo salvé
  lexicon: HALOT
  rationale: נצל en hifil significa librar o rescatar. «Lo rescaté» comunica bien la idea de sacar al animal de peligro y mantiene un registro claro y digno en español.
- source_word: מִפִּיו
  english_pob_choice: from its mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de su boca
  - de sus fauces
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de su boca». «Boca» preserva la imagen directa; «fauces» sería más interpretativo y menos fiel a la forma del texto.
- source_word: וַיָּקָם עָלַי
  english_pob_choice: when it rose up against me
  chosen_spanish: cuando se levantó contra mí
  alternatives_spanish:
  - cuando se alzó contra mí
  - y se levantó contra mí
  lexicon: HALOT
  rationale: קום על expresa levantarse en actitud hostil. «Se levantó contra mí» conserva el valor adversarial y fluye de manera natural en español.
- source_word: וְהֶחֱזַקְתִּי
  english_pob_choice: I seized
  chosen_spanish: lo sujeté
  alternatives_spanish:
  - lo agarré
  - lo asiré con fuerza
  lexicon: HALOT
  rationale: חזק en esta forma expresa tomar con firmeza. «Lo sujeté» transmite la acción de prenderse de algo con control y fuerza; en español resulta más idiomático que un calco más duro.
- source_word: בִּזְקָנוֹ
  english_pob_choice: by its beard
  chosen_spanish: por la barba
  alternatives_spanish:
  - de la barba
  - por su barba
  lexicon: HALOT
  rationale: זקן significa «barba». Aunque el referente es un animal, el texto hebreo usa esa imagen concreta; «por la barba» la preserva sin sustituirla por «melena» o «mandíbula».
- source_word: וְהִכִּתִיו
  english_pob_choice: struck it
  chosen_spanish: lo golpeé
  alternatives_spanish:
  - lo herí
  - lo golpeé de nuevo
  lexicon: HALOT
  rationale: La repetición de נכה se mantiene con el mismo verbo para conservar la correspondencia del hebreo y distinguirla del acto final de matar.
- source_word: וַהֲמִיתִיו
  english_pob_choice: killed it
  chosen_spanish: lo maté
  alternatives_spanish:
  - lo hice morir
  - lo maté a muerte
  lexicon: HALOT
  rationale: מות en hifil significa causar la muerte. «Lo maté» es la forma más directa y fiel en español, y mantiene la culminación explícita del enunciado.
theological_decisions:
- issue: Referencia pronominal al animal y mantenimiento de la imaginería concreta
  english_pob_reading: after it / from its mouth; the masculine singular suffixes refer to the animal
  chosen_spanish_reading: tras él / de su boca, conservando el referente animal masculino del hebreo
  alternative_spanish_readings:
  - tras ello / de su boca
  - tras él / de sus fauces
  rationale: No se suaviza la referencia del pronombre porque el hebreo usa sufijos masculinos singulares. Mantener «él» deja visible la tensión gramatical del original y evita borrar la forma del texto.
  doctrine_reference: Principio de fidelidad al referente gramatical del texto fuente
- issue: Diferenciación entre golpear y matar
  english_pob_reading: struck it ... struck it and killed it
  chosen_spanish_reading: lo golpeé ... lo golpeé y lo maté
  alternative_spanish_readings:
  - lo herí ... lo herí y lo maté
  - lo abatí ... lo abatí y lo maté
  rationale: Se conserva la repetición verbal del hebreo para distinguir el golpe previo del acto final de matar. Esto evita sobrecargar el primer verbo con sentido letal que el texto separa claramente.
  doctrine_reference: Respeto a la progresión aspectual y léxica del hebreo
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada y quedó sin cambios; el consenso de revisión indica alta concordancia con solo observaciones menores. En español se conservan las decisiones centrales de la POB inglesa: secuencia narrativa simple, referencia pronominal masculina al animal, distinción entre golpear y matar, y mantenimiento de la imagen concreta de la barba.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Lo golpeé» se emplea de manera consistente para נכה, reservando «lo maté» para מות en hifil.
  - Se mantiene un registro bíblico moderno, claro y sobrio, sin sustituir la imaginería hebrea por equivalentes más explicativos.
