revisions:
- from: Mejor es la [a]esterilidad con virtud, porque la inmortalidad está en su memoria, pues tanto junto a Dios como junto a los hombres es conocida[b].
  to: Mejor es la falta de hijos[a] con virtud, porque la inmortalidad está en su memoria, pues es conocida tanto por Dios como por los hombres[b].
  rationale: Se reemplaza «esterilidad» por «falta de hijos» para preservar el sentido más amplio de ἀτεκνία y alinearlo con la decisión auditada del POB inglés. Se cambia «junto a Dios ... junto a los hombres» por «por Dios ... por los hombres» para reflejar mejor la construcción aprobada en inglés y mejorar la naturalidad del español. También se corrige la colocación del marcador [a] y se hace que la nota [b] coincida exactamente con el texto principal.
