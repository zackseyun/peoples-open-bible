theological_decisions:
- issue: Antecedent of the relative clause in Esther 2:6
  chosen_reading: The clause is rendered as modifying Mordecai ('who had been taken into exile...').
  alternative_readings:
  - The clause may be understood as modifying Kish, Mordecai's great-grandfather, in light of the historical timing of Jeconiah's exile.
  rationale: The nearest grammatical antecedent in the Hebrew flow is Mordecai in v. 5, so the main text follows the surface syntax. However, because the chronology has led many interpreters to attach the clause to Kish, that alternative is preserved in a footnote rather than resolved silently.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
