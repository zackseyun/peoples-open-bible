review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Josías asigna a los sacerdotes a sus funciones y los fortalece/anima para el servicio del templo. Conserva correctamente «Yahvé» para יְהוָה y mantiene la estructura de las dos acciones principales. Sin embargo, la nota [a] usa «vigilias», que suena menos adecuada en este contexto cultual que «guardias» o «turnos/servicios», y el giro principal puede pulirse para reflejar mejor la idea de asignación oficial.'
  spanish_quality_summary: El texto es claro y natural en español eclesial amplio. «Puso a los sacerdotes en sus turnos» se entiende, pero «Asignó a los sacerdotes a sus turnos» o «Dispuso» expresa con más precisión la idea administrativa de ויעמד. Las notas necesitan una leve mejora de idiomaticidad y precisión léxica.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: «sacerdotes», «servicio», «casa de Yahvé». La decisión «Yahvé» es correcta. «Turnos» funciona bien para מִשְׁמְרוֹתָם, pero la alternativa más literal en nota debería evitar «vigilias» y usar algo como «guardias» o «servicios asignados».'
  issues:
  - severity: medium
    issue: Verbo principal «Puso» algo impreciso para וַיַּעֲמֵד
    rationale: Aunque no es incorrecto, «puso» puede sonar demasiado físico o coloquial. El hebreo hiphil aquí expresa establecer/asignar oficialmente en una función. «Asignó» comunica mejor el matiz administrativo y sigue siendo natural en español.
  - severity: low
    issue: Nota [a] con «sobre sus vigilias» poco idiomática
    rationale: «Vigilias» en español suele evocar períodos nocturnos o prácticas devocionales, y puede desviar del sentido de divisiones/guardias/puestos de servicio. Conviene usar una alternativa más natural y contextual.
  revised_spanish_text: Asignó a los sacerdotes a sus turnos[a] y los fortaleció[b] para el servicio de la casa de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'También: «a sus divisiones», «en sus puestos» o, más literalmente, «sobre sus guardias».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «los animó».'
    reason: lexical_alternative
