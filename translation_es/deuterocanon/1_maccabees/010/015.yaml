  rationale: Se corrige un error gramatical evidente ('las guerras') y se sustituye una expresión poco idiomática ('hazañas varoniles') por una opción más natural y fiel al sentido elogioso del griego ('hazañas heroicas'). El resto del versículo puede mantenerse sin cambios sustanciales.
