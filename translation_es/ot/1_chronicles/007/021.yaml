base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/007/021.yaml
  text: Zabad his son[a], and Shuthelah his son, and Ezer and Elead; the men of Gath who were born in the land killed them[b], because they had gone down to take their livestock.
  footnotes:
