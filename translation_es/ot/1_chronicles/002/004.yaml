    rationale: 'Aunque intenta reflejar יָלְדָה ... לּוֹ, la construcción suena forzada. Una formulación más natural y fiel al registro es «le dio hijos: Pérez y Zérah», que conserva el dativo relacional y la función genealógica.'
  - severity: low
    issue: La nota sobre «Pérez» es válida, pero convendría mantenerla como única nota léxica y no sobrecargar el texto con una nota innecesaria en «Tamar».
    rationale: El inglés preserva una alternativa transliterada para Perez/Peretz; eso sí merece conservarse.
  revised_spanish_text: 'Tamar, su nuera, le dio hijos: Pérez[b] y Zérah. Todos los hijos de Judá fueron cinco[a].'
