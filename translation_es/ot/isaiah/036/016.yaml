translation:
  language: es
  text: 'No oigan a Ezequías, porque así dice el rey de Asiria: Hagan la paz[a] conmigo y salgan a mí, y que cada uno coma de su propia vid y cada uno de su propia higuera, y que cada uno beba el agua de su propio aljibe[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hagan conmigo una bendición». La frase es un modismo para hacer la paz o llegar a términos favorables.
    reason: lexical_alternative
  - marker: b
    text: «Cada uno» traduce el hebreo repetido אִישׁ, una expresión distributiva singular masculina que significa cada individuo del grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמְעוּ אֶל
  english_pob_choice: listen to
  chosen_spanish: No oigan a
  alternatives_spanish:
  - No escuchen a
  - No presten oído a
  lexicon: HALOT
  rationale: שׁמע אֶל es un giro idiomático de atención/escucha. En español, «oigan a» conserva la idea de prestar atención al consejo de Ezequías sin forzar obediencia explícita que el hebreo no exige aquí de forma directa.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías rey de Judá
  lexicon: Nombre propio bíblico convencional
  rationale: Se usa la forma española estándar del nombre propio, que mantiene inteligibilidad y reconocimiento eclesial sin alterar el referente histórico.
- source_word: כִּי כֹּה אָמַר
  english_pob_choice: for thus says
  chosen_spanish: porque así dice
  alternatives_spanish:
  - porque así dice el rey de Asiria
  - pues así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética/mensajera se expresa de modo sobrio con «así dice», que conserva la solemnidad del hebreo. «Porque» reproduce el enlace causal/discursivo del texto.
- source_word: הַמֶּלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: Uso genitivo normal
  rationale: Se mantiene la relación posesiva con «de Asiria», que es natural en español bíblico y preserva el título político del original.
- source_word: עֲשׂוּ אִתִּי בְרָכָה
  english_pob_choice: Make peace with me
  chosen_spanish: Hagan la paz conmigo
  alternatives_spanish:
  - Lleguen a un acuerdo conmigo
  - Hagan alianza conmigo
  lexicon: HALOT
  rationale: El hebreo literalmente dice «hagan conmigo bendición», pero el contexto diplomático muestra un modismo de arreglo favorable o paz. «Hagan la paz conmigo» transmite el valor idiomático sin borrar la metáfora subyacente; la alternativa literal se preserva en nota.
- source_word: וּצְאוּ אֵלַי
  english_pob_choice: and come out to me
  chosen_spanish: y salgan hacia mí
  alternatives_spanish:
  - y vengan a mí
  - y salgan a mí
  lexicon: HALOT
  rationale: יצא conserva su sentido básico de «salir». «Hacia mí» mantiene la dirección del movimiento y evita añadir la idea de rendición, que está implícita por el contexto más que por el verbo mismo.
- source_word: וְאִכְלוּ
  english_pob_choice: and let each one eat
  chosen_spanish: y coma cada uno
  alternatives_spanish:
  - y que cada uno coma
  - y coman
  lexicon: HALOT
  rationale: El hebreo continúa con imperativos distributivos. En español, «coma cada uno» conserva la distribución individual sin recargar el texto con un auxiliar innecesario.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada cual
  lexicon: HALOT
  rationale: אִישׁ funciona aquí como distributivo singular masculino. «Cada uno» conserva ese valor sin introducir una restricción de género tan marcada en la superficie española.
- source_word: גַּפְנוֹ
  english_pob_choice: his own vine
  chosen_spanish: de su propia vid
  alternatives_spanish:
  - de su propia viña
  - de su vid
  lexicon: HALOT
  rationale: El sustantivo גֶּפֶן puede referirse a la vid o, por extensión, a la viña. Dado que el hebreo dice literalmente «su vid», se elige «vid» para mantener la cercanía al original; «propia» refleja el sufijo posesivo.
- source_word: תְּאֵנָתוֹ
  english_pob_choice: his own fig tree
  chosen_spanish: de su propia higuera
  alternatives_spanish:
  - de su propia higuera
  - de su higuera
  lexicon: HALOT
  rationale: «Higuera» corresponde de modo directo a תְּאֵנָה. Se conserva el posesivo explícito para reflejar la imagen de seguridad y posesión individual del pasaje.
- source_word: וּשְׁתוּ
  english_pob_choice: and let each one drink
  chosen_spanish: y beba cada uno
  alternatives_spanish:
  - y que cada uno beba
  - y beban
  lexicon: HALOT
  rationale: Se mantiene la secuencia distributiva con el mismo patrón que en «coma cada uno», respetando el paralelismo hebreo.
- source_word: מֵי בוֹרוֹ
  english_pob_choice: the water of his own cistern
  chosen_spanish: el agua de su propio aljibe
  alternatives_spanish:
  - el agua de su propia cisterna
  - el agua de su pozo
  lexicon: HALOT
  rationale: בוֹר designa aquí un depósito excavado para agua; en español «aljibe» es natural y preciso, mientras que «cisterna» también sería exacto pero menos común en un registro bíblico amplio. Se conserva el posesivo para reflejar el paralelo con «su propia vid» y «su propia higuera».
theological_decisions:
- issue: Valor del modismo עֲשׂוּ אִתִּי בְרָכָה
  english_pob_reading: Make peace with me, with a footnote preserving the literal 'Make with me a blessing.'
  chosen_spanish_reading: Hagan la paz conmigo, con nota que preserve el sentido literal 'Hagan conmigo una bendición'.
  alternative_spanish_readings:
  - Hagan un pacto conmigo
  - Lleguen a un acuerdo conmigo
  - Hagan conmigo una bendición
  rationale: El texto hebreo usa una expresión idiomática de arreglo favorable. Traducirla literalmente en el cuerpo principal oscurecería la intención persuasiva del Rabsaqué; sin embargo, la tensión entre literalidad y sentido se mantiene mediante nota, para no borrar la metáfora de «bendición».
  doctrine_reference: No aplica; decisión léxico-retórica del texto narrativo.
- issue: Distributivo masculino אִישׁ y su alcance en español
  english_pob_reading: Each one renders the repeated Hebrew אִישׁ, a masculine singular distributive expression meaning each individual in the group.
  chosen_spanish_reading: «Cada uno» reproduce el valor distributivo de אִישׁ sin masculinizar innecesariamente la lectura en español.
  alternative_spanish_readings:
  - cada hombre
  - cada cual
  - cada persona
  rationale: El hebreo usa un singular masculino con valor distributivo. En español, «cada uno» transmite la distribución individual y mantiene fluidez; no introduce una doctrina, pero sí preserva la forma funcional del original.
  doctrine_reference: No aplica; cuestión gramatical y de fidelidad al distributivo hebreo.
translation_notes:
  revision_awareness: 'Tomé como contexto la revisión inglesa más reciente que suaviza algunas opciones a favor de un estilo más formal, pero para el español conservé un equivalente natural y fiel al hebreo: mantuve la fórmula solemne «así dice» y opté por «cada uno» como distributivo claro. También consideré la nota inglesa sobre el modismo de «bendición» y la mantuve explícita en la nota española para no perder la tensión literal/idiomática.'
  spanish_consistency_notes:
  - Uso «Asiria» para el reino y «Ezequías» para el nombre propio, conforme a la convención bíblica española.
  - Mantengo «vid», «higuera» y «aljibe» como imágenes agrícolas y domésticas concretas, sin ampliar el sentido más allá de lo que el hebreo expresa.
  - Conservo el paralelismo distributivo con «cada uno» en ambas cláusulas para reflejar la repetición de אִישׁ.
  - La puntuación sigue el español bíblico moderno con dos puntos antes de la cita directa y coma antes de la cláusula final de enumeración.
