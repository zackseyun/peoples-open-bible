translation:
  language: es
  text: 'Entonces el Rabsaqué les dijo[a]: «¿Acaso mi señor me ha enviado para hablar estas palabras a tu señor y a ti? ¿No me ha enviado también a los hombres que están sentados en la muralla, que comerán su propio estiércol y beberán su propia orina con ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa imaginería cruda de asedio: «comer su estiércol y beber su orina». Algunas tradiciones manuscritas preservan una expresión eufemística para la segunda frase, a menudo traducida «beber el agua de sus pies».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el Rabshake
  - el jefe de los coperos
  - el comandante de campo
  lexicon: HALOT
  rationale: Se conserva el título transliterado como designación fija del portavoz asirio, tal como hace el POB en inglés. En español, «Rabsaqué» mantiene la función narrativa sin sobreespecificar el cargo, y evita reemplazar un título técnico por una glosa interpretativa.
- source_word: הַעַל ... שְׁלָחַנִי אֲדֹנִי
  english_pob_choice: Has my master sent me
  chosen_spanish: ¿Acaso mi señor me ha enviado?
  alternatives_spanish:
  - ¿Me ha enviado mi señor?
  - ¿Es para... que mi señor me ha enviado?
  lexicon: HALOT
  rationale: La partícula interrogativa con valor retórico se vierte con «¿Acaso...?» para conservar el desafío implícito. «Mi señor» corresponde al rango político del contexto, no a un título divino.
- source_word: אֲדֹנֶיךָ
  english_pob_choice: your master
  chosen_spanish: tu señor
  alternatives_spanish:
  - tu amo
  - tu soberano
  lexicon: HALOT
  rationale: En este contexto de confrontación política, «señor» comunica bien la relación de autoridad sin sonar excesivamente doméstico. «Amo» sería más duro, pero en español puede sugerir esclavitud doméstica; «soberano» desplaza demasiado el matiz relacional.
- source_word: וְאֵלֶיךָ
  english_pob_choice: and to you
  chosen_spanish: y a ti
  alternatives_spanish:
  - y a ustedes
  - y personalmente a ti
  lexicon: HALOT
  rationale: Se mantiene la referencia directa de segunda persona singular del original, reflejando el ataque dirigido a los interlocutores inmediatos.
- source_word: לְדַבֵּר אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: to speak these words
  chosen_spanish: para hablar estas palabras
  alternatives_spanish:
  - para decir estas cosas
  - para pronunciar estas palabras
  lexicon: HALOT
  rationale: «Hablar estas palabras» conserva la formalidad y la concreción del hebreo sin caer en un calco rígido. «Palabras» reproduce el sustantivo explícito del texto fuente.
- source_word: הֲלֹא עַל הָאֲנָשִׁים הַיֹּשְׁבִים עַל הַחֹמָה
  english_pob_choice: Has he not also sent me to the men sitting on the wall
  chosen_spanish: ¿No me ha enviado también a los hombres que están sentados sobre la muralla?
  alternatives_spanish:
  - ¿No me ha enviado también a los hombres que se sientan en la muralla?
  - ¿Acaso no me ha enviado también a los hombres sentados sobre la muralla?
  lexicon: HALOT
  rationale: «También» expresa el contraste implícito entre los destinatarios oficiales y los defensores en la muralla, como en el POB inglés. «Muralla» es la forma natural en español para la fortificación defensiva del contexto.
- source_word: לֶאֱכֹל
  english_pob_choice: who will eat
  chosen_spanish: para que coman
  alternatives_spanish:
  - que comerán
  - para comer
  lexicon: HALOT
  rationale: El infinitivo de resultado se vierte con una cláusula final/resultativa natural en español. «Para que coman» comunica la consecuencia del asedio sin introducir una interpretación excesiva.
- source_word: חרי/הם
  english_pob_choice: their own dung
  chosen_spanish: su propio estiércol
  alternatives_spanish:
  - su propia inmundicia
  - sus propios excrementos
  - su propio estiércol
  lexicon: HALOT
  rationale: Se conserva la grosería del insulto. «Estiércol» es directo y fuerte, pero menos agrícola que «dung»; aun así funciona bien en español como equivalente crudo y comprensible. «Excrementos» es más clínico y perdería la aspereza retórica.
- source_word: וְלִשְׁתּוֹת אֶת שיני/הם
  english_pob_choice: and drink their own urine
  chosen_spanish: y beban su propia orina
  alternatives_spanish:
  - y beban la orina de sus cuerpos
  - y beban el agua de sus pies
  lexicon: HALOT
  rationale: Se sigue la lectura llana asumida por el POB en inglés y por el texto hebreo impreso, manteniendo el paralelo con el primer miembro del insulto. «Orina» expresa sin rodeos el sentido crude y despectivo de la taunt siege imagery.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto con ustedes
  - con vosotros
  lexicon: HALOT
  rationale: Se adapta al español neutro latinoamericano con concordancia plural de cortesía/comunidad. «Con ustedes» comunica acompañamiento y solidaridad forzada en el sufrimiento.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al no añadir «solo» en la primera pregunta, porque ese matiz no está explícito en el hebreo. También se mantuvo la formulación directa del destino de los hombres de la muralla con una construcción natural en español, equivalente al ajuste inglés de 'who will'.
  spanish_consistency_notes:
  - Se conservó «Rabsaqué» como transliteración de título/nombre fijo, en línea con la práctica del POB de no forzar una glosa interpretativa en el texto principal.
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el Tetragrámaton, por lo que no se introduce.
  - Se mantuvo el registro sobrio y público, evitando eufemismos que debiliten la violencia retórica del pasaje.
  - «Señor» se emplea en sentido humano/político, no como sustituto del nombre divino.
