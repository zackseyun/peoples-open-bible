translation:
  language: es
  text: Entonces Salomón se puso de pie delante del altar de Yahvé, frente a toda la asamblea de Israel, y extendió sus manos hacia el cielo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se levantó
  - estuvo de pie
  lexicon: HALOT
  rationale: El verbo narra una acción simple en secuencia. En español, «se puso de pie» expresa naturalmente el acto de ponerse en posición erguida sin añadir énfasis no presente en el hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: Con «altar» como complemento, «delante de» conserva el sentido espacial directo y suena natural en español contemporáneo.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar de Yahveh
  - el altar de Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio editorial del proyecto para יְהוָה, y la relación constructa se traduce de manera directa con «de».
- source_word: נֶגֶד
  english_pob_choice: in front of
  chosen_spanish: enfrente de
  alternatives_spanish:
  - frente a
  - ante
  lexicon: HALOT
  rationale: Como לִפְנֵי ya quedó expresado con «delante de», «enfrente de» evita repetición innecesaria y preserva el matiz de visibilidad pública ante la asamblea.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  english_pob_choice: all the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el pueblo de Israel reunido
  lexicon: HALOT
  rationale: «Asamblea» conserva el valor de קָהָל como comunidad reunida; «toda» refleja כָּל con claridad y naturalidad.
- source_word: וַיִּפְרֹשׂ
  english_pob_choice: spread out
  chosen_spanish: extendió
  alternatives_spanish:
  - abrió
  - alzò y extendió
  lexicon: HALOT
  rationale: Para el gesto de oración, «extendió» comunica la acción de desplegar los brazos o las manos sin sonar forzado en español.
- source_word: כַּפָּיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus palmas
  lexicon: HALOT
  rationale: Aunque כַּף puede referirse propiamente a la palma, en este gesto de oración el español normal dice «manos», como también reflejó la decisión inglesa.
- source_word: הַשָּׁמָיִם
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  lexicon: HALOT
  rationale: En esta escena direccional y orante, «el cielo» resulta natural en español y mantiene la referencia elevada; «los cielos» queda como alternativa más literal al plural hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto mediante «Yahvé», siguiendo la política del proyecto de no sustituir el Tetragrámaton por un título enmascarado. «El SEÑOR» se evita por no reflejar el nombre explícito del hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'אל השמים / הַשָּׁמָיִם: singularidad idiomática en español'
  english_pob_reading: toward heaven
  chosen_spanish_reading: hacia el cielo
  alternative_spanish_readings:
  - hacia los cielos
  - hacia el firmamento
  rationale: El hebreo plural puede sonar reverente o cosmológico, pero en español la dirección de la oración se expresa con naturalidad como «hacia el cielo». Se mantiene el sentido sin sobrecargar el texto.
  doctrine_reference: Uso idiomático y reverente del lenguaje bíblico en español
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa están en alto acuerdo; no hay revisiones aplicadas en el paquete fuente. La única tensión lexical relevante es הַשָּׁמָיִם, que puede leerse literalmente como «los cielos» o idiomáticamente como «el cielo»; se optó por la forma más natural en español y se señaló la alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, en coherencia con el criterio editorial del proyecto.
  - Se traduce קָהָל como «asamblea», manteniendo el matiz de comunidad reunida.
  - Se conserva la distinción espacial de לִפְנֵי y נֶגֶד con dos expresiones distintas en español para evitar repetición artificial.
  - No se fuerza un plural reverencial para הַשָּׁמָיִם dentro del texto principal, pero se documenta la alternativa literal en nota.
