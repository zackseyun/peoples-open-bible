  to: 'Por tanto, así dice el Señor Dios, Yahvé: Porque me has olvidado y me has echado a tus espaldas[a], tú también llevarás tu lascivia y tus prostituciones.'
  rationale: Se ajusta el título divino para preservar mejor אֲדֹנָי יְהוִה en español natural sin ocultar «Yahvé»; se mejora el modismo «behind your back» con «a tus espaldas»; y se reemplaza «infamia» por «lascivia» para reflejar mejor זִמָּה en el contexto sexualizado y alinearlo con la decisión inglesa «lewdness». No se requiere adjudicación adicional, porque la corrección es clara a partir del hebreo y de la guía terminológica del proyecto.
