translation:
  language: es
  text: Pero en cuanto a mí, con voz de acción de gracias te ofreceré sacrificio; lo que he prometido en voto, lo pagaré. La salvación[a] pertenece a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La liberación pertenece a Yahvé»; el hebreo יְשׁוּעָה puede referirse al rescate concreto y también a la salvación en sentido amplio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Pero yo
  - Y en cuanto a mí
  lexicon: HALOT
  rationale: La construcción marca contraste enfático con quienes antes invocaban ídolos. «En cuanto a mí» conserva ese contraste personal sin sonar rígido en español.
- source_word: בְּקוֹל תּוֹדָה
  english_pob_choice: with the voice of thanksgiving
  chosen_spanish: con voz de acción de gracias
  alternatives_spanish:
  - con voz de agradecimiento
  - con acción de gracias
  - con una voz de acción de gracias
  lexicon: HALOT
  rationale: Se conserva la imagen de «voz» y el sustantivo תּוֹדָה en su sentido de agradecimiento litúrgico. «Acción de gracias» resulta natural y reverente en español, sin perder el matiz audible de la expresión.
- source_word: אֶזְבְּחָה
  english_pob_choice: I will sacrifice
  chosen_spanish: ofreceré sacrificio
  alternatives_spanish:
  - sacrificaré
  - haré sacrificio
  lexicon: HALOT
  rationale: En español, «ofreceré sacrificio» comunica con mayor claridad el acto cultual sin introducir una connotación extraña o excesivamente cruda que podría tener «sacrificaré».
- source_word: לָּךְ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - a ti mismo
  lexicon: HALOT
  rationale: El dativo de destinatario se expresa de forma natural con «a ti» en español.
- source_word: אֲשֶׁר נָדַרְתִּי
  english_pob_choice: what I have vowed
  chosen_spanish: lo que he prometido
  alternatives_spanish:
  - lo que he votado
  - lo que he hecho voto
  - lo que he jurado
  lexicon: HALOT
  rationale: Aunque el hebreo habla de un voto, en español «prometer» es el equivalente más claro y digno para un lector amplio. Se evita «voto» por su posible ambigüedad política o eclesiástica.
- source_word: אֲשַׁלֵּמָה
  english_pob_choice: I will pay
  chosen_spanish: lo cumpliré
  alternatives_spanish:
  - lo pagaré
  - lo ejecutaré
  - lo realizaré
  lexicon: HALOT
  rationale: En contexto de votos, שלם expresa cumplir/abonar lo comprometido. «Lo cumpliré» conserva la fuerza obligacional y evita que «pagar» suene monetario en español.
- source_word: יְשׁוּעָתָה לַיהוָה
  english_pob_choice: Salvation belongs to Yahweh
  chosen_spanish: La salvación pertenece a Yahvé
  alternatives_spanish:
  - La salvación es de Yahvé
  - La liberación pertenece a Yahvé
  - La salvación viene de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el valor posesivo/source del hebreo con «pertenece a», y se adopta el término del proyecto «Yahvé» para el Tetragrámaton.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se sigue la norma del proyecto en español para el nombre del pacto, evitando el enmascaramiento por «SEÑOR» y adaptando la forma al uso hispano establecido como «Yahvé».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de יְשׁוּעָה
  english_pob_reading: Salvation / Deliverance
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  - salvación o liberación
  rationale: El hebreo admite tanto rescate concreto como sentido más amplio de salvación. Se conserva «salvación» en el texto principal para mantener la amplitud teológica, sin borrar el posible matiz de liberación ya reconocido por el audit trail inglés.
  doctrine_reference: HALOT; auditoría POB en Jonah 2:10
translation_notes:
  revision_awareness: 'Se revisó el rastro auditado en inglés y no se detectaron cambios posteriores: la traducción inglesa última quedó sin modificaciones y con acuerdo alto. La versión española mantiene las mismas tensiones léxicas relevantes: contraste enfático, imagen de «voz», lenguaje de voto y la ambigüedad de יְשׁוּעָה.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se evita «Señor» como máscara del nombre divino en el cuerpo principal.
  - Se preserva la tensión de יְשׁוּעָה con una nota alternativa sin desplazar el texto principal.
  - La sintaxis busca ser publicable y natural en español, manteniendo la estructura paralela del hebreo.
