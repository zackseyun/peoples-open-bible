revisions:
- from: Y conspiraron contra él en Jerusalén[a], y él huyó a Laquis; y enviaron tras él a Laquis y lo mataron allí.
  to: Y conspiraron contra él en Jerusalén, y huyó a Laquis; y enviaron tras él[a] a Laquis y le dieron muerte allí.
  rationale: Se eliminó la nota incorrecta sobre «Jerusalén» y se colocó una nota fiel al expediente inglés sobre «enviaron tras él». También se cambió «lo mataron» por «le dieron muerte» para reflejar mejor el valor causativo y deliberado del hebreo, manteniendo un español natural y digno.
