review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: contraste inicial, existencia de una distancia, prohibición de acercarse, propósito de conocer el camino y razón basada en no haber pasado antes por allí. Sin embargo, hay dos desajustes importantes en las notas: la nota [a] se ancla al pronombre, pero el inglés auditado preserva como nota léxica el modismo final «desde ayer y anteayer»; y la nota [b] se coloca sobre «han de ir», aunque su contenido corresponde a «dos mil codos».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y precisión. «Ella» para el arca suena algo forzado en prosa bíblica española; «el arca» evita ambigüedad y lee mejor. «Por medida» es comprensible, pero «según la medida» suena más natural en español formal. También conviene reubicar las notas para que correspondan exactamente a sus anclas textuales.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La elección de «codos» para אַמָּה es correcta y coherente con el criterio del proyecto de conservar unidades antiguas. No hay conflicto con los glosarios principales.
  issues:
  - severity: high
    issue: Las notas al pie están intercambiadas respecto de sus anclas textuales.
    rationale: La nota [a] en el inglés auditado preserva la literalidad del modismo final «desde ayer y anteayer», no el pronombre del arca. La nota [b] es la nota cultural sobre «codos». En el borrador español, [a] aparece en «ella» y [b] en «han de ir», pero sus contenidos no corresponden a esas ubicaciones.
  - severity: medium
    issue: El uso de «ella» para referirse al arca es menos natural que explicitar «el arca».
    rationale: Aunque «arca» puede tratarse como femenino en español, el pronombre aislado «ella» suena marcado y puede distraer. Dado que el hebreo usa pronombre por referencia contextual, el español puede hacer explícito el referente sin perder fidelidad.
  - severity: low
    issue: «Por medida» es algo rígido en español.
    rationale: La frase hebrea בַּמִּדָּה expresa la medición del tramo. «Según la medida» o «medidos» suenan más naturales; «según la medida» conserva bien el matiz formal sin paráfrasis excesiva.
  revised_spanish_text: Sin embargo, habrá una distancia entre ustedes y el arca, como de dos mil codos[a] según la medida. No se acerquen a ella, para que sepan el camino por el cual irán, porque no han pasado por este camino antes[b].
  revised_footnotes:
  - marker: a
    text: «Dos mil codos» conserva la unidad de medida antigua del hebreo; un codo era una medida estándar antigua de longitud, aproximadamente la longitud de un antebrazo.
    reason: cultural_note
  - marker: b
    text: Literalmente, «desde ayer y anteayer», un modismo que significa «antes» o «anteriormente».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige el principal problema de fidelidad editorial: las notas deben corresponder a los mismos elementos preservados en la auditoría inglesa. También mejora la legibilidad española al explicitar «el arca» en lugar de un pronombre femenino aislado y al ajustar «por medida» a «según la medida». Se mantiene el sentido del hebreo y el tono formal del POB.'
