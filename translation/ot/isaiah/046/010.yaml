theological_decisions:
- issue: Rendering divine intentionality in עֲצָתִי and חֶפְצִי
  chosen_reading: My purpose shall stand, and I will accomplish all my pleasure
  alternative_readings:
  - My counsel shall stand, and I will do all my will
  - My plan shall stand, and I will accomplish all that I desire
  rationale: The verse emphasizes God's sovereign foreknowledge and effective intention. The translation preserves that force without importing a narrower systematic-theological formulation beyond the Hebrew. 'Purpose' and 'pleasure' together retain both intentionality and volition.
  doctrine_reference: Translation philosophy §§1, 3, 6
