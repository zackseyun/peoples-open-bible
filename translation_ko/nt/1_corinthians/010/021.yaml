lexical_decisions:
- source_word: ποτήριον κυρίου
  english_pob_choice: cup of the Lord
  chosen_korean: 주의 잔
  lexicon: BDAG
  rationale: 여기서 κύριος는 예수 그리스도를 가리키므로 표준 「주」를 사용.
- source_word: τραπέζης κυρίου
  english_pob_choice: table of the Lord
  chosen_korean: 주의 식탁
  lexicon: BDAG
  rationale: 성찬상을 가리키는 정형구. 「주의 식탁」이 한국어 표준 표현.
theological_decisions:
- issue: 10:21 κύριος의 가리킴 — 신약 성찬 문맥에서의 예수 그리스도
  chosen_reading: 주(主) — 여기서는 부활하신 그리스도(주 예수)
  alternative_readings:
  - 야훼(말 3:7 등 구약 제단 어휘의 배경을 고려할 경우)
  rationale: 신약 성찬 본문에서 κύριος는 예수 그리스도를 가리키는 칭호로 굳어져 있으며 11:23-27의 「주 예수」와도 일치한다. 다만 다음 절(10:22)의 「시기 자극」 어휘는 신 32:21 야훼-시기 사상을 분명히 반향하므로, 이 두 절은 신약의 「주」와 구약의 「야훼」가 그리스도 안에서 만나는 자리로 읽힌다.
  doctrine_reference: 'DOCTRINE.md: κύριος glossary; preserve covenantal echo without flattening'
