translation:
  language: es
  text: Un compañero y un amigo son útiles por un tiempo[a], pero mejor que ambos es una esposa[b] inteligente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por una temporada» / «en el momento oportuno». Tanto el hebreo לעת como el griego εἰς καιρόν implican la idea de tiempo, y el matiz exacto puede ser duración limitada o utilidad en el momento adecuado.
    reason: alternative_reading
  - marker: b
    text: El hebreo dice «mujer»; el paralelo griego apunta más específicamente a un sentido marital, de ahí «esposa».
    reason: lexical_alternative
lexical_decisions:
- source_word: עמית
  english_pob_choice: companion
  chosen_spanish: compañero
  alternatives_spanish:
  - compañera
  - asociado
  - prójimo
  lexicon: HALOT
  rationale: El hebreo designa a un asociado cercano o compañero. En español, «compañero» comunica mejor esa relación que «asociado», que suena más formal, o «prójimo», que es más general.
- source_word: רע
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - compañero
  - amigo cercano
  lexicon: HALOT
  rationale: En paralelo con עמית, aquí conviene distinguir el segundo término como «amigo», conservando dos vínculos relacionados pero no idénticos.
- source_word: לעת
  english_pob_choice: for a time
  chosen_spanish: por un tiempo
  alternatives_spanish:
  - por una temporada
  - a su tiempo
  - en el momento oportuno
  lexicon: HALOT
  rationale: La frase expresa temporalidad. «Por un tiempo» reproduce el sentido de duración limitada que apoyan tanto el hebreo como el griego εἰς καιρόν.
- source_word: ינהגו
  english_pob_choice: are useful
  chosen_spanish: son útiles
  alternatives_spanish:
  - se conducen
  - se comportan
  - sirven
  lexicon: HALOT
  rationale: El audit trail inglés optó por una lectura de utilidad temporal. En español, «son útiles» comunica esa idea de manera natural sin forzar el verbo hebreo.
- source_word: אשה
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar «mujer», el paralelo griego y el contexto sapiencial favorecen un sentido marital. «Esposa» preserva esa precisión en español.
- source_word: משכלת
  english_pob_choice: intelligent
  chosen_spanish: inteligente
  alternatives_spanish:
  - prudente
  - sensata
  - entendida
  lexicon: HALOT
  rationale: La forma comunica discernimiento práctico. «Inteligente» es claro y fiel; las otras opciones son viables, pero menos directas.
theological_decisions:
- issue: Valor marital de אשה frente a lectura genérica «mujer»
  english_pob_reading: wife
  chosen_spanish_reading: esposa
  alternative_spanish_readings:
  - mujer
  rationale: La decisión sigue el hebreo leído a la luz del paralelo griego, que orienta la referencia hacia una relación conyugal. No se trata de una imposición doctrinal sino de una precisión lexical-contextual.
  doctrine_reference: Principio de primacía de las fuentes originales con consulta de paralelos; exactitud léxica sobre neutralización innecesaria.
- issue: Relación comparativa del miembro final del versículo
  english_pob_reading: better than both
  chosen_spanish_reading: mejor que ambos
  alternative_spanish_readings:
  - más que ambos
  - superior a ambos
  rationale: El hebreo y el griego expresan comparación/superioridad. «Mejor que ambos» es la forma natural en español para preservar esa preferencia sin añadir interpretación.
  doctrine_reference: Comparación explícita del texto sapiencial.
translation_notes:
  revision_awareness: El inglés auditado pasó de «conduct themselves for a time» a «are useful for a time» para reflejar mejor el hebreo. La versión española sigue esa revisión y evita un calco verbal; también conserva la decisión contextual de leer אשה como «esposa» a partir del paralelo griego. El control cruzado indicó major-issues, así que se cuidó especialmente la comparación final y la temporalidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» o terminología cristológica ajena al contexto.
  - «Esposa» se usa por el paralelo hebreo-griego; no se neutraliza como «mujer».
  - La comparación final se expresa con «mejor que ambos» para un español natural y fiel.
