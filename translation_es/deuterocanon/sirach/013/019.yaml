translation:
  language: es
  text: La humildad le resulta detestable a la soberbia[a], y los pobres les resultan detestables a los ricos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio griego: "Los onagros son la presa de los leones en el desierto; así los pobres sirven de pasto a los ricos." El hebreo conservado aquí lee, en cambio: "La humildad le resulta detestable a la soberbia, y los pobres les resultan detestables a los ricos."'
    reason: alternative_reading
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: is abhorrent to
  chosen_spanish: es aborrecible para
  alternatives_spanish:
  - es una abominación para
  - es detestable para
  lexicon: HALOT
  rationale: El hebreo constructo תועבת X Y expresa una relación de repulsión o rechazo entre los términos. En español, 'aborrecible para' comunica esa fuerza sin cargar el texto con un tono exclusivamente cultual como 'abominación', y conserva la relación interpersonal/social del proverbio.
- source_word: גַּאֲוָה
  english_pob_choice: pride
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - arrogancia
  lexicon: HALOT
  rationale: El término hebreo puede abarcar orgullo o altivez. Aquí 'soberbia' funciona bien en contraste con 'humildad' y mantiene el matiz moral negativo que el proverbio exige. 'Orgullo' sería posible, pero en español puede sonar más amplio y menos marcado negativamente.
- source_word: עֲנָוָה
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - bajeza
  - mansedumbre
  lexicon: HALOT
  rationale: '''Humildad'' es la equivalencia más directa y natural para el abstracto hebreo. ''Mansedumbre'' estrecharía demasiado el sentido hacia docilidad, y ''bajeza'' resultaría más marcada o ambigua en español moderno.'
- source_word: עָשִׁיר
  english_pob_choice: the rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - el rico
  - los poderosos
  lexicon: HALOT
  rationale: Aunque el hebreo es singular genérico, el español requiere una clase representativa en plural para mantener el paralelismo con 'los pobres'. 'Los ricos' conserva el valor proverbial y la generalización social.
- source_word: אֶבְיוֹן
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - el pobre
  - los necesitados
  lexicon: HALOT
  rationale: El término designa a una persona pobre o necesitada. En el proverbio, el plural genérico 'los pobres' es el más natural en español y corresponde al sentido de clase social que el paralelo griego también apoya.
theological_decisions:
- issue: Prioridad del testimonio hebreo frente al paralelo griego, que ofrece una imagen distinta
  english_pob_reading: 'Translate the extant Hebrew directly: ''Humility is abhorrent to pride, and the poor are abhorrent to the rich.'' The Greek witness is preserved in a footnote as an alternative reading.'
  chosen_spanish_reading: 'Traducir directamente el hebreo conservado: ''La humildad es aborrecible para la soberbia, y los pobres son aborrecibles para los ricos.'' La lectura griega queda preservada en nota como variante significativa.'
  alternative_spanish_readings:
  - '''Los onagros son la presa de los leones en el desierto; así los pobres son el pasto de los ricos.'''
  rationale: La política del proyecto da primacía al hebreo cuando está conservado y tiene alta confianza. Aquí la diferencia entre hebreo y griego no es meramente estilística, sino que presenta un dicho distinto. Por eso el texto principal sigue el hebreo, mientras la variante griega se documenta para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como testimonio real y documentar la variante'
- issue: Cómo reflejar la fuerza moral de תועבה sin sobrerreligiosizar el dicho
  english_pob_reading: '''abhorrent to'' for a strong but non-technical relational revulsion'
  chosen_spanish_reading: '''aborrecible para'' para expresar rechazo fuerte sin convertir el dicho en lenguaje cultual rígido'
  alternative_spanish_readings:
  - '''abominación para'''
  - '''detestable para'''
  rationale: '''Aborrecible'' reproduce bien la idea de repulsión fuerte y mantiene el proverbio en un registro sapiencial claro. ''Abominación'' sería más tradicional pero también más técnico o cultual en español.'
  doctrine_reference: Uso léxico contextual de términos de reprobación moral en literatura sapiencial
translation_notes:
  revision_awareness: El último repaso marcó el texto como sin cambios necesarios; esta propuesta mantiene la prioridad del hebreo conservado y preserva en nota la variante griega significativa, en línea con el juicio de acuerdo mayoritario y sin introducir armonización artificial.
  spanish_consistency_notes:
  - Se mantiene 'humildad' / 'soberbia' como contraste moral explícito, siguiendo el hebreo y el paralelismo conceptual.
  - '''Los pobres'' y ''los ricos'' se usan como clases genéricas en plural para conservar el carácter proverbial del enunciado.'
  - La nota marca claramente la lectura griega sin incorporarla al texto principal, evitando mezclar dos proverbios distintos.
