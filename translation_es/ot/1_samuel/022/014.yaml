revisions:
- from: 'Ahimelec respondió al rey y dijo[a]: “¿Y quién entre todos tus esclavos es tan fiel como David, el yerno del rey, que tiene acceso a tu consejo[b], y es honrado en tu casa?”'
  to: 'Ahimelec respondió al rey y dijo: “¿Y quién entre todos tus siervos es tan fiel como David, el yerno del rey, que tiene acceso a tu consejo[a], y es honrado en tu casa[b]?”'
  rationale: Se cambia «esclavos» por «siervos» para reflejar mejor עֲבָדֶיךָ en un contexto de corte y para alinearse con el POB auditado («your servants»). Se reubica la nota léxica al lugar correcto, junto a «tu consejo», porque explica la cláusula וְסָר אֶל מִשְׁמַעְתֶּךָ. También se ajusta la nota cultural para que ancle explícitamente «tu casa», que es el elemento hebreo que puede significar casa real o corte.
