translation:
  language: es
  text: 'Entonces me dijo: «Hijo de hombre, recibe[a] en tu corazón todas mis palabras que yo te hablo, y oye con tus oídos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toma en tu corazón»; el verbo hebreo dice literalmente «toma», y aquí se usa para expresar la recepción interior de las palabras de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - hijo de Adán
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conserva la fórmula profética fija de Ezequiel y reproduce de manera natural en español la imagen idiomática del hebreo sin neutralizarla a una paráfrasis interpretativa.
- source_word: אֶת כָּל דְּבָרַי
  english_pob_choice: all my words
  chosen_spanish: todas mis palabras
  alternatives_spanish:
  - todas mis cosas dichas
  - todo lo que digo
  lexicon: HALOT
  rationale: ‘דְּבָרִים’ aquí se refiere a palabras concretas; ‘palabras’ mantiene la fuerza verbal del mandato y el objeto directo de la recepción interior.
- source_word: אֲדַבֵּר אֵלֶיךָ
  english_pob_choice: that I speak to you
  chosen_spanish: que yo te hablaré
  alternatives_spanish:
  - que yo te hablo
  - que yo te diré
  lexicon: HALOT
  rationale: En español, el futuro simple expresa bien la acción divina venidera dentro del encargo; evita una construcción más dura sin perder la continuidad del hablar de Dios.
- source_word: קַח
  english_pob_choice: receive
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - acoge
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente ‘tomar’. Dado que el texto amplía inmediatamente la idea con ‘en tu corazón’, ‘toma’ preserva mejor el verbo fuente; el sentido de apropiación interior queda aclarado por el contexto y por el segundo miembro del verso.
- source_word: בִּלְבָבְךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - dentro de tu corazón
  - en tu mente
  lexicon: HALOT
  rationale: ‘Corazón’ conserva la antropología bíblica del centro interno de pensamiento, voluntad y decisión; ‘mente’ estrecharía indebidamente el alcance del hebreo.
- source_word: וּבְאָזְנֶיךָ שְׁמָע
  english_pob_choice: and hear with your ears
  chosen_spanish: y óyelas con tus oídos
  alternatives_spanish:
  - y escucha con tus oídos
  - y oye con tus oídos
  lexicon: HALOT
  rationale: El hebreo es enfático y concreto con la mención de los oídos. En español, ‘óyelas con tus oídos’ resulta más natural que una repetición literal de ‘oír con los oídos’, pero mantiene la imagen corporal explícita.
theological_decisions:
- issue: Mantenimiento de la fórmula vocativa profética בֶּן אָדָם
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: Se preserva la forma tradicional-profética de Ezequiel sin introducir una lectura cristológica ajena al contexto inmediato. La expresión sigue funcionando como fórmula de addressa con valor representativo y humano.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; contested אָדָם in prophetic address'
- issue: Valor de קַח en el marco de la recepción interior de la palabra divina
  english_pob_reading: receive in your heart
  chosen_spanish_reading: toma en tu corazón
  alternative_spanish_readings:
  - recibe en tu corazón
  - acoge en tu corazón
  rationale: El hebreo usa ‘tomar’ de modo idiomático para una apropiación interior. Mantener ‘toma’ evita borrar la tensión léxica documentada, mientras ‘en tu corazón’ explicita el ámbito de interiorización.
  doctrine_reference: HALOT, nota lexical sobre קַח en este contexto
- issue: Reproducción del mandato final con oídos
  english_pob_reading: hear with your ears
  chosen_spanish_reading: óyelas con tus oídos
  alternative_spanish_readings:
  - oye con tus oídos
  - escucha con tus oídos
  rationale: La redundancia hebrea tiene valor enfático. En español, la formulación elegida conserva el paralelismo corporal sin sonar excesivamente calcada o artificial.
  doctrine_reference: Estilo retórico hebreo; énfasis corporal
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la cruzada de control reportó alta concordancia con observaciones menores, por lo que se mantiene la lectura base sin ajustes de fondo.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto sólo cuando el texto lo requiriera; en este versículo no aparece el nombre divino.
  - Se mantuvo un registro bíblico solemne, pero con sintaxis española natural.
  - Se evitó reemplazar el doble énfasis hebreo por una simple paráfrasis de ‘escuchar’ para no perder la concreción corporal del original.
