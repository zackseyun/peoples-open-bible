translation:
  language: es
  text: '«¿Quién es este que oculta el consejo[a] sin conocimiento?». Por tanto, he declarado lo que no entendía: cosas demasiado maravillosas para mí[b], que no sabía.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «¿Quién es este que oscurece el consejo sin conocimiento?». El hebreo de Job 42:3 usa aquí un verbo distinto del de Job 38:2.'
    reason: lexical_alternative
  - marker: b
    text: O «cosas más allá de mí» o «maravillas más allá de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֶה
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es este
  alternatives_spanish:
  - ¿Quién es él
  - ¿Quién es este hombre
  lexicon: HALOT
  rationale: Mantiene la fuerza interrogativa directa y la referencia retórica. '¿Quién es este?' es la opción más natural y cercana al hebreo en español.
- source_word: מַעְלִים
  english_pob_choice: hides
  chosen_spanish: oculta
  alternatives_spanish:
  - esconde
  - encubre
  - oscurece
  lexicon: HALOT
  rationale: El hebreo usa עלם en hifil, con idea de esconder o mantener oculto. 'Oculta' evita harmonizar con Job 38:2 y refleja mejor el verbo real del versículo.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - propósito
  - consejo sabio
  lexicon: HALOT
  rationale: '''Consejo'' conserva el campo semántico de sabiduría deliberativa y corresponde bien al uso bíblico de עֵצָה.'
- source_word: בְּלִי דָעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin conocimiento
  alternatives_spanish:
  - sin entendimiento
  - sin saber
  lexicon: HALOT
  rationale: '''Conocimiento'' reproduce directamente דַעַת y mantiene el contraste con la limitación humana.'
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Marca con claridad la inferencia de Job a partir de la reprensión divina, con tono formal y natural en español.
- source_word: הִגַּדְתִּי
  english_pob_choice: I have declared
  chosen_spanish: he declarado
  alternatives_spanish:
  - he hablado
  - he dicho
  lexicon: HALOT
  rationale: '''He declarado'' sigue de cerca el valor de נגד y evita una formulación demasiado débil o demasiado interpretativa.'
- source_word: וְלֹא אָבִין
  english_pob_choice: what I did not understand
  chosen_spanish: lo que no entendía
  alternatives_spanish:
  - lo que no comprendía
  - lo que no entendí
  lexicon: HALOT
  rationale: En contexto, el imperfecto expresa la falta de comprensión de Job respecto de lo que expresó; la construcción española fluye de manera natural sin añadir contraste no explícito.
- source_word: נִפְלָאוֹת
  english_pob_choice: things too wonderful
  chosen_spanish: cosas demasiado maravillosas
  alternatives_spanish:
  - maravillas
  - cosas maravillosas
  lexicon: HALOT
  rationale: '''Demasiado maravillosas'' conserva el matiz de exceder la capacidad humana, como en el inglés POB, y evita suavizar el alcance del término.'
- source_word: מִמֶּנִּי
  english_pob_choice: for me / beyond me
  chosen_spanish: para mí
  alternatives_spanish:
  - más allá de mí
  - fuera de mi alcance
  lexicon: HALOT
  rationale: 'Se mantiene la posibilidad idiomática ya preservada en el audit trail: la frase puede entenderse como ''para mí'' en una construcción natural, sin perder la nota de excedencia humana.'
- source_word: וְלֹא אֵדָע
  english_pob_choice: which I did not know
  chosen_spanish: que yo no conocía
  alternatives_spanish:
  - que no sabía
  - y no conocía
  lexicon: HALOT
  rationale: El español requiere una relativa explícita para unir la cláusula final con 'cosas'; 'conocía' comunica bien el imperfecto y la ignorancia persistente.
theological_decisions:
- issue: Relación con la frase tradicional de Job 38:2
  english_pob_reading: Render the wording actually present in 42:3 ('hides counsel') while preserving the more traditional 'darkens counsel' as an alternative note.
  chosen_spanish_reading: Traducir el hebreo real de Job 42:3 como 'oculta consejo', sin armonizarlo automáticamente con 'oscurece consejo'.
  alternative_spanish_readings:
  - oscurece consejo sin conocimiento
  - encubre consejo sin conocimiento
  rationale: El texto hebreo de 42:3 no repite el verbo de 38:2; por fidelidad al original y al principio de primacía del texto fuente, la versión española sigue el verbo real del versículo y deja constancia de la lectura tradicional como alternativa.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: en lugar de una paráfrasis con contraste explícito, se conserva una estructura más directa con ''he declarado lo que no entendía''. También se respeta la decisión de no armonizar Job 42:3 con Job 38:2, manteniendo el verbo hebreo real (''oculta'') y la cláusula final con ''cosas demasiado maravillosas para mí''.'
  spanish_consistency_notes:
  - Se prefiere 'Dios' como término general; aquí no aparece.
  - '''Consejo'' mantiene el campo semántico sapiencial y funciona mejor que ''plan'' en este contexto.'
  - La nota al pie recoge la alternativa tradicional sin invadir el texto principal.
  - Se evita 'SEÑOR' porque el versículo no contiene el tetragrámaton ni una cita directa que requiera esa convención.
