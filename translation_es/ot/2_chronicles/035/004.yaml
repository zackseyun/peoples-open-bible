    issue: 'Expresión poco natural: ''por casas de sus padres'''
    rationale: Aunque intenta reflejar לְבֵית אֲבוֹתֵיכֶם, en español suena torpe. 'Según las casas de sus padres' comunica mejor la organización por casas paternas sin perder fidelidad.
  - severity: medium
