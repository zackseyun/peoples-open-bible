translation:
  language: es
  text: Pero les perdonamos los yerros y los pecados hasta el día de hoy, y el tributo de la corona[a] que debían; y si alguna otra cosa se estaba cobrando en Jerusalén, que ya no se cobre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «la corona»; probablemente un gravamen o tributo debido a la corona.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφίεμεν
  english_pob_choice: we forgive
  chosen_spanish: perdonamos
  alternatives_spanish:
  - remitimos
  - liberamos
  - perdonamos y condonamos
  lexicon: BDAG
  rationale: El verbo griego abarca perdonar, remitir o liberar una obligación. En este decreto, el contexto es a la vez moral y fiscal; «perdonamos» mantiene esa amplitud en español sin reducirlo solo a una cancelación contable.
- source_word: ἀγνοήματα
  english_pob_choice: oversights
  chosen_spanish: yerros
  alternatives_spanish:
  - errores por ignorancia
  - faltas por inadvertencia
  - deslices
  lexicon: LSJ
  rationale: El término apunta a faltas cometidas por ignorancia o inadvertencia. «Yerros» conserva un registro digno y relativamente amplio, y deja espacio para distinguirlo de «pecados» en la cláusula paralela.
- source_word: ἁμαρτήματα
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - ofensas
  - faltas
  - malas acciones
  lexicon: BDAG
  rationale: ἁμαρτήματα es el término moral habitual para pecados o transgresiones. «Pecados» preserva esa fuerza moral-religiosa y la pareja con ἀγνοήματα.
- source_word: ἕως τῆς σήμερον ἡμέρας
  english_pob_choice: up to this present day
  chosen_spanish: hasta este día presente
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  - hasta el día de hoy
  lexicon: LSJ
  rationale: La frase delimita temporalmente la remisión. «Hasta este día presente» refleja el tono formal del decreto y mantiene la referencia al día en curso.
- source_word: στέφανον
  english_pob_choice: crown tax
  chosen_spanish: la corona
  alternatives_spanish:
  - el tributo de la corona
  - el impuesto real
  - la renta de la corona
  lexicon: LSJ
  rationale: Aunque literalmente significa «corona», el contexto administrativo sugiere un gravamen o deuda vinculada a la corona. Dado que el inglés POB preserva la tensión literal/administrativa con nota, en español se deja «la corona» en el texto principal para no cerrar prematuramente el sentido, y la nota explica la posible referencia fiscal.
- source_word: ὠφείλετε
  english_pob_choice: you owed
  chosen_spanish: debían
  alternatives_spanish:
  - debíais
  - estaban obligados a pagar
  - adeudaban
  lexicon: BDAG
  rationale: El imperfecto expresa una obligación pendiente. «Debían» suena natural en español jurídico y encaja con la cancelación de una deuda o carga.
- source_word: εἴ τι ἄλλο
  english_pob_choice: if anything else
  chosen_spanish: si alguna otra cosa
  alternatives_spanish:
  - si algo más
  - si cualquier otra cosa
  - si hubiera algo más
  lexicon: LSJ
  rationale: Introduce una categoría adicional de exacción. «Si alguna otra cosa» conserva la amplitud indeterminada del griego.
- source_word: ἐτελωνεῖτο
  english_pob_choice: was being levied
  chosen_spanish: se estaba cobrando
  alternatives_spanish:
  - se estaba gravando
  - se estaba imponiendo
  - se estaba recaudando
  lexicon: LSJ
  rationale: El verbo se relaciona con cobro de impuestos o derechos. «Se estaba cobrando» es natural en español y comunica una carga fiscal sin especificar más de lo que el texto dice.
- source_word: μηκέτι τελωνιζέσθω
  english_pob_choice: let it no longer be levied
  chosen_spanish: que ya no se cobre
  alternatives_spanish:
  - que ya no se grave
  - que ya no se recaude
  - que no se siga cobrando
  lexicon: LSJ
  rationale: La prohibición continúa el lenguaje de cobro. «Que ya no se cobre» conserva el tono formal de edicto y la voz impersonal pasiva implícita.
theological_decisions:
- issue: Mantener el doblete moral de ἀγνοήματα y ἁμαρτήματα en un contexto político-fiscal
  english_pob_reading: oversights and sins
  chosen_spanish_reading: yerros y pecados
  alternative_spanish_readings:
  - errores por ignorancia y pecados
  - faltas e ilícitos
  - deslices y pecados
  rationale: El griego distingue una falta menor por ignorancia de la categoría moral plena de pecado. «Yerros y pecados» preserva esa tensión en español sin colapsar ambas expresiones en un solo registro administrativo.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Tratar στέφανον como término con posible valor fiscal sin perder su sentido literal
  english_pob_reading: crown tax
  chosen_spanish_reading: la corona
  alternative_spanish_readings:
  - el tributo de la corona
  - el impuesto real
  - la corona (como tributo)
  rationale: El texto griego literalmente dice «la corona», pero el contexto indica una obligación monetaria o tributaria. Mantener la literalidad en el texto principal evita imponer una interpretación única; la nota explica la probable referencia a un gravamen real.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés, manteniendo la distinción entre ἀγνοήματα y ἁμαρτήματα y resolviendo στέφανον con literalidad en el cuerpo principal más una nota explicativa, conforme a la revisión marcada como sin cambios.
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» no aplica aquí; el versículo no contiene nombres divinos.
  - Se evitó «impuesto» en el texto principal para no cerrar indebidamente el valor de στέφανον; la nota preserva la alternativa fiscal.
  - 'La sintaxis conserva tono de decreto: coordinación de cláusulas, imperfectos de obligación/cobro y cierre prohibitivo impersonal.'
