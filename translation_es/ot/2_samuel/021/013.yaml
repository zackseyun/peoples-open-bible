translation:
  language: es
  text: Él subió de allí los huesos de Saúl y los huesos de Jonatán, su hijo,[a] y reunieron los huesos de los que habían sido empalados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los que habían sido expuestos». El hebreo se refiere a los hombres ejecutados cuyos cuerpos fueron exhibidos públicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: brought up
  chosen_spanish: hizo subir
  alternatives_spanish:
  - subió
  - hizo traer
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba o hacer subir. En este contexto de exhumación/traslado de restos, «hizo subir» conserva mejor la fuerza concreta del verbo que un simple «trajo», y evita suavizar la imagen de elevación/remoción.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: Es una expresión deíctica directa; «de allí» es natural en español y mantiene la referencia espacial sin añadir interpretación.
- source_word: עַצְמוֹת
  english_pob_choice: bones
  chosen_spanish: huesos
  alternatives_spanish:
  - restos
  - osamentas
  lexicon: HALOT
  rationale: El sustantivo significa literalmente «huesos». Se conserva esa precisión material, que también encaja con el lenguaje funerario del pasaje.
- source_word: יְהוֹנָתָן בְּנוֹ
  english_pob_choice: Jonathan his son
  chosen_spanish: Jonatán, su hijo
  alternatives_spanish:
  - su hijo Jonatán
  - Jonatán, el hijo de él
  lexicon: HALOT
  rationale: Se respeta la estructura apposicional del hebreo y se deja claro que Jonatán es hijo de Saúl. La coma ayuda a reproducir esa relación sin sobrecargar la frase.
- source_word: וַיַּאַסְפוּ
  english_pob_choice: they gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - recogieron
  - juntaron
  lexicon: HALOT
  rationale: La forma verbal es plural, y en español «reunieron» conserva el valor colectivo de recoger para sepultura. Evita la singularización indebida y suena natural en contexto funerario.
- source_word: הַמּוּקָעִים
  english_pob_choice: those who had been impaled
  chosen_spanish: los que habían sido empalados
  alternatives_spanish:
  - los que habían sido colgados
  - los expuestos en una estaca
  lexicon: HALOT
  rationale: El audit trail inglés revisó la lectura desde «hanged» a «impaled» para reflejar mejor el término de cuerpos expuestos en estacas/poles. «Empalados» preserva esa tensión semántica mejor que «colgados», aunque la nota deja abierta la alternativa de exposición pública.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la tradición inglesa desde «hanged» a «impaled». Por eso se optó por «empalados» en el texto principal y se mantuvo en nota la posibilidad de «expuestos», para conservar la amplitud semántica documentada en el expediente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Huesos» conserva la literalidad del hebreo y evita una generalización innecesaria a «restos».
  - La puntuación y el orden buscan reflejar el paralelismo hebreo sin sonar forzados en español.
