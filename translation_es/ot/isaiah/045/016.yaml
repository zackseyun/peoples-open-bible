translation:
  language: es
  text: Quedan avergonzados y también humillados, todos ellos juntos; los fabricantes de ídolos[a] quedan en ignominia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los fabricantes de imágenes».
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹשׁוּ
  english_pob_choice: are put to shame
  chosen_spanish: Serán avergonzados
  alternatives_spanish:
  - serán puestos en vergüenza
  - se avergonzarán
  lexicon: HALOT
  rationale: El verbo expresa vergüenza pública y deshonra; «serán avergonzados» conserva el pasivo/resultativo del hebreo y sigue de cerca la decisión inglesa sin sonar artificial en español.
- source_word: וְגַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y además
  - sí, incluso
  lexicon: HALOT
  rationale: La partícula añade énfasis coordinativo; «también» comunica la suma intensiva de forma natural en español.
- source_word: נִכְלְמוּ
  english_pob_choice: humiliated
  chosen_spanish: humillados
  alternatives_spanish:
  - avergonzados
  - avergonzados y humillados
  lexicon: HALOT
  rationale: El verbo intensifica la vergüenza del primer miembro. «Humillados» conserva esa escalada semántica y evita un término demasiado interpretativo.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - cada uno de ellos
  lexicon: HALOT
  rationale: Se explicita el sufijo pronominal y se mantiene el sentido colectivo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - todos juntos
  lexicon: HALOT
  rationale: Adverbio sencillo y natural en español; conserva la idea de un destino compartido.
- source_word: הָלְכוּ
  english_pob_choice: go
  chosen_spanish: irán
  alternatives_spanish:
  - van
  - han ido
  lexicon: HALOT
  rationale: Aunque el hebreo usa perfecto profético, el español futuro expresa adecuadamente la certeza declarativa y mantiene el movimiento hacia un estado de ignominia.
- source_word: בַכְּלִמָּה
  english_pob_choice: in disgrace
  chosen_spanish: en ignominia
  alternatives_spanish:
  - en vergüenza
  - en deshonra
  - en oprobio
  lexicon: HALOT
  rationale: El sustantivo comunica vergüenza/deshonra pública; «ignominia» conserva el peso formal y evita repetir exactamente la misma raíz semántica que ya apareció en la primera cola.
- source_word: חָרָשֵׁי
  english_pob_choice: makers of
  chosen_spanish: los fabricantes de
  alternatives_spanish:
  - los hacedores de
  - los artesanos de
  - los artífices de
  lexicon: HALOT
  rationale: En contexto de idolatría, el término designa a quienes producen los objetos cultuales. «Fabricantes de» es claro y directo para el lector moderno.
- source_word: צִירִים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - figuras
  lexicon: HALOT
  rationale: El contexto polémico de Isaías 45 apunta a objetos idolátricos; «ídolos» explicita el referente que la traducción inglesa ya decidió aclarar.
theological_decisions:
- issue: Referente de חָרָשֵׁי צִירִים
  english_pob_reading: the phrase refers to idol-makers
  chosen_spanish_reading: la frase se refiere a quienes fabrican ídolos
  alternative_spanish_readings:
  - fabricantes de imágenes
  - artesanos de ídolos
  rationale: El verso forma parte de la denuncia contra la idolatría en Isaías 45. Traducir el objeto como «ídolos» hace explícito el blanco de la reprensión sin introducir contenido ajeno al texto.
  doctrine_reference: Isaías 45:16; polémica bíblica contra la idolatría
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el audit trail inglés más reciente, que ajustó וְגַם de «even» a «also». En español se reflejó con «también» para conservar el valor aditivo sin exageración. También se mantuvo la decisión interpretativa de entender חָרָשֵׁי צִירִים como fabricantes de ídolos, con una nota alternativa para «imágenes».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto hebreo de Isaías 45:16.
  - Se evita «Cristo/Mesías» por no ser pertinente aquí.
  - Se conserva el paralelismo semántico entre vergüenza/humillación/ignominia sin fusionar indebidamente los términos hebreos.
  - 'El orden sintáctico español sigue la progresión del hebreo y la versión inglesa auditada: vergüenza → humillación → todos juntos → camino en ignominia.'
