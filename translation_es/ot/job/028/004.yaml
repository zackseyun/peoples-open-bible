revisions:
- from: Él abre una galería[a] lejos de donde habita la gente; olvidada por el pie, cuelga lejos de los hombres[b], se balancea[c].
  to: Él abre una galería[a] lejos de donde habita la gente; olvidados por el pie[b], cuelgan lejos de los hombres[c], se balancean.
  rationale: La revisión corrige la discordancia principal con el hebreo y con la POB inglesa al restaurar el plural en la segunda mitad del verso. Así se conserva mejor la escena minera de personas suspendidas por cuerdas, se mejora la fluidez del español, y las notas vuelven a corresponder directamente al texto. Se deja intacta la elección 'galería' y la nota de alternativa para נחל, porque esa decisión contextual es razonable y bien documentada.
  reviewer_model: gpt-5.4
