translation:
  language: es
  text: Pero no contó a Leví y Benjamín entre ellos, porque la orden[a] del rey era detestable para Joab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la palabra del rey era aborrecible para Joab». El hebreo דָּבָר puede significar «palabra» o «mandato/orden» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֵוִי
  english_pob_choice: But Levi
  chosen_spanish: Pero Leví
  alternatives_spanish:
  - Y Leví
  - Asá como para Leví
  lexicon: HALOT
  rationale: El hebreo introduce una contraposición con la mención previa del censo; en español, «Pero» preserva ese giro mejor que una simple coordinación. Se mantiene el nombre propio en forma usual «Leví».
- source_word: וּ/בִנְיָמִן
  english_pob_choice: and Benjamin
  chosen_spanish: y Benjamín
  alternatives_spanish:
  - e Benjamín
  lexicon: HALOT
  rationale: Nombre propio tribal transliterado en forma natural y reconocible en español.
- source_word: לֹ֥א פָקַ֖ד
  english_pob_choice: did not count
  chosen_spanish: no contó
  alternatives_spanish:
  - no numeró
  - no registró
  - no pasó revista a
  lexicon: HALOT
  rationale: En contexto de censo, פקד tiene el sentido de contar o numerar. «Contó» es claro y fiel al uso inmediato, sin perder el matiz censal.
- source_word: בְּ/תוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - con ellos
  lexicon: HALOT
  rationale: La expresión indica inclusión dentro del grupo contabilizado. «Entre ellos» reproduce bien esa relación grupal en español natural.
- source_word: נִתְעַב
  english_pob_choice: was detestable
  chosen_spanish: le resultó detestable
  alternatives_spanish:
  - fue detestable
  - le pareció abominable
  - le fue aborrecible
  lexicon: HALOT
  rationale: El Niphal expresa que el asunto fue considerado repulsivo/abominable. En español, la construcción con «le resultó» comunica el efecto sobre Joab sin imponer una formulación demasiado dura o artificial.
- source_word: דְּבַר הַמֶּלֶךְ
  english_pob_choice: the king’s command
  chosen_spanish: la palabra del rey
  alternatives_spanish:
  - la orden del rey
  - el mandato del rey
  - el asunto del rey
  lexicon: HALOT
  rationale: דבר puede significar «palabra», «asunto» o «mandato». El texto hebreo, junto con la nota inglesa, conserva la tensión entre «palabra» y «comando». Se eligió «la palabra del rey» para reflejar más de cerca el hebreo, sin excluir que se trate del mandato real.
- source_word: אֶת יוֹאָב
  english_pob_choice: to Joab
  chosen_spanish: a Joab
  alternatives_spanish:
  - ante Joab
  - para Joab
  lexicon: HALOT
  rationale: La preposición־marcador con este verbo expresa al afectado por la valoración. En español, «a Joab» comunica de manera natural que fue Joab quien lo consideró detestable.
theological_decisions:
- issue: Tensión entre «palabra del rey» y «mandato del rey»
  english_pob_reading: the king’s command was detestable to Joab / Or 'the king’s word was abhorrent to Joab.'
  chosen_spanish_reading: la palabra del rey le resultó detestable a Joab
  alternative_spanish_readings:
  - la orden del rey le resultó detestable a Joab
  - la palabra del rey fue aborrecible para Joab
  rationale: Se preserva la ambigüedad documentada por el POB inglés entre «word» y «command». La formulación elegida permite leer el hebreo de manera más cercana, mientras que las alternativas registran el matiz de orden/mandato que el contexto favorece.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión revisa el borrador en favor de una correspondencia más directa con el hebreo en דְּבַר הַמֶּלֶךְ, manteniendo la nota de ambigüedad que el auditable inglés ya documenta. También ajusta la causalidad y la valoración para sonar natural en español sin perder la fuerza negativa del original.
  spanish_consistency_notes:
  - Se conserva «Leví» y «Benjamín» como nombres tribales usuales en español.
  - Se evita sustituir sistemáticamente por «SEÑOR» o por una paráfrasis doctrinal ajena al versículo.
  - Se mantiene un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - La nota al pie se ancla en la frase «a Joab» para señalar la alternativa léxica documentada.
