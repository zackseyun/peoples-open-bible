translation:
  language: es
  text: Ellos hablarán del poder de tus obras asombrosas[a][b], y yo contaré tu grandeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus obras temibles» o «tus obras que inspiran reverente temor». El hebreo se refiere a acciones que evocan temor reverente y asombro.
    reason: lexical_alternative
  - marker: b
    text: O «tus grandes obras». El término hebreo puede denotar tanto la grandeza en sentido abstracto como las grandes cosas que Dios ha hecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶ/עֱז֣וּז
  english_pob_choice: the might of
  chosen_spanish: la fuerza de
  alternatives_spanish:
  - el poder de
  - la grandeza de
  - la fuerza de tus
  lexicon: HALOT
  rationale: עֱזוּז expresa fuerza, poder o vigor. En español, «la fuerza de» conserva la relación posesiva/constructiva y suena natural en el registro poético, sin perder la idea de capacidad poderosa.
- source_word: נוֹרְאֹתֶ֣י/ךָ
  english_pob_choice: your awesome deeds
  chosen_spanish: tus hechos asombrosos
  alternatives_spanish:
  - tus obras temibles
  - tus actos temibles
  - tus hechos que inspiran reverente temor
  lexicon: HALOT
  rationale: La forma hebrea alude a acciones que provocan temor reverente y asombro. «Hechos asombrosos» comunica bien ese valor en español moderno; «temibles» sería más literal pero puede sonar demasiado negativo o arcaico.
- source_word: יֹאמֵ֑רוּ
  english_pob_choice: they will speak
  chosen_spanish: hablarán
  alternatives_spanish:
  - dirán
  - proclamarán
  lexicon: HALOT
  rationale: El imperfecto plural sugiere una acción futura o habitual de alabanza. «Hablarán» encaja naturalmente con el complemento directo y mantiene el paralelismo del verso.
- source_word: ו/גדולתי/ך
  english_pob_choice: your greatness
  chosen_spanish: tu grandeza
  alternatives_spanish:
  - tus grandes obras
  - tu majestad
  - tu grandeza
  lexicon: HALOT
  rationale: El sustantivo puede referirse a grandeza o a grandes hechos. «Tu grandeza» preserva la abstracción poética y permite la misma amplitud semántica que el hebreo, sin imponer solo la idea de «obras».
- source_word: אֲסַפְּרֶֽ/נָּה
  english_pob_choice: I will recount
  chosen_spanish: contaré
  alternatives_spanish:
  - relataré
  - narraré
  - contaré
  lexicon: HALOT
  rationale: ספר en piel significa contar, relatar o narrar. «Contaré» transmite la acción declarativa de forma clara y fluida en español, y funciona bien en contraste con el plural «ellos hablarán».
translation_notes:
  revision_awareness: 'Coincide con el estado de alta concordancia del audit trail inglés; no se registran revisiones aplicadas en la fuente inglesa reciente. La redacción española sigue la misma decisión de fondo: ‘might’ + ‘awesome deeds’ y un verbo de proclamación en primera/tercera persona paralela.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo del verso: tercera persona plural («Ellos hablarán») seguida de primera persona singular («yo contaré»).'
  - Se evita traducir נוֹרְאֹתֶ֣י/ךָ con un término puramente técnico como «temibles» en el texto principal para mantener legibilidad, pero se deja la alternativa en nota.
  - «Grandeza» mantiene la apertura semántica de גדלות mejor que una reducción exclusiva a «grandes obras».
