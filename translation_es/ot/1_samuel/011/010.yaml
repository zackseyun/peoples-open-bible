  to: 'Entonces los hombres de Jabes dijeron[a]: «Mañana saldremos a encontrarnos con ustedes, y podrán hacer con nosotros según todo lo que les parezca bueno».'
  rationale: 'Se ajusta el español para que suene natural y fiel al hebreo auditado: «saldremos a encontrarnos con ustedes» conserva el verbo de salida sin convertirlo en «rendirse»; «podrán hacer con nosotros» refleja mejor el matiz permisivo reconocido por el POB inglés; y «según todo lo que les parezca bueno» transmite el idiomatismo «bueno en sus ojos» de forma clara y digna en español. La nota se corrige para ofrecer una alternativa real y mantener la observación de que la rendición es implícita, no explícita.'
