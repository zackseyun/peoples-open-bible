  verdict: revise
  source_alignment_summary: 'El hebreo ordena que la comunidad tenga instrumentos y medidas comerciales caracterizados por צֶדֶק en sentido de equidad/exactitud: ''balanzas'', ''efa'' y ''bat'', con fuerza directiva en יְהִי לָכֶם. El borrador capta el mandato general, pero ''Tendrán'' suena más predictivo que prescriptivo, y ''de justicia'' resulta menos natural en español para medidas comerciales que ''justas'' o ''exactas''.'
  spanish_quality_summary: El borrador es comprensible, pero necesita pulido para un español bíblico natural y digno. 'balanzas de justicia, efa de justicia y bato de justicia' suena rígido y poco idiomático. Además, la nota sobre 'balanza' no ayuda al lector común, mientras que falta una nota separada y clara para 'efa' y 'bat'.
  glossary_alignment: No hay conflicto con terminología teológica mayor. La transliteración de אֵיפָה como 'efa' es adecuada. Para בַּת, la forma más fiel y reconocible en español bíblico es 'bat', no 'bato', ya que 'bato' introduce una adaptación innecesaria y potencialmente confusa. La mejor equivalencia de צֶדֶק aquí es 'justas' por contexto comercial/legal.
  issues:
  - severity: high
    issue: '''bato'' para בַּת'
    rationale: La unidad hebrea suele transliterarse 'bat' en español; 'bato' no es la forma bíblica estándar y puede sonar impropia o confusa.
  - severity: medium
    issue: '''de justicia'' para צֶדֶק en los tres sintagmas'
    rationale: Aunque intenta preservar el sustantivo hebreo, en español produce una expresión poco natural. En este contexto de pesos y medidas, 'justas' comunica mejor la equidad/exactitud exigida por el original.
  - severity: medium
    issue: '''Tendrán'' para יְהִי לָכֶם'
    rationale: Puede leerse como futuro simple descriptivo. 'Deben tener' o 'Han de tener' expresa con mayor claridad la fuerza normativa del jussivo.
  - severity: low
    issue: Notas al pie desalineadas con la evidencia inglesa
    rationale: La nota sobre 'balanzas' enfatiza un detalle morfológico poco útil al lector, mientras que conviene conservar notas culturales separadas para 'efa' y 'bat', y opcionalmente una nota léxica sobre 'justas'/'de justicia'.
