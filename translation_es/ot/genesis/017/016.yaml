- from: Yo la bendeciré[a], y además te daré por ella un hijo. La bendeciré, y ella vendrá a ser naciones[b]; de ella saldrán reyes de pueblos.
  to: Yo la bendeciré[a], y además te daré un hijo por medio de ella. La bendeciré, y ella vendrá a ser naciones[b]; de ella saldrán reyes de pueblos.
  rationale: Se mantiene la fidelidad al hebreo y a las decisiones del POB, pero se sustituye «por ella» por «por medio de ella» para lograr un español más natural y preciso. También se corrige la nota [b] para que funcione como verdadera alternativa de formulación, en línea con la auditoría inglesa.
