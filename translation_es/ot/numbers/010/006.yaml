translation:
  language: es
  text: Cuando toquen una segunda señal de alarma[a], los campamentos acampados al sur se pondrán en marcha; se tocará una señal de alarma para sus partidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toque de alarma' o 'señal'. El hebreo תְּרוּעָה se refiere aquí a un toque distintivo de trompeta usado para dirigir el desplazamiento de los campamentos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְקַעְתֶּם
  english_pob_choice: when you blow
  chosen_spanish: cuando toquen
  alternatives_spanish:
  - cuando soplen
  - cuando hagan sonar
  lexicon: HALOT
  rationale: תקע en este contexto se refiere al toque de trompeta o cuerno. En español, 'tocar' o 'hacer sonar' comunica mejor la acción instrumental que 'soplar', sin perder el valor de instrucción secuencial del hebreo/inglés.
- source_word: תְּרוּעָה
  english_pob_choice: alarm
  chosen_spanish: alarma
  alternatives_spanish:
  - toque
  - señal
  - sonido de alarma
  lexicon: HALOT
  rationale: La POB inglesa tomó תְּרוּעָה como una señal distintiva de trompeta, no como mero ruido. 'Alarma' conserva el carácter de señal aguda y direccional, aunque en español puede sonar algo moderno; por eso se mantiene el matiz funcional de llamada a la acción.
- source_word: שֵׁנִית
  english_pob_choice: second
  chosen_spanish: segunda
  alternatives_spanish:
  - otra
  - por segunda vez
  lexicon: HALOT
  rationale: Es un ordinal que modifica a תְּרוּעָה. 'Segunda' reproduce con naturalidad la relación ordinal en español.
- source_word: וְנָסְעוּ
  english_pob_choice: shall set out
  chosen_spanish: se pondrán en marcha
  alternatives_spanish:
  - saldrán
  - se encaminarán
  - partirán
  lexicon: HALOT
  rationale: נסע en contexto de campamento implica levantar el campamento e iniciar la marcha. 'Se pondrán en marcha' comunica bien la acción de salida sin añadir metáforas ajenas.
- source_word: הַמַּחֲנוֹת
  english_pob_choice: the camps
  chosen_spanish: los campamentos
  alternatives_spanish:
  - las campamentos
  - las tropas
  lexicon: HALOT
  rationale: מחנות son los agrupamientos campamentales de Israel. 'Campamentos' es natural en español y mantiene el sentido plural colectivo.
- source_word: הַחֹנִים
  english_pob_choice: that are encamped
  chosen_spanish: que están acampados
  alternatives_spanish:
  - acampados
  - que acampan
  lexicon: HALOT
  rationale: El participio describe estado/posición. 'Que están acampados' conserva esa cualidad descriptiva y suena claro en español.
- source_word: תֵּימָנָה
  english_pob_choice: on the south side
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - en el lado sur
  lexicon: HALOT
  rationale: El término direccional marca localización. 'Al sur' es breve y natural; la idea de lado o posición queda implícita en el contexto.
- source_word: תְּרוּעָה יִתְקְעוּ
  english_pob_choice: an alarm shall be blown
  chosen_spanish: se tocará una alarma
  alternatives_spanish:
  - se hará sonar una señal
  - se tocará un toque de alarma
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza el instrumento/señal prescrita y usa una forma verbal pasiva/impersonal. 'Se tocará una alarma' reproduce bien ese valor sin obligar a especificar un sujeto humano.
- source_word: לְמַסְעֵיהֶם
  english_pob_choice: for their departures
  chosen_spanish: para sus partidas
  alternatives_spanish:
  - para sus salidas
  - para su marcha
  - para sus viajes
  lexicon: HALOT
  rationale: מסע aquí es el acto de partir o levantar el campamento. 'Partidas' es conciso y refleja el plural de eventos de salida mejor que 'viajes', que sería más amplio.
translation_notes:
  revision_awareness: 'La POB inglesa revisó la cláusula final desde una forma activa (''they shall blow an alarm'') a una pasiva más fiel al hebreo (''an alarm shall be blown''). La versión española adopta una impersonal pasiva con ''se tocará una alarma'' para reflejar ese mismo ajuste. También se mantuvo la secuencia instruccional del versículo: toque, salida de los campamentos del sur y señal para las partidas.'
  spanish_consistency_notes:
  - Se conserva 'alarma' para תְּרוּעָה, conforme al audit trail inglés, aunque en español bíblico podría esperarse 'toque' o 'señal'.
  - Se prefirió 'campamentos' para הַמַּחֲנוֹת por claridad y porque el plural colectivo se entiende bien en español.
  - La pasiva impersonal 'se tocará' mantiene la falta de sujeto explícito del hebreo en la cláusula final.
