  - severity: low
    issue: Uso de «he aquí» en posición parentética
    rationale: Preserva הִנָּם, pero «he aquí» entre comas suena rígido en español contemporáneo. Puede omitirse sin pérdida material, o integrarse de forma más idiomática. Dado el estilo meta, la omisión mejora legibilidad.
  - severity: low
    issue: Relativo «los cuales están incluidos» algo pesado
    rationale: «Que están incluidos» expresa la misma relación de manera más natural en español general y eclesial.
