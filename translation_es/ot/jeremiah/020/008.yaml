translation:
  language: es
  text: 'Porque cada vez que hablo, grito; proclamo: «¡Violencia y destrucción!». Porque la palabra de Yahvé ha sido para mí un reproche y un escarnio todo el día.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִדֵּי
  english_pob_choice: whenever
  chosen_spanish: cada vez que
  alternatives_spanish:
  - siempre que
  - cuandoquiera que
  lexicon: HALOT
  rationale: La construcción idiomática expresa repetición. «Cada vez que» comunica bien el valor iterativo en español natural y conserva la idea de ocurrencia recurrente sin forzar el texto.
- source_word: אֲדַבֵּר
  english_pob_choice: I speak
  chosen_spanish: hablo
  alternatives_spanish:
  - estoy hablando
  - hable
  lexicon: HALOT
  rationale: 'El imperfecto en contexto iterativo se entiende mejor como presente habitual en español: «hablo». Mantiene la acción repetida sin añadir matices irreales.'
- source_word: אֶזְעָק
  english_pob_choice: I cry out
  chosen_spanish: grito
  alternatives_spanish:
  - clamo
  - grito en voz alta
  lexicon: HALOT
  rationale: זעק denota un grito fuerte o un clamor. «Grito» conserva la intensidad de manera directa y clara en español.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - injusticia violenta
  - abuso
  lexicon: HALOT
  rationale: «Violencia» es la equivalencia más estable y directa para חָמָס en este contexto profético.
- source_word: שֹׁד
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - devastación
  lexicon: HALOT
  rationale: El par con חָמָס pide un término fuerte y general. «Destrucción» refleja היטב la devastación anunciada sin estrechar el sentido a botín o saqueo.
- source_word: אֶקְרָא
  english_pob_choice: I proclaim
  chosen_spanish: proclamo
  alternatives_spanish:
  - anuncio
  - clamo
  lexicon: HALOT
  rationale: Aquí קרא introduce el contenido de la denuncia pronunciada públicamente. «Proclamo» distingue este verbo del «grito» anterior y reproduce bien la función anunciadora.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética estándar y el nombre divino según la convención POB española: «Yahvé».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal del POB de transliterar el Tetragrámaton como «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: לְחֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: reproche
  alternatives_spanish:
  - afrenta
  - deshonra
  - vergüenza
  lexicon: HALOT
  rationale: «Reproche» conserva tanto la idea de oprobio como la posibilidad de abuso verbal implícita en el contexto.
- source_word: וּלְקֶלֶס
  english_pob_choice: a derision
  chosen_spanish: burla
  alternatives_spanish:
  - escarnio
  - ridículo
  - mofa
  lexicon: HALOT
  rationale: קֶלֶס se refiere al trato burlón o derisorio. «Burla» es natural en español y mantiene el tono de desprecio público.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  - constantemente
  lexicon: HALOT
  rationale: La locución indica duración continua. «Todo el día» es idiomática y fiel al valor temporal del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La base auditada del POB exige conservar el nombre propio divino. En español, «Yahvé» sigue la convención del proyecto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando el marcador de nota no anclado. La versión española mantiene el valor iterativo de מִדֵּי, distingue entre el grito y la proclamación, y conserva el nombre divino como Yahvé, en línea con la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se mantiene un registro profético solemne, sin arcaísmos innecesarios.
  - «Yahvé» se usa de manera consistente para יְהוָה.
  - «Proclamo» se reserva para אֶקְרָא para diferenciarlo de «grito» en אֶזְעָק.
  - 'La puntuación reproduce la estructura retórica del hebreo: dos miembros con «Porque», seguidos de la cita directa.'
