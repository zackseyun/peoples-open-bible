revisions:
- from: 'Ahora la palabra de Yahvé había venido a Jeremías, mientras estaba confinado en el patio[a] de la guardia, diciendo:'
  to: 'Ahora la palabra de Yahvé había llegado a Jeremías mientras estaba confinado en el patio de la guardia[a], diciendo:'
  rationale: Se ajusta la fórmula profética a un español más natural y fiel funcionalmente («había llegado» en lugar de «había venido»), y se reemplaza una nota redundante por una que sí preserve alternativas significativas del expediente inglés y del hebreo para la ubicación.
