revisions:
- from: 'Pero yo les dije: «Ustedes heredarán[a] su tierra, y yo mismo se la daré para poseerla, una tierra que fluye leche y miel. Yo soy Yahvé, su Dios, que los he separado[b] de los pueblos».'
  to: 'Pero yo les dije: «Ustedes poseerán[a] su tierra, y yo mismo se la daré para poseerla: una tierra que mana[b] leche y miel. Yo soy Yahvé[c], su Dios, que los he separado[d] de los pueblos».'
  rationale: Se ajustó יָרַשׁ a la prioridad léxica documentada del POB, usando «poseerán» en el texto principal y dejando «heredarán» como alternativa en nota. Se reparó el modismo hebreo en español con «mana leche y miel», que es natural y fiel. También se restauraron las notas del expediente inglés para el modismo, el nombre divino y la alternativa «apartado», con anclajes únicos en el texto.
  reviewer_model: gpt-5.4
