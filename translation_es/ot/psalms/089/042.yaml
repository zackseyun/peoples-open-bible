    text: 'O: «Todos los transeúntes lo han despojado». La expresión hebrea es literalmente «todos los que pasan por el camino».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la preposición a un español más natural y fiel en contexto («oprobio a sus vecinos») y se reescribe la nota para reflejar con claridad la alternativa auditada y la literalidad hebrea sin calcos defectuosos. No hay cambio doctrinal ni de sentido principal.
