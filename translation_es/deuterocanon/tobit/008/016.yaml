translation:
  language: es
  text: 'Y Ragüel bendijo a Dios, diciendo: «Bendito eres tú, oh Dios, con toda bendición; y que tus seres santos[a] te bendigan, y todas tus criaturas[b]; que todos tus ángeles y tus escogidos[c] te bendigan para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “tus santos”.
    reason: lexical_alternative
  - marker: b
    text: O “toda tu creación” para “todas tus criaturas”.
    reason: lexical_alternative
  - marker: c
    text: O “tus elegidos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - bendijo con palabras de bendición
  lexicon: BDAG
  rationale: El verbo introduce una acción de bendecir dirigida a Dios y conviene conservar la raíz 'bendec-' para mantener el paralelismo con εὐλογητὸς y εὐλογείτωσάν al final del versículo.
- source_word: Εὐλογητὸς εἶ σὺ
  english_pob_choice: Blessed are you
  chosen_spanish: Bendito eres tú
  alternatives_spanish:
  - Bendecido eres tú
  - Sea bendito tú
  lexicon: BDAG
  rationale: Es una fórmula doxológica directa. 'Bendito eres tú' es natural en español y mantiene el sentido de proclamación de bendición, sin volverla una petición ni una mera descripción.
- source_word: ἐν πάσῃ εὐλογίᾳ
  english_pob_choice: with every blessing
  chosen_spanish: con toda bendición
  alternatives_spanish:
  - en toda bendición
  - con cada bendición
  lexicon: BDAG
  rationale: La preposición ἐν aquí tiene valor idiomático. 'Con toda bendición' comunica bien la totalidad de la bendición sin sonar forzado en español.
- source_word: οἱ ἅγιοί σου
  english_pob_choice: your holy ones
  chosen_spanish: tus santos
  alternatives_spanish:
  - tus santos de Dios
  - tus seres santos
  lexicon: BDAG
  rationale: En español bíblico, 'santos' es la manera más transparente de expresar οἱ ἅγιοι. Conserva la amplitud del término sin decidir si se trata de seres celestiales o del pueblo fiel.
- source_word: πᾶσαι αἱ κτίσεις σου
  english_pob_choice: all your creatures
  chosen_spanish: todas tus criaturas
  alternatives_spanish:
  - toda tu creación
  - todos los seres creados por ti
  lexicon: BDAG
  rationale: El plural κτίσεις se refleja mejor en plural español. 'Criaturas' preserva el énfasis en los seres creados, como en la elección inglesa, y evita nivelar el plural a un singular colectivo.
- source_word: οἱ ἐκλεκτοί σου
  english_pob_choice: your chosen ones
  chosen_spanish: tus escogidos
  alternatives_spanish:
  - tus elegidos
  - tus electos
  lexicon: BDAG
  rationale: '''Escogidos'' es un equivalente natural y bíblico en español. Evita cargar el texto con una terminología más técnica como ''los elegidos'' cuando el griego solo expresa el participio sustantivado.'
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre
  lexicon: BDAG
  rationale: En esta doxología, 'para siempre' es la forma española más clara y natural para expresar duración indefinida y perpetua.
theological_decisions:
- issue: Alcance de 'tus santos' y 'tus escogidos' en una lista doxológica junto con los ángeles
  english_pob_reading: Retain the broad terms 'holy ones' and 'chosen ones' without specifying whether they are human righteous, heavenly beings, or both.
  chosen_spanish_reading: Conservar 'tus santos' y 'tus escogidos' sin precisar si son seres celestiales, humanos justos o ambos.
  alternative_spanish_readings:
  - Interpretar ambos grupos como ángeles
  - Interpretar uno o ambos como el pueblo fiel de Dios
  rationale: El griego no define explícitamente a estos grupos, y el versículo ya menciona a los ángeles por separado. La traducción española mantiene esa apertura en lugar de resolverla con una identificación doctrinal no explicitada por el texto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla
- issue: Orden y fuerza de la bendición final dirigida a las criaturas, ángeles y escogidos
  english_pob_reading: May all your angels and your chosen ones bless you forever.
  chosen_spanish_reading: Que todos tus ángeles y tus escogidos te bendigan para siempre.
  alternative_spanish_readings:
  - Que tus ángeles y tus escogidos te bendigan por siempre
  - Bendigan tus ángeles y tus escogidos para siempre
  rationale: El modo de subjuntivo exhortativo conserva el valor volitivo del griego εὐλογείτωσαν y suena natural en español litúrgico, manteniendo la dirección hacia Dios sin convertirlo en simple deseo impersonal.
  doctrine_reference: Respeto a la forma exhortativa del texto griego
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al omitir cualquier cuantificador adicional antes de 'tus santos', ya que el griego no tiene πᾶσαι aplicado a οἱ ἅγιοί σου. También conserva el paralelismo de bendición con 'bendijo / Bendito / bendigan'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' sin sustituirlo por un título enmascarado.
  - Se usa 'tus escogidos' en lugar de 'tus electos' para un registro bíblico claro y contemporáneo.
  - Se evita traducir 'holy ones' como 'santos' con carga exclusivamente eclesial; aquí funciona como término amplio del LXX.
  - Se preserva 'todas tus criaturas' en plural para reflejar κτίσεις.
  - El nombre propio aparece como 'Ragüel', en adaptación habitual al español.
