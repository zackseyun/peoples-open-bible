revisions:
- from: 'Y le habló[a]: «Así dice Yahvé: Porque has enviado mensajeros para consultar a Baal-zebub, dios de Ecrón, ¿acaso no hay Dios en Israel para consultar su palabra? Por tanto, no bajarás de la cama a la que subiste allí[c][b], porque ciertamente morirás».'
  to: 'Y le habló a él: «Así dice Yahvé: Porque has enviado mensajeros para consultar a Baal-zebub,[b] dios de Ecrón, ¿acaso no hay Dios en Israel para consultar su palabra?[a] Por tanto, no bajarás del lecho al que subiste,[c] porque ciertamente morirás».'
  rationale: Se corrigió el inicio a «Y le habló a él» para reflejar explícitamente אֵלָיו y conservar la distinción entre «habló» y la fórmula posterior «Así dice». Se trasladó la nota principal a «su palabra», que es donde el hebreo presenta la dificultad léxica documentada. Se suavizó «la cama a la que subiste allí» a «del lecho al que subiste», dejando «allí» en nota por fidelidad al hebreo y al historial de alternativas. También se prefirió «lecho» por mejor registro literario sin pérdida de sentido.
