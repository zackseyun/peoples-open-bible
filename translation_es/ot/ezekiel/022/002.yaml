translation:
  language: es
  text: Y tú, hijo de hombre, ¿juzgarás, juzgarás a la ciudad sangrienta[a]? Y hazle saber todas sus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad de sangre derramada» o «la ciudad culpable de sangre»; el hebreo literalmente dice «la ciudad de sangres».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - hombre mortal
  - ser humano
  - hijo de humano
  lexicon: HALOT
  rationale: La forma profética fija se conserva con una equivalencia idiomática natural en español. «Hijo de hombre» mantiene la repetición característica de Ezequiel y refleja la dirección auditable del inglés POB sin convertirla en una paráfrasis genérica.
- source_word: הֲתִשְׁפֹּט הֲתִשְׁפֹּט
  english_pob_choice: will you judge, will you judge
  chosen_spanish: ¿juzgarás, juzgarás?
  alternatives_spanish:
  - ¿vas a juzgar, vas a juzgar?
  - ¿juzgarás? ¿juzgarás?
  lexicon: HALOT
  rationale: La duplicación interrogativa se mantiene en español para conservar el énfasis retórico. El futuro interrogativo suena natural y respeta el matiz de pregunta insistente del hebreo.
- source_word: עִיר הַדָּמִים
  english_pob_choice: the bloody city
  chosen_spanish: la ciudad sangrienta
  alternatives_spanish:
  - la ciudad de sangre
  - la ciudad culpable de sangre
  - la ciudad de derramamiento de sangre
  lexicon: HALOT
  rationale: El hebreo literalmente dice «la ciudad de sangres», con la fuerza de sangre derramada o culpa de sangre. «Ciudad sangrienta» preserva la carga profética y resulta idiomática en español; evita suavizar el acusativo moral del original.
- source_word: וְהוֹדַעְתָּהּ
  english_pob_choice: Then make known to her
  chosen_spanish: Entonces dale a conocer
  alternatives_spanish:
  - Y dale a conocer
  - Entonces hazle saber
  - Y hazle saber
  lexicon: HALOT
  rationale: El causativo de ידע se expresa con «dar a conocer» / «hacer saber». Se eligió «entonces» para reflejar la transición discursiva del hebreo tras la pregunta retórica, sin perder la fuerza imperativa.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todo
  - cada una de
  lexicon: HALOT
  rationale: Se conserva la totalidad explícita del hebreo. En español, «todas» concuerda con «abominaciones» y mantiene el alcance completo del juicio.
- source_word: תּוֹעֲבוֹתֶיהָ
  english_pob_choice: her abominations
  chosen_spanish: sus abominaciones
  alternatives_spanish:
  - sus actos abominables
  - sus cosas detestables
  - sus prácticas abominables
  lexicon: HALOT
  rationale: Se retiene el término profético fuerte «abominaciones» para no diluir el peso teológico y moral del texto. El posesivo femenino concuerda con «la ciudad» y con el objeto de la reprensión.
theological_decisions:
- issue: Tratamiento de בֶן אָדָם como vocativo profético
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - hombre mortal
  - ser humano
  rationale: La expresión funciona aquí como vocativo recurrente en Ezequiel. Mantenerla de forma reconocible evita neutralizar el patrón literario y respeta la continuidad terminológica del libro.
  doctrine_reference: 'DOCTRINE.md: preservar idiomatismo profético y precisión de forma cuando no exige neutralización'
- issue: Alcance moral de עִיר הַדָּמִים
  english_pob_reading: the bloody city
  chosen_spanish_reading: la ciudad sangrienta
  alternative_spanish_readings:
  - la ciudad de sangre
  - la ciudad de derramamiento de sangre
  - la ciudad culpable de sangre
  rationale: El hebreo plural «sangres» apunta a sangre derramada y culpa de sangre. «Sangrienta» comunica el juicio profético sin rebajar la acusación a una mera descripción ornamental.
  doctrine_reference: 'DOCTRINE.md: preservar tensión léxica y carga judicial del original'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió «the bloody city» por ser más directo y natural. En español, «la ciudad sangrienta» mantiene esa naturalidad sin perder la referencia a la sangre derramada implícita en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo el vocativo profético «hijo de hombre» de manera consistente con Ezequiel.
  - Se conservó la duplicación retórica de «juzgarás, juzgarás» para reflejar el énfasis del hebreo.
  - Se usó «abominaciones» en plural para corresponder a כָּל תּוֹעֲבוֹתֶיהָ y al registro profético tradicional del libro.
  - No se empleó «SEÑOR» ni otras sustituciones de nombre divino, porque el versículo no contiene el Tetragrámaton.
