review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo, preserva «Yahvé» para יְהוָה y refleja correctamente que מְהֻלָּל califica a Yahvé. Sin embargo, se aparta innecesariamente del POB inglés y de la decisión léxica documentada en dos puntos clave: 1) אֶקְרָא se documentó como presente/gnómico «I call on», no futuro «llamaré»; 2) אִוָּשֵׁעַ se documentó preferentemente como resultativo/presente «I am saved», con futuro solo como alternativa de nota. Además, «librado» debilita la conexión léxica con ישׁע frente a «salvo».'
  spanish_quality_summary: «Llamaré a Yahvé, digno de alabanza, y seré librado...» es legible, pero en español suena algo más distante del valor confesional del salmo que una formulación presente. Una redacción como «Invoco a Yahvé[a], quien es digno de alabanza, y soy salvo de mis enemigos» suena natural, clara y más alineada con el sentido orante. «Soy salvo» puede sonar un poco marcado, pero aquí conserva bien el enlace léxico con ישׁע y la decisión del POB. Añadir «quien es» mejora la fluidez sintáctica en español.
  glossary_alignment: Alineación buena en «Yahvé». Debe mejorarse la alineación con el historial léxico del POB usando una forma de presente para אֶקְרָא y «salvo/salvado» en vez de «librado» para אִוָּשֵׁעַ, dejando el futuro como alternativa en nota. No hay conflicto doctrinal que requiera adjudicación superior.
  issues:
  - severity: medium
    issue: Tiempo verbal de אֶקְרָא traducido como futuro («Llamaré»)
    rationale: El POB inglés auditado eligió presente/gnómico «I call on». El hebreo puede admitir matiz no estrictamente futuro, y en este contexto confesional el presente español refleja mejor la apelación habitual a Dios.
  - severity: high
    issue: אִוָּשֵׁעַ traducido en el texto principal como «seré librado»
    rationale: La decisión auditada favorece el sentido resultativo/presente «I am saved», con futuro solo como alternativa. Además, «librado» se aleja del campo léxico de ישׁע que el POB quiso preservar con «saved».
  - severity: low
    issue: La nota [b] del borrador no corresponde a una ambigüedad que el texto revisado necesite mantener
    rationale: Aunque «alabado» es una posibilidad más literal, el POB documentó «worthy to be praised» como opción principal. En español basta con el texto principal sin nota adicional, salvo que se quiera conservar una alternativa claramente útil.
  revised_spanish_text: Invoco a Yahvé,[a] quien es digno de alabanza, y soy salvo de mis enemigos.
  revised_footnotes:
  - marker: a
    text: 'O: «seré salvo de mis enemigos». El verbo hebreo también puede entenderse con sentido futuro en este contexto poético.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto español a las decisiones fuente y al rastro de auditoría del POB: presente confesional para אֶקְרָא, preservación de «Yahvé», y «soy salvo» para mantener el vínculo léxico con ישׁע y el valor resultativo preferido, dejando el futuro como alternativa en nota. Se mejora además la naturalidad española con «quien es digno de alabanza».'
