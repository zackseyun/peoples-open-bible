revisions:
- from: 'Entonces Moisés dijo a Aarón[a]: «Toma el incensario, y pon en él fuego de sobre el altar, y pon incienso sobre él, y ve rápidamente a la congregación y haz expiación por ellos, porque la ira[b] ha salido de delante de Yahvé; la plaga ha comenzado».'
  to: 'Entonces Moisés dijo a Aarón[a]: «Toma el incensario, y pon en él fuego del altar, y pon incienso sobre él, y ve rápidamente a la congregación y haz expiación por ellos, porque la ira ha salido de delante de Yahvé[b]; la plaga ha comenzado».'
  rationale: Se ajusta «de sobre el altar» a «del altar» para un español más natural y en línea con la revisión inglesa auditada. Se conserva el resto de la estructura. La nota b se mueve desde «ira» a «de delante de Yahvé» para reflejar correctamente la decisión léxica documentada sobre מִלִּפְנֵי יְהוָה. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
