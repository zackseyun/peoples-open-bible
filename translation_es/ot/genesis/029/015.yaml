translation:
  language: es
  text: 'Entonces Labán dijo a Jacob[a]: «Porque eres mi pariente, ¿vas a trabajar para mí de balde? Dime cuál será tu salario».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi hermano»; aquí se usa en el sentido amplio de pariente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכִי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - ¿Es porque…?
  - Solo porque…
  - Ya que…
  lexicon: HALOT
  rationale: En este contexto la partícula introduce el fundamento retórico de la pregunta de Labán, no una simple duda factual. «Porque» conserva esa base argumentativa en español sin volver el enunciado torpe o demasiado explicativo.
- source_word: אָחִי
  english_pob_choice: my relative
  chosen_spanish: mi pariente
  alternatives_spanish:
  - mi hermano
  - mi familiar
  - mi kinsman
  lexicon: HALOT
  rationale: Aunque la forma hebrea significa literalmente «mi hermano», aquí la relación real entre Labán y Jacob es de parentesco más amplio. «Mi pariente» refleja ese valor amplio sin afirmar erróneamente una relación de hermanos.
- source_word: וַעֲבַדְתַּנִי
  english_pob_choice: should you work for me
  chosen_spanish: vas a servirme
  alternatives_spanish:
  - trabajarás para mí
  - me servirás
  - vas a trabajar para mí
  lexicon: HALOT
  rationale: El verbo עבד puede abarcar trabajo o servicio. En español, «servirme» conserva la relación personal y laboral del pasaje; el contexto de salarios permite que no se entienda en sentido meramente doméstico. Se usa en forma interrogativa retórica con valor de reprensión implícita.
- source_word: חִנָּם
  english_pob_choice: for nothing
  chosen_spanish: de balde
  alternatives_spanish:
  - gratis
  - sin paga
  - por nada
  lexicon: HALOT
  rationale: «De balde» comunica bien la idea de trabajo no remunerado y mantiene un registro natural en español bíblico contemporáneo. Evita la literalidad plana de «por nada» y la explicitación más técnica de «sin paga».
- source_word: הַגִּידָה לִּי
  english_pob_choice: Tell me
  chosen_spanish: Dime
  alternatives_spanish:
  - Declárame
  - Infórmame
  - Hazme saber
  lexicon: HALOT
  rationale: La forma imperativa se expresa de manera directa y natural en español. «Dime» conserva la inmediatez de la petición de Labán.
- source_word: מַה מַּשְׂכֻּרְתֶּךָ
  english_pob_choice: what your wages should be
  chosen_spanish: qué salario tendrás
  alternatives_spanish:
  - cuál será tu salario
  - qué paga tendrás
  - qué remuneración recibirás
  lexicon: HALOT
  rationale: מַשְׂכֹּרֶת significa salario o paga. «Salario» es claro y contemporáneo; «tendrás» refleja la revisión inglesa que convirtió la pregunta directa en una petición para que Jacob nombre su compensación. No se añade un auxiliar modal que el español no necesita aquí.
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente, que ajusta la última cláusula para reflejar mejor el imperativo con pregunta indirecta: «Dime qué salario tendrás». La traducción española conserva esa estructura y evita convertirla en una pregunta directa final.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «pariente» para אָחִי por coherencia con el valor de parentesco amplio documentado en el audit trail.
  - «De balde» y «salario» conservan el campo semántico laboral sin perder el tono narrativo.
