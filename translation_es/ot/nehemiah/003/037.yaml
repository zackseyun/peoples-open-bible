translation:
  language: es
  text: Y no cubras[a] su culpa, y no sea borrado su pecado de delante de ti, porque te provocaron a ira delante de los que edificaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no perdones su iniquidad». La imagen hebrea es «no cubras su culpa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּכַס ... עַל עֲוֺנָם
  english_pob_choice: do not cover their guilt
  chosen_spanish: no cubras su culpa
  alternatives_spanish:
  - no perdones su iniquidad
  - no encubras su culpa
  lexicon: HALOT
  rationale: כסה con עַל puede expresar la imagen de cubrir algo para ocultarlo o pasar por alto su culpa. En español, «cubrir su culpa» conserva la imagen hebrea sin sonar forzado; «culpa» comunica bien el peso moral y jurídico de עָוֹן.
- source_word: עֲוֺנָם
  english_pob_choice: their guilt
  chosen_spanish: su culpa
  alternatives_spanish:
  - su iniquidad
  - su maldad
  lexicon: HALOT
  rationale: עָוֹן puede abarcar culpa, iniquidad o la responsabilidad por el pecado. En paralelo con «su pecado», «culpa» distingue bien el primer término y mantiene su carga moral.
- source_word: חַטָּאתָם
  english_pob_choice: their sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su falta
  - su ofensa
  lexicon: HALOT
  rationale: חַטָּאת normalmente significa «pecado». «Pecado» es la correspondencia directa y mantiene el paralelismo con «culpa».
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - de ante ti
  lexicon: HALOT
  rationale: La expresión hebrea es espacial y relacional. «De delante de ti» reproduce de manera natural la imagen de algo que desaparece de la vista/presencia de Dios.
- source_word: תִּמָּחֶה
  english_pob_choice: be blotted out
  chosen_spanish: sea borrado
  alternatives_spanish:
  - sea borrado del todo
  - sea borrado de la memoria
  lexicon: HALOT
  rationale: מחה se usa con frecuencia para borrar o eliminar, incluso en registros o memoria. «Sea borrado» es claro en español; en esta línea, el sentido es que el pecado no sea eliminado de delante de Dios.
- source_word: הִכְעִיסוּ
  english_pob_choice: have provoked you to anger
  chosen_spanish: te provocaron a ira
  alternatives_spanish:
  - te irritaron
  - te hicieron enojar
  lexicon: HALOT
  rationale: El causativo de כעס expresa provocar a ira. «Provocaron a ira» conserva la fuerza del verbo y evita suavizar la acusación.
- source_word: לְנֶגֶד הַבּוֹנִים
  english_pob_choice: before the builders
  chosen_spanish: delante de los constructores
  alternatives_spanish:
  - ante los constructores
  - en presencia de los constructores
  lexicon: HALOT
  rationale: לְנֶגֶד significa «delante de / frente a / en presencia de». «Constructores» sigue el valor del participio hebreo y es más literal que una paráfrasis interpretativa.
theological_decisions:
- issue: Petición imprecatoria sobre el pecado de los adversarios
  english_pob_reading: Retain the direct petition that God not forgive or erase their guilt, without softening the force.
  chosen_spanish_reading: Mantener la petición directa de que Dios no cubra su culpa ni borre su pecado, sin suavizar su fuerza.
  alternative_spanish_readings:
  - No tomar en cuenta su falta
  - No pasar por alto su pecado
  rationale: El hebreo expresa una súplica imprecatoria abierta. La traducción debe conservar esa tensión teológica sin resolverla mediante una atenuación devocional.
  doctrine_reference: Principio de primacía del original; preservar la tensión teológica del texto.
translation_notes:
  revision_awareness: La redacción sigue el sentido del texto hebreo y el audit trail inglés, pero adapta la sintaxis para que suene natural en español. Se mantiene la imagen de «cubrir» y la fuerza imprecatoria, con una leve naturalización en «sea borrado».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí el versículo se dirige a Dios en segunda persona sin el Tetragrámaton explícito, por lo que no aplica.
  - Se conservó «culpa» para עָוֹן y «pecado» para חַטָּאת, manteniendo la distinción semántica del paralelo.
  - «Constructores» se eligió para reflejar el participio hebreo y concordar con el contexto de reconstrucción de la muralla.
