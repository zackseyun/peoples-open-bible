base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/021/031.yaml
  text: 'Thus says the Lord GOD: Remove the turban[a], and take off the crown. This will not remain the same: exalt the lowly[b], and humble the exalted.'
  footnotes:
  - marker: a
    text: Or, 'This shall be no more,' or 'This will not be as it was.' The Hebrew is terse and elliptical, emphasizing that the present order is being overturned.
    reason: alternative_reading
  - marker: b
    text: '''Turban'' may specifically refer to a priestly headdress; ''crown'' refers to royal authority. The verse announces the removal of established leadership symbols.'
    reason: cultural_note
