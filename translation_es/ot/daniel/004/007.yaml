translation:
  language: es
  text: Estas eran las visiones de mi cabeza[a] mientras estaba acostado en mi cama; y he aquí, un árbol en medio de la tierra, y su altura era grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Arameo literalmente: «las visiones de mi cabeza». La frase se refiere a lo que Nabucodonosor vio interiormente en el sueño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחֶזְוֵי
  english_pob_choice: These were the visions
  chosen_spanish: Estas eran las visiones
  alternatives_spanish:
  - Y las visiones
  - las visiones
  lexicon: HALOT
  rationale: 'El arameo abre con un sintagma nominal en plural en construcción: no tiene verbo explícito. En español conviene suplirlo con una cópula natural (''eran'') y conservar el deíctico plural (''Estas'') para reflejar la presentación del contenido visionario.'
- source_word: רֵאשִׁי
  english_pob_choice: of my head
  chosen_spanish: de mi cabeza
  alternatives_spanish:
  - de mi mente
  - de mi espíritu
  lexicon: HALOT
  rationale: La expresión es literalmente 'de mi cabeza'. Se conserva la imagen corporal para no borrar el giro idiomático característico de Daniel; 'mente' sería una interpretación más explicativa de lo que el texto dice.
- source_word: עַל מִשְׁכְּבִי
  english_pob_choice: as I lay on my bed
  chosen_spanish: mientras yacía sobre mi lecho
  alternatives_spanish:
  - sobre mi lecho
  - en mi cama
  lexicon: HALOT
  rationale: El hebreo/arameo sitúa la visión en la postura de reposo. 'Mientras yacía' recoge el valor circunstancial del contexto verbal, y 'lecho' mantiene un registro digno sin perder inteligibilidad.
- source_word: וַאֲלוּ
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - he aquí
  lexicon: HALOT
  rationale: La partícula introduce un elemento súbito y llamativo en la visión. 'Y he aquí' es la forma española más estable y fiel para ese efecto deíctico y narrativo.
- source_word: אִילָן
  english_pob_choice: a tree
  chosen_spanish: un árbol
  alternatives_spanish:
  - un árbol grande
  - un árbol
  lexicon: HALOT
  rationale: Noun común sin determinación previa; el artículo indefinido en español refleja la primera mención.
- source_word: בְּגוֹא אַרְעָא
  english_pob_choice: in the midst of the earth
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio de la tierra habitable
  - en medio del país
  lexicon: HALOT
  rationale: '''בְּגוֹא'' indica centro o interior. ''Tierra'' conserva mejor el alcance amplio del contexto visionario que ''país'' o ''territorio'', y evita estrechar indebidamente el escenario.'
- source_word: וְרוּמֵהּ
  english_pob_choice: its height
  chosen_spanish: su altura
  alternatives_spanish:
  - su estatura
  - su elevación
  lexicon: HALOT
  rationale: El sustantivo con sufijo pronominal se refiere a la dimensión vertical del árbol. 'Altura' es la correspondencia más directa y natural en español.
- source_word: שַׂגִּיא
  english_pob_choice: was great
  chosen_spanish: era grande
  alternatives_spanish:
  - era enorme
  - era muy grande
  lexicon: HALOT
  rationale: El adjetivo expresa grandeza sin necesidad de intensificación adicional. 'Era grande' preserva la sencillez del predicado y evita sobreinterpretar el grado.
translation_notes:
  revision_awareness: Se siguió el texto arameo de Daniel 4:7 y el audit trail en inglés POB. La versión española conserva la imagen idiomática 'de mi cabeza' y la escena visionaria con 'y he aquí', sin mecanizar el orden original ni ampliar el sentido más allá de lo atestiguado. No se introdujeron cambios de revisión adicionales respecto al pasaje base.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se usa 'lecho' para un registro más solemne que 'cama' sin alterar el referente.
  - No se sustituyó la imagen corporal 'cabeza' por 'mente' en el texto principal para conservar la tensión léxica documentada.
