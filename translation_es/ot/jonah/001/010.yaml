    issue: Puntuación incorrecta al final de la pregunta directa
    rationale: El texto usa «¿Qué es esto que has hecho?». con punto tras el signo de cierre de interrogación y dentro de comillas. En español estándar, el signo de interrogación ya cumple la función de cierre oracional y no debe añadirse un punto.
  - severity: low
    issue: Conector final ligeramente menos directo que el hebreo
    rationale: «Pues se lo había dicho» es comprensible, pero «porque él se lo había dicho» reproduce con más transparencia el segundo כִּי explicativo y mantiene la cadena causal del original.
