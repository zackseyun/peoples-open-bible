translation:
  language: es
  text: El nombre de Yahvé[a] es torre fuerte; el justo[b] corre a refugiarse en ella y queda en alto y a salvo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH, tradicionalmente vertido «el SEÑOR»; aquí se conserva la transliteración «Yahvé».
    reason: alternative_reading
  - marker: b
    text: O «el justo», con fuerza representativa; el hebreo está en singular masculino.
    reason: lexical_alternative
  - marker: c
    text: O «está seguro» / «es protegido»; el hebreo sugiere ser puesto en un lugar alto e inaccesible.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִגְדַּל
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - fortaleza
  - torre fortificada
  lexicon: HALOT
  rationale: מִגְדַּל designa una estructura elevada de defensa. «Torre» es el equivalente más directo y natural en español, y conserva la imagen proverbial sin recargarla.
- source_word: עֹז
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - de fuerza
  - poderosa
  lexicon: HALOT
  rationale: En la construcción constructa con «torre», el sentido es «torre de fuerza». En español, «torre fuerte» reproduce de forma idiomática esa fuerza defensiva sin perder el valor semántico.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  lexicon: HALOT
  rationale: El hebreo dice literalmente «nombre». Mantener «nombre» preserva la riqueza teológica del texto, que puede abarcar carácter revelado además de mera designación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la convención POB de transliterar el Nombre divino como «Yahvé», en lugar de sustituirlo por un título. Esto refleja mejor el Tetragrámaton del texto hebreo.
- source_word: בּוֹ
  english_pob_choice: into it
  chosen_spanish: hacia ella
  alternatives_spanish:
  - en ella
  - hacia él
  lexicon: HALOT
  rationale: El sufijo es masculino singular y su antecedente inmediato es la metáfora de «torre». En español, para evitar la ambigüedad de género cuando el antecedente semántico es «torre», «hacia ella» comunica bien el movimiento de refugio sin forzar la referencia al nombre divino.
- source_word: יָרוּץ
  english_pob_choice: runs
  chosen_spanish: corre
  alternatives_spanish:
  - huye
  - se apresura
  lexicon: HALOT
  rationale: El verbo significa «correr». En este contexto de refugio, «corre» conserva la imagen concreta y deja que el contexto aporte la urgencia protectora.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el justo hombre
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado es masculino singular con fuerza representativa. «El justo» respeta la forma hebrea y la redención proverbial sin añadir «hombre».
- source_word: וְנִשְׂגָּב
  english_pob_choice: is set securely on high
  chosen_spanish: es puesto en alto con seguridad
  alternatives_spanish:
  - está en alto y seguro
  - es exaltado
  - está protegido
  lexicon: HALOT
  rationale: El nifal de שׂגב transmite la idea de ser puesto en un lugar alto e inaccesible, con seguridad defensiva. «Es puesto en alto con seguridad» conserva tanto la verticalidad como la protección implícita.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea editorial POB preserva el Nombre propio del pacto, no una sustitución reverencial. En español, «Yahvé» es la transliteración coherente con esa decisión.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia del sufijo en בּוֹ
  english_pob_reading: into it
  chosen_spanish_reading: hacia ella
  alternative_spanish_readings:
  - en él
  - en ella
  - hacia él
  rationale: El antecedente retórico es «torre», no simplemente «nombre». Como el español exige concordancia explícita, se opta por el femenino de «torre» para evitar que el lector entienda erróneamente que el movimiento se dirige a una persona masculina en esta cláusula.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de «the righteous man» a «the righteous» para reflejar mejor el singular masculino hebreo sin añadir «man». La versión española sigue esa corrección con «el justo», manteniendo la singularidad y el valor representativo sin explicitar «hombre».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar POB para יְהוָה.
  - «El justo» conserva el singular hebreo y evita una ampliación interpretativa.
  - La imagen de protección se expresó con «es puesto en alto con seguridad» para preservar la metáfora vertical del verbo nifal.
  - Se evitó «SEÑOR» por la política editorial del proyecto y se evitó «Cristo» u otra terminología ajena al verso.
