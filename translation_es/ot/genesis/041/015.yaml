translation:
  language: es
  text: 'Y dijo Faraón a José: «He soñado un sueño, y no hay quien lo interprete. Pero he oído de ti decir: “Escuchas un sueño para interpretarlo”».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «He oído acerca de ti, diciendo: “Oyes un sueño para interpretarlo”».'
    reason: alternative_more_formal_literal_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y habló
  lexicon: HALOT
  rationale: La waw consecutiva introduce una acción narrativa sucesiva; en español, «Y dijo» conserva el encadenamiento fluido sin añadir matices no presentes en el hebreo.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Farón
  lexicon: HALOT
  rationale: «Faraón» es la forma establecida y clara en español bíblico para el título real egipcio.
- source_word: אֶל יוֹסֵף
  english_pob_choice: to Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - a Yosef
  lexicon: HALOT
  rationale: La preposición marca destinatario; «José» sigue la convención bíblica en español para el nombre propio.
- source_word: חֲלוֹם חָלַמְתִּי
  english_pob_choice: I have dreamed a dream
  chosen_spanish: Un sueño he soñado
  alternatives_spanish:
  - Soñé un sueño
  - He soñado un sueño
  lexicon: HALOT
  rationale: El hebreo usa acusativo cognado; «Un sueño he soñado» lo refleja con cierta fuerza retórica sin perder naturalidad. Se preserva el paralelismo semítico mejor que con «tuve un sueño».
- source_word: וּפֹתֵר אֵין אֹתוֹ
  english_pob_choice: and there is no one to interpret it
  chosen_spanish: y no hay quien lo interprete
  alternatives_spanish:
  - y no hay intérprete de él
  - y no existe quien lo interprete
  lexicon: HALOT
  rationale: פֹּתֵר es «el que interpreta»; en contexto de sueños, «interpretar» es la equivalencia natural. «No hay quien lo interprete» comunica la ausencia de intérprete sin sobreexplicar.
- source_word: שָׁמַעְתִּי עָלֶיךָ
  english_pob_choice: I have heard about you
  chosen_spanish: he oído acerca de ti
  alternatives_spanish:
  - he oído de ti
  - he oído sobre ti
  lexicon: HALOT
  rationale: La construcción con שׁמע + עַל indica haber oído un reporte acerca de alguien; «acerca de ti» preserva ese matiz relacional y de referencia indirecta.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  - así
  lexicon: HALOT
  rationale: El hebreo introduce discurso referido; «diciendo» conserva la forma de reporte más de cerca que «que», aunque ambas son posibles en español.
- source_word: תִּשְׁמַע חֲלוֹם
  english_pob_choice: You hear a dream
  chosen_spanish: Tú oyes un sueño
  alternatives_spanish:
  - Tú escuchas un sueño
  - Cuando oyes un sueño
  lexicon: HALOT
  rationale: Se mantiene el literalismo del verbo «oír» del hebreo, pero en español la frase queda como cita de la reputación de José. «Oyes» preserva el presente gnómico implícito en el hebreo.
- source_word: לִפְתֹּר אֹתוֹ
  english_pob_choice: to interpret it
  chosen_spanish: para interpretarlo
  alternatives_spanish:
  - a interpretarlo
  - para resolverlo
  lexicon: HALOT
  rationale: El infinitivo final expresa finalidad; «para interpretarlo» es natural en español y mantiene el vínculo directo con el sueño.
translation_notes:
  revision_awareness: 'Se siguió de cerca el ajuste más reciente del audit trail inglés: la clausula final se mantuvo sin expandirla a una capacidad explícita de «puedes», y שָׁמַעְתִּי עָלֶיךָ לֵאמֹר se reprodujo como un reporte indirecto literal («he oído acerca de ti, diciendo»).'
  spanish_consistency_notes:
  - Se mantuvo «Faraón» y «José» como formas bíblicas estándar en español.
  - Se conservó «interpretar» para פֹּתֵר en todo el versículo, dado el contexto onírico.
  - Se evitó «Cristo», «SEÑOR» u otras sustituciones no pertinentes al pasaje.
  - La puntuación reproduce el discurso directo con comillas tipográficas españolas para lectura pública.
