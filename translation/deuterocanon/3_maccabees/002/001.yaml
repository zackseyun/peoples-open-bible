theological_decisions:
- issue: Rendering of divine titles in a stacked invocation
  chosen_reading: 'Translate each title distinctly: ''Lord... king of the heavens... master... holy... sole ruler... Almighty'''
  alternative_readings:
  - Flattening multiple titles into fewer English equivalents
  rationale: The prayer piles up divine epithets for rhetorical and theological force. Distinct renderings preserve that force and avoid obscuring nuances between κύριος, δέσποτα, μόναρχε, and παντοκράτωρ.
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or documented exception.'
