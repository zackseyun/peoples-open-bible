  text: כִּֽי יִהְיֶ֨ה לָ/הֶ֤ם דָּבָר֙ בָּ֣א אֵלַ֔/י וְ/שָׁ֣פַטְתִּ֔י בֵּ֥ין אִ֖ישׁ וּ/בֵ֣ין רֵעֵ֑/הוּ וְ/הוֹדַעְתִּ֛י אֶת חֻקֵּ֥י הָ/אֱלֹהִ֖ים וְ/אֶת תּוֹרֹתָֽי/ו־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/018/016.yaml
  text: When they have a matter[a], it comes to me, and I judge between a man and his neighbor[c][b], and I make known the statutes of God and his laws.
  footnotes:
