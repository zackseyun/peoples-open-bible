translation:
  language: es
  text: 'Entonces Balac le dijo: «Por favor, ven conmigo a otro lugar, desde donde lo puedas ver. Solo verás[a] el extremo de él, y no lo verás todo[b]; entonces maldícelo por mí desde allí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «solo su borde» o «solo la parte más extrema de él», aludiendo a que se vería únicamente una porción de Israel.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa pronombres singulares («él», «todo de él») para Israel como pueblo colectivo; en español también podría expresarse como «ellos».
    reason: alternative_reading
lexical_decisions:
- source_word: לך־נא
  english_pob_choice: Please come
  chosen_spanish: Por favor, ven conmigo
  alternatives_spanish:
  - Ven, por favor, conmigo
  - Por favor, acompáñame
  lexicon: HALOT
  rationale: El hebreo expresa una petición cortés con movimiento hacia otro lugar; en español, «por favor, ven conmigo» conserva el tono de ruego y la invitación a acompañar a Balac.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  - junto a mí
  lexicon: HALOT
  rationale: Es la preposición comitiva con sufijo de primera persona; «conmigo» es la forma natural y directa en español.
- source_word: מָקוֹם אַחֵר
  english_pob_choice: another place
  chosen_spanish: a otro lugar
  alternatives_spanish:
  - a otro sitio
  - a un lugar diferente
  lexicon: HALOT
  rationale: «Lugar» comunica bien el punto de observación distinto requerido por el contexto; «otro» refleja la alternancia espacial del hebreo.
- source_word: אֲשֶׁר תִּרְאֶנּוּ מִשָּׁם
  english_pob_choice: from where you may see him
  chosen_spanish: desde donde lo puedas ver
  alternatives_spanish:
  - desde allí lo verás
  - desde donde lo verás
  lexicon: HALOT
  rationale: La cláusula señala un nuevo punto de vista. En español, «desde donde lo puedas ver» conserva la relación espacial y el matiz prospectivo sin forzar una literalidad extraña.
- source_word: אֶפֶס
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: HALOT
  rationale: Aquí el término limita lo visible; «solo» es la forma más natural en español y mantiene la restricción introducida por el hebreo.
- source_word: קָצֵהוּ
  english_pob_choice: the outskirts of him
  chosen_spanish: sus alrededores
  alternatives_spanish:
  - su borde
  - la orilla de él
  - solo su extremo
  lexicon: HALOT
  rationale: El sustantivo alude a una parte extrema o periférica. En español, «sus alrededores» comunica la idea de ver solo una porción periférica del pueblo sin introducir una imagen demasiado técnica o chocante.
- source_word: וְכֻלּוֹ לֹא תִרְאֶה
  english_pob_choice: and you will not see all of him
  chosen_spanish: y no lo verás todo
  alternatives_spanish:
  - y no lo verás por completo
  - y no verás todo de él
  lexicon: HALOT
  rationale: La contraposición entre visión parcial y totalidad se mantiene con una frase natural en español. «Lo verás todo» preserva la referencia singular colectiva del hebreo sin recargar la sintaxis.
- source_word: וְקָבְנוֹ לִי
  english_pob_choice: then curse him for me
  chosen_spanish: y desde allí maldícemelo
  alternatives_spanish:
  - y desde allí maldícelo para mí
  - entonces maldícelo para mí desde allí
  lexicon: HALOT
  rationale: El verbo קבב se vierte con el valor fuerte de «maldecir», coherente con el episodio de Balaam. «Maldícemelo» concentra el objeto y el dativo ético/beneficiario en una forma breve y bíblica en español; «desde allí» conserva el valor espacial del mandato.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: HALOT
  rationale: 'La partícula espacial se mantiene para conservar la estrategia de Balac: un nuevo sitio desde el cual pronunciar la maldición.'
theological_decisions:
- issue: Pronombres singulares para Israel como colectivo
  english_pob_reading: Render the suffixes as singular ('him') in the main text
  chosen_spanish_reading: Conservar el singular colectivo con «lo»
  alternative_spanish_readings:
  - renderizar colectivamente con «los»
  - usar un nombre explícito como «Israel»
  rationale: El hebreo usa sufijos singulares para un referente colectivo. En español, «lo» preserva esa tensión textual y evita suavizar la imagen de Israel como un solo pueblo visto desde lejos.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor del imperativo לך־נא
  english_pob_reading: Translate as an invitation/request
  chosen_spanish_reading: 'Convertirlo en una invitación cortés: «Por favor, ven conmigo»'
  alternative_spanish_readings:
  - «Ve conmigo»
  - «Anda conmigo, por favor»
  rationale: Aunque הלך puede significar «ir», el contexto es una petición para acompañar a Balac a otro sitio. «Ven conmigo» suena natural en español desde la perspectiva del hablante que invita.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se siguió el último estado revisado del audit trail inglés, que ajustó «edge» a «outskirts» para hacer más natural la imagen de una visión parcial. La versión española busca reflejar esa misma preferencia por un término periférico natural, manteniendo la tensión del singular colectivo y el mandato espacial de Balac.
  spanish_consistency_notes:
  - Se usó «Yahvé» en la serie del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo el singular pronominal («lo») para reflejar el hebreo colectivo, en línea con el tratamiento auditado en inglés.
  - «Maldíce-» se eligió para conservar la fuerza verbal de קבב en este contexto narrativo de maldición.
