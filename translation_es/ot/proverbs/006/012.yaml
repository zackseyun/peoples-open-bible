translation:
  language: es
  text: Un hombre indigno[a], un hombre de iniquidad, anda con boca perversa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «con habla perversa» o «con una boca torcida».
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: HALOT
  rationale: En este proverbio se trata de un ejemplar individual en paralelo con אִישׁ, no de la humanidad en general. «Hombre» conserva ese valor representativo y mantiene el paralelismo hebreo.
- source_word: בְּלִיַּעַל
  english_pob_choice: worthless
  chosen_spanish: indigno
  alternatives_spanish:
  - vil
  - sin valor
  - Belial
  lexicon: HALOT
  rationale: El término funciona aquí adjetivalmente, describiendo a una persona moralmente despreciable. «Indigno» comunica la descalificación moral sin introducir una transliteración que podría sugerir un nombre propio.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: Se mantiene «hombre» para reflejar el paralelismo con אָדָם y la fuerza tipológica habitual en Proverbios.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - mal
  - perversidad
  lexicon: HALOT
  rationale: «Iniquidad» corresponde de cerca al valor moral de אָוֶן y preserva la decisión del POB inglés de evitar una generalización demasiado amplia como «wickedness».
- source_word: הוֹלֵךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  - va
  lexicon: HALOT
  rationale: «Anda» conserva el hebraísmo de conducta/forma de vida y suena natural en español bíblico sin perder la metáfora del caminar.
- source_word: עִקְּשׁוּת
  english_pob_choice: perverse
  chosen_spanish: perversa
  alternatives_spanish:
  - torcida
  - retorcida
  - depravada
  - desviada
  lexicon: HALOT
  rationale: El sustantivo expresa torcedura, perversidad o desviación. En español, «boca perversa» reproduce la decisión inglesa de una forma más natural que un calco como «boca torcida», manteniendo el juicio moral.
- source_word: פֶּה
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - habla
  - lengua
  lexicon: HALOT
  rationale: Se traduce literalmente como «boca» para conservar la imagen concreta del hebreo, aunque el sentido se refiere al habla.
translation_notes:
  revision_awareness: 'La versión inglesa revisó «wickedness» por «iniquity» y «twisted mouth» por «perverse mouth». La presente redacción sigue esas decisiones: conserva el matiz moral de אָוֶן con «iniquidad» y expresa עִקְּשׁוּת פֶּה de manera natural en español con «boca perversa», manteniendo la posibilidad alternativa de referirlo al habla.'
  spanish_consistency_notes:
  - Se evitó «Belial» por ser una transliteración con riesgo de personificación indebida en este contexto sapiencial.
  - «Anda» preserva el valor idiomático de conducta continuada, equivalente funcional de «walks».
  - El adjetivo «perversa» se ajusta al sustantivo femenino «boca» y deja abierto el sentido alternativo de la expresión hebrea.
