    text: Or 'a month will devour them and their portions.' The Hebrew חֹדֶשׁ can mean either 'new moon' or 'month.'
    reason: alternative_reading
  - marker: b
    text: '''Foreign children'' may refer to children from covenantally illicit unions or, more broadly, to a generation estranged from the LORD.'
    reason: lexical_alternative
