translation:
  language: es
  text: Entonces me acercaré a ustedes para juicio[a], y seré un testigo pronto contra los hechiceros, contra los adúlteros, contra los que juran en falso, contra los que oprimen el salario de un jornalero, la viuda y el huérfano, y contra los que apartan al forastero[b], y no me temen, dice Yahvé de los Ejércitos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «los que defraudan a un jornalero de su salario». El hebreo dice literalmente «los que oprimen el salario de un jornalero».'
    reason: lexical_alternative
  - marker: b
    text: O «el extranjero» o «el residente extranjero». El hebreo גֵר denota a una persona no nativa que vive entre Israel bajo su protección.
    reason: lexical_alternative
  - marker: c
    text: 'Traducción tradicional: «Yahvé de las Huestes».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְקָרַבְתִּי אֲלֵיכֶם
  english_pob_choice: Then I will come near to you
  chosen_spanish: Entonces me acercaré a ustedes
  alternatives_spanish:
  - Y me acercaré a ustedes
  - Entonces vendré cerca de ustedes
  lexicon: HALOT
  rationale: El hebreo expresa un acercamiento con valor judicial en discurso profético futuro. En español, «me acercaré» conserva la imagen y evita un calco rígido. «Entonces» mantiene la conexión discursiva del contexto previo.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para el juicio
  alternatives_spanish:
  - para juicio
  - para justicia
  - para el proceso judicial
  lexicon: HALOT
  rationale: Aquí el contexto forense favorece «juicio». «Justicia» sería posible en otros contextos, pero aquí debilita la escena judicial concreta. Se conserva la función de propósito con «para».
- source_word: עֵד מְמַהֵר
  english_pob_choice: a swift witness
  chosen_spanish: un testigo veloz
  alternatives_spanish:
  - un testigo rápido
  - un testigo prontísimo
  - un testigo que actúa con rapidez
  lexicon: HALOT
  rationale: La expresión nominal resalta la rapidez de la atestación. «Testigo veloz» mantiene la fuerza compacta del hebreo sin perder naturalidad en español.
- source_word: בַּמְכַשְּׁפִים
  english_pob_choice: against sorcerers
  chosen_spanish: contra los hechiceros
  alternatives_spanish:
  - contra los brujos
  - contra los practicantes de magia
  lexicon: HALOT
  rationale: «Hechiceros» es una equivalencia clara y actual para practicantes de magia. Evita el término más cargado culturalmente «brujos» y conserva el sentido adversativo de la cadena.
- source_word: וּבַמְנָאֲפִים
  english_pob_choice: against adulterers
  chosen_spanish: contra los adúlteros
  alternatives_spanish:
  - contra los que cometen adulterio
  lexicon: HALOT
  rationale: La forma participial designa a quienes practican adulterio. «Adúlteros» es directo, natural y fiel.
- source_word: וּבַנִּשְׁבָּעִים לַשָּׁקֶר
  english_pob_choice: against those who swear falsely
  chosen_spanish: contra los que juran en falso
  alternatives_spanish:
  - contra los que juran mentira
  - contra los perjuros
  lexicon: HALOT
  rationale: «Juran en falso» reproduce de forma idiomática el juramento mentiroso. «Perjuros» sería válido, pero puede sonar más técnico o restringido; el español elegido mantiene amplitud semántica.
- source_word: וּבְעֹשְׁקֵי שְׂכַר שָׂכִיר
  english_pob_choice: against those who oppress the wages of a hired worker
  chosen_spanish: contra los que oprimen el salario de un jornalero
  alternatives_spanish:
  - contra los que defraudan el salario de un trabajador
  - contra los que retienen el pago de un asalariado
  lexicon: HALOT
  rationale: Se conserva el contenido literal de «oprimir el salario», pero en español se hace natural con «salario de un jornalero». «Jornalero» comunica bien la idea del trabajador asalariado del texto sin añadir explicación ajena al verso.
- source_word: אַלְמָנָה וְיָתוֹם
  english_pob_choice: the widow and the fatherless
  chosen_spanish: la viuda y el huérfano
  alternatives_spanish:
  - la viuda y el padre huérfano
  - la viuda y el desamparado
  lexicon: HALOT
  rationale: La pareja fija de vulnerables se traduce de manera tradicional y clara. «Huérfano» es la equivalencia natural y ampliamente comprensible para יָתוֹם.
- source_word: וּמַטֵּי גֵר
  english_pob_choice: those who turn aside the sojourner
  chosen_spanish: los que hacen torcer al forastero
  alternatives_spanish:
  - los que desvían al forastero
  - los que hacen desviar al forastero
  - los que apartan al extranjero
  lexicon: HALOT
  rationale: El hebreo tiene una forma que puede expresar desviar, torcer o hacer apartar. Mantener un verbo concreto como «hacer torcer» conserva la ambigüedad sintáctica y la fuerza hostil del original. Se prefirió «forastero» por su neutralidad y por corresponder al residente no nativo; en nota se preserva la alternativa «extranjero».
- source_word: וְלֹא יְרֵאוּנִי
  english_pob_choice: and do not fear me
  chosen_spanish: y no me temen
  alternatives_spanish:
  - y no me reverencian
  - y no me respetan con temor
  lexicon: HALOT
  rationale: «Temer» en este contexto incluye reverencia y obediencia cultual. La forma breve «no me temen» conserva la densidad teológica del hebreo sin suavizarla demasiado.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יְהוָה como «Yahvé». Para צְבָאוֹת, «Ejércitos» traduce el plural con transparencia y mantiene la fuerza del título sin recurrir a «Señor» como máscara.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama. El estándar español del proyecto es «Yahvé», que preserva el nombre del pacto y evita la sustitución tradicional por una forma enmascarada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: El valor judicial de לַמִּשְׁפָּט
  english_pob_reading: for judgment
  chosen_spanish_reading: para el juicio
  alternative_spanish_readings:
  - para justicia
  - para el juicio legal
  rationale: 'En este pasaje el escenario es claramente judicial: acercamiento, testigo, delitos enumerados. «Juicio» comunica mejor ese marco que una abstracción como «justicia».'
  doctrine_reference: HALOT / contexto forense de Malaquías 3:5
- issue: La categoría social de גֵר
  english_pob_reading: sojourner / the foreigner or the resident foreigner
  chosen_spanish_reading: forastero
  alternative_spanish_readings:
  - extranjero
  - residente extranjero
  - forastero residente
  rationale: «Forastero» puede cubrir la idea de persona no perteneciente al grupo nativo sin importar una connotación migratoria moderna. La nota preserva la alternativa lexical más cercana al audit trail inglés.
  doctrine_reference: HALOT / nota lexical del POB
- issue: La fórmula final del título divino צְבָאוֹת
  english_pob_reading: Armies
  chosen_spanish_reading: los Ejércitos
  alternative_spanish_readings:
  - de los Ejércitos
  - de las huestes
  rationale: La traducción mantiene el sentido transparente y el plural semántico del hebreo. Se evita «Señor» como sustituto litúrgico para no ocultar el título.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: He tenido en cuenta la revisión inglesa más reciente, que ajustó el sustantivo colectivo a «wages» y suavizó la puntuación de la enumeración. Por eso la versión española usa «el salario de un jornalero» como expresión colectiva natural, y organiza la serie con comas simples, manteniendo el paralelismo y el cierre con el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se traduce צְבָאוֹת como «los Ejércitos», siguiendo el principio del proyecto de no enmascarar el nombre divino.
  - «Forastero» se usa para גֵר en el cuerpo del texto, con nota que preserva la alternativa «extranjero».
  - La enumeración conserva la secuencia de delitos y grupos vulnerables sin añadir elementos explicativos ajenos al verso.
  - «No me temen» mantiene el valor de reverencia/temor reverente del hebreo.
