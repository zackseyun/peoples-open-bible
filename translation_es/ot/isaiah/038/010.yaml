  - marker: b
    text: 'O: «la tumba» o «la región de los muertos». «Seol» mantiene el término hebreo y evita cerrar el sentido del pasaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּדְמִי
  english_pob_choice: in the middle of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el corte de
  - en la quietud de
  lexicon: HALOT
  rationale: El hebreo es difícil y, por el contexto de "mis días" y "el resto de mis años", el sentido es el de la mitad o el punto culminante de la vida. "En medio de" comunica ese valor idiomático sin forzar una literalidad oscura.
- source_word: יָמַי
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - los días míos
  - mi vida
  lexicon: HALOT
  rationale: Se conserva el valor literal de "días" como medida de la vida humana, manteniendo el paralelismo del lamento.
- source_word: אֵלֵכָה
  english_pob_choice: I must go
  chosen_spanish: tendré que ir
  alternatives_spanish:
  - iré
  - estoy por ir
  lexicon: HALOT
  rationale: El imperfecto expresa la marcha esperada hacia la muerte con matiz de inevitabilidad. "Tendré que ir" reproduce bien esa fuerza obligada en español.
- source_word: בְּשַׁעֲרֵי
  english_pob_choice: to the gates of
  chosen_spanish: a las puertas de
  alternatives_spanish:
  - hasta las puertas de
  - hacia las puertas de
  lexicon: HALOT
  rationale: El hebreo indica dirección hacia las puertas, no necesariamente paso a través de ellas. "A las puertas de" es fiel y natural en español.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - la morada de los muertos
  - la tumba
  lexicon: HALOT
  rationale: Se conserva el término técnico hebreo en forma castellanizada para no aplanar el concepto. "Seol" preserva la tensión teológica del texto mejor que "tumba" o una explicación interpretativa.
- source_word: פֻּקַּדְתִּי
  english_pob_choice: I am deprived of
  chosen_spanish: estoy privado de
  alternatives_spanish:
  - me han despojado de
  - se me ha quitado
  lexicon: HALOT
  rationale: En este lamento, la pasiva de פקד expresa que se le quita o se le arrebata algo debido. "Estoy privado de" comunica bien esa pérdida pasiva y lamentativa.
- source_word: יֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo que queda de
  - el remanente de
  lexicon: HALOT
  rationale: '"Resto" es la forma natural en español para el hebreo de ''lo que queda'' o ''remanente'' de una cantidad temporal.'
- source_word: שְׁנוֹתָי
  english_pob_choice: my years
  chosen_spanish: mis años
  alternatives_spanish:
  - los años míos
  - de mis años
  lexicon: HALOT
  rationale: Se mantiene el sustantivo "años", que en el contexto expresa la duración de vida esperada.
theological_decisions:
- issue: Renderización de שְׁאוֹל en un lamento sobre la muerte inminente
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - la región de los muertos
  rationale: Se conserva el término bíblico técnico para evitar importar nociones posteriores de condenación eterna o simplificar el concepto a una sepultura física. Esto preserva la ambigüedad y la carga del lenguaje hebreo original.
  doctrine_reference: Principio de primacía del original y preservación de la tensión teológica del texto.
translation_notes:
  revision_awareness: 'La versión sigue la revisión más reciente del audit trail: se prefirió "a las puertas de" en lugar de una traducción que sugiriera necesariamente pasar "a través de" ellas, por mayor cercanía al hebreo. También se preservó el término técnico "Seol" para reflejar la decisión teológica de no desambiguarlo en exceso.'
  spanish_consistency_notes:
  - Se emplea "Seol" de forma consistente para שְׁאוֹל, conforme a la política de preservar el término hebreo técnico.
  - Se usa "años" para שְׁנוֹתַי y no una paráfrasis como "vida", para mantener el paralelismo con "mis días".
  - '"Estoy privado de" conserva la voz pasiva/resultado de פקד sin convertirlo en una acción activa no atestiguada.'
