  to: '¿Adónde subimos nosotros? Nuestros hermanos[a] han derretido nuestros corazones, diciendo: «El pueblo es más grande y más alto que nosotros; las ciudades son grandes y fortificadas hasta los cielos[b]; y además, vimos allí a los descendientes de Anac[c]»'
