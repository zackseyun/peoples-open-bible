base_translation:
  language: en
  yaml_path: translation/ot/numbers/021/005.yaml
  text: 'And the people spoke against God and against Moses: “Why have you brought us up out of Egypt to die in the wilderness? For there is no bread and no water[a], and we detest this worthless bread.”'
  footnotes:
  - marker: a
    text: Or “this contemptible bread” or “this worthless bread.” The Hebrew adjective is rare and expresses disdain for the food God provided.
    reason: lexical_alternative
