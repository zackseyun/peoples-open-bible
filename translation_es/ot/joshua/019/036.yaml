lexical_decisions:
- source_word: אֲדָמָה
  english_pob_choice: Adamah
  chosen_spanish: Adama
  alternatives_spanish:
  - Adamah
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar en una lista de ciudades, por lo que conviene transliterarlo en español. Se adapta a la ortografía española más natural y breve, sin intentar traducir el sentido común de la palabra hebrea en este contexto.
- source_word: הָרָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Ramah
  - la Ramá
  lexicon: HALOT
  rationale: Es un topónimo con artículo hebreo probablemente fosilizado. En español, la forma establecida y más legible en listas bíblicas es 'Ramá'; no se traduce el artículo como si fuera parte del nombre.
- source_word: חָצוֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  alternatives_spanish:
  - Jazor
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se conserva la transliteración habitual, porque el contexto es un inventario territorial y no hay base para traducir el significado léxico del nombre.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Gramática española
  rationale: La conjunción coordina una simple serie de nombres. En español se usa 'y'; no hace falta 'e' porque las palabras siguientes no comienzan con sonido /i/.
translation_notes:
  revision_awareness: El contexto y el control cruzado del expediente inglés muestran acuerdo alto y ausencia de revisiones; por eso no se introducen notas críticas ni alternativas textuales adicionales. La decisión española sigue el mismo criterio de lista toponímica estable, ajustando solo la forma ortográfica al uso natural del español.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los tres topónimos como nombres propios, sin convertirlos en sustantivos comunes.
  - Se omite cualquier artículo explicativo ante Ramá para conservar el ritmo de lista geográfica.
  - Se usa una conjunción simple para reproducir la coordinación del hebreo en español natural.
