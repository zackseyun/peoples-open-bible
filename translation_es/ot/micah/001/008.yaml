  yaml_path: translation/ot/micah/001/008.yaml
  text: Because of this I will lament and wail[a]; I will go stripped and naked. I will make a lament like the jackals[b], and mourning like the daughters of the ostrich.
  footnotes:
  - marker: a
    text: Or 'I will go barefoot and naked.' The Hebrew term translated 'stripped' is difficult and may refer to going barefoot as a sign of mourning and humiliation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'like the daughters of the ostrich,' a Hebrew poetic expression for ostriches or female ostriches.
    reason: lexical_alternative
