review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica correctamente la prohibición de relaciones sexuales con la esposa de otro y conserva la idea de impureza. Sin embargo, se aparta del rastro auditado en un punto importante: לְ/טָמְאָה fue entendido por la POB inglesa como ''to become unclean'', pero el español ''para hacerte inmundo'' introduce una causación reflexiva menos directa y algo más forzada. Además, el uso de ''prójimo'' para עֲמִיתְךָ es posible, pero aquí diluye el matiz legal-comunitario que el inglés justificó como ''your fellow man''; ''compañero'' o ''semejante'' encaja mejor en este contexto.'
  spanish_quality_summary: 'El español es mayormente claro, pero ''darás tu emisión'' suena algo rígido y ''hacerte inmundo'' resulta poco natural. Una mejora mínima puede mantener la literalidad auditada y sonar más idiomática: ''no darás tu emisión ... para quedar inmundo con ella''. ''Esposa'' funciona bien; ''compañero'' mejora la precisión contextual frente a ''prójimo''.'
  glossary_alignment: No hay conflictos con la terminología central del proyecto. La categoría de impureza se preserva bien con 'inmundo'. El ajuste recomendado no afecta términos fijos como Yahvé/Mesías/etc. Sí conviene alinear mejor עֲמִיתְךָ con el rationale documentado, evitando que 'prójimo' suene demasiado amplio o evangélico en vez de legal-comunitario.
  issues:
  - severity: medium
    issue: '''para hacerte inmundo'' para לְ/טָמְאָה'
    rationale: El infinitivo hebreo aquí expresa resultado/estado ('llegar a quedar inmundo'), no tanto una causación reflexiva activa. 'Quedar inmundo' o 'volverte inmundo' refleja mejor la decisión inglesa auditada y suena más natural en español.
  - severity: medium
    issue: '''tu prójimo'' para עֲמִיתְךָ'
    rationale: Aunque es viable, el rastro lexical inglés prefirió el matiz de miembro par/comunitario en contexto legal. En español, 'prójimo' puede sonar más general o exhortativo; 'tu compañero' preserva mejor el tono legal-interpersonal.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: La glosa 'compañero/fellow' mezcla idiomas y 'tendido' suena extraño. La nota debe presentarse en español natural y explicar la alternativa literal con mayor limpieza.
  revised_spanish_text: Y no darás tu emisión a la esposa de tu compañero[a], para quedar inmundo con ella.
  revised_footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «Y a la esposa de tu compañero no darás tu yacer/emisión para semilla, para quedar inmundo con ella». La expresión es un modismo para relaciones sexuales con emisión seminal.'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para alinear mejor el español con el análisis fuente-POB: se cambia ''prójimo'' por ''compañero'' para reflejar mejor עֲמִית en contexto legal-comunitario, y ''hacerte inmundo'' por ''quedar inmundo'' para representar con más naturalidad el valor resultativo de לְ/טָמְאָה. También se limpia la nota al pie para evitar mezcla de idiomas y una opción literal poco inteligible.'
