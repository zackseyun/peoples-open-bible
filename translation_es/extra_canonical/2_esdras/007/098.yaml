base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/098.yaml
  text: 'The seventh order[a], which is greater than all the orders mentioned above: they will exult with confidence, and trust without being put to shame, and rejoice without fear, for they hasten to see the face of him whom they served while living, and from whom they, being glorified, are to receive their reward.'
  footnotes:
  - marker: a
    text: Or 'from whom they are to receive their glorious reward.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:19Z'
    unchanged: false
    changes_summary: Revised 'be bold without confusion' to 'trust without being put to shame' to more accurately reflect Latin confidebunt non confusi. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: 'El séptimo orden, que es mayor que todos los órdenes mencionados anteriormente: exultarán con confianza, confiarán sin ser avergonzados, y se alegrarán sin temor, porque se apresuran a ver el rostro de aquel a quien sirvieron mientras vivían, y de quien, glorificados, han de recibir su recompensa.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Septimus ordo
  english_pob_choice: The seventh order
  chosen_spanish: El séptimo orden
  alternatives_spanish:
  - El séptimo rango
  - El séptimo grupo
  - El séptimo orden
  lexicon: ordo
  rationale: Conserva la correspondencia técnica con el latín 'ordo' y con el inglés POB 'order'. En español, 'orden' es suficientemente natural y mantiene la idea de una serie o clase sin introducir una interpretación más específica que el texto no exige.
- source_word: qui est omnibus supradictis maior
  english_pob_choice: which is greater than all the orders mentioned above
  chosen_spanish: que es mayor que todos los órdenes mencionados arriba
  alternatives_spanish:
  - que es más grande que todos los órdenes mencionados arriba
  - que supera a todos los órdenes mencionados arriba
  lexicon: maior
  rationale: '''Mayor'' sigue de cerca el comparativo latino y evita un giro demasiado libre. ''Órdenes mencionados arriba'' reproduce la referencia a los grupos previos sin añadir contenido.'
- source_word: exultabunt cum fiducia
  english_pob_choice: they will exult with confidence
  chosen_spanish: exultarán con confianza
  alternatives_spanish:
  - se regocijarán con confianza
  - exultarán con seguridad
  lexicon: exultabunt
  rationale: '''Exultarán'' preserva la intensidad jubilosa del latín y coincide con el inglés POB. ''Con confianza'' mantiene ''cum fiducia'' de manera directa y clara en español.'
- source_word: confidebunt non confusi
  english_pob_choice: trust without being put to shame
  chosen_spanish: confiarán sin ser avergonzados
  alternatives_spanish:
  - confiarán sin quedar avergonzados
  - confiarán sin ser confundidos
  lexicon: confidebunt / confusi
  rationale: La revisión inglesa corrigió la línea hacia 'trust without being put to shame'. En español, 'confiarán' refleja mejor el valor de 'confidebunt' que 'serán valientes', y 'sin ser avergonzados' reproduce el pasivo de deshonra implícito en 'non confusi'.
- source_word: gaudebunt non reuerentes
  english_pob_choice: rejoice without fear
  chosen_spanish: se alegrarán sin temor
  alternatives_spanish:
  - se regocijarán sin temor
  - se gozarán sin temor
  lexicon: gaudebunt / non reuerentes
  rationale: '''Se alegrarán'' es idiomático y fiel a ''gaudebunt''. ''Sin temor'' conserva el sentido del participio negativo latino; se evita una traducción más interpretativa que oscurezca la sencillez de la cláusula.'
- source_word: festinant enim uidere uultum
  english_pob_choice: for they hasten to see the face of him
  chosen_spanish: porque se apresuran a ver el rostro de aquel
  alternatives_spanish:
  - porque se apresuran a ver la faz de aquel
  - pues se apresuran a ver el rostro de aquel
  lexicon: uidere uultum
  rationale: '''Ver el rostro'' traduce literalmente ''uidere uultum'' y mantiene el valor bíblico de la expresión. ''Aquel'' permite continuar sin imponer una identificación explícita no presente en esta línea sola.'
- source_word: quem in vita sua seruierunt
  english_pob_choice: whom they served while living
  chosen_spanish: a quien sirvieron mientras vivían
  alternatives_spanish:
  - a quien sirvieron en vida
  - a quien servían mientras vivían
  lexicon: seruierunt
  rationale: '''Sirvieron mientras vivían'' expresa con naturalidad el tiempo de la acción y preserva el sentido de servicio personal del latín.'
- source_word: a quo gloriosi accepturi sunt mercedem
  english_pob_choice: from whom they, being glorified, are to receive their reward
  chosen_spanish: y de quien, glorificados, han de recibir su recompensa
  alternatives_spanish:
  - y de quien, siendo glorificados, recibirán su recompensa
  - y de quien han de recibir su recompensa gloriosa
  lexicon: gloriosi / mercedem
  rationale: La revisión inglesa destacó que 'gloriosi' modifica a los sujetos, no a la recompensa. Por eso 'glorificados' va referido a 'ellos', mientras 'recompensa' conserva el objeto de 'mercedem' sin atribuirle el adjetivo.
theological_decisions:
- issue: Relación de 'glorificados' con el sujeto, no con la recompensa
  english_pob_reading: from whom they, being glorified, are to receive their reward
  chosen_spanish_reading: de quien, glorificados, han de recibir su recompensa
  alternative_spanish_readings:
  - de quien han de recibir su recompensa gloriosa
  - de quien, siendo glorificados, recibirán su recompensa
  rationale: 'Sigo la corrección del audit trail: el adjetivo latino ''gloriosi'' describe a los destinatarios, no al premio. La redacción española coloca ''glorificados'' junto al sujeto implícito para evitar trasladar la gloria a la recompensa.'
  doctrine_reference: No doctrinal issue; grammatical and semantic alignment with the Latin source.
- issue: Valor de 'confidebunt non confusi' como confianza sin vergüenza
  english_pob_reading: trust without being put to shame
  chosen_spanish_reading: confiarán sin ser avergonzados
  alternative_spanish_readings:
  - confiarán sin quedar avergonzados
  - confiarán sin ser confundidos
  rationale: La revisión inglesa ya interpretó el giro como ausencia de vergüenza, no como mera audacia. En español, 'ser avergonzados' conserva esa vergüenza/deshonra sin perder naturalidad.
  doctrine_reference: No doctrinal issue; supports the righteous hope of final vindication.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que corrigió 'be bold without confusion' a 'trust without being put to shame', y también la adjudicación gramatical que hace que 'gloriosi' modifique a los sujetos, no a 'mercedem'. Por eso la versión española evita trasladar 'glorioso' a 'recompensa' y conserva la noción de confianza/vindicación sin vergüenza.
  spanish_consistency_notes:
  - He mantenido 'orden' para 'ordo' por coherencia con el texto fuente y con la traducción inglesa auditada.
  - He usado 'Yahvé' solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - He preferido 'confiarán' frente a un calco de 'serán valientes' porque el latín revisado exige confianza, no solo audacia.
  - He evitado 'Cristo/Mesías' porque no corresponde a este versículo.
  - He conservado un registro sobrio y litúrgicamente legible sin añadir explicaciones interpretativas al cuerpo del texto.
