translation:
  language: es
  text: Pero si Yahvé crea algo nuevo[a], y la tierra abre su boca y los traga a ellos y a todo lo que les pertenece, y descienden vivos al Seol[b], entonces sabrán que estos hombres han despreciado a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «crea algo extraordinario»; el hebreo combina un sustantivo cognado con el verbo para enfatizar una acción divina extraordinaria.
    reason: lexical_alternative
  - marker: b
    text: Seol es el término hebreo para el ámbito de los muertos; alternativamente, «la tumba» en un sentido más concreto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִיאָה / יִבְרָא
  english_pob_choice: creates something new
  chosen_spanish: crea algo nuevo
  alternatives_spanish:
  - crea una creación
  - crea algo extraordinario
  - hace algo nuevo
  lexicon: HALOT
  rationale: Conservo el vínculo cognado entre el sustantivo y el verbo con una solución natural en español. «Algo nuevo» reproduce la idea de una acción divina inusual sin sobrecargar el texto con una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El proyecto pide representar el Tetragrámaton como «Yahvé». Mantiene el nombre propio divino y evita la sustitución por un título.
- source_word: הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  - la tierra
  lexicon: HALOT
  rationale: «Tierra» comunica de forma clara la imagen de la superficie que se abre. Aunque «suelo» también sería posible, «tierra» suena más natural en español bíblico contemporáneo.
- source_word: פִּיהָ
  english_pob_choice: its mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - su abertura
  lexicon: HALOT
  rationale: Mantengo la personificación de la tierra con «su boca», porque el hebreo conserva esa imagen antropomórfica.
- source_word: וּבָלְעָה
  english_pob_choice: swallows
  chosen_spanish: los traga
  alternatives_spanish:
  - los engulle
  - los devora
  lexicon: HALOT
  rationale: «Tragar» refleja bien el verbo hebreo בלע y funciona de manera directa en español. Conserva la imagen física sin intensificarla innecesariamente.
- source_word: כָּל אֲשֶׁר לָהֶם
  english_pob_choice: all that belongs to them
  chosen_spanish: todo lo que les pertenece
  alternatives_spanish:
  - todo lo que tienen
  - todo lo que es suyo
  - todo cuanto les pertenece
  lexicon: HALOT
  rationale: La frase abarca posesiones y pertenencias en sentido amplio. «Todo lo que les pertenece» conserva esa amplitud sin reducirla a objetos solamente.
- source_word: שְׁאֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - la tumba
  - el reino de los muertos
  - el sepulcro
  lexicon: HALOT
  rationale: Conservo el término técnico «Seol» para preservar la carga conceptual del hebreo. No lo reduzco a «tumba» o «sepulcro», que estrecharían su alcance.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - con vida
  - vivos
  lexicon: HALOT
  rationale: «Vivos» mantiene el énfasis del hebreo en que descienden con vida, no como resultado de una muerte ordinaria.
- source_word: וִידַעְתֶּם
  english_pob_choice: then you will know
  chosen_spanish: entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: 'El sentido es inferencial: la señal propuesta llevará al reconocimiento del hecho. «Entonces» expresa esa consecuencia de manera natural.'
- source_word: נִאֲצוּ
  english_pob_choice: have despised
  chosen_spanish: han despreciado
  alternatives_spanish:
  - han menospreciado
  - han tratado con desprecio
  - han rechazado con desprecio
  lexicon: HALOT
  rationale: «Despreciar» transmite bien el tono de menosprecio y rechazo contra Yahvé. Mantiene la fuerza moral del verbo hebreo sin endurecerlo más allá del contexto.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  - estos varones
  lexicon: HALOT
  rationale: El hebreo es masculino plural explícito; por eso conservo «estos hombres» y no neutralizo el género.
theological_decisions:
- issue: Terminología de שְׁאוֹל
  english_pob_reading: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the grave' in a more concrete sense.
  chosen_spanish_reading: Seol como término técnico para el ámbito de los muertos, sin reducirlo a una tumba física.
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el reino de los muertos
  rationale: La transliteración preserva la tensión conceptual del texto hebreo y evita cerrar su alcance teológico. En una nota puede explicarse la alternativa más concreta sin perder el término principal.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Nombre divino en el contexto del juicio
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El contexto usa el nombre del pacto en un pronunciamiento de juicio. Mantener «Yahvé» preserva la identidad del sujeto y la continuidad con la política terminológica del proyecto.
  doctrine_reference: Tetragrammaton rendered as the divine name rather than substituted title.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, que prefirió «something new» sobre «something unprecedented» por mayor cercanía léxica al hebreo. Por eso se eligió «algo nuevo» en vez de una paráfrasis más interpretativa. También se respetó la decisión estable de conservar «Yahvé» y «Seol» como términos técnicos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, en coherencia con el estándar del proyecto.
  - Se mantiene «Seol» para שְׁאֹל, con nota explicativa sobre su alcance semántico.
  - Se conserva el masculino plural «estos hombres» para הָאֲנָשִׁים הָאֵלֶּה.
  - La personificación de la tierra se preserva con «su boca», en paralelo con el hebreo.
  - «Algo nuevo» sigue la revisión auditada y evita intensificar indebidamente el adjetivo.
