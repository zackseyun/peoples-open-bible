translation:
  language: es
  text: Miren, yo los traigo de la tierra del norte y los reuniré desde las partes más remotas de la tierra[a]. Entre ellos estarán los ciegos y los cojos, la mujer embarazada y la que está de parto, juntos; una gran asamblea volverá aquí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las partes más remotas del país». Hebreo אֶרֶץ puede significar «tierra» o «país», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La expresión profética introduce con fuerza deíctica y llama la atención del oyente. En español, «¡Mira!» conserva el tono directo y solemne sin sonar forzado; «He aquí» es más tradicional, pero menos natural en español actual.
- source_word: מֵבִיא
  english_pob_choice: I am bringing
  chosen_spanish: Yo los traeré
  alternatives_spanish:
  - Yo los estoy trayendo
  - Estoy trayéndolos
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción segura e inminente. En español, el futuro simple comunica bien esa certeza profética y suena más natural que un presente progresivo.
- source_word: מֵאֶרֶץ צָפוֹן
  english_pob_choice: from the land of the north
  chosen_spanish: de la tierra del norte
  alternatives_spanish:
  - del país del norte
  - de la tierra norteña
  lexicon: HALOT
  rationale: «Tierra del norte» reproduce la construcción geográfica sin identificar de más el referente. «Tierra» conserva el valor de אֶרֶץ, que puede ser «tierra» o «país/land» según el contexto.
- source_word: וְקִבַּצְתִּים
  english_pob_choice: and I will gather them
  chosen_spanish: y los reuniré
  alternatives_spanish:
  - y los congregaré
  - y los juntaré
  lexicon: HALOT
  rationale: «Reunir» comunica el valor de regathering/restauración de forma clara en español. «Congregar» sería más eclesial; «juntar» es posible, pero menos solemne.
- source_word: מִיַּרְכְּתֵי אָרֶץ
  english_pob_choice: from the farthest parts of the earth
  chosen_spanish: desde las partes más remotas de la tierra
  alternatives_spanish:
  - desde los confines de la tierra
  - desde los extremos más lejanos de la tierra
  lexicon: HALOT
  rationale: «Partes más remotas» refleja bien el sentido de recesos/extremidades lejanas de יַרְכְּתֵי. Mantiene la amplitud geográfica que el texto permite sin resolver de antemano si se piensa más en «tierra» o «país».
- source_word: בָּם
  english_pob_choice: Among them are
  chosen_spanish: Entre ellos habrá
  alternatives_spanish:
  - Entre ellos están
  - En medio de ellos habrá
  lexicon: HALOT
  rationale: La frase introduce la composición del grupo retornante. «Entre ellos habrá» es natural en español y conserva la idea de inclusión dentro del conjunto.
- source_word: עִוֵּר וּפִסֵּחַ
  english_pob_choice: the blind and the lame
  chosen_spanish: el ciego y el cojo
  alternatives_spanish:
  - los ciegos y los cojos
  - el invidente y el lisiado
  lexicon: HALOT
  rationale: El par nominal se conserva de manera breve y reconocible. En singular colectivo, el español suena idiomático y refleja la forma hebrea sin añadir explicaciones.
- source_word: הָרָה וְיֹלֶדֶת
  english_pob_choice: the pregnant woman and the woman in labor
  chosen_spanish: la mujer encinta y la que da a luz
  alternatives_spanish:
  - la embarazada y la mujer que está dando a luz
  - la mujer embarazada y la parturienta
  lexicon: HALOT
  rationale: El hebreo usa formas femeninas singulares representativas. «Encinta» y «la que da a luz» mantienen la referencia femenina sin exigir una paráfrasis excesiva; «parturienta» sería correcto, pero más técnico.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - juntos
  - todos juntos
  lexicon: HALOT
  rationale: «Juntamente» reproduce el énfasis colectivo de manera sobria y formal. También evita repetir «juntos» en un contexto donde ya se está hablando de reunión.
- source_word: קָהָל גָּדוֹל
  english_pob_choice: a great assembly
  chosen_spanish: una gran asamblea
  alternatives_spanish:
  - una gran congregación
  - una gran multitud
  lexicon: HALOT
  rationale: «Asamblea» preserva el sentido corporativo sin cargarlo con terminología eclesiástica posterior. «Multitud» pierde algo del matiz de reunión ordenada.
- source_word: יָשׁוּבוּ הֵנָּה
  english_pob_choice: will return here
  chosen_spanish: volverá aquí
  alternatives_spanish:
  - retornará aquí
  - vendrá aquí de vuelta
  lexicon: HALOT
  rationale: 'El hebreo marca dirección hacia «aquí». En español, el singular colectivo con «asamblea» permite una concordancia natural: «volverá aquí». Mantiene la orientación del movimiento final del verso.'
theological_decisions:
- issue: Inclusión de los vulnerables en la restauración
  english_pob_reading: The verse explicitly includes the blind, the lame, pregnant women, and women in labor within the returning people.
  chosen_spanish_reading: El verso incluye explícitamente al ciego, al cojo, a la mujer encinta y a la que da a luz dentro del pueblo que regresa.
  alternative_spanish_readings:
  - La lista es solo retórica para describir una gran multitud
  - Los términos son meras imágenes de debilidad
  rationale: La formulación hebrea presenta a estos grupos como parte real del conjunto que vuelve. La traducción no debe diluir esa inclusión concreta ni convertirla en mera figura retórica.
  doctrine_reference: Conservar la tensión y el alcance social del texto profético
- issue: Alcance de אֶרֶץ en מִיַּרְכְּתֵי אָרֶץ
  english_pob_reading: 'Rendered as a broad geographic expression: ''the farthest parts of the earth.'''
  chosen_spanish_reading: 'Se vierte como una expresión geográfica amplia: «las partes más remotas de la tierra».'
  alternative_spanish_readings:
  - las partes más remotas del país
  - los confines de la tierra
  rationale: El hebreo puede significar «tierra» o «país» según el contexto. Aquí se mantiene la amplitud geográfica permitida por el texto y se deja abierta la posibilidad semántica sin imponer una identificación geopolítica estrecha.
  doctrine_reference: Primacía del hebreo original sobre una tradición de traducción fija
- issue: Concordancia singular en «una gran asamblea volverá aquí»
  english_pob_reading: a great assembly will return here
  chosen_spanish_reading: una gran asamblea volverá aquí
  alternative_spanish_readings:
  - una gran asamblea volverán aquí
  - un gran grupo volverá aquí
  rationale: Aunque el referente colectivo incluye muchas personas, el sustantivo singular «asamblea» admite verbo singular en español y preserva mejor la forma del enunciado profético.
  doctrine_reference: Respeto por la forma retórica del texto fuente
translation_notes:
  revision_awareness: 'La versión inglesa auditada muestra una lectura estable sin cambios recientes (latest_revision_pass: unchanged). Se conserva su solución principal para los términos geográficos y de reunión, y se traslada al español con ajustes naturales de concordancia y estilo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando corresponda; en este versículo no aparece el nombre divino explícito.
  - «Tierra» traduce אֶרֶץ de forma consistente con la nota lexical y la amplitud contextual del hebreo.
  - Se conserva el paralelismo del verso con estructura de movimiento (traer/reunir/volver).
  - No se introduce vocabulario eclesiástico posterior donde el hebreo habla de una asamblea o reunión restaurada.
