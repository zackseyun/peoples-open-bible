translation:
  language: es
  text: 'Y el rey dijo a Barzilái: «Tú, cruza conmigo, y yo te sustentaré[a] conmigo en Jerusalén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «yo te proveeré» o «yo te apoyaré». El verbo hebreo expresa el sentido de proporcionar lo necesario para el sustento de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y habló
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el siguiente hecho en secuencia. «Y» conserva el flujo narrativo hebreo sin añadir una relación temporal más fuerte que la del texto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Sustantivo definido y claro en contexto; en esta escena se refiere a David.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: Preposición regular de destinatario del discurso en español.
- source_word: בַּרְזִלָּי
  english_pob_choice: Barzillai
  chosen_spanish: Barzilái
  alternatives_spanish:
  - Barzilai
  lexicon: Transliteración editorial
  rationale: Se conserva el nombre propio con transliteración española consistente y pronunciable.
- source_word: אַתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis antes del imperativo; en español se conserva con «Tú» al inicio de la cita.
- source_word: עֲבֹר
  english_pob_choice: cross over
  chosen_spanish: cruza
  alternatives_spanish:
  - pasa
  - cruza de un lado a otro
  lexicon: HALOT
  rationale: En este contexto narrativo, especialmente de desplazamiento, el verbo puede expresarse de manera natural con «cruza»; el matiz de מעבר/crossing se mantiene por el contexto de la escena.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  - junto a mí
  lexicon: HALOT
  rationale: Equivale naturalmente a acompañamiento en español. Se integra de forma idiomática en la oración exhortativa.
- source_word: וְכִלְכַּלְתִּי
  english_pob_choice: I will provide for
  chosen_spanish: yo te proveeré
  alternatives_spanish:
  - yo te sustentaré
  - yo te mantendré
  lexicon: HALOT
  rationale: כלכל comunica sostén/provisión de necesidades. «Proveer» comunica bien ese soporte en español moderno sin perder la idea de manutención. Se deja abierta la alternativa semántica mediante nota.
- source_word: אֹתְךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: El objeto directo pronominal se expresa naturalmente con clítico en español.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - en mi compañía
  lexicon: HALOT
  rationale: La expresión de acompañamiento se conserva literalmente en español.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar con preposición locativa.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado del WLC y el aparato auditado en inglés. No hubo revisiones aplicadas en la pasada más reciente; la lectura inglesa de alta concordancia se reflejó en español manteniendo el sentido de apoyo/provisión de כלכל y la secuencia narrativa de wayyiqtol.
  spanish_consistency_notes:
  - Se preserva el orden narrativo sin añadir explicaciones no presentes en el hebreo.
  - Se usa «proveer» como equivalente idiomático de כלכל, con nota para el matiz de sostén.
  - Se optó por una transliteración española uniforme de Barzillai/Barzilái para lectura pública.
  - La puntuación de la cita directa sigue normas españolas; el corchete en «con[mí]» marca la elisión estilística de la preposición + pronombre para evitar duplicación poco natural en español.
