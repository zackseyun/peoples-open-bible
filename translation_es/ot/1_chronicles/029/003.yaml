  to: Además[a], debido a mi deleite en la casa de mi Dios[b], tengo un tesoro personal de oro y plata, y lo he dado a la casa de mi Dios, por encima de todo lo que he preparado para la casa santa[c].
  rationale: Se conserva la traducción base porque es sustancialmente fiel, pero se mejora la naturalidad de בִּרְצוֹתִי con «debido a mi deleite» y se alinean las notas con la auditoría inglesa, eliminando explicaciones innecesarias o potencialmente confusas no sustentadas directamente por el expediente.
