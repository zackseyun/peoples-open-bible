translation:
  language: es
  text: Porque Gaza será abandonada[a], y Ascalón, una desolación; Asdod la echarán al mediodía[b], y Ecrón será desarraigada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo probablemente contiene un juego de palabras: «Gaza» (ʿAzzah) y «abandonada» (ʿazuvah) suenan de modo parecido.'
    reason: lexical_alternative
  - marker: b
    text: O «a mediodía». La frase subraya que la expulsión de Asdod ocurrirá a plena luz del día, no bajo el amparo de la oscuridad.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o base del juicio anunciado; «Porque» conserva bien la relación causal en español y suena natural al inicio de una sentencia profética.
- source_word: עַזָּה
  english_pob_choice: Gaza
  chosen_spanish: Gaza
  lexicon: HALOT
  rationale: Nombre propio de lugar; se mantiene la forma habitual en español.
- source_word: עֲזוּבָה תִהְיֶה
  english_pob_choice: will be abandoned
  chosen_spanish: será abandonada
  alternatives_spanish:
  - será desierta
  - será dejada
  lexicon: HALOT
  rationale: El pasivo/resultativo de עזב se expresa de manera natural con «será abandonada». Conserva el posible juego de palabras con «Gaza» sin forzar una solución artificial en español.
- source_word: אַשְׁקְלוֹן
  english_pob_choice: Ashkelon
  chosen_spanish: Ascalón
  alternatives_spanish:
  - Asquelón
  - Ashkelón
  lexicon: HALOT
  rationale: Nombre propio; se adopta la forma castellanizada más reconocible y eufónica para lectura eclesial amplia.
- source_word: לִשְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: será desolación
  alternatives_spanish:
  - será una desolación
  - quedará desolada
  lexicon: HALOT
  rationale: שממה expresa devastación/desolación. En español, un predicado nominal sin artículo tras «será» transmite bien la sentencia profética y evita añadir matices no presentes en el hebreo.
- source_word: אַשְׁדּוֹד
  english_pob_choice: Ashdod
  chosen_spanish: Asdod
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma española establecida.
- source_word: בַּצָּהֳרַיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - en pleno día
  lexicon: HALOT
  rationale: «Al mediodía» es la equivalencia más natural y mantiene la fuerza de exposición pública/buena visibilidad de la expulsión.
- source_word: יְגָרְשׁוּהָ
  english_pob_choice: they will drive her out
  chosen_spanish: la echarán
  alternatives_spanish:
  - la expulsarán
  - la arrojarán fuera
  lexicon: HALOT
  rationale: גרשׁ significa expulsar/expulsar fuera. «La echarán» es breve, enérgico y suficientemente literal; el pronombre femenino preserva la personificación de la ciudad en hebreo.
- source_word: וְעֶקְרוֹן
  english_pob_choice: and Ekron
  chosen_spanish: y Ecrón
  alternatives_spanish:
  - y Ekron
  lexicon: HALOT
  rationale: Nombre propio; se usa una forma castellana común para consistencia con las demás ciudades.
- source_word: תֵּעָקֵר
  english_pob_choice: will be uprooted
  chosen_spanish: será arrancada
  alternatives_spanish:
  - será desarraigada
  - será uprootada
  lexicon: HALOT
  rationale: El Niphal de עקר lleva la imagen de ser arrancado de raíz. «Será arrancada» comunica bien la metáfora de expulsión total en español, aunque «desarraigada» también sería posible.
translation_notes:
  revision_awareness: Se ha seguido de cerca el audit trail inglés, manteniendo la misma secuencia semántica y el mismo sentido de juicio sobre las ciudades filisteas, con adaptación idiomática natural al español. No hubo revisiones posteriores sustantivas en el pasaje de referencia.
  spanish_consistency_notes:
  - Se conserva la personificación femenina de las ciudades mediante pronombres y participios femeninos («abandonada», «la», «arrancada»).
  - Se evita reemplazar los nombres propios por formas totalmente inglesas para mantener una lectura española natural.
  - «Porque» refleja la relación causal/inferencial del כִּי sin añadir intensidad interpretativa excesiva.
