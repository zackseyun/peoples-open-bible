  text: λέγων αὐτοῖς· ⸀Πορεύεσθε εἰς τὴν κώμην τὴν ⸀κατέναντι ὑμῶν, καὶ ⸀εὐθέως εὑρήσετε ὄνον δεδεμένην καὶ πῶλον μετ’ αὐτῆς· λύσαντες ⸀ἀγάγετέ μοι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/002.yaml
  text: saying to them[a], “Go into the village opposite you, and immediately you will find a donkey tied, and a colt with her[c][b]. Untie them and bring them to me.”
  footnotes:
  - marker: a
    text: Or “across from you” for the village’s location.
    reason: lexical_alternative
  - marker: b
    text: “Colt” here means a young donkey, as the context makes clear.
    reason: lexical_alternative
  - marker: c
    text: 'The Greek literally has a participle, “having untied,” followed by an imperative, “bring”; English commonly renders the sequence as two commands: “Untie them and bring them.”'
    reason: lexical_alternative
