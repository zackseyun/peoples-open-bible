revisions:
- from: No ofrecerán más sus sacrificios a los demonios-cabra[a], tras quienes se prostituyen[b]. Esta será para ellos una ordenanza perpetua[c] por todas sus generaciones.
  to: Ya no sacrificarán sus sacrificios a los demonios con forma de cabra[a], tras los cuales se prostituyen[b]. Esta será para ellos una ordenanza perpetua[c] por sus generaciones.
  rationale: Se ajusta 'no ofrecerán más' a 'ya no sacrificarán' para reflejar mejor עוֹד y preservar de modo más directo el vínculo léxico con זִבְחֵיהֶם. Se reemplaza 'demonios-cabra' por una formulación más natural en español sin perder la lectura teológica documentada. Se suaviza la construcción relativa y se mejora la fórmula final generacional. También se corrige la nota c para que ofrezca alternativas reales.
