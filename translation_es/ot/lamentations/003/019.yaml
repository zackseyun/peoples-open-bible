review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: imperativo directo («זְכָר»), «mi aflicción» para עָנְיִי, «mi vagar» para מְרוּדִי, y las imágenes concretas «ajenjo» y «hiel» para לַעֲנָה וָרֹאשׁ. La única falla sustancial está en la nota a, que deja sin traducir el término inglés «homelessness», lo cual rompe la fidelidad editorial al rastro de auditoría y la legibilidad española.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español bíblico contemporáneo. «Acuérdate de mi aflicción y de mi vagar, del ajenjo y de la hiel» suena bien y conserva el tono poético. La nota b también está bien formulada. Debe corregirse la nota a para evitar el anglicismo crudo y mantener español idiomático.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. Las decisiones «ajenjo» y «hiel» concuerdan con la racionalidad léxica documentada; «mi vagar» preserva adecuadamente la amplitud de מְרוּדִי, con «falta de hogar» como alternativa interpretativa en nota.
  issues:
  - severity: medium
    issue: La nota a contiene el anglicismo no traducido «homelessness».
    rationale: La tarea exige español natural y legible, y además pide trabajar desde la decisión léxica auditada, no copiar mecánicamente el inglés. Debe decir «falta de hogar» o «desarraigo», no dejar el término en inglés.
  revised_spanish_text: Acuérdate de mi aflicción y de mi vagar[a], del ajenjo y de la hiel[b].
  revised_footnotes:
  - marker: a
    text: O «mi falta de hogar»; el hebreo sugiere vagar sin asentamiento fijo, incluso una condición de desarraigo o falta de hogar.
    reason: lexical_alternative
  - marker: b
    text: «Ajenjo y hiel» son imágenes concretas de amargura y veneno; también pueden entenderse metafóricamente como extrema amargura.
    reason: cultural_note
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota léxica para sustituir el anglicismo «homelessness» por una alternativa española clara y acorde con la justificación auditada.
