  rationale: Se corrigió un error semántico importante reemplazando 'las primicias de tu rebaño' por 'las crías de tu rebaño', en conformidad con el hebreo contextual y la decisión auditada de la POB inglesa. También se ajustó 'la cría de tus hatos' a 'las crías de tus hatos' para mejorar naturalidad y paralelismo, y se movió la nota alternativa al lugar correcto en 'tus padres'. No se requiere adjudicación adicional porque la corrección es clara y está sólidamente respaldada por la auditoría existente.
