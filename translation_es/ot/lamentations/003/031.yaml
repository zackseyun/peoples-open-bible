translation:
  language: es
  text: Pues el Señor no rechazará para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desechará», «desamparará» o «abandonará». El verbo hebreo puede denotar rechazar, desechar o abandonar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: La partícula introduce la razón o fundamento del contexto anterior; en español, «Porque» comunica bien esa relación sin decidir en exceso entre valor causal y explicativo.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: Negación directa del verbo; «no» preserva la estructura simple del hebreo.
- source_word: יִזְנַח
  english_pob_choice: will reject
  chosen_spanish: rechazará
  alternatives_spanish:
  - arrojará fuera
  - desechará
  - abandonará
  lexicon: HALOT
  rationale: זנח puede implicar rechazar, desechar o apartar. «Rechazará» es natural en español moderno y conserva el peso relacional del verbo sin intensificarlo más de lo que exige el texto.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - para toda la vida
  - por siempre
  lexicon: HALOT
  rationale: El término expresa duración indefinida o permanente. «Para siempre» es la forma más idiomática en español y mantiene la idea de que el rechazo no será permanente.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: אֲדֹנָי es un título divino. En español, «el Señor» reproduce el artículo del contexto y suena natural; no se usa «Yahvé» porque aquí el hebreo no es el Tetragrama, sino el título אדֹנָי.
theological_decisions:
- issue: Título divino אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: El hebreo emplea el título אדֹנָי, no el nombre propio YHWH. Por eso la traducción debe mantener un título de soberanía; «el Señor» respeta el dato textual y la sintaxis española.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terms table for κύριος/Kyrios → Lord'
translation_notes:
  revision_awareness: 'El audit trail inglés no requirió revisiones: mantuvo la lectura óptima «will not reject forever». La versión española conserva esa misma relación semántica, con un verbo natural («rechazará») y el adverbial temporal «para siempre».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas porque aquí no aparece el Tetragrama, sino el título אֲדֹנָי.
  - «el Señor» mantiene el artículo que el inglés resolvía de forma natural con «the Lord».
  - La nota textual preserva la gama semántica del verbo זנח sin sobretraducirla.
