translation:
  language: es
  text: El fruto[a] de tu tierra y todo tu trabajo[b] se lo comerá un pueblo que no has conocido; y serás solamente oprimido y aplastado todos tus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la producción de tu tierra’.
    reason: lexical_alternative
  - marker: b
    text: O ‘tu esfuerzo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - producción
  - producto
  lexicon: HALOT
  rationale: ‘Fruto’ conserva la imagen concreta de producción agrícola y es el equivalente español más natural de ‘fruit’ en este contexto de cosecha y tierra.
- source_word: אַדְמָתְךָ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu suelo
  - tu terreno
  lexicon: HALOT
  rationale: En el contexto de la maldición del pacto, se refiere a la tierra cultivada del destinatario; ‘tierra’ comunica mejor que ‘suelo’ o ‘terreno’ la posesión agrícola y nacional.
- source_word: יְגִיעֲךָ
  english_pob_choice: your labor
  chosen_spanish: tu trabajo
  alternatives_spanish:
  - tu labor
  - tu esfuerzo
  - tu toil
  lexicon: HALOT
  rationale: El término puede referirse al trabajo realizado y a su producto. ‘Trabajo’ es claro en español y permite que ‘se lo comerá’ mantenga la idea de consumir el fruto del esfuerzo.
- source_word: יֹאכַל
  english_pob_choice: will eat
  chosen_spanish: se lo comerá
  alternatives_spanish:
  - comerá
  - consumirá
  - devorará
  lexicon: HALOT
  rationale: El verbo básico ‘comer’ se mantiene; el clítico ‘se lo’ hace explícito en español que el pueblo ajeno consumirá ese fruto y ese trabajo. ‘Consumirá’ o ‘devorará’ serían más intensos de lo que exige el hebreo.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - gente
  lexicon: HALOT
  rationale: ‘Pueblo’ refleja bien el singular colectivo hebreo y evita una paráfrasis más abstracta como ‘nación’.
- source_word: אֲשֶׁר לֹא יָדָעְתָּ
  english_pob_choice: whom you have not known
  chosen_spanish: que no has conocido
  alternatives_spanish:
  - a quien no has conocido
  - que no conocías
  - del que no tenías conocimiento
  lexicon: HALOT
  rationale: ‘Conocer’ reproduce la relación personal y de experiencia del verbo ידע. El relativo ‘que’ es el español más natural con ‘pueblo’.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solamente
  alternatives_spanish:
  - solo
  - únicamente
  - nada más
  lexicon: HALOT
  rationale: 'El adverbio enfatiza exclusividad: no habrá más resultado que opresión y quebranto. ‘Solamente’ conserva ese valor enfático con dignidad estilística.'
- source_word: עָשׁוּק
  english_pob_choice: oppressed
  chosen_spanish: oprimido
  alternatives_spanish:
  - abusado
  - afligido
  - explotado
  lexicon: HALOT
  rationale: El participio pasivo expresa estar sometido/oprimido; ‘oprimido’ es el equivalente más directo y amplio en español.
- source_word: רָצוּץ
  english_pob_choice: crushed
  chosen_spanish: aplastado
  alternatives_spanish:
  - quebrantado
  - molido
  - deshecho
  lexicon: HALOT
  rationale: ‘Aplastado’ conserva la fuerza imagística de ser quebrado o reducido por presión, y funciona bien en paralelo con ‘oprimido’.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all your days
  chosen_spanish: todos los días
  alternatives_spanish:
  - todo el tiempo
  - todos tus días
  - de continuo
  lexicon: HALOT
  rationale: La expresión idiomática de duración continua se vierte de manera natural en español como ‘todos los días’; el contexto ya hace claro que es una condición prolongada.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés. Se mantiene la doble idea de ‘fruto de la tierra’ y ‘todo tu trabajo’, sin fusionarlas ni intensificar el verbo más allá de ‘comer’. No se introdujeron notas doctrinales porque el versículo no presenta una tensión teológica especial en el paquete de fuente.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no aplica aquí porque el versículo no contiene el nombre divino.
  - Se prefirió ‘fruto’/‘tierra’/‘trabajo’ para reflejar el campo agrícola y laboral del hebreo.
  - ‘Un pueblo’ conserva el singular colectivo de עַם.
  - ‘Oprimido y aplastado’ mantiene el paralelismo de dos participios pasivos con fuerza negativa continua.
