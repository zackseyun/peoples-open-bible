  rationale: Se corrigen los anclajes de las notas para que coincidan con las frases que explican, se elimina «lejos» por ser una explicitación no exigida por el hebreo, y se suaviza «estaba fuerte» a «era fuerte» para un español más natural conservando plenamente la imagen y el sentido fuente.
