lexical_decisions:
- source_word: קָצַף
  english_pob_choice: was very angry
  chosen_spanish: se había indignado mucho
  alternatives_spanish:
  - estaba muy enojado
  - se había airado mucho
  - estaba muy indignado
  lexicon: HALOT
  rationale: El verbo expresa ira o indignación fuerte. En español, «se había indignado mucho» comunica el énfasis intensivo del hebreo sin sonar tan coloquial como «enojado» y sin repetir mecánicamente el sustantivo cognado. El pluscuamperfecto refleja bien el estado previo al llamado profético del contexto inmediato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título. «Yahveh» es una variante ortográfica posible, pero «Yahvé» es la forma establecida para el texto principal.
- source_word: עַל
  english_pob_choice: with
  chosen_spanish: contra
  alternatives_spanish:
  - con
  - sobre
  - para con
  lexicon: HALOT
  rationale: Con verbos de enojo, la preposición indica el destinatario de la ira. En español, «contra» expresa con naturalidad esa dirección afectiva y mantiene la fuerza relacional del hebreo mejor que una formulación más neutral.
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: vuestros padres
  alternatives_spanish:
  - vuestros antepasados
  - vuestros padres/antepasados
  lexicon: HALOT
  rationale: Se conserva la forma literal «padres», que reproduce el sustantivo hebreo y mantiene la conexión intergeneracional del profeta. En español bíblico puede referirse a los antepasados; por eso se ofrece una alternativa léxica en la nota.
- source_word: קָצֶף
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  - muy
  lexicon: HALOT
  rationale: El sustantivo cognado funciona de manera intensiva en la construcción («se enojó con enojo»). En español, «mucho» comunica esa intensificación de forma natural y evita una repetición torpe, preservando la fuerza semántica del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo nombra directamente a YHWH. Se traduce como «Yahvé» para preservar el nombre propio del pacto y evitar la sustitución litúrgica por un título, de acuerdo con la doctrina del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Valor intensivo de קָצַף + קָצֶף
  english_pob_reading: was very angry
  chosen_spanish_reading: se había indignado mucho
  alternative_spanish_readings:
  - estaba muy enojado
  - se había airado mucho
  rationale: El hebreo usa una construcción enfática con verbo y sustantivo de la misma raíz. La traducción española mantiene la intensidad sin convertirla en una redundancia artificial, y preserva la carga profética de juicio contra los antepasados.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal-equivalence'
translation_notes:
  revision_awareness: 'El audio-trail inglés no requiere cambios textuales: mantiene el nombre divino como Yahweh, resuelve la construcción enfática con un intensificador natural y conserva la alternativa semántica de fathers/ancestors. La propuesta española sigue esa misma línea, adaptando la intensificación a un giro idiomático natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para YHWH, coherente con el criterio del proyecto.
  - Se conserva el registro bíblico con «vuestros padres» y se aclara en nota la alternativa «antepasados».
  - La intensidad de la raíz verbal y nominal se reproduce con «mucho», evitando calco pesado.
  - La puntuación y el tratamiento de persona plural son adecuados para un oráculo dirigido a la comunidad.
  - El texto principal queda breve y publicable, con notas que preservan la alternativa léxica documentada.
