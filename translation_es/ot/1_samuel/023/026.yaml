  text: וַ/יֵּ֨לֶךְ שָׁא֜וּל מִ/צַּ֤ד הָ/הָר֙ מִ/זֶּ֔ה וְ/דָוִ֧ד וַ/אֲנָשָׁ֛י/ו מִ/צַּ֥ד הָ/הָ֖ר מִ/זֶּ֑ה וַ/יְהִ֨י דָוִ֜ד נֶחְפָּ֤ז לָ/לֶ֨כֶת֙ מִ/פְּנֵ֣י שָׁא֔וּל וְ/שָׁא֣וּל וַ/אֲנָשָׁ֗י/ו עֹֽטְרִ֛ים אֶל דָּוִ֥ד וְ/אֶל אֲנָשָׁ֖י/ו לְ/תָפְשָֽׂ/ם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/023/026.yaml
  text: Saul was going on one side of the mountain[a], and David and his men were on the other side of the mountain. David was hurrying to get away from Saul[c][b], while Saul and his men were closing in on David and his men to capture them.
  footnotes:
  - marker: a
    text: Hebrew literally, 'Saul was going on the side of the mountain from this side, and David and his men on the side of the mountain from this side.' The translation expresses the intended contrast as 'one side' and 'the other side.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were surrounding David and his men.'
    reason: alternative_reading
  - marker: c
    text: Or 'to seize them.'
    reason: lexical_alternative
