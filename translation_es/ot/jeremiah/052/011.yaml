translation:
  language: es
  text: Entonces le cegó los ojos a Sedequías, lo ató con grilletes de bronce, y el rey de Babilonia lo llevó a Babilonia y lo puso en la casa de custodia[a] hasta el día de su muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la prisión». La expresión hebrea dice más literalmente «la casa de custodia».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי ... עִוֵּר
  english_pob_choice: blinded Zedekiah’s eyes
  chosen_spanish: le cegó los ojos a Sedequías
  alternatives_spanish:
  - cegó a Sedequías
  - le sacó los ojos a Sedequías
  lexicon: HALOT
  rationale: El hebreo menciona de forma concreta los ojos de Sedequías y el acto de cegarlo. En español, «cegó los ojos a Sedequías» conserva esa brutalidad explícita y suena natural; «cegó a Sedequías» sería más breve pero pierde el énfasis en los ojos.
- source_word: וַיַּאַסְרֵהוּ
  english_pob_choice: bound him
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo sujetó
  - lo encadenó
  lexicon: HALOT
  rationale: El verbo אסר indica atar o sujetar. «Lo ató» es directo y fiel; «lo encadenó» añade un detalle no expresado por el verbo mismo.
- source_word: בַנְחֻשְׁתַּיִם
  english_pob_choice: with bronze shackles
  chosen_spanish: con grilletes de bronce
  alternatives_spanish:
  - con cadenas de bronce
  - con esposas de bronce
  lexicon: HALOT
  rationale: La referencia es a ataduras de bronce. «Grilletes» comunica mejor una sujeción penal que «cadenas» en este contexto, y mantiene el material «bronce» en vez de suavizarlo o sustituirlo por «latón».
- source_word: וַיְבִאֵהוּ ... בָּבֶלָה
  english_pob_choice: brought him to Babylon
  chosen_spanish: lo llevó a Babilonia
  alternatives_spanish:
  - lo condujo a Babilonia
  - lo trajo a Babilonia
  lexicon: HALOT
  rationale: El causativo de בוא se rinde naturalmente con «llevar» en español en este contexto narrativo. La dirección final «a Babilonia» reproduce el sentido del sufijo direccional hebreo.
- source_word: בֵּית הַפְּקֻדֹּת
  english_pob_choice: the house of custody
  chosen_spanish: la casa de custodia
  alternatives_spanish:
  - la prisión
  - la casa de confinamiento
  - la casa de detención
  lexicon: HALOT
  rationale: La expresión hebrea es técnica y no conviene precisar más de lo que el término permite. «Casa de custodia» conserva la estructura formal del original y evita identificar el lugar sin evidencia suficiente. La alternativa más fluida «prisión» queda en nota.
- source_word: עַד יוֹם מוֹתוֹ
  english_pob_choice: until the day of his death
  chosen_spanish: hasta el día de su muerte
  alternatives_spanish:
  - hasta que murió
  lexicon: HALOT
  rationale: Se conserva la formulación solemne y explícita del hebreo. «Hasta que murió» es correcta, pero pierde la cadencia formal de «hasta el día de su muerte».
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión inglesa vigente: se mantiene la equivalencia óptima del pasaje, preservando la explicitud corporal («los ojos») y la expresión técnica «casa de custodia» con nota alternativa para «prisión».'
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo y se evita añadir detalles interpretativos no presentes en el hebreo.
  - «Bronce» se conserva por consistencia con el valor léxico de נחשתים, sin sustituirlo por «latón».
  - La formulación verbal sigue el orden narrativo del hebreo sin forzar un giro más idiomático que oculte elementos concretos del texto.
