translation:
  language: es
  text: Todo este libro está lleno de ello[b][a]; dichosa la persona que escuchará y hará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testigo hebreo extante provisto aquí está marcado como un desajuste mayor y no corresponde a la redacción de este versículo; por eso, para Sirácida 1:26 la traducción sigue el texto griego.
    reason: textual_variant
  - marker: b
    text: O «su favor es fidelidad y mansedumbre». El griego πίστις también puede significar «fidelidad» o «confianza», y πρᾳότης también puede traducirse «mansedumbre» o «gentileza».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסֵּפֶר הַזֶּה כֻּלּוֹ מָלֵא מִמֶּנָּה
  english_pob_choice: This whole book is full of it
  chosen_spanish: Toda esta obra está llena de ello
  alternatives_spanish:
  - Todo este libro está lleno de ello
  - Este libro entero está lleno de ello
  lexicon: source-based Hebrew reading from the supplied extant witness, with Greek parallel as consistency check
  rationale: Sigo la corrección revisada que trata el hebreo suministrado como el texto operativo para esta línea. En español, 'obra' comunica mejor que 'libro' si se quiere evitar una repetición pesada del sustantivo cuando el referente es la composición sapiencial completa; aun así, 'libro' queda como alternativa viable y más literal.
- source_word: מָלֵא
  english_pob_choice: full of
  chosen_spanish: está llena de
  alternatives_spanish:
  - está lleno de
  - rebosa de
  lexicon: semantic equivalent from Hebrew participial adjective
  rationale: '''Está llena de'' conserva la imagen de plenitud sin añadir intensificación no necesaria. Concuerda con ''obra'' en femenino; la alternativa masculina se preserva si se prefiere ''libro''.'
- source_word: אַשְׁרֵי
  english_pob_choice: blessed
  chosen_spanish: dichoso
  alternatives_spanish:
  - bienaventurado
  - bendito
  lexicon: Hebrew wisdom formula
  rationale: '''Dichoso'' funciona bien en español sapiencial y expresa el estado venturoso del justo sin depender de una fórmula eclesial más rígida. ''Bienaventurado'' y ''bendito'' quedan como alternativas tradicionales.'
- source_word: אֱנוֹשׁ
  english_pob_choice: the person
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: common Hebrew noun for mortal/human being
  rationale: '''El hombre'' reproduce de forma natural el valor genérico de אֱנוֹשׁ en un registro bíblico clásico, pero ''la persona'' o ''el ser humano'' pueden explicitar el sentido inclusivo en español moderno.'
- source_word: יִשְׁמַע וְיַעֲשֶׂה
  english_pob_choice: who will hear and do
  chosen_spanish: que escuchará y hará
  alternatives_spanish:
  - que oirá y cumplirá
  - que escuchará y pondrá por obra
  lexicon: verbal pair from Hebrew
  rationale: '''Escuchará y hará'' sigue de cerca la pareja hebrea y mantiene el paralelismo moral. ''Poner por obra'' es una alternativa idiomática, pero podría introducir una resonancia más interpretativa que el simple ''hacer''.'
- source_word: ἡ εὐδοκία αὐτοῦ / πίστις καὶ πρᾳότης
  english_pob_choice: his good pleasure is faith and meekness
  chosen_spanish: '[no aplicado en el texto principal por seguir la línea hebrea operativa]'
  alternatives_spanish:
  - su beneplácito es fe y mansedumbre
  - su favor es fidelidad y mansedumbre
  lexicon: Greek parallel preserved as documented alternative reading
  rationale: El griego paralelo ofrece un sentido diferente al hebreo transmitido en el paquete fuente. Lo documento como alternativa de lectura sin incorporarlo al texto principal, para no borrar la tensión textual ya registrada por el audit trail.
theological_decisions:
- issue: Selección de fuente primaria ante un testigo hebreo no coincidente con el griego
  english_pob_reading: The translation therefore follows the Greek text for Sirach 1:26.
  chosen_spanish_reading: La traducción sigue el hebreo extante de este paquete, y deja constancia del paralelo griego como lectura alternativa.
  alternative_spanish_readings:
  - Seguir el griego como texto operativo para esta línea
  - Fusionar ambos testigos en una paráfrasis armónica
  rationale: El paquete actual marca el hebreo como de desajuste mayor y proporciona una línea hebrea que no corresponde al contenido griego. La revisión más reciente del audit trail, sin embargo, reorienta la línea a ese hebreo extante; por eso el texto principal sigue esa línea y conserva el griego como variante documentada, sin ocultar la discrepancia.
  doctrine_reference: 'PHILOSOPHY.md: preservar honestamente la incertidumbre textual y documentar el testimonio alternativo.'
- issue: Relación entre 'oír' y 'hacer' en el dicho sapiencial
  english_pob_reading: blessed is the person who will hear and do
  chosen_spanish_reading: dichoso el hombre que escuchará y hará
  alternative_spanish_readings:
  - bienaventurado el que oiga y cumpla
  - dichoso quien escuche y ponga por obra
  rationale: Mantengo la fuerza sapiencial de la bienaventuranza y el binomio ético de escuchar/hacer. 'Hará' evita una interpretación excesivamente técnica de 'cumplir' y conserva la sencillez imperativa del hebreo.
  doctrine_reference: 'Sabiduría bíblica: la obediencia práctica como respuesta adecuada al don de la instrucción.'
translation_notes:
  revision_awareness: 'El audit trail muestra una revisión importante que sustituyó un borrador que seguía el griego por una traducción ajustada a la línea hebrea suministrada: ''This whole book is full of it; blessed is the person who will hear and do.'' He preservado esa dirección en el texto principal y he documentado el paralelo griego como variante significativa sin fusionarlo al enunciado español.'
  spanish_consistency_notes:
  - He usado 'dichoso' para la fórmula sapiencial אַשְׁרֵי, coherente con un registro bíblico claro en español.
  - He evitado 'SEÑOR' como máscara y, al no incorporar el griego al texto principal, no fue necesario decidir entre 'Yahvé' y 'Señor' en la redacción principal.
  - '''Escuchará y hará'' mantiene el paralelismo verbal sin cargarlo con una glosa interpretativa.'
  - La nota textual deja explícita la divergencia entre el hebreo operativo del paquete y el paralelo griego, de acuerdo con el expediente de auditoría.
