review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido básico del hebreo: ''Así hicieron'', ''los hijos de Benjamín'', la correspondencia numérica, el retorno a su heredad y la reconstrucción/ocupación de las ciudades. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: (1) וַיִּשְׂאוּ נָשִׁים expresa el modismo matrimonial ''tomaron mujeres como esposas'' o ''tomaron esposas''; ''tomaron mujeres'' en español puede sonar impropio o ambiguo. (2) גָּזָלוּ sí denota toma violenta, pero ''secuestrado'' introduce un matiz moderno penal específico que no corresponde exactamente; ''arrebataron'' o ''tomaron por la fuerza'' preserva mejor la fuerza sin anacronismo. Además, el inglés auditado preserva alternativas léxicas en notas para ''dancers'', ''seized'', y ''rebuilt'', y conviene conservarlas también en español.'
  spanish_quality_summary: El texto es claro y digno, con buen registro bíblico. 'Heredad' y 'habitaron' son aceptables y legibles. No obstante, 'Luego fueron y regresaron' suena un poco torpe en español; 'Entonces se fueron y regresaron' o 'Entonces fueron y volvieron' fluye mejor mientras conserva ambos verbos. 'Reedificaron' es correcto, aunque 'reconstruyeron' sería más natural; sin embargo, puede mantenerse si se acompaña con nota que el hebreo literalmente dice 'edificaron/construyeron'.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé o Mesías. El borrador alinea bien con la preferencia de conservar textura tribal en 'los hijos de Benjamín' y la noción de נחלה con 'heredad'. El principal desajuste terminológico es 'secuestrado', demasiado específico frente al valor de גזל. También conviene reflejar en nota la alternativa 'las que danzaban' para el participio femenino plural.
  issues:
  - severity: medium
    issue: '''tomaron mujeres'' para וַיִּשְׂאוּ נָשִׁים'
    rationale: Aunque calca el hebreo, en español suena ambiguo y menos idiomático que 'tomaron esposas' o 'tomaron mujeres como esposas', que preserva mejor el sentido matrimonial.
  - severity: medium
    issue: '''secuestrado'' para גָּזָלוּ'
    rationale: Mantiene coerción, pero añade un matiz jurídico moderno de 'secuestro' no exigido por el hebreo. 'Arrebataron' o 'tomaron por la fuerza' refleja mejor la toma violenta sin anacronismo.
  - severity: low
    issue: Faltan notas léxicas conservadas en el audit trail inglés
    rationale: El inglés documenta alternativas significativas para 'danzantes', 'arrebataron/seized' y 'reedificaron/rebuilt'. Deben preservarse en notas en español para mantener la trazabilidad lexical.
  - severity: low
    issue: '''Luego fueron y regresaron'' suena poco natural'
    rationale: El hebreo tiene dos verbos y conviene conservarlos, pero con giro más natural en español, por ejemplo 'Entonces se fueron y regresaron'.
