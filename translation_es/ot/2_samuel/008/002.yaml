revisions:
- from: Él hirió a Moab y los midió con una cuerda[a], haciéndolos acostarse en tierra. Midió dos cuerdas para hacer morir y una cuerda completa para hacer vivir. Así Moab vino a ser para David esclavos[b], trayendo tributo.
  to: Él hirió a Moab y los midió con una cuerda[a], haciéndolos tenderse en tierra. Midió dos medidas de cuerda para matar y una medida completa de cuerda para dejar con vida. Así Moab llegó a ser siervo[b] de David, trayendo tributo.
  rationale: Se ajustó el español para reflejar mejor las porciones medidas del hebreo, evitar calcos poco idiomáticos, y seguir la decisión documentada del POB de tratar עֲבָדִים aquí como servidumbre/vasallaje político más que esclavitud. Los cambios preservan la dureza del pasaje y mejoran la claridad en español.
  reviewer_model: gpt-5.4
