  glossary_alignment: No hay conflicto con los glosarios principales del proyecto. La decisión sobre σωτηρία admite contexto; aquí conviene una formulación más estándar y eufónica en español bíblico. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc.
