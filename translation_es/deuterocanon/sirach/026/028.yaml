base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/026/028.yaml
  text: 'Over two things my heart is grieved[a], and over a third anger has come upon me: a warrior brought low by poverty, and men of understanding if they are treated like refuse[b], and one who turns back from righteousness to sin—the Lord will prepare him for the sword.'
  footnotes:
  - marker: a
    text: Or 'if they are treated as rubbish' or 'if they are cast aside as dung'; the Greek verb is built on a word for refuse and expresses contemptuous degradation.
    reason: lexical_alternative
  - marker: b
    text: The final singular 'him' most naturally refers to the one who turns back from righteousness to sin, though the Greek list is syntactically compressed and some readers may hear the judgment clause as summing up the whole saying.
    reason: alternative_reading
