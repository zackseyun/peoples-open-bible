translation:
  language: es
  text: Efraín se mezcla entre los pueblos[a]; Efraín se ha vuelto un pan[b] sin voltear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las naciones».
    reason: lexical_alternative
  - marker: b
    text: 'La imagen es la de pan dejado sin voltear al hornearse: quemado de un lado y crudo del otro.'
    reason: cultural_note
lexical_decisions:
- source_word: יִתְבּוֹלָל
  english_pob_choice: mixes himself
  chosen_spanish: se mezcla
  alternatives_spanish:
  - se confunde
  - se mezcla a sí mismo
  - se mingla
  lexicon: HALOT
  rationale: 'El verbo hitpolel tiene matiz reflexivo: Efraín participa activamente en su propia asimilación. «Se mezcla» conserva la idea de interminglarse sin forzar un calco extraño en español.'
- source_word: בָּעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - con los pueblos
  lexicon: HALOT
  rationale: «Pueblos» refleja bien עַמִּים y mantiene el plural colectivo sin imponer una lectura más interpretativa como «naciones».
- source_word: עֻגָה
  english_pob_choice: cake
  chosen_spanish: torta
  alternatives_spanish:
  - pastel
  - pan
  - torta de pan
  lexicon: HALOT
  rationale: La imagen se refiere a un pan o torta cocida sobre brasas. En español, «torta» comunica de manera natural la pieza de masa/pan redondo sin añadir especificaciones innecesarias.
- source_word: בְּלִי הֲפוּכָה
  english_pob_choice: not turned
  chosen_spanish: no volteada
  alternatives_spanish:
  - sin voltear
  - no vuelta
  - sin ser volteada
  lexicon: HALOT
  rationale: La frase describe una cocción incompleta por no darle vuelta. «No volteada» preserva la imagen culinaria de forma clara y directa en español.
- source_word: הָיָה
  english_pob_choice: has become
  chosen_spanish: ha venido a ser
  alternatives_spanish:
  - ha llegado a ser
  - se ha vuelto
  - es
  lexicon: HALOT
  rationale: Aunque la forma es perfecta, en contexto expresa estado resultante. «Ha venido a ser» comunica ese valor sin reducirlo a un pasado simple.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio, que en Oseas funciona como designación histórica del reino del norte, sin reemplazarlo por una interpretación en el texto principal.
theological_decisions:
- issue: Referente de «Efraín»
  english_pob_reading: Ephraim is retained as the named referent, implicitly representing the northern kingdom of Israel.
  chosen_spanish_reading: Efraín se mantiene como el referente nombrado, con su valor representativo del reino del norte implícito.
  alternative_spanish_readings:
  - Israel
  - el reino del norte
  rationale: La transparencia al texto fuente requiere conservar el nombre del texto profético. La lectura representativa puede explicarse en notas de estudio, no sustituirse en la línea principal.
  doctrine_reference: 'Translation philosophy: transliterate names; preserve source referents; avoid interpretive substitution in the main text.'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior incorporando ambos marcadores de nota exactamente en el texto español: [a] y [b]. No se añadió ninguna nota sin anclaje.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o «Jehová» porque el pasaje no contiene el Tetragrámaton.
  - «Efraín» se translitera de forma consistente como nombre propio.
  - «Pueblos» mantiene la pluralidad colectiva de עַמִּים sin imponer «naciones» en el texto principal.
  - La metáfora culinaria se conserva sin ampliaciones doctrinales o explicativas dentro del versículo.
