lexical_decisions:
- source_word: בֶּן דֶּקֶר
  english_pob_choice: Ben-deker
  chosen_spanish: Ben-deker[a]
  alternatives_spanish:
  - el hijo de Deker
  lexicon: HALOT
  rationale: En esta lista administrativa, בן + nombre funciona como designación personal más que como cláusula descriptiva plena. Mantengo la forma hebrea del nombre para conservar el patrón onomástico del contexto; la alternativa más formal se documenta en la nota.
- source_word: בְּ/מָקַץ
  english_pob_choice: in Makaz
  chosen_spanish: en Makaz
  alternatives_spanish:
  - sobre Makaz
  lexicon: HALOT
  rationale: La preposición בְ expresa de manera directa localización/ámbito. 'En' reproduce mejor ese valor básico sin añadir de antemano el matiz administrativo de 'sobre'.
- source_word: וּ/בְ/שַֽׁעַלְבִ֖ים
  english_pob_choice: and in Shaalbim
  chosen_spanish: en Shaalbim
  alternatives_spanish:
  - y en Shaalbim
  lexicon: HALOT
  rationale: El hebreo continúa la serie locativa. En español, la coordinación con el elemento anterior queda implícita por la enumeración; mantener 'en' conserva el valor preposicional repetido de la serie.
- source_word: וּ/בֵ֣ית שָׁ֑מֶשׁ
  english_pob_choice: and in Beth-shemesh
  chosen_spanish: en Bet-semes
  alternatives_spanish:
  - en Bet Shemesh
  - en Casa del Sol
  lexicon: HALOT
  rationale: Sigo la decisión de transliterar el topónimo en vez de traducirlo, para respetar el nombre propio del lugar. Uso 'Bet-semes' como forma española clara y reconocible; no desarrollo 'casa del sol' porque la serie trata de nombres de lugares.
- source_word: וְ/אֵיל֖וֹן בֵּ֥ית חָנָֽן
  english_pob_choice: and in Elon-beth-hanan
  chosen_spanish: y en Elón-bet-hanán
  alternatives_spanish:
  - y Elón-bet-hanán
  - y en Elón de Bet-hanán
  lexicon: HALOT
  rationale: Tomo la secuencia como nombre compuesto de lugar y la conservo unida. 'Y en' refleja la continuidad locativa de la lista; la acentuación española normaliza la lectura sin alterar el nombre.
translation_notes:
  revision_awareness: Se siguió la lectura estable del texto hebreo masorético y el consenso del audit trail en que los términos son nombres de lugares/designaciones personales en una lista administrativa, sin cambios textuales recientes que afecten el verso.
  spanish_consistency_notes:
  - Se mantiene Yahvé en la base terminológica del proyecto, aunque este versículo no lo contiene.
  - Se usa Bet-semes como transliteración española consistente de Beth-shemesh.
  - Se conserva la coordinación seriada de topónimos con preposición locativa.
