translation:
  language: es
  text: Y sucederá en aquel día que el Señor volverá a extender su mano, por segunda vez, para recuperar[a] el remanente de su pueblo que quede, de Asiria, de Egipto, de Patros, de Cus[b], de Elam, de Sinar, de Hamat y de las costas del mar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para adquirir ...». El hebreo dice literalmente «adquirir», pero en este contexto la idea es la de volver a tomar o recobrar al remanente.
    reason: lexical_alternative
  - marker: b
    text: Cus es el nombre hebreo del lugar, a menudo asociado con regiones al sur de Egipto; algunas traducciones dicen «Etiopía».
    reason: cultural_note
  - marker: c
    text: O «de las islas del mar». La expresión hebrea puede referirse a islas o, más ampliamente, a regiones costeras marítimas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה בַּיּוֹם הַהוּא
  english_pob_choice: And in that day ...
  chosen_spanish: Y sucederá en aquel día
  alternatives_spanish:
  - Y en aquel día será
  - Y acontecerá en aquel día
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural con «sucederá» y mantiene el valor temporal y solemne de «en aquel día».
- source_word: יוֹסִיף ... יָדוֹ
  english_pob_choice: will again extend his hand
  chosen_spanish: volverá a extender su mano
  alternatives_spanish:
  - extenderá otra vez su mano
  - pondrá de nuevo su mano
  lexicon: HALOT
  rationale: «Extender su mano» conserva la imagen antropomórfica; «volverá» refleja la repetición implícita en יוֹסִיף sin hacerla más pesada.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - otra vez
  lexicon: HALOT
  rationale: Se preserva explícitamente el valor ordinal de שֵׁנִית, como en el audit trail inglés, para no perder la intensificación de repetición.
- source_word: לִקְנוֹת
  english_pob_choice: to recover
  chosen_spanish: para recuperar
  alternatives_spanish:
  - para adquirir
  - para recobrar
  - para redimir
  lexicon: HALOT
  rationale: «Recuperar» comunica bien la idea de volver a obtener/reclamar al remanente en contexto. «Adquirir» sería más literal al núcleo de קנה, pero en español sonaría menos natural aquí; «redimir» añadiría un matiz teológico no exigido por el verbo.
- source_word: שְׁאָר עַמּוֹ
  english_pob_choice: the remnant of his people
  chosen_spanish: el remanente de su pueblo
  alternatives_spanish:
  - el resto de su pueblo
  - el resto que le queda a su pueblo
  lexicon: HALOT
  rationale: «Remanente» es el término profético establecido para שְׁאָר y preserva tanto la idea cuantitativa como la carga teológica.
- source_word: אֲשֶׁר יִשָּׁאֵר
  english_pob_choice: who remain
  chosen_spanish: que quede
  alternatives_spanish:
  - que permanezca
  - que sobreviva
  - que haya quedado
  lexicon: HALOT
  rationale: La relativa expresa el estado de los que han quedado; «que quede» es breve, natural y mantiene la noción de residuo o supervivencia.
- source_word: מֵאַשּׁוּר ... וּמֵאִיֵּי הַיָּם
  english_pob_choice: from Assyria ... and from the coastlands of the sea
  chosen_spanish: de Asiria ... y de las costas del mar
  alternatives_spanish:
  - de Asiria ... y de las islas del mar
  - de Asiria ... y de las tierras costeras del mar
  lexicon: HALOT
  rationale: Se conservan los topónimos transliterados y «costas del mar» para reflejar el alcance geográfico de אִיֵּי הַיָּם sin cerrar la ambigüedad entre islas y regiones litorales.
- source_word: וּמִכּוּשׁ
  english_pob_choice: from Cush
  chosen_spanish: de Cus
  alternatives_spanish:
  - de Etiopía
  lexicon: HALOT
  rationale: Se mantiene el nombre hebreo como topónimo, siguiendo el criterio de no sustituirlo por una identificación moderna interpretativa.
theological_decisions:
- issue: Cómo reflejar la acción divina expresada por יוֹסִיף ... לִקְנוֹת sin sobredimensionarla teológicamente
  english_pob_reading: will again extend his hand ... to recover
  chosen_spanish_reading: volverá a extender su mano ... para recuperar
  alternative_spanish_readings:
  - extenderá de nuevo su mano ... para adquirir
  - volverá a poner su mano ... para redimir
  rationale: La frase conserva el gesto activo de Yahvé sin convertir קנה en un tecnicismo de «redención». «Recuperar» expresa bien la idea de volver a tomar para sí al pueblo restante, dejando abierta la fuerza lexical del verbo.
  doctrine_reference: Translation philosophy §1, §5, §6
- issue: Si traducir אֲדֹנָי como «Señor» o usar el nombre divino en español
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: En este versículo el hebreo trae אֲדֹנָי, no el Tetragrámaton. Por eso se traduce el título con «el Señor»; no hay aquí una base textual directa para insertar «Yahvé».
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El borrador español sigue el estado revisado más reciente del audit trail inglés, que prefirió «recover» sobre «acquire» para reflejar mejor la idea contextual de volver a tomar o reclamar al remanente, manteniendo al mismo tiempo la imagen de la mano extendida y la estructura geográfica del versículo.
  spanish_consistency_notes:
  - Se usa «el Señor» para אֲדֹנָי, coherente con el hecho de que el texto hebreo aquí no contiene el Tetragrámaton.
  - 'Se transliteran los topónimos principales: Asiria, Egipto, Patros, Cus, Elam, Sinar y Hamat.'
  - «Remanente» se mantiene como término técnico profético para שְׁאָר.
  - «Costas del mar» conserva la ambigüedad de אִיֵּי הַיָּם sin forzar una sola identificación geográfica.
