translation:
  language: es
  text: 'Y el rey mandó a Joab, a Abisai y a Itai[a], diciendo: «Traten con suavidad, por mí, al joven Absalón». Y todo el pueblo oyó cuando el rey mandó a todos los comandantes acerca de Absalón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Traten con suavidad al joven, por mí —Absalón—». El hebreo comprime en una expresión breve la súplica personal y la identificación de Absalón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden
  lexicon: HALOT
  rationale: צוה expresa dar una orden o mandato. En español, «mandó» conserva la autoridad real con naturalidad narrativa; «ordenó» también sería posible, pero «mandó» fluye mejor en este contexto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: El hebreo usa el título, no el nombre propio, así que se mantiene «el rey» para respetar la forma del texto fuente.
- source_word: אֶת יואב וְאֶת אֲבִישַׁי וְאֶת אִתַּי
  english_pob_choice: Joab and Abishai and Ittai
  chosen_spanish: a Joab, a Abisai y a Itai
  alternatives_spanish:
  - Joab, Abisai e Itai
  lexicon: HALOT
  rationale: Los nombres se transliteran de forma estándar en español bíblico. Se expresa el objeto directo con «a» para claridad y naturalidad en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y les dijo
  lexicon: HALOT
  rationale: Es la fórmula quotativa narrativa normal; «diciendo» mantiene la relación con el discurso directo sin añadir contenido.
- source_word: לְאַט
  english_pob_choice: Deal gently
  chosen_spanish: con suavidad
  alternatives_spanish:
  - con delicadeza
  - suavemente
  lexicon: HALOT
  rationale: El adverbio expresa trato contenido y benigno. En español, una frase adverbial como «con suavidad» comunica mejor la idea que un calco verbal poco natural.
- source_word: לִי
  english_pob_choice: for my sake
  chosen_spanish: por amor mío
  alternatives_spanish:
  - por mi causa
  - por mí
  lexicon: HALOT
  rationale: La preposición con sufijo primera persona expresa la preocupación personal de David. «Por amor mío» reproduce bien el valor relacional e intercesorio que el audit trail inglés captura con «for my sake».
- source_word: לַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: al joven
  alternatives_spanish:
  - al muchacho
  - al muchacho joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar muchacho, joven o joven hombre. Dado que Absalón es adulto pero David habla con ternura, «al joven» conserva la carga afectiva sin infantilizarlo.
- source_word: לְאַבְשָׁלוֹם
  english_pob_choice: with Absalom / namely Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - con Absalón
  - es decir, Absalón
  lexicon: HALOT
  rationale: 'El segundo ל funciona como apposición o especificación: «el joven, Absalón». En español, el nombre desnudo tras «al joven» transmite la misma identificación compacta sin sobrecargar la frase.'
- source_word: וְכָל הָעָם שָׁמְעוּ
  english_pob_choice: And all the people heard
  chosen_spanish: Y todo el pueblo oyó
  alternatives_spanish:
  - Y toda la gente oyó
  - Y todo el pueblo escuchó
  lexicon: HALOT
  rationale: הָעָם puede ser «pueblo» o «gente»; «pueblo» es más bíblico y adecuado al registro. «Oyó» preserva el hecho de percibir el mandato; «escuchó» podría sugerir atención voluntaria.
- source_word: בְּצַוֹּת
  english_pob_choice: when ... commanded
  chosen_spanish: cuando el rey mandó
  alternatives_spanish:
  - al mandar el rey
  - mientras el rey mandaba
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca circunstancia temporal. «Cuando el rey mandó» reproduce esa relación de simultaneidad de forma natural en español.
- source_word: כָּל הַשָּׂרִים
  english_pob_choice: all the commanders
  chosen_spanish: a todos los comandantes
  alternatives_spanish:
  - a todos los jefes
  - a todos los oficiales
  lexicon: HALOT
  rationale: שָׂרִים en este entorno militar se refiere a mandos o jefes militares. «Comandantes» es preciso y coincide con el valor contextual que el audit trail inglés destacó.
- source_word: עַל דְּבַר אַבְשָׁלוֹם
  english_pob_choice: concerning Absalom
  chosen_spanish: acerca de Absalón
  alternatives_spanish:
  - con respecto a Absalón
  - sobre Absalón
  lexicon: HALOT
  rationale: La expresión עַל דְּבַר significa «acerca de / con respecto a». «Acerca de Absalón» mantiene el alcance temático sin añadir matices interpretativos.
theological_decisions:
- issue: Tratamiento de Absalón como objeto de una orden de misericordia
  english_pob_reading: Deal gently for my sake with the young man Absalom.
  chosen_spanish_reading: Trátenlo con suavidad por amor mío, al joven Absalón.
  alternative_spanish_readings:
  - Trátenlo con suavidad por mí, al joven Absalón
  - Trátenlo con suavidad por mi causa, al joven Absalón
  rationale: La frase hebrea condensa el pedido y la identificación de Absalón. La traducción mantiene la tensión entre la solicitud de trato benigno y la referencia afectiva al hijo rebelde, sin suavizar el contenido de la orden militar.
  doctrine_reference: 2 S 18:5; cf. el sentido narrativo del cuidado paterno dentro del juicio real.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que eliminó la segunda repetición de la preposición antes de «Absalom» para reflejar mejor la apposición hebrea «the young man Absalom». En español, esto se reflejó manteniendo «al joven Absalón» sin repetir una preposición adicional antes del nombre.
  spanish_consistency_notes:
  - Se conserva «Yahvé» por defecto cuando el texto no presenta el nombre divino.
  - Se traduce el título real como «el rey» y los mandos militares como «comandantes» en coherencia con el registro narrativo.
  - «Pueblo» mantiene el valor colectivo del hebreo הָעָם en un contexto militar público.
  - La cita directa usa puntuación española estándar y un imperativo plural de trato general («Trátenlo») para reflejar el mandato al conjunto de destinatarios.
