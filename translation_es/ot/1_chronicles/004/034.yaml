    rationale: El hebreo יַמְלֵךְ termina en consonante que el POB inglés refleja como -ch en su transliteración principal; eliminarla en español no mejora claramente la legibilidad y sí rompe la correspondencia con el rastro léxico documentado.
  - severity: medium
    issue: «Josá» adapta excesivamente יוֹשָׁה.
    rationale: La forma propuesta suprime la h final representada en la decisión inglesa «Joshah» y produce un nombre demasiado castellanizado sin justificación documental. Una forma como «Joshá» mantiene mejor la correspondencia con el audit trail y sigue siendo legible en español.
  - severity: low
    issue: Falta la nota sobre variantes de transliteración.
    rationale: El POB inglés conserva alternativas para יַמְלֵךְ y יוֹשָׁה por convención transliterativa. Dado que en español también existe la alternancia J/Y y la forma de יוֹשָׁה puede variar, conviene conservar una nota breve equivalente.
