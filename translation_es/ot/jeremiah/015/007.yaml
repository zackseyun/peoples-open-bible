  to: Los aventé con un bieldo en las puertas del país[a]; dejé sin hijos, destruí a mi pueblo; no se volvieron de sus caminos[b].
  rationale: 'Hice una reparación pequeña pero necesaria: corregí el aparato de notas para que preserve las alternativas léxicas documentadas por el inglés POB, añadí la nota sobre שׁוּב/«arrepentirse», y reubiqué la nota de הָאָרֶץ al lugar correcto. También ajusté «aventador» a «bieldo» por mayor precisión del implemento y cambié «tierra» por «país» en el texto principal para reflejar mejor la decisión contextual auditada. El resto del verso se conserva sustancialmente igual.'
