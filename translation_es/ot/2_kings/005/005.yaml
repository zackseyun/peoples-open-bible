translation:
  language: es
  text: 'Entonces el rey de Aram[c] dijo[a]: «Ve ahora, y enviaré una carta al rey de Israel». Y él fue y tomó en su mano diez talentos de plata, seis mil piezas[b] de oro y diez mudas de ropa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ve, ven»; el hebreo conserva dos imperativos, literalmente «ve, ven», probablemente para expresar permiso o urgencia.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «seis mil oro»; no se explicita la unidad contable, por lo que «piezas» se suple para un español natural sin precisar más de lo que dice el texto.
    reason: lexical_alternative
  - marker: c
    text: «Aram» es el nombre hebreo; en algunas traducciones tradicionales se vierte como «Siria».
    reason: alternative_reading
lexical_decisions:
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: the king of Aram
  chosen_spanish: el rey de Aram
  alternatives_spanish:
  - el rey de Siria
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del texto hebreo, como en la opción inglesa auditada, en vez de sustituirlo por el equivalente geográfico tradicional 'Siria'.
- source_word: לֶךְ בֹּא
  english_pob_choice: Go now
  chosen_spanish: Ve ahora
  alternatives_spanish:
  - Ve, ven
  - Anda ahora
  lexicon: HALOT
  rationale: El hebreo conserva dos imperativos breves. En español, 'Ve ahora' comunica la urgencia/permisión sin forzar una duplicación poco natural, pero preserva el sentido de inmediatez documentado por la POB inglesa.
- source_word: סֵפֶר
  english_pob_choice: a letter
  chosen_spanish: una carta
  alternatives_spanish:
  - un documento
  - un escrito
  lexicon: HALOT
  rationale: En este contexto diplomático, el referente es una comunicación escrita enviada de un rey a otro; 'carta' es la forma natural y precisa en español.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - consigo
  - en su poder
  lexicon: HALOT
  rationale: Se conserva la imagen literal del hebreo. En español suena natural y mantiene la idea de que llevaba consigo los presentes.
- source_word: כִּכְּרֵי כֶסֶף
  english_pob_choice: talents of silver
  chosen_spanish: talentos de plata
  alternatives_spanish:
  - talentos de plata fina
  lexicon: HALOT
  rationale: '''כִּכָּר'' corresponde al peso antiguo ''talento''. Se mantiene la unidad antigua sin convertirla a medidas modernas.'
- source_word: שֵׁשֶׁת אֲלָפִים זָהָב
  english_pob_choice: six thousand pieces of gold
  chosen_spanish: seis mil [b] de oro
  alternatives_spanish:
  - seis mil piezas de oro
  - seis mil de oro
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'seis mil oro', sin nombre explícito de unidad. Se evita sobreespecificar, pero se marca la ambigüedad mediante nota, siguiendo la cautela auditada en inglés.
- source_word: חֲלִיפוֹת בְּגָדִים
  english_pob_choice: changes of clothing
  chosen_spanish: mudas de ropa
  alternatives_spanish:
  - cambios de ropa
  - juegos de ropa
  lexicon: HALOT
  rationale: '''Mudas de ropa'' es una equivalencia natural en español que conserva la idea de conjuntos completos de vestimenta de reemplazo, sin diluir el valor del regalo.'
translation_notes:
  revision_awareness: La versión inglesa revisó «Go, come» a «Go now» para reflejar mejor el matiz idiomático de לֶךְ בֹּא; el español sigue esa revisión con «Ve ahora». También se respeta la cautela del texto auditado al no convertir «six thousand gold» en una unidad explícita no presente en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Aram» según la prioridad del hebreo, alineado con la política del proyecto y la nota inglesa.
  - Se evita «Señor» o equivalentes no pertinentes; no hay términos teológicos mayores en este versículo.
  - «Talentos» conserva la unidad antigua y «mudas de ropa» expresa el conjunto de prendas sin añadir contenido.
  - La puntuación y el registro buscan ser publicables en español latinoamericano sin arcaísmos innecesarios.
