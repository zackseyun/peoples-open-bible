  - marker: a
    text: 'Los nombres griegos aquí difieren notablemente del paralelo hebreo aproximado de Esdras 8:2, que lee: «de entre los hijos de Finés, Gersón; de entre los hijos de Itamar, Daniel; de entre los hijos de David, Hattush». Como 1 Esdras se traduce desde el testimonio griego, el texto principal conserva las formas griegas en lugar de armonizarlas con el paralelo hebreo.'
    reason: alternative_reading
  - marker: b
    text: La frase «de entre los hijos de David» queda abierta porque la lista griega continúa en el versículo siguiente.
    reason: cross_reference
  revision_rationale: 'La revisión es menor pero recomendable: ajusta la preposición para reflejar mejor el valor de ἐκ en una lista de selección familiar y completa la nota textual [a] conforme al audit trail inglés. Se mantienen intactas las decisiones principales de base griega y los nombres propios del texto fuente.'
