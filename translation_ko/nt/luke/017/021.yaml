  text: οὐδὲ ἐροῦσιν· Ἰδοὺ ὧδε ἤ· ⸀Ἐκεῖ· ἰδοὺ γὰρ ἡ βασιλεία τοῦ θεοῦ ἐντὸς ὑμῶν ἐστιν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/017/021.yaml
  text: Nor will they say[a], ‘Look, here!’ or ‘There!’ For behold, the kingdom of God is in your midst.”
  footnotes:
  - marker: a
    text: Or, “within you.” The Greek phrase can mean either an inward sense or a corporate sense such as “among you / in your midst.”
    reason: alternative_reading
translation:
  language: ko
  text: 또 「보십시오, 여기 있다」 「저기 있다」 라고도 하지 못할 것입니다. 보십시오, 하나님의 나라는 여러분 가운데 있습니다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: ἐντὸς ὑμῶν의 의미
  chosen_reading: 여러분 가운데 있습니다
  alternative_readings:
  - 여러분 안에 있습니다
  rationale: ἐντός는 내부를 뜻할 수도, 공동체적 가운데를 뜻할 수도 있다. 청자가 바리새파임을 감안할 때 개인 영성적 「안에」보다 공동체적 임재 「가운데」가 문맥에 부합한다.
  doctrine_reference: DOCTRINE.md §1 author intent
