  source_alignment_summary: 'El borrador sigue bien el sentido griego y el audit trail inglés: ἕως ἔτι ζῇς = «Mientras aún vivas», πνοὴ = «aliento», y μὴ ἀλλάξῃς σεαυτὸν... se capta correctamente como no ponerse bajo el poder de otro. Sin embargo, «ninguna carne» suena poco natural en español en este contexto y además desajusta levemente el matiz de πάσῃ σαρκί = «cualquier/ninguna persona humana»; conviene conservar «carne» con nota, pero con una formulación más idiomática en la línea de «nadie de carne» o, mejor, usar una alternativa interpretativa si el proyecto lo permitiera. Dado que el inglés retiene «any flesh», la mejor reparación mínima es mejorar la naturalidad manteniendo la literalidad visible.'
  spanish_quality_summary: «Mientras aún vivas y haya aliento en ti» es claro y digno. «No te pongas en poder de» también es buen español bíblico moderno. El principal problema es «de ninguna carne», que en español general resulta torpe y puede sonar como referencia a carne física no humana, en vez de personas mortales. Una leve reestructuración mejora mucho la legibilidad sin perder la textura literal.
  glossary_alignment: 'Buen alineamiento general con la política del proyecto: πνοή -> «aliento» y σάρξ -> «carne». No hay términos doctrinales sensibles adicionales. La revisión propuesta mantiene «carne» en el texto principal mediante una expresión más natural y conserva en nota las alternativas «nadie» / «ninguna persona».'
  issues:
