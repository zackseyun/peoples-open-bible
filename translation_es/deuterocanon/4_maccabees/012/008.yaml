translation:
  language: es
  text: Libérame[a], dice; para que hable al rey y a todos los amigos que están con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «Suéltame» o «Déjame ir». Se mantiene «Libérame» porque expresa con mayor dignidad y claridad la petición de ser puesto en libertad en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπόλυσόν
  english_pob_choice: Release
  chosen_spanish: Suéltame
  alternatives_spanish:
  - Libérame
  - Déjame ir
  - Déjame libre
  lexicon: LSJ
  rationale: El imperativo aoristo de ἀπολύω expresa aquí una petición directa de ser dejado ir o soltado. En español, «suéltame» reproduce con naturalidad esa fuerza inmediata sin introducir por sí solo una connotación jurídica de manumisión.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: LSJ
  rationale: Pronombre de objeto directo de primera persona singular; se mantiene sin cambios.
- source_word: φησίν
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - decía
  lexicon: LSJ
  rationale: Es un presente histórico narrativo. En español, «dice» conserva mejor la vivacidad del relato que un pasado simple.
- source_word: εἴπω
  english_pob_choice: so that I may speak to
  chosen_spanish: para que hable
  alternatives_spanish:
  - para que diga
  - para que le hable
  lexicon: LSJ
  rationale: El aoristo subjuntivo expresa finalidad después del imperativo. Dado que el texto introduce un destinatario directo, «hable» funciona de forma natural en español y evita una repetición rígida de «decir».
- source_word: τῷ βασιλεῖ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  - con el rey
  lexicon: LSJ
  rationale: El dativo con εἴπω apunta al destinatario del habla. «Al rey» es la forma más directa y idiomática en español.
- source_word: τοῖς σὺν αὐτῷ φίλοις πᾶσιν
  english_pob_choice: all his friends who are with him
  chosen_spanish: a todos los amigos que están con él
  alternatives_spanish:
  - a todos los amigos que están con él
  - a todos sus compañeros que están con él
  - a todos los amigos con él
  lexicon: LSJ
  rationale: φίλοι puede significar amigos personales o allegados/cortesanos. Se conserva «amigos», como en el audit trail inglés, y se explicita σὺν αὐτῷ con «que están con él»; πᾶσιν queda reflejado por «a todos».
translation_notes:
  revision_awareness: 'Esta versión sigue el ajuste más reciente del audit trail inglés: evitar un «decir» genérico donde el griego usa εἴπω con destinatarios, y reflejar de manera natural la frase final καὶ τοῖς σὺν αὐτῷ φίλοις πᾶσιν como un grupo de amigos que están con él. Frente a la redacción inglesa anterior, se preserva la ambigüedad lexical de φίλοι sin convertirla en un término técnico de corte.'
  spanish_consistency_notes:
  - Se mantiene «rey» en minúscula por tratarse de un sustantivo común en español.
  - Se conserva la relación de finalidad con «para que» para expresar εἴπω.
  - «Amigos» se retiene como equivalente principal de φίλοι; no se sustituye por «cortesanos» porque el material fuente no obliga a esa interpretación.
  - 'La puntuación reproduce el tono narrativo breve del original: mandato, incisión narrativa y propósito.'
