translation:
  language: es
  text: Mi alma se niega a tocarlas[a]; son como la enfermedad de mi alimento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi apetito se niega a tocarlas». El hebreo puede significar «alma», «yo» o, en algunos contextos, «apetito».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «son para mí como alimento repugnante»; o «son como la enfermedad de mi pan/alimento». La expresión hebrea es condensada y difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֲנָה
  english_pob_choice: refuses
  chosen_spanish: se niega
  alternatives_spanish:
  - rehúsa
  - se rehúsa
  lexicon: HALOT
  rationale: מאן expresa negarse o rehusar. En español, «se niega» conserva el sentido volitivo y suena natural en un lamento poético presente, sin forzar una forma verbal pasada.
- source_word: לִנְגּוֹעַ
  english_pob_choice: to touch
  chosen_spanish: tocarlos
  alternatives_spanish:
  - tocarlos con la mano
  - entrar en contacto con ellos
  lexicon: HALOT
  rationale: נגע significa «tocar» o «entrar en contacto». «Tocarlos» es la equivalencia más directa y fluida en español, preservando la aversión al contacto.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi ser
  - mi apetito
  lexicon: HALOT
  rationale: נפש puede significar alma, yo, vida o apetito. Se mantiene «mi alma» para conservar la profundidad antropológica del hebreo y la elección auditada de no reducirlo a «apetito» en el texto principal.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: son
  alternatives_spanish:
  - ellos son
  - esos son
  lexicon: HALOT
  rationale: El pronombre remite a los objetos repulsivos del contexto anterior. En español, el sujeto explícito «son» sigue siendo claro y evita una repetición pesada de «ellos».
- source_word: כִּדְוֵי
  english_pob_choice: like the sickness of
  chosen_spanish: como la enfermedad de
  alternatives_spanish:
  - como la dolencia de
  - como la enfermedad que causa
  lexicon: HALOT
  rationale: דוה denota enfermedad o dolencia. «Como la enfermedad de» conserva la construcción comprimida y difícil del hebreo sin resolverla en exceso, tal como hace el POB inglés.
- source_word: לַחְמִי
  english_pob_choice: my food
  chosen_spanish: mi alimento
  alternatives_spanish:
  - mi pan
  - mi comida
  lexicon: HALOT
  rationale: לחם puede significar pan o, por extensión, alimento. «Mi alimento» transmite bien el sentido general y mantiene la imagen metafórica sin estrecharla a «pan».
translation_notes:
  revision_awareness: 'Se siguió el sentido auditado del hebreo y la solución del POB inglés: mantener נֶפֶשׁ como «alma» en el texto principal, y conservar la imagen difícil de כִּדְוֵי לַחְמִי sin sobreinterpretarla. No se aplicaron cambios de revisión posteriores.'
  spanish_consistency_notes:
  - Se prefirió «alimento» a «pan» en el texto principal por la amplitud semántica de לחם en este contexto poético.
  - Se mantuvo un registro sobrio y bíblico, evitando sustituciones tradicionales no motivadas por el hebreo.
  - Los corchetes de notas se colocaron solo donde la ambigüedad lexical lo exige.
