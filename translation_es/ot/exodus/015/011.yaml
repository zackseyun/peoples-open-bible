review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura retórica del hebreo y mantiene correctamente «Yahvé» y «entre los dioses». También conserva la nota alternativa sobre אֵלִם. Sin embargo, hay un problema de fidelidad visible: en el texto principal aparece «Yahvé» sin el vocativo introductorio «oh», mientras que el hebreo coloca יְהוָה en aposición directa dentro de la exclamación; en español poético conviene marcarlo. Además, «asombroso en alabanzas» es comprensible pero debilita el matiz de sobrecogimiento reverente de נוֹרָא y suena algo liviano en registro bíblico.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «¿Quién como tú…?» pide mejor puntuación vocativa: «oh Yahvé». Asimismo, «asombroso» suena más a sorpresa que a temor reverente; «imponente» o «temible» encajan mejor con el hebreo y con un registro eclesial amplio. «Hacedor de maravillas» es natural y poético.'
  glossary_alignment: 'Alineación buena en los términos clave: יְהוָה -> «Yahvé»; אֵלִם -> «dioses» con alternativa «poderosos»; קֹדֶשׁ -> «santidad». No hay conflicto con la terminología del proyecto. El ajuste principal es léxico-estilístico en נוֹרָא: conviene una opción que preserve mejor el peso de ‘fearsome/awesome’.'
  issues:
  - severity: medium
    issue: Falta el vocativo «oh» antes de «Yahvé» en el texto principal.
    rationale: El hebreo presenta יְהוָה como invocación directa dentro de la pregunta retórica. En español poético y litúrgico, «oh Yahvé» reproduce mejor esa función que dejar solo el nombre tras una coma.
  - severity: medium
    issue: «Asombroso en alabanzas» atenúa demasiado el matiz de נוֹרָא.
    rationale: «Asombroso» en español moderno suele apuntar a sorpresa o admiración, pero נוֹרָא connota sobrecogimiento y temor reverente. «Imponente en alabanzas» preserva mejor el peso semántico sin sonar rígido como «temible» para muchos lectores.
  revised_spanish_text: ¿Quién como tú entre los dioses[a], oh Yahvé? ¿Quién como tú, majestuoso en santidad, imponente en alabanzas[b], hacedor de maravillas?
  revised_footnotes:
  - marker: a
    text: O «entre los poderosos». El hebreo puede aludir tanto a dioses o seres divinos como a poderosos; «entre los dioses» encaja mejor con la retórica del cántico sobre la incomparabilidad de Yahvé.
    reason: alternative_reading
  - marker: b
    text: O «temible en alabanzas» o «asombroso en alabanzas». La expresión hebrea es compacta y poética.
    reason: lexical_alternative
  revision_rationale: Se añadió «oh» para reflejar con más naturalidad el vocativo dirigido a Yahvé. Se cambió «asombroso» por «imponente» para conservar mejor el matiz de sobrecogimiento reverente de נוֹרָא en un español bíblico natural. Se mantuvieron la estructura poética, «entre los dioses» y «hacedor de maravillas».
