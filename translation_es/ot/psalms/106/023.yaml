  text: וַ/יֹּ֗אמֶר לְֽ/הַשְׁמִ֫ידָ֥/ם לוּלֵ֡י מֹ֘שֶׁ֤ה בְחִיר֗/וֹ עָמַ֣ד בַּ/פֶּ֣רֶץ לְ/פָנָ֑י/ו לְ/הָשִׁ֥יב חֲ֝מָת֗/וֹ מֵֽ/הַשְׁחִֽית׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/106/023.yaml
  text: So he said he would destroy them—had not Moses[a], his chosen one, stood in the breach before him to turn back his wrath from destroying.
  footnotes:
  - marker: a
    text: Or 'stood in the gap.' The Hebrew image is of taking one's place at a breach in a wall, here describing Moses' intercession.
    reason: lexical_alternative
