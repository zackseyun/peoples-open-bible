translation:
  language: es
  text: ¡Canta[a], mujer estéril, tú que no has dado a luz; estalla en cánticos y grita de gozo, tú que no has estado de parto. Porque los hijos de la desolada son más numerosos que los hijos de la casada, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la descendencia de la desolada es mucha/más numerosa que la descendencia de la casada». El hebreo expresa la comparación de manera compacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָנִּי
  english_pob_choice: Sing
  chosen_spanish: ¡Canta
  alternatives_spanish:
  - ¡Entona un canto
  - ¡Regocíjate
  lexicon: HALOT
  rationale: El imperativo femenino singular pide exultación vocal. «Canta» es natural en español y conserva el llamado poético sin añadir explicación.
- source_word: עֲקָרָה
  english_pob_choice: barren woman
  chosen_spanish: mujer estéril
  alternatives_spanish:
  - mujer barren
  - la estéril
  lexicon: HALOT
  rationale: El término describe a una mujer incapaz de concebir. «Mujer estéril» es claro en español y mantiene el rasgo femenino explícito.
- source_word: לֹא יָלָדָה
  english_pob_choice: you who have not given birth
  chosen_spanish: tú que no has dado a luz
  alternatives_spanish:
  - tú que no has parido
  - tú que no has tenido hijos
  lexicon: HALOT
  rationale: La frase funciona descriptivamente en aposición a la vocativa. «Dar a luz» comunica bien el sentido de ילד en español contemporáneo.
- source_word: פִּצְחִי רִנָּה
  english_pob_choice: break forth into singing
  chosen_spanish: estalla en cánticos
  alternatives_spanish:
  - irrumpe en canto
  - prorrumpe en júbilo
  lexicon: HALOT
  rationale: פִּצְחִי conserva la imagen de irrumpir; רִנָּה expresa canto jubiloso. «Estalla en cánticos» mantiene el impulso poético sin ser mecánico.
- source_word: וְצַהֲלִי
  english_pob_choice: and shout for joy
  chosen_spanish: y grita de gozo
  alternatives_spanish:
  - y clama con júbilo
  - y prorrumpe en alegría
  lexicon: HALOT
  rationale: צהל implica exclamación gozosa y sonora. «Grita de gozo» preserva el matiz de voz alta y celebración.
- source_word: לֹא חָלָה
  english_pob_choice: you who have not been in labor
  chosen_spanish: tú que no has estado de parto
  alternatives_spanish:
  - tú que no has sufrido dolores de parto
  - tú que no has pasado por trabajo de parto
  lexicon: HALOT
  rationale: El verbo alude al trance del parto. «Estar de parto» es idiomático y mantiene el sentido corporal de la imagen.
- source_word: כִּי רַבִּים
  english_pob_choice: For ... are more
  chosen_spanish: Porque ... son más
  alternatives_spanish:
  - Pues ... son más numerosos
  - Porque ... son muchos
  lexicon: HALOT
  rationale: El hebreo expresa comparación de manera compacta. En español conviene explicitarla con «son más» para evitar ambigüedad.
- source_word: בְּנֵי שׁוֹמֵמָה
  english_pob_choice: the children of the desolate woman
  chosen_spanish: los hijos de la desolada
  alternatives_spanish:
  - los hijos de la mujer desolada
  - los hijos de la abandonada
  lexicon: HALOT
  rationale: בנים puede significar hijos en sentido general. «La desolada» reproduce la construcción compacta del hebreo y deja visible la metáfora.
- source_word: מִבְּנֵי בְעוּלָה
  english_pob_choice: than the children of the married woman
  chosen_spanish: que los hijos de la casada
  alternatives_spanish:
  - que los hijos de la mujer casada
  - que los hijos de la que tiene marido
  lexicon: HALOT
  rationale: בעולה alude a una mujer unida a un marido. «Casada» es una equivalencia breve y comprensible para la comparación del versículo.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé», conforme al criterio del proyecto, y la fórmula profética en presente «dice».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. El criterio del proyecto pide transliterarlo como «Yahvé» en lugar de ocultarlo con una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Comparación final abreviada
  english_pob_reading: the children of the desolate woman are more than the children of the married woman
  chosen_spanish_reading: los hijos de la desolada son más que los hijos de la casada
  alternative_spanish_readings:
  - los hijos de la mujer desolada son más que los hijos de la mujer casada
  - los hijos de la desolada son más numerosos que los de la casada
  rationale: El hebreo condensa la comparación y usa sustantivos femeninos elípticos. La versión española mantiene esa compacidad sin perder la relación comparativa.
  doctrine_reference: Isaías 54:1; comparative מן construction in Hebrew
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] en el texto español exactamente donde corresponde, junto a la nota alternativa asociada. No se introdujeron otros marcadores ni notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה, conforme al criterio del proyecto.
  - Se eligió «mujer estéril» para עֲקָרָה por claridad y naturalidad en español.
  - 'Se conservó el paralelismo poético con verbos imperativos breves: «Canta», «estalla», «grita».'
  - Se prefirió «la casada» como equivalente breve de בְעוּלָה, sin perder el contraste con «la desolada».
