translation:
  language: es
  text: Desde allí, después de haber recorrido nueve estadios, mientras hacían su marcha contra Timoteo, los árabes cayeron sobre él[a], no menos de cinco mil, y quinientos jinetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene el singular αὐτῷ, literalmente 'a él'. Algunos traductores pueden entender el referente de manera colectiva y verter 'a ellos', pero el testimonio de la fuente aquí es singular.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐκεῖθεν δὲ
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - De allí
  - Desde ese lugar
  lexicon: LSJ
  rationale: Expresa el punto de partida espacial de modo natural en español y mantiene la referencia deíctica del texto griego.
- source_word: ἀποστάντες
  english_pob_choice: after they had gone
  chosen_spanish: después de haber recorrido
  alternatives_spanish:
  - después de haber partido
  - tras haber salido
  lexicon: LSJ
  rationale: El participio aoristo indica desplazamiento desde un lugar previo; 'recorrido' funciona bien con la medida de distancia y evita una calca dura.
- source_word: σταδίους ἐννέα
  english_pob_choice: nine stadia
  chosen_spanish: nueve estadios
  alternatives_spanish:
  - nueve estadios de distancia
  - nueve estadios recorridos
  lexicon: LSJ
  rationale: Se conserva la unidad antigua 'estadios' por transparencia formal, como hace la POB en inglés con 'stadia'.
- source_word: ποιουμένων τὴν πορίαν
  english_pob_choice: while making their march
  chosen_spanish: mientras avanzaban
  alternatives_spanish:
  - mientras hacían su marcha
  - mientras proseguían su camino
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto describe una acción en curso; en español 'avanzaban' comunica el movimiento continuo con mayor naturalidad que una traducción literal rígida.
- source_word: ἐπὶ τὸν Τιμόθεον
  english_pob_choice: against Timotheus
  chosen_spanish: contra Timoteo
  alternatives_spanish:
  - hacia Timoteo
  - sobre Timoteo
  lexicon: LSJ
  rationale: En contexto militar, ἐπί con acusativo señala dirección hostil; 'contra' preserva ese valor.
- source_word: ἐπέβαλον
  english_pob_choice: fell upon
  chosen_spanish: cayeron sobre
  alternatives_spanish:
  - se lanzaron contra
  - atacaron
  lexicon: LSJ
  rationale: '''Cayeron sobre'' reproduce bien el onset súbito y violento del verbo sin perder la imagen idiomática.'
- source_word: Ἄραβες
  english_pob_choice: Arabs
  chosen_spanish: los árabes
  alternatives_spanish:
  - árabes
  - los arabios
  lexicon: LSJ
  rationale: Se usa el etnónimo moderno natural en español; el artículo definido mantiene la referencia colectiva del sujeto.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - les
  - ellos
  lexicon: Greek grammar / context
  rationale: El dativo singular del testimonio griego se refleja con un referente singular en español. Dado que el contexto narrativo puede entenderse colectivamente, la nota marca la posible lectura alternativa sin armonizar silenciosamente el texto.
- source_word: οὐκ ἐλάττους τῶν πεντακισχιλίων
  english_pob_choice: no fewer than five thousand
  chosen_spanish: no menos de cinco mil
  alternatives_spanish:
  - al menos cinco mil
  - no menos que cinco mil
  lexicon: LSJ
  rationale: La expresión idiomática marca un mínimo; 'no menos de' es transparente y fiel en español.
- source_word: ἱππεῖς δὲ πεντακόσιοι
  english_pob_choice: and five hundred horsemen
  chosen_spanish: y quinientos jinetes
  alternatives_spanish:
  - y quinientos hombres de a caballo
  - y quinientos caballeros
  lexicon: LSJ
  rationale: ἱππεῖς designa tropas montadas; 'jinetes' es claro y evita una modernización militarizante innecesaria.
translation_notes:
  revision_awareness: Se incorporó la corrección revisada de la POB en inglés al conservar una formulación más natural para la distancia recorrida y, al mismo tiempo, se mantuvo la referencia singular del pronombre griego con nota explícita. No se introdujeron armonizaciones implícitas ni se suavizó la cifra o el carácter militar del pasaje.
  spanish_consistency_notes:
  - Se mantuvo 'estadios' para la unidad antigua, en línea con la transparencia formal del audit trail.
  - Se prefirió 'los árabes' y 'quinientos jinetes' por ser equivalentes naturales y precisos en español.
  - La nota a pie de texto queda anclada en '[a]' para evitar una referencia desanclada.
