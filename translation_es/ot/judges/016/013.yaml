revisions:
- from: 'Entonces Dalila dijo a Sansón[a]: «Hasta ahora me has estado burlando y me has dicho mentiras. Dime con qué podrías ser atado». Y él le dijo: «Si tejieras las siete trenzas de mi cabeza con la tela».'
  to: 'Entonces Dalila dijo a Sansón: «Hasta ahora te has burlado de mí y me has dicho mentiras. Dime con qué podrías ser atado». Y él le dijo: «Si tejieras las siete trenzas de mi cabello con el tejido[a]».'
  rationale: Se corrige una construcción española poco idiomática, se mejora la naturalidad de la referencia al cabello, y se ajusta el término de tejido para reflejar mejor la evidencia hebrea y la nota léxica del POB en inglés, preservando las alternativas en nota.
