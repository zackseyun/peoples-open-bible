translation:
  language: es
  text: Era honrado entre los treinta[a], pero no llegó a los tres[b]; y David lo puso al frente de su guardia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Era más honrado que los treinta». La construcción hebrea también puede leerse en sentido comparativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no alcanzó a los tres»; es decir, no llegó al rango de los tres guerreros de élite.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «a su mishmaath». Puede significar «a su mando» o «sobre su guardia»; «al frente de su guardia» refleja aquí el sentido militar más probable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַשְּׁלֹשִׁים
  english_pob_choice: among the thirty
  chosen_spanish: entre los treinta
  alternatives_spanish:
  - más honrado que los treinta
  - de entre los treinta
  lexicon: HALOT
  rationale: La preposición מִן en este contexto honorífico puede expresar pertenencia al grupo o comparación. «Entre los treinta» conserva esa ambigüedad útil en español sin forzar una lectura comparativa explícita que el hebreo permite pero no exige.
- source_word: נִכְבָּד
  english_pob_choice: was honored
  chosen_spanish: era honrado
  alternatives_spanish:
  - fue honrado
  - era estimado
  lexicon: HALOT
  rationale: El nifal de כבד expresa ser honrado o tenido en estima. «Era honrado» mantiene la pasiva y encaja bien con la formulación de estatus continuo en esta lista de guerreros.
- source_word: וְאֶל הַשְּׁלֹשָׁה לֹא בָא
  english_pob_choice: but he did not attain to the three
  chosen_spanish: pero no llegó a los tres
  alternatives_spanish:
  - pero no alcanzó a los tres
  - pero no llegó al nivel de los tres
  lexicon: HALOT
  rationale: בוא con אֶל en este contexto de honor/rango se entiende como alcanzar un nivel o posición. «No llegó a los tres» conserva la imagen de alcance sin añadir más interpretación que la necesaria para un español natural.
- source_word: וַיְשִׂמֵהוּ
  english_pob_choice: and David appointed him
  chosen_spanish: David lo puso
  alternatives_spanish:
  - David lo nombró
  - David lo estableció
  lexicon: HALOT
  rationale: שׂים puede significar poner/colocar y, en contextos administrativos, nombrar o designar. Aquí, para no añadir un matiz técnico no explícito en el hebreo, «lo puso» deja abierta la idea de asignación que el contexto precisará.
- source_word: אֶל מִשְׁמַעְתּוֹ
  english_pob_choice: over his bodyguard
  chosen_spanish: sobre su guardia
  alternatives_spanish:
  - a su mando
  - sobre su escolta
  lexicon: HALOT
  rationale: מִשְׁמַעַת puede referirse a mando, jurisdicción o al grupo sometido a esa autoridad. En este contexto militar-cortesano, «su guardia» expresa la función probable sin adoptar de manera cerrada una paráfrasis más específica que el término hebreo no exige por sí solo.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo base y con el auditoría inglesa en el sentido general: honor entre los treinta, no alcanzar a los tres y asignación por David a una función de guardia o mando. Se conserva la ambigüedad comparativa de מִן y la posible ambigüedad funcional de מִשְׁמַעַת sin sobredeterminar el sentido.'
  spanish_consistency_notes:
  - Se usa «treinta» y «tres» con artículo definido, como en el hebreo y en el contexto de los grupos guerreros ya conocidos.
  - Se evita «Cristo», «Señor» u այլ terminología no pertinente.
  - «Guardia» mantiene un registro comprensible y militar; se dejó en nota la alternativa de «mando» para reflejar la tensión léxica del hebreo.
  - La puntuación reproduce una cadencia coordinada natural en español sin alterar la estructura de contraste del original.
