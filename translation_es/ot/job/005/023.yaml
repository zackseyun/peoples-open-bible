translation:
  language: es
  text: Porque tendrás un pacto con las piedras del campo[a], y los animales salvajes del campo estarán en paz contigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las piedras en el campo». La imagen puede evocar piedras como obstáculos agrícolas, pero el hebreo deja explícita la imagen en la línea principal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ha hecho paz contigo» o «está en paz contigo». El hebreo expresa una relación de paz entre la persona y los animales salvajes.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: En este contexto introduce la razón o consecuencia de la promesa anterior; «Porque» conserva la relación lógica sin sonar forzado en español.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto a
  lexicon: HALOT
  rationale: La preposición expresa asociación o relación; «con» es la opción natural y fiel al hebreo.
- source_word: אַבְנֵי הַשָּׂדֶה
  english_pob_choice: the stones of the field
  chosen_spanish: las piedras del campo
  alternatives_spanish:
  - las piedras del terreno
  - las piedras del campo arado
  - las piedras del campo de cultivo
  lexicon: HALOT
  rationale: Sigo el sentido literal preservado por la POB inglesa. En español, «piedras del campo» conserva la imagen poética explícita y clara.
- source_word: בְרִיתֶךָ
  english_pob_choice: you will have a covenant
  chosen_spanish: tendrás un pacto
  alternatives_spanish:
  - habrá un pacto para ti
  - harás un pacto
  - estarás en pacto
  lexicon: HALOT
  rationale: El hebreo presenta una expresión nominal; como en la auditoría inglesa, el español necesita un verbo implícito. «Tendrás un pacto» mantiene la relación sin sobreinterpretarla.
- source_word: וְחַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field
  chosen_spanish: los animales salvajes del campo
  alternatives_spanish:
  - las bestias del campo
  - los animales del campo
  lexicon: HALOT
  rationale: «חַיָּה» en esta construcción apunta a animales salvajes. «Animales salvajes» es claro y conserva la fuerza poética del hebreo.
- source_word: הָשְׁלְמָה
  english_pob_choice: will be at peace
  chosen_spanish: estarán en paz
  alternatives_spanish:
  - vivirán en armonía
  - se habrán pacificado
  - habrán hecho las paces
  lexicon: HALOT
  rationale: La forma verbal expresa una relación pacífica establecida; «estarán en paz» reproduce bien el resultado relacional que documenta la POB inglesa.
- source_word: לָךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con respecto a ti
  - para ti
  lexicon: HALOT
  rationale: Aunque la forma es «a/para ti», en español la construcción natural con «estar en paz» es «contigo», que expresa el mismo sentido relacional.
translation_notes:
  revision_awareness: La auditoría inglesa indica acuerdo alto y ninguna revisión aplicada; este borrador sigue la misma lectura sin cambios sustantivos, adaptando la sintaxis al español natural.
  spanish_consistency_notes:
  - Se mantiene «pacto» para בְרִית, coherente con el uso bíblico-jurídico del término en español.
  - Se conserva la imagen concreta de «piedras del campo» sin domesticarla a una interpretación alegórica no documentada.
  - «Animales salvajes» evita el arcaísmo de «bestias» sin perder el valor semántico de חַיַּת en este contexto.
  - «Contigo» traduce la relación pacífica de manera idiomática en español, equivalente al valor relacional de לָךְ en la construcción verbal.
