translation:
  language: es
  text: Yo los atraje con cuerdas de un hombre[a], con lazos de amor; y fui para ellos como los que alzan un yugo de sobre sus quijadas[b]; y me incliné hacia él y le di de comer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con cuerdas humanas». El hebreo puede subrayar una conducción humana y suave, en contraste con una sujeción brusca o animal.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de sobre sus quijadas». «Quijadas» también puede entenderse como «mejillas». Más adelante el hebreo cambia al singular: «hacia él … le di de comer», donde muchas traducciones armonizan al plural.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּחַבְלֵי אָדָם
  english_pob_choice: with cords of a man
  chosen_spanish: con cuerdas de un hombre
  alternatives_spanish:
  - con cuerdas humanas
  - con cuerdas de humanidad
  lexicon: HALOT
  rationale: חַבְלֵי son cuerdas o sogas; אָדָם está en singular, así que conviene conservar en español la referencia singular. «De un hombre» mantiene el giro hebreo y la tensión entre una imagen literal de cuerda y una conducción humana, amable, no brutal. «Cuerdas humanas» explicita la idea, pero suaviza demasiado el idiomismo.
- source_word: אֶמְשְׁכֵם
  english_pob_choice: I drew them
  chosen_spanish: los atraje
  alternatives_spanish:
  - los conduje
  - los jalé
  lexicon: HALOT
  rationale: מָשַׁךְ puede significar tirar, atraer o arrastrar. «Atraje» comunica bien la fuerza de atracción sin volver la imagen áspera; además armoniza con las cuerdas y el amor. «Conduje» perdería la idea de tirón/atracción, y «jalé» sería demasiado coloquial.
- source_word: בַּעֲבֹת֣וֹת אַהֲבָה
  english_pob_choice: with ropes of love
  chosen_spanish: con lazos de amor
  alternatives_spanish:
  - con sogas de amor
  - con cuerdas de amor
  lexicon: HALOT
  rationale: עֲבֹתוֹת son lazos gruesos, sogas o cuerdas fuertes. En español, «lazos» permite conservar el contraste poético con «cuerdas» y evita repetir mecánicamente el mismo término. «De amor» sigue de cerca el genitivo hebreo.
- source_word: וָאֶהְיֶה לָהֶם
  english_pob_choice: and I was to them
  chosen_spanish: y fui para ellos
  alternatives_spanish:
  - y estuve para ellos
  - y era para ellos
  lexicon: HALOT
  rationale: La cópula hebrea aquí funciona de manera relacional. «Fui para ellos» conserva el sentido de relación y evita forzar una equivalencia más explicativa. «Estuve para ellos» es posible, pero menos directo en el paralelo poético.
- source_word: כִּמְרִימֵי עֹל
  english_pob_choice: like those who lift a yoke
  chosen_spanish: como los que alzan un yugo
  alternatives_spanish:
  - como los que levantan un yugo
  - como alzadores de yugo
  lexicon: HALOT
  rationale: El participio plural se conserva con «los que». «Alzan» mantiene el movimiento de levantar/elevar y suena natural en español. «Levantan» también serviría, pero «alzan» acompaña mejor el gesto de sacar o quitar algo de encima.
- source_word: עַל לְחֵיהֶם
  english_pob_choice: from their jaws
  chosen_spanish: de sobre sus quijadas
  alternatives_spanish:
  - de sus mandíbulas
  - de sus mejillas
  lexicon: HALOT
  rationale: לְחִי puede ser mejilla o mandíbula/quijada. En el contexto de un yugo sobre un animal, «quijadas» conserva la imagen concreta del punto de presión y evita diluirla en «mejillas», que en español sería menos natural en este cuadro animal. «De sobre» reproduce el valor espacial de עַל.
- source_word: וְאַט
  english_pob_choice: and I bent down
  chosen_spanish: y me incliné
  alternatives_spanish:
  - y me agaché
  - y me doblegué
  lexicon: HALOT
  rationale: El verbo transmite el gesto de inclinarse o bajar el cuerpo con cuidado. «Me incliné» es digno, claro y suficientemente concreto; «me agaché» suena demasiado cotidiano, y «me doblegué» introduce una idea ajena.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - hacia ellos
  lexicon: HALOT
  rationale: Se mantiene el singular textual de la consonancia masorética. En español, «hacia él» conserva la dirección del gesto de inclinarse y deja visible la tensión con el plural anterior. No se normaliza a plural para no borrar la señal del hebreo.
- source_word: אוֹכִיל
  english_pob_choice: fed him
  chosen_spanish: le di de comer
  alternatives_spanish:
  - lo alimenté
  - lo hice comer
  lexicon: HALOT
  rationale: El causativo de אכל significa alimentar o hacer comer. «Le di de comer» es natural en español, conserva la acción concreta y evita una expresión más técnica o rígida. «Lo alimenté» es correcta, pero menos cálida en el cierre del verso.
theological_decisions:
- issue: Imagen antropomórfica y pastoral de la acción divina
  english_pob_reading: Retain the concrete imagery of drawing, lifting the yoke, bending down, and feeding without allegorical expansion.
  chosen_spanish_reading: Conservar la imaginería concreta de atraer, alzar el yugo, inclinarse y dar de comer, sin convertirla en paráfrasis abstracta.
  alternative_spanish_readings:
  - Interpretar el verso como simple guía providencial
  - Reducir la imagen a cuidado general
  rationale: 'El hebreo presenta una escena viva de trato tierno y también de autoridad. La traducción debe mantener esa tensión: Dios atrae con amor, pero también quita la carga y alimenta. Una reformulación abstracta perdería el peso poético y teológico del pasaje.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Pronombre singular en אֵלָיו y el cierre verbal
  english_pob_reading: Keep the singular 'to him'/'fed him' in the main text.
  chosen_spanish_reading: Mantener el singular «hacia él» y «le di de comer» en el texto principal.
  alternative_spanish_readings:
  - Normalizar a plural «hacia ellos» / «les di de comer»
  rationale: La forma singular está en el texto hebreo y no debe borrarse para acomodar la expectativa española de concordancia. Puede reflejar a Israel como hijo colectivo. Preservar la tensión es más fiel que resolverla en la línea principal.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el trazado auditado en inglés. Se preservan el singular de אֵלָיו/אוֹכִיל, el paralelismo entre cuerdas/lazos, y la imagen concreta del yugo sobre la cara del animal, evitando la nivelación explicativa. Se ajustó el español para que suene natural y publicable sin perder el perfil semántico del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando aparece el nombre divino en el contexto del libro.
  - Se conservó la tensión singular/plural del hebreo en la última cola del verso.
  - «Cuerdas» y «lazos» mantienen la distinción léxica de חַבְלֵי / עֲבֹתוֹת.
  - «Quijadas» se eligió por la escena ganadera concreta; no se neutralizó a «mejillas».
