theological_decisions:
- issue: Collective singular versus plural reference in the opening clause
  chosen_reading: Render the singular suffix לוֹ collectively as 'their' in English
  alternative_readings:
  - Render more formally as 'in his distress'
  rationale: The surrounding context speaks of Israel corporately, and the following pronouns/verbs are plural. Using 'their' communicates the intended referent in natural English without changing the sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern English, not archaic or academic.'
- issue: Divine responsiveness in וַיִּמָּצֵא לָהֶם
  chosen_reading: 'Express God''s being found in a way that preserves divine agency: ''he let himself be found by them'''
  alternative_readings:
  - '''he was found by them'''
  rationale: The Hebrew Niphal permits the simpler passive, but in English that can imply accidental discovery. The chosen rendering preserves the biblical theme that God responds to those who seek him, while remaining close to the source text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence.'
