translation:
  language: es
  text: Y aconteció que, al cabo de algunos días, el wadi[a] se secó, porque no había lluvia en la región.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘arroyo’. El hebreo se refiere a un cauce estacional o wadi.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y ocurrió que
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce el siguiente evento. En español, 'aconteció que' conserva el valor de transición narrativa sin sonar tan mecánico como un calco directo.
- source_word: מִקֵּץ יָמִים
  english_pob_choice: after some days
  chosen_spanish: al cabo de algunos días
  alternatives_spanish:
  - después de algunos días
  - tras unos días
  lexicon: HALOT
  rationale: El hebreo expresa un período indefinido transcurrido. 'Al cabo de algunos días' mantiene la idea de un lapso no precisado y suena natural en español bíblico contemporáneo.
- source_word: וַיִּיבַשׁ
  english_pob_choice: dried up
  chosen_spanish: se secó
  alternatives_spanish:
  - se secó por completo
  - se puso seco
  lexicon: HALOT
  rationale: Para un cauce o curso de agua, el verbo indica que dejó de tener agua. 'Se secó' comunica bien el resultado sin forzar una expresión demasiado técnica.
- source_word: הַנָּחַל
  english_pob_choice: the wadi
  chosen_spanish: el wadi
  alternatives_spanish:
  - el arroyo estacional
  - el cauce seco
  - el torrente
  lexicon: HALOT
  rationale: 'El POB en inglés eligió ''wadi'' por precisión geográfica: un cauce estacional que puede secarse. Se conserva el término para mantener esa precisión y porque en español bíblico moderno ya puede funcionar como préstamo explicativo; ''arroyo'' o ''torrente'' podrían sugerir agua permanente o perder la especificidad.'
- source_word: גֶשֶׁם
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - lluvia alguna
  - precipitación
  lexicon: HALOT
  rationale: גֶשֶׁם designa lluvia en sentido simple. 'Lluvia' es la equivalencia directa y natural en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: Aunque 'la tierra' puede sonar amplio, aquí refleja el hebreo אֶרֶץ sin especificar una entidad política. Mantiene el paralelismo bíblico y el ámbito geográfico general del relato.
theological_decisions:
- issue: Alcance de אֶרֶץ
  english_pob_reading: in the land
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - en el país
  - en la región
  rationale: No hay un marcador que exija limitar el referente a un territorio político moderno. 'La tierra' conserva el sentido amplio del hebreo y evita precisar más de lo que el texto dice.
  doctrine_reference: Hermenéutica del sentido contextual de אֶרֶץ
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el tramo revisado del inglés auditado: incorpora la estructura narrativa explícita (''Y aconteció que'') y el lapso indefinido (''al cabo de algunos días''), y mantiene la precisión geográfica de נחל como curso de agua estacional. También conserva la causalidad explícita (''porque'').'
  spanish_consistency_notes:
  - Se mantiene 'Y aconteció que' como fórmula narrativa consistente con el estilo bíblico español moderno del proyecto.
  - '''Wadi'' se usa de manera consistente con la decisión lexical del inglés POB para נחל; la nota aclara la alternativa tradicional ''arroyo''.'
  - '''Tierra'' conserva el valor amplio de אֶרֶץ sin introducir una precisión geopolítica no presente en el hebreo.'
