translation:
  language: es
  text: Tus palabras fueron halladas, y yo las comí; y tus palabras fueron para mí gozo y alegría de mi corazón, porque tu nombre es llamado sobre mí[a], Yahvé, Dios de las huestes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «soy llamado por tu nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִמְצְאוּ
  english_pob_choice: were found
  chosen_spanish: fueron halladas
  alternatives_spanish:
  - fueron encontradas
  - aparecieron
  lexicon: HALOT
  rationale: El Niphal de מצא expresa que las palabras llegaron a ser encontradas/halladas. «Fueron halladas» conserva la pasividad y el matiz de encuentro no buscado explícitamente, con español natural y digno.
- source_word: דְבָרֶיךָ
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tu palabra
  - tus dichos
  lexicon: HALOT
  rationale: El hebreo está en plural con sufijo de 2ms; por eso se mantiene el plural «palabras» y el posesivo de segunda persona.
- source_word: וָאֹכְלֵם
  english_pob_choice: I ate them
  chosen_spanish: yo las comí
  alternatives_spanish:
  - las devoré
  - las consumí
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal de ingerir la palabra divina. «Las comí» es directo, fiel y suficientemente idiomático en español.
- source_word: וַיְהִי
  english_pob_choice: became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se volvieron
  - fueron
  lexicon: HALOT
  rationale: Aunque el inglés POB usa un verbo de resultado, en español «llegaron a ser» expresa con claridad el cambio de estado y evita una construcción demasiado calcada o ambigua.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - me
  lexicon: HALOT
  rationale: La relación dativa es experiencial/benefactiva; «para mí» suena natural en español cuando la frase presenta el resultado como algo experimentado por el sujeto.
- source_word: לְשָׂשׂוֹן
  english_pob_choice: a joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - júbilo
  lexicon: HALOT
  rationale: שָׂשׂוֹן denota gozo jubiloso. «Gozo» es un término bíblico y sobrio en español, adecuado para mantener el matiz de alegría intensa sin sobrerrepresentarlo.
- source_word: וּלְשִׂמְחַת לְבָבִי
  english_pob_choice: the gladness of my heart
  chosen_spanish: alegría de mi corazón
  alternatives_spanish:
  - gozo de mi corazón
  - regocijo de mi corazón
  lexicon: HALOT
  rationale: שִׂמְחָה refiere a alegría/regocijo; el constructo con «mi corazón» conserva el centro afectivo interno. Se evita «delicia» o «deleite» porque el hebreo enfatiza alegría, no placer estético.
- source_word: נִקְרָא שִׁמְךָ עָלַי
  english_pob_choice: your name is called upon me
  chosen_spanish: tu nombre es invocado sobre mí
  alternatives_spanish:
  - soy llamado por tu nombre
  - tu nombre se llama sobre mí
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y marca pertenencia/identificación. «Es invocado sobre mí» conserva el valor literal de «ser llamado sobre» sin borrar la carga de posesión del nombre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar POB de usar el nombre divino en transliteración. En español, «Yahvé» comunica el Tetragrámaton sin la sustitución litúrgica de «SEÑOR».
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: God of hosts
  chosen_spanish: Dios de los ejércitos
  alternatives_spanish:
  - Dios de los ejércitos celestiales
  - Dios de los anfitriones
  lexicon: HALOT
  rationale: צְבָאוֹת puede referirse a huestes/ejércitos. «Dios de los ejércitos» es la equivalencia más transparente en español y mantiene la majestad del título.
theological_decisions:
- issue: Idiom of bearing the divine name
  english_pob_reading: your name is called upon me
  chosen_spanish_reading: tu nombre es invocado sobre mí
  alternative_spanish_readings:
  - soy llamado por tu nombre
  - tu nombre es puesto sobre mí
  rationale: El hebreo comunica pertenencia y relación de pacto. La redacción principal conserva la forma idiomática sin eliminar el sentido teológico de ser marcado por el nombre de Yahvé.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo contiene el Tetragrámaton de forma explícita. La traducción mantiene el nombre propio de Dios en vez de sustituirlo por un título, en coherencia con la política POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «called over me» a «called upon me» para reflejar mejor el sentido idiomático de נִקְרָא שִׁמְךָ עָלַי. También ajustó «for me» a «to me» y «delight» a «gladness» para mayor naturalidad y mayor correspondencia léxica. La presente redacción española conserva esa tensión: mantiene la literalidad del nombre puesto sobre el profeta, pero ofrece una alternativa idiomática en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה y no «SEÑOR», conforme al estándar del proyecto.
  - Se conserva el plural «palabras» para דְבָרֶיךָ y no se reduce a singular.
  - «Gozo» y «alegría» se usan para reflejar el paralelismo hebreo entre שָׂשׂוֹן y שִׂמְחָה.
  - La metáfora de comer las palabras se conserva sin explicación añadida.
  - La nota al pie marca la alternativa idiomática solo donde el hebreo crea una ambigüedad real en español.
