translation:
  language: es
  text: Cuando los hijos de Amón vieron que se habían hecho odiosos[a] ante David, los hijos de Amón enviaron y contrataron a los arameos[b] de Bet-rehob y a los arameos de Zobá, veinte mil soldados de infantería, y al rey de Maacá con mil hombres, y a los hombres de Tob[c], doce mil hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «se habían convertido en un hedor para David».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Aram»; tradicionalmente, «Siria/sirios».'
    reason: lexical_alternative
  - marker: c
    text: Posiblemente «Ish-tob», entendido como nombre de lugar o de clan; aquí se traduce «los hombres de Tob».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - percibieron
  - se dieron cuenta de
  lexicon: HALOT
  rationale: La forma básica de ראה es 'ver'; en este contexto narrativo introduce la reacción de los amonitas al reconocer su situación. 'Vieron' conserva el verbo de percepción sin sobreexplicar la inferencia.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea constructa de 'hijos de Amón' para reflejar de cerca el texto fuente, como hace la POB inglesa con 'sons of Ammon'. 'Amonitas' sería más idiomático, pero menos transparente respecto de la forma original.
- source_word: נִבְאֲשׁוּ בְּדָוִד
  english_pob_choice: had become odious to David
  chosen_spanish: se habían hecho odiosos para David
  alternatives_spanish:
  - se habían vuelto un hedor para David
  - se habían vuelto repugnantes para David
  lexicon: HALOT
  rationale: באשׁ conserva la metáfora olfativa de algo que huele mal y, por extensión, resulta ofensivo. 'Odiosos' comunica el valor idiomático en español sin borrar la tensión semántica que la nota inglesa preserva con 'odious'; la alternativa más literal queda registrada en la nota.
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - despacharon
  - mandaron
  lexicon: HALOT
  rationale: El verbo se traduce de manera simple y directa, sin añadir 'mensajeros' al texto principal, ya que el hebreo tampoco los nombra explícitamente en este punto.
- source_word: וַיִּשְׂכְּרוּ
  english_pob_choice: hired
  chosen_spanish: contrataron
  alternatives_spanish:
  - alquilaron
  - tomaron a sueldo
  lexicon: HALOT
  rationale: Como el contexto es militar, 'contrataron' expresa bien el acto de asegurar tropas de apoyo mediante pago. Mantiene la idea de empleo de mercenarios sin cargar el verso con una explicación secundaria.
- source_word: אֲרַם בֵּית רְחוֹב
  english_pob_choice: the Arameans of Beth-rehob
  chosen_spanish: los arameos de Bet-rehob
  alternatives_spanish:
  - los arameos de Bet-Rehob
  - Aram de Bet-rehob
  lexicon: HALOT
  rationale: '''Arameos'' reproduce mejor el etnónimo de אֲרַם que la forma tradicional ''sirios''. El topónimo se translitera de manera consistente como Bet-rehob.'
- source_word: אֲרַם צוֹבָא
  english_pob_choice: the Arameans of Zobah
  chosen_spanish: los arameos de Zobá
  alternatives_spanish:
  - los arameos de Zoba
  - Aram de Zobá
  lexicon: HALOT
  rationale: Se conserva 'arameos' por fidelidad al hebreo. 'Zobá' mantiene la transliteración del nombre propio con acentuación española natural.
- source_word: עֶשְׂרִים אֶלֶף רַגְלִי
  english_pob_choice: twenty thousand foot soldiers
  chosen_spanish: veinte mil soldados de infantería
  alternatives_spanish:
  - veinte mil tropas de a pie
  - veinte mil infantes
  lexicon: HALOT
  rationale: רַגְלִי alude a tropas que combaten a pie. 'Soldados de infantería' es natural en español moderno y mantiene el contraste militar implícito con otras unidades.
- source_word: מֶלֶךְ מַעֲכָה
  english_pob_choice: the king of Maacah
  chosen_spanish: el rey de Maacá
  alternatives_spanish:
  - el rey de Maaca
  - el rey Maacá
  lexicon: HALOT
  rationale: El hebreo indica soberanía sobre Maacá, no un nombre en aposición. Se conserva el nombre geográfico en forma transliterada usual.
- source_word: אֶלֶף אִישׁ
  english_pob_choice: one thousand men
  chosen_spanish: mil hombres
  alternatives_spanish:
  - un millar de hombres
  - mil personas
  lexicon: HALOT
  rationale: La cifra militar se expresa de forma directa y natural en español, sin alterar el registro del pasaje.
- source_word: אִישׁ טוֹב
  english_pob_choice: the men of Tob
  chosen_spanish: los hombres de Tob
  alternatives_spanish:
  - Ish-tob
  - los de Tob
  lexicon: HALOT
  rationale: La lectura contextual favorece un nombre de lugar o grupo, no un antropónimo fijo. Se sigue la opción de la POB inglesa de entender la frase como referencia a los hombres de Tob.
- source_word: שְׁנֵים עָשָׂר אֶלֶף אִישׁ
  english_pob_choice: twelve thousand men
  chosen_spanish: doce mil hombres
  alternatives_spanish:
  - doce mil tropas
  lexicon: HALOT
  rationale: Se conserva el conteo militar de manera simple y precisa, como en el inglés de la POB.
theological_decisions:
- issue: Sentido idiomático y carga afectiva de נִבְאֲשׁוּ בְּדָוִד
  english_pob_reading: had become odious to David
  chosen_spanish_reading: se habían hecho odiosos para David
  alternative_spanish_readings:
  - se habían vuelto un hedor para David
  - se habían vuelto repugnantes para David
  rationale: La POB inglesa evita reducir el hebreo a mero 'odio' y conserva la idea de algo ofensivo o repulsivo. El español elegido comunica la relación adversa sin borrar del todo la metáfora de mal olor que el verbo sugiere.
  doctrine_reference: No aplica doctrinalmente; decisión léxico-semántica con peso narrativo.
- issue: Identificación de אֲרַם como 'arameos' en lugar de la tradición 'sirios'
  english_pob_reading: Arameans
  chosen_spanish_reading: arameos
  alternative_spanish_readings:
  - sirios
  - sirios/arameos
  rationale: La forma hebrea nombra a Aram y a sus habitantes; 'arameos' es más directo y evita anacronismos asociados con 'sirios'. La POB inglesa ya opta por esta dirección, y el español la sigue.
  doctrine_reference: No aplica doctrinalmente; decisión histórica y lexical.
translation_notes:
  revision_awareness: 'La POB inglesa vigente en el expediente muestra estado sin cambios tras revisión reciente; se mantuvo la misma línea de decisión: preservar el idiomatismo de ''become odious'', traducir אֲרַם como ''arameos'', y reflejar la lectura contextual de ''the men of Tob'' con nota alternativa para Ish-tob.'
  spanish_consistency_notes:
  - 'Se usan transliteraciones consistentes para nombres propios: Bet-rehob, Zobá, Maacá y Tob.'
  - Se prefiere 'arameos' para אֲרַם en todo el verso; no se alterna con 'sirios' en el texto principal.
  - Se mantiene el registro militar del pasaje con 'soldados de infantería' y 'hombres'.
  - Las notas con [a], [b] y [c] reflejan alternativas léxicas o de lectura ya presentes en el audit trail inglés, sin añadir nuevas ambigüedades.
