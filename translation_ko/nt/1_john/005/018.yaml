id: 1JN.5.18
reference: 1 John 5:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οἴδαμεν ὅτι πᾶς ὁ γεγεννημένος ἐκ τοῦ θεοῦ οὐχ ἁμαρτάνει, ἀλλ’ ὁ γεννηθεὶς ἐκ τοῦ θεοῦ τηρεῖ ⸀αὐτόν, καὶ ὁ πονηρὸς οὐχ ἅπτεται αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/005/018.yaml
  text: We know that everyone who has been born of God does not keep sinning[a]; rather, the one who was born of God keeps him[c][b], and the evil one does not touch him.
  footnotes:
  - marker: a
    text: Or, 'the one born of God keeps himself.' Many interpreters, however, understand 'the one who was born of God' to refer to Jesus, the Son, who keeps the believer.
    reason: alternative_reading
  - marker: b
    text: '''Does not keep sinning'' reflects the Greek present tense, which here likely refers to ongoing or habitual sin rather than claiming that believers never commit any sin (compare 1 John 1:8-10; 2:1).'
    reason: cross_reference
  - marker: c
    text: '''Touch'' can carry the sense of laying hold of so as to harm.'
    reason: lexical_alternative
translation:
  language: ko
  text: '우리는 압니다: 하나님께로부터 난 자마다 죄를 짓지 않으며, 도리어 하나님께로부터 나신 분이 그를 지키시므로, 악한 자가 그에게 손대지 못합니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ γεννηθεὶς ἐκ τοῦ θεοῦ
  english_pob_choice: the one who was born of God
  chosen_korean: 하나님께로부터 나신 분
  alternatives_korean:
  - 하나님께로부터 난 자
  lexicon: BDAG
  rationale: 단순과거 수동 분사는 신자의 거듭남(완료형 γεγεννημένος)과 의도적으로 구별된다. 본 문맥에서 「하나님께로부터 나신 분」은 그리스도를 가리키는 것으로 본다(영문 POB의 「keeps him」 해석 채택). 「그를 지키신다」의 목적격 αὐτόν은 신자를 가리킨다.
- source_word: οὐχ ἅπτεται
  english_pob_choice: does not touch
  chosen_korean: 손대지 못합니다
  alternatives_korean:
  - 만지지 못합니다
  - 건드리지 못합니다
  lexicon: BDAG
  rationale: ἅπτω 중간태는 「붙잡다·해를 가하다」의 함의. 「손대다」가 한국어에서 그 적대적 접촉을 담는다.
