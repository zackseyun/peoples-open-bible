translation:
  language: es
  text: Por tanto, la ley se entumece[a], y la justicia nunca[b] sale. Porque el impío rodea[c] al justo[d]; por tanto, sale la justicia pervertida[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se vuelve ineficaz», «se debilita» o «se paraliza».
    reason: lexical_alternative
  - marker: b
    text: O «la justicia no sale para siempre»; la expresión hebrea es idiomática y significa que la justicia no llega a salir en absoluto.
    reason: lexical_alternative
  - marker: c
    text: O «encierra» o «cerca». El verbo también puede significar «corona» en otros contextos, pero aquí describe probablemente al impío que cerca al justo.
    reason: lexical_alternative
  - marker: d
    text: O «al recto» o «al inocente».
    reason: lexical_alternative
  - marker: e
    text: O «torcida» o «deformada».
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּפ֣וּג
  english_pob_choice: grows numb
  chosen_spanish: se entumece
  alternatives_spanish:
  - se debilita
  - se vuelve ineficaz
  - se paraliza
  lexicon: HALOT
  rationale: El verbo expresa debilidad o pérdida de eficacia. «Se entumece» conserva la imagen de algo que pierde sensibilidad o vigor y comunica bien la idea de una ley que deja de funcionar con fuerza.
- source_word: תּוֹרָה
  english_pob_choice: law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: En este contexto de crisis judicial, «la ley» es la forma más natural y precisa en español para el orden legal-moral operativo, sin reducirlo a una norma aislada ni desplazar el trasfondo pactual.
- source_word: לָנֶצַח
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - para siempre
  - perpetuamente
  - jamás
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir duración perpetua, la construcción negativa aquí tiene fuerza idiomática de ausencia total. «Nunca» transmite esa idea con claridad y naturalidad.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la decisión judicial
  lexicon: HALOT
  rationale: El contexto trata de corrupción social y judicial; por eso «justicia» capta mejor el sentido ético-jurídico que «juicio», más estrecho y menos natural aquí.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el culpable
  lexicon: HALOT
  rationale: La forma singular funciona de manera representativa. «El impío» preserva el contraste moral con «el justo» y es un término bíblico claro en español.
- source_word: מַכְתִּיר
  english_pob_choice: surrounds
  chosen_spanish: rodea
  alternatives_spanish:
  - encierra
  - cerca
  - cerca por completo
  lexicon: HALOT
  rationale: La POB inglesa entendió aquí el valor contextual de «rodear/ceñir» y no el de «coronar». «Rodea» es fiel, claro y mantiene la imagen de presión o cerco sobre el justo.
- source_word: הַצַּדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al inocente
  lexicon: HALOT
  rationale: «El justo» conserva el paralelismo moral con «el impío» y funciona de modo natural en el español bíblico sin perder la referencia a una persona representativa.
- source_word: מְעֻקָּל
  english_pob_choice: perverted
  chosen_spanish: pervertida
  alternatives_spanish:
  - torcida
  - deformada
  - corrupta
  lexicon: HALOT
  rationale: La idea es de algo doblado o desviado de la rectitud. «Pervertida» sigue de cerca la decisión auditada de la POB inglesa y encaja en el registro judicial del verso.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  - por consiguiente
  lexicon: HALOT
  rationale: La frase introduce consecuencia y aparece dos veces. «Por tanto» preserva la estructura retórica y su tono formal.
- source_word: יֵצֵא
  english_pob_choice: goes forth
  chosen_spanish: sale
  alternatives_spanish:
  - sale a la luz
  - se hace presente
  - se promulga
  lexicon: HALOT
  rationale: «Sale» reproduce de modo breve y transparente el movimiento del verbo y permite mantener la repetición paralela del original.
theological_decisions:
- issue: Sentido de תּוֹרָה en el lamento profético
  english_pob_reading: Rendered as 'law' referring to the operative legal-moral order in Judah, without narrowing it to a specific codified statute or broadening it to generic teaching.
  chosen_spanish_reading: «la ley» como orden jurídico-moral vigente en Judá, sin reducirla a una simple norma puntual ni expandirla a un sentido genérico de instrucción.
  alternative_spanish_readings:
  - «la instrucción»
  - «la Torá del pacto»
  rationale: El contexto inmediato habla de justicia pública y corrupción. «La ley» es la opción más clara y ajustada al marco judicial, mientras deja espacio al trasfondo pactual sin imponerlo.
  doctrine_reference: Ética y justicia del pacto en el profetismo de Israel; cf. el uso de תּוֹרָה en contextos judiciales.
- issue: Sentido de מַכְתִּיר en relación con el justo
  english_pob_reading: The wicked surrounds/hem s in the righteous, not 'crowns' him.
  chosen_spanish_reading: El impío rodea al justo, entendiendo un cerco opresivo y no una acción de coronar.
  alternative_spanish_readings:
  - lo corona
  - lo cerca
  - lo encierra
  rationale: La POB auditada descarta el valor de «coronar» en este contexto. En español, «rodea» conserva la imagen de presión y exclusión, evitando una lectura incongruente.
  doctrine_reference: La denuncia profética de la inversión del orden moral y judicial.
translation_notes:
  revision_awareness: Se integró la revisión auditada de la POB inglesa que prefirió 'perverted' para מְעֻקָּל en vez de 'twisted'. También se respetó la decisión de leer מַכְתִּיר como 'surrounds' en este contexto, no como 'crowns'.
  spanish_consistency_notes:
  - Se mantuvo «la justicia» para מִשְׁפָּט en ambas apariciones, siguiendo el contraste semántico del verso.
  - Se preservó la repetición de «por tanto» y de «sale» para reflejar la estructura retórica del hebreo.
  - Se evitó el uso de «SEÑOR» para el nombre divino porque este versículo no contiene el Tetragrámaton.
  - 'Se eligió un registro bíblico moderno y sobrio: «el impío», «el justo», «la ley», «la justicia».'
