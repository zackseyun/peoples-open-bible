translation:
  language: es
  text: Entonces Josué edificó un altar a Yahvé[a], el Dios de Israel, en el monte Ebal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Se conserva el nombre divino como «Yahvé», de acuerdo con la práctica estándar del proyecto en español.'
    reason: source_note
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: El adverbio temporal introduce el siguiente hecho en la secuencia narrativa. «Entonces» conserva la progresión del relato con naturalidad en español.
- source_word: יִבְנֶה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfectiva, en narración secuencial funciona con valor de pasado. «Edificó» es natural en español y mantiene el sentido de levantar una estructura cultual.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  lexicon: N/A
  rationale: Nombre propio bíblico estándar en español.
- source_word: מִזְבֵּחַ
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - altar
  lexicon: HALOT
  rationale: Designa un altar sacrificial. El artículo indefinido refleja bien la primera mención y la sintaxis natural del español.
- source_word: לַיהוָה
  english_pob_choice: to the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: HALOT
  rationale: 'La preposición ל expresa dedicación o dirección. Se conserva el nombre divino con la forma de la serie POB en español: «Yahvé».'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa identifica a Yahvé como el Dios perteneciente a Israel. «El Dios de Israel» es la forma transparente y estable en español.
- source_word: בְּהַר עֵיבָל
  english_pob_choice: on Mount Ebal
  chosen_spanish: en el monte Ebal
  alternatives_spanish:
  - sobre el monte Ebal
  - en el monte de Ebal
  lexicon: HALOT
  rationale: La locución indica ubicación en la montaña llamada Ebal. «En el monte Ebal» suena natural en español y preserva la referencia geográfica.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh (with English note that project standard elsewhere may render it differently)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. Conforme al criterio del proyecto en español, se traslada como «Yahvé» para preservar el nombre del pacto y evitar el ocultamiento mediante una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El versículo presenta alta coincidencia con el audit trail inglés: secuencia narrativa simple, pasado eventivo para יִבְנֶה, y el nombre divino traducido conforme a la política del proyecto en español. No se requiere expansión interpretativa ni nota textual adicional.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política española del proyecto.
  - «Monte Ebal» preserva la toponimia bíblica usual en español.
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones no respaldadas por el hebreo de este versículo.
