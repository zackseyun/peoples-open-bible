translation:
  language: es
  text: Pero si no escuches[a] la voz de Yahvé tu Dios, para guardar y hacer todos sus mandamientos y sus estatutos que yo te mando hoy[b], entonces vendrán sobre ti todas estas maldiciones y te alcanzarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «escuchar la voz de». El modismo incluye el sentido de oír con obediencia; alternativamente, «obedecer».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para guardar y hacer todos sus mandamientos y sus estatutos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: But ... then
  chosen_spanish: Pero ... entonces
  alternatives_spanish:
  - Y sucederá ... entonces
  - Y acontecerá ... entonces
  lexicon: HALOT
  rationale: La cláusula introduce una condición contrastiva frente al contexto anterior. «Pero ... entonces» transmite el giro adversativo y condicional de forma natural en español sin perder la lógica del hebreo.
- source_word: תִשְׁמַע בְּקוֹל
  english_pob_choice: listen to the voice of
  chosen_spanish: escuchas la voz de
  alternatives_spanish:
  - oyes la voz de
  - obedeces
  lexicon: HALOT
  rationale: El hebreo usa un modismo de oír/escuchar con fuerza obediencial. «Escuchar la voz de» conserva esa imagen auditiva y el matiz de obediencia sin reducirlo solo a «obedecer».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del Tetragrámaton en la forma de proyecto «Yahvé», conforme a la terminología del POB en español.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Es la expresión pactual normal con sufijo de segunda persona singular. «Tu Dios» es directo, fiel y natural en español.
- source_word: לִשְׁמֹר לַעֲשׂוֹת
  english_pob_choice: to keep and to do
  chosen_spanish: para guardar y hacer
  alternatives_spanish:
  - para observar y hacer
  - para guardar y cumplir
  lexicon: HALOT
  rationale: Los infinitivos coordinados expresan vigilancia fiel seguida de acción. «Guardar y hacer» reproduce la pareja verbal sin añadir adverbios ni resolver la tensión en una sola paráfrasis.
- source_word: כָּל מִצְוֺתָיו
  english_pob_choice: all his commandments
  chosen_spanish: todos sus mandamientos
  alternatives_spanish:
  - todos sus preceptos
  - todos sus mandatos
  lexicon: HALOT
  rationale: «Mandamientos» preserva el registro legal/pactual de מִצְוָה en Deuteronomio y coincide con el uso técnico del POB.
- source_word: וְחֻקֹּתָיו
  english_pob_choice: and his statutes
  chosen_spanish: y sus estatutos
  alternatives_spanish:
  - y sus decretos
  lexicon: HALOT
  rationale: «Estatutos» conserva la distinción tradicional frente a «mandamientos» para חֻקִּים en contexto legal.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo te mando hoy
  alternatives_spanish:
  - que hoy te estoy mandando
  - que yo te ordeno hoy
  lexicon: HALOT
  rationale: El participio expresa una acción en curso en el discurso, pero en español «te mando hoy» suena más natural y fiel que una perífrasis excesiva. Se mantiene el valor presente de la instrucción.
- source_word: וּבָאוּ עָלֶיךָ
  english_pob_choice: will come upon you
  chosen_spanish: vendrán sobre ti
  alternatives_spanish:
  - caerán sobre ti
  - vendrán contra ti
  lexicon: HALOT
  rationale: La imagen idiomática de ir/vivir sobre alguien se comunica bien con «vendrán sobre ti», que preserva el efecto de inminencia y carga ominosa.
- source_word: כָּל הַקְּלָלוֹת הָאֵלֶּה
  english_pob_choice: all these curses
  chosen_spanish: todas estas maldiciones
  alternatives_spanish:
  - todas estas maldiciones del pacto
  - todas estas maldiciones
  lexicon: HALOT
  rationale: «Maldiciones» corresponde al sentido básico de קְלָלוֹת y mantiene el marco de bendiciones y maldiciones del pacto.
- source_word: וְהִשִּׂיגוּךָ
  english_pob_choice: and overtake you
  chosen_spanish: y te alcanzarán
  alternatives_spanish:
  - y te alcanzarán y te asirán
  - y te perseguirán hasta alcanzarte
  lexicon: HALOT
  rationale: «Alcanzarán» conserva la imagen de persecución y captura sin introducir elementos ajenos. En español, comunica bien la inevitabilidad del juicio.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa יְהוָה de manera directa. La política del proyecto en español favorece «Yahvé», que preserva el nombre personal del pacto sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Implicación obediencial del modismo escuchar la voz
  english_pob_reading: listen to the voice of the LORD your God
  chosen_spanish_reading: escuchas la voz de Yahvé tu Dios
  alternative_spanish_readings:
  - obedeces a Yahvé tu Dios
  - oyes la voz de Yahvé tu Dios
  rationale: Se conserva el lenguaje auditivo del hebreo, porque el pasaje no solo ordena obediencia abstracta sino una respuesta de escucha al pacto. «Escuchas la voz» mantiene esa tensión semántica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del POB al evitar «by carefully doing» y reflejar en español la construcción infinitiva hebrea con «para guardar y hacer». No se añadieron notas porque ninguna ambigüedad requería anclaje textual adicional en esta breve sección.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto en español.
  - Se conserva la pareja legal «mandamientos / estatutos» para distinguir מִצְוֹת y חֻקִּים.
  - «Escuchar la voz de» preserva el modismo obediencial sin colapsarlo en una paráfrasis doctrinal.
  - El texto evita arcaísmos innecesarios y sigue un registro bíblico claro y publicable.
