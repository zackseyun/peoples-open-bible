id: LUK.11.39
reference: Luke 11:39
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὁ κύριος πρὸς αὐτόν· Νῦν ὑμεῖς οἱ Φαρισαῖοι τὸ ἔξωθεν τοῦ ποτηρίου καὶ τοῦ πίνακος καθαρίζετε, τὸ δὲ ἔσωθεν ὑμῶν γέμει ἁρπαγῆς καὶ πονηρίας.
translation:
  text: But the Lord said to him[a], “Now you Pharisees clean the outside of the cup and the dish, but your inside is full of greed and wickedness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'robbery,' 'plunder,' or 'extortion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Rendered as the title 'Lord' per the project's default for κύριος; this is the standard NT title here, not a mere polite address.
- source_word: Νῦν
  chosen: Now
  alternatives:
  - as it is
  - but now
  lexicon: BDAG
  rationale: Kept as a discourse marker introducing Jesus' pointed rebuke; 'Now' is natural English and preserves the rhetorical force.
- source_word: ὑμεῖς οἱ Φαρισαῖοι
  chosen: you Pharisees
  alternatives:
  - you, the Pharisees
  lexicon: BDAG
  rationale: The pronoun plus noun is emphatic; English captures this naturally as 'you Pharisees' without overloading the sentence.
- source_word: τὸ ἔξωθεν
  chosen: the outside
  alternatives:
  - the exterior
  - the outside part
  lexicon: BDAG
  rationale: Substantivized adverb meaning the outer surface/exterior; 'the outside' is idiomatic and sufficiently concrete.
- source_word: ποτηρίου
  chosen: cup
  alternatives:
  - drinking cup
  lexicon: BDAG
  rationale: Standard rendering for ποτήριον; no contextual reason to expand.
- source_word: πίνακος
  chosen: dish
  alternatives:
  - platter
  - plate
  lexicon: BDAG
  rationale: πίναξ denotes a dish/platter used for food. 'Dish' is accessible modern English; 'platter' is possible but sounds more specific than required.
- source_word: καθαρίζετε
  chosen: clean
  alternatives:
  - cleanse
  - make clean
  lexicon: BDAG
  rationale: Present tense describing habitual action. 'Clean' is natural modern English and fits the concrete image while preserving the moral contrast.
- source_word: τὸ δὲ ἔσωθεν ὑμῶν
  chosen: your inside
  alternatives:
  - the inside of you
  - your inward part
  - your interior
  lexicon: BDAG
  rationale: The phrase shifts from the vessel image to the Pharisees themselves. 'Your inside' preserves the metaphor and the directness of the rebuke better than a more interpretive rendering like 'your hearts.'
- source_word: γέμει
  lemma: γέμω
  chosen: is full of
  alternatives:
  - is filled with
  lexicon: BDAG
  rationale: Idiomatic English equivalent for the verb γέμω with genitive complements.
- source_word: ἁρπαγῆς
  chosen: greed
  alternatives:
  - robbery
  - plunder
  - extortion
  lexicon: BDAG
  rationale: The noun can denote seizure, robbery, or rapacity. In this moral indictment, 'greed' best conveys rapacious acquisitiveness in readable English, while preserving the ethical force. A footnote preserves the more concrete alternatives.
- source_word: πονηρίας
  chosen: wickedness
  alternatives:
  - evil
  - malice
  lexicon: BDAG
  rationale: Broad moral term for badness or wickedness. 'Wickedness' matches the seriousness of the rebuke and pairs well with 'greed'.
