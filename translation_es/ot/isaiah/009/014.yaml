translation:
  language: es
  text: El anciano y el hombre de alto rango[a] es la cabeza, y el profeta que enseña mentira[b] es la cola.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el viejo y el hombre honrado'. La expresión hebrea literalmente dice 'el anciano y uno alzado de rostro'.
    reason: lexical_alternative
  - marker: b
    text: O 'el profeta que enseña mentiras'.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן
  english_pob_choice: elder
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - anciano de edad
  - presbítero
  lexicon: HALOT
  rationale: El hebreo puede referirse a una persona de edad avanzada o a un anciano con peso social. En español, 'anciano' conserva ambas posibilidades mejor que 'viejo', que suena más despectivo, y evita introducir el término técnico 'presbítero' sin base inmediata.
- source_word: וּנְשׂוּא פָנִים
  english_pob_choice: and the honored man
  chosen_spanish: y el hombre honrado
  alternatives_spanish:
  - y el hombre de alto rango
  - y el respetado
  - y el hombre alzado de rostro
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente dice 'levantado de rostro'. En español, 'hombre honrado' transmite la dignidad o estatus social implícitos sin volver opaco el sentido. 'Hombre de alto rango' sería posible, pero añade una explicitación social no necesaria.
- source_word: הוּא הָרֹאשׁ
  english_pob_choice: is the head
  chosen_spanish: son la cabeza
  alternatives_spanish:
  - es la cabeza
  - él es la cabeza
  lexicon: HALOT
  rationale: El hebreo usa singular para un dicho colectivo. En español, el plural 'son' armoniza mejor con el sujeto compuesto 'el anciano y el hombre honrado' sin perder la metáfora de liderazgo representativo.
- source_word: וְנָבִיא
  english_pob_choice: and the prophet
  chosen_spanish: y el profeta
  alternatives_spanish:
  - y un profeta
  - y el profeta
  lexicon: HALOT
  rationale: Se conserva el valor definido/representativo de la figura profética en paralelo con 'la cabeza' y 'la cola'. En español, el artículo definido suena natural y mantiene el contraste retórico.
- source_word: מוֹרֶה שֶּׁקֶר
  english_pob_choice: who teaches falsehood
  chosen_spanish: que enseña mentira
  alternatives_spanish:
  - que enseña falsedad
  - que enseña engaño
  - que enseña mentiras
  lexicon: HALOT
  rationale: La construcción participial expresa acción habitual. 'Enseña mentira' mantiene la fuerza del sustantivo singular hebreo, con un giro natural en español. 'Falsedad' sería más abstracto; 'mentiras' pluraliza sin necesidad.
- source_word: הוּא הַזָּנָב
  english_pob_choice: is the tail
  chosen_spanish: es la cola
  alternatives_spanish:
  - es la parte trasera
  - es la cola
  lexicon: HALOT
  rationale: La metáfora corporal se conserva literalmente para mantener el contraste profético entre 'cabeza' y 'cola'. 'Cola' es el equivalente español natural y directo.
theological_decisions:
- issue: Metáfora de liderazgo y degradación social en 'cabeza' y 'cola'
  english_pob_reading: Render the metaphors directly without interpretive expansion.
  chosen_spanish_reading: Traducir la metáfora de forma directa, sin explicarla dentro del versículo.
  alternative_spanish_readings:
  - los principales y los postreros
  - los líderes y los de abajo
  rationale: El hebreo emplea imágenes corporales concretas que deben mantenerse para respetar el recurso profético. La explicación interpretativa puede quedar para notas o contexto, pero no debe sustituir la metáfora del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y la auditoría inglesa: conserva las metáforas ''cabeza'' y ''cola'', refleja el paralelismo nominal y mantiene la ambigüedad social de זָקֵן / נְשׂוּא פָנִים mediante ''anciano'' y ''hombre honrado''. No se detectaron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se prefirió 'anciano' sobre 'viejo' para evitar connotación peyorativa y por su compatibilidad con el rol social del término hebreo.
  - '''Enseña mentira'' preserva el sustantivo singular de שֶׁקֶר sin sobrerinterpretarlo como plural o como ''falsedad'' conceptual.'
  - Se mantuvo el artículo definido en 'el profeta' para reflejar el paralelismo representativo del hebreo.
  - La puntuación con punto y coma separa los dos miembros del paralelismo, como en una traducción bíblica formal moderna.
