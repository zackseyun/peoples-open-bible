review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo: los dos reyes comparten mala intención, se sientan a la misma mesa, hablan engaño, su plan no prospera y el fin queda para un tiempo fijado. Sin embargo, hay varios desajustes: la nota [a] está anclada al segmento equivocado y altera el referente de la alternativa; ''a una sola mesa'' suena menos natural que ''a la misma mesa''; ''hablarán mentira'' es poco idiomático en español bíblico actual; y ''aún el fin es para el tiempo señalado'' resulta demasiado calcado y poco claro.'
  spanish_quality_summary: 'La redacción es comprensible, pero presenta giros poco naturales o ambiguos para un español neutral y digno: ''su corazón'' pierde el plural semántico natural en español; ''hablarán mentira'' suena forzado; y la cláusula final necesita una formulación más idiomática sin perder la tensión temporal. Conviene reparar también las notas para que describan correctamente las alternativas preservadas por el POB inglés.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Tiempo señalado' encaja bien para מוֹעֵד. La decisión sobre la soberanía divina implícita está bien conservada sin explicitar a Dios. El principal problema es de fidelidad auditiva/lexical en las notas y de naturalidad idiomática en español.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre 'ambos' pero su contenido corresponde a כָּזָב יְדַבֵּרוּ.
    rationale: El POB inglés usa la nota a para alternativas de 'they will speak lies', no para 'both of them'. Tal como está, la nota española desinforma sobre el lugar textual al que pertenece la variante.
  - severity: medium
    issue: '''Hablarán mentira'' es poco idiomático en español.'
    rationale: Aunque intenta seguir de cerca el hebreo, en español moderno y eclesial suena torpe. 'Dirán mentiras' o 'hablarán mentiras' preserva el sentido de engaño de forma más natural.
  - severity: medium
    issue: '''Aún el fin es para el tiempo señalado'' es demasiado calcado y opaco.'
    rationale: La cláusula hebrea expresa que el fin todavía corresponde al tiempo fijado. En español claro conviene algo como 'porque el fin todavía es para el tiempo señalado' o 'porque el fin aún está reservado para el tiempo señalado' sin sobreinterpretar.
  - severity: low
    issue: '''A una sola mesa'' es menos natural que ''a la misma mesa'' o ''a una mesa''.'
    rationale: El hebreo literalmente dice 'a/ sobre una mesa'. En contexto diplomático, 'a la misma mesa' comunica mejor la imagen compartida sin sonar rígido.
  - severity: low
    issue: '''Su corazón'' puede sonar discordante con ''ambos... los reyes''.'
    rationale: Aunque el hebreo usa un singular colectivo con sufijo plural, en español 'sus corazones' expresa mejor la referencia dual/plural y evita extrañeza innecesaria.
