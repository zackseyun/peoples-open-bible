  text: שְׁאָגָ֥ה ל֖/וֹ כַּ/לָּבִ֑יא ו/שאג כַּ/כְּפִירִ֤ים וְ/יִנְהֹם֙ וְ/יֹאחֵ֣ז טֶ֔רֶף וְ/יַפְלִ֖יט וְ/אֵ֥ין מַצִּֽיל׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/005/029.yaml
  text: Its roaring is like a lion[a], and it roars like young lions; it growls and seizes prey, and carries it off[b], with none to rescue.
  footnotes:
  - marker: a
    text: Or 'like a lioness' for 'like a lion'; the Hebrew term can be understood more specifically in some contexts, though 'lion' fits the parallelism here.
    reason: lexical_alternative
  - marker: b
    text: Or 'drags it away' / 'escapes with it' for 'carries it off'; the Hebrew verb suggests taking the prey away beyond recovery.
    reason: lexical_alternative
