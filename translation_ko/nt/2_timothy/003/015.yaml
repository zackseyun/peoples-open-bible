id: 2TI.3.15
reference: 2 Timothy 3:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὅτι ἀπὸ βρέφους ⸀ἱερὰ γράμματα οἶδας, τὰ δυνάμενά σε σοφίσαι εἰς σωτηρίαν διὰ πίστεως τῆς ἐν Χριστῷ Ἰησοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/015.yaml
  text: and that from infancy you have known the sacred writings, which are able to make you wise for salvation through faith in Messiah Jesus.
translation:
  language: ko
  text: 또 어릴 적부터 거룩한 글들[a]을 알고 있습니다. 그 글들은 메시아 예수께 대한 믿음을 통하여 그대를 구원에 이르게 하는 지혜를 줄 수 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「거룩한 성경」. 헬라어는 직역하면 「거룩한 글들」로, 구약 성경을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ βρέφους
  english_pob_choice: from infancy
  chosen_korean: 어릴 적부터
  alternatives_korean:
  - 갓난아이 때부터
  - 어려서부터
  lexicon: BDAG
  rationale: βρέφος는 「갓난아이·유아」. 「어릴 적부터」가 자연스럽고 디모데가 외할머니·어머니에게서 배운 1:5의 신앙 양육과 자연스럽게 이어진다.
- source_word: ἱερὰ γράμματα
  english_pob_choice: the sacred writings
  chosen_korean: 거룩한 글들
  alternatives_korean:
  - 거룩한 성경
  - 거룩한 문서들
  lexicon: BDAG
  rationale: ἱερὰ γράμματα는 구약 성경의 통상적 헬라어 지칭. 「거룩한 글들」이 직역에 가깝고, 다음 절(3:16)의 πᾶσα γραφή(모든 성경)와 어휘적 차이를 분명히 드러낸다.
- source_word: σοφίσαι εἰς σωτηρίαν
  english_pob_choice: make you wise for salvation
  chosen_korean: 구원에 이르게 하는 지혜를 줄
  alternatives_korean:
  - 구원에 이를 만큼 지혜롭게 할
  - 구원을 위해 지혜를 줄
  lexicon: BDAG
  rationale: σοφίζω + εἰς의 「~을 위해 지혜를 줌」을 자연스러운 한국어로 옮긴다. 「구원에 이르게 하는 지혜」가 본문의 신학적 무게를 담는다.
- source_word: διὰ πίστεως τῆς ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: through faith in Messiah Jesus
  chosen_korean: 메시아 예수께 대한 믿음을 통하여
  alternatives_korean:
  - 메시아 예수 안에 있는 믿음을 통하여
  - 메시아 예수를 향한 믿음으로
  lexicon: BDAG
  rationale: 본 절의 ἐν Χριστῷ Ἰησοῦ는 믿음의 대상을 가리키는 것이 가장 자연스러우므로 「~께 대한」으로 옮긴다. 1:13의 「~ 안에 있는 믿음과 사랑」과는 의미상 다르므로 구별한다.
