  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue la revisión del POB inglés al traducir el modismo מִיָּמִים יָמִימָה como «de año en año», conservando además la nota sobre el literal «de días a días». También reproduce adecuadamente «en su tiempo señalado» para לְמוֹעֲדָהּ. Sin embargo, falla en un punto importante de fidelidad formal y legibilidad: «esta estatuto» es gramaticalmente incorrecto en español; debe ser «este estatuto» o una alternativa equivalente.'
