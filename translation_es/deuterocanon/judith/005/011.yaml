translation:
  language: es
  text: Y el rey de Egipto se levantó contra ellos, y los trató con astucia[a] en trabajo forzado y en la fabricación de ladrillos; los humilló y los convirtió en esclavos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los trató con sagacidad» / «los engañó con astucia». El verbo griego destaca un proceder calculado o astuto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπανέστη
  english_pob_choice: rose up against
  chosen_spanish: se levantó contra
  alternatives_spanish:
  - se alzó contra
  - se levantó en oposición a
  - se rebeló contra
  lexicon: LSJ
  rationale: El verbo compuesto expresa oposición hostil, no solo aparición o sucesión. «Se levantó contra» conserva el sentido adversativo de manera natural en español.
- source_word: κατεσοφίσαντο
  english_pob_choice: they dealt shrewdly with
  chosen_spanish: los trató con astucia
  alternatives_spanish:
  - los engañó con astucia
  - los venció con engaño
  - los trató con sagacidad
  lexicon: LSJ
  rationale: El griego sugiere acción calculada y astuta contra ellos. «Los trató con astucia» mantiene ese valor sin convertirlo en una paráfrasis demasiado explicativa.
- source_word: ἐν πόνῳ καὶ πλίνθῳ
  english_pob_choice: in toil and brickmaking
  chosen_spanish: en el trabajo y en la fabricación de ladrillos
  alternatives_spanish:
  - en el trabajo duro y en la ladrillería
  - con trabajo y ladrillos
  - en fatiga y en obra de ladrillos
  lexicon: LSJ
  rationale: πόνος apunta a labor dura, y πλίνθος a ladrillo o trabajo de ladrillo. «Fabricación de ladrillos» hace explícita la actividad exigida sin perder el anclaje léxico ni el trasfondo del Éxodo.
- source_word: ἐταπείνωσαν
  english_pob_choice: they humbled
  chosen_spanish: los humilló
  alternatives_spanish:
  - los abatió
  - los rebajó
  - los puso en humillación
  lexicon: LSJ
  rationale: El verbo significa literalmente humillar o rebajar. «Los humilló» conserva el sentido básico y deja que la cláusula siguiente concrete la esclavización.
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados forzados
  - siervos sometidos
  lexicon: BDAG
  rationale: En este contexto de opresión nacional y trabajo forzado, la condición servil es central. «Esclavos» refleja mejor la fuerza del término δοῦλος que un eufemismo como «siervos».
theological_decisions:
- issue: Terminología de δοῦλος en el contexto de la opresión egipcia
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - bondados
  rationale: La escena describe sometimiento coercitivo y trabajo forzado; no se trata de servicio voluntario. Por eso se mantiene el valor fuerte de la esclavitud, en línea con la preferencia doctrinal del proyecto cuando el rasgo de dependencia es saliente.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος *doulos* | servant / slave (context-dependent)'
- issue: Tratamiento del matiz de astucia en κατεσοφίσαντο
  english_pob_reading: dealt shrewdly with / dealt cunningly with
  chosen_spanish_reading: los trató con astucia
  alternative_spanish_readings:
  - los engañó con astucia
  - los trató con sagacidad
  - actuó con engaño contra ellos
  rationale: El texto no dice solo que los oprimió, sino que lo hizo mediante una política astuta y calculada. «Con astucia» conserva esa tensión sin resolverla prematuramente en una sola explicación interpretativa.
  doctrine_reference: LSJ; audit trail for lexical nuance
translation_notes:
  revision_awareness: La base inglesa recibió una revisión menor para ajustar la preposición en la frase de trabajo y ladrillos; la lectura final sigue siendo «in toil and brickmaking». La versión española refleja ese valor locativo con «en el trabajo y en la fabricación de ladrillos», sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «esclavos» para δούλους por el contexto de opresión estatal y trabajo forzado.
  - «Se levantó contra» conserva el matiz hostil de ἐπανέστη sin caer en un calco rígido.
  - La construcción «los trató con astucia» permite que la nota aclare la alternativa semántica sin sobrecargar el cuerpo del texto.
