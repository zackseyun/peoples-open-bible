  rationale: Se ajusta el verbo para evitar la redundancia poco idiomática de «cantar el canto», se refuerza el matiz retórico con «podríamos», y se mejora la fluidez de la expresión locativa con «tierra extranjera», preservando en nota la literalidad «sobre suelo extranjero».
