translation:
  language: es
  text: Los árboles de Yahvé están saciados[a], los cedros del Líbano que él plantó,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están satisfechos» o «tienen de sobra». El verbo hebreo comunica estar plenamente provisto o saciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂבְּעוּ
  english_pob_choice: are satisfied
  chosen_spanish: están saciados
  alternatives_spanish:
  - están satisfechos
  - están llenos
  - tienen su plenitud
  lexicon: HALOT; uso del campo semántico de שבע
  rationale: El verbo hebreo expresa estar plenamente provisto o saciado. En español, «están saciados» comunica esa abundancia con fuerza natural y sin reducirlo a una mera satisfacción emocional.
- source_word: עֲצֵי
  english_pob_choice: trees of
  chosen_spanish: los árboles de
  alternatives_spanish:
  - árboles de
  - la arboleda de
  lexicon: HALOT
  rationale: Es un sustantivo en constructo plural. «Los árboles de» conserva la relación posesiva o genitiva del hebreo de forma clara y pública en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT; convención POB para el Nombre divino
  rationale: Se preserva el Nombre divino en transliteración, conforme al estándar del proyecto, en lugar de sustituirlo por un título.
- source_word: אַרְזֵי
  english_pob_choice: the cedars of
  chosen_spanish: los cedros del
  alternatives_spanish:
  - cedros del
  - los cedros de
  lexicon: HALOT
  rationale: El hebreo especifica cedros, no árboles en general. En español, «los cedros del Líbano» mantiene la apposición descriptiva del segundo colon.
- source_word: לְבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: Líbano
  alternatives_spanish:
  - el Líbano
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español. El artículo se integra de manera natural con la construcción precedente.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La relativa hebrea introduce la cláusula que modifica a los cedros; «que» es la opción más natural y fiel en español.
- source_word: נָטָע
  english_pob_choice: he planted
  chosen_spanish: él plantó
  alternatives_spanish:
  - plantó
  - ha plantado
  lexicon: HALOT
  rationale: El perfecto qal se traduce en pasado simple para la poesía descriptiva. Se explicita el sujeto («él») porque en español ayuda a la claridad y el hebreo lo deja sobreentendido.
theological_decisions:
- issue: Renderización del Nombre divino יהוה en poesía creativa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo usa directamente el Tetragrámaton. La traducción mantiene el Nombre propio como forma auditable y coherente con la política del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La base inglesa pasó de «are filled» a «are satisfied» para reflejar mejor שבע; la versión española adopta esa misma decisión semántica con «están saciados», evitando un calco menos natural. Se conserva la estructura poética del paralelismo y la relación de apposición del segundo hemistiquio.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma fija para יהוה.
  - Se mantiene el paralelismo poético con dos hemistiquios breves.
  - «Saciados» refleja abundancia/provisión, no emoción subjetiva.
  - El sujeto implícito de «plantó» se hace explícito por claridad en español.
