translation:
  language: es
  text: 'Y aconteció que, al cabo de muchos días, Yahvé me dijo: «Levántate, ve a Perat[a], y toma de allí el cinto[b] que te mandé esconder allí[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Perat puede referirse al Éufrates; el nombre hebreo se translitera aquí en vez de resolverlo en el texto principal.
    reason: alternative_reading
  - marker: b
    text: 'O: «lombillo», «faja» o «banda»; el hebreo designa una prenda ceñida a la cintura.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «enterrarlo allí»; el verbo hebreo puede significar esconder u ocultar, a veces por medio de enterrarlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo episodio. «Aconteció» conserva bien el valor discursivo de apertura narrativa y suena natural en español bíblico contemporáneo.
- source_word: מִקֵּץ יָמִים רַבִּים
  english_pob_choice: after many days
  chosen_spanish: al cabo de muchos días
  alternatives_spanish:
  - después de muchos días
  - tras mucho tiempo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «desde el fin de muchos días», pero el sentido temporal idiomático en español se comunica con «al cabo de muchos días» sin perder la referencia a un lapso prolongado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino con la forma española de uso común en este proyecto, en lugar de sustituirlo por un título. «Yahvé» mantiene la transparencia del Tetragrámaton.
- source_word: קוּם לֵךְ
  english_pob_choice: Arise, go
  chosen_spanish: Levántate, ve
  alternatives_spanish:
  - Ponte en pie, ve
  - Levántate y ve
  lexicon: HALOT
  rationale: Los dos imperativos expresan urgencia y movimiento. «Levántate, ve» reproduce la secuencia verbal con un español claro y sobrio.
- source_word: פְּרָתָה
  english_pob_choice: Perath
  chosen_spanish: Perat
  alternatives_spanish:
  - Perath
  - el Éufrates
  lexicon: HALOT
  rationale: Se conserva la transliteración del topónimo en el texto principal, siguiendo el tratamiento de nombre propio. La posible identificación con el Éufrates queda abierta y no se resuelve en el cuerpo del verso.
- source_word: וְקַח מִשָּׁם
  english_pob_choice: and take from there
  chosen_spanish: y toma de allí
  alternatives_spanish:
  - y trae de allí
  - y recoge de allí
  lexicon: HALOT
  rationale: «Tomar de allí» es una equivalencia directa y natural para el mandato de ir a un lugar y sacar un objeto.
- source_word: הָאֵזוֹר
  english_pob_choice: the waistband
  chosen_spanish: el cinto
  alternatives_spanish:
  - la faja
  - el cinturón
  - el cinturón o cinto
  lexicon: HALOT
  rationale: אֵזוֹר designa una prenda o banda para la cintura. «Cinto» es un término bíblico y neutral en español que evita precisar indebidamente si se trata de cinturón, faja o banda.
- source_word: אֲשֶׁר צִוִּיתִיךָ
  english_pob_choice: that I commanded you
  chosen_spanish: que te mandé
  alternatives_spanish:
  - que te mandé hacer
  - que te ordené
  lexicon: HALOT
  rationale: El verbo hebreo expresa mandato autoritativo. «Mandé» comunica bien la fuerza de la instrucción divina en español sin sonar arcaizante.
- source_word: לְטָמְנוֹ
  english_pob_choice: to hide there
  chosen_spanish: esconder
  alternatives_spanish:
  - ocultar
  - enterrar
  lexicon: HALOT
  rationale: טמן puede significar esconder u ocultar, y a veces enterrar. «Esconder» preserva el sentido amplio del verbo sin imponer la lectura más específica de «enterrar» en el texto principal.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: «Allí» es la correspondencia más natural y estable para indicar el lugar ya mencionado.
theological_decisions:
- issue: Cómo verter el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, no un título. Se conserva el nombre divino en la forma española establecida por el proyecto para mantener la transparencia del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente sin cambios sustanciales: el contexto auditado inglés mantiene la lectura óptima-equivalente, la transliteración del topónimo y la alternativa léxica para el objeto de la cintura. No se introdujeron nuevas tensiones textuales ni se resolvió la ambigüedad del lugar más allá de lo documentado.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé como forma estándar para יְהוָה.
  - Se conservó la transliteración del topónimo en el cuerpo principal, con alternativa en nota.
  - Se evitó «SEÑOR» para no ocultar el nombre divino del hebreo.
  - «Cinto» se usa como término amplio y bíblicamente adecuado para אֵזוֹר.
  - La puntuación con comillas españolas y la colocación de notas siguen el formato de publicación del proyecto.
