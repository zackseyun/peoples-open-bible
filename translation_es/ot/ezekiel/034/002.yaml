base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/034/002.yaml
  text: 'Son of man[a], prophesy against the shepherds of Israel; prophesy and say to them, to the shepherds[b], ‘Thus says the Lord GOD: Woe to the shepherds of Israel who have been shepherding themselves! Should not the shepherds shepherd the flock?’'
  footnotes:
  - marker: a
    text: Or, 'who feed themselves.' The Hebrew verb is the same shepherding verb used throughout the verse; the sense is that Israel’s leaders were caring for themselves instead of the flock.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sheep'; rendered 'the flock' here for the collective sense.
    reason: lexical_alternative
