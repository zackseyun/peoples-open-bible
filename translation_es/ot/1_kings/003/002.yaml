translation:
  language: es
  text: Solo el pueblo sacrificaba en los lugares altos, porque todavía no se había construido una casa[a] para el nombre de Yahvé en aquellos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templo»; hebreo «casa». La expresión «para el nombre de Yahvé» se refiere al templo que había de construirse en Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: Rַק introduce una restricción o excepción frente al contexto previo. «Solo» comunica esa limitación de manera natural en español sin añadir matiz explicativo que el hebreo no exige.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo en general
  lexicon: HALOT
  rationale: עָם designa al conjunto del pueblo. «El pueblo» conserva el referente colectivo con dignidad bíblica y funciona bien en español de registro culto.
- source_word: מְזַבְּחִים
  english_pob_choice: were sacrificing
  chosen_spanish: sacrificaba
  alternatives_spanish:
  - estaba sacrificando
  - ofrecía sacrificios
  lexicon: HALOT
  rationale: El participio expresa acción habitual o continuada. En español, el imperfecto «sacrificaba» transmite esa continuidad sin sonar forzado; mantiene la fuerza verbal del original.
- source_word: בַּבָּמוֹת
  english_pob_choice: at the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - en los altos lugares
  - en los santuarios altos
  lexicon: HALOT
  rationale: בָּמוֹת alude a sitios cultuales elevados. «Lugares altos» conserva la expresión bíblica tradicional y el referente cultual; «en» es la preposición más natural en español para actividad localizada.
- source_word: לֹא נִבְנָה בַיִת
  english_pob_choice: no house had yet been built
  chosen_spanish: todavía no se había construido una casa
  alternatives_spanish:
  - la casa todavía no se había construido
  - todavía no se había edificado una casa
  lexicon: HALOT
  rationale: Se mantiene בַיִת como «casa» para respetar el lexema hebreo, sin sustituirlo de entrada por «templo». La pasiva refleja española reproduce bien el valor de la construcción verbal y «todavía» expresa el sentido temporal del contexto.
- source_word: לְשֵׁם יְהוָה
  english_pob_choice: for the name of Yahweh
  chosen_spanish: para el nombre de Yahvé
  alternatives_spanish:
  - para el nombre de Yahweh
  - para el nombre del Señor
  lexicon: HALOT
  rationale: La expresión conserva el valor teológico de «nombre de Yahvé» sin reducirla a una simple referencia a Dios. Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: עַד הַיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - hasta aquellos días
  - en esos días
  lexicon: HALOT
  rationale: El hebreo expresa una referencia temporal idiomática. «En aquellos días» refleja naturalmente la construcción y coincide con la revisión inglesa que evita una lectura de límite temporal incorrecta.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre de pacto en vez de ocultarlo con un sustituto litúrgico. «Yahvé» es la forma española adoptada aquí por inteligibilidad y consistencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la última frase de una idea de límite temporal a una referencia idiomática a «those days / in those days». Por eso el español usa «en aquellos días» y no una traducción tipo «hasta entonces». También se conservó «house» como «casa» en el texto principal, siguiendo la decisión auditada de no anticipar «templo» en la línea principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con el criterio del proyecto para el nombre divino.
  - Se evitó «templo» en el cuerpo principal para respetar el hebreo בַיִת; el sentido cultual queda implícito por «para el nombre de Yahvé».
  - «Lugares altos» se conserva como término bíblico reconocible y no se reemplaza por una paráfrasis más moderna.
