revisions:
- from: Entonces Johanán, hijo de Carea, y todos los jefes de las fuerzas, tomaron a todo el remanente de Judá, que había regresado de entre todas las naciones adonde había sido dispersado[a], para habitar[b] en la tierra de Judá—
  to: Entonces Johanán, hijo de Carea, y todos los jefes de las fuerzas, tomaron a todo el remanente de Judá, que había regresado de todas las naciones donde habían sido expulsados[a], para residir[b] en la tierra de Judá—
  rationale: Se corrige la referencia plural de נִדְּחוּ («habían sido expulsados»), se ajusta el verbo final a «residir» para reflejar mejor לָגוּר según la revisión inglesa auditada, y se reordenan las notas para que el texto principal preserve mejor la fuerza del desplazamiento forzado y la estancia/residencia implícita. También se simplifica «de entre todas las naciones» a «de todas las naciones», más natural y suficientemente fiel.
