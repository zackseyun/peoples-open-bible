translation:
  language: es
  text: ¿Tienes ojos de carne[a], o ves como ve un hombre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como ve un ser humano». Hebreo אֱנוֹשׁ es un término genérico para un ser humano, a menudo con un matiz de fragilidad o mortalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/עֵינֵי
  english_pob_choice: Do you have eyes
  chosen_spanish: ¿Tienes ojos
  alternatives_spanish:
  - ¿Son tus ojos
  - ¿Posees ojos
  lexicon: HALOT
  rationale: La construcción hebrea plantea una pregunta retórica sobre la posesión de ojos. En español, «tener ojos» transmite de forma natural la misma idea, sin forzar una estructura más literal que suene extraña.
- source_word: בָשָׂר
  english_pob_choice: of flesh
  chosen_spanish: de carne
  alternatives_spanish:
  - carnales
  - humanos
  lexicon: HALOT
  rationale: «Carne» conserva el contraste corporal y concreto del hebreo בָשָׂר. «Humanos» explicita la idea, pero reduce la imagen; «carnales» suena más interpretativo y teológicamente cargado.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - si
  - acaso
  lexicon: HALOT
  rationale: En esta pregunta retórica, אִם introduce una alternativa, no una condición. «O» comunica mejor la fuerza disyuntiva en español.
- source_word: כִּ/רְאֹות
  english_pob_choice: as ... sees
  chosen_spanish: como ve
  alternatives_spanish:
  - según ve
  - del modo en que ve
  lexicon: HALOT
  rationale: El comparativo hebreo se vierte de manera idiomática con «como ve», manteniendo la comparación directa entre la percepción divina y la humana.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - un mortal
  lexicon: HALOT
  rationale: El término hebreo es un singular genérico con fuerza representativa. «Un hombre» preserva esa referencia genérica y mantiene la economía retórica del verso.
- source_word: תִּרְאֶה
  english_pob_choice: do you see
  chosen_spanish: ves tú
  alternatives_spanish:
  - miras tú
  - percibes tú
  lexicon: HALOT
  rationale: «Ver» reproduce el verbo del hebreo y su vínculo con «ojos». Se coloca el pronombre por énfasis y claridad en la pregunta retórica.
theological_decisions:
- issue: Lenguaje antropomórfico sobre la percepción de Dios
  english_pob_reading: Retain the rhetorical anthropomorphic contrast without softening it
  chosen_spanish_reading: Mantener el contraste antropomórfico entre Dios y la visión humana sin explicarlo ni atenuarlo
  alternative_spanish_readings:
  - 'Parafrasear: ¿Juzgas por las apariencias como los hombres?'
  - 'Suavizar: ¿Ves de manera humana?'
  rationale: El hebreo habla de «ojos de carne» y de ver «como ve un hombre». La traducción conserva esa imagen concreta porque forma parte del argumento poético del texto, sin introducir una explicación externa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido genérico de אֱנוֹשׁ
  english_pob_reading: man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - un ser humano
  - la humanidad
  - los mortales
  rationale: El hebreo usa un singular genérico. «Un hombre» conserva la forma representativa del original y evita neutralizar el sujeto poético; el contexto ya indica que se trata de la forma humana de ver.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa revisada añadió el artículo en «as a man sees» para una formulación más natural. En español, «como ve un hombre» ya suena natural y conserva bien el singular genérico de אֱנוֹשׁ, por lo que no se necesitó una expansión adicional.
  spanish_consistency_notes:
  - Se mantiene «carne» para בָשָׂר siguiendo el valor concreto del contraste, sin cambiarlo por «humano» en el texto principal.
  - Se usa «un hombre» para אֱנוֹשׁ por su fuerza genérica; la nota ofrece «ser humano» como alternativa explicativa.
  - Se conserva el paralelismo retórico entre «ojos» y «ver» para reflejar la repetición del hebreo.
