translation:
  language: es
  text: Caerán por la espada; los juzgaré en la frontera de Israel[a], y sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el límite de Israel». La frase hebrea puede denotar ubicación en el borde mismo de Israel o sobre su límite.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - con la espada
  - a espada
  lexicon: HALOT
  rationale: El ב instrumental se expresa naturalmente en español con 'por' en contextos de causa/medio de muerte; 'por la espada' conserva la imagen concreta de muerte violenta sin sonar forzado.
- source_word: תִּפֹּלוּ
  english_pob_choice: you will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - ustedes caerán
  - morirán
  - serán derribados
  lexicon: HALOT
  rationale: נפל significa 'caer'. En un oráculo de juicio, 'caerán' preserva la imagen verbal del hebreo y permite que el contexto de la espada comunique el sentido letal.
- source_word: עַל גְּבוּל יִשְׂרָאֵל
  english_pob_choice: at the border of Israel
  chosen_spanish: en la frontera de Israel
  alternatives_spanish:
  - sobre la frontera de Israel
  - junto a la frontera de Israel
  - en el límite de Israel
  lexicon: HALOT
  rationale: גְּבוּל puede significar frontera, límite o territorio. Con עַל, la lectura locativa de ubicación en/contra el borde es posible; 'en la frontera de Israel' es claro y mantiene la ambigüedad de lugar exacto señalada en la nota inglesa.
- source_word: אֶשְׁפּוֹט אֶתְכֶם
  english_pob_choice: I will judge you
  chosen_spanish: los juzgaré
  alternatives_spanish:
  - los haré objeto de juicio
  - ejecutaré juicio contra ustedes
  lexicon: HALOT
  rationale: שׁפט puede abarcar juzgar y ejecutar juicio. 'Los juzgaré' es la forma directa en español y deja que el contexto represente la condena implícita.
- source_word: וִידַעְתֶּם
  english_pob_choice: and you will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - entonces sabrán
  lexicon: HALOT
  rationale: La forma con ו consecutiva expresa resultado futuro. 'Y sabrán' conserva la coordinación del hebreo sin añadir una inferencia interpretativa como 'entonces'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el valor proyectivo del nombre divino en español POB como 'Yahvé', la forma usual en español para el Tetragrámaton, evitando la sustitución por un título y manteniendo el nombre personal del pacto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton; la política española de POB pide 'Yahvé' en el texto principal. Esto preserva el nombre propio de Dios revelado a Israel, no una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz locativo de עַל גְּבוּל יִשְׂרָאֵל
  english_pob_reading: at the border of Israel
  chosen_spanish_reading: en la frontera de Israel
  alternative_spanish_readings:
  - sobre la frontera de Israel
  - junto a la frontera de Israel
  - en el límite de Israel
  rationale: La preposición y el sustantivo permiten una localización en el borde mismo del territorio. El español 'en la frontera' comunica bien la ubicación sin cerrar la posibilidad de un contacto con el límite.
  doctrine_reference: Lexical decision per HALOT on גְּבוּל with עַל
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparece en el texto español exactamente donde corresponde. La redacción principal sigue de cerca el hebreo y el audit trail inglés, con la nota manteniendo la ambigüedad locativa de עַל גְּבוּל יִשְׂרָאֵל.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar español del proyecto.
  - Se mantiene «frontera» para גְּבוּל con una nota que conserva la alternativa locativa.
  - 'Se conserva el paralelismo verbal: caída, juicio, conocimiento.'
  - El plural «sabrán» refleja el destinatario plural del hebreo.
