  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la lista de granos/legumbres, la acción de ponerlos juntos en un solo recipiente, hacer pan con ellos, y comerlo durante los 390 días. Sin embargo, hay dos desajustes relevantes con el hebreo y con el rastro POB en inglés: (1) la nota [a] está anclada en «tú» pero corresponde a כֻסְּמִים / «espelta»; (2) «te acuestas sobre tu lado» suena más ingresivo/habitual que el participio hebreo שֹׁכֵב, que describe estar acostado o yacer sobre el costado en ese período.'
  spanish_quality_summary: El español es claro y mayormente natural, pero la colocación de la nota es incorrecta y la frase «te acuestas sobre tu lado» puede leerse como la acción de acostarse, no como el estado continuo de estar tendido. «Acostado de lado» o «recostado sobre tu lado» mejora fidelidad y fluidez. También conviene anclar la nota en «espelta[a]».
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales son adecuadas: «trigo», «cebada», «habas», «lentejas», «mijo», «espelta». La nota de alternativa para כֻסְּמִים debe conservarse, pero correctamente vinculada al término. «Recipiente» y «haz de ellos pan» son aceptables.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «tú» en vez de en «espelta».
    rationale: La nota documenta la incertidumbre léxica de כֻסְּמִים, no del pronombre. Tal como está, desinforma al lector y rompe la trazabilidad con el audit trail inglés.
  - severity: medium
    issue: «Te acuestas sobre tu lado» no representa bien el participio hebreo שֹׁכֵב.
    rationale: El hebreo describe el estado continuo de estar tendido en el acto simbólico; en español, «te acuestas» suele sugerir la acción de echarse. «Estás acostado sobre tu lado» o «yaces sobre tu lado» sería más fiel.
  revised_spanish_text: Y tú, toma para ti trigo y cebada, habas y lentejas, mijo y espelta[a], y ponlos en un solo recipiente, y haz de ellos pan para ti. Según el número de los días que estás acostado sobre tu lado —trescientos noventa días— lo comerás.
  revised_footnotes:
  - marker: a
    text: O «emmer» o «una clase de trigo»; la identificación exacta del grano antiguo כֻסְּמִים es incierta.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre «espelta», que es el término discutido en el original y en el POB inglés. Además, se cambia «te acuestas sobre tu lado» por «estás acostado sobre tu lado» para reflejar mejor el participio hebreo de estado continuo sin introducir arcaísmo innecesario. El resto del texto puede mantenerse.
