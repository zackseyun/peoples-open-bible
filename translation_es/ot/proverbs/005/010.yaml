review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: una advertencia preventiva (''פֶּן'' -> ''No sea que''), con paralelismo entre que otros se aprovechen de la fuerza del destinatario y que el fruto de su esfuerzo pase a casa ajena. ''Tu fuerza'' y ''forastero'' preservan adecuadamente las decisiones léxicas del POB. Sin embargo, la nota [a] no presenta una alternativa real, porque repite la misma traducción principal en vez de reflejar la alternancia documentada entre ''ser llenados'' y ''quedar satisfechos''.'
  spanish_quality_summary: El texto es claro, natural y de registro digno. 'No sea que extraños se sacien de tu fuerza' suena idiomático. 'Tu trabajo vaya a la casa de un forastero' es comprensible, aunque el singular 'tu trabajo' puede sentirse un poco menos cercano al matiz de plural/esfuerzo acumulado que 'tus labores'. Aun así, no requiere cambio. La reparación principal es en la nota al pie.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. Las decisiones 'extraños' / 'forastero', 'fuerza' y 'trabajo' están en línea con el rastro léxico inglés y con una lectura fiel del hebreo. La única desalineación está en la implementación de la nota léxica [a].
  issues:
  - severity: medium
    issue: La nota [a] repite la lectura principal en vez de dar la alternativa documentada.
    rationale: El inglés POB anota 'Or “be satisfied with your strength.”' porque el verbo puede significar 'ser llenados' o 'quedar satisfechos'. En español, si el texto principal usa 'se sacien', la nota debe ofrecer una alternativa distinta, como 'se llenen de tu fuerza', no repetir 'se sacien de tu fuerza'.
  revised_spanish_text: No sea que extraños se sacien de tu fuerza[a], y tu trabajo vaya a la casa de un forastero[b].
  revised_footnotes:
  - marker: a
    text: 'O: “se llenen de tu fuerza”. El verbo hebreo puede significar ser llenados o quedar satisfechos.'
    reason: lexical_alternative
  - marker: b
    text: “Tu trabajo” también puede aludir al fruto de tu trabajo o a tus bienes ganados con esfuerzo.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, porque es fiel y natural en español. Se corrige únicamente la nota [a] para que exprese una alternativa léxica real y conforme al expediente del POB en inglés.
