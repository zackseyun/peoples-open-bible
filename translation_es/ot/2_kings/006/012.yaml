translation:
  language: es
  text: 'Pero uno de sus siervos dijo[a]: «No, mi señor el rey; más bien, Eliseo el profeta, que está en Israel, le comunica al rey de Israel las palabras que hablas en tu dormitorio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu alcoba». El hebreo es literalmente «en la cámara de tu cama».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La waw narrativa avanza la escena, y el contexto es de corrección a la sospecha previa; por eso «Pero» comunica mejor el contraste que un simple «Y». «Dijo» mantiene el valor directo de אמר.
- source_word: אַחַד מֵעֲבָדָיו
  english_pob_choice: one of his servants
  chosen_spanish: uno de sus siervos
  alternatives_spanish:
  - uno de sus servidores
  - uno de sus oficiales
  lexicon: HALOT
  rationale: עבד puede designar un sirviente de corte; «siervo» conserva esa relación de dependencia personal. «Servidores» sería posible, pero menos marcado; «oficiales» introduce una precisión que el hebreo no exige.
- source_word: לֹא אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: No, my lord the king
  chosen_spanish: No, mi señor el rey
  alternatives_spanish:
  - No, mi señor, el rey
  - No, mi amo el rey
  lexicon: HALOT
  rationale: La fórmula es una negativa respetuosa dirigida al monarca. «Mi señor el rey» preserva el tono cortesano de אֲדֹנִי + הַמֶּלֶךְ sin recurrir a un lenguaje arcaizante.
- source_word: כִּי
  english_pob_choice: Rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino
  - más todavía
  lexicon: HALOT
  rationale: Aquí כִּי introduce una explicación correctiva tras la negación. «Más bien» expresa con naturalidad ese valor adversativo-explicativo en español.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elisha
  lexicon: transliteration_standard
  rationale: En español bíblico, el nombre se reconoce de forma estándar como «Eliseo»; esa forma es la más legible para la comunidad lectora.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el vidente
  lexicon: HALOT
  rationale: נביא se traduce de forma directa como «profeta». «Vidente» no corresponde al término hebreo aquí.
- source_word: אֲשֶׁר בְּיִשְׂרָאֵל
  english_pob_choice: who is in Israel
  chosen_spanish: que está en Israel
  alternatives_spanish:
  - que se encuentra en Israel
  - que está entre Israel
  lexicon: HALOT
  rationale: La cláusula relativa sitúa a Eliseo geográficamente; «que está en Israel» es claro, natural y fiel al hebreo.
- source_word: יַגִּיד
  english_pob_choice: tells
  chosen_spanish: le cuenta
  alternatives_spanish:
  - le dice
  - le comunica
  - le revela
  lexicon: HALOT
  rationale: נגד en hifil significa hacer saber, decir, informar. «Le cuenta» mantiene la idea de comunicar verbalmente de forma natural en español, sin cargar el verbo con una connotación demasiado formal o técnica.
- source_word: לְמֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: al rey de Israel
  alternatives_spanish:
  - al monarca de Israel
  lexicon: HALOT
  rationale: La construcción posesiva se expresa de manera directa con «al rey de Israel», que es la equivalencia más natural y transparente.
- source_word: אֶת הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas
  - lo que
  lexicon: HALOT
  rationale: דברים mantiene el paralelismo verbal con «hablas». «Las palabras» conserva ese enlace léxico que el hebreo hace visible.
- source_word: אֲשֶׁר תְּדַבֵּר
  english_pob_choice: that you speak
  chosen_spanish: que tú hablas
  alternatives_spanish:
  - que dices
  - que estás hablando
  lexicon: HALOT
  rationale: «Hablas» preserva la raíz verbal relacionada con «palabras» y expresa la acción habitual o actual del rey. El pronombre «tú» hace explícito el sujeto implícito del hebreo, útil en español para evitar ambigüedad.
- source_word: בַּחֲדַר מִשְׁכָּבֶךָ
  english_pob_choice: in your bedroom
  chosen_spanish: en tu dormitorio
  alternatives_spanish:
  - en tu alcoba
  - en tu aposento
  - en tu recámara
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en la cámara de tu cama». «Dormitorio» es el equivalente moderno más natural y comprensible; no borra el sentido de privacidad doméstica que el contexto exige.
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó la puntuación, de punto a punto y coma, en la secuencia «No, my lord the king; rather...». No hubo cambios léxicos ni de sentido que alteren la base de esta traducción. El cotejo cruzado reportó acuerdo alto con observaciones menores, sin afectar la sustancia del versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se traduce el nombre personal como «Eliseo», forma estándar en español bíblico.
  - Se mantiene el paralelismo «palabras / hablas» para reflejar el hebreo.
  - «Siervos»/«siervo» se usa por el valor cortesano de עבד en este contexto, no como sustituto teológico de otros términos de servicio.
