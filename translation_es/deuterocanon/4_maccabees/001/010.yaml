translation:
  language: es
  text: Por tanto, me corresponde alabar a los hombres que, en este tiempo, murieron con su madre por causa de la nobleza y la bondad[a]; y, en cuanto a los honores, declararlos bienaventurados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por causa de la virtud». El griego καλοκἀγαθία combina la idea de nobleza con la de bondad o excelencia moral.
    reason: lexical_alternative
  - marker: b
    text: La frase final griega es condensada; el sentido es que, además de alabar sus virtudes, el hablante también les concede el honor de llamarlos bienaventurados.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπεστί μοι
  english_pob_choice: it is incumbent on me
  chosen_spanish: me corresponde
  alternatives_spanish:
  - es mi deber
  - me incumbe
  - me toca
  lexicon: LSJ
  rationale: La expresión impersonal indica obligación o tarea asignada, no mera posibilidad. «Me corresponde» conserva el tono formal y la idea de encargo sin sonar excesivamente duro en español.
- source_word: ἐπαινεῖν
  english_pob_choice: to praise
  chosen_spanish: alabar
  alternatives_spanish:
  - praise
  - elogiar
  - ensalzar
  lexicon: LSJ
  rationale: «Alabar» es natural en español religioso y retiene el sentido de reconocimiento público. Evita una paráfrasis más libre y mantiene el registro elevado del prólogo.
- source_word: τοὺς ... ἀποθανόντας ... ἄνδρας
  english_pob_choice: the men who ... died
  chosen_spanish: los hombres que ... murieron
  alternatives_spanish:
  - esos hombres que ... murieron
  - los varones que ... murieron
  lexicon: LSJ
  rationale: El participio se vierte con una relativa natural en español. «Hombres» conserva el masculino explícito de ἄνδρας y evita neutralizar el referente.
- source_word: κατὰ τοῦτον τὸν καιρόν
  english_pob_choice: at this time
  chosen_spanish: en este tiempo
  alternatives_spanish:
  - en este momento
  - en esta ocasión
  - durante este tiempo
  lexicon: LSJ
  rationale: La frase apunta al período concreto del relato. «En este tiempo» sigue de cerca el valor temporal del griego y suena sobrio en español.
- source_word: ὑπὲρ τῆς καλοκἀγαθίας
  english_pob_choice: for the sake of nobility and goodness
  chosen_spanish: por causa de la nobleza y la bondad
  alternatives_spanish:
  - por causa de la virtud
  - por causa de la noble nobleza y bondad
  - a favor de la nobleza y la bondad
  lexicon: LSJ
  rationale: El término compuesto καλοκἀγαθία combina ideal moral y nobleza de carácter. «Nobleza y bondad» refleja mejor la pareja semántica que una abstracción como «virtud», y «por causa de» expresa el valor final/causal del ὑπέρ.
- source_word: μετὰ τῆς μητρός
  english_pob_choice: with their mother
  chosen_spanish: con su madre
  alternatives_spanish:
  - junto con su madre
  - al lado de su madre
  lexicon: LSJ
  rationale: La preposición con genitivo indica compañía en el mismo contexto de muerte/martirio. «Con su madre» es directo y fiel; el singular colectivo está implícito en el relato.
- source_word: τῶν δὲ τιμῶν μακαρισμῷ ὤν
  english_pob_choice: and, as for honors, to pronounce them blessed
  chosen_spanish: y, en cuanto a los honores, declararlos bienaventurados
  alternatives_spanish:
  - y, respecto de los honores, bendecirlos
  - y, en lo tocante a los honores, llamarlos bienaventurados
  - y, en cuanto a los honores, pronunciarlos bienaventurados
  lexicon: LSJ
  rationale: El cierre griego es comprimido; el sentido es que, además del elogio de sus virtudes, se les concede el honor de ser tenidos por felices/bienaventurados. «Declararlos bienaventurados» reproduce bien μακαρισμός y preserva la fuerza honorífica.
theological_decisions:
- issue: Renderización de καλοκἀγαθία en un contexto de martirio
  english_pob_reading: nobility and goodness
  chosen_spanish_reading: nobleza y bondad
  alternative_spanish_readings:
  - virtud
  - excelencia moral
  - noble bondad
  rationale: La expresión compuesta reúne nobleza de carácter y bondad moral. En español, el binomio «nobleza y bondad» conserva esa doble carga sin introducir terminología técnica ajena al pasaje.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia masculina explícita de ἄνδρας
  english_pob_reading: the men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - los hermanos
  rationale: El griego usa un sustantivo masculino específico. Mantener «los hombres» conserva la referencia de género sin suavizar el dato textual.
  doctrine_reference: Translation philosophy §4
- issue: Sentido final de μακαρισμῷ
  english_pob_reading: to pronounce them blessed
  chosen_spanish_reading: declararlos bienaventurados
  alternative_spanish_readings:
  - llamarlos bienaventurados
  - bendecirlos
  - pronunciarlos bienaventurados
  rationale: El término apunta a conferir el honor de la bienaventuranza, no solo a ofrecer un elogio. «Declararlos bienaventurados» comunica tanto el acto verbal como el reconocimiento honorífico.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: He seguido el estado revisado del audit trail inglés, que sustituyó la formulación más condensada «noble goodness» por el par más explícito «nobility and goodness». En español, he reflejado esa revisión con «nobleza y bondad», y he mantenido la lectura comprimida de la clausula final con una solución que expresa tanto honor como bienaventuranza.
  spanish_consistency_notes:
  - He usado «bienaventurados» para μακαρισμῷ en consonancia con el valor honorífico de la clausula final; no lo he reducido a «bendecidos» para no perder el matiz de felicitación/beatitud.
  - He mantenido «hombres» para ἄνδρας por fidelidad al masculino explícito del griego.
  - He preferido «por tanto» para τῶν μὲν οὖν como enlace discursivo natural en español, conservando la transición argumentativa del inicio.
