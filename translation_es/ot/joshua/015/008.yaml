    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «hacia el mar», un modismo direccional que normalmente significa «al oeste».'
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor pero necesaria: reincorpora en el texto principal el valor direccional de יָמָּה (''al oeste''), preserva en nota la alternativa appositiva documentada por el POB inglés, y suaviza la cadena narrativa con un inicio más cercano al hebreo. El resto del texto estaba bien encaminado y solo se ajustó para mayor fidelidad y claridad.'
