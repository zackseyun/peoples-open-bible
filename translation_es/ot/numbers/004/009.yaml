revisions:
- from: Entonces tomarán una tela azul[a] y cubrirán el candelabro de la luz, junto con sus lámparas, sus tenazas, sus braseros y todos sus utensilios para el aceite, con los que lo ministrarán.
  to: Entonces tomarán una tela azul[a] y cubrirán el candelabro de la luz, junto con sus lámparas, sus tenazas, sus braseros y todos sus utensilios para el aceite, con los cuales ministrarán.
  rationale: Se corrige la cláusula final para reflejar con fidelidad el instrumental plural del hebreo ('con ellos') y para mejorar la naturalidad del español, evitando la expresión confusa 'lo ministrarán'. No se requieren cambios adicionales para una reparación menor.
