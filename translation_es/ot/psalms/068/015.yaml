translation:
  language: es
  text: Cuando el Todopoderoso dispersó a los reyes en ella[a], nevó sobre Zalmón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando el Todopoderoso dispersó a los reyes en ella, fue blanca como la nieve en Zalmón». El hebreo es compacto, y el antecedente de «en ella» no es seguro.'
    reason: alternative_reading
  - marker: b
    text: Zalmón es un nombre de lugar, probablemente una montaña o colina boscosa (véase Jueces 9:48).
    reason: cross_reference
lexical_decisions:
- source_word: בְּ/פָרֵשׂ
  english_pob_choice: When ... scattered
  chosen_spanish: Cuando ... dispersó
  alternatives_spanish:
  - Cuando ... esparció
  - Al dispersar ...
  - Cuando ... repartió
  lexicon: HALOT
  rationale: El valor temporal del prefijo ב con el verbo favorece «cuando». Para פרשׂ, en un contexto militar con «reyes» como objeto, «dispersó» conserva el sentido de desbaratar/desparramar tropas o reyes mejor que una traducción demasiado literal como «extendió».
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Como título divino, el POB inglés lo traduce y no lo translitera. «El Todopoderoso» es el equivalente natural en español y comunica claramente el título sin perder su fuerza.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - a los gobernantes
  - a los monarcas
  lexicon: HALOT
  rationale: «Reyes» es el sentido básico y específico de מלכים; conviene mantenerlo para no suavizar el referente político/militar.
- source_word: בָּהּ
  english_pob_choice: in it/her
  chosen_spanish: en ella
  alternatives_spanish:
  - en eso
  - en él
  - allí
  lexicon: HALOT
  rationale: El sufijo femenino singular conserva la incertidumbre del antecedente. En español, «en ella» permite reflejar la forma pronominal femenina sin resolver de manera indebida si el referente es una ciudad, tierra o colectividad personificada.
- source_word: תַּשְׁלֵג
  english_pob_choice: it snowed
  chosen_spanish: nevó
  alternatives_spanish:
  - se volvió blanca como nieve
  - se cubrió de nieve
  lexicon: HALOT
  rationale: El verbo de שלג puede expresar el acto de nevar o la imagen de blancura nívea. «Nevó» conserva el verbo y la concisión poética; la alternativa interpretativa «se volvió blanca como nieve» sería más explicativa que el hebreo compacto.
- source_word: בְּ/צַלְמוֹן
  english_pob_choice: on Zalmon
  chosen_spanish: sobre Zalmón
  alternatives_spanish:
  - en Zalmón
  - sobre el Zalmón
  - en el monte Zalmón
  lexicon: HALOT
  rationale: Zalmon/Zalmón se trata como nombre propio transliterado. «Sobre» reproduce bien la preposición en un contexto de montaña o relieve; mantener el nombre sin añadir «monte» evita sobreespecificar lo que el hebreo no explicita en la línea.
theological_decisions:
- issue: Título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: Se sigue la decisión auditada del POB de traducir el título en vez de transliterarlo, manteniendo claridad reverente para el lector hispano. No se requiere una nota doctrinal especial porque el título es estándar y no introduce ambigüedad teológica nueva.
  doctrine_reference: Nombre/título divino en traducción bíblica
- issue: Pronombre femenino singular בָּהּ
  english_pob_reading: in it/her
  chosen_spanish_reading: en ella
  alternative_spanish_readings:
  - en ello
  - allí
  rationale: 'Se preserva la tensión textual: el hebreo es compacto y deja incierto el antecedente. «En ella» conserva la referencia femenina sin resolverla artificialmente, y la nota explica la alternativa posible.'
  doctrine_reference: Tensión textual y referencia pronominal en poesía hebrea
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión auditada del POB que corrigió el inglés de «there» a «in it» para reflejar mejor el sufijo femenino singular. En español se mantiene esa misma tensión mediante «en ella», sin introducir una aclaración inexistente en el hebreo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí el verso usa שַׁדַּי, por lo que corresponde «el Todopoderoso».
  - Se conserva la capitalización normal de nombres propios («Zalmón») y la sintaxis poética breve del hebreo.
  - La nota de alternativa queda anclada al pronombre para no perder la ambigüedad textual documentada.
