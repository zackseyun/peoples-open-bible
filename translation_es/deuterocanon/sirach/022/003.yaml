translation:
  language: es
  text: La vergüenza de un padre es el nacimiento de un hijo indisciplinado[a], y una hija nace para pérdida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego, literalmente: ''La vergüenza de un padre es el nacimiento de un hijo indisciplinado.'' El hijo se infiere por el adjetivo masculino.'
    reason: lexical_alternative
  - marker: b
    text: O 'para disminución', 'para menoscabo' o 'para pérdida de su padre'; la expresión griega apunta a reducción o pérdida, pero su matiz exacto es comprimido.
    reason: alternative_reading
lexical_decisions:
- source_word: αἰσχύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - afrenta
  lexicon: LSJ / BDAG
  rationale: En este proverbio, αἰσχύνη expresa deshonra social y vergüenza pública. 'Vergüenza' conserva la fuerza directa del término y su naturalidad en español, sin suavizarlo.
- source_word: πατρὸς
  english_pob_choice: a father’s
  chosen_spanish: de un padre
  alternatives_spanish:
  - de padre
  - del padre
  lexicon: BDAG
  rationale: El genitivo se expresa de manera posesiva en español. Se mantiene el singular proverbial y la referencia masculina explícita.
- source_word: ἐν γεννήσει
  english_pob_choice: is the birth
  chosen_spanish: es el nacimiento
  alternatives_spanish:
  - es la generación
  - está en el nacimiento
  - es el engendramiento
  lexicon: BDAG
  rationale: La frase griega es compacta y alude al acto o resultado del engendrar. 'Nacimiento' es una solución natural en español que conserva el evento sin forzar una paráfrasis excesiva.
- source_word: ἀπαιδεύτου
  english_pob_choice: an undisciplined son
  chosen_spanish: un hijo indisciplinado
  alternatives_spanish:
  - un hijo sin disciplina
  - un hijo no instruido
  - un hijo mal enseñado
  lexicon: BDAG
  rationale: ἀπαίδευτος abarca falta de instrucción y de disciplina; en este contexto sapiencial la fuerza moral es principal. 'Indisciplinado' refleja bien esa carga. 'Hijo' se explicita porque el adjetivo masculino implica el varón, como en la audit trail inglesa.
- source_word: θυγάτηρ
  english_pob_choice: a daughter
  chosen_spanish: una hija
  alternatives_spanish:
  - la hija
  lexicon: BDAG
  rationale: Correspondencia directa y explícita para el segundo hemistiquio.
- source_word: ἐπʼ ἐλαττώσει
  english_pob_choice: for loss
  chosen_spanish: para pérdida
  alternatives_spanish:
  - para disminución
  - para menoscabo
  - para detrimento
  lexicon: LSJ
  rationale: La expresión apunta a reducción, menoscabo o pérdida. 'Para pérdida' es breve y conserva la amplitud semántica del griego sin decidir demasiado entre matices posibles.
- source_word: γίνεται
  english_pob_choice: is born
  chosen_spanish: nace
  alternatives_spanish:
  - llega a ser
  - se hace
  - viene a ser
  lexicon: BDAG
  rationale: Aunque γίνομαι puede significar 'llegar a ser', el contexto de procreación/nacimiento permite una traducción más directa y natural. 'Nace' mantiene el paralelismo con 'nacimiento' en el primer hemistiquio.
theological_decisions:
- issue: Formulación sexuada y asimetría social del proverbio
  english_pob_reading: Retains father/son and daughter as gender-specific terms; does not soften the ancient valuation.
  chosen_spanish_reading: Conserva 'padre', 'hijo' e 'hija' con la misma especificidad sexual y la misma dureza proverbial.
  alternative_spanish_readings:
  - Usar 'progenitor' y 'descendiente'
  - Suavizar a una observación general sobre la familia
  rationale: El griego presenta una formulación sexuada y socialmente cargada; no debe neutralizarse ni suavizarse. La traducción española mantiene el contraste sin añadir interpretación moralizante adicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Relación entre 'vergüenza' y 'pérdida'
  english_pob_reading: The second colon points to reduction or loss, with compressed nuance.
  chosen_spanish_reading: '''Para pérdida'' conserva la ambigüedad entre menoscabo, detrimento y pérdida material o social.'
  alternative_spanish_readings:
  - '''Para menoscabo'''
  - '''Para detrimento'''
  - '''Para la pérdida de su padre'''
  rationale: El griego es comprimido y no obliga a especificar si la pérdida es económica, social o para el padre. La versión española preserva esa tensión semántica en vez de resolverla prematuramente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió 'birth' y 'is born' por mayor naturalidad. En español se reflejó esa decisión con 'nacimiento' y 'nace', manteniendo el paralelismo y la concisión proverbial del griego.
  spanish_consistency_notes:
  - Se usa 'hijo' en sentido explícito para reflejar el masculino implícito de ἀπαιδεύτου, en paralelo con la audit trail inglesa.
  - '''Vergüenza'' se emplea para αἰσχύνη por su fuerza proverbia y su naturalidad en español.'
  - '''Pérdida'' conserva la ambigüedad del segundo hemistiquio; no se especifica si la reducción es social, económica o filial.'
  - Se mantiene un tono bíblico moderno, sin recurrir a 'SEÑOR' ni a terminología eclesiástica ajena al texto.
