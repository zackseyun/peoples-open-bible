translation:
  language: es
  text: Y el rey[a], muy y continuamente lleno de gozo, preparaba banquetes delante de todos los ídolos, con una mente muy alejada de la verdad y con una boca profana, alabando cosas sordas, incapaces de hablarles o ayudarles[b], pero diciendo cosas impropias contra Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego de Swete tiene una lectura entre corchetes, '[el Dios]'; el sentido es que el rey hablaba impropiamente contra Dios.
    reason: textual_variant
  - marker: b
    text: O 'en honor de todos los ídolos' para 'delante de todos los ídolos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μεγάλως
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - muy
  - en gran manera
  lexicon: LSJ
  rationale: Adverbio intensificador del estado del rey; 'grandemente' conserva el tono elevado y evita una sobreexplicación.
- source_word: διηνεκῶς
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: LSJ
  rationale: Expresa duración sostenida de manera natural en español y reproduce el matiz de continuidad.
- source_word: συμπόσια
  english_pob_choice: banquets
  chosen_spanish: banquetes
  alternatives_spanish:
  - fiestas
  - convites
  lexicon: LSJ
  rationale: '''Banquetes'' comunica el carácter festivo y cortesano del pasaje mejor que una opción más general o coloquial.'
- source_word: ἐπὶ πάντων τῶν εἰδώλων
  english_pob_choice: before all the idols
  chosen_spanish: delante de todos los ídolos
  alternatives_spanish:
  - ante todos los ídolos
  - en honor de todos los ídolos
  lexicon: LSJ
  rationale: '''Delante de'' mantiene la imagen espacial del griego y el sentido cultual indicado por el contexto, sin forzar una paráfrasis como ''en honor de''.'
- source_word: πεπληρωμένῃ πόρρω τῆς ἀληθείας φρενί
  english_pob_choice: with a mind far removed from the truth
  chosen_spanish: con una mente muy lejos de la verdad
  alternatives_spanish:
  - con una mente apartada de la verdad
  - con entendimiento muy lejos de la verdad
  lexicon: LSJ
  rationale: '''Mente'' funciona bien para φρήν en este contexto; ''muy lejos de la verdad'' conserva la distancia idiomática de πόρρω τῆς ἀληθείας sin sonar técnico.'
- source_word: βεβήλῳ στόματι
  english_pob_choice: with a profane mouth
  chosen_spanish: con una boca profana
  alternatives_spanish:
  - con una boca impía
  - con una boca irreverente
  lexicon: LSJ
  rationale: '''Profana'' preserva el registro religioso del término y la censura moral del texto.'
- source_word: κωφὰ
  english_pob_choice: deaf things
  chosen_spanish: cosas sordas
  alternatives_spanish:
  - cosas mudas
  - ídolos sordos
  lexicon: LSJ
  rationale: El griego usa un adjetivo neutro sustantivado sin noun explícito; 'cosas sordas' conserva esa aspereza retórica sin añadir un sustantivo no presente.
- source_word: μὴ δυνάμενα αὐτοῖς λαλεῖν ἢ ἀρήγειν
  english_pob_choice: unable to speak or help them
  chosen_spanish: incapaces de hablarles o ayudarles
  alternatives_spanish:
  - incapaces de hablar o socorrerles
  - no pudiendo hablarles ni ayudarles
  lexicon: LSJ
  rationale: '''Ayudarles'' reproduce de forma clara ἀρήγειν; el dativo de interés se expresa naturalmente con pronombre enclítico en español.'
- source_word: ἐπαινῶν
  english_pob_choice: praising
  chosen_spanish: alabando
  alternatives_spanish:
  - ensalzando
  - elogiando
  lexicon: LSJ
  rationale: Verbo directo y natural para el acto de elogiar idolatría en español bíblico moderno.
- source_word: εἰς δὲ [τὸν θεὸν]
  english_pob_choice: against God
  chosen_spanish: contra Dios
  alternatives_spanish:
  - hacia Dios
  - acerca de Dios
  lexicon: LSJ
  rationale: En este contexto hostil, la dirección adversativa de εἰς con habla se expresa mejor como 'contra Dios'; el nombre divino se traduce literalmente como 'Dios' por ser θεός.
- source_word: τὶ μὴ καθήκοντα
  english_pob_choice: improper things
  chosen_spanish: cosas impropias
  alternatives_spanish:
  - cosas no convenientes
  - cosas indecorosas
  lexicon: LSJ
  rationale: '''Improprias'' transmite bien lo no debido o no conveniente sin estrechar el sentido a una sola idea moral.'
theological_decisions:
- issue: Contraste entre la idolatría y el habla irreverente dirigida a Dios
  english_pob_reading: but speaking improper things against God
  chosen_spanish_reading: pero diciendo cosas impropias contra Dios
  alternative_spanish_readings:
  - pero diciendo cosas no convenientes acerca de Dios
  - pero pronunciando cosas impropias hacia Dios
  rationale: 'Se conserva el contraste del verso: el rey alaba ídolos incapaces de ayudar, mientras habla de modo impropio contra Dios. ''Contra Dios'' mantiene la fuerza polémica que el contexto exige sin suavizarla.'
  doctrine_reference: Preservar la tensión teológica del original; prioridad del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se siguió el testimonio griego de Swete y el criterio auditado de la POB inglesa sin introducir cambios sustantivos; la única adaptación principal fue naturalizar 'mind' como 'mente' y mantener la lectura polémica 'contra Dios'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, no una forma de máscara litúrgica.
  - '''Ídolos'' se conserva de forma consistente para εἴδωλα.'
  - '''Profana'' reproduce el matiz religioso de βεβήλῳ sin elevarlo a un término técnico distinto.'
  - La frase 'delante de' conserva la ambigüedad cultual/espacial del griego y se aclara en nota.
