    issue: «Él les hizo según sus pecados» es un calco poco idiomático de ἐποίησεν αὐτοῖς
    rationale: Aunque el griego es literalmente «hizo a ellos», en español esa formulación resulta extraña e incompleta. El sentido contextual es de trato o acción judicial contra ellos, por lo que «los trató conforme a sus pecados» preserva mejor el significado fuente y la legibilidad.
  - severity: low
    issue: La nota [a] no refleja la mejor alternativa tras corregir el verbo principal
    rationale: Si se sustituye «según» por «conforme a» en el texto principal, la nota debe ajustarse o eliminarse para no duplicar sin utilidad.
