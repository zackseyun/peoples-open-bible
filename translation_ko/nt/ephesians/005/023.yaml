  text: For the husband is the head of the wife, as the Messiah also is the head of the church, himself the Savior of the body.
translation:
  language: ko
  text: 이는 남편이 아내의 머리[a]됨이 메시아께서 교회의 머리되심과 같기 때문이며, 그분 친히 그 몸의 구원자이십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「머리」(κεφαλή)는 헬라어 은유를 보존한다. 해석자들은 이 비유를 권위, 두드러짐, 또는 근원·원천으로 다양하게 이해해 왔다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεφαλὴ
  english_pob_choice: head
  chosen_korean: 머리
  alternatives_korean:
  - 우두머리
  - 근원
  lexicon: BDAG
  rationale: 헬라어 은유를 직역으로 보존하고 해석 폭을 각주에 둔다.
- source_word: αὐτὸς σωτὴρ τοῦ σώματος
  english_pob_choice: himself the Savior of the body
  chosen_korean: 그분 친히 그 몸의 구원자이십니다
  alternatives_korean:
  - 그분 자신이 몸의 구주이십니다
  lexicon: BDAG
  rationale: αὐτὸς의 강조를 「친히」로 살리고 「몸의 구원자」를 보존.
theological_decisions:
- issue: 「머리」 은유의 해석 폭
  chosen_reading: 「머리」를 직역으로 보존하여 권위·두드러짐·근원의 다층적 해석 폭을 본문 안에 닫지 않는다.
  alternative_readings:
  - 「우두머리」(권위)로 좁히기
  - 「근원」(원천)으로 좁히기
  rationale: 본 단락 전체(23–32)는 머리-몸 비유를 메시아-교회 관계로 확장한다. 한국어 본문이 은유의 다층을 보존하면, 단락 끝의 「큰 비밀」(32) 신학적 폭도 살아 있다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
