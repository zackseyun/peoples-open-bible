translation:
  language: es
  text: 'Porque David dijo[a]: «Yahvé, el Dios de Israel, ha dado reposo a su pueblo, y ha habitado en Jerusalén para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y habitará en Jerusalén para siempre». El verbo hebreo puede entenderse como una forma que expresa la morada estable y perdurable de Yahvé allí.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de lo dicho antes; en español, «porque» preserva con naturalidad la fuerza explicativa sin volver la frase arcaica.
- source_word: אָמַר דָּוִיד
  english_pob_choice: David said
  chosen_spanish: David dijo
  alternatives_spanish:
  - David había dicho
  lexicon: HALOT
  rationale: El hebreo narra una declaración en estilo directo; «dijo» reproduce el tiempo narrativo simple de modo claro y natural.
- source_word: הֵנִיחַ
  english_pob_choice: has given rest
  chosen_spanish: ha dado reposo
  alternatives_spanish:
  - ha hecho descansar
  - ha concedido reposo
  - ha dado descanso
  lexicon: HALOT
  rationale: El hiphil de נוח expresa hacer que otro descanse o quede asentado; «ha dado reposo» conserva bien el matiz causativo y suena idiomático en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  lexicon: HALOT
  rationale: Construcción normal de genitivo en español; conserva la relación de pertenencia/covenantalidad sin añadir explicaciones.
- source_word: לְעַמּוֹ
  english_pob_choice: to his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - para su pueblo
  lexicon: HALOT
  rationale: El ל puede funcionar como dativo beneficiario; «a su pueblo» es la forma más directa en español con el verbo «dar reposo».
- source_word: וַיִּשְׁכֹּן
  english_pob_choice: and he has dwelt
  chosen_spanish: ha habitado
  alternatives_spanish:
  - habita
  - ha morado
  lexicon: HALOT
  rationale: שכן expresa habitar/domiciliarse; se eligió un perfecto compuesto para mantener la coherencia con «ha dado reposo» y reflejar el estado asentado resultante.
- source_word: בִּירוּשָׁלַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Traslada directamente el complemento locativo sin cambio de sentido.
- source_word: עַד לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Equivale al hebreo de duración perpetua en un registro natural y bíblicamente reconocible en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se conserva el nombre propio de Dios, sin la sustitución litúrgica «SEÑOR», siguiendo la política del proyecto y la transliteración estándar en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Tiempos verbales en la cita: reposo y permanencia divina'
  english_pob_reading: has given rest ... and he has dwelt in Jerusalem forever
  chosen_spanish_reading: ha dado reposo ... y ha habitado en Jerusalén para siempre
  alternative_spanish_readings:
  - da reposo ... y habita en Jerusalén para siempre
  - ha dado reposo ... y habita en Jerusalén para siempre
  rationale: El hebreo presenta una afirmación de estado cumplido/establecido y la revisión inglesa prefirió el perfecto para evitar sobreespecificar un presente gnómico. El español mantiene ese paralelismo con dos perfectos compuestos.
  doctrine_reference: 'English audit revision: tense consistency with perfect aspect; settled enduring dwelling in Jerusalem'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió «he dwells» por «he has dwelt» para reflejar mejor el aspecto perfecto y armonizarlo con «has given rest». La versión española sigue esa decisión con dos perfectos compuestos: «ha dado reposo» y «ha habitado», manteniendo el sentido de permanencia establecida sin forzar un futuro ni un presente absoluto.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente con el criterio del proyecto para יְהוָה.
  - «ha dado reposo» y «ha habitado» conservan el paralelismo aspectual del registro inglés revisado.
  - Se prefiere «para siempre» como equivalente natural de עַד לְעוֹלָם.
  - La nota alternativa usa «habitará» solo como posibilidad de lectura, no como texto principal.
