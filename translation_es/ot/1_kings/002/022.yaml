translation:
  language: es
  text: 'El rey Salomón respondió y dijo a su madre: «¿Por qué estás pidiendo a Abisag la sunamita para Adonías? Pide también para él la realeza[a], porque él es mi hermano mayor; y para él, para Abiatar el sacerdote, y para Joab hijo de Sarvia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el reino» o «el trono». El término hebreo puede denotar de manera más amplia el poder o derecho real; aquí «la realeza» destaca mejor el punto de Salomón de que la petición de Adonías tiene implicaciones dinásticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, ‘respondió’ reproduce naturalmente el verbo de réplica narrativa; junto con ‘dijo’ conserva la fórmula hebrea completa sin sonar forzado.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - el rey, Salomón
  - Salomón, el rey
  lexicon: HALOT
  rationale: La apposición hebrea se expresa con el título y el nombre propios en orden natural del español, manteniendo tanto la dignidad real como la identificación personal.
- source_word: לְאִמּוֹ
  english_pob_choice: to his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a su madre Betsabé
  lexicon: HALOT
  rationale: El hebreo dice solo ‘su madre’; no se añade ‘Betsabé’ porque eso vendría del contexto, no de este versículo.
- source_word: וְלָמָה
  english_pob_choice: Why
  chosen_spanish: ¿y por qué
  alternatives_spanish:
  - ¿por qué
  - ¿y por qué entonces
  lexicon: HALOT
  rationale: Se conserva el matiz conjuntivo de וְ con ‘y’, porque refuerza la continuidad y el tono retórico de la reprensión.
- source_word: אַתְּ שֹׁאֶלֶת
  english_pob_choice: are you asking
  chosen_spanish: estás pidiendo
  alternatives_spanish:
  - estás preguntando
  - pides
  lexicon: HALOT
  rationale: Aquí שׁאל tiene el sentido de solicitar una cosa. ‘Pidiendo’ expresa mejor el acto de solicitar que ‘preguntando’ en español.
- source_word: אֶת אֲבִישַׁג הַשֻּׁנַמִּית
  english_pob_choice: Abishag the Shunammite
  chosen_spanish: Abisag la sunamita
  alternatives_spanish:
  - Abisag de Sunem
  lexicon: HALOT
  rationale: La gentilicia se vierte con el equivalente más natural y reconocible en español bíblico, sin perder la identificación étnico-geográfica.
- source_word: לַאֲדֹנִיָּהוּ
  english_pob_choice: for Adonijah
  chosen_spanish: para Adonías
  alternatives_spanish:
  - en favor de Adonías
  lexicon: HALOT
  rationale: La preposición indica beneficiario de la solicitud; ‘para Adonías’ mantiene esa relación de forma concisa y fiel.
- source_word: וְשַׁאֲלִי ל/וֹ
  english_pob_choice: Ask for him as well
  chosen_spanish: Pídele también
  alternatives_spanish:
  - Pide también por él
  - Pídeselo también
  lexicon: HALOT
  rationale: El imperativo con ל/וֹ se entiende como pedir algo para él. En español, ‘Pídele también’ conserva el añadido irónico y la dirección del ruego.
- source_word: אֶת הַמְּלוּכָה
  english_pob_choice: the kingship
  chosen_spanish: el reino[a]
  alternatives_spanish:
  - la realeza[a]
  - la monarquía[a]
  - el reinado[a]
  lexicon: HALOT
  rationale: Se eligió ‘el reino’ por ser la forma más transparente en español para el derecho/poder real implicado. Se mantiene la nota porque el hebreo puede abarcar la autoridad dinástica o el dominio real, no solo el territorio.
- source_word: כִּי הוּא אָחִי הַגָּדוֹל מִמֶּנִּי
  english_pob_choice: since he is my older brother
  chosen_spanish: porque él es mi hermano mayor
  alternatives_spanish:
  - pues él es mi hermano mayor
  - ya que él es mi hermano mayor
  lexicon: HALOT
  rationale: ‘Hermano mayor’ comunica el criterio de primacía por nacimiento en español estándar, preservando la razón que da Salomón.
- source_word: וְלוֹ וּלְאֶבְיָתָר הַכֹּהֵן וּלְיוֹאָב בֶּן צְרוּיָה
  english_pob_choice: —and for him, for Abiathar the priest, and for Joab son of Zeruiah!
  chosen_spanish: y para él, para Abiatar el sacerdote y para Joab hijo de Sarvia
  alternatives_spanish:
  - y para él, para Abiatar el sacerdote y para Joab hijo de Zeruiah
  - y para él, para el sacerdote Abiatar y para Joab hijo de Sarvia
  lexicon: HALOT
  rationale: Se preserva la enumeración enfática y el paralelismo hebreo. El nombre patronímico se vierte de manera habitual como ‘hijo de Sarvia’.
- source_word: בֶּן צְרוּיָה
  english_pob_choice: son of Zeruiah
  chosen_spanish: hijo de Sarvia
  alternatives_spanish:
  - hijo de Zeruiah
  lexicon: HALOT
  rationale: ‘Sarvia’ es la forma castellana más establecida del nombre propio en esta tradición de traducción bíblica.
theological_decisions:
- issue: La implicación política de la petición de Abisag
  english_pob_reading: Render Solomon's response as implying that requesting Abishag amounts to seeking royal authority.
  chosen_spanish_reading: Traducir הַמְּלוּכָה como ‘el reino’ y conservar la advertencia implícita de que la petición de Abisag equivale a una pretensión real.
  alternative_spanish_readings:
  - dejar la implicación solo implícita sin aclarar el valor de הַמְּלוּכָה
  - traducir ‘la realeza’ o ‘el reinado’
  rationale: El hebreo vincula explícitamente la petición de Abisag con la de ‘el reino’. ‘El reino’ es idiomático en español y permite que el lector perciba la carga dinástica sin una paráfrasis interpretativa excesiva.
  doctrine_reference: Translation philosophy §§1, 3 y 6
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó el ‘And’ inicial antes de ‘why’ por naturalidad; en español se resolvió con ‘¿Y por qué...?’ para mantener el tono retórico sin sonar rígido. También se conservó la enumeración final como continuación enfática, en línea con la revisión inglesa que mantiene la repetición de ‘for’.
  spanish_consistency_notes:
  - Se mantiene ‘Abisag’, ‘Abiatar’ y ‘Sarvia’ como formas castellanas coherentes con uso bíblico tradicional, sin sustituir arbitrariamente por transliteraciones inglesas.
  - Se usa ‘el reino’ para הַמְּלוּכָה, en continuidad con el sentido político-dinástico señalado por la POB en inglés.
  - Se evita añadir ‘Betsabé’ porque el hebreo solo dice ‘su madre’.
