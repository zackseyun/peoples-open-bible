revisions:
- from: Las misericordias[a] de Yahvé nunca cesan; sus compasiones nunca se agotan.
  to: El amor fiel[a] de Yahvé nunca cesa; sus misericordias nunca se agotan.
  rationale: Se corrige חַסְדֵי a 'amor fiel' para reflejar la decisión auditada de 'steadfast love' y preservar el matiz de lealtad de pacto, dejando רַחֲמָיו como 'misericordias'. También se reescribe la nota para que el español exprese de forma natural y fiel la alternativa tradicional derivada de la vocalización hebrea. No se requiere adjudicación adicional porque la revisión sigue directamente la evidencia fuente y la auditoría inglesa.
