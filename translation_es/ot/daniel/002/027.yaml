translation:
  language: es
  text: 'Daniel respondió ante el rey y dijo[a]: «El misterio que el rey pregunta, ni los sabios, los encantadores[b], los magos ni los adivinos pueden darlo a conocer al rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contestó».
    reason: lexical_alternative
  - marker: b
    text: O «astrólogos». El término designa una clase técnica de especialistas babilónicos; la designación exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En español, «respondió» conserva el valor narrativo de introducir la réplica en un marco de diálogo formal. «Contestó» también sería posible, pero «respondió» suena ligeramente más elevado y natural en este contexto de corte.
- source_word: קֳדָם
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: 'La idea es relacional y de corte: Daniel habla en la presencia del rey. «Delante de» es claro y idiomático; «ante» también funcionaría, pero «delante de» conserva bien la escena sin sonar rígido.'
- source_word: רָזָה
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: HALOT
  rationale: Se mantiene «misterio» para reflejar la terminología repetida de Daniel y la carga temática de una realidad oculta que solo Dios da a conocer. «Secreto» es una alternativa válida, pero en español debilita un poco la resonancia teológica del término en este capítulo.
- source_word: דִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - lo que
  lexicon: HALOT
  rationale: La partícula relativa se vierte naturalmente con «que» en español, sin perder la relación entre «misterio» y la cláusula siguiente.
- source_word: שָׁאֵל
  english_pob_choice: asks
  chosen_spanish: pregunta
  alternatives_spanish:
  - ha preguntado
  - pide
  lexicon: HALOT
  rationale: En la frase relativa, el presente «pregunta» reproduce bien el sentido de la petición en curso. «Ha preguntado» sería posible, pero menos directo; «pide» desplaza el matiz hacia solicitud más que interrogación.
- source_word: חַכִּימִין
  english_pob_choice: wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los sabios consejeros
  lexicon: HALOT
  rationale: Se conserva la categoría técnica del relato en una forma breve y reconocible. «Los sabios» suena natural en español y mantiene el grupo especializado del entorno babilónico.
- source_word: אָשְׁפִין
  english_pob_choice: enchanters
  chosen_spanish: los encantadores
  alternatives_spanish:
  - los hechiceros
  - los astrólogos
  lexicon: HALOT
  rationale: Se prefiere una equivalencia funcional que distinga este grupo de los demás especialistas. «Encantadores» sigue la solución inglesa y preserva el campo de prácticas ocultas sin afirmar más de lo que el término permite.
- source_word: חַרְטֻמִּין
  english_pob_choice: magicians
  chosen_spanish: los magos
  alternatives_spanish:
  - los magos rituales
  - los hechiceros
  lexicon: HALOT
  rationale: «Magos» es el equivalente español más estable para esta clase de especialistas ocultistas en el contexto bíblico. Se evita «hechiceros» para no confundirlo con el término anterior y conservar la distinción entre categorías.
- source_word: גָּזְרִין
  english_pob_choice: diviners
  chosen_spanish: los adivinos
  alternatives_spanish:
  - los adivinadores
  - los soothsayers
  lexicon: HALOT
  rationale: «Adivinos» expresa bien la función de discernir o pronunciar asuntos ocultos. Aunque «adivinadores» existe, es menos idiomático; «soothsayers» no se usa como forma natural en español.
- source_word: יָכְלִין
  english_pob_choice: are able
  chosen_spanish: pueden
  alternatives_spanish:
  - son capaces de
  - logran
  lexicon: HALOT
  rationale: «Pueden» comunica capacidad de manera directa y natural. «Son capaces de» sería más explícito, pero más pesado; «logran» añadiría un matiz de éxito que no está en el término.
- source_word: לְהַחֲוָיָה
  english_pob_choice: to make known
  chosen_spanish: darlo a conocer
  alternatives_spanish:
  - hacerlo saber
  - revelarlo
  lexicon: HALOT
  rationale: El causativo arameo implica hacer conocido algo oculto. «Darlo a conocer» conserva el sentido de divulgación sin añadir solemnidad excesiva; «revelarlo» sería posible, pero tiende a teologizar más el verbo que el hebreo/arameo mismo.
- source_word: לְמַלְכָּא
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - para el rey
  - ante el rey
  lexicon: HALOT
  rationale: Es el destinatario directo de la comunicación, por eso «al rey» es la forma más natural. Se distingue de la frase anterior «delante de», que sí expresa posición/presencia.
theological_decisions:
- issue: Cómo traducir רָזָה en Daniel para mantener la tensión entre 'misterio' y 'secreto'.
  english_pob_reading: The mystery that the king asks, with a note that 'secret' is an alternative; 'mystery' preserves the chapter's repeated theme of a hidden matter disclosed only by God.
  chosen_spanish_reading: «El misterio que el rey pregunta» mantiene la lectura temática de algo oculto que solo Dios puede dar a conocer.
  alternative_spanish_readings:
  - «El secreto que el rey pregunta»
  - «La cosa oculta que el rey pregunta»
  rationale: En Daniel 2 el término reaparece como un leitmotiv. «Misterio» conserva mejor esa densidad literaria y teológica en español, mientras que «secreto» puede sonar más cotidiano y menos cargado de revelación divina.
  doctrine_reference: Daniel 2:18-19, 22, 28-30, 47; cf. revelación divina de lo oculto.
translation_notes:
  revision_awareness: Se ha mantenido la lectura de alta concordancia con el audit trail inglés, sin cambios de revisión relevantes; la versión española sigue la misma decisión central de preservar «misterio» para רָזָה y distinguir las categorías de especialistas babilónicos.
  spanish_consistency_notes:
  - Se preserva la distinción entre «delante de» (presencia/corte) y «al rey» (destinatario).
  - Se evita usar «SEÑOR» o «Cristo», no pertinentes en este versículo.
  - «Misterio» se mantiene como término temático consistente con Daniel 2 en la traducción POB.
