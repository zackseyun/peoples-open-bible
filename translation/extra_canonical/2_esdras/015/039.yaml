  from: and the cloud that he raised up in wrath, and the star appointed to bring destruction toward east and west, will be thrown into confusion.
  to: along with the cloud that he raised up in wrath; and the star appointed to bring destruction will be violently assailed by the east wind, the south wind, and the west wind.
  rationale: The Latin 'nubem' is accusative, making it the object of the active verb 'recludent' ('they will shut it in, and the cloud...'), not the subject of the passive 'violabitur'. Additionally, the draft omits 'notum' (the south wind) entirely and translates 'ab' as 'toward'. With the passive 'violabitur', 'ab' indicates agency or source ('by' or 'from'). The phrase 'ab orientalem notum et occidentem' (using Late Latin 'ab' + accusative) means 'by the east wind, the south wind, and the west wind'.
