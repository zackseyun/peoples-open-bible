translation:
  language: es
  text: Mira[a], las rampas de asedio han avanzado contra la ciudad para capturarla, y la ciudad ha sido entregada en mano de los caldeos[b], que pelean contra ella, a causa de la espada, el hambre y la peste[c]. Lo que hablaste ha sucedido, y mira, lo ves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las obras de asedio» o «los terraplenes». El hebreo se refiere a construcciones de tierra levantadas para asaltar una ciudad.
    reason: lexical_alternative
  - marker: b
    text: O «los babilonios». El hebreo dice «los caldeos», el pueblo identificado con el poder neobabilónico.
    reason: lexical_alternative
  - marker: c
    text: O «mortandad» o «pestilencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una apelación viva a la atención. «Mira» es natural en español moderno y conserva la inmediatez mejor que una forma más arcaica como «He aquí».
- source_word: הַסֹּלְלוֹת
  english_pob_choice: the siege ramps
  chosen_spanish: las rampas de asedio
  alternatives_spanish:
  - las obras de asedio
  - los terraplenes
  - las empalizadas de asedio
  lexicon: HALOT
  rationale: En contexto militar, סֹלְלוֹת se refiere a terraplenes o rampas elevadas construidas para atacar una ciudad. «Rampas de asedio» es concreto y claro en español.
- source_word: בָּאוּ ... הָעִיר
  english_pob_choice: have come up against the city
  chosen_spanish: han llegado contra la ciudad
  alternatives_spanish:
  - han venido contra la ciudad
  - han avanzado hasta la ciudad
  - han subido contra la ciudad
  lexicon: HALOT
  rationale: El sentido es el avance de las rampas/obras contra la ciudad en el asedio. «Han llegado contra» preserva la orientación hostil sin forzar un calco poco natural.
- source_word: לְלָכְדָהּ
  english_pob_choice: to capture it
  chosen_spanish: para capturarla
  alternatives_spanish:
  - para tomarla
  - para apoderarse de ella
  lexicon: HALOT
  rationale: לכד expresa capturar o tomar por la fuerza, especialmente una ciudad. «Capturarla» mantiene la fuerza militar del verbo.
- source_word: נִתְּנָה בְּיַד
  english_pob_choice: has been given into the hand of
  chosen_spanish: ha sido entregada en manos de
  alternatives_spanish:
  - ha sido puesta en manos de
  - ha sido entregada al poder de
  - ha caído en manos de
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de entrega al poder del enemigo. «En manos de» conserva el giro idiomático y su carga de dominio.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se preserva el etnónimo directo del hebreo. Aunque históricamente se identifica con el poder neobabilónico, el texto nombra «los caldeos».
- source_word: הַנִּלְחָמִים עָלֶיהָ
  english_pob_choice: who are fighting against it
  chosen_spanish: que pelean contra ella
  alternatives_spanish:
  - que luchan contra ella
  - que guerrean contra ella
  - que combaten contra ella
  lexicon: HALOT
  rationale: El participio indica acción hostil en curso. «Pelean contra ella» es fiel, natural y mantiene el aspecto progresivo.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - por motivo de
  lexicon: HALOT
  rationale: Aquí introduce la causa de la caída de la ciudad. «A causa de» es idiomático y claro en español.
- source_word: הַחֶרֶב וְהָרָעָב וְהַדָּבֶר
  english_pob_choice: the sword and the famine and the plague
  chosen_spanish: la espada, del hambre y de la peste
  alternatives_spanish:
  - la espada, el hambre y la peste
  - la espada, el hambre y la plaga
  - la espada, el hambre y la mortandad
  lexicon: HALOT
  rationale: Se conserva la triada de juicio. «Peste» corresponde bien al valor de דָּבֶר y mantiene el registro bíblico sin recurrir innecesariamente a una palabra más técnica.
- source_word: וַאֲשֶׁר דִּבַּרְתָּ הָיָה
  english_pob_choice: What you spoke has happened
  chosen_spanish: Lo que hablaste ha sucedido
  alternatives_spanish:
  - Lo que dijiste ha sucedido
  - Lo que hablaste ha venido a ser
  - Lo que pronunciaste se ha cumplido
  lexicon: HALOT
  rationale: La frase afirma el cumplimiento de la palabra previa. «Ha sucedido» comunica realización efectiva sin añadir explicación interpretativa.
- source_word: וְהִנְּךָ רֹאֶה
  english_pob_choice: and look, you see it
  chosen_spanish: y mira, tú lo ves
  alternatives_spanish:
  - y mira, lo ves
  - y aquí estás viéndolo
  - y he aquí que lo ves
  lexicon: HALOT
  rationale: Se preserva la segunda apelación deíctica y la observación directa. El pronombre explícito «tú» refuerza el énfasis del hebreo sin alterar el sentido.
theological_decisions:
- issue: Cómo reflejar la tríada de juicio sin neutralizar su fuerza
  english_pob_reading: the sword and the famine and the plague
  chosen_spanish_reading: la espada, del hambre y de la peste
  alternative_spanish_readings:
  - la espada, el hambre y la peste
  - la espada, el hambre y la plaga
  rationale: La secuencia expresa juicio histórico concreto, no solo catástrofe genérica. Se mantiene la triada y el tono solemne; «peste» conserva el peso bíblico de דָּבֶר sin diluirlo.
  doctrine_reference: Mantener la tensión lexical del juicio divino en el texto, sin suavizarla con paráfrasis devocional.
- issue: Preservación del etnónimo frente a una equivalencia contextual
  english_pob_reading: the Chaldeans
  chosen_spanish_reading: los caldeos
  alternative_spanish_readings:
  - los babilonios
  rationale: El hebreo nombra a los caldeos; aunque el contexto histórico remite al poder neobabilónico, el texto no usa el etnónimo equivalente contextual. Se conserva la forma directa en el cuerpo del versículo.
  doctrine_reference: Respeto por la designación del texto fuente y por la trazabilidad exegética.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, manteniendo el valor de los deícticos, el etnónimo «caldeos» y la tríada de juicio. No se requirieron revisiones previas adicionales; la redacción española ajusta la naturalidad sintáctica sin perder la literalidad semántica.
  spanish_consistency_notes:
  - Se usa «Mira» para הִנֵּה, en línea con el POB inglés «Look», evitando arcaísmo.
  - Se conserva «en manos de» como equivalente idiomático de בְּיַד.
  - «Peste» se mantiene como opción principal para דָּבֶר, con nota de alternativas por la ambigüedad lexical.
  - 'La puntuación reproduce la progresión del hebreo: deíctico, escena de asedio, entrega de la ciudad y afirmación de cumplimiento.'
