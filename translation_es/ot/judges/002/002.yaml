translation:
  language: es
  text: Y ustedes no debían hacer un pacto con los habitantes de esta tierra; debían derribar sus altares[a]. Pero no han escuchado mi voz. ¿Qué es esto que han hecho?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'cortar un pacto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִכְרְתוּ בְרִית
  english_pob_choice: make a covenant
  chosen_spanish: hacer pacto
  alternatives_spanish:
  - cortar pacto
  - hacer alianza
  - concertar un pacto
  lexicon: HALOT
  rationale: El hebreo usa el giro literal 'cortar' con 'pacto', pero en español 'hacer pacto' comunica de forma natural la obligación de alianza y conserva la carga bíblica de בְּרִית sin forzar un calco. 'Alianza' es posible, pero 'pacto' mantiene mejor el campo semántico jurídico-covenantal del texto.
- source_word: לְיֹשְׁבֵי הָאָרֶץ הַזֹּאת
  english_pob_choice: with the inhabitants of this land
  chosen_spanish: con los habitantes de esta tierra
  alternatives_spanish:
  - con los que habitan esta tierra
  - con los residentes de esta tierra
  lexicon: HALOT
  rationale: '''Habitantes'' refleja bien el sustantivo participial y suena natural en español. ''Esta tierra'' conserva el demostrativo del hebreo y evita suavizar la referencia geográfica concreta.'
- source_word: מִזְבְּחוֹתֵיהֶם תִּתֹּצוּן
  english_pob_choice: you were to tear down their altars
  chosen_spanish: debían derribar sus altares
  alternatives_spanish:
  - debían demoler sus altares
  - debían destruir sus altares
  - tenían que derribar sus altares
  lexicon: HALOT
  rationale: נתץ se usa para derribar o demoler estructuras; 'derribar' es vivo y fiel para altares. 'Debían' reproduce el valor retrospectivo de la reprensión, como una obligación ya dada.
- source_word: וְלֹא שְׁמַעְתֶּם בְּקֹלִי
  english_pob_choice: But you have not listened to my voice
  chosen_spanish: Pero no han escuchado mi voz
  alternatives_spanish:
  - Pero no me han escuchado
  - Y no han escuchado mi voz
  - Pero no han obedecido mi voz
  lexicon: HALOT
  rationale: שמע con בְּקוֹל puede implicar escuchar con obediencia. 'Escuchado mi voz' mantiene el eco hebreo y deja visible la dimensión de desobediencia por el contexto; 'han' presenta la culpa como vigente ante la reprensión.
- source_word: מַה זֹּאת עֲשִׂיתֶם
  english_pob_choice: What is this you have done?
  chosen_spanish: ¿Qué es esto que han hecho?
  alternatives_spanish:
  - ¿Qué han hecho?
  - ¿Por qué han hecho esto?
  - ¿Qué cosa es esta que han hecho?
  lexicon: HALOT
  rationale: La pregunta hebrea es una fórmula de reproche y conmoción, literalmente cercana a '¿Qué es esto que han hecho?'. Esa estructura conserva mejor el tono de amonestación que una forma más lisa como '¿Qué han hecho?'.
- source_word: וְאַתֶּם לֹא ... תִּכְרְתוּ ... תִּתֹּצוּן
  english_pob_choice: And you were not to make ... you were to tear down
  chosen_spanish: Y ustedes no debían hacer ... debían derribar
  alternatives_spanish:
  - Y ustedes no deben hacer ... deben derribar
  - Ustedes no debían hacer ... debían derribar
  - Y no debían hacer ... debían derribar
  lexicon: Hebrew grammar
  rationale: Los imperfectos remiten al mandato previo y encajan con la reprensión retrospectiva. 'Debían' hace visible que se está recordando una orden ya dada, en vez de formular una simple instrucción presente.
theological_decisions:
- issue: Terminología del pacto en la prohibición divina contra la alianza con los habitantes de la tierra
  english_pob_reading: make a covenant
  chosen_spanish_reading: hacer pacto
  alternative_spanish_readings:
  - hacer alianza
  - concertar un pacto
  rationale: '''Pacto'' conserva la categoría teológica bíblica de בְּרִית y evita reducir el texto a mera diplomacia o tratado político. En español, ''hacer pacto'' comunica la prohibición con claridad y mantiene la fuerza covenantal del pasaje.'
  doctrine_reference: Teología del pacto / alianza en el Antiguo Testamento
translation_notes:
  revision_awareness: La comparación con el audit trail inglés muestra alta concordancia y sin cambios sustantivos en la última revisión; se mantuvo la equivalencia óptima con una sola nota lexical para el giro idiomático de בְּרִית.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; aquí no aparece explícitamente.
  - Se usó 'pacto' en vez de 'treaty' o 'alianza' como término principal para conservar la carga bíblico-teológica documentada.
  - Se preservó el matiz retrospectivo de mandato incumplido con 'debían' en lugar de un imperativo desnudo.
