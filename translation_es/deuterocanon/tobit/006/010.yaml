translation:
  language: es
  text: Y cuando se acercaron a Ragés[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre propio geográfico; el griego Ῥάγῃ se refiere a la ciudad de Rages, también escrita Rhages en algunas tradiciones inglesas.
