translation:
  language: es
  text: Deja a tus hijos sin padre[a]; yo los mantendré con vida. Y que tus viudas confíen en mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus huérfanos». El término hebreo se refiere específicamente a los que no tienen padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָזְבָה
  english_pob_choice: Leave
  chosen_spanish: Deja
  alternatives_spanish:
  - Abandona
  - Suelta
  - Deja atrás
  lexicon: HALOT
  rationale: El imperativo qal de עזב expresa una orden directa. En español, «deja» comunica con naturalidad la instrucción y evita cargar el texto con una dureza mayor de la que exige el hebreo. Mantiene la fuerza imperativa sin volverse mecanicista.
- source_word: יְתֹמֶיךָ
  english_pob_choice: your fatherless children
  chosen_spanish: a tus hijos sin padre
  alternatives_spanish:
  - a tus huérfanos
  - a tus hijos huérfanos
  - a los hijos sin padre
  lexicon: HALOT
  rationale: El término hebreo se refiere específicamente a los que han perdido al padre, no necesariamente a ambos padres. «Hijos sin padre» conserva ese matiz mejor que «huérfanos», que en español suele sugerir orfandad plena. Se mantiene el valor social y familiar del sustantivo hebreo.
- source_word: אֲחַיֶּה
  english_pob_choice: will keep them alive
  chosen_spanish: les daré vida
  alternatives_spanish:
  - los mantendré con vida
  - los haré vivir
  - los preservaré con vida
  lexicon: HALOT
  rationale: 'El piʿel de חיה tiene valor causativo: hacer vivir, preservar la vida. «Les daré vida» transmite ese causativo con naturalidad en español y conserva la promesa divina de vida, sin sobreexplicar.'
- source_word: וְאַלְמְנֹתֶיךָ
  english_pob_choice: And let your widows
  chosen_spanish: Y tus viudas
  alternatives_spanish:
  - Y que tus viudas
  - Y en cuanto a tus viudas
  - Y tus viudas, por su parte
  lexicon: HALOT
  rationale: 'El hebreo une la segunda cola con la primera mediante וְ y un verbo de confianza en segunda persona plural. En español, puede expresarse de forma fluida con sujeto explícito: «Y tus viudas...», dejando que el verbo futuro preserve el sentido exhortativo o declarativo.'
- source_word: עָלַי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - sobre mí
  - en torno a mí
  lexicon: HALOT
  rationale: Con בטח, עַל marca el objeto de confianza; en español, la locución establecida es «confiar en mí». Se traduce «en mí» porque es idiomático y fiel al valor relacional del complemento.
- source_word: תִּבְטָחוּ
  english_pob_choice: trust
  chosen_spanish: confiarán
  alternatives_spanish:
  - confiarán de verdad
  - pondrán su confianza
  - se fiarán
  lexicon: HALOT
  rationale: El imperfecto de בטח expresa aquí confianza futura o exhortada. En español, el futuro «confiarán» reproduce bien esa expectativa. Se evita «se fiarán», que es más coloquial y puede sonar menos reverente.
theological_decisions:
- issue: Quién habla y qué tipo de promesa se expresa
  english_pob_reading: The speaker is the LORD, promising protection for Edom's vulnerable survivors.
  chosen_spanish_reading: Habla Yahvé, prometiendo dar vida a los huérfanos y sostener la confianza de las viudas.
  alternative_spanish_readings:
  - Un oráculo impersonal de protección
  - Una afirmación general de cuidado sin identificar al hablante
  rationale: 'El contexto de Jeremías 49 es un oráculo de Yahvé contra Edom. La traducción debe conservar la voz divina implícita sin introducir ampliaciones doctrinales. «Yo les daré vida» mantiene la promesa directa y la tensión del pasaje: juicio contra Edom junto con una nota explícita de misericordia hacia los vulnerables.'
  doctrine_reference: Jeremías 49:1–22; principio de mantener la identificación del hablante según el contexto profético.
translation_notes:
  revision_awareness: El inglés POB ya había resuelto el hebreo יְתֹמֶיךָ con «your fatherless children» y anotado la alternativa «orphans». La versión española mantiene esa misma decisión léxica de fondo, pero la formula con un español natural y transparente, conservando el matiz de padrelessness. También respeta la lectura de promesa directa con un futuro español en la segunda cola.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el hablante divino por consistencia con el criterio del proyecto.
  - Se evita «SEÑOR» como máscara y no se introduce «Cristo» ni terminología ajena al texto.
  - «Confiarán en mí» mantiene la construcción relacional exigida por עַל + בטח en un español idiomático.
  - La cláusula «les daré vida» conserva el valor causativo del piʿel sin añadir explicaciones interpretativas.
