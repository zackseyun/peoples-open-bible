translation:
  language: es
  text: entonces la llevarás a tu casa, y ella se rapará la cabeza y se cortará las uñas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y dejará crecer sus uñas». El hebreo literalmente dice: «y hará sus uñas», una expresión idiomática y debatida.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַהֲבֵאתָהּ
  english_pob_choice: then you shall bring her
  chosen_spanish: entonces la llevarás
  alternatives_spanish:
  - y la llevarás
  - entonces deberás llevarla
  lexicon: HALOT
  rationale: El hebreo con waw consecutiva en discurso legal expresa una acción siguiente dentro de la secuencia. En español, «entonces» conserva ese valor secuencial, y «la llevarás» mantiene el mandato sin volverlo más rígido de lo necesario.
- source_word: אֶל תּוֹךְ בֵּיתֶךָ
  english_pob_choice: into your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - dentro de tu casa
  - al interior de tu casa
  lexicon: HALOT
  rationale: Aunque תּוֹךְ puede enfatizar el interior, el POB revisado decidió que «into your house» es más natural y preciso que una formulación más marcada. En español, «a tu casa» comunica el destino de manera idiomática sin añadir una precisión espacial que el contexto inmediato no exige.
- source_word: וְגִלְּחָה אֶת רֹאשָׁהּ
  english_pob_choice: and she shall shave her head
  chosen_spanish: y ella se rapará la cabeza
  alternatives_spanish:
  - y se afeitará la cabeza
  - y se rasurará la cabeza
  lexicon: HALOT
  rationale: גלח denota rapar/afeitar. «Raparse la cabeza» es claro en español moderno y conserva la acción concreta mejor que una paráfrasis. Mantiene además el carácter corpóreo y ritual del mandato.
- source_word: וְעָשְׂתָה אֶת צִפָּרְנֶיהָ
  english_pob_choice: and trim her nails
  chosen_spanish: y se cortará las uñas
  alternatives_spanish:
  - y se arreglará las uñas
  - y dejará crecer las uñas
  - y se las hará
  lexicon: HALOT
  rationale: עשה con צִפָּרְנַיִם es idiomático y debatido. El POB en inglés opta por «trim her nails» como lectura principal, preservando en nota la alternativa de «let her nails grow». En español, «cortarse las uñas» es la manera natural de expresar el sentido principal de «trim» y evita una formulación ambigua o extraña como «hacerse las uñas».
theological_decisions:
- issue: Ambigüedad de וְעָשְׂתָה אֶת צִפָּרְנֶיהָ
  english_pob_reading: The woman is instructed to trim/attend her nails, while the alternative reading 'let her nails grow' is preserved in a footnote.
  chosen_spanish_reading: La mujer se entiende instruida a cortarse las uñas, con la alternativa «dejar crecer las uñas» preservada en nota.
  alternative_spanish_readings:
  - dejar crecer las uñas
  - arreglarse las uñas
  rationale: El hebreo es idiomático y no totalmente explícito. Para no resolver indebidamente la tensión, el texto principal adopta la lectura más natural y el aparato conserva la alternativa reconocida por el POB en inglés. Esto preserva la transparencia textual y la honestidad exegética.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del POB en inglés, que prefirió «into your house» frente a «into the midst of your house» por ser más natural y exacto. La versión española refleja esa decisión con «a tu casa», evitando una intensificación espacial no respaldada por la revisión final.
  spanish_consistency_notes:
  - Se mantiene «tu casa» como equivalente natural de la revisión inglesa final y no se introduce «interior» o «medio» sin apoyo textual.
  - «Rapará» y «se cortará» conservan el tono legal concreto del hebreo sin recurrir a formulaciones eclesiásticas ajenas al texto.
  - La nota conserva la ambigüedad del último miembro, siguiendo el patrón POB de no cerrar el debate interpretativo cuando el hebreo es idiomático.
