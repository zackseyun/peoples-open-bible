translation:
  language: es
  text: Cuando sea juzgado, salga culpable[a], y su oración se convierta en pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando sea probado, salga como impío». El hebreo רָשָׁע puede significar «impío» o «malvado», pero en este contexto de tribunal probablemente expresa «culpable».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y su oración sea contada como pecado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהִשָּׁפְטוֹ
  english_pob_choice: When he is judged
  chosen_spanish: Cuando sea juzgado
  alternatives_spanish:
  - Cuando lo juzguen
  - En su juicio
  - Cuando venga a juicio
  lexicon: HALOT
  rationale: El infinitivo nifal con ב expresa un marco temporal y judicial. «Cuando sea juzgado» conserva el valor pasivo y la escena forense con un español natural y digno.
- source_word: יֵצֵא
  english_pob_choice: let him come out
  chosen_spanish: salga
  alternatives_spanish:
  - saldrá
  - que salga
  - que vaya a salir
  lexicon: HALOT
  rationale: En este contexto judicial, יצא alude al resultado del proceso. El subjuntivo exhortativo «salga» refleja mejor la fuerza de deseo/imprecación que un futuro simple.
- source_word: רָשָׁע
  english_pob_choice: guilty
  chosen_spanish: culpable
  alternatives_spanish:
  - impío
  - malvado
  - en el error
  lexicon: HALOT
  rationale: Aunque רָשָׁע suele significar «malvado/impío», en un marco de juicio forense puede designar el veredicto adverso. «Culpable» preserva esa tensión jurídica.
- source_word: וּתְפִלָּתוֹ
  english_pob_choice: and let his prayer
  chosen_spanish: y su oración
  alternatives_spanish:
  - y que su oración
  - y su plegaria
  lexicon: HALOT
  rationale: תְּפִלָּה se traduce naturalmente por «oración» en español. La coordinación mantiene el paralelismo con la primera cláusula sin añadir más explicación que la requerida por el español.
- source_word: תִּהְיֶה
  english_pob_choice: become
  chosen_spanish: se convierta
  alternatives_spanish:
  - sea
  - llegue a ser
  - termine siendo
  lexicon: HALOT
  rationale: היה con ל expresa resultado o transformación. «Se convierta» comunica con claridad el cambio de estado y preserva la progresión del hebreo.
- source_word: לַחֲטָאָה
  english_pob_choice: sin
  chosen_spanish: en pecado
  alternatives_spanish:
  - como pecado
  - por pecado
  - en culpa
  lexicon: HALOT
  rationale: 'חֲטָאָה normalmente significa «pecado». La preposición ל puede expresarse de manera idiomática con «en» para mantener el sentido de resultado: su oración pasa a ser pecaminosa.'
theological_decisions:
- issue: Fuerza jussiva/imprecatoria de los verbos
  english_pob_reading: 'Render as jussive-like petition: ''let him come out... let his prayer become...'''
  chosen_spanish_reading: 'Traducir con subjuntivo exhortativo: «salga... se convierta...»'
  alternative_spanish_readings:
  - saldrá... se convertirá...
  - que salga... que se convierta...
  rationale: El salmo es una imprecación; por eso conviene conservar la fuerza de petición y no convertirla en simple futuro narrativo. El subjuntivo en español reproduce bien esa tensión sin sobreexplicar.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje fue revisado en la etapa más reciente sin cambios sustanciales; el acuerdo de revisión fue alto y unánime, así que esta redacción sigue de cerca la solución auditada en inglés, adaptándola al español con la misma lectura judicial e imprecatoria.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como terminología estándar del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «oración» para תְּפִלָּה por ser el término más natural y fiel en este contexto.
  - Se evitó «SEÑOR» o formulaciones litúrgicas que oculten la tensión forense del hebreo.
  - La puntuación mantiene el paralelismo de dos miembros con cadencia poética breve.
