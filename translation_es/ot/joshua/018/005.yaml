translation:
  language: es
  text: Y la dividirán en siete porciones. Judá se mantendrá en su límite por el sur[a], y la casa de José se mantendrán en sus límites por el norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Se mantendrá» / «se mantendrán» refleja el valor idiomático de «estar / permanecer fijo» del verbo hebreo עמד en un contexto de fronteras; también puede entenderse como «estará» / «estarán» o «quedará» / «quedarán» en su límite o sus límites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְחַלְּקוּ אֹתָהּ
  english_pob_choice: And they shall divide it
  chosen_spanish: Y la dividirán
  alternatives_spanish:
  - Y la repartirán
  - Y la distribuirán
  lexicon: HALOT
  rationale: El hitpael de חלק expresa aquí la acción de dividir o repartir la tierra. En español, 'dividirán' comunica con naturalidad la acción de asignar porciones sin añadir explicaciones no presentes en el hebreo.
- source_word: לְשִׁבְעָה חֲלָקִים
  english_pob_choice: into seven portions
  chosen_spanish: en siete partes
  alternatives_spanish:
  - en siete porciones
  - en siete repartos
  lexicon: HALOT
  rationale: חֲלָקִים indica porciones divididas. 'Partes' es claro y natural en español; 'porciones' también sería posible, pero 'partes' evita sonar demasiado técnico sin perder el sentido de reparto territorial.
- source_word: יַעֲמֹד עַל גְּבוּל/וֹ
  english_pob_choice: shall stand at its border
  chosen_spanish: se mantendrá en su límite
  alternatives_spanish:
  - estará en su límite
  - se quedará en su límite
  lexicon: HALOT
  rationale: עמד literalmente es 'estar de pie', pero en este contexto territorial señala permanecer fijo en un límite establecido. 'Se mantendrá' conserva la idea de continuidad y el matiz de posición estable, sin forzar un calco de 'estará de pie'.
- source_word: מִנֶּגֶב
  english_pob_choice: on the south
  chosen_spanish: por el sur
  alternatives_spanish:
  - al sur
  - en el sur
  lexicon: HALOT
  rationale: Aquí la palabra funciona direccionalmente, no como nombre propio del Negev. 'Por el sur' conserva la orientación geográfica y el paralelismo con 'por el norte'.
- source_word: וּבֵית יוֹסֵף
  english_pob_choice: and the house of Joseph
  chosen_spanish: y la casa de José
  alternatives_spanish:
  - y la casa de José,
  - y la casa de José (es decir, las tribus de José)
  lexicon: HALOT
  rationale: '''Casa de José'' preserva el giro corporativo hebreo para el conjunto tribal. Aunque ''tribus de José'' podría aclarar, el hebreo usa la fórmula fija y conviene mantenerla.'
- source_word: יַעַמְד֥וּ עַל גְּבוּלָם
  english_pob_choice: shall stand at their border
  chosen_spanish: se mantendrá en su límite
  alternatives_spanish:
  - se mantendrán en su límite
  - estarán en su límite
  lexicon: HALOT
  rationale: El plural hebreo se refiere a la casa de José como colectivo; en español se puede conservar el sujeto singular colectivo implícito, como en 'la casa de José'. 'Se mantendrá' traduce el valor idiomático de עמד en un contexto de límites territoriales.
- source_word: מִצָּפוֹן
  english_pob_choice: on the north
  chosen_spanish: por el norte
  alternatives_spanish:
  - al norte
  - en el norte
  lexicon: HALOT
  rationale: Como con 'por el sur', se trata de un marcador direccional de ubicación territorial. 'Por el norte' mantiene la simetría estilística con la cláusula anterior.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que añadió el sujeto explícito 'they' y prefirió 'stand' frente a 'remain'. En español, el sujeto plural ya queda natural en 'la dividirán', y el verbo idiomático se expresa con 'se mantendrá' para conservar el matiz territorial del hebreo sin un calco rígido.
  spanish_consistency_notes:
  - Se conservó 'casa de José' como designación corporativa, en vez de convertirla en una paráfrasis explicativa.
  - Se mantuvo 'Yahvé' no requerido aquí porque el versículo no contiene el Tetragrámaton en la forma base leída para esta línea.
  - Se usó 'límite' para גְּבוּל por coherencia territorial y para evitar una metáfora más abstracta como 'territorio' donde el texto habla de borde/frontera.
  - La coordinación paralela 'por el sur / por el norte' refleja la simetría del hebreo.
