translation:
  language: es
  text: Entonces la mujer tomó una cubierta y la extendió sobre la boca del pozo, y esparció encima grano machacado[a], y no se supo nada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'extendió sobre ello grano'; el término hebreo puede referirse a grano machacado o triturado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'y ninguna cosa fue conocida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: אִשָּׁה puede significar 'mujer' o 'esposa'. En este contexto narrativo, el referente es la mujer de la casa ya introducida, y 'la mujer' es la opción más natural y menos interpretativa en español.
- source_word: הַמָּסָךְ
  english_pob_choice: a covering
  chosen_spanish: un cubrimiento
  alternatives_spanish:
  - una cubierta
  - un velo
  - una tela
  lexicon: HALOT
  rationale: מָסָךְ denota algo que cubre o hace de pantalla. 'Cubrimiento' conserva la idea funcional de un objeto colocado para cubrir, sin especificar indebidamente el material.
- source_word: עַל פְּנֵי הַבְּאֵר
  english_pob_choice: over the mouth of the well
  chosen_spanish: sobre la boca del pozo
  alternatives_spanish:
  - sobre la superficie del pozo
  - sobre el rostro del pozo
  lexicon: HALOT
  rationale: La expresión literal 'sobre la faz/superficie de' se adapta en español con naturalidad como 'sobre la boca del pozo', que comunica la abertura que fue tapada.
- source_word: וַתִּשְׁטַח
  english_pob_choice: scattered
  chosen_spanish: echó encima
  alternatives_spanish:
  - esparció
  - extendió
  - diseminó
  lexicon: HALOT
  rationale: El verbo שטח indica extender o esparcir. Con רִפוֹת como objeto, el gesto consiste en ponerlos sobre el cubrimiento para ocultarlo; 'echó encima' transmite bien la acción en español y evita una repetición pesada de 'esparció' junto con el sustantivo siguiente.
- source_word: הָרִפֹת
  english_pob_choice: crushed grain
  chosen_spanish: granos machacados
  alternatives_spanish:
  - grano machacado
  - granos triturados
  - granos molidos
  lexicon: HALOT
  rationale: רִפוֹת se refiere a productos de grano machacados o triturados. 'Granos machacados' conserva el detalle agrícola y la imagen de una capa dispuesta para disimular la cubierta.
- source_word: וְלֹא נוֹדַע דָּבָר
  english_pob_choice: and the matter was not known
  chosen_spanish: y no se supo nada
  alternatives_spanish:
  - y el asunto no fue conocido
  - y la cosa no se supo
  - y no se conoció el asunto
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice 'y no fue conocido cosa'. En español, 'no se supo nada' reproduce de modo natural el resultado de la ocultación sin perder la fuerza literal de la negación del conocimiento.
theological_decisions:
- issue: Ninguna tensión doctrinal directa; conservar el valor narrativo literal del cierre
  english_pob_reading: and the matter was not known
  chosen_spanish_reading: y no se supo nada
  alternative_spanish_readings:
  - y el asunto no fue conocido
  - y no se conoció el asunto
  rationale: El versículo describe una acción de ocultamiento exitosa. La traducción española mantiene el sentido narrativo sin añadir interpretación causal ni intensificar teológicamente el texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La base inglesa revisada cambió de una formulación más interpretativa ('so that nothing was known') a una más literal ('and the matter was not known'). Esta versión española sigue esa revisión con 'y no se supo nada', manteniendo el cierre descriptivo y evitando añadir finalidad explícita no expresada en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'pozo' para בְּאֵר, siguiendo el valor narrativo de una abertura tapada.
  - Se evitó 'SEÑOR' u otros términos teológicos ajenos porque el versículo no contiene nombres divinos ni títulos cristológicos.
  - '''Granos machacados'' conserva la ambigüedad útil del hebreo entre producto aplastado y grano extendido sobre la cubierta.'
