translation:
  language: es
  text: Ni su plata ni su oro podrán librarlos en el día de la ira de Yahvé[a], y en el fuego de sus celos[b] será consumida toda la tierra; porque él pondrá un fin completo, sí, repentino[c], a todos los habitantes de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toda la tierra' / 'todos los habitantes de la tierra' puede entenderse como 'todo el país' / 'todos los habitantes del país'. El hebreo אֶרֶץ puede significar 'tierra' o 'país'; aquí se adopta el sentido más amplio por el lenguaje abarcador del juicio.
    reason: alternative_reading
  - marker: b
    text: O 'en el fuego de su celo'. El término hebreo puede significar 'celos' o 'celo'; se conserva 'celos' para mantener la fuerza relacional y pactal del juicio divino.
    reason: lexical_alternative
  - marker: c
    text: O 'súbito' / 'inesperado'. La expresión hebrea es difícil; 'repentino' intenta reflejar el matiz de un final abrupto además de total.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם ... גַּם
  english_pob_choice: Neither ... nor
  chosen_spanish: Ni ... ni
  alternatives_spanish:
  - Tanto ... como
  - También ... también
  lexicon: HALOT
  rationale: La pareja negativa se expresa con naturalidad en español como 'ni ... ni', que conserva la exclusión enfática del hebreo con לֹא.
- source_word: כַּסְפָּם
  english_pob_choice: their silver
  chosen_spanish: su plata
  alternatives_spanish:
  - su dinero
  lexicon: HALOT
  rationale: En paralelo con 'su oro', el sentido material de כֶּסֶף es primario; 'plata' preserva la imagen de riqueza tangible incapaz de salvarlos.
- source_word: זְהָבָם
  english_pob_choice: their gold
  chosen_spanish: su oro
  alternatives_spanish:
  - su riqueza
  lexicon: HALOT
  rationale: Término material directo, paralelo a 'plata' para designar riqueza.
- source_word: יוּכַל לְהַצִּילָם
  english_pob_choice: will be able to deliver them
  chosen_spanish: podrán librarlos
  alternatives_spanish:
  - podrán salvarlos
  - podrán rescatarlos
  lexicon: HALOT
  rationale: '''Librar'' comunica bien la idea de liberar de peligro o juicio y mantiene un registro bíblico claro sin perder naturalidad en español. Se evita ''salvar'' por su posible carga soteriológica en contexto lector.'
- source_word: בְּיוֹם עֶבְרַת יְהוָה
  english_pob_choice: on the day of Yahweh’s wrath
  chosen_spanish: en el día de la ira de Yahvé
  alternatives_spanish:
  - en el día del furor de Yahvé
  - en el día de la cólera de Yahvé
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' por la política terminológica del proyecto. 'Ira' es el equivalente natural y fiel de עֶבְרָה en lenguaje profético de juicio.
- source_word: קִנְאָתֹו
  english_pob_choice: his jealousy
  chosen_spanish: su celos
  alternatives_spanish:
  - su celo
  - su celosía
  lexicon: HALOT
  rationale: El hebreo puede significar 'celos' o 'celo'. En el contexto de juicio pactal, se conserva la tensión teológica mediante 'celos', aunque la forma requiere una nota por su rareza estilística en español.
- source_word: תֵּאָכֵל
  english_pob_choice: will be consumed
  chosen_spanish: será consumida
  alternatives_spanish:
  - será devorada
  - será comida
  lexicon: HALOT
  rationale: Pasivo natural en español para la imagen de fuego que destruye por completo.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitable
  - todo el país
  lexicon: HALOT
  rationale: Se adopta el sentido amplio del versículo, coherente con 'todos los habitantes de la tierra' al final. 'Tierra' funciona en español como equivalente de la amplitud cósmica del juicio.
- source_word: כִּי כָלָה
  english_pob_choice: for he will make a complete end
  chosen_spanish: porque él hará un fin completo
  alternatives_spanish:
  - porque él pondrá un fin total
  - porque él hará una destrucción completa
  lexicon: HALOT
  rationale: La construcción verbal se traduce de forma directa y comprensible. 'Fin completo' conserva la idea de consumación total.
- source_word: אַךְ נִבְהָלָה
  english_pob_choice: indeed sudden
  chosen_spanish: sí, repentino
  alternatives_spanish:
  - sí, súbito
  - ciertamente, repentino
  lexicon: HALOT
  rationale: '''אַךְ'' funciona como intensificador; ''sí'' refleja bien ese valor asseverativo en español. ''Repentino'' transmite la cualidad de abrupto/dreadful sin sobrecargar el texto.'
- source_word: יַעֲשֶׂה
  english_pob_choice: he will make
  chosen_spanish: hará
  alternatives_spanish:
  - producirá
  - traerá
  lexicon: HALOT
  rationale: Verbo directo y natural que preserva la fuerza causal de la expresión hebrea.
- source_word: אֵת כָּל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: of all the inhabitants of the earth
  chosen_spanish: de todos los habitantes de la tierra
  alternatives_spanish:
  - de todos los moradores de la tierra
  - de todos los que habitan la tierra
  lexicon: HALOT
  rationale: '''Habitantes'' conserva el participio sustantivado ''los que habitan''. ''De la tierra'' sigue la opción amplia adoptada para הָאָרֶץ.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la terminología estándar del proyecto en español para el Tetragrámaton. 'Yahvé' preserva el nombre propio divino en una forma reconocible y de lectura natural en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de קִנְאָה aplicado a Dios
  english_pob_reading: jealousy
  chosen_spanish_reading: celos
  alternative_spanish_readings:
  - celo
  - ardor
  rationale: El inglés POB retiene 'jealousy' para conservar la dimensión pactal relacional. En español, 'celos' mantiene esa tensión, aunque con un matiz menos litúrgico que 'celo'.
  doctrine_reference: HALOT; contexto profético de juicio pactal
- issue: Alcance de הָאָרֶץ
  english_pob_reading: earth (universal scope)
  chosen_spanish_reading: tierra (alcance universal)
  alternative_spanish_readings:
  - tierra/país (alcance regional)
  - el país
  rationale: La repetición de 'todos los habitantes de la tierra' favorece el alcance universal en esta formulación, sin negar el trasfondo histórico inmediato del juicio sobre Judá.
  doctrine_reference: Heurística de coherencia contextual en Zefanías 1:18
translation_notes:
  revision_awareness: 'La redacción sigue el consenso auditado del POB en inglés: el nombre divino se traduce con transliteración, el fuego corresponde a la imagen de juicio total, y la cláusula final conserva la dificultad de כָלָה + נִבְהָלָה sin suavizarla. Se ajustó el léxico español para que la lectura sea natural y, a la vez, preserve las tensiones semánticas documentadas en el análisis inglés.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma española del nombre divino, en coherencia con el estándar del proyecto.
  - '''Tierra'' se usó de forma amplia y universal en ambas apariciones de הָאָרֶץ para conservar el paralelismo.'
  - Se prefirió 'librarlos' sobre un calco más técnico para lograr un español bíblico claro.
  - La nota sobre 'celos' explica la rareza estilística del término y su valor teológico; no se sustituyó por 'celo' en el cuerpo del texto.
  - La cláusula final conserva la duplicación de intensidad ('fin completo, sí, repentino') para reflejar la combinación hebrea sin eliminar la ambigüedad heredada del original.
