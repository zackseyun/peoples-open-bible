base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/014/005.yaml
  text: And God will again have mercy on them and bring them back to the land[a], and they will build the house, though not like the former one, until the times of the age are fulfilled. And after these things they will return from the captivities and build Jerusalem honorably, and the house of God in her will be built gloriously[c][b], just as the prophets spoke concerning her.
  footnotes:
  - marker: a
    text: Or 'from exile.' The Greek has the plural 'from the captivities,' which may point to multiple places or episodes of exile.
    reason: lexical_alternative
  - marker: b
    text: '''The times of the age'' is an idiomatic phrase that may refer to appointed times leading up to God''s fuller restoration; the Greek is left intentionally open here.'
    reason: lexical_alternative
  - marker: c
    text: 'Jerusalem is referred to with feminine pronouns in Greek: ''in her'' and ''concerning her.'''
    reason: cultural_note
