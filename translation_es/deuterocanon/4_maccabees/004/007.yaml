translation:
  language: es
  text: Y cuando la nación se enfurecía contra la propuesta y hablaba en contra de ella, consideraron que era sumamente terrible que quienes habían confiado sus depósitos al tesoro sagrado[a] fueran privados de ellos, pues[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tesoro sagrado» traduce literalmente el griego; el contexto indica el tesoro del templo.
    reason: cultural_note
  - marker: b
    text: La oración queda inconclusa en este versículo y continúa en el siguiente con la explicación introducida por la partícula causal.
    reason: cross_reference
lexical_decisions:
- source_word: τοῦ ἔθνους
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la multitud
  lexicon: LSJ
  rationale: ἔθνος aquí designa al conjunto del pueblo judío como cuerpo colectivo. «La nación» conserva ese matiz colectivo y público mejor que opciones más generales como «el pueblo».
- source_word: πρὸς τὸν λόγον
  english_pob_choice: at the proposal
  chosen_spanish: contra la propuesta
  alternatives_spanish:
  - ante la propuesta
  - respecto de la propuesta
  - contra el plan
  lexicon: LSJ
  rationale: λόγος puede significar palabra, asunto o propuesta. Dado el contexto de una decisión concreta sobre el tesoro del templo, «la propuesta» comunica bien el sentido práctico, y «contra» refleja la reacción hostil del pueblo.
- source_word: σχετλιάζοντος
  english_pob_choice: was raging
  chosen_spanish: se enfurecía
  alternatives_spanish:
  - estaba furiosa
  - se indignaba
  - estallaba en ira
  lexicon: LSJ
  rationale: El participio expresa una reacción intensa y vehemente. «Se enfurecía» transmite esa fuerza de modo natural en español sin suavizarla.
- source_word: ἀντιλέγοντός
  english_pob_choice: speaking against it
  chosen_spanish: hablaba en contra de ella
  alternatives_spanish:
  - se oponía
  - objetaba
  - contradecía
  lexicon: LSJ
  rationale: ἀντιλέγω significa hablar contra, objetar u oponerse. «Hablaba en contra de ella» conserva el valor verbal de la expresión griega junto con el matiz de oposición.
- source_word: πάνδεινον
  english_pob_choice: utterly dreadful
  chosen_spanish: sumamente terrible
  alternatives_spanish:
  - enteramente horrible
  - completamente terrible
  - gravísimo
  lexicon: LSJ
  rationale: El compuesto intensifica δεινός. «Sumamente terrible» reproduce esa intensificación con una formulación clara y sobria en español.
- source_word: νομίσαντες
  english_pob_choice: they considered
  chosen_spanish: consideraron
  alternatives_spanish:
  - pensaron
  - juzgaron
  lexicon: LSJ
  rationale: El aoristo participial introduce el juicio formado por ellos. «Consideraron» es la opción más directa y formal en español.
- source_word: οἱ τὰς παρακαταθήκας πιστεύσαντες
  english_pob_choice: those who had entrusted their deposits
  chosen_spanish: quienes habían confiado sus depósitos
  alternatives_spanish:
  - quienes habían encomendado sus depósitos
  - quienes habían depositado sus bienes
  - quienes habían puesto en custodia sus depósitos
  lexicon: LSJ
  rationale: παρακαταθήκη alude a un depósito confiado para custodia; πιστεύω aquí tiene el sentido de confiar/entregar algo a resguardo. «Habían confiado sus depósitos» mantiene esa relación de confianza y resguardo sin introducir tecnicismos innecesarios.
- source_word: τῷ ἱερῷ θησαυρῷ
  english_pob_choice: to the sacred treasury
  chosen_spanish: al sagrado tesoro
  alternatives_spanish:
  - al tesoro sagrado
  - al tesoro del templo
  - a la tesorería sagrada
  lexicon: LSJ
  rationale: ἱερός marca el carácter sagrado o templeario del tesoro. «Sagrado tesoro» sigue de cerca el griego y conserva la resonancia religiosa. Se evita «tesorería» por sonar más administrativo que el sustantivo griego θησαυρός.
- source_word: στερηθήσονται
  english_pob_choice: should be deprived of them
  chosen_spanish: fueran despojados de ellos
  alternatives_spanish:
  - quedaran privados de ellos
  - fueran privados de ellos
  - perdieran eso
  lexicon: LSJ
  rationale: El pasivo futuro de στερέω expresa ser privado o despojado. «Fueran despojados de ellos» comunica con fuerza esa pérdida injusta en un contexto de custodia y restitución.
- source_word: ὡς
  english_pob_choice: since
  chosen_spanish: pues
  alternatives_spanish:
  - ya que
  - porque
  - puesto que
  lexicon: LSJ
  rationale: La partícula introduce la explicación que continúa en el versículo siguiente. «Pues» funciona bien en español como enlace causal y deja claro que la oración queda abierta.
theological_decisions:
- issue: Lenguaje del tesoro del templo sin ocultar la referencia sagrada
  english_pob_reading: sacred treasury
  chosen_spanish_reading: sagrado tesoro
  alternative_spanish_readings:
  - tesoro del templo
  - tesorería sagrada
  rationale: El texto griego señala un tesoro con carácter sagrado; no es solo una caja fuerte o fondo civil. «Sagrado tesoro» conserva la santidad del lugar y del depósito sin sobreexplicar más allá del griego.
  doctrine_reference: Principio de primacía del texto original; precisión léxica en contextos del templo.
- issue: Mantener la tensión sintáctica de una frase incompleta
  english_pob_reading: the sentence is incomplete in this verse and continues into the next with the reason introduced by 'since.'
  chosen_spanish_reading: pues
  alternative_spanish_readings:
  - ya que
  - porque
  - puesto que
  rationale: El griego termina con ὡς y el pensamiento continúa en el versículo siguiente. «Pues» deja la explicación abierta y ayuda a que el lector perciba que la frase no concluye aquí.
  doctrine_reference: Respeto a la segmentación y continuidad del texto fuente.
translation_notes:
  revision_awareness: Se revisó el rastro inglés y se mantuvo la estructura sintáctica incompleta del griego, con equivalentes españoles que preservan la intensidad emocional y la referencia al tesoro sagrado. Se prefirió «sagrado tesoro» para seguir de cerca θησαυρός y ἱερός, y se dejó abierta la cláusula final para reflejar ὡς.
  spanish_consistency_notes:
  - Se usó «nación» para ἔθνος según el valor colectivo del contexto.
  - Se empleó «sagrado» en lugar de «santo» para conservar el matiz cultual del tesoro.
  - Se evitó «SEÑOR» u otro lenguaje no presente en el versículo.
  - La puntuación deja claro que el enunciado continúa en el versículo siguiente.
