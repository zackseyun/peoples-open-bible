translation:
  language: es
  text: Las obras de sus manos son verdad y justicia[a]; todos sus preceptos son dignos de confianza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad y justicia» para «verdad y justicia».
    reason: lexical_alternative
  - marker: b
    text: O «todas sus instrucciones son confiables».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵי
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - trabajos
  lexicon: HALOT
  rationale: En poesía española, «obras» transmite de forma natural lo que es producido o realizado, y conserva el paralelismo formal sin sonar mecánico. Mantiene bien la relación con «sus manos» como imagen de agencia divina.
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus obras
  - su acción
  lexicon: HALOT
  rationale: Se conserva la imagen corporal literal del hebreo, que en poesía expresa agencia activa. No se sustituye por una abstracción para no perder el valor imagístico del texto.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - fiabilidad
  lexicon: HALOT
  rationale: «Verdad» corresponde de manera directa a la elección inglesa y mantiene el primer miembro nominal del paralelismo. En español preserva el campo semántico de firmeza y veracidad sin imponer «fidelidad» como lectura principal.
- source_word: וּמִשְׁפָּט
  english_pob_choice: and justice
  chosen_spanish: y justicia
  alternatives_spanish:
  - y juicio
  - y derecho
  lexicon: HALOT
  rationale: «Justicia» es la forma más idiomática y clara en español para el valor abstracto de מִשְׁפָּט en este contexto poético. Conserva el contraste con «verdad» y evita un término más técnico o ambiguo.
- source_word: נֶאֱמָנִים
  english_pob_choice: are trustworthy
  chosen_spanish: son fieles
  alternatives_spanish:
  - son dignos de confianza
  - son seguros
  - son confiables
  lexicon: HALOT
  rationale: El participio predicativo expresa dependencia/fiabilidad duradera. En español, «son fieles» comunica bien esa idea y además permite que «fieles» funcione como eco semántico de la firmeza del segundo hemistiquio, aunque se mantiene una nota para la alternativa de confiabilidad.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todas las
  lexicon: HALOT
  rationale: Cuantificador universal directo; «todos» es la forma natural en español para introducir el sustantivo plural masculino «preceptos».
- source_word: פִּקּוּדָיו
  english_pob_choice: his precepts
  chosen_spanish: sus preceptos
  alternatives_spanish:
  - sus instrucciones
  - sus estatutos
  lexicon: HALOT
  rationale: «Preceptos» conserva el matiz normativo y covenantal del término hebreo mejor que una traducción más general. Se mantiene la consistencia terminológica con el audit trail inglés.
theological_decisions:
- issue: Cómo traducir אֱמֶת en paralelo con מִשְׁפָּט
  english_pob_reading: truth and justice
  chosen_spanish_reading: verdad y justicia
  alternative_spanish_readings:
  - fidelidad y justicia
  - verdad y juicio
  rationale: Se preserva la estructura nominal del verso y la correspondencia con la lectura inglesa documentada. «Verdad» deja abierta la tensión lexical señalada por el audit trail, sin absorberla en «fidelidad» como lectura principal.
  doctrine_reference: Translation philosophy §3, §5
- issue: Cómo rendir נֶאֱמָנִים aplicado a los preceptos divinos
  english_pob_reading: are trustworthy
  chosen_spanish_reading: son fieles
  alternative_spanish_readings:
  - son dignos de confianza
  - son confiables
  - son seguros
  rationale: La elección principal debe expresar la confiabilidad estable de los preceptos sin diluir su carácter normativo. «Son fieles» es breve, poético y compatible con el lenguaje bíblico español; la alternativa de confianza queda disponible en nota.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: Coincide con el pasaje inglés auditado sin revisiones aplicadas en la última pasada; se conserva el paralelismo nominal y la imagen de las manos, y se mantiene la tensión léxica documentada entre «verdad/fidelidad» y «fieles/dignos de confianza».
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en el proyecto; aquí el versículo no contiene el tetragrámaton explícito.
  - Se evita «SEÑOR» como sustituto convencional porque el texto no lo requiere.
  - «Preceptos» se mantiene como término técnico consistente para פִּקּוּדִים.
  - Las notas al pie preservan alternativas léxicas ya documentadas en el audit trail inglés.
