translation:
  language: es
  text: 'Entonces Jacob dijo a Labán: «Dame[a] mi esposa, porque mis días se han cumplido, para que me una a ella»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Dame». El verbo es una petición directa dirigida a Labán en el contexto del acuerdo matrimonial.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «para que entre a ella» o «para que vaya a ella», eufemismo usual para la consumación del matrimonio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  english_pob_choice: Give me
  chosen_spanish: Entrégame
  alternatives_spanish:
  - Dame
  - Da
  lexicon: HALOT
  rationale: El imperativo con objeto implícito dirigido a Labán pide una formulación natural en español. «Entrégame» comunica la petición en el marco del trato matrimonial y conserva el valor pragmático de la solicitud mejor que una traducción más literal y rígida.
- source_word: אֶת אִשְׁתִּי
  english_pob_choice: my wife
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi mujer
  - mi prometida
  lexicon: HALOT
  rationale: En este contexto, la referencia es a la mujer que ya ha sido concertada para Jacob después del tiempo acordado de servicio. «Esposa» expresa mejor el sentido marital/covenantal que «mujer» en español moderno, sin perder el vínculo con el texto.
- source_word: כִּי מָלְאוּ יָמָי
  english_pob_choice: for my days are fulfilled
  chosen_spanish: porque mis días se han cumplido
  alternatives_spanish:
  - porque se ha cumplido mi tiempo
  - porque mis días han terminado
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente habla de días «llenos/completados», refiriéndose al plazo de servicio. «Se han cumplido» preserva ese valor idiomático y su relación con el período convenido.'
- source_word: וְאָבוֹאָה אֵלֶיהָ
  english_pob_choice: that I may go in to her
  chosen_spanish: para que vaya a ella
  alternatives_spanish:
  - para unirme a ella
  - para tener relaciones con ella
  lexicon: HALOT
  rationale: La construcción hebrea es un eufemismo estándar para la consumación sexual del matrimonio. En español, «vaya a ella» mantiene la modestia y la imagen idiomática sin explicitar de más; la nota conserva la equivalencia semántica.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó un «so» redundante para dejar una cláusula de propósito más natural («that I may go in to her»). La versión española refleja esa misma relación final con «para que vaya a ella», sin añadir conectores innecesarios.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se prefirió «esposa» por claridad contextual; no se usó «mujer» porque en español podría sonar demasiado general o ambiguo aquí.
  - Se mantuvo el eufemismo bíblico de consumación sexual con una formulación sobria y una nota explicativa.
  - La puntuación y las comillas siguen la convención tipográfica española y mantienen la segmentación del discurso directo.
