translation:
  language: es
  text: 'Pero Moisés dijo: «Tú también debes poner en nuestras manos sacrificios y holocaustos, y los ofreceremos a Yahvé[a] nuestro Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a Yahvé nuestro Dios». Se mantiene «Yahvé» como equivalente del nombre divino en el texto principal.'
    reason: source_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But Moses said
  chosen_spanish: Pero Moisés dijo
  alternatives_spanish:
  - Y Moisés dijo
  - Entonces Moisés dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en este contexto la respuesta de Moisés a la restricción de Faraón introduce contraste, por eso «Pero» comunica mejor la fuerza adversativa que un simple «Y».
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: El adverbio añade énfasis e incluye a Faraón en la obligación expresada. «También» preserva ese valor aditivo de manera natural en español.
- source_word: תִּתֵּן
  english_pob_choice: must give
  chosen_spanish: debes dar
  alternatives_spanish:
  - tienes que dar
  - deberás dar
  lexicon: HALOT
  rationale: נתן puede significar «dar» o «poner». En esta construcción con «en nuestras manos», «dar» es la opción más natural y fiel en español. Se expresa la insistencia con «debes» para reflejar el matiz exhortativo del contexto.
- source_word: בְּיָדֵנוּ
  english_pob_choice: into our hands
  chosen_spanish: en nuestras manos
  alternatives_spanish:
  - a nuestras manos
  - en nuestra mano
  lexicon: HALOT
  rationale: Conserva la imagen concreta del hebreo y funciona bien en español. «En nuestras manos» refleja el idioma bíblico sin volverlo forzado.
- source_word: זְבָחִים
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas sacrificadas
  lexicon: HALOT
  rationale: זֶבַח designa ofrendas sacrificiales de manera general. «Sacrificios» es el equivalente más claro y directo.
- source_word: וְעֹלֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - holocausto
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda completamente quemada. «Holocaustos» es el término bíblico tradicional y preciso en español para este tipo de ofrenda; se prefiere aquí por su fidelidad cultual. Se evita «ofrendas quemadas» por ser menos técnico.
- source_word: וְעָשִׂינוּ
  english_pob_choice: we will offer
  chosen_spanish: y los ofreceremos
  alternatives_spanish:
  - y haremos
  - y los presentaremos
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה significa realizar/ofrecer un sacrificio. En español, «ofreceremos» transmite el acto cultual con claridad. Se añade «los» para retomar naturalmente los sacrificios y holocaustos mencionados.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yavé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: el Tetragrámaton se traduce «Yahvé» en el texto principal. La preposición «a» expresa el destinatario del ofrecimiento sacrificial.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: Construcción posesiva directa y transparente. «Nuestro Dios» reproduce fielmente el sintagma sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh / the LORD in older project practice
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar español del proyecto, se conserva el nombre divino como «Yahvé» en el texto principal, en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente de «put into our hands» a «give into our hands» por mayor precisión respecto a תִּתֵּן. En español se refleja esa precisión con «dar en nuestras manos», manteniendo la imagen idiomática y el contraste contextual de la respuesta de Moisés.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de manera consistente con el estándar del proyecto para יהוה.
  - «Holocaustos» se conserva por su valor técnico-cultual, aunque existe la alternativa más descriptiva «ofrendas quemadas».
  - Se mantiene la imagen de «en nuestras manos» para conservar el hebraísmo sin perder naturalidad en español.
