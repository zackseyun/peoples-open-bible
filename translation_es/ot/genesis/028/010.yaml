lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: departed
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  - departió
  lexicon: HALOT
  rationale: יצא expresa salir o partir de un lugar. En español, "salió" conserva con naturalidad el movimiento de dejar Beerseba sin introducir un matiz más interpretativo que "viajó" o "se encaminó".
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: Nombre propio bíblico
  rationale: Se conserva el nombre propio en su forma usual y reconocible en español bíblico.
- source_word: מִבְּאֵר שָׁבַע
  english_pob_choice: from Beersheba
  chosen_spanish: de Beerseba
  alternatives_spanish:
  - desde Beerseba
  - de Beer-seba
  lexicon: Topónimo bíblico
  rationale: La preposición מִן marca origen. "De Beerseba" transmite bien el punto de partida; "desde" también sería posible, pero "de" es más sobrio y directo aquí.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - viajó
  - iba
  lexicon: HALOT
  rationale: הלך denota ir/caminar. "Fue" es la forma más natural y fiel en español, sin añadir la carga de itinerario que tendría "viajó" o "anduvo".
- source_word: חָרָנָה
  english_pob_choice: to Haran
  chosen_spanish: a Harán
  alternatives_spanish:
  - hacia Harán
  - para Harán
  lexicon: Sufijo direccional
  rationale: El sufijo direccional de hebreo indica movimiento hacia un destino. En español, "a Harán" comunica adecuadamente ese destino de manera natural; "hacia Harán" explicitaría más la dirección, pero suena menos directo en esta oración.
translation_notes:
  revision_awareness: 'El texto hebreo muestra dos verbos consecutivos de movimiento: יצא (“salir”) y הלך (“ir”). La versión española conserva ambos con verbos naturales y distintos: "salió" y "fue". También preserva el sentido del sufijo direccional de חָרָנָה con una nota breve, siguiendo el rastro auditado del inglés POB, que documenta la alternativa direccional.'
  spanish_consistency_notes:
  - Se usa "Beerseba" como forma española estándar del topónimo.
  - Se mantiene "Harán" con tilde para la acentuación española.
  - Se evita "SEÑOR" u otro reemplazo teológico porque el verso no contiene el Tetragrámaton ni un título divino.
