translation:
  language: es
  text: 'Entonces nuestro padre dijo[a]: «Vuelvan; compren para nosotros un poco de alimento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regresen; compren para nosotros un poco de grano». El hebreo emplea una palabra general para «alimento», aunque el contexto más amplio trata del grano.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la narración. «Entonces» mantiene ese valor secuencial con naturalidad en español y evita un calco demasiado rígido de «y dijo».
- source_word: אָבִינוּ
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro antepasado
  lexicon: HALOT
  rationale: El contexto se refiere específicamente a Jacob, padre inmediato de los hermanos; «nuestro padre» es claro y fiel.
- source_word: שֻׁבוּ
  english_pob_choice: Go back
  chosen_spanish: Vuelvan
  alternatives_spanish:
  - Regresen
  - Vuelvan de nuevo
  lexicon: HALOT
  rationale: El imperativo pide repetir el viaje. En español, «vuelvan» comunica bien la idea de regresar al lugar de origen sin añadir un matiz excesivamente explicativo.
- source_word: שִׁבְרוּ
  english_pob_choice: buy
  chosen_spanish: compren
  alternatives_spanish:
  - adquieran
  - compren grano
  lexicon: HALOT
  rationale: En este relato, el verbo se usa para comprar alimento en el contexto de la escasez. «Compren» reproduce la acción de manera natural sin sobreespecificar «grano» en el texto principal.
- source_word: לָנוּ
  english_pob_choice: us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros mismos
  - nos
  lexicon: HALOT
  rationale: El hebreo expresa beneficio para los hermanos; en español, «para nosotros» deja clara esa relación sin forzar una construcción poco idiomática.
- source_word: מְעַט
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - una pequeña cantidad de
  - algo de
  lexicon: HALOT
  rationale: «Un poco» es el equivalente natural de una cantidad reducida y mantiene el tono modesto de la petición.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - provisiones
  - grano
  lexicon: HALOT
  rationale: El término hebreo es general, aunque el contexto narrativo apunta al grano. «Alimento» conserva la amplitud semántica del original mejor que «grano» en el cuerpo principal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la solución auditada en inglés: un verbo narrativo secuencial, referencia a «nuestro padre», imperativo de retorno y un sustantivo general para la comida/alimento, con nota alternativa para el matiz de «grano».'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el texto principal («alimento») y la nota alternativa («grano») para respetar la amplitud del hebreo.
  - Se prefirió «nuestro padre» en vez de una paráfrasis más explicativa, en línea con la referencia inmediata a Jacob.
  - «Entonces» conserva la progresión narrativa del waw consecutivo sin recurrir a un arcaísmo.
