translation:
  language: es
  text: Así Yahvé[a] los vendió en mano de Jabín, rey de Canaán, que reinaba en Hazor; y el comandante de su ejército era Sísara, que vivía en Haróset-hagoyim[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los vendió en mano de»; modismo de juicio del pacto que significa que los entregó al poder de Jabín.'
    reason: lexical_alternative
  - marker: b
    text: Harosheth-haggoyim probablemente significa «Haróset de las naciones».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּמְכְּרֵם
  english_pob_choice: sold them
  chosen_spanish: los vendió
  alternatives_spanish:
  - los entregó
  - los puso en manos de
  lexicon: HALOT
  rationale: El hebreo מָכַר significa literalmente 'vender', y en Jueces funciona como un modismo de juicio del pacto. 'Los vendió' conserva esa metáfora y la fuerza del acto divino; 'los entregó' suaviza el verbo y borra la imagen documentada en el POB inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, no una sustitución titulada. 'Yahvé' es el equivalente español directo del criterio POB para el Tetragrama.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - entregado a
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala poder o dominio. 'En manos de' mantiene la imagen corporal del original y su uso bíblico habitual en español sin perder naturalidad.
- source_word: יָבִין מֶלֶךְ כְּנַעַן
  english_pob_choice: Jabin king of Canaan
  chosen_spanish: Jabín, rey de Canaán
  alternatives_spanish:
  - Jabín, el rey de Canaán
  - Jabín rey de Canaán
  lexicon: HALOT
  rationale: La cadena constructa se refleja de forma cercana con una aposición clara en español. Se conserva 'rey de Canaán' sin insertar artículos no exigidos por el hebreo.
- source_word: אֲשֶׁר מָלַךְ בְּחָצוֹר
  english_pob_choice: who reigned in Hazor
  chosen_spanish: que reinaba en Hazor
  alternatives_spanish:
  - que reinó en Hazor
  - que era rey en Hazor
  lexicon: HALOT
  rationale: מָלַךְ expresa el ejercicio de reinar. El imperfecto narrativo 'reinaba' reproduce bien el valor descriptivo del hebreo y su continuidad en contexto.
- source_word: וְשַׂר צְבָאוֹ
  english_pob_choice: and the commander of his army was
  chosen_spanish: comandante de su ejército
  alternatives_spanish:
  - jefe de su ejército
  - capitán de su ejército
  lexicon: HALOT
  rationale: שַׂר צְבָא/וֹ designa al jefe militar. 'Comandante' es la opción moderna y clara que preserva la función sin usar un calco demasiado arcaico.
- source_word: סִיסְרָא
  english_pob_choice: Sisera
  chosen_spanish: Sísara
  alternatives_spanish:
  - Sisera
  lexicon: HALOT
  rationale: Se adapta el nombre propio a la ortografía española convencional con tilde para la prosodia natural.
- source_word: וְהוּא יוֹשֵׁב
  english_pob_choice: who lived
  chosen_spanish: vivía
  alternatives_spanish:
  - habitaba
  - estaba viviendo
  lexicon: HALOT
  rationale: El participio expresa una situación estable de residencia. 'Vivía' comunica con naturalidad esa residencia sin introducir una progresión aspectual ajena al contexto.
- source_word: בַּחֲרֹשֶׁת הַגּוֹיִם
  english_pob_choice: in Harosheth-haggoyim
  chosen_spanish: en Haróset-hagoyim
  alternatives_spanish:
  - en Haróset de las naciones
  - en Haróset de los gentiles
  lexicon: HALOT
  rationale: Se preserva el topónimo transliterado porque funciona como nombre de lugar. La forma compuesta se mantiene en español para no interpretar el nombre como si fuera una frase explicativa en el texto principal.
theological_decisions:
- issue: Agencia divina en el juicio sobre Israel
  english_pob_reading: The verse states directly that the LORD sold Israel into the hand of Jabin.
  chosen_spanish_reading: El versículo dice directamente que Yahvé los vendió en manos de Jabín.
  alternative_spanish_readings:
  - Yahvé permitió que quedaran sometidos a Jabín
  - Yahvé los dejó caer bajo el poder de Jabín
  rationale: El hebreo atribuye acción directa a Yahvé, no mera permisividad. La traducción conserva esa agencia fuerte, coherente con la lectura de juicio pactual del POB inglés.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: יְהוָה → Yahweh'
- issue: Valor del topónimo final
  english_pob_reading: Harosheth-haggoyim likely means 'Harosheth of the Nations.'
  chosen_spanish_reading: Se conserva Haróset-hagoyim como nombre propio en el texto principal.
  alternative_spanish_readings:
  - Haróset de las naciones
  - Haróset de los gentiles
  rationale: Aunque el elemento השני puede significar 'las naciones', el POB inglés preserva el topónimo sin interpretarlo en el cuerpo del texto. En español se sigue la misma decisión para no convertir un nombre propio en glosa.
  doctrine_reference: Lexical note on toponyms; cultural note
translation_notes:
  revision_awareness: 'El texto sigue de cerca el expediente inglés aprobado, sin cambios sustanciales respecto al último pase: se mantiene la metáfora de ''vender'', el nombre divino ''Yahvé'', la imagen idiomática de ''en manos de'', y el topónimo final sin interpretar en el cuerpo principal. La única adaptación relevante es la naturalización ortográfica de nombres propios al español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Tetragrama.
  - Se conserva 'vendió' para מָכַר, evitando suavizarlo a 'entregó'.
  - '''En manos de'' mantiene el modismo hebreo de dominio/poder.'
  - '''Sísara'' y ''Haróset-hagoyim'' siguen criterios de transliteración española coherente.'
  - La nota sobre Haróset-hagoyim se reserva para el pie, no para el texto principal.
