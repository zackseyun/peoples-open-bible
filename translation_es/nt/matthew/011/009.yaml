translation:
  language: es
  text: Pero ¿qué salieron a ver? ¿Un profeta? Sí[a], les digo, y más que un profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno mayor que un profeta». Más literalmente, el griego dice «más que un profeta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca contraste directo con la secuencia de preguntas retóricas anteriores. «Pero» es natural en español contemporáneo y conserva el giro adversativo sin sobrerreformular.
- source_word: τί ἐξήλθατε
  english_pob_choice: what did you go out
  chosen_spanish: ¿qué salieron a ver?
  alternatives_spanish:
  - ¿por qué salieron?
  - ¿qué fueron a ver?
  lexicon: BDAG
  rationale: τί es acusativo interrogativo, por lo que se mantiene el valor de «qué» y no se reduce a «por qué». El complemento de propósito con ἰδεῖν permite expresar el conjunto como una pregunta de finalidad/percepción en español natural.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: a ver
  alternatives_spanish:
  - para ver
  - a contemplar
  lexicon: BDAG
  rationale: El infinitivo de propósito se vierte de modo idiomático con «a ver» en español, preservando la intención de salida orientada al encuentro visual sin volverlo rebuscado.
- source_word: προφήτην
  english_pob_choice: a prophet
  chosen_spanish: ¿Un profeta?
  alternatives_spanish:
  - ¿A un profeta?
  - ¿un profeta?
  lexicon: BDAG
  rationale: El singular anartro es naturalmente indefinido aquí. En español, la interrogación con artículo indefinido expresa bien esa indefinición sin añadir una cualificación no presente en el griego.
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Ciertamente
  - En efecto
  lexicon: BDAG
  rationale: La afirmación breve y directa se conserva con «Sí», que reproduce el valor discursivo inmediato de la respuesta de Jesús.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les aseguro
  - les digo a ustedes
  lexicon: BDAG
  rationale: La fórmula de discurso directo se mantiene con un equivalente sencillo y natural en español. «Les digo» conserva el tono enfático sin añadir énfasis interpretativo.
- source_word: περισσότερον προφήτου
  english_pob_choice: more than a prophet
  chosen_spanish: más que un profeta
  alternatives_spanish:
  - más que profeta
  - mayor que un profeta
  lexicon: BDAG
  rationale: Se conserva la comparación literal del griego sin expandirla a «uno mayor» en el texto principal. Así se mantiene la tensión lexical documentada por el POB inglés y se evita cerrar la ambigüedad interpretativa.
theological_decisions:
- issue: La elevación de Juan el Bautista por encima de la categoría de profeta
  english_pob_reading: Render the phrase as 'more than a prophet' without expanding the implied meaning.
  chosen_spanish_reading: Traducir «más que un profeta» sin desarrollar en el texto principal una explicación como «uno mayor» o «un profeta extraordinario».
  alternative_spanish_readings:
  - más que profeta
  - uno mayor que un profeta
  - un profeta más grande que los demás
  rationale: El griego presenta una comparación breve que eleva a Juan sin precisar en esta cláusula cómo debe entenderse exactamente esa superioridad. La traducción conserva esa tensión y evita resolverla con una paráfrasis interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla en el texto principal.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la redacción española sigue de cerca las decisiones finales del POB inglés y mantiene la equivalencia óptima sin cambios sustantivos respecto del sentido fuente.
  spanish_consistency_notes:
  - Se usa «Pero» para el contraste inicial y «Sí» para la respuesta afirmativa breve, manteniendo un registro claro y sobrio.
  - Se conserva «profeta» en singular indefinido, coherente con el valor anartro del griego.
  - La nota al pie reproduce la alternativa lexical documentada en inglés sin introducir una interpretación adicional no atestiguada.
