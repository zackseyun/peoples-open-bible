base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/020/002.yaml
  text: And David took the crown of their king from his head and found that it weighed a talent of gold[a], and in it was a precious stone; and it was on David’s head[b]. And he carried off very much plunder from the city.
  footnotes:
  - marker: a
    text: Or 'the crown of Milcom' (or 'Malcam'), taking מַלְכָּם as the name of the Ammonite god rather than 'their king.'
    reason: alternative_reading
  - marker: b
    text: A talent was a large ancient unit of weight, often estimated at roughly 75 pounds or 34 kilograms, though exact values varied.
    reason: cultural_note
