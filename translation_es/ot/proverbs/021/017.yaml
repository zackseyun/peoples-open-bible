base_translation:
  language: en
  yaml_path: translation/ot/proverbs/021/017.yaml
  text: A man who loves pleasure will become poor[b][a]; whoever loves wine and oil will not become rich.
  footnotes:
  - marker: a
    text: Or 'who loves joy' or 'who loves merrymaking.' The Hebrew term can denote joy or festivity, but here likely refers to a pleasure-seeking lifestyle.
    reason: lexical_alternative
  - marker: b
    text: '''Oil'' likely refers to olive oil and may imply luxury or costly ointment, not merely a basic food item.'
    reason: cultural_note
