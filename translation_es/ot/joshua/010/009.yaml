translation:
  language: es
  text: Así, Josué llegó hasta ellos de repente[a], después de subir[b] desde Gilgal toda la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘vino a ellos de repente’; el verbo hebreo dice literalmente ‘vino’, y el contexto militar sugiere una llegada súbita sobre el enemigo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘subió desde Gilgal toda la noche’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came upon
  chosen_spanish: vino sobre
  alternatives_spanish:
  - vino a
  - llegó a
  - vino contra
  lexicon: HALOT
  rationale: El verbo básico בוא es ‘venir/llegar’; en este contexto militar con אֲלֵיהֶם, el español ‘vino sobre’ conserva la idea de acercamiento inesperado y la presión sobre el enemigo sin añadir más violencia de la que el hebreo exige.
- source_word: אֲלֵיהֶם
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - a ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición אֶל significa literalmente ‘a/hacia’. En una narración bélica, ‘sobre ellos’ reproduce bien la fuerza idiomática de la llegada repentina y encaja con ‘de repente’.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - inesperadamente
  lexicon: HALOT
  rationale: El adverbio expresa abruptamente la acción. ‘De repente’ es natural en español y conserva la brusquedad temporal del hebreo.
- source_word: כָּל הַלַּיְלָה
  english_pob_choice: all night
  chosen_spanish: toda la noche
  alternatives_spanish:
  - durante toda la noche
  - la noche entera
  lexicon: HALOT
  rationale: La expresión marca duración completa. ‘Toda la noche’ mantiene la sencillez y el valor temporal del original.
- source_word: עָלָה
  english_pob_choice: having marched up
  chosen_spanish: subiendo
  alternatives_spanish:
  - subió
  - marchando hacia arriba
  - habiendo subido
  lexicon: HALOT
  rationale: עָלָה significa literalmente ‘subir’. En español, ‘subiendo’ conserva la idea de movimiento ascendente y la relación circunstancial con el verbo principal sin forzar un giro demasiado técnico.
- source_word: מִן הַגִּלְגָּל
  english_pob_choice: from Gilgal
  chosen_spanish: desde Gilgal
  alternatives_spanish:
  - de Gilgal
  - desde el Gilgal
  lexicon: HALOT
  rationale: ‘Desde’ expresa con naturalidad el punto de partida del desplazamiento. El nombre propio ‘Gilgal’ se translitera sin adaptación.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  - Josue
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español; ‘Josué’ es la forma reconocible y fiel al referente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la doble idea de llegada repentina y desplazamiento nocturno desde Gilgal, sin suavizar el matiz militar del hebreo ni convertir el verbo en una paráfrasis más interpretativa de lo necesario.'
  spanish_consistency_notes:
  - Se usa ‘Josué’ como forma estándar del nombre propio en español.
  - Se conserva ‘Gilgal’ como topónimo transliterado.
  - Se mantiene la ambigüedad útil de ‘vino sobre’ para reflejar el hebreo sin cerrar por completo la opción alternativa ‘vino a’.
  - Las notas al pie preservan la alternativa literal del hebreo para ‘vino’ y ‘subiendo toda la noche’.
