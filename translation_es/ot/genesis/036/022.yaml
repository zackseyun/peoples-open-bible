translation:
  language: es
  text: Los hijos de Lotán fueron Hori y Hemam[a], y la hermana de Lotán fue Timna[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Hemam»; la lista paralela de 1 Crónicas 1:39 lee «Homam».'
    reason: textual_variant
  - marker: b
    text: O «Timnah» en algunas grafías; la forma hebrea aquí es Timna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - llegaron a ser
  lexicon: HALOT
  rationale: En una lista genealógica, el imperfecto narrativo funciona como copulativo simple de presentación de descendencia; en español, «fueron» comunica mejor ese valor de listado que una paráfrasis como «llegaron a ser».
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los niños de
  lexicon: HALOT
  rationale: En un contexto genealógico, בְנֵי señala descendencia masculina; «los hijos de» mantiene con precisión ese valor y coincide con la estructura natural del español.
- source_word: לוֹטָן
  english_pob_choice: Lotan
  chosen_spanish: Lotán
  alternatives_spanish:
  - Lotan
  lexicon: transliteración de nombre propio
  rationale: Se conserva el nombre propio con acento gráfico español para facilitar la lectura, sin alterar la forma del nombre.
- source_word: חֹרִי
  english_pob_choice: Hori
  chosen_spanish: Hori
  alternatives_spanish:
  - Jori
  lexicon: transliteración de nombre propio
  rationale: Nombre propio sin traducción; «Hori» refleja adecuadamente la forma hebrea y es legible en español.
- source_word: הֵימָם
  english_pob_choice: Hemam
  chosen_spanish: Hemán
  alternatives_spanish:
  - Hemam
  - Homán
  lexicon: transliteración de nombre propio
  rationale: El texto hebreo apunta a una forma cercana a «Hemam»; sin embargo, en español se puede regularizar como «Hemán» para una pronunciación más natural, manteniendo la referencia al nombre propio. La nota preserva la variante textual frente a 1 Crónicas 1:39.
- source_word: וַאֲחוֹת
  english_pob_choice: and ... sister was
  chosen_spanish: y la hermana de
  alternatives_spanish:
  - y fue la hermana de
  - y la hermana
  lexicon: HALOT
  rationale: El hebreo presenta una construcción nominal en una lista genealógica; en español, la copulativa implícita se resuelve de forma natural con «y la hermana de», sin sobretraducir un verbo no explícito.
- source_word: תִּמְנָע
  english_pob_choice: Timna
  chosen_spanish: Timna
  alternatives_spanish:
  - Timná
  - Timnah
  lexicon: transliteración de nombre propio
  rationale: Se conserva la vocalización hebrea del nombre propio. «Timna» evita confundirlo con la variante inglesa «Timnah» y sigue de cerca la forma del texto base.
translation_notes:
  revision_awareness: El pasaje ha sido revisado con acuerdo alto en el expediente inglés y no requiere cambios sustantivos. Se conservó la estructura genealógica breve del hebreo y la variante textual de Hemam/Homam se documentó en nota.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para genealogías cuando el hebreo usa בְנֵי.
  - Se conserva transliteración de nombres propios sin normalizarlos a formas eclesiásticas tradicionales.
  - La puntuación reproduce la coordinación simple del hebreo y evita añadir información no presente en el versículo.
