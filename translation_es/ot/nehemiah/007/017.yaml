  - Se mantiene el patrón genealógico/censal «Los hijos de + nombre propio» usado con frecuencia en listas de repatriados o censos.
  - Se conserva un número arábigo para facilitar la lectura de listas y totales en español.
  - No se añade nota textual porque no hay variante relevante en el paquete fuente ni en el audit trail inglés.
