translation:
  language: es
  text: Cuando Mardoqueo supo todo lo que había sido hecho, rasgó sus vestiduras y se vistió de cilicio y ceniza. Luego salió en medio de la ciudad y clamó con un gran y amargo clamor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'clamó un gran y amargo clamor'. El hebreo usa un verbo con un sustantivo cognado para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַע
  english_pob_choice: learned
  chosen_spanish: supo
  alternatives_spanish:
  - llegó a saber
  - se enteró
  lexicon: HALOT
  rationale: El verbo marca aquí el momento en que Mardoqueo toma conocimiento de los hechos; en español, 'supo' comunica con naturalidad ese ingreso a la información sin forzar una paráfrasis.
- source_word: כָּל אֲשֶׁר נַעֲשָׂה
  english_pob_choice: all that had been done
  chosen_spanish: todo lo que había sido hecho
  alternatives_spanish:
  - todo lo que había acontecido
  - todo lo sucedido
  lexicon: HALOT
  rationale: La pasiva hebrea se conserva con una pasiva equivalente en español. 'Había sido hecho' mantiene la referencia a actos ya consumados dentro del relato.
- source_word: וַיִּקְרַע ... אֶת בְּגָדָיו
  english_pob_choice: tore his clothes
  chosen_spanish: rasgó sus vestiduras
  alternatives_spanish:
  - desgarró sus vestiduras
  - rasgó su ropa
  lexicon: HALOT
  rationale: '''Vestiduras'' es más acorde con el registro bíblico y conserva el gesto de duelo; ''rasgó'' expresa el acto de forma precisa y digna.'
- source_word: שַׂק וָאֵפֶר
  english_pob_choice: sackcloth and ashes
  chosen_spanish: cilicio y ceniza
  alternatives_spanish:
  - saco y ceniza
  - sackcloth y ceniza
  lexicon: HALOT
  rationale: '''Cilicio y ceniza'' es la equivalencia idiomática natural en español bíblico para el rito de duelo y humillación. Se preserva el par lexical tradicional sin añadir explicación ajena al texto.'
- source_word: בְּתוֹךְ הָעִיר
  english_pob_choice: into the midst of the city
  chosen_spanish: al medio de la ciudad
  alternatives_spanish:
  - en medio de la ciudad
  - al centro de la ciudad
  lexicon: HALOT
  rationale: '''Al medio de la ciudad'' conserva el valor espacial de ''en medio/midst'' y suena natural en español; evita reinterpretar el lugar como un simple centro urbano.'
- source_word: וַיִּזְעַק זְעָקָה גְדֹלָה וּמָרָה
  english_pob_choice: cried out with a great and bitter cry
  chosen_spanish: clamó con un gran y amargo clamor
  alternatives_spanish:
  - gritó con un gran y amargo clamor
  - alzó un gran y amargo clamor
  lexicon: HALOT
  rationale: Se conserva la intensificación hebrea mediante verbo + sustantivo cognado ('clamó' / 'clamor'). 'Gran' refleja el alcance o intensidad sin perder naturalidad, y 'amargo' mantiene la carga emotiva de מָרָה.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura final inglesa revisada, manteniendo la secuencia narrativa y la intensificación del clamor. La opción de 'great' se refleja en español con 'gran' para preservar tanto el matiz cuantitativo/intensivo como la fluidez natural.
  spanish_consistency_notes:
  - Se usa 'Mardoqueo' como forma estable del nombre propio.
  - Se evita 'SEÑOR' u otras sustituciones teológicas porque el verso no contiene el Nombre divino.
  - '''Vestiduras'' y ''cilicio'' mantienen un registro bíblico claro y entendible para lectores hispanohablantes amplios.'
  - La nota al pie marca la alternativa de lectura del último miembro poético en consonancia con el auditable del inglés.
