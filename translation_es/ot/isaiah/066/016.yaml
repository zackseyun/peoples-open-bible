revisions:
- from: Porque por fuego Yahvé ejecutará juicio[a], y por su espada, contra toda carne[b]; y serán muchos los heridos de Yahvé.
  to: Porque por fuego Yahvé ejecutará juicio[a], y por su espada, contra toda carne[b]; y serán muchos los muertos por Yahvé.
  rationale: 'Se requiere una reparación puntual pero importante: cambiar «los heridos de Yahvé» por «los muertos por Yahvé» para reflejar fielmente חַלְלֵי יְהוָה y la decisión auditada en inglés («those slain by Yahweh»). También se ajusta la nota [a] para representar correctamente las alternativas documentadas para נִשְׁפָּט y para no perder «contra toda carne» en la formulación alternativa.'
  reviewer_model: gpt-5.4
