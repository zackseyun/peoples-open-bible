base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/030.yaml
  text: And I sought among them for a man who would build up a wall and stand in the breach before me on behalf of the land[a], so that I would not destroy it[b], but I found none.
  footnotes:
  - marker: a
    text: Or 'stand in the gap.' The Hebrew image is of taking one's place in a breach in the wall, with the sense of protective intervention.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man.' The singular masculine form may function representatively, but the translation preserves the wording of the source.
    reason: lexical_alternative
