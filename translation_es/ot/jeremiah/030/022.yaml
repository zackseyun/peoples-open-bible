translation:
  language: es
  text: Y serán mi pueblo[a], y yo seré su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo más literalmente: «serán para mí por pueblo, y yo seré para ustedes por Dios», una fórmula de pacto que expresa pertenencia mutua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִהְיִיתֶם
  english_pob_choice: you will be
  chosen_spanish: ustedes serán
  alternatives_spanish:
  - ustedes serán
  - serán
  lexicon: HALOT
  rationale: El imperfecto de היה en este contexto tiene sentido futuro. «Serán» comunica la promesa; añadí «ustedes» para dejar claro el sujeto plural y conservar la correspondencia del pacto.
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'En la fórmula de pacto, la preposición con sufijo se expresa naturalmente en español como posesivo: «mi pueblo». Esto conserva la relación de pertenencia mutua sin volver la frase rígida.'
- source_word: לְעָם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - un pueblo
  - gente
  lexicon: HALOT
  rationale: «Pueblo» es el equivalente bíblico normal para עָם en fórmulas de pacto. «Un pueblo» sería más literal, pero en español suena menos natural aquí y no añade claridad.
- source_word: וְאָנֹכִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y en cuanto a mí, yo
  - y yo, por mi parte
  lexicon: HALOT
  rationale: אָנֹכִי aporta énfasis, pero en español el paralelismo simple «y yo» conserva bien la simetría del pacto sin sobrecargar el estilo.
- source_word: אֶהְיֶה
  english_pob_choice: I will be
  chosen_spanish: seré
  alternatives_spanish:
  - estaré siendo
  - seré para ustedes
  lexicon: HALOT
  rationale: El imperfecto con valor futuro se traduce naturalmente con «seré», manteniendo el paralelo verbal con «serán».
- source_word: לָכֶם
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - para ustedes
  lexicon: HALOT
  rationale: En plural de trato formal y neutro, «su Dios» expresa bien la relación del pacto. «De ustedes» o «para ustedes» suenan más analíticos y menos idiomáticos en español bíblico.
- source_word: לֵאלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un Dios
  - como Dios
  lexicon: HALOT
  rationale: En este contexto, אֱלֹהִים se refiere al Dios de Israel; «Dios» es la traducción directa y adecuada. No se añade artículo porque la fórmula española estable es «seré su Dios».
theological_decisions:
- issue: Fórmula de pacto recíproco
  english_pob_reading: And you will be my people, and I will be your God.
  chosen_spanish_reading: Y ustedes serán mi pueblo, y yo seré su Dios.
  alternative_spanish_readings:
  - Y ustedes serán un pueblo para mí, y yo seré Dios para ustedes.
  - Y serán mi pueblo, y yo seré su Dios.
  rationale: La oración reproduce la fórmula clásica de pertenencia mutua sin diluirla en una paráfrasis. Se mantiene la reciprocidad del pacto y la orientación futura, evitando resolver la tensión idiomática del hebreo con una glosa en el cuerpo del texto.
  doctrine_reference: Preservar la fórmula de pacto; equivalencia óptima; no neutralizar la relación de pertenencia mutua
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios y la comparación cruzada mostró alto acuerdo; por eso no se introdujeron variantes textuales ni notas adicionales. La nota única preserva la alternativa literal documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se prefirió «pueblo» para עָם y no «gente», por tratarse de una fórmula de pacto.
  - La nota usa una glosa literal con «para mí/para ustedes» para reflejar el hebreo sin reemplazar el texto principal.
