    issue: La nota [a] presenta de forma imprecisa el hebreo subyacente.
    rationale: 'Dice: «Hebreo: “¡Ah, Señor Yahvé!”», pero el hebreo no está escrito en español; la nota debería explicar que el hebreo tiene אֲדֹנָי יְהוִה, tradicionalmente vertido de varias maneras, y que aquí se traduce «Señor Yahvé».'
  - severity: low
