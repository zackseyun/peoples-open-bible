translation:
  language: es
  text: Además[a], la Gloria de Israel no mentirá, ni cambiará de parecer[b], porque no es hombre[c] para cambiar de parecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la Eternidad de Israel', 'la Fortaleza de Israel' o 'la Victoria de Israel'. El título hebreo tiene un amplio rango semántico.
    reason: lexical_alternative
  - marker: b
    text: O 'ni cederá' o 'ni se arrepentirá'.
    reason: lexical_alternative
  - marker: c
    text: O 'no es humano'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Asimismo
  - Y también
  - Más aún
  lexicon: HALOT
  rationale: Conserva el valor aditivo y enfático de la conjunción inicial sin endurecer el flujo del español. 'Además' comunica bien la progresión argumentativa del contexto.
- source_word: נֵצַח יִשְׂרָאֵל
  english_pob_choice: the Glory of Israel
  chosen_spanish: la Gloria de Israel
  alternatives_spanish:
  - la Eternidad de Israel
  - la Fortaleza de Israel
  - la Victoria de Israel
  lexicon: HALOT
  rationale: Se mantiene el título elevado escogido por la POB inglesa, con un equivalente natural en español. 'Gloria' conserva la dignidad titular y evita fijar indebidamente una sola acepción del hebreo.
- source_word: יְשַׁקֵּר
  english_pob_choice: will not lie
  chosen_spanish: no mentirá
  alternatives_spanish:
  - no engañará
  - no resultará falso
  lexicon: HALOT
  rationale: El verbo español más directo y natural para la afirmación es 'mentir'. Preserva la oposición con la inestabilidad humana implícita en el versículo.
- source_word: וְלֹא יִנָּחֵם
  english_pob_choice: nor will he relent
  chosen_spanish: ni se arrepentirá
  alternatives_spanish:
  - ni cambiará de parecer
  - ni cederá
  - ni se retractará
  lexicon: HALOT
  rationale: En español bíblico, 'arrepentirse' puede funcionar para נחם, pero aquí se conserva la tensión contextual entre la decisión divina y la posibilidad humana de reversión. 'Se arrepentirá' mantiene el eco tradicional sin sugerir error moral en Dios.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce de forma clara la razón de la afirmación anterior en español contemporáneo y digno.
- source_word: לֹא אָדָם הוּא
  english_pob_choice: he is not a man
  chosen_spanish: no es hombre
  alternatives_spanish:
  - no es humano
  - no es un hombre
  lexicon: HALOT
  rationale: '''Hombre'' reproduce el contraste categorial con el ser humano en general, como en el inglés POB. Se evita ''humano'' para no perder el paralelo tradicional de contraste entre Dios y el hombre.'
- source_word: לְהִנָּחֵם
  english_pob_choice: that he should relent
  chosen_spanish: para que se arrepienta
  alternatives_spanish:
  - para que cambie de parecer
  - para que ceda
  lexicon: HALOT
  rationale: 'El infinitivo final expresa propósito/resultado comparativo: ''para que se arrepienta'' mantiene la continuidad léxica con el miembro anterior y refleja la misma raíz hebrea, sin eliminar la tensión semántica de נחם.'
theological_decisions:
- issue: Cómo rendir נחם sin borrar la tensión entre el lenguaje bíblico y la inmutabilidad divina
  english_pob_reading: will not relent ... that he should relent
  chosen_spanish_reading: ni se arrepentirá ... para que se arrepienta
  alternative_spanish_readings:
  - ni cambiará de parecer ... para que cambie de parecer
  - ni cederá ... para que ceda
  rationale: La POB inglesa preserva la raíz repetida y su tensión contextual. En español, 'arrepentirse' comunica bien la idea bíblica de reversión o cambio de decisión, pero sin concluir que Dios cometa error. Se mantiene la diferencia entre la afirmación acerca de Dios y la comparación con el hombre.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Título divino נֵצַח יִשְׂרָאֵל
  english_pob_reading: the Glory of Israel
  chosen_spanish_reading: la Gloria de Israel
  alternative_spanish_readings:
  - la Eternidad de Israel
  - la Fortaleza de Israel
  - la Victoria de Israel
  rationale: Se conserva la ambigüedad documentada del título hebreo. 'Gloria' sigue la opción principal del POB inglés y evita imponer una explicación doctrinal única sobre נֵצַח.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios: el texto final quedó confirmado sin modificaciones, y el borrador español sigue esa lectura estable de 1 Samuel 15:29 sin añadir interpretaciones ajenas al expediente auditado.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando el texto lo requiera; en este versículo el referente divino está expresado por el título 'la Gloria de Israel' y no por el tetragrámaton explícito.
  - Se mantiene la repetición léxica de la raíz נחם mediante 'se arrepentirá' en ambas mitades, porque la POB inglesa repite 'relent' y desea preservar la tensión teológica.
  - El español usa puntuación y mayúsculas estándar, con registro bíblico sobrio y legible para uso eclesial amplio.
