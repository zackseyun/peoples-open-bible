base_translation:
  language: en
  yaml_path: translation/ot/leviticus/023/010.yaml
  text: 'Speak to the sons of Israel and say to them: When you come into the land that I am giving to you[a], and reap its harvest[b], then you shall bring the sheaf of the firstfruits of your harvest to the priest.'
  footnotes:
