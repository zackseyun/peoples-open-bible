theological_decisions:
- issue: Rendering of גאל in a kinship-legal context
  chosen_reading: redeem
  alternative_readings:
  - act as kinsman-redeemer
  - buy back
  rationale: The verse concerns the legal right and duty associated with family redemption of property. 'Redeem' best preserves the covenantal-legal resonance without importing a more interpretive phrase like 'kinsman-redeemer' into every occurrence. The broader kinship nuance is carried by context rather than inserted into the verb itself.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
