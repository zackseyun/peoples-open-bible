base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/025/004.yaml
  text: But he did not put their sons to death[a], because it is written in the Law, in the Book of Moses, where Yahweh commanded, saying, “Fathers shall not be put to death for sons, and sons shall not be put to death for fathers, but each man shall die for his own sin.”
  footnotes:
  - marker: a
    text: Or, more literally, “fathers shall not die for sons, and sons shall not die for fathers.” The Hebrew legal idiom is rendered in the main text as “be put to death” to make the judicial sense clear.
