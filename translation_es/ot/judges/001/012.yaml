translation:
  language: es
  text: 'Y Caleb dijo[a]: «El que hiera a Quiriat-sefer y la capture, yo le daré a mi hija Axsá por mujer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que hiera a Quiriat-sefer y la capture».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, «Y ... dijo» conserva bien esa progresión sin sobrecargar con matiz temporal.
- source_word: כָּלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar y reconocible en español bíblico.
- source_word: אֲשֶׁר
  english_pob_choice: whoever
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - el que sea
  lexicon: HALOT
  rationale: La relativa indefinida en español se expresa con naturalidad como «el que»; mantiene el carácter abierto del desafío sin forzar una perífrasis innecesaria.
- source_word: יַכֶּה
  english_pob_choice: strikes
  chosen_spanish: hiera
  alternatives_spanish:
  - golpee
  - ataque
  - derrote
  lexicon: HALOT
  rationale: El hebreo נכה en hifil suele ser «herir/golpear»; «hiera» preserva mejor la fuerza léxica que una traducción más interpretativa como «derrote».
- source_word: קִרְיַת סֵפֶר
  english_pob_choice: Kiriath-sepher
  chosen_spanish: Quiriat-sefer
  alternatives_spanish:
  - Quiriat Sefer
  lexicon: HALOT
  rationale: Se translitera el topónimo con ortografía natural para el español. El guion reproduce la relación constructa reflejada en la forma inglesa auditada.
- source_word: וּלְכָדָהּ
  english_pob_choice: and captures it
  chosen_spanish: y la capture
  alternatives_spanish:
  - y la conquiste
  - y la tome
  lexicon: HALOT
  rationale: לכד en contexto militar es «capturar/apresar»; en español, el subjuntivo encaja con la relativa indefinida («el que... capture») y preserva la condición de la promesa.
- source_word: וְנָתַתִּי לוֹ
  english_pob_choice: I will give him
  chosen_spanish: yo le daré
  alternatives_spanish:
  - le daré
  - entonces le daré
  lexicon: HALOT
  rationale: El futuro de promesa se expresa de manera directa. Se mantiene el pronombre explícito para reflejar el énfasis del hebreo y la claridad de la oferta.
- source_word: עַכְסָה
  english_pob_choice: Achsah
  chosen_spanish: Axsá
  alternatives_spanish:
  - Acsá
  - Acsah
  lexicon: HALOT
  rationale: Se adopta una transliteración española uniforme del nombre propio, más natural para lectura pública que la forma inglesa con ch inicial.
- source_word: בִתִּי
  english_pob_choice: my daughter
  chosen_spanish: mi hija
  alternatives_spanish:
  - mi hija propia
  lexicon: HALOT
  rationale: «Hija» es la equivalencia directa y clara de בַּת; se conserva el posesivo para mantener la relación familiar central de la promesa.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por mujer
  alternatives_spanish:
  - como esposa
  - para esposa
  lexicon: HALOT
  rationale: La expresión hebrea describe la entrega en matrimonio. «Por mujer» es una fórmula breve, natural y suficientemente fiel; «como esposa» sería más explicativa, pero menos pegada a la forma del texto.
translation_notes:
  revision_awareness: El texto base inglés fue revisado y quedó sin cambios sustanciales; la concordancia general es alta. La presente versión española sigue de cerca la lectura auditada, pero adapta la sintaxis para un español bíblico natural y mantiene la alternativa relativa indefinida mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo requiere explícitamente; este versículo no lo contiene.
  - Se conserva la promesa condicional con relativa indefinida, reflejada en la nota alternativa.
  - Los nombres propios se transliteran de forma consistente y legible para público hispanohablante.
  - Se evita «esposa» en el cuerpo principal porque el hebreo usa una expresión más directa de entrega matrimonial, y «por mujer» conserva mejor esa forma.
