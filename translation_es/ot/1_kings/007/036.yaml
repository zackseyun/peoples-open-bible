base_translation:
  language: en
  yaml_path: translation/ot/1_kings/007/036.yaml
  text: On the panels of its supports and on its frames he engraved cherubim[a], lions, and palm trees, according to the space on each[b], with wreaths all around.
  footnotes:
  - marker: a
    text: Or 'wherever there was room for each figure.' The Hebrew phrase is difficult and likely describes the arrangement of the carvings according to the available space.
    reason: lexical_alternative
  - marker: b
    text: Or 'garlands' for 'wreaths.' The Hebrew term likely refers to ornamental festoons surrounding the figures.
    reason: lexical_alternative
