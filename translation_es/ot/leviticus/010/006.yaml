review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y conserva correctamente «Yahvé», «toda la casa de Israel» y la advertencia de muerte/ira. Sin embargo, dos decisiones claves no son fieles ni idiomáticas en español: «la combustión» no transmite naturalmente הַשְּׂרֵפָה en un registro bíblico legible, y la nota [b] se desvía del motivo documentado en el POB inglés, que trata de la expresión cognada «the burning that Yahweh has kindled/burned», no de «house of Israel».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «combustión» suena técnico-científico y poco eclesial, debilitando la legibilidad. También conviene ajustar la puntuación inicial suprimiendo la coma innecesaria tras «Aarón» para mayor fluidez. «No descubran sus cabezas» y «rasguen sus vestidos» son aceptables en este marco.
  glossary_alignment: Se alinea con la política al usar «Yahvé» para יְהוָה. No hay conflicto con otros términos del glosario. La principal desviación es estilística/lexical en שְׂרֵפָה, donde «combustión» no refleja bien el razonamiento auditado ni el español bíblico natural; «el incendio» o «la quema» funcionan mejor, y «el incendio» ofrece la mejor combinación de naturalidad y concreción.
  issues:
  - severity: medium
    issue: «la combustión» para הַשְּׂרֵפָה
    rationale: Aunque intenta conservar el sustantivo concreto, en español neutral «combustión» suena técnico y ajeno al registro bíblico. El hebreo se refiere al quemar/ardor destructivo causado por el fuego divino; «el incendio» comunica mejor el evento de fuego de forma natural y digna.
  - severity: medium
    issue: La nota [b] no corresponde al punto lexical preservado por el POB inglés
    rationale: La nota inglesa [b] explica el cognado «the burning that the LORD burned» y la elección idiomática «has kindled». La nota española actual comenta «toda la casa de Israel», pero esa frase no lleva nota en el texto inglés ni resuelve una ambigüedad nueva creada por el español.
  - severity: low
    issue: Coma innecesaria tras «Aarón»
    rationale: «Y dijo Moisés a Aarón y a Eleazar e Itamar...» fluye mejor en español sin esa coma.
