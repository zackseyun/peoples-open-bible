translation:
  language: es
  text: No convienen al necio palabras elevadas[a]; cuánto menos al noble[c] labios mentirosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habla excelente» o «habla grandiosa». La expresión hebrea puede enfatizar habla elevada, excesiva o grandiosa.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «príncipe» o «generoso». El hebreo נָדִיב puede referirse tanto a rango noble como a carácter noble.'
    reason: lexical_alternative

lexical_decisions:
- source_word: נָאוָה
  english_pob_choice: is not fitting
  chosen_spanish: no conviene
  alternatives_spanish:
  - no es apropiado
  - no es fitting
  - no es adecuado
  lexicon: HALOT
  rationale: El hebreo expresa adecuación o conveniencia. 'No conviene' suena natural en español y conserva la idea de falta de correspondencia entre la persona y el tipo de habla.
- source_word: נָבָל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el necio insensato
  - el tonto
  - el insensato
  lexicon: HALOT
  rationale: En la literatura sapiencial, נָבָל describe a alguien moralmente torcido o sin juicio, no solo poco inteligente. 'Necio' mantiene ese valor bíblico y es idiomático en español.
- source_word: שְׂפַת יֶתֶר
  english_pob_choice: Excellent speech
  chosen_spanish: hablar con exceso
  alternatives_spanish:
  - habla elevada
  - hablar con grandeza
  - habla excelsa
  lexicon: HALOT
  rationale: La expresión puede sugerir habla elevada, abundante o excesiva. En español, 'hablar con exceso' preserva la tensión del hebreo sin forzar un elogio positivo que no encaja bien con el contraste del proverbio.
- source_word: אַף כִּי
  english_pob_choice: how much less
  chosen_spanish: ¡cuánto menos
  alternatives_spanish:
  - mucho menos
  - con más razón no
  - menos aún
  lexicon: HALOT
  rationale: La locución introduce un argumento a fortiori. '¡Cuánto menos' reproduce esa intensificación de manera clara y natural.
- source_word: נָדִיב
  english_pob_choice: a noble man
  chosen_spanish: al noble
  alternatives_spanish:
  - al príncipe
  - al generoso
  - al hombre noble
  lexicon: HALOT
  rationale: נָדִיב puede referirse a nobleza de rango o de carácter. 'Al noble' conserva la ambigüedad útil del hebreo y permite ambas lecturas sin sobreexplicar.
- source_word: שְׂפַת שָׁקֶר
  english_pob_choice: lying lips
  chosen_spanish: hablar mentira
  alternatives_spanish:
  - labios mentirosos
  - habla falsa
  - lengua mentirosa
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'labio de mentira'. En español, 'hablar mentira' comunica la idea sin volver torpe la imagen corporal; la nota conserva la alternativa más literal.
theological_decisions:
- issue: Valor de נָדִיב entre rango social y nobleza moral
  english_pob_reading: a noble man; Or 'a prince' or 'a generous man.' The Hebrew נָדִיב can refer to noble rank or noble character.
  chosen_spanish_reading: al noble
  alternative_spanish_readings:
  - al príncipe
  - al generoso
  - al hombre noble
  rationale: El proverbio contrapone al necio con una figura digna de honor. 'Al noble' deja abierta la posible referencia a rango o carácter, como hace el inglés POB, sin decidir prematuramente entre 'príncipe' y 'generoso'.
  doctrine_reference: Sabiduría bíblica y semántica contextual de términos de estatus/virtud en Proverbios.
- issue: Sentido de שְׂפַת יֶתֶר como habla elevada o excesiva
  english_pob_reading: Excellent speech ... Or 'lofty speech.' The Hebrew expression may emphasize elevated, excessive, or grand speech.
  chosen_spanish_reading: hablar con exceso
  alternative_spanish_readings:
  - habla elevada
  - hablar con grandeza
  - habla excelsa
  rationale: El hebreo permite varias matizaciones. En español, 'hablar con exceso' mantiene la posibilidad de habla desmedida o elevada y evita imponer una valoración positiva que el proverbio luego niega al aplicarla al necio.
  doctrine_reference: Principios de traducción de la poesía sapiencial y preservación de la ambigüedad léxica.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del hebreo y el audit trail en inglés, pero ajusta la primera cola para evitar una aparente aprobación de la 'habla excelente' aplicada al necio. Se preserva la comparación a fortiori y la ambigüedad de נָדִיב, con nota para alternativas legítimas.
  spanish_consistency_notes:
  - Se mantuvo 'necio' para נָבָל, en línea con el uso sapiencial.
  - Se eligió 'al noble' para נָדִיב para conservar la amplitud semántica de rango/virtud.
  - Se tradujo la segunda cola con un infinitivo verbal para sonar natural en español y sostener el paralelo poético.
  - Las notas usan alternativas breves y no duplican marcadores.
