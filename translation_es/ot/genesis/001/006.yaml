translation:
  language: es
  text: 'Y Dios dijo: «Haya una expansión[a] en medio de las aguas[b], y que separe las aguas de las aguas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “firmamento”, “bóveda” o “domo”. El hebreo רָקִיעַ se refiere a algo extendido o desplegado; las traducciones difieren según cuán explícitamente reflejen el trasfondo cosmológico antiguo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “que separe entre aguas y aguas”, es decir, que distinga un cuerpo de aguas de otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / said
  english_pob_choice: And God said
  chosen_spanish: Y Dios dijo
  alternatives_spanish:
  - Entonces dijo Dios
  - Y dijo Dios
  lexicon: HALOT
  rationale: El waw narrativo avanza la secuencia, y en español “Y Dios dijo” conserva el flujo narrativo breve y solemne sin añadir matiz temporal innecesario. "Dijo Dios" también sería posible, pero el orden elegido suena más natural en este contexto y mantiene la apertura formulaica del relato.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En Génesis 1, אֱלֹהִים lleva verbo singular y designa al único Creador. En español, “Dios” es la equivalencia normal, clara y fiel al referente singular del pasaje.
- source_word: יְהִי
  english_pob_choice: Let there be
  chosen_spanish: Haya
  alternatives_spanish:
  - Que haya
  - Sea
  lexicon: HALOT
  rationale: El jussivo expresa un acto creador por mandato divino. En español, “Haya” transmite de manera directa y natural esa fuerza volitiva. “Sea” es posible, pero en este caso “Haya” mantiene mejor la forma de fiat creador.
- source_word: רָקִיעַ
  english_pob_choice: expanse
  chosen_spanish: un espacio abierto
  alternatives_spanish:
  - una expansión
  - un firmamento
  - una bóveda
  - una extensión
  lexicon: HALOT
  rationale: El término hebreo alude a algo extendido o desplegado. “Espacio abierto” comunica la idea de extensión sin comprometer de entrada una reconstrucción cosmológica más específica. Se preserva así la tensión lexical documentada entre opciones tradicionales y opciones más descriptivas.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en medio de
  - dentro de
  - en el centro de
  lexicon: HALOT
  rationale: La expresión marca ubicación intermedia. “En medio de” es la correspondencia más natural en español y refleja bien la posición entre las aguas.
- source_word: הַמָּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo es significativo y en contexto refiere a las aguas primordiales como masa colectiva. “Las aguas” conserva tanto el número como la imaginería del pasaje.
- source_word: וִיהִי
  english_pob_choice: and let it
  chosen_spanish: y que separe
  alternatives_spanish:
  - y haya
  - y sea
  lexicon: HALOT
  rationale: El hebreo continúa la jussiva y presenta la función del sujeto implícito. En español, “y que separe” deja claro que el sujeto es el espacio abierto/expansión implícito en la cláusula anterior, sin forzar una repetición artificial.
- source_word: מַבְדִּיל
  english_pob_choice: separate
  chosen_spanish: separe
  alternatives_spanish:
  - divida
  - haga separación entre
  lexicon: HALOT
  rationale: El participio hifil de בדל expresa causar separación. “Separe” es el verbo más claro y directo en español para este efecto creador.
- source_word: בֵּין מַיִם לָמָיִם
  english_pob_choice: water from water
  chosen_spanish: las aguas de las aguas
  alternatives_spanish:
  - agua de agua
  - entre aguas y aguas
  lexicon: HALOT
  rationale: La construcción hebrea literalmente habla de distinguir entre aguas y aguas. La formulación “las aguas de las aguas” conserva más de cerca la estructura y la duplicación del original, mientras que el español exige naturalmente un verbo de separación ya introducido. Se evita reducir demasiado la imagen primordial.
theological_decisions:
- issue: Cómo traducir רָקִיעַ sin fijar demasiado la cosmología antigua
  english_pob_reading: expanse
  chosen_spanish_reading: un espacio abierto
  alternative_spanish_readings:
  - firmamento
  - bóveda
  - dome
  - expansión
  rationale: 'La decisión sigue la lógica del POB en inglés: conservar el sentido de algo extendido o desplegado sin imponer en el texto principal una lectura cosmológica concreta. “Espacio abierto” es suficientemente fiel y legible para lectores contemporáneos, mientras que las alternativas más específicas se mantienen disponibles como posibilidades interpretativas.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete de origen; el borrador sigue el texto hebreo con la misma lectura de alto acuerdo del audit trail en inglés.
  spanish_consistency_notes:
  - Se usa “Dios” para אֱלֹהִים en coherencia con Génesis 1.
  - Se conserva el plural “las aguas” para מַיִם, sin normalizarlo a singular.
  - Se evita “SEÑOR” porque el verso no contiene el Tetragrámaton ni una cita explícita de Yahvé.
  - La redacción principal mantiene una equivalencia óptima, con notas para alternativas léxicas relevantes.
