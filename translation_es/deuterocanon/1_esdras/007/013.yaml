translation:
  language: es
  text: Y comieron[a] los hijos de Israel, los que eran de la cautividad, todos los que se habían apartado de las abominaciones de las naciones de la tierra[b], buscando a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, comieron la comida de la Pascua; el objeto es implícito en el griego por el contexto precedente.
    reason: cross_reference
  - marker: b
    text: O 'de los pueblos de la tierra'. La expresión alude a los habitantes circundantes cuyas prácticas se consideraban contaminantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφάγοσαν
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - comieron de
  - participaron de
  lexicon: LSJ
  rationale: El verbo griego significa simplemente 'comieron'. En español, 'comieron' mantiene la concisión y no introduce el objeto implícito del contexto inmediato.
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: '''Hijos de Israel'' conserva la estructura idiomática del griego y la resonancia covenantal del original.'
- source_word: οἱ ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: who were from the captivity
  chosen_spanish: los que eran de la cautividad
  alternatives_spanish:
  - los que venían de la cautividad
  - los retornados del cautiverio
  lexicon: LSJ
  rationale: La frase identifica al grupo como perteneciente a la cautividad. 'Los que eran de la cautividad' sigue de cerca el sentido griego sin añadir explícitamente 'retornados'.
- source_word: χωρισθέντες
  english_pob_choice: had separated themselves
  chosen_spanish: se habían apartado
  alternatives_spanish:
  - se habían separado
  - se habían consagrado apartándose
  lexicon: LSJ
  rationale: 'El participio aoristo pasivo en contexto tiene fuerza reflexiva: personas que se apartaron voluntariamente. ''Se habían apartado'' es natural en español y conserva esa iniciativa.'
- source_word: βδελυγμάτων
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - prácticas detestables
  - impurezas
  lexicon: LSJ
  rationale: '''Abominaciones'' es el equivalente tradicional fuerte para acciones o prácticas cultualmente/moralmente repulsivas y preserva la carga severa del término.'
- source_word: τῶν ἐθνῶν τῆς γῆς
  english_pob_choice: of the nations of the land
  chosen_spanish: de las naciones de la tierra
  alternatives_spanish:
  - de los pueblos de la tierra
  - de las naciones de la región
  lexicon: LSJ
  rationale: La construcción se traduce de forma literal y transparente. 'Tierra' mantiene la ambigüedad geográfica del griego sin convertirla en un término técnico posterior.
- source_word: ζητοῦντες
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - buscando al
  - buscando a Yahvé
  lexicon: LSJ
  rationale: El participio presente expresa acción continua o concomitante. 'Buscando' reproduce bien esa orientación religiosa en español.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - a Dios
  lexicon: Project default YHWH
  rationale: Aunque el griego dice κύριον, en este contexto se trata del nombre divino implícito por el trasfondo de la tradición bíblica. El proyecto pide 'Yahvé' cuando el κύριος griego remite al nombre divino.
theological_decisions:
- issue: Si hacer explícito el objeto implícito de 'comieron'
  english_pob_reading: 'Leave the object implicit: ''ate'''
  chosen_spanish_reading: 'Dejar el objeto implícito: ''comieron'''
  alternative_spanish_readings:
  - comieron la Pascua
  - participaron del banquete pascual
  rationale: El griego no nombra el objeto aquí; el contexto inmediato lo sugiere, pero no obliga a expresarlo en esta línea. Por eso la traducción española no lo añade.
  doctrine_reference: 'Principio de fidelidad al texto fuente: no ampliar más allá de lo que el original dice.'
- issue: Cómo rendir la separación de prácticas contaminantes
  english_pob_reading: '''had separated themselves from the abominations of the nations of the land'''
  chosen_spanish_reading: se habían apartado de las abominaciones de las naciones de la tierra
  alternative_spanish_readings:
  - se habían apartado de la impureza de los pueblos de la tierra
  - se habían separado de las prácticas detestables de las naciones de la tierra
  rationale: La frase conserva el peso cultual y moral del original. 'Abominaciones' evita suavizar la condena y no reduce el lenguaje a mera diferencia social.
  doctrine_reference: Preservar el peso teológico del lenguaje de pureza/separación sin interpretarlo de más.
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que cada marca de nota [a] y [b] aparezca exactamente en el texto español, anclada en la frase correspondiente. También se mantuvo el objeto implícito de 'comieron' sin expansionarlo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en lugar de 'Señor' porque el griego κύριον refleja aquí el nombre divino por trasfondo contextual y el proyecto lo pide como término principal.
  - Se conservó 'abominaciones' para mantener la fuerza cultual/moral del término.
  - '''Naciones de la tierra'' se dejó literal para respetar la ambigüedad del griego y la formulación del texto fuente.'
  - El orden de los elementos sigue el griego con fluidez natural en español, sin introducir contenido narrativo no presente en el versículo.
