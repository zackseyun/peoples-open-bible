translation:
  language: es
  text: pero si vuelven a mí y guardan mis mandamientos y los ponen por obra, aunque sus desterrados[a] estén al extremo de los cielos[b], desde allí los reuniré y los haré venir al lugar que he elegido[c], para hacer habitar allí mi nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus expulsados’ o ‘sus dispersos’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘al extremo de los cielos’, un modismo para la distancia más lejana posible.'
    reason: cultural_note
  - marker: c
    text: O ‘para poner mi nombre allí’. El hebreo conserva la imagen de que el nombre de Dios habita en el lugar escogido.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשַׁבְתֶּם אֵלַי
  english_pob_choice: but if you return to me
  chosen_spanish: pero si vuelves a mí
  alternatives_spanish:
  - y vuelves a mí
  - si te vuelves a mí
  - si regresas a mí
  lexicon: HALOT
  rationale: שׁוּב con אֶל expresa ‘volver/retornar’. En español, ‘volver a mí’ conserva la relación de retorno y el valor condicional del contexto; se evita una paráfrasis más interpretativa.
- source_word: וּשְׁמַרְתֶּם מִצְוֺתַי
  english_pob_choice: and keep my commandments
  chosen_spanish: y guardas mis mandamientos
  alternatives_spanish:
  - y observas mis mandamientos
  - y cumples mis mandamientos
  lexicon: HALOT
  rationale: שׁמר con mandamientos se rinde naturalmente como ‘guardar’ en español bíblico y moderno. Mantiene el matiz de custodiar/obedecer el pacto.
- source_word: וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los pones por obra
  alternatives_spanish:
  - y los haces
  - y los practicas
  - y los cumples
  lexicon: HALOT
  rationale: El hebreo distingue entre ‘guardar’ y ‘hacer’. ‘Poner por obra’ reproduce esa separación sin sonar demasiado rígido; preserva el énfasis en la ejecución concreta.
- source_word: נִדַּחֲכֶם
  english_pob_choice: your outcasts
  chosen_spanish: tus desterrados
  alternatives_spanish:
  - tus expulsados
  - tus dispersos
  - tus exiliados
  lexicon: HALOT
  rationale: El término alude a los que han sido echados fuera o dispersados. ‘Desterrados’ comunica bien la realidad del exilio sin perder la pasividad del participio/pasivo implícito.
- source_word: בִּקְצֵה הַשָּׁמַיִם
  english_pob_choice: at the end of the heavens
  chosen_spanish: al extremo de los cielos
  alternatives_spanish:
  - al fin de los cielos
  - hasta el extremo de los cielos
  - al otro extremo del cielo
  lexicon: HALOT
  rationale: Se conserva el plural hebreo ‘cielos’ y el idiomatismo de distancia extrema. ‘Al extremo de los cielos’ es literal y comprensible en español sin normalizarlo a singular.
- source_word: מִשָּׁם אֲקַבְּצֵם
  english_pob_choice: from there I will gather them
  chosen_spanish: desde allí los reuniré
  alternatives_spanish:
  - desde allí los recogeré
  - desde allí los congregaré
  lexicon: HALOT
  rationale: קבץ se usa para reunir a un pueblo disperso; ‘reunir’ transmite la restauración comunitaria de forma natural y digna.
- source_word: וַהֲבֹאתִים
  english_pob_choice: and bring them
  chosen_spanish: y los haré venir
  alternatives_spanish:
  - y los traeré
  - y los llevaré
  lexicon: HALOT
  rationale: El causativo de בוא puede expresarse como ‘hacer venir’. Esto conserva la dirección causativa del hebreo sin forzar una expresión extraña en español.
- source_word: הַמָּקוֹם אֲשֶׁר בָּחַרְתִּי
  english_pob_choice: the place that I have chosen
  chosen_spanish: el lugar que he elegido
  alternatives_spanish:
  - el lugar que escogí
  - el sitio que he escogido
  lexicon: HALOT
  rationale: בחר, referido al lugar santuario, se rinde naturalmente como ‘elegir’. ‘Lugar’ resulta más fluido que ‘lugar’/‘sitio’ y mantiene la referencia cultual.
- source_word: לְשַׁכֵּן אֶת שְׁמִי שָׁם
  english_pob_choice: to make my name dwell there
  chosen_spanish: para hacer habitar allí mi nombre
  alternatives_spanish:
  - para poner mi nombre allí
  - para hacer morar allí mi nombre
  - para que mi nombre habite allí
  lexicon: HALOT
  rationale: Se preserva la fórmula de ‘mi nombre’ y el verbo causativo ligado a שכן. ‘Hacer habitar’ mantiene la imagen de morada sin resolverla hacia un mero memorial.
theological_decisions:
- issue: Fórmula del nombre divino en el lugar escogido
  english_pob_reading: to make my name dwell there
  chosen_spanish_reading: para hacer habitar allí mi nombre
  alternative_spanish_readings:
  - para poner mi nombre allí
  - para que mi nombre habite allí
  rationale: 'La traducción conserva la tensión teológica de la fórmula deuteronómica: el lugar elegido está asociado con el nombre de Dios, pero sin reducirlo a una presencia meramente simbólica ni a una localización física absoluta. ‘Hacer habitar’ preserva la imaginería del hebreo.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo con apoyo del auditorial inglés de la POB; no se detectaron revisiones posteriores en el expediente, y la versión más reciente permanece sin cambios.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton en toda la obra, pero este versículo no lo contiene explícitamente.
  - Se preserva ‘cielos’ en plural para reflejar שָׁמַיִם.
  - Se mantiene la distinción entre ‘guardar’ y ‘poner por obra’, siguiendo la separación semántica del hebreo.
  - Se traduce el lenguaje del exilio con ‘desterrados’, evitando normalizarlo a una formulación menos marcada.
