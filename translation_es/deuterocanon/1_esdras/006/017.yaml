    issue: La nota [a] está anclada al término equivocado.
    rationale: El contenido de la nota explica el nombre griego Σαβανασσάρ y su relación con «Sheshbazzar», por lo que debe marcar «Sanabassar», no «vasos sagrados». Esto incumple la disciplina requerida de correspondencia exacta entre anclaje y nota.
  - severity: medium
    issue: «La casa de Jerusalén» es menos natural y menos preciso que «la casa en Jerusalén».
    rationale: El griego οἴκου τοῦ ἐν Ἰερουσαλήμ significa literalmente «la casa en Jerusalén». «De Jerusalén» puede sonar posesivo o identificador, mientras que «en Jerusalén» preserva mejor la localización explícita y mejora la naturalidad del español.
