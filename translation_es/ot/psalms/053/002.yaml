translation:
  language: es
  text: 'El necio dice en su corazón: «No hay Dios». Ellos se han corrompido; cometen injusticia abominable[a]; no hay quien haga el bien.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cometen mal detestable» o «han hecho abominables sus obras». El hebreo combina un verbo de abominación con un sustantivo que significa «mal/injusticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבָל
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  lexicon: HALOT
  rationale: נָבָל no describe solo falta de inteligencia, sino una necedad moral y religiosa. En español, «necio» comunica mejor ese perfil ético que «tonto», y es más sobrio y bíblico que una paráfrasis más explicativa.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí
  - dentro de sí
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de interioridad y pensamiento. «En su corazón» conserva la imagen antropológica del texto y refleja el alcance interno de la afirmación.
- source_word: אֵין אֱלֹהִים
  english_pob_choice: There is no God
  chosen_spanish: No hay Dios
  alternatives_spanish:
  - Dios no existe
  - No existe Dios
  lexicon: HALOT
  rationale: La negación es existencial y absoluta. «No hay Dios» reproduce bien la fuerza breve del hebreo sin añadir una formulación filosófica más moderna que el texto no exige.
- source_word: הִשְׁחִיתוּ
  english_pob_choice: They are corrupt
  chosen_spanish: se han corrompido
  alternatives_spanish:
  - son corruptos
  - se corrompieron
  lexicon: HALOT
  rationale: El verbo hebreo presenta el estado resultante de corrupción moral. «Se han corrompido» mantiene ese resultado y evita una simplificación meramente adjetival.
- source_word: וְהִתְעִיבוּ עָוֶל
  english_pob_choice: they commit abominable injustice
  chosen_spanish: han cometido iniquidad abominable
  alternatives_spanish:
  - hacen mal abominable
  - cometen injusticia abominable
  lexicon: HALOT
  rationale: El hebreo combina un verbo de volverse/actuar de forma abominable con el sustantivo עָוֶל. «Iniquidad abominable» conserva la tensión léxica entre el acto detestable y la cualidad moral del daño, sin reducirlo a una sola palabra española.
- source_word: עָוֶל
  english_pob_choice: injustice
  chosen_spanish: iniquidad
  alternatives_spanish:
  - injusticia
  - maldad
  lexicon: HALOT
  rationale: עָוֶל puede abarcar injusticia, maldad o torcedad moral. Aquí «iniquidad» mantiene el registro bíblico y deja visible la carga moral amplia del término; por eso no se limita a una injusticia meramente social o legal.
- source_word: אֵין עֹשֵׂה טוֹב
  english_pob_choice: there is no one who does good
  chosen_spanish: no hay quien haga el bien
  alternatives_spanish:
  - no hay nadie que haga el bien
  - no hay quien obre el bien
  lexicon: HALOT
  rationale: La construcción participial hebrea expresa ausencia total de hacedores del bien. «No hay quien haga el bien» es natural en español y conserva la generalidad universal del cierre.
theological_decisions:
- issue: Cambio del singular representativo al plural en la segunda cola
  english_pob_reading: Retain the singular in the first clause and render the following verbs as plural ('They are corrupt...')
  chosen_spanish_reading: Mantener el singular representativo en la primera frase y pasar al plural en la segunda («Ellos se han corrompido...»).
  alternative_spanish_readings:
  - «El necio... se ha corrompido...»
  - «Los necios dicen... se han corrompido...»
  rationale: El hebreo pasa de נָבָל singular a verbos plurales, ampliando del arquetipo al grupo. La traducción española conserva ese movimiento retórico en vez de nivelarlo gramaticalmente.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Referencia pronominal masculina en el singular representativo
  english_pob_reading: Use 'his heart'
  chosen_spanish_reading: Usar «su corazón» para el singular masculino representativo.
  alternative_spanish_readings:
  - «su corazón» con forma neutra implícita
  - «su mente»
  rationale: El sufijo hebreo es masculino singular y remite al necio representativo. En español, «su corazón» conserva la imagen y no borra el marcado de género del referente original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto base y el auditorial inglés muestran alta concordancia y ninguna revisión aplicada en la última pasada. La redacción española sigue esa lectura estable sin introducir armonizaciones ni expansiones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» con mayúscula por tratarse del Dios verdadero en el marco del salmo.
  - Se conserva el cambio de número entre el sujeto singular representativo y los verbos/plurales subsiguientes.
  - Se evita «SEÑOR» porque el texto hebreo aquí dice אֱלֹהִים, no el Tetragrámaton.
  - «Iniquidad» se usa como equivalente bíblico de עָוֶל para retener el registro moral del pasaje.
