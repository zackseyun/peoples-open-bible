    issue: «se ha detenido» para עָמַד
    rationale: El hebreo presenta la escena con fuerza inmediata (‘stands’ en el POB inglés). «Se ha detenido» añade un matiz aspectual de acción previa completada que no está en el original y debilita la imagen espacial de estar apostado en el cruce.
  - severity: medium
