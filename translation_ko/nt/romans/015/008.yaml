  yaml_path: translation/nt/romans/015/008.yaml
  text: For I say that the Messiah has become a servant to the circumcised for the sake of God's truth, in order to confirm the promises to the fathers,
translation:
  language: ko
  text: 내가 말합니다. 메시아께서 하나님의 진리를 위하여 할례받은 자들의 일꾼이 되셨다는 것입니다. 이는 조상들에게 주신 약속들을 확증하시려는 것이며,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διάκονον
  english_pob_choice: a servant
