translation:
  language: es
  text: ¡Ay de la corona orgullosa de los borrachos de Efraín[a], y de la flor marchita de su gloriosa hermosura, que está en la parte alta del valle fértil[b], de los vencidos[c] por el vino!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la corona del orgullo ... y la flor que se marchita de su gloriosa hermosura». El hebreo permite leves variaciones en el encuadre de las metáforas para referirse al mismo objeto.'
    reason: lexical_alternative
  - marker: b
    text: «Valle fértil» traduce de manera idiomática «valle de riquezas/fecundidad»; el hebreo dice literalmente «valle de grosuras».
    reason: cultural_note
  - marker: c
    text: 'O: «los que están vencidos por el vino». La expresión hebrea es más vívida y sugiere personas derribadas o golpeadas por el vino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Woe!
  lexicon: HALOT
  rationale: En español, «¡Ay de!» conserva el tono profético de denuncia y lamentación de הוֹי con naturalidad idiomática, sin perder la fuerza de juicio.
- source_word: עֲטֶרֶת גֵּאוּת
  english_pob_choice: the proud crown
  chosen_spanish: la corona orgullosa
  alternatives_spanish:
  - la corona de orgullo
  - la diadema del orgullo
  lexicon: HALOT
  rationale: La cadena constructa expresa una corona caracterizada por la soberbia; «corona orgullosa» mantiene la imagen breve y poética, equivalente a la solución inglesa sin forzar una perífrasis.
- source_word: שִׁכֹּרֵי אֶפְרַיִם
  english_pob_choice: the drunkards of Ephraim
  chosen_spanish: los borrachos de Efraín
  alternatives_spanish:
  - los ebrios de Efraín
  - los bebedores de Efraín
  lexicon: HALOT
  rationale: El hebreo nombra al grupo por su condición de embriaguez; «borrachos» refleja bien ese rasgo identificador en español contemporáneo y conserva la aspereza del juicio profético.
- source_word: וְצִיץ נֹבֵל
  english_pob_choice: and the fading flower
  chosen_spanish: y de la flor marchita
  alternatives_spanish:
  - y la flor que se marchita
  - y de la flor que se marchita
  lexicon: HALOT
  rationale: צִיץ es «flor» o «floración», y נֹבֵל comunica la idea de marchitarse. «Flor marchita» es una equivalencia poética válida en español que conserva la imagen de decadencia.
- source_word: צְבִי תִפְאַרְתּוֹ
  english_pob_choice: of his glorious beauty
  chosen_spanish: de su gloriosa hermosura
  alternatives_spanish:
  - de su espléndida hermosura
  - de su belleza gloriosa
  lexicon: HALOT
  rationale: Se mantiene el paralelismo de dos sustantivos de belleza y gloria; «hermosura» comunica mejor que «belleza» la resonancia poética de צְבִי + תִפְאַרְתּוֹ en español bíblico sin caer en arcaísmo excesivo.
- source_word: אֲשֶׁר עַל רֹאשׁ גֵּיא שְׁמָנִים
  english_pob_choice: which is on the head of the fertile valley
  chosen_spanish: que está en la cabeza del valle fértil
  alternatives_spanish:
  - que está sobre la cima del valle fértil
  - que está en la parte alta del valle fértil
  lexicon: HALOT
  rationale: Rֹאשׁ se entiende espacialmente como «cabeza» o parte superior; «cabeza del valle» conserva de forma directa la metáfora hebrea y su valor topográfico.
- source_word: שְׁמָנִים
  english_pob_choice: fertile
  chosen_spanish: fértil
  alternatives_spanish:
  - fecundo
  - rico
  lexicon: HALOT
  rationale: El hebreo alude a riqueza y luxuriancia del terreno; «fértil» comunica ese sentido idiomático de forma clara y natural en español.
- source_word: הֲל֥וּמֵי יָֽיִן
  english_pob_choice: those overcome by wine
  chosen_spanish: de los abatidos por el vino
  alternatives_spanish:
  - de los vencidos por el vino
  - de los derribados por el vino
  lexicon: HALOT
  rationale: El participio pasivo transmite ser golpeados/abatidos/derrotados por el vino. «Abatidos por el vino» conserva la imagen de ser derribados sin sonar tan literal o extraño como una traducción mecánica.
theological_decisions:
- issue: Tono profético de denuncia en הוֹי
  english_pob_reading: Woe as oracle of lament/judgment
  chosen_spanish_reading: ¡Ay de! como fórmula profética de ay/juicio
  alternative_spanish_readings:
  - ¡Ay!
  - ¡Desgracia a!
  rationale: No se suaviza la interjección hacia un simple lamento emocional; se mantiene su función profética de anuncio de juicio, reconocible para lectores bíblicos en español.
  doctrine_reference: Profeticidad y juicio divino en el discurso profético
- issue: Referencia metafórica aplicada a Efraín/Samaria
  english_pob_reading: same object referred to by parallel metaphors
  chosen_spanish_reading: una misma realidad descrita como corona orgullosa y flor marchita
  alternative_spanish_readings:
  - dos realidades distintas
  - una sola metáfora continuada
  rationale: Se conserva la tensión poética de dos imágenes paralelas aplicadas al mismo referente colectivo, sin resolverlas artificialmente ni borrar la polisemia del texto.
  doctrine_reference: Poética hebrea y paralelismo semítico
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés: se prefiere una fórmula natural equivalente a «overcome by wine» en lugar de una traducción más mecánica como «struck down by wine», manteniendo el tono formal y la estructura paralela del verso.'
  spanish_consistency_notes:
  - Se usa «Efraín» como nombre propio colectivo, en continuidad con el texto hebreo y el audit trail inglés.
  - Se conserva la metáfora de la «corona» y de la «flor» sin convertirlas en explicaciones interpretativas.
  - «Yahvé» no aparece en este versículo, por lo que no se introduce terminología divina adicional.
  - La puntuación reproduce el carácter de oráculo con exclamación inicial y cadencia poética.
  - Las notas preservan alternativas de traducción donde el hebreo permite más de una lectura legítima.
