translation:
  text: And grain[a], weapons, or silver shall not be given to the allies, as it seemed good to Rome; and they shall keep these provisions[b], and not with deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these provisions' or 'these stipulations' for 'these obligations.' The Greek phrase is literally 'these things to be kept,' in a treaty context.
    reason: lexical_alternative
  - marker: b
    text: The clause 'as it seemed good to Rome' is formal diplomatic language, meaning effectively 'as Rome decided' or 'as Rome resolved.'
    reason: cultural_note
lexical_decisions:
- source_word: συμμάχοις
  chosen: allies
  alternatives:
  - confederates
  - those in alliance
  lexicon: LSJ
  rationale: The dative plural refers to allied parties in a political-military treaty context. 'Allies' is the most natural modern English equivalent and fits the diplomatic setting.
- source_word: δοθήσεται
  chosen: there shall not be given
  alternatives:
  - will not be given
  - shall not be supplied
  lexicon: BDAG
  rationale: Future passive singular with impersonal force. 'There shall not be given' preserves the formal treaty style and the passive construction without adding an explicit subject.
- source_word: σῖτος
  chosen: grain
  alternatives:
  - wheat
  - food supply
  lexicon: LSJ
  rationale: The term broadly denotes grain rather than specifically wheat here. 'Grain' is accurate and avoids over-specification.
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - arms
  - armaments
  lexicon: LSJ
  rationale: In a military treaty context, ὅπλα refers to weapons/arms. 'Weapons' is clear modern English; 'arms' is possible but slightly less transparent to contemporary readers.
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: LSJ
  rationale: The Greek literally says 'silver.' In treaty language this likely functions as money, but the text itself specifies silver, so the more literal rendering is preferred.
- source_word: ὡς ἔδοξεν Ῥώμῃ
  chosen: as it seemed good to Rome
  alternatives:
  - as Rome decided
  - as was resolved by Rome
  lexicon: LSJ
  rationale: This idiom reflects formal governmental decision language. 'As it seemed good to Rome' stays close to the Greek and preserves the official tone, though the sense is effectively Rome's decision.
- source_word: φυλάξονται
  chosen: they shall keep
  alternatives:
  - they shall observe
  - they shall guard
  lexicon: BDAG
  rationale: In legal or covenantal contexts, φυλάσσω can mean keep/observe. 'Keep' is concise and idiomatic for obligations or stipulations.
- source_word: τὰ φυλάγματα ταῦτα
  chosen: these obligations
  alternatives:
  - these provisions
  - these stipulations
  - these terms
  lexicon: LSJ
  rationale: Though literally related to 'things to be kept' or 'ordinances/charges,' in this treaty context the phrase refers to binding provisions. 'Obligations' captures the practical force of the clause in natural English.
- source_word: οὐ μετὰ δόλου
  chosen: and not with deceit
  alternatives:
  - without deceit
  - and not deceitfully
  lexicon: LSJ
  rationale: The phrase denies deceptive intent or practice in keeping the treaty terms. 'And not with deceit' preserves the coordinate structure of the Greek and its formal tone.
