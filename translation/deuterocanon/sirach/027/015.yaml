theological_decisions:
- issue: Moral characterization of proud persons and their speech
  chosen_reading: 'Render the verse as a wisdom observation about the violent and harmful effects of pride: their fighting leads to bloodshed and their speech is painful to hear.'
  alternative_readings:
  - Take μάχη more formally as 'battle' and ἀκοή as 'report,' yielding something like 'The battle of the proud is bloodshed, and their reviling is an evil report.'
  rationale: The immediate Greek supports a general moral proverb rather than a military statement. The chosen rendering keeps the parallelism between violent action and harmful speech while using idiomatic English.
