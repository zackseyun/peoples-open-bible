  spanish_quality_summary: El español es claro y legible. «a Sihón, rey de los amorreos, porque su amor leal permanece para siempre» suena natural en registro bíblico moderno. Aun así, conviene ajustar la disposición de notas para que la alternativa «para Sihón» quede subordinada al problema específico de la preposición inicial, y mantener una secuencia de marcadores más ordenada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «amor leal» para חֶסֶד es defendible y coherente con la racional teológica dada. No aparece el nombre divino en este versículo, así que no aplica «Yahvé» en el texto principal.
  issues:
  - severity: medium
    issue: La nota sobre «para Sihón» está clasificada y formulada como alternativa léxica principal, cuando en el rastro inglés funciona como nota de traducción previa.
