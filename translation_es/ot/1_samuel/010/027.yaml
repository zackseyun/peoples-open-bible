  rationale: Se corrige un error gramatical grave ('desprecieron' → 'despreciaron'), se sustituye 'ofrenda' por 'presente' para reflejar mejor מִנְחָה en contexto no cultual, y se pule la cláusula final para un español más natural sin perder la comparación hebrea. Se conserva la nota alternativa sobre la posible idea de hacerse el sordo.
