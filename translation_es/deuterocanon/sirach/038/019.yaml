translation:
  language: es
  text: Ya no pongas tu corazón en él[a]; deja ir su recuerdo[b], y recuerda el fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘no pongas tu corazón hacia él por más tiempo’, un modismo que implica dejar de fijarse emocionalmente en el difunto.'
    reason: lexical_alternative
  - marker: b
    text: O ‘libera su recuerdo’ / ‘suelta su recuerdo’. El verbo hebreo es difícil, y el paralelo griego favorece la idea de pasar más allá del dolor.
    reason: alternative_reading
  - marker: c
    text: O ‘recuerda su fin’ o ‘recuerda tu propio fin’. El hebreo simplemente dice ‘recuerda el fin’, y puede dejar el sentido intencionalmente amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: אל תשים אליו לב
  english_pob_choice: Do not set your heart on him any longer
  chosen_spanish: No pongas tu corazón en él por más tiempo
  alternatives_spanish:
  - No fijes tu corazón en él por más tiempo
  - No le entregues tu corazón por más tiempo
  - No lo tomes más a pecho
  lexicon: HALOT
  rationale: Conserva la imagen hebrea de ‘poner el corazón’ y expresa el valor idiomático de dejar de aferrarse emocionalmente al difunto. ‘Pongas tu corazón en él’ es natural en español bíblico sin volverlo plano como ‘prestar atención’.
- source_word: עוד
  english_pob_choice: any longer
  chosen_spanish: por más tiempo
  alternatives_spanish:
  - ya más
  - todavía
  - aún
  lexicon: HALOT
  rationale: La partícula indica continuación de una actitud previa; ‘por más tiempo’ comunica con claridad la exhortación a detener un duelo prolongado.
- source_word: פרע זכרו
  english_pob_choice: let his memory go
  chosen_spanish: suelta su recuerdo
  alternatives_spanish:
  - libera su recuerdo
  - deja ir su memoria
  - despide su recuerdo
  lexicon: HALOT
  rationale: El verbo es difícil y el contexto sugiere soltar el agarre afectivo sobre la memoria del muerto, no borrar su existencia. ‘Suelta su recuerdo’ preserva el matiz de desprendimiento y la tensión textual documentada.
- source_word: וזכור אחרית
  english_pob_choice: and remember the end
  chosen_spanish: y recuerda el fin
  alternatives_spanish:
  - y recuerda el final
  - y recuerda el desenlace
  - y recuerda tu fin
  lexicon: HALOT
  rationale: ‘El fin’ mantiene la amplitud de אחרית sin resolver si se refiere al difunto, al doliente o al desenlace final. En español sigue siendo breve y sapiencial.
theological_decisions:
- issue: Referencia de ‘el fin’ (אחרית)
  english_pob_reading: general remembrance of the final end, especially mortality, without specifying only the deceased or only the mourner
  chosen_spanish_reading: recuerdo general del fin, especialmente la mortalidad, sin especificar si se trata solo del difunto o del doliente
  alternative_spanish_readings:
  - y recuerda su fin
  - y recuerda tu propio fin
  - y recuerda el desenlace final
  rationale: El hebreo conserva la ambigüedad de la frase y la POB inglesa decidió no cerrarla. La traducción española preserva esa amplitud sapiencial, evitando resolver una tensión que el texto no resuelve.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que ajustó la primera cláusula a una formulación más natural y precisa. Se conserva la decisión de mantener la segunda cláusula difícil como un gesto de desprendimiento, no como olvido absoluto, y se deja ‘el fin’ sin especificación adicional.
  spanish_consistency_notes:
  - Se mantiene ‘corazón’ para reflejar la metáfora hebrea, en lugar de sustituirla por una paráfrasis psicológica.
  - Se evita ‘SEÑOR’ y no hay términos divinos en este versículo.
  - ‘Recuerdo/memoria’ se usa con matiz de rememoración afectiva, no como simple dato mental.
  - La breve cadencia proverbial se conserva para mantener el tono sapiencial del Sirácida.
