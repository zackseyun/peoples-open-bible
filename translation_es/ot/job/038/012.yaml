review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: pregunta retórica dirigida a Job, modismo temporal «en tus días», mandato a «la mañana» y causativo respecto de «el alba» y «su lugar». Sin embargo, «Has mandado ... a la mañana» suena poco natural en español para el complemento directo personificado, y «hecho que el alba conozca» es comprensible pero menos idiomático que una formulación causativa más clara.'
  spanish_quality_summary: La redacción es mayormente fiel y digna, pero necesita un ajuste de naturalidad y fluidez. En español bíblico actual, «¿Has mandado a la mañana...?» resulta torpe; «¿Has dado órdenes a la mañana...?» o una reestructuración similar comunica mejor. También conviene evitar el anclaje de nota en «Has», ya que la nota explica «en tus días».
  glossary_alignment: No hay términos del glosario principal en disputa. Las decisiones para «mañana», «alba» y «lugar» están bien encaminadas. La preservación del causativo de יָדַע en español mejora con «has hecho saber al alba su lugar», que mantiene tanto el valor causativo como la personificación sin sonar calcado.
  issues:
  - severity: medium
    issue: Construcción poco natural «Has mandado ... a la mañana»
    rationale: Aunque semánticamente se entiende, en español suena forzado con «mandar» + objeto personificado. Una formulación como «has dado órdenes a la mañana» expresa mejor la idea de ordenar autoritativamente a un fenómeno personificado.
  - severity: medium
    issue: La nota [a] está anclada en «Has» en vez de la expresión explicada
    rationale: La nota trata del modismo «en tus días», así que el marcador debe aparecer en esa frase, no en el verbo auxiliar.
  - severity: low
    issue: «Hecho que el alba conozca su lugar» es algo rígido
    rationale: Es fiel al causativo, pero «has hecho saber al alba su lugar» suena más natural en español y mantiene el sentido de causar que el alba conozca su lugar.
  revised_spanish_text: ¿Has dado órdenes a la mañana, en tus días[a], y has hecho saber al alba su lugar?
  revised_footnotes:
  - marker: a
    text: «En tus días» conserva el modismo hebreo, que significa «en tu vida» o «alguna vez desde que vives».
    reason: cultural_note
  revision_rationale: Se ajustó la sintaxis para un español más natural y fiel al tono poético, manteniendo la personificación y el valor causativo del hebreo. También se movió la nota al lugar exacto que explica.
