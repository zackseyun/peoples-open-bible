translation:
  language: es
  text: Saca al que maldijo[a] fuera del campamento, y pongan todos los que oyeron sus manos sobre su cabeza[b], y toda la congregación lo apedree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el blasfemador» / «el que blasfemó». El hebreo se refiere literalmente a «el que maldijo».
    reason: alternative_reading
  - marker: b
    text: La imposición de manos aquí probablemente marca la identificación formal del ofensor por parte de los testigos, aunque algunos también la entienden con un significado simbólico.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹצֵא
  english_pob_choice: Bring
  chosen_spanish: Saca
  alternatives_spanish:
  - Haz salir
  - Lleva fuera
  lexicon: HALOT
  rationale: El causativo de יצא pide una acción que haga salir al acusado; en español, «saca» comunica con naturalidad esa idea de traslado fuera del campamento.
- source_word: הַמְקַלֵּל
  english_pob_choice: the one who cursed
  chosen_spanish: el que maldijo
  alternatives_spanish:
  - el maldiciente
  - el blasfemador
  - el que blasfemó
  lexicon: HALOT
  rationale: 'Sigo el valor léxico directo de קלל en el contexto inmediato: la acción de maldecir. Mantengo la tensión del texto principal y no elevo «blasfemó» al cuerpo principal, aunque la nota permite esa lectura contextual.'
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - fuera del encampamento
  lexicon: HALOT
  rationale: La expresión espacial es directa y ritual/judicial; «campamento» conserva el marco comunitario del pasaje.
- source_word: וְסָמְכוּ
  english_pob_choice: let ... lay
  chosen_spanish: pongan
  alternatives_spanish:
  - que pongan
  - y pondrán
  - coloquen
  lexicon: HALOT
  rationale: El hebreo sigue la secuencia imperativa/jussiva; en español, «pongan» transmite la acción obligatoria sin sobreexplicar su sentido simbólico.
- source_word: כָל הַשֹּׁמְעִים
  english_pob_choice: all who heard
  chosen_spanish: todos los que oyeron
  alternatives_spanish:
  - todos los oyentes
  - todos los que escucharon
  lexicon: HALOT
  rationale: «Oyeron» conserva la participación de quienes fueron testigos auditivos del acto ofensivo; no añado un objeto explícito porque el hebreo no lo exige aquí.
- source_word: יְדֵיהֶם עַל רֹאשׁוֹ
  english_pob_choice: their hands on his head
  chosen_spanish: sus manos sobre su cabeza
  alternatives_spanish:
  - sus manos sobre la cabeza de él
  - las manos de ellos sobre su cabeza
  lexicon: HALOT
  rationale: Mantengo el plural «manos» y el singular «cabeza» como en el hebreo; «sobre» refleja bien la preposición עַל.
- source_word: וְרָגְמוּ אֹתוֹ
  english_pob_choice: stone him
  chosen_spanish: lo apedreará
  alternatives_spanish:
  - lo lapidará
  - lo apedrearán
  lexicon: HALOT
  rationale: «Apedrear» es el equivalente castellano claro y tradicional para רגם en ejecución por piedras; uso futuro con sentido jussivo/resultado conforme a la secuencia exhortativa del verso.
- source_word: כָל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: «Congregación» mantiene el sentido corporativo y formal de עֵדָה, sin perder legibilidad en español contemporáneo.
theological_decisions:
- issue: 'Cómo reflejar el término del acusado: ''the one who cursed'' frente a ''the blasphemer'''
  english_pob_reading: the one who cursed, with a footnote allowing 'the blasphemer' / 'the one who blasphemed'
  chosen_spanish_reading: el que maldijo, con nota que permite 'el blasfemador' / 'el que blasfemó'
  alternative_spanish_readings:
  - el blasfemador
  - el que blasfemó
  rationale: El hebreo del versículo nombra el acto de maldecir; por fidelidad léxica, eso va en el texto. Dado que el contexto trata del Nombre divino, conservo la alternativa interpretativa en nota sin resolverla en el cuerpo.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión léxica-teológica.
- issue: Sentido de la imposición de manos por parte de los que oyeron
  english_pob_reading: retain the literal action without explaining its significance in the main text
  chosen_spanish_reading: mantener la acción literal sin explicar su significado en el texto principal
  alternative_spanish_readings:
  - identificación formal de testigos
  - gesto simbólico de transferencia
  rationale: El verso no explicita la función del gesto; por eso la traducción no lo interpreta en el cuerpo principal. La ambigüedad se preserva para no introducir una lectura teológica no dicha allí.
  doctrine_reference: No importar interpretaciones doctrinales no explícitas; conservar la ambigüedad textual.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se evita añadir un objeto explícito a «oyeron» y se conserva la estructura imperativa-secuencial del verso. También se respeta la opción léxica principal de «the one who cursed» en lugar de elevar «blasphemer» al texto principal.'
  spanish_consistency_notes:
  - Se usa «campamento» de forma consistente para מַחֲנֶה en contexto ritual.
  - Se mantiene «congregación» para עֵדָה por su fuerza formal y comunitaria.
  - Se evita el calco arcaizante donde el español moderno permite claridad sin perder solemnidad.
  - Se usa futuro con valor exhortativo/jussivo en la última cláusula para reflejar la secuencia del hebreo.
