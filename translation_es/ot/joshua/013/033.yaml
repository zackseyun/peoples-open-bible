revisions:
- from: Pero a la tribu de Leví Moisés no dio herencia; Yahvé[a], el Dios de Israel, es su herencia, tal como les habló.
  to: Pero a la tribu de Leví Moisés no le dio herencia; Yahvé[a], el Dios de Israel, es su herencia, tal como les habló.
  rationale: Se hace una reparación menor de naturalidad española añadiendo 'le' con el complemento indirecto anticipado ('a la tribu de Leví'). No cambia el sentido, pero mejora la fluidez y la corrección idiomática. Se conserva el resto porque es fiel al hebreo, a la auditoría inglesa del POB y a la terminología del proyecto.
