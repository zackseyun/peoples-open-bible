translation:
  language: es
  text: Ahora, pues, ven y líbranos[a] de su mano, porque muchos de los nuestros han caído[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «líbranos de su poder». El griego dice literalmente «de su mano», una expresión idiomática para control hostil.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha caído una multitud de entre nosotros». El griego no precisa si «caído» enfatiza muerte, derrota o ambas cosas.'
    reason: alternative_reading
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Pues ahora
  - Ahora entonces
  lexicon: LSJ
  rationale: La combinación expresa urgencia e inferencia; «Ahora, pues» conserva ambos matices de forma natural en español bíblico actual.
- source_word: ἐλθὼν
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven aquí
  - habiendo venido
  lexicon: LSJ
  rationale: Aunque formalmente es un participio aoristo, en la súplica funciona como llamada directa; «ven» mantiene la fuerza imperativa y la inmediatez.
- source_word: ἔξελου
  english_pob_choice: rescue
  chosen_spanish: líbranos
  alternatives_spanish:
  - rescátanos
  - sácanos
  lexicon: LSJ
  rationale: El verbo indica sacar de un peligro o poder hostil. «Líbranos» conserva la idea de liberación con buena naturalidad en español, sin perder el tono de súplica.
- source_word: ἐκ χειρὸς αὐτῶν
  english_pob_choice: from their hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de sus manos
  - de su poder
  lexicon: LSJ
  rationale: Se conserva la imagen idiomática de control hostil. «De su mano» reproduce el tropo sin explicarlo en exceso; «de su poder» explicita el sentido pero borra la metáfora.
- source_word: πέπτωκεν
  english_pob_choice: has fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - ha caído
  - han perecido
  - han sido derrotados
  lexicon: LSJ
  rationale: El perfecto de πίπτω significa literalmente «ha caído»; en contexto militar puede sugerir muerte o derrota, pero el griego no lo especifica. El plural español armoniza con «muchos de nosotros».
- source_word: ἐξ ἡμῶν
  english_pob_choice: of our people
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de los nuestros
  - entre nosotros
  lexicon: LSJ
  rationale: Literalmente «de entre nosotros». «De nosotros» mantiene la procedencia del grupo sin introducir una paráfrasis más interpretativa.
- source_word: πλῆθος
  english_pob_choice: a great number
  chosen_spanish: muchos
  alternatives_spanish:
  - una multitud
  - un gran número
  lexicon: LSJ
  rationale: Πλῆθος denota gran cantidad o multitud. Aquí «muchos» es natural en español y conserva la carga cuantitativa sin alargar la frase.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del testimonio inglés, que ajustó el cierre de «many of our people has fallen» a «many of us have fallen» para acercarse mejor a ἐξ ἡμῶν y evitar una explicitación innecesaria. En español se refleja ese mismo ajuste con «muchos de nosotros han caído».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque el versículo no contiene el nombre divino.
  - Se eligió «líbranos» en lugar de «rescátanos» por naturalidad idiomática, sin perder el valor de liberación desde poder hostil.
  - Se conservó la metáfora de «su mano» y se explicó su sentido en nota, siguiendo el audit trail inglés.
  - «Han caído» preserva la ambigüedad de ἔπεσεν/πέπτωκεν sin decidir entre muerte y derrota.
