translation:
  language: es
  text: 'Para el director del coro.[a] De David. En Yahvé me he refugiado; ¿cómo pueden decir a mi alma[b]: «Huyan como un ave a su monte»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Al músico principal».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Huyan a su monte, ave», o posiblemente «Huyan como un ave a su monte». El hebreo es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al músico principal
  - Para el maestro de coro
  lexicon: HALOT
  rationale: El término de superscripción señala al responsable musical. En español, «director del coro» comunica con claridad la función sin depender de un giro arcaico.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: La preposición ל en los encabezados de salmos puede indicar autoría, pertenencia o dedicación. «De David» conserva esa amplitud sin cerrarla indebidamente.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: En Yahvé
  alternatives_spanish:
  - En el SEÑOR
  - En Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según el criterio del proyecto para יהוה. La preposición expresa el ámbito u objeto de confianza.
- source_word: חָסִיתִי
  english_pob_choice: I have taken refuge
  chosen_spanish: me he refugiado
  alternatives_spanish:
  - he tomado refugio
  - me he puesto bajo refugio
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción concluida con estado resultante. «Me he refugiado» suena natural en español y conserva la idea de confianza asentada.
- source_word: אֵיךְ
  english_pob_choice: how can
  chosen_spanish: ¿cómo pueden
  alternatives_spanish:
  - ¿cómo
  - ¿de qué modo pueden
  lexicon: HALOT
  rationale: El valor es retórico e indignado. En español, «¿cómo pueden…?» reproduce con naturalidad la fuerza de la pregunta.
- source_word: תֹּאמְרוּ
  english_pob_choice: you say
  chosen_spanish: decir
  alternatives_spanish:
  - dicen
  - están diciendo
  lexicon: HALOT
  rationale: La segunda persona plural se conserva implícita en «pueden decir». No hace falta marcarla explícitamente en español, pero el contexto sostiene el plural.
- source_word: לְנַפְשִׁי
  english_pob_choice: to my soul
  chosen_spanish: a mi alma
  alternatives_spanish:
  - a mí
  - a mi ser
  - a mi vida
  lexicon: HALOT
  rationale: נֶפֶשׁ puede ser alma, ser o vida. Dado el audit trail, se retiene «alma» para no borrar la tensión literal, aunque en español el sentido práctico sea dirigirse a la persona.
- source_word: נודו
  english_pob_choice: Flee
  chosen_spanish: Huye
  alternatives_spanish:
  - Escapa
  - Aléjate
  - Vuela
  lexicon: HALOT
  rationale: La forma imperativa transmite urgencia de escape. «Huye» es la opción más directa y natural en español.
- source_word: הַרְכֶם
  english_pob_choice: to your mountain
  chosen_spanish: a tu monte
  alternatives_spanish:
  - a tu montaña
  - a su monte
  - al monte de ustedes
  lexicon: HALOT
  rationale: Se conserva el carácter difícil del texto hebreo con «tu monte». «Monte» funciona bien en estilo bíblico y mantiene el singular posesivo del hebreo.
- source_word: צִפּוֹר
  english_pob_choice: like a bird
  chosen_spanish: como un pájaro
  alternatives_spanish:
  - como un ave
  - como un pajarillo
  lexicon: HALOT
  rationale: El símil se expresa de manera directa. «Pájaro» es claro y natural en español; la imagen de fuga se entiende sin suavizarla.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se sigue la terminología base del proyecto para el Tetragrama. Mantener el nombre evita la sustitución por un título y preserva el valor revelado del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de לְנַפְשִׁי
  english_pob_reading: to my soul
  chosen_spanish_reading: a mi alma
  alternative_spanish_readings:
  - a mí
  - a mi ser
  - a mi vida
  rationale: La lectura inglesa revisada opta por una formulación más literal para reflejar el hebreo. En español se conserva «alma» para no borrar la imagen, aunque el destinatario sea la persona misma.
  doctrine_reference: Hebrew lexical range of נֶפֶשׁ; no doctrinal issue, but a semantic decision
- issue: Final del dicho citado
  english_pob_reading: Flee like a bird to your mountain
  chosen_spanish_reading: Huye como un pájaro a tu monte
  alternative_spanish_readings:
  - Huye a tu monte como un pájaro
  - Huye, pájaro, a tu monte
  rationale: El hebreo es difícil y admite un orden poco fluido. Se conserva la tensión del original sin armonizarla en exceso, siguiendo el audit trail que retiene la comparación con el ave.
  doctrine_reference: Textual/lexical difficulty in Psalm 11:1
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail al reflejar לְנַפְשִׁי con una formulación más literal («a mi alma») y al conservar la dificultad del cierre hebreo sin resolverla de manera excesiva. También adapté el encabezado a un español natural, manteniendo la función musical de לַמְנַצֵּחַ y el nombre divino Yahvé según el estándar del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de forma consistente con el proyecto.
  - «alma» se conserva por fidelidad semántica a נֶפֶשׁ, aunque el sentido comunicativo sea la persona.
  - Se mantiene el tono de superscripción con puntuación sobria y estilo bíblico legible.
  - La cita final conserva la ambigüedad del hebreo en vez de normalizarla.
