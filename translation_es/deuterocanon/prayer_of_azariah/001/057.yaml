translation:
  language: es
  text: Bendecid al Señor[a], todas las aves del cielo; cantad himnos y exaltadlo grandemente para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las aves del firmamento», o más ampliamente, «todas las criaturas voladoras del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendigan
  lexicon: BDAG
  rationale: El imperativo plural exhorta a una alabanza litúrgica dirigida a las criaturas. «Bendecid» conserva el tono doxológico y la fórmula tradicional de exhortación sin perder el matiz de invocación reverente que el griego permite.
- source_word: πάντα τὰ πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: all birds of the sky
  chosen_spanish: todas las aves del cielo
  alternatives_spanish:
  - todas las aves del cielo/firmamento
  - todas las criaturas aladas del cielo
  lexicon: LSJ
  rationale: πετεινά puede referirse a aves o, en sentido más amplio, a seres voladores. «Aves» es la opción más natural y comprensible en español para este catálogo de la creación, y «del cielo» refleja τοῦ οὐρανοῦ sin forzar un calco de «heaven».
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  lexicon: BDAG
  rationale: Aquí κύριον funciona como título de alabanza en griego. En español, «el Señor» transmite con claridad el tratamiento reverente del texto; no se introduce «Yahvé» porque el griego no trae el Tetragrama, aunque la mayúscula o el contexto litúrgico puedan sugerir la referencia divina.
- source_word: ὑμνεῖτε
  english_pob_choice: sing hymns
  chosen_spanish: entonad himnos
  alternatives_spanish:
  - cantad himnos
  - cantad alabanzas
  lexicon: BDAG
  rationale: ὑμνέω tiene una fuerza musical específica. «Entonad himnos» preserva la idea de cantar con forma hímnica mejor que un simple «alabad», y mantiene la distinción respecto del primer mandato.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo muy por encima
  alternatives_spanish:
  - exaltadlo grandemente
  - levantadlo en alto
  lexicon: LSJ
  rationale: El compuesto intensifica la acción de exaltar. «Muy por encima» procura reflejar esa fuerza superlativa en un español natural y evita suavizar el énfasis del verbo griego.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre retoma a «el Señor». En español, el clítico «lo» resulta más fluido en la segunda mitad del paralelismo y mantiene la referencia personal directa.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión griega es una fórmula de perpetuidad. «Por los siglos» conserva el plural temporal de αἰῶνας y su solemnidad, sin necesitar ampliar a «de los siglos» más allá de lo que el texto dice.
theological_decisions:
- issue: Tratamiento de κύριος en una doxología
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: El texto griego usa κύριον, no el Tetragrama. Por eso se traduce como título reverente «el Señor»; no se emplea «Yahvé» como sustituto, aunque esa forma sea la norma del proyecto para el nombre divino cuando el original lo respalda directamente.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el texto se mantiene en alta concordancia con el griego de Swete 1909 y con la línea auditada de la POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro litúrgico sobrio y bíblico, acorde con el resto del proyecto.
  - Se evitó introducir «Cristo» o «Yahvé» donde el griego no los exige.
  - 'La secuencia verbal refleja el paralelismo del original: bendecir, cantar himnos, exaltar.'
