translation:
  language: es
  text: Porque Yahvé honró al padre por encima de los hijos, y estableció la autoridad[a] de la madre sobre sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el derecho de la madre'. El hebreo mishpat puede significar 'juicio', 'justicia' o un 'derecho/pretensión' legal; aquí probablemente se refiere a la autoridad legítima de la madre dentro de la familia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el nombre divino YHWH: ''Yahvé'' mantiene la referencia explícita al nombre propio y evita el ocultamiento por un título genérico.'
- source_word: כִּבֵּד
  english_pob_choice: honored
  chosen_spanish: honró
  alternatives_spanish:
  - glorificó
  - dio honra a
  - hizo pesado
  lexicon: HALOT
  rationale: El piel de כבד expresa dar honor o peso; 'honró' es natural en español y conserva el sentido relacional del contexto filial.
- source_word: הָאָב
  english_pob_choice: the father
  chosen_spanish: al padre
  alternatives_spanish:
  - a un padre
  - el padre
  lexicon: HALOT
  rationale: El singular definido hebreo se conserva como referencia proverbial concreta, con valor genérico en español.
- source_word: לִפְנֵי הַבָּנִים
  english_pob_choice: above the children
  chosen_spanish: por encima de los hijos
  alternatives_spanish:
  - antes de los hijos
  - en presencia de los hijos
  - sobre los hijos
  lexicon: HALOT
  rationale: '''Por encima de'' expresa mejor la idea de precedencia/superioridad adoptada en la revisión inglesa, sin perder la relación de prioridad frente a los hijos.'
- source_word: וּמִשְׁפַּט
  english_pob_choice: authority
  chosen_spanish: el derecho
  alternatives_spanish:
  - la autoridad
  - el juicio
  - la justicia
  - la pretensión legítima
  lexicon: HALOT
  rationale: Aquí משפט tiene fuerza jurídico-relacional; 'derecho' comunica bien la reivindicación o prerrogativa legítima de la madre, evitando una lectura demasiado moderna de 'autoridad' y manteniendo la tensión lexical documentada.
- source_word: הָאֵם
  english_pob_choice: the mother's
  chosen_spanish: de la madre
  alternatives_spanish:
  - materna
  - de la madre de ellos
  lexicon: HALOT
  rationale: Se preserva el sustantivo definido de forma natural en español y se evita forzar un posesivo poco idiomático.
- source_word: קִיֵּם
  english_pob_choice: established
  chosen_spanish: confirmó
  alternatives_spanish:
  - estableció
  - afirmó
  - hizo firme
  lexicon: HALOT
  rationale: El verbo significa hacer firme o ratificar; 'confirmó' recoge esa idea y además refleja el paralelo griego ἐστερέωσεν.
- source_word: עַל יְלָדֶיהָ
  english_pob_choice: over her children
  chosen_spanish: sobre sus hijos
  alternatives_spanish:
  - respecto de sus hijos
  - con relación a sus hijos
  - sobre sus niños
  lexicon: HALOT
  rationale: '''Sobre'' conserva la relación de esfera/autoridad indicada por על y enlaza naturalmente con ''el derecho de la madre''.'
theological_decisions:
- issue: Divine name in a wisdom proverb with Hebrew and Greek parallel
  english_pob_reading: the LORD / Yahweh sense underlying Kyrios in the Greek parallel
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: El texto hebreo trae explícitamente el nombre divino y el proyecto pide no enmascararlo. 'Yahvé' es la forma coherente con la política terminológica del POB en español.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #1'
- issue: Cómo expresar משפט האם sin perder su fuerza jurídico-familiar
  english_pob_reading: the mother's authority / the mother's right
  chosen_spanish_reading: el derecho de la madre
  alternative_spanish_readings:
  - la autoridad de la madre
  - la justicia de la madre
  - la pretensión legítima de la madre
  rationale: '''Derecho'' preserva el trasfondo legal y la tensión entre ''juicio/justicia/derecho'' documentada en el audit trail, sin importar una estructura eclesial ajena al contexto.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: Paralelismo entre padre e hijos / madre e hijos
  english_pob_reading: the father ... over the children; the mother's authority over her children
  chosen_spanish_reading: al padre por encima de los hijos ... el derecho de la madre sobre sus hijos
  alternative_spanish_readings:
  - al padre antes de los hijos ... la autoridad de la madre sobre sus hijos
  rationale: Se mantiene el paralelismo y la asimetría gramatical del hebreo, pero con español fluido. 'Por encima de' retiene la idea de precedencia/superioridad señalada por la revisión inglesa.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'before the children' por 'above the children' para expresar mejor לִפְנֵי. La versión española sigue esa decisión con 'por encima de los hijos' y, al mismo tiempo, conserva la fuerza jurídico-relacional de מִשְׁפַּט como 'derecho'. No se añadieron notas porque el texto español puede expresar ambas decisiones de forma directa sin ambigüedad que requiera marcación textual.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar proyectual para el nombre divino.
  - Se mantuvo el paralelismo padre/madre e hijos, sin neutralizar el contraste de género del hebreo.
  - '''Derecho'' se elige aquí como solución idiomática para משפט en este contexto familiar, manteniendo su carga legal.'
  - No se emplean notas al pie porque no hay variantes textuales o alternativas que requieran anclaje explícito en el texto.
