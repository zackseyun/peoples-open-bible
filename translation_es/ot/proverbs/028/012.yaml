    issue: La nota [a] solo documenta alternativas para בַּעֲלֹץ y no la alternativa de אָדָם.
    rationale: No es un error, porque la nota inglesa existente está anclada al primer miembro y el borrador no crea ambigüedad nueva en español. Simplemente podría haberse añadido una nota adicional sobre «la gente», pero no es necesaria para aprobar.
