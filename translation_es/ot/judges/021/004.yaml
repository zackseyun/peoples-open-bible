    rationale: La nota explica alternativas para וּשְׁלָמִים ('sacrificios/ofrendas de paz/comunión/bienestar'), pero en el borrador la marca [a] aparece sobre 'temprano', que traduce וַיַּשְׁכִּימוּ. Esto desaline­a el aparato crítico con el texto fuente y puede confundir al lector.
  revised_spanish_text: Y al día siguiente, el pueblo se levantó temprano, edificó allí un altar y ofreció holocaustos y sacrificios de paz[a].
  revised_footnotes:
