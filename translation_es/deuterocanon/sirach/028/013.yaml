translation:
  language: es
  text: Maldice al murmurador y al de doble lengua, porque han destruido a muchos que estaban en paz.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado aquí es difícil y parece decir más literalmente: «Escupe sobre ella, y se apagará», con una continuación entre corchetes: «las dos cosas salen de tu boca». El paralelo griego, en cambio, dice: «Maldice al murmurador y al de doble lengua», y esa lectura se sigue en el texto principal porque da un sentido más claro en este contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָקַק בָּהּ
  english_pob_choice: Curse
  chosen_spanish: escúpela
  alternatives_spanish:
  - maldícela
  - escúpela sobre ella
  lexicon: HALOT
  rationale: 'El hebreo transmitido es literal: ‘escupir sobre/contra ella’. En español, ‘escúpela’ conserva la imagen concreta sin forzar una paráfrasis más amplia. La nota explica que el paralelo griego ofrece una lectura distinta, pero el texto principal sigue el hebreo donde es inteligible.'
- source_word: וְכָבְתָה
  english_pob_choice: and it will be quenched
  chosen_spanish: se apagará
  alternatives_spanish:
  - será apagada
  - se extinguirá
  lexicon: HALOT
  rationale: El sentido básico del verbo es apagarse/extinguirse. ‘Se apagará’ mantiene la imagen del fuego o chispa y suena natural en español bíblico moderno.
- source_word: '[וּשְׁנֵיהֶם מִפִּיךָ הֵם]'
  english_pob_choice: and both come out of your mouth
  chosen_spanish: y ambos salen de tu boca
  alternatives_spanish:
  - y los dos provienen de tu boca
  - y ambos proceden de tu boca
  lexicon: HALOT
  rationale: El hebreo entre corchetes afirma que ambos elementos provienen de la boca. ‘Salen de tu boca’ conserva esa relación de origen de forma clara y directa.
- source_word: Ψίθυρον
  english_pob_choice: the whisperer
  chosen_spanish: una chispa
  alternatives_spanish:
  - el murmurador
  - el chismoso
  lexicon: BDAG
  rationale: Aunque el griego paralelo leería ‘el murmurador’, la revisión final del proyecto prioriza el hebreo conservado, que habla de una chispa. Por eso el texto español sigue la imaginería hebrea y no importa aquí el valor griego como lectura principal.
- source_word: δίγλωσσον
  english_pob_choice: the double-tongued
  chosen_spanish: sopla sobre
  alternatives_spanish:
  - escupe sobre
  - sopla contra
  lexicon: BDAG
  rationale: En la forma hebrea transmitida, el inicio del verso contrasta soplar y escupir sobre una chispa. ‘Sopla sobre’ reproduce el acto descrito sin añadir elementos ajenos al texto.
- source_word: εἰρηνεύοντας
  english_pob_choice: who were at peace
  chosen_spanish: chispa
  alternatives_spanish:
  - fuego
  - brasita
  lexicon: BDAG
  rationale: El contexto hebreo apunta a un objeto pequeño que puede encenderse o apagarse. ‘Chispa’ es la equivalencia más natural y precisa para el español contemporáneo.
theological_decisions:
- issue: Divergencia entre el hebreo transmitido y el paralelo griego
  english_pob_reading: Main text follows the Greek ethical admonition against whisperers and double-tongued people, with the Hebrew's extinguishing/spitting imagery preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue la imagen hebrea de soplar y escupir sobre una chispa; la alternativa griega queda documentada solo como trasfondo textual.
  alternative_spanish_readings:
  - ‘Maldice al murmurador y al de doble lengua, porque han destruido a muchos que estaban en paz.’
  - ‘Maldice al chismoso y al doble lengua, pues arruinaron a muchos pacíficos.’
  rationale: La forma hebrea conservada en el paquete de fuente es la que resulta legible como base principal; el griego paralelo, aunque valioso, no se toma aquí como texto rector porque el pasaje hebreo ofrece una imagen completa y la revisión reciente del proyecto decidió volver a ella. La nota explicativa deja constancia de la divergencia textual sin ocultarla.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve textual tension in notes instead of erasing it.'
translation_notes:
  revision_awareness: 'La revisión más reciente del proyecto reemplazó una versión que seguía el griego por otra que vuelve a la forma hebrea transmitida: soplar/escupir sobre una chispa, apagarse/encenderse, y la cláusula final sobre ambos que salen de la boca. Esta propuesta se ajusta a esa dirección revisada y ancla la nota textual en el propio verso.'
  spanish_consistency_notes:
  - Se mantiene ‘tu boca’ para reflejar el hebreo de segunda persona singular.
  - ‘Chispa’ se usa con valor concreto, no metafórico, para conservar la imagen del fuego.
  - ‘Se apagará’ y ‘salen’ respetan el paralelismo verbal del hebreo en un español natural.
  - No se emplea ‘SEÑOR’ ni terminología cristológica; no aplica al versículo.
