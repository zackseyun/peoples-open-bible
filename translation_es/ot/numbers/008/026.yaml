source:
  edition: WLC
  text: וְ/שֵׁרֵ֨ת אֶת אֶחָ֜י/ו בְּ/אֹ֤הֶל מוֹעֵד֙ לִ/שְׁמֹ֣ר מִשְׁמֶ֔רֶת וַ/עֲבֹדָ֖ה לֹ֣א יַעֲבֹ֑ד כָּ֛כָה תַּעֲשֶׂ֥ה לַ/לְוִיִּ֖ם בְּ/מִשְׁמְרֹתָֽ/ם־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/numbers/008/026.yaml
  text: But he may minister with his brothers in the tent of meeting[a], to keep the charge, but he shall do no service[b]. Thus you shall do for the Levites in their duties.
  footnotes:
  - marker: a
    text: Or 'to keep the charge.' The Hebrew expression לִשְׁמֹר מִשְׁמֶרֶת refers to fulfilling an assigned responsibility.
    reason: lexical_alternative
  - marker: b
    text: Or 'but he shall do no labor.' The Hebrew contrasts permitted ministry with the regular work/service from which the older Levite is exempt.
    reason: lexical_alternative
