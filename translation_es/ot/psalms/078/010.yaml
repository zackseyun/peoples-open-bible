translation:
  language: es
  text: No cumplieron el pacto de Dios, y rehusaron andar en su ley[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «instrucción»: la palabra hebrea torá puede denotar la ley de Dios, su enseñanza o su instrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guardaron
  alternatives_spanish:
  - cumplieron
  - observaron
  lexicon: HALOT
  rationale: שׁמר abarca guardar, observar y mantener. En este contexto de pacto, «guardaron» conserva la idea de fidelidad al pacto sin sonar forzado en español; «cumplieron» se acerca al sentido normativo, pero pierde algo del matiz de custodia/fidelidad.
- source_word: בְּרִ֣ית אֱלֹהִ֑ים
  english_pob_choice: the covenant of God
  chosen_spanish: el pacto de Dios
  alternatives_spanish:
  - el pacto de Dios
  - el pacto perteneciente a Dios
  lexicon: HALOT
  rationale: La construcción expresa un pacto cuya fuente o pertenencia está en Dios. En español, «pacto de Dios» comunica con naturalidad esa relación posesiva y mantiene el tono elevado del salmo.
- source_word: וּבְתוֹרָתוֹ
  english_pob_choice: in his law
  chosen_spanish: en su ley
  alternatives_spanish:
  - en su instrucción
  - en su enseñanza
  lexicon: HALOT
  rationale: תּוֹרָה puede significar ley, instrucción o enseñanza. Aquí el paralelismo con el pacto favorece «ley», porque conserva la fuerza normativa del pasaje. Se mantiene «en» para reflejar el ámbito o esfera en que se debía andar.
- source_word: מֵאֲנוּ
  english_pob_choice: refused
  chosen_spanish: rehusaron
  alternatives_spanish:
  - se negaron
  - no quisieron
  lexicon: HALOT
  rationale: מָאן expresa negativa firme o rechazo. «Rehusaron» reproduce bien ese matiz de decisión deliberada y conserva la intensidad del reproche del texto.
- source_word: לָלֶכֶת
  english_pob_choice: to walk
  chosen_spanish: andar
  alternatives_spanish:
  - caminar
  - vivir
  lexicon: HALOT
  rationale: El verbo הלך en sentido figurado describe la conducta de vida. En español, «andar» es un equivalente bíblico natural que mantiene la metáfora del caminar sin sonar tan literal como «caminar».
- source_word: לֹא
  english_pob_choice: did not
  chosen_spanish: 'No'
  alternatives_spanish:
  - 'No'
  lexicon: HALOT
  rationale: Negación simple y directa, trasladada con sintaxis natural del español.
theological_decisions:
- issue: Sentido de תּוֹרָה en contexto de pacto
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: En este versículo, תּוֹרָה está en paralelo con el pacto y con la conducta debida; «ley» conserva mejor su fuerza normativa y covenantal. Se preservan como alternativas «instrucción» y «enseñanza» porque el término hebreo es más amplio que una mera ley escrita.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto inglés POB y el control de revisión muestran alta concordancia y sin cambios recientes; no se detectan revisiones que justifiquen una desviación textual. La decisión principal sigue el valor covenantal de «ley» y la metáfora bíblica de «andar».
  spanish_consistency_notes:
  - Se conserva el paralelismo semántico entre pacto/ley y el contraste de negación/refusal.
  - Se evita «SEÑOR» para יהוה porque este versículo no contiene el tetragrámaton; aparece אֱלֹהִים, por lo que corresponde «Dios».
  - «Andar» mantiene el idioma bíblico de conducta de vida sin introducir una paráfrasis interpretativa.
