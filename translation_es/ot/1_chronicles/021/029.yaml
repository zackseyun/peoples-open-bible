  glossary_alignment: 'Se alinea con los términos del proyecto: יְהוָה como ''Yahvé'', מִשְׁכַּן como ''tabernáculo'', הָעֹלָה como ''holocausto''. La elección ''en el desierto'' para בַמִּדְבָּר es aceptable en español bíblico, aunque ''en el desierto'' lleva un matiz algo más geográfico que ''wilderness''; no obstante, sigue dentro del campo semántico esperado. ''Lugar alto'' preserva correctamente el tecnicismo de בָּמָה.'
