translation:
  language: es
  text: Aleja de mí la murmuración[a] y el desánimo[b] en la aflicción, cuando yo peque, mientras tú me disciplinas para arrepentimiento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «queja insistente».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «flaqueza de ánimo» o «pusilanimidad».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para conversión» o «para volver». El griego expresa la meta de la disciplina como un retorno a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γογγυσμόν
  english_pob_choice: grumbling
  chosen_spanish: murmullo
  alternatives_spanish:
  - murmuración
  - queja
  lexicon: LSJ
  rationale: γογγυσμός expresa murmurar o quejarse con tono resentido. «Murmullo» mantiene la idea de una queja interior y no suena excesivamente dura en español; «murmuración» sería más explícita pero más pesada, y «queja» pierde el matiz de murmuración.
- source_word: ὀλιγοψυχίαν
  english_pob_choice: faintheartedness
  chosen_spanish: desánimo
  alternatives_spanish:
  - desfallecimiento
  - pusilanimidad
  - cobardía de ánimo
  lexicon: LSJ
  rationale: La expresión literalmente apunta a «pequeñez de alma» o falta de aliento/coraje. «Desánimo» comunica bien el estado anímico sin sonar arcaico ni demasiado técnico; «pusilanimidad» sería más literal pero menos natural para lectura eclesial.
- source_word: ἐν θλίψει
  english_pob_choice: in affliction
  chosen_spanish: en la aflicción
  alternatives_spanish:
  - en la angustia
  - en la tribulación
  lexicon: LSJ
  rationale: θλῖψις suele significar aflicción, opresión o angustia. «En la aflicción» sigue de cerca la carga bíblica del término y conserva el registro solemne del verso.
- source_word: μάκρυνον ἀπʼ ἐμοῦ
  english_pob_choice: keep ... far from me
  chosen_spanish: aleja de mí
  alternatives_spanish:
  - mantén lejos de mí
  - aparta de mí
  lexicon: LSJ
  rationale: El imperativo pide distancia de estas disposiciones respecto del hablante. «Aleja de mí» es idiomático y breve; «aparta de mí» también sería válido, pero «aleja» suena ligeramente más natural en español contemporáneo.
- source_word: ἐὰν ἁμαρτήσῃς
  english_pob_choice: when I sin
  chosen_spanish: cuando yo peque
  alternatives_spanish:
  - si yo peco
  - cuando peque
  lexicon: LSJ
  rationale: Aunque el griego transmitido es difícil, la revisión auditada entiende la intención como una oración sobre el pecado del hablante, no de Dios. «Cuando yo peque» refleja esa lectura contextual con verbo de sentido moral claro; «si yo peco» conserva la condicionalidad, pero «cuando» sigue mejor el tono de la súplica por corrección real.
- source_word: ἐν τῷ σε παιδεύειν
  english_pob_choice: as you discipline me
  chosen_spanish: mientras tú me disciplinas
  alternatives_spanish:
  - cuando tú me disciplinas
  - al disciplinarme tú
  lexicon: LSJ
  rationale: El articular infinitivo con ἐν τῷ indica simultaneidad temporal. Se conserva con «mientras»; el sujeto explícito «tú» y el objeto implícito «me» quedan claros en español. «Disciplinas» mantiene el valor de παιδεύω como corrección formativa, no mero castigo.
- source_word: εἰς ἐπιστροφήν
  english_pob_choice: for repentance
  chosen_spanish: para conversión
  alternatives_spanish:
  - para arrepentimiento
  - para volver
  lexicon: LSJ
  rationale: ἐπιστροφή significa vuelta, retorno o conversión. «Conversión» en español bíblico puede abarcar el giro de retorno y la transformación moral; «arrepentimiento» sería posible, pero estrecha algo el sentido direccional de εἰς. Se mantiene así la tensión entre volver y convertirse.
theological_decisions:
- issue: Quién es el sujeto de ἁμαρτήσῃς
  english_pob_reading: The English audit trail recognized that reading the verb as 'you should err' would make God the subject, so it revised the sense to 'when I sin.'
  chosen_spanish_reading: «cuando yo peque» evita atribuir pecado a Dios y sigue la revisión contextual del texto.
  alternative_spanish_readings:
  - si tú pecaras
  - si yo pecara
  rationale: La lectura con segunda persona sería teológicamente inaceptable en este contexto de oración. La versión española adopta la solución auditada, entendiendo una corrupción textual o un desajuste transmisional y expresando sin ambigüedad que el hablante es quien peca.
  doctrine_reference: La santidad de Dios y la coherencia del orante penitente
- issue: Valor de εἰς ἐπιστροφήν
  english_pob_reading: '''for repentance'' preserves the directional force toward repentance.'
  chosen_spanish_reading: «para conversión» mantiene la dirección hacia el cambio, no solo el estado abstracto.
  alternative_spanish_readings:
  - para arrepentimiento
  - hacia arrepentimiento
  - para volver
  rationale: En español, «conversión» permite expresar la idea de retorno efectivo y transformación de vida. Se evita reducirlo a un sentimiento interior aislado; el término conserva la fuerza direccional de la disciplina divina que conduce al cambio.
  doctrine_reference: Arrepentimiento y conversión como respuesta a la corrección divina
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión que corrigió la lectura errónea de ἁμαρτήσῃς como referencia a Dios. La redacción española sigue la solución auditada del equipo: el hablante confiesa su propio pecado y pide que Dios lo discipline con miras al cambio. También se respetó la revisión estilística que prefirió una expresión más natural para εἰς ἐπιστροφήν, manteniendo la dirección del texto hacia la conversión.'
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y digno, sin recurrir a mayúsculas litúrgicas como máscara del nombre divino.
  - Se traduce δοῦλος/servicio no aplica aquí; no se introduce terminología eclesiástica ajena al verso.
  - Se mantiene la distinción entre disciplina correctiva y castigo meramente punitivo.
  - La sintaxis busca claridad lectora sin borrar la estructura condicional y temporal del griego.
