revisions:
- from: 'Entonces el Rabsaqué les dijo[a]: «¿Acaso mi señor me ha enviado para hablar estas palabras solo a tu señor y a ti? ¿No me ha enviado también a los hombres que están sentados sobre la muralla, para que coman su propio estiércol y beban su propia orina con ustedes?»'
  to: 'Entonces el Rabsaqué les dijo[a]: «¿Acaso mi señor me ha enviado para hablar estas palabras a tu señor y a ti? ¿No me ha enviado también a los hombres que están sentados en la muralla, que comerán su propio estiércol y beberán su propia orina con ustedes?»'
