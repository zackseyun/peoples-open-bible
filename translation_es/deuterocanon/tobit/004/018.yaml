  source_alignment_summary: 'El borrador refleja bien el sentido del griego: imperativo de buscar consejo, procedencia ''de'' personas sabias, y prohibición de despreciar consejo útil. También preserva la repetición léxica de συμβουλία/συμβουλίας mediante ''consejo''.'
