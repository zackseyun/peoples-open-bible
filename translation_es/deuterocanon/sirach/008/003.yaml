translation:
  language: es
  text: No contiendas con un hombre sin recursos[a], no sea que ponga precio a tu vida[b] y perezcas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado dice aproximadamente: «No trames contra un hombre sin bienes/sin sustancia». El paralelo griego, en cambio, dice: «No riñas con un hombre lenguaraz o de lengua afilada, y no amontones leña sobre su fuego». Como el hebreo aquí es difícil, existen distintas maneras de entender esta expresión.'
    reason: alternative_reading
  - marker: b
    text: La cláusula hebrea es oscura. Literalmente puede entenderse como «no sea que pese tu precio». Se traduce de forma comprensible como una amenaza contra tu propia vida o ruina.
    reason: lexical_clarity
lexical_decisions:
- source_word: μὴ διαμάχου
  english_pob_choice: Do not quarrel / contend
  chosen_spanish: No contiendas
  alternatives_spanish:
  - No riñas
  - No discutas
  - No pelees
  lexicon: LSJ
  rationale: El griego μὴ διαμάχου expresa la idea de entrar en disputa o contienda. «Contiendas» conserva el tono proverbial y es suficientemente amplio para abarcar la disputa verbal sin volverlo demasiado coloquial.
- source_word: ἀνθρώπου γλωσσώδους
  english_pob_choice: a man who has a sharp tongue
  chosen_spanish: un hombre de lengua afilada
  alternatives_spanish:
  - un hombre lenguaraz
  - un hombre de lengua mordaz
  - un hombre parlanchín
  lexicon: LSJ
  rationale: γλωσσώδης describe a alguien dado a hablar mucho o con lengua punzante. «De lengua afilada» comunica bien la imagen española de una palabra hiriente y mantiene el tono figurado del griego.
- source_word: μὴ ἐπιστοίβαζης ἐπὶ τὸ πῦρ αὐτοῦ ξύλα
  english_pob_choice: and do not pile wood on his fire
  chosen_spanish: ni eches leña a su fuego
  alternatives_spanish:
  - ni amontones madera sobre su fuego
  - ni añadas leña a su fuego
  - ni eches más combustible a su fuego
  lexicon: LSJ
  rationale: La imagen griega de añadir leña al fuego se conserva en español con un modismo natural y fiel. «Leña» es más idiomático que «madera» y mantiene la metáfora de intensificar la disputa.
translation_notes:
  revision_awareness: 'El registro hebreo transmitido en la fuente apunta a una tradición distinta y difícil: «No trames contra un hombre de no sustento, no sea que él pese tu precio y tú perezcas». El pasaje griego paralelo, en cambio, ofrece un proverbio coherente sobre no alimentar la disputa. Esta versión española sigue el sentido del griego, como base textual más transparente en este versículo, sin borrar la existencia de la variante hebrea documentada en el aparato de auditoría inglés.'
  spanish_consistency_notes:
  - Se mantiene «leña a su fuego» para conservar la metáfora completa del proverbio.
  - «Contiendas» se usa como verbo bíblico comprensible y de registro sobrio.
  - No se introduce «Mesías», «Yahvé» ni otros términos técnicos porque el versículo no los contiene.
