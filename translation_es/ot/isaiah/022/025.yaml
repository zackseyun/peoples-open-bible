translation:
  language: es
  text: En aquel día[a], declara Yahvé de los ejércitos, la estaca clavada en un lugar seguro cederá, será cortada y caerá, y la carga[b] que estaba sobre ella será cortada, porque Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «el clavo clavado en un lugar firme».'
    reason: lexical_alternative
  - marker: b
    text: «Carga» también puede traducirse «peso»; el hebreo se refiere a lo que estaba colgado de la estaca.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - oráculo de Yahvé de los ejércitos
  - sentencia de Yahvé de los ejércitos
  lexicon: HALOT
  rationale: נְאֻם funciona como fórmula profética de declaración; en español, "declara" comunica bien el acto solemne sin forzar una expresión más técnica. Se conserva "Yahvé" según el criterio del proyecto, y "de los ejércitos" refleja צְבָאֹות de manera directa y transparente.
- source_word: תָּמוּשׁ
  english_pob_choice: will give way
  chosen_spanish: se aflojará
  alternatives_spanish:
  - se moverá
  - cederá
  - será removida
  lexicon: HALOT
  rationale: El verbo expresa la pérdida de firmeza o el deslizamiento de algo fijado. En la imagen de una estaca, "se aflojará" comunica de forma natural la falla de su sujeción y mantiene la idea de inestabilidad que el inglés POB buscó con "will give way".
- source_word: הַיָּתֵד
  english_pob_choice: the peg
  chosen_spanish: la estaca
  alternatives_spanish:
  - el clavo
  - la clavija
  - el poste
  lexicon: HALOT
  rationale: יָתֵד puede referirse a una estaca o clavija. Dado el contexto de algo clavado que sostiene una carga, "estaca" es un equivalente español claro y concreto, sin introducir necesariamente la imagen de un clavo metálico ni la de una estaca de tienda.
- source_word: הַתְּקוּעָה
  english_pob_choice: fastened
  chosen_spanish: clavada
  alternatives_spanish:
  - fijada
  - hincada
  - asegurada
  lexicon: HALOT
  rationale: El participio pasivo indica que la estaca fue introducida/asegurada en su lugar. "Clavada" es idiomático en español y conserva el gesto físico de fijación que subyace a la metáfora.
- source_word: בְּמָקוֹם נֶאֱמָן
  english_pob_choice: in a secure place
  chosen_spanish: en un lugar seguro
  alternatives_spanish:
  - en un lugar firme
  - en un lugar confiable
  lexicon: HALOT
  rationale: נֶאֱמָן aquí describe firmeza o seguridad del lugar, no tanto fidelidad interpersonal. "Lugar seguro" transmite la estabilidad requerida por la imagen y evita un calco menos natural como "lugar fiel".
- source_word: וְנִגְדְּעָה
  english_pob_choice: it will be cut down
  chosen_spanish: será arrancada
  alternatives_spanish:
  - será cortada
  - será derribada
  - será tronchada
  lexicon: HALOT
  rationale: גדע puede implicar cortar o despedazar una pieza fija. En español, "será arrancada" sugiere que la estaca es removida violentamente de su sitio, lo cual encaja con la secuencia de fracaso del soporte.
- source_word: וְנָפְלָה
  english_pob_choice: and fall
  chosen_spanish: y caerá
  alternatives_spanish:
  - y se desplomará
  - y se vendrá abajo
  lexicon: HALOT
  rationale: Se mantiene la progresión verbal simple del hebreo. "Caerá" es la forma más directa y natural para completar la cadena de juicio en español.
- source_word: וְנִכְרַת הַמַּשָּׂא אֲשֶׁר עָלֶיהָ
  english_pob_choice: and the load that was on it will be cut off
  chosen_spanish: y la carga que colgaba de ella será cortada
  alternatives_spanish:
  - y la carga que estaba sobre ella será cortada
  - y el peso que llevaba será quitado
  - y la carga que dependía de ella será destruida
  lexicon: HALOT
  rationale: מַשָּׂא literalmente es una carga o peso. En el contexto de algo sostenido por una estaca, "carga" preserva la concreción de la imagen. "Que colgaba de ella" hace explícito el sentido espacial del sufijo sin imponer una interpretación más abstracta; "será cortada" mantiene el verbo de severa ruptura del hebreo y del inglés POB.
- source_word: כִּי יְהוָה דִּבֵּר
  english_pob_choice: for Yahweh has spoken
  chosen_spanish: porque Yahvé ha hablado
  alternatives_spanish:
  - pues Yahvé ha hablado
  - porque Yahvé lo ha dicho
  lexicon: HALOT
  rationale: La clausura profética afirma la certeza de la sentencia. "Ha hablado" es fiel, sobrio y reconocible en español, y conserva la fuerza de la declaración final sin añadir contenido interpretativo.
theological_decisions:
- issue: Identidad del soporte metafórico
  english_pob_reading: Retain the metaphor without identifying the peg explicitly in the translation.
  chosen_spanish_reading: Conservar la metáfora sin identificar explícitamente a la estaca en el texto.
  alternative_spanish_readings:
  - Identificar la estaca como Eliacim
  - explicitar que la estaca representa la casa o el linaje
  - resolver la imagen como reversión del oráculo anterior
  rationale: El hebreo de este versículo no nombra de manera explícita el referente de la imagen. Para no importar una resolución interpretativa que el texto mismo no formula, la traducción conserva la metáfora abierta y deja la identificación para la exégesis.
  doctrine_reference: Preservar la tensión interpretativa en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: El texto sigue de cerca el estado estable del audit trail en inglés, sin revisiones aplicadas en esta pasaje. Se conservó la decisión de no identificar explícitamente el referente de la estaca, y se mantuvo la secuencia verbal de juicio y caída con equivalentes españoles naturales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto, no «SEÑOR».
  - «de los ejércitos» conserva el título צְבָאוֹת de manera transparente.
  - «carga» mantiene la fuerza concreta de מַשָּׂא sin pasar a un término más abstracto como «burden».
  - La nota [a] cubre la alternativa lexical principal de יָתֵד sin duplicar marcadores.
  - La nota [b] aclara el alcance semántico de מַשָּׂא y su relación con la imagen de la estaca.
