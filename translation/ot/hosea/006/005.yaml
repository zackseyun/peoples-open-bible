id: HOS.6.5
reference: Hosea 6:5
source:
  edition: WLC
  text: עַל כֵּ֗ן חָצַ֨בְתִּי֙ בַּ/נְּבִיאִ֔ים הֲרַגְתִּ֖י/ם בְּ/אִמְרֵי פִ֑/י וּ/מִשְׁפָּטֶ֖י/ךָ א֥וֹר יֵצֵֽא־־׃
translation:
  text: Therefore I have hewn them by the prophets; I have slain them by the words of my mouth[a], and my judgments go forth like light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and my judgment goes forth like light.' The Hebrew text as pointed reads 'your judgments,' but some interpreters understand the sense as God's judgment/justice going forth.
    reason: alternative_reading
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding indictment; 'Therefore' is concise and natural in English.
- source_word: חָצַבְתִּי
  chosen: I have hewn
  alternatives:
  - I have cut
  - I have carved
  lexicon: HALOT
  rationale: The verb literally denotes hewing/cutting stone or wood. 'Hewn' preserves the forceful metaphor of God cutting down or shaping through prophetic speech better than the flatter 'cut.'
- source_word: בַּנְּבִיאִים
  chosen: by the prophets
  alternatives:
  - through the prophets
  - with the prophets
  lexicon: HALOT
  rationale: The preposition beth here is instrumental. 'By the prophets' is idiomatic and preserves the prophets as the means of divine action.
- source_word: הֲרַגְתִּים
  chosen: I have slain them
  alternatives:
  - I have killed them
  - I have struck them down
  lexicon: HALOT
  rationale: A strong verb is warranted. 'Slain' preserves the severity and poetic register without sounding overly colloquial.
- source_word: בְּאִמְרֵי פִי
  chosen: by the words of my mouth
  alternatives:
  - by the sayings of my mouth
  - with the words from my mouth
  lexicon: HALOT
  rationale: Keeps the concrete imagery of divine utterance. 'Words of my mouth' is a natural formal rendering of the construct phrase.
- source_word: וּמִשְׁפָּטֶיךָ
  chosen: your judgments
  alternatives:
  - your justice
  - your ordinances
  lexicon: HALOT
  rationale: The ketiv/qere-like interpretive issue centers on the 2ms suffix. Retaining 'your judgments' follows the consonantal-vocalized text as given and preserves the direct address. 'Judgments' fits the forensic context better than 'ordinances.'
- source_word: אוֹר
  chosen: like light
  alternatives:
  - as light
  - light
  lexicon: HALOT
  rationale: 'Although no comparative particle is present, English idiom benefits from making the predicative sense explicit: the judgments emerge with the clarity and inevitability of light.'
- source_word: יֵצֵא
  chosen: go forth
  alternatives:
  - comes forth
  - goes out
  lexicon: HALOT
  rationale: A common rendering for יצא in contexts of emergence or public manifestation. 'Go forth' suits the poetic and judicial tone.
