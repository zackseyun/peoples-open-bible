revisions:
- from: Pero él lo entregó todo en sus manos[a]. Y, después de tomar todos los vasos sagrados de Yahvé, los grandes y los pequeños, y los tesoros de Yahvé y los almacenes reales[b], los llevaron a Babilonia.
  to: Pero lo entregó todo en sus manos[a]. Y, después de tomar todos los vasos sagrados de Yahvé, los grandes y los pequeños, y las tesorerías de Yahvé y los almacenes reales[b], los llevaron a Babilonia.
  rationale: Se eliminó «él» para reflejar mejor el sujeto no expreso del griego y mejorar la naturalidad en español. Se cambió «los tesoros de Yahvé» por «las tesorerías de Yahvé» para conservar mejor el valor contextual de κιβωτούς como cofres/dependencias o tesorerías, evitando que «tesoros» sugiera solo riquezas en abstracto.
