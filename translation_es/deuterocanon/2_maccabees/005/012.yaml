translation:
  language: es
  text: Y mandó a los soldados que mataran sin piedad a los que encontraran[a], y que degollaran a los que subieran a las casas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los que cayeran en su camino». El participio griego puede indicar personas encontradas en el trayecto de los soldados; esta redacción evita sugerir que las víctimas iniciaran el ataque.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice «a los que subían a las casas» y probablemente alude a subir por escaleras o a aposentos superiores.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκέλευσεν
  english_pob_choice: he ordered
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio orden de
  lexicon: BDAG
  rationale: κέλευω expresa dar una orden. En español, «mandó» transmite con naturalidad la fuerza directiva del verbo sin volverlo excesivamente formal; «ordenó» también sería posible, pero «mandó» funciona bien en este contexto narrativo y militar.
- source_word: κόπτειν
  english_pob_choice: to cut down
  chosen_spanish: hieran
  alternatives_spanish:
  - derribaran
  - mataran
  lexicon: LSJ
  rationale: El griego significa literalmente «golpear/cortar», pero en este contexto bélico apunta a una agresión letal. «Hirieran» conserva la violencia del ataque sin suavizarlo a un mero «matar»; además permite mantener el tono narrativo de la orden.
- source_word: ἀφειδῶς
  english_pob_choice: without mercy
  chosen_spanish: sin piedad
  alternatives_spanish:
  - sin misericordia
  - sin compasión
  lexicon: LSJ
  rationale: El adverbio comunica actuar sin perdonar ni reservar. «Sin piedad» es la equivalencia natural y clara en español moderno, y mantiene el carácter brutal de la instrucción.
- source_word: τοὺς ἐμπίπτοντας
  english_pob_choice: those they encountered
  chosen_spanish: a los que encontraran
  alternatives_spanish:
  - a los que se les atravesaran
  - a los que cayeran en su camino
  lexicon: BDAG
  rationale: El participio puede significar «caer sobre» o «encontrarse con». La versión española sigue la lectura contextual de personas halladas en el camino de los soldados, sin sugerir que fueran los agresores. «Encontraran» reproduce bien esa neutralidad dinámica.
- source_word: ἀναβαίνοντας
  english_pob_choice: who went up into
  chosen_spanish: subieran a
  alternatives_spanish:
  - subieran a las casas
  - ascendieran a las casas
  lexicon: BDAG
  rationale: ἀναβαίνω es «subir». En relación con casas, el griego conserva la imagen espacial de ascender por escaleras o hacia pisos superiores. En español, «subieran a las casas» conserva esa idea sin sobrecargar la frase.
- source_word: κατασφάζειν
  english_pob_choice: to slaughter
  chosen_spanish: degollaran
  alternatives_spanish:
  - masacraran
  - mataran brutalmente
  lexicon: LSJ
  rationale: El compuesto intensifica σφάζω y denota matar con brutalidad. «Degollar» en español evoca una muerte violenta y directa, acorde con la fuerza del verbo griego y más concreto que un simple «matar».
- source_word: οἰκίαις
  english_pob_choice: the houses
  chosen_spanish: las casas
  alternatives_spanish:
  - los hogares
  - las viviendas
  lexicon: BDAG
  rationale: οἰκία puede significar casa o casa-familia, pero aquí el espacio físico es lo relevante. «Casas» conserva la referencia material y la posibilidad, implicada por la nota inglesa, de ascenso a pisos o habitaciones superiores.
translation_notes:
  revision_awareness: El texto griego y el auditable inglés están en alto acuerdo; no se registran revisiones aplicadas en el pasaje. La redacción española sigue esa lectura estable, preservando la violencia explícita y la ambigüedad contextual de τοὺς ἐμπίπτοντας y ἀναβαίνοντας.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y bíblico, evitando eufemismos que atenuaran la violencia del pasaje.
  - Se prefirió vocabulario corriente pero digno («mandó», «sin piedad», «degollaran») para lograr claridad sin perder fuerza semántica.
  - 'Las notas conservan las dos ambigüedades documentadas por el POB inglés: el sentido de encuentro/caída en el camino y la posible referencia a subir por escaleras o a niveles superiores.'
