  rationale: El prefijo conjuntivo y preposicional introduce otro elemento en la lista sacerdotal. En español, «para» reproduce de manera breve y natural la relación de adscripción/representación que el contexto sugiere, sin forzar una traducción más interpretativa.
- source_word: מַתְּנַי
  english_pob_choice: Mattenai
