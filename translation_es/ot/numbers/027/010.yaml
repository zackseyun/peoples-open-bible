translation:
  language: es
  text: Pero si no tiene hermanos[a], daréis su herencia a los hermanos de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «a sus tíos paternos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La secuencia legal introduce un caso alternativo; en español, «Pero si» conserva el matiz contrastivo de la progresión casuística mejor que un simple «Si».
- source_word: אֵין לוֹ
  english_pob_choice: he has no
  chosen_spanish: no tiene
  alternatives_spanish:
  - no hay para él
  - carece de
  lexicon: HALOT
  rationale: El hebreo expresa negación existencial con valor posesivo; en español, «no tiene» reproduce de forma natural la idea de ausencia de hermanos sin volverlo demasiado literal.
- source_word: אַחִים
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - hermanos de sangre
  lexicon: HALOT
  rationale: Aquí el plural masculino se refiere a hermanos varones dentro de la ley de herencia; «hermanos» comunica esa referencia con naturalidad en español, y el contexto restringe el alcance.
- source_word: וּנְתַתֶּם
  english_pob_choice: then you shall give
  chosen_spanish: daréis
  alternatives_spanish:
  - entonces daréis
  - y daréis
  - deberéis dar
  lexicon: HALOT
  rationale: La forma verbal mantiene la instrucción dirigida en plural; «daréis» conserva el mandato procedimental sin añadir modalización ajena al hebreo.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su posesión heredada
  - su herencia hereditaria
  lexicon: HALOT
  rationale: En este contexto jurídico, נַחֲלָה es la porción heredada o asignada. «Herencia» es claro y fiel en español bíblico contemporáneo.
- source_word: לַאֲחֵי אָבִיו
  english_pob_choice: to his father's brothers
  chosen_spanish: a los hermanos de su padre
  alternatives_spanish:
  - a sus tíos paternos
  - a los hermanos de su padre
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «a los hermanos de su padre». Se conserva esa estructura; «tíos paternos» es una equivalencia idiomática posible, pero más interpretiva.
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión aprobada del inglés POB, que optó por una formulación jurídica breve y transparente sin cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene la terminología jurídica de herencia con «herencia», coherente con el valor legal de נַחֲלָה.
  - Se preserva el plural de segunda persona en «daréis», acorde con el hebreo וּנְתַתֶּם.
  - La nota aclara la alternativa idiomática «tíos paternos» sin reemplazar la traducción más cercana al hebreo en el texto principal.
