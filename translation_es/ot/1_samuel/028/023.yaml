base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/028/023.yaml
  text: But he refused and said[a], “I will not eat.” Yet his servants, along with the woman, urged him, and he listened to their voice[c][b]. So he rose from the ground and sat on the bed.
  footnotes:
