translation:
  language: es
  text: La provisión[a] de Salomón para un día era treinta cors de harina fina y sesenta cors de harina común[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''pan''; aquí se usa en un sentido más amplio de provisión alimentaria para la casa de Salomón.'
    reason: lexical_alternative
  - marker: b
    text: Un cor era una gran medida de volumen para productos secos. El hebreo lee 'treinta cors' y 'sesenta cors'.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - sucedía
  lexicon: HALOT
  rationale: El waw consecutivo introduce la afirmación narrativa; en español, el imperfecto 'era' comunica bien el estado habitual o la cifra correspondiente a un día, sin forzar un giro arcaico.
- source_word: לֶחֶם
  english_pob_choice: provision
  chosen_spanish: provisión
  alternatives_spanish:
  - pan
  - alimento
  - abastecimiento
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'pan', el contexto administrativo de cantidades medidas de harina apunta a la provisión alimentaria de la casa real. 'Provisión' conserva el alcance más amplio que documenta la POB en inglés.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon’s
  chosen_spanish: de Salomón
  alternatives_spanish:
  - de Salomón
  - de Salomón
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio en forma española estándar y la relación posesiva con una construcción natural en español.
- source_word: לְיוֹם אֶחָד
  english_pob_choice: for one day
  chosen_spanish: para un día
  alternatives_spanish:
  - por un día
  - para un solo día
  lexicon: HALOT
  rationale: La frase indica la ración correspondiente a cada día; 'para un día' conserva esa referencia temporal y resulta natural en español.
- source_word: שְׁלֹשִׁים כֹּר
  english_pob_choice: thirty cors
  chosen_spanish: treinta cors
  alternatives_spanish:
  - treinta coros
  - treinta kor
  lexicon: HALOT
  rationale: Se conserva la medida antigua transliterada como 'cors', igual que la POB en inglés, para no perder la especificidad del texto fuente.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: '''Flor de harina'' es una equivalencia española tradicional y precisa para la harina muy fina, manteniendo el matiz de la materia de mejor calidad.'
- source_word: וְשִׁשִּׁים כֹּר
  english_pob_choice: and sixty cors
  chosen_spanish: y sesenta cors
  alternatives_spanish:
  - y sesenta coros
  - y sesenta kor
  lexicon: HALOT
  rationale: Se mantiene la misma transliteración de la unidad de medida para coherencia interna con la primera cifra.
- source_word: קָמַח
  english_pob_choice: meal
  chosen_spanish: harina
  alternatives_spanish:
  - sémola
  - harina corriente
  lexicon: HALOT
  rationale: En español, 'harina' comunica de manera natural el producto molido; aquí se conserva la distinción general con 'flor de harina' usando un término más amplio para קָמַח, como hace la POB al distinguirlo de סֹלֶת.
translation_notes:
  revision_awareness: 'El contexto inglés de la POB fue revisado y se mantuvo sin cambios sustanciales; la presente versión española sigue la misma lectura óptima: ''provisión'' para לֶחֶם, transliteración de la medida antigua ''cors'', y distinción entre סֹלֶת y קָמַח mediante un par lexical natural en español.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece el tetragrámaton ni una cita de κύριος en este versículo.
  - Se preserva la distinción material entre 'flor de harina' y 'harina', reflejando el contraste entre סֹלֶת y קָמַח.
  - La puntuación y el orden siguen un español bíblico moderno, sin arcaísmos innecesarios.
