revisions:
- from: Pero el pueblo de la tierra hirió[a] a todos los que habían conspirado contra el rey Amón, y el pueblo de la tierra hizo rey a Josías, su hijo, en su lugar.
  to: Pero el pueblo de la tierra mató[a] a todos los que habían conspirado contra el rey Amón, y el pueblo de la tierra hicieron rey a Josías su hijo, en su lugar.
  rationale: Se revisa «hirió» a «mató» para reflejar mejor el valor letal de וַיַּךְ en este contexto narrativo. También se ajusta el segundo verbo a «hicieron rey» para mejorar la naturalidad del sujeto colectivo en español. Se conserva la nota alternativa sobre «los conspiradores» y la expresión técnica «el pueblo de la tierra».
