  rationale: Se ajusta el verbo inicial a «Vi» por mayor naturalidad en español en contexto de visión profética y se hace explícito «miré a los cielos» para reflejar el segundo complemento elíptico del hebreo con una sintaxis española más fluida. Se conserva «sin forma y vacía» para mantener el eco de Génesis 1:2 y la imagen de des-creación cósmica. La nota se mantiene, pero el anclaje [a] se coloca sobre «tierra» para corresponder con la práctica del English POB respecto al eco cósmico de la frase posterior.
