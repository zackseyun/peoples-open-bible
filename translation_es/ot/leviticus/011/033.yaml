translation:
  language: es
  text: Y todo recipiente de barro[a] dentro del cual caiga alguno de ellos, todo lo que esté dentro de él quedará impuro, y lo quebrarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "vasija de barro" o "vasija de barro cocido". El hebreo se refiere específicamente a un contenedor hecho de barro cocido o cerámica.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלִי חֶרֶשׂ
  english_pob_choice: earthenware vessel
  chosen_spanish: recipiente de barro
  alternatives_spanish:
  - vasija de barro
  - vasija de barro cocido
  - recipiente de alfarería
  lexicon: HALOT
  rationale: כְּלִי es un término general para recipiente o utensilio, y חֶרֶשׂ especifica el material de barro/arcilla cocida. En español, 'recipiente de barro' comunica con naturalidad la clase material del objeto ritual sin sonar técnico ni demasiado arcaico.
- source_word: יִפֹּל מֵהֶם
  english_pob_choice: any of them falls
  chosen_spanish: caiga cualquiera de ellos
  alternatives_spanish:
  - caiga uno de ellos
  - caiga alguno de ellos
  - caiga algo de ellos
  lexicon: HALOT
  rationale: 'El hebreo es distributivo: basta con que uno de los seres/elementos mencionados en el contexto caiga dentro del recipiente. ''Cualquiera de ellos'' preserva ese valor sin restringirlo a un solo individuo ni oscurecer la referencia plural.'
- source_word: אֶל תּוֹכוֹ
  english_pob_choice: into which
  chosen_spanish: en el que
  alternatives_spanish:
  - dentro del cual
  - en cuyo interior
  - adonde
  lexicon: HALOT
  rationale: תּוֹךְ indica el interior del recipiente. En español, 'en el que' expresa con naturalidad la relación espacial de ingreso al interior sin forzar una perífrasis innecesaria.
- source_word: כֹּל אֲשֶׁר בְּתוֹכוֹ
  english_pob_choice: everything that is in it
  chosen_spanish: todo lo que esté dentro de él
  alternatives_spanish:
  - todo lo que hay en él
  - todo cuanto esté en él
  - lo que esté dentro de él
  lexicon: HALOT
  rationale: כֹּל da un sentido totalizador. 'Todo lo que esté dentro de él' mantiene el alcance absoluto y suena natural en español bíblico moderno.
- source_word: יִטְמָא
  english_pob_choice: shall become unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - se contaminará
  - será impuro
  - quedará inmundo
  lexicon: HALOT
  rationale: En contextos levíticos, טָמֵא describe un estado ritual de impureza. 'Quedará impuro' conserva el resultado del contacto y evita el matiz más fuerte o más tradicional de 'inmundo', que en español puede sonar menos preciso o más moralizante.
- source_word: וְאֹתוֹ תִשְׁבֹּרוּ
  english_pob_choice: and you shall break it
  chosen_spanish: y lo quebrarán
  alternatives_spanish:
  - y lo romperán
  - y deberán quebrarlo
  - y ustedes lo quebrarán
  lexicon: HALOT
  rationale: El verbo שׁבר pide un quiebre real del recipiente. 'Quebrarán' mantiene la fuerza del mandato y refleja el objeto directo enfático del hebreo sin añadir un sujeto explícito que el español puede omitir por concordancia contextual.
translation_notes:
  revision_awareness: 'El texto inglés POB se mantuvo estable en la última revisión (''unchanged: true''); la presente propuesta sigue su misma decisión lexical central para כְּלִי חֶרֶשׂ, pero la expresa en español con una formulación más natural y auditable.'
  spanish_consistency_notes:
  - Se mantiene 'impuro' para el lenguaje ritual levítico y no se sustituye por 'inmundo'.
  - Se preserva la referencia material específica del recipiente, evitando el término genérico 'vaso' salvo en nota alternativa.
  - La pasiva/impersonal española 'lo quebrarán' conserva el mandato sin introducir un sujeto explícito que el hebreo no enfatiza.
