translation:
  text: |-
    And after a few days we came to the place, and the Shepherd sat down in the place of the angel, and I stood by him. And he says to me, “Gird yourself with a raw-linen sash, and serve me.” So I girded myself with a clean raw-linen sash made from a sack.
    
    2. Seeing me girded and ready to serve him, he says, “Call the men whose rods have been planted, by rank, just as each gave the rods.” And I went out to the plain and called them all; and they all stood in their ranks.
    
    3. He says to them, “Let each pull up his own rods and bring them to me.”
    
    4. First those who had the dry and cut [rods] handed them in, and they were found likewise to be dry and cut; and he ordered them to stand apart.
    
    5. Then those who had the dry but not cut [rods] handed them in. And some of them handed in their rods green, but others dry and cut, as if worm-eaten. So those who had handed in green [rods] he ordered to stand apart, but those with dry—
