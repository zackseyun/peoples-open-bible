translation:
  language: es
  text: Porque yo, mediante los placeres que proceden de la virtud, aligero el dolor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγὼ μὲν γὰρ
  english_pob_choice: For I
  chosen_spanish: Porque yo
  alternatives_spanish:
  - Pues yo
  - Yo, en efecto
  lexicon: Sintaxis griega discursive; énfasis del pronombre explícito
  rationale: El griego explicita ἐγώ para énfasis. En español, 'Porque yo' conserva ese énfasis inicial y mantiene la relación causal de γάρ con la frase anterior sin forzar una glosa demasiado pesada.
- source_word: ἡδέσι
  english_pob_choice: by the pleasures
  chosen_spanish: mediante los placeres
  alternatives_spanish:
  - por los placeres
  - con los placeres
  lexicon: LSJ
  rationale: 'El dativo plural tiene valor instrumental: los placeres funcionan como medio. ''Mediante'' comunica mejor ese valor causal/instrumental en español que una simple preposición ambigua.'
- source_word: διὰ τὴν ἀρετήν
  english_pob_choice: that come through virtue
  chosen_spanish: que vienen a través de la virtud
  alternatives_spanish:
  - que proceden de la virtud
  - por causa de la virtud
  lexicon: LSJ
  rationale: διά con acusativo aquí puede indicar origen/medio. Mantener 'a través de la virtud' preserva la relación entre placer y ἀρετή sin reducirla a una mera motivación moral.
- source_word: ἡδοναῖς
  english_pob_choice: the pleasures
  chosen_spanish: los placeres
  alternatives_spanish:
  - las delicias
  - los deleites
  lexicon: LSJ
  rationale: '''Placeres'' es la equivalencia más directa para ἡδονή y conserva el contraste retórico con el dolor del martirio.'
- source_word: τὸν πόνον
  english_pob_choice: the pain
  chosen_spanish: el dolor
  alternatives_spanish:
  - el sufrimiento
  - la pena
  lexicon: LSJ
  rationale: πόνος puede abarcar dolor, fatiga o sufrimiento. En este contexto de tormento corporal, 'dolor' es natural y suficientemente preciso en español.
- source_word: ἐπικουφίζομαι
  english_pob_choice: lighten
  chosen_spanish: aligero
  alternatives_spanish:
  - alivio
  - mitigo
  lexicon: LSJ
  rationale: El verbo significa hacer más ligero o aliviar. 'Aligero' conserva la metáfora de peso/intensidad del original y reproduce bien el valor verbal activo en español.
- source_word: ἀρετή
  english_pob_choice: virtue
  chosen_spanish: virtud
  alternatives_spanish:
  - excelencia
  - rectitud
  lexicon: LSJ
  rationale: En 4 Macabeos, ἀρετή tiene carga ética y filosófica. 'Virtud' es el término español más estable para ese campo semántico, y mantiene la fuerza conceptual del texto.
theological_decisions:
- issue: Relación entre placer y virtud en un contexto de sufrimiento martirial
  english_pob_reading: the pleasures that come through virtue
  chosen_spanish_reading: los placeres que vienen a través de la virtud
  alternative_spanish_readings:
  - los placeres por causa de la virtud
  - los placeres que proceden de la virtud
  rationale: La frase no trata de placer mundano, sino de una experiencia paradójica asociada a la fidelidad moral. 'A través de la virtud' conserva la tensión entre sufrimiento físico y consuelo interior sin domesticar el argumento del autor.
  doctrine_reference: 4 Macabeos 9:31; ética del martirio y perseverancia virtuosa
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en fuerte acuerdo; no se documentan revisiones sustantivas en la última pasada, y la traducción española sigue de cerca el valor instrumental de los dativos y el matiz causal/mediador de διά con acusativo.
  spanish_consistency_notes:
  - Se usa 'virtud' para ἀρετή, en línea con el contexto filosófico-ético del libro.
  - Se usa 'placeres' de forma concreta y plural, como en el inglés auditado, para conservar el contraste retórico con 'dolor'.
  - No se introduce terminología eclesiástica ajena al pasaje; la redacción busca ser digna y moderna, sin arcaísmos innecesarios.
