  text: וַ/תְּהִ֤י הַ/מִּלְחָמָה֙ חֲזָקָ֣ה עַל פְּלִשְׁתִּ֔ים כֹּ֖ל יְמֵ֣י שָׁא֑וּל וְ/רָאָ֨ה שָׁא֜וּל כָּל אִ֤ישׁ גִּבּוֹר֙ וְ/כָל בֶּן חַ֔יִל וַ/יַּאַסְפֵ֖/הוּ אֵלָֽי/ו־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/052.yaml
  text: And the war against the Philistines was severe all the days of Saul[a]. Whenever Saul saw any mighty man or any valiant man[c][b], he gathered him to himself.
  footnotes:
  - marker: a
    text: Or 'fierce' or 'hard' for 'severe.' The Hebrew adjective is literally 'strong.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'any mighty man or any son of valor.'
    reason: lexical_alternative
  - marker: c
    text: That is, Saul recruited such men into his service.
    reason: cultural_note
