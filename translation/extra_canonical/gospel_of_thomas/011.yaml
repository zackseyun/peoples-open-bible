translation:
  text: Jesus said[1], “This heaven will pass away, and the one above it will pass
    away. And the dead are not alive, and the living will not die. On the days when
    you ate what is dead, you made it alive. When you come to be in the light, what
    will you do? On the day when you were one, you became two. But when you become
    two[5][4][3][2], what will you do?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “This heaven” (ⲡⲉⲓⲡⲉ) can also mean “this sky.” The following phrase (“the
      one above it”) suggests a layered cosmology, hence “heaven.”
    reason: lexical_alternative
  - marker: '2'
    text: '“You made it alive”: the object pronoun likely refers to “what is dead”
      that was eaten; the causative ⲉⲓⲣⲉ ⲛ- + predicate means “cause it to be living.”'
    reason: cultural_note
  - marker: '3'
    text: '“What will you do?”: Coptic has an object pronoun (ⲛⲧⲟϥ), possibly pleonastic
      or referring to the ‘light’ or the previously mentioned ‘living thing.’ The
      translation leaves it implicit.'
    reason: lexical_alternative
  - marker: '4'
    text: '“On the day when you were one, you became two”: idiom ⲉⲓⲣⲉ ⲛⲟⲩⲁ can mean
      “be one” as well as “make one.” Some take it as prospective (“when you become
      one, you will become two”), but the following aorist favors a past reference.'
    reason: alternative_reading
  - marker: '5'
    text: 'Final question: the manuscript reads ⲛⲁⲁⲁⲛⲧⲟϥ, using ⲁⲁ (“take, do to”)
      where the earlier question has ⲉⲓⲣⲉ (“do/make”). Context suggests repetition
      of the same question; some editors treat this as an orthographic variant.'
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲉⲓⲡⲉ
  chosen: this heaven
  alternatives:
  - this sky
  lexicon: Crum; Layton (usage)
  rationale: ⲡⲉ ‘sky/heaven’; given the layered cosmology implied by “the one above
    it,” “heaven” captures the cosmological register better than “sky.”
- source_word: ⲛⲁⲣⲡⲁⲣⲁⲅⲉ
  chosen: will pass away
  alternatives:
  - will pass by
  - will pass along
  lexicon: Crum (loan from Gk παρέρχομαι)
  rationale: Common apocalyptic idiom; future sense with ⲛⲁ- fits Thomas’s diction.
    “Pass away” preserves idiomatic strangeness and gravity.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲟⲩ … ⲛⲧⲟⲟⲩⲱⲛϩ ⲁⲛ
  chosen: the dead are not alive
  alternatives:
  - those who are dead are not living
  lexicon: Crum (ⲙⲟⲩ ‘die’; ⲟⲛϩ ‘live’)
  rationale: Concise predicate nominal preserves Thomas’s terseness; “the dead” as
    a class is natural English for the relative clause.
- source_word: ⲡⲉⲧⲉⲣⲉⲱⲛϩ … ⲛⲧⲟⲟⲩ ⲛⲁⲙⲟⲩ ⲁⲛ
  chosen: the living will not die
  alternatives:
  - those who are alive will not die
  lexicon: Crum
  rationale: Parallel structure to the previous clause; future negative ⲛⲧⲟⲟⲩ ⲛⲁ-
    conveyed by “will not.”
- source_word: ⲡϩⲟⲟⲩ
  chosen: the day
  alternatives:
  - daytime
  lexicon: Crum
  rationale: Temporal marker in two clauses; “the day” reads naturally in English
    temporal questions.
- source_word: ⲟⲩⲱⲙ
  chosen: ate
  alternatives:
  - consumed
  lexicon: Crum
  rationale: Plain verb; Thomas’s diction is stark. “Ate” is the unmarked choice.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲟⲩ
  chosen: what is dead
  alternatives:
  - the dead thing
  - what was dead
  lexicon: Crum; Layton (relative ⲡⲉⲧ-)
  rationale: Relative construction treated as a headless relative; “what is dead”
    preserves gnomic feel without over-specifying tense.
- source_word: ⲉⲓⲣⲉ ⲛⲛⲧⲟϥ ⲛⲡⲉⲧⲉⲣⲉⲱⲛϩ
  chosen: you made it alive
  alternatives:
  - you made it living
  - you caused it to live
  lexicon: Lambdin; Layton (ⲉⲓⲣⲉ ⲛ- + predication)
  rationale: Standard causative construction ⲉⲓⲣⲉ ⲛ- + NP; “alive” renders the predicate
    ⲡⲉⲧⲉⲣⲉⲱⲛϩ succinctly.
- source_word: ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛ ϣⲱⲡⲉ
  chosen: when you come to be
  alternatives:
  - when you happen to be
  - when you have become
  lexicon: Layton (prospective ⲉⲣϣⲁⲛ- construction)
  rationale: ⲉⲣϣⲁⲛ- + infinitive marks prospective/ingressive sense; “come to be”
    retains aspectual nuance.
- source_word: ϩⲛ ⲡⲟⲩⲟⲉⲓⲛ
  chosen: in the light
  alternatives:
  - in the illumination
  lexicon: Crum
  rationale: Unmarked rendering; “light” is the core sense and matches Thomas’s symbolic
    register.
- source_word: ⲟⲩ ⲡⲉⲧⲉⲣⲉ … ⲛⲁⲉⲓⲣⲉ ⲛⲧⲟϥ
  chosen: what will you do?
  alternatives:
  - what will you do with it?
  - what will you do about it?
  lexicon: Lambdin; Layton (pleonastic object)
  rationale: The object pronoun ⲛⲧⲟϥ may be pleonastic or pick up the preceding referent;
    rendering as a bare “do?” keeps the riddle’s bite; see footnote.
- source_word: ⲉⲓⲣⲉ ⲛⲟⲩⲁ
  chosen: were one
  alternatives:
  - became one
  - made (yourselves) one
  lexicon: Layton (ⲉⲓⲣⲉ ⲛ- numeral = be/make N)
  rationale: Idiomatic ‘make one’ often equals ‘be one’; past sense aligns with the
    following aorist “you became two.”
- source_word: ⲁⲛⲧⲱⲧⲛⲉⲓⲣⲉ ⲛⲡⲥⲛⲁⲩ
  chosen: you became two
  alternatives:
  - you made two
  lexicon: Crum; Layton
  rationale: Aoristic sequence; parallelism with the next clause that speaks of ‘becoming
    two.’
- source_word: ⲛⲁⲁⲁⲛⲧⲟϥ (final question)
  chosen: what will you do?
  alternatives:
  - what will you take up (do with it)?
  lexicon: Crum (ⲁⲁ ‘take’; extended idiom)
  rationale: Scribe uses ⲁⲁ in place of earlier ⲉⲓⲣⲉ; context clearly repeats the
    question. Rendering “do” keeps coherence; note orthography in textual note.
textual_note: No lacunae are indicated in Dilley’s text for this saying. The form
  ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛ ϣⲱⲡⲉ (prospective ‘when you come to be’) is maintained. The final clause
  reads ⲛⲁⲁⲁⲛⲧⲟϥ in NH II (three alphas), likely an orthographic substitution of ⲁⲁ
  (‘take/do to’) for the earlier ⲉⲓⲣⲉ (‘do/make’); the sense repeats the earlier question.
  The object pronoun ⲛⲧⲟϥ in the two questions may be pleonastic or refer back to
  a prior referent (the ‘living’ or the ‘light’); translation keeps the question bare
  for clarity while noting the pronoun in footnotes. Dialectally, the saying is Sahidic
  with some Lycopolitan spellings in the manuscript lineation; these do not affect
  meaning here.
