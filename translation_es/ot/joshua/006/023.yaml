  rationale: Se ajusta כָּל אֲשֶׁר לָהּ a 'todos los que le pertenecían' para reflejar mejor la referencia personal contextual preservada por el POB inglés, manteniendo en nota la alternativa más amplia. También se mejora la naturalidad del español con 'los colocaron' y se corrige la puntuación de la enumeración.
