    text: 'O, de manera más idiomática: «¿Qué diré, hijo mío? ¿Qué diré, hijo de mi vientre? ¿Qué diré, hijo de mis votos?». El hebreo conserva el repetido «¿Qué?» para efecto retórico.'
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor de puntuación para reflejar mejor el vocativo elíptico y la fuerza retórica del hebreo en español natural. No se cambian las decisiones léxicas principales.
