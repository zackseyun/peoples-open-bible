id: ISA.47.9
reference: Isaiah 47:9
source:
  edition: WLC
  text: וְ/תָבֹאנָה֩ לָּ֨/ךְ שְׁתֵּי אֵ֥לֶּה רֶ֛גַע בְּ/י֥וֹם אֶחָ֖ד שְׁכ֣וֹל וְ/אַלְמֹ֑ן כְּ/תֻמָּ/ם֙ בָּ֣אוּ עָלַ֔יִ/ךְ בְּ/רֹ֣ב כְּשָׁפַ֔יִ/ךְ בְּ/עָצְמַ֥ת חֲבָרַ֖יִ/ךְ מְאֹֽד־׃
translation:
  text: 'But these two things will come to you in a moment[a], in one day: bereavement and widowhood. In full measure they will come upon you[b], in spite of your many sorceries and the great power of your spells.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'completely' / 'in full.'
    reason: lexical_alternative
  - marker: b
    text: The final clauses may also be understood as 'because of your many sorceries and your very powerful spells' or 'with your many sorceries and your very powerful spells.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְתָבֹאנָה
  chosen: will come
  alternatives:
  - shall come
  lexicon: HALOT
  rationale: Qal imperfect 3fp of בוא with feminine plural subject ('these two things'). Future sense fits the prophetic announcement. 'Will come' is natural modern English.
- source_word: שְׁתֵּי אֵלֶּה
  chosen: these two things
  alternatives:
  - these two
  - both of these
  lexicon: HALOT
  rationale: The feminine construct numeral with demonstrative points to two impending calamities. Supplying 'things' makes the English idiomatic without adding interpretive content.
- source_word: רֶגַע
  chosen: in a moment
  alternatives:
  - instantly
  - suddenly
  lexicon: HALOT
  rationale: רגע denotes a brief instant. 'In a moment' preserves the temporal abruptness and works well with the following 'in one day.'
- source_word: בְּיוֹם אֶחָד
  chosen: in one day
  alternatives:
  - on a single day
  - in a single day
  lexicon: HALOT
  rationale: Straightforward temporal phrase emphasizing compressed judgment. 'In one day' is both literal and idiomatic.
- source_word: שְׁכוֹל
  chosen: bereavement
  alternatives:
  - loss of children
  - childlessness through bereavement
  lexicon: HALOT
  rationale: The noun refers to the state of being bereaved, often specifically of children. 'Bereavement' preserves the broader lexical sense while allowing the context of Babylon-as-woman to carry the familial imagery.
- source_word: וְאַלְמֹן
  chosen: widowhood
  alternatives:
  - being a widow
  lexicon: HALOT
  rationale: The noun denotes widowhood, matching the personified female addressee. 'Widowhood' is the standard concise rendering.
- source_word: כְּתֻמָּם
  chosen: in full measure
  alternatives:
  - completely
  - in their full amount
  - in full
  lexicon: HALOT
  rationale: 'From תמם, conveying completeness/fullness. Here it modifies the coming of the calamities: they arrive fully, not partially. ''In full measure'' captures the adverbial force clearly.'
- source_word: בָּאוּ עָלַיִךְ
  chosen: they will come upon you
  alternatives:
  - they have come upon you
  - they come upon you
  lexicon: HALOT
  rationale: Though the verb is perfect, in prophetic discourse it can function as a prophetic perfect describing certain future judgment. Rendering as future aligns with the preceding imperfect and the discourse flow.
- source_word: בְּרֹב כְּשָׁפַיִךְ
  chosen: despite your many sorceries
  alternatives:
  - because of your many sorceries
  - with your many sorceries
  lexicon: HALOT
  rationale: 'The beth preposition here is best taken concessively in context: the disasters come notwithstanding Babylon''s abundant magical arts. This fits the taunt against reliance on occult practices in the surrounding context.'
- source_word: בְּעָצְמַת חֲבָרַיִךְ מְאֹד
  chosen: despite your very powerful spells
  alternatives:
  - despite the great power of your charms
  - with the abundance of your enchantments
  lexicon: HALOT
  rationale: עָצְמָה denotes strength/might; חֲבָרִים here refers to spells/charms rather than social companions. The phrase intensifies Babylon's occult resources. 'Very powerful spells' is readable modern English and preserves the sense.
