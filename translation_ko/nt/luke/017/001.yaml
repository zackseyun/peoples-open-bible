  text: 그리고 예수께서는 자기 제자들에게 말씀하셨습니다. 「걸림돌이 오지 않는 것은 불가능합니다. 그러나 그것이 그를 통해 오는 자에게는 화가 있을 것입니다.」
  philosophy: optimal-equivalence
