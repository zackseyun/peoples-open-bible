lexical_decisions:
- source_word: אֲחִינָדָב
  english_pob_choice: Ahinadab
  chosen_spanish: Ahinadab
  alternatives_spanish:
  - Ajinadab
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre propio mediante transliteración. 'Ahinadab' sigue de cerca la forma inglesa auditada y evita una castellanización no documentada del antropónimo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: uso constructo relacional
  rationale: En español, 'hijo de' comunica de forma natural la relación genealógica/administrativa del constructo hebreo. 'ben' sería opaco para la lectura pública.
- source_word: עִדֹּא
  english_pob_choice: Iddo
  chosen_spanish: Iddo
  alternatives_spanish:
  - Idó
  lexicon: nombre propio transliterado
  rationale: Se mantiene la forma del nombre propio según la tradición transliterada del proyecto. 'Iddo' respeta el audit trail inglés y evita ajustar el nombre a una adaptación española no atestiguada.
- source_word: מַחֲנָיְמָ/ה
  english_pob_choice: in Mahanaim
  chosen_spanish: en Mahanaim
  alternatives_spanish:
  - hacia Mahanaim
  - para Mahanaim
  - en la región de Mahanaim
  lexicon: topónimo con matiz direccional
  rationale: La forma hebrea tiene un final direccional, pero el contexto administrativo favorece una localización territorial. 'En Mahanaim' reproduce la lectura óptima-equivalente auditada y suena natural en español.
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del texto fuente y del audit trail inglés, sin revisiones aplicadas respecto a la última pasada. Se conserva la nota sobre la terminación direccional de Mahanaim, porque representa una tensión léxica real del hebreo que el español no debe borrar.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios de forma consistente con el proyecto.
  - Se usa 'hijo de' en lugar de 'ben' para una lectura pública natural en español.
  - Se preserva la ambigüedad territorial/direccional de Mahanaim mediante la nota, mientras el texto principal opta por 'en Mahanaim'.
