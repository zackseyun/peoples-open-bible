translation:
  language: es
  text: La confianza en un hombre traicionero en el día de angustia es como diente malo[a] y pie que resbala[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confianza en una persona infiel».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «pie inestable» o «pie tambaleante».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁן
  english_pob_choice: tooth
  chosen_spanish: diente
  alternatives_spanish:
  - muela
  - pieza dental
  lexicon: HALOT
  rationale: El hebreo nombra un diente concreto. En español, 'diente' conserva la imagen corporal directa; 'muela' estrecha innecesariamente el referente, y 'pieza dental' suena técnico y menos proverbial.
- source_word: רֹעָה
  english_pob_choice: bad
  chosen_spanish: malo
  alternatives_spanish:
  - dañado
  - podrido
  - corrompido
  lexicon: HALOT
  rationale: El adjetivo describe algo defectuoso o dañino. 'Malo' es natural en español y mantiene la sencillez proverbial sin añadir una imagen más específica que el hebreo no exige.
- source_word: רֶגֶל
  english_pob_choice: foot
  chosen_spanish: pie
  alternatives_spanish:
  - pierna
  lexicon: HALOT
  rationale: El sentido normal es 'pie'; 'pierna' sería menos preciso y debilitaría la imagen de inestabilidad.
- source_word: מוּעָדֶת
  english_pob_choice: slipping
  chosen_spanish: resbaladizo
  alternatives_spanish:
  - que resbala
  - inestable
  - tambaleante
  lexicon: HALOT
  rationale: La forma hebrea apunta a la idea de resbalar o perder firmeza. En español, 'resbaladizo' conserva la imagen física y funciona bien en la comparación poética; también deja abierta la lectura de un pie que corre peligro de caer.
- source_word: מִבְטָח
  english_pob_choice: confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - fiar
  - seguridad
  - confiarse
  lexicon: HALOT
  rationale: El sustantivo expresa confianza o भरोक्ष? No. The noun denotes trust or confidence. 'Confianza' es el equivalente natural en español y permite la construcción nominal del proverbio.
- source_word: בּוֹגֵד
  english_pob_choice: treacherous man
  chosen_spanish: hombre traicionero
  alternatives_spanish:
  - persona traicionera
  - infiel
  - perjuro
  lexicon: HALOT
  rationale: El participio describe a quien actúa con traición o deslealtad. Se conserva el masculino singular representativo del hebreo como 'hombre traicionero', con un español claro y fiel al tono del texto.
- source_word: בְּיוֹם
  english_pob_choice: in a day of
  chosen_spanish: en día de
  alternatives_spanish:
  - en el día de
  - en tiempo de
  lexicon: HALOT
  rationale: La preposición con 'día' es temporal y proverbial. 'En día de' reproduce de manera concisa la construcción hebrea y suena natural en español bíblico moderno.
- source_word: צָרָה
  english_pob_choice: trouble
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - adversidad
  - tribulación
  lexicon: HALOT
  rationale: El término señala aflicción o estrechez. 'Angustia' comunica bien la presión de una situación adversa y mantiene el registro sobrio del proverbio.
theological_decisions:
- issue: Lectura genérica del masculino singular בּוֹגֵד
  english_pob_reading: Rendered as 'treacherous man'
  chosen_spanish_reading: hombre traicionero
  alternative_spanish_readings:
  - persona traicionera
  - el traicionero
  rationale: Se mantiene el masculino singular del hebreo como forma representativa, sin borrar que el proverbio funciona de modo genérico. 'Hombre traicionero' refleja esa forma y conserva la fuerza proverbial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: 'Imagen proverbial doble: ''bad tooth'' y ''slipping foot'''
  english_pob_reading: The image of 'a slipping foot' may also be understood as an unsteady or tottering foot.
  chosen_spanish_reading: pie resbaladizo
  alternative_spanish_readings:
  - pie inestable
  - pie tambaleante
  - pie que resbala
  rationale: Se conserva la imagen corporal concreta; 'resbaladizo' permite, en español, la misma ambigüedad productiva entre una acción de resbalar y una condición de inestabilidad, sin explicar de más el proverbio.
  doctrine_reference: DOCTRINE.md §Figurative language and metaphor
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre el texto hebreo y el audit trail inglés; no se registraron revisiones aplicadas en el paquete fuente. La versión española sigue la imagen proverbial sin expandirla y conserva las dos alternativas léxicas señaladas por el POB en 'treacherous man' y 'slipping foot'.
  spanish_consistency_notes:
  - Se mantuvo 'confianza' para מִבְטָח, en paralelo con la elección inglesa, por ser el sustantivo más natural y transparente en español.
  - '''Angustia'' traduce צָרָה con un matiz de presión o aflicción, adecuado al contexto sapiencial y al tono práctico del proverbio.'
  - Se evitó 'SEÑOR' u otras soluciones teológicas no pertinentes porque el versículo no contiene el nombre divino ni un título divino directo.
  - La puntuación y el orden sintáctico buscan una cadencia proverbial en español sin añadir verbo copulativo inexistente en el hebreo.
