translation:
  language: es
  text: Yahvé estaba con Judá[a], y tomó posesión de la región montañosa; pero no pudo expulsar a los habitantes del valle, porque tenían carros de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los habitantes de la llanura’ o ‘de la bajura’; el término hebreo puede referirse a una amplia región de valle o tierras bajas.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: DOCTRINE.md / nombre divino
  rationale: Se mantiene el nombre divino con la forma española de uso del proyecto, en vez de ocultarlo con una sustitución reverencial.
- source_word: אֶתּ יְהוּדָה
  english_pob_choice: with Judah
  chosen_spanish: con Judá
  alternatives_spanish:
  - con la tribu de Judá
  lexicon: HALOT
  rationale: Aquí אֵת marca acompañamiento; por eso ‘con’ reproduce el sentido relacional. ‘Judá’ puede funcionar metonímicamente para la tribu, como en el inglés auditado.
- source_word: וַיֹּרֶשׁ
  english_pob_choice: he took possession of
  chosen_spanish: tomó posesión de
  alternatives_spanish:
  - desposeyó
  - ocupó
  - expulsó
  lexicon: HALOT
  rationale: El verbo en este contexto expresa apropiación/posesión del territorio, no el acto específico de expulsar, que aparece luego en la cláusula siguiente.
- source_word: הָהָר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - la serranía
  - la zona montañosa
  - la región de las montañas
  lexicon: HALOT
  rationale: Se evita una imagen de un solo monte y se conserva el valor geográfico de zona alta o montañosa.
- source_word: יֹשְׁבֵי הָעֵמֶק
  english_pob_choice: the inhabitants of the valley
  chosen_spanish: los habitantes del valle
  alternatives_spanish:
  - los que habitaban el valle
  - los moradores del valle
  lexicon: HALOT
  rationale: La construcción participial se vuelve con naturalidad como un sustantivo de grupo en español, sin perder el referente poblacional.
- source_word: עֵמֶק
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - llanura
  - bajura
  - tierras bajas
  lexicon: HALOT
  rationale: Se conserva el sentido básico de ‘valle’; cuando el término puede ampliar a llanura o lowland, eso queda preservado en la nota.
- source_word: רֶכֶב בַּרְזֶל לָהֶם
  english_pob_choice: because they had iron chariots
  chosen_spanish: porque tenían carros de hierro
  alternatives_spanish:
  - porque poseían carros de hierro
  - porque los carros de hierro eran de ellos
  lexicon: HALOT
  rationale: La posesión expresada por לָהֶם se comunica de manera directa y clara en español con ‘tenían’. ‘Carros de hierro’ mantiene la referencia militar concreta.
theological_decisions:
- issue: La presencia de Yahvé junto con la incapacidad posterior de Judá
  english_pob_reading: 'The verse preserves the tension: Yahweh was with Judah, yet Judah did not succeed in driving out the valley inhabitants because of their iron chariots.'
  chosen_spanish_reading: Yahvé estaba con Judá, y aun así no pudo expulsar a los habitantes del valle porque tenían carros de hierro.
  alternative_spanish_readings:
  - Yahvé estaba con Judá, y expulsó a algunos, pero no a los habitantes del valle.
  - Yahvé estaba con Judá, pero Judá no logró expulsar a los habitantes del valle.
  rationale: 'Se conserva la tensión textual sin suavizarla: la primera afirmación es positiva, pero el resultado militar queda limitado. La traducción no resuelve la dificultad teológica del versículo ni diluye la afirmación de la presencia de Yahvé.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión disponible: alta concordancia, sin cambios necesarios, y sin revisiones aplicadas en el expediente. La redacción española sigue el mismo análisis sintáctico y semántico del hebreo, especialmente en la secuencia contraste-sin-resultado del versículo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma estándar del nombre divino en el texto principal.
  - ‘Tomó posesión de’ se reserva para ירש en este contexto, distinguiéndolo de ‘expulsar’ en la cláusula posterior.
  - ‘Región montañosa’ traduce el valor geográfico de הָהָר sin introducir una lectura más estrecha.
  - La nota a pie conserva la ambigüedad lexical de עֵמֶק entre valle y tierras bajas.
  - Se mantiene el contraste entre la presencia de Yahvé y la limitación militar de Judá, conforme al audit trail inglés.
