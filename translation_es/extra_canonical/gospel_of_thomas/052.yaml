base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/052.yaml
  text: His disciples said to him[a], “Twenty-four prophets spoke in Israel, and they all spoke about you.” He said to them, “You have left out the living one who is in your presence[d][c][b], and you have spoken about the dead.”
  footnotes:
  - marker: a
    text: The phrase appears in the printed transcription as ‘about your heart’ (ϩⲣⲁⲓ ⲛ̄ϩⲏⲧⲕ); Dilley’s normalized lemma reads ‘about you’ (ϩⲣⲁⲓ ϩⲛⲛⲧⲟⲕ). We translate the latter but the ‘heart’ reading is possible.
    reason: textual_variant
  - marker: b
    text: ‘Leave out’ can also be rendered ‘omit’ or ‘lack’ (Crum, s.v. ⲕⲱ).
    reason: lexical_alternative
  - marker: c
    text: ‘Twenty-four prophets’ may reflect a traditional enumeration of prophetic authorities or a symbolic count (compare the 24-book reckoning of the Hebrew scriptures in some ancient traditions), though the saying does not specify.
    reason: cultural_note
  - marker: d
    text: Compare the contrast of ‘living’ and ‘dead’ in Mark 12:27 and parallels; Thomas, however, frames the point as missing the living one ‘in your presence.’
    reason: cross_reference
