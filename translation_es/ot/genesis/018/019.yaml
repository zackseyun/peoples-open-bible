review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la estructura y el sentido del hebreo: motivo (''Porque''), propósito (''para que''), mandato a la descendencia/casa, guardar el camino de Yahvé, y el resultado de que Yahvé cumpla lo dicho acerca de Abraham. Sin embargo, hay varios problemas de alineación fina: la nota b y la nota d están invertidas respecto a sus anclajes; ''su casa'' comunica algo de ביתו pero ''su hogar'' o ''su casa'' puede sonar más físico que ''su casa/familia'', aunque sigue siendo aceptable; y la pareja צְדָקָה וּמִשְׁפָּט está mejor como ''rectitud y justicia'' que como ''justicia y rectitud'', porque el hebreo distingue primero צדקה y luego משפט, y la documentación inglesa prefirió ''righteousness and justice''.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero la presentación actual tiene fallas técnicas y de legibilidad: los marcadores de notas están mal colocados/asignados, lo que produce confusión; además, ''Yahvé[b]'' es un anclaje incorrecto porque esa nota trata del final del versículo, no del nombre divino. ''Haciendo justicia y rectitud'' suena bien, pero conviene ajustar el orden a ''rectitud y justicia'' para respetar mejor el par hebreo y sonar natural en español bíblico moderno.'
  glossary_alignment: 'Se respeta bien ''Yahvé'' para יְהוָה y ''conocido'' con alternativa ''elegido'' para ידע. No hay conflictos doctrinales mayores. Sí conviene alinear mejor el tratamiento de צְדָקָה / מִשְׁפָּט con la racionalidad documentada: en español, ''rectitud y justicia'' preserva mejor la distinción sin invertir innecesariamente la secuencia semántica. También debe corregirse la nota sobre ''hijos'', que en el borrador está anclada al final en vez de junto a ''hijos''.'
  issues:
  - severity: high
    issue: Las notas b y d están cruzadas y mal ancladas en el texto.
    rationale: En el texto, [b] aparece junto a 'Yahvé' aunque su contenido trata 'lo que ha prometido/ha hablado'; y [d] aparece al final aunque su contenido trata 'Hijos'. Esto rompe la trazabilidad entre texto y nota exigida por el proyecto.
  - severity: medium
    issue: La secuencia 'justicia y rectitud' invierte la correspondencia más natural de צְדָקָה וּמִשְׁפָּט.
    rationale: Aunque ambas opciones son posibles, el audit trail inglés distingue 'righteousness and justice'. En español, 'rectitud y justicia' conserva mejor esa distinción y sigue el orden conceptual del hebreo.
  - severity: medium
    issue: El anclaje de la nota alternativa sobre 'ha prometido' debe ir en la cláusula final, no en 'Yahvé'.
    rationale: La nota explica אֵת אֲשֶׁר דִּבֶּר עָלָיו, no el nombre divino ni el verbo principal anterior.
  - severity: low
    issue: '''Su casa'' es entendible, pero puede sonar más concreto/físico que social-doméstico.'
    rationale: ביתו aquí se refiere a la unidad doméstica. 'Su casa' todavía funciona en registro bíblico español, así que no exige cambio forzoso, pero debe entenderse en ese sentido.
  revised_spanish_text: Porque lo he conocido[a], para que mande a sus hijos[d] y a su casa después de él, y guarden el camino de Yahvé, haciendo rectitud y justicia[c], para que Yahvé haga venir sobre Abraham lo que ha hablado acerca de él[b].
  revised_footnotes:
