translation:
  language: es
  text: Hijo mío, amarga el duelo y completa el lamento; realiza su luto como corresponde[a]. Por un día o dos, a causa de la calumnia, derrama lágrimas; luego recibe consuelo por la tristeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo aquí es incierto en matiz; el griego sugiere la idea de calumnia o reproche social que podría surgir si no se guarda el luto debido.
    reason: lexical_alternative
  - marker: b
    text: La frase final del hebreo puede entenderse de manera más literal como 'por aflicción' o, en otra lectura, 'por iniquidad'; el griego favorece el sentido de tristeza o pena.
    reason: alternative_reading
lexical_decisions:
- source_word: כמשפטו / κατὰ τὴν ἀξίαν αὐτοῦ
  english_pob_choice: as is fitting for him
  chosen_spanish: según convenga a él
  alternatives_spanish:
  - como corresponde a él
  - como es debido para él
  - según su dignidad
  lexicon: HALOT; LXX ἀξία
  rationale: La idea central es de correspondencia apropiada con el difunto, no de mérito abstracto. 'Según convenga a él' conserva la noción de ajuste o adecuación que el inglés POB expresó como 'as is fitting for him', y evita endurecer el texto con una formulación demasiado literal.
- source_word: המר / πίκρανον
  english_pob_choice: make the mourning bitter
  chosen_spanish: amarga el duelo
  alternatives_spanish:
  - haz amarga la lamentación
  - intensifica el duelo
  - embriaga el duelo
  lexicon: HALOT; LXX πίκρανον
  rationale: El hebreo y el griego usan un verbo de 'amargar' para intensificar el luto. En español, 'amarga el duelo' transmite la imagen verbal sin sonar forzado; 'duelo' funciona bien como término natural para mourning.
- source_word: והתם / θέρμανον
  english_pob_choice: complete the lament
  chosen_spanish: completa el lamento
  alternatives_spanish:
  - termina el lamento
  - lleva a cabo el lamento
  - cumple plenamente el lamento
  lexicon: HALOT; control por el paralelo griego
  rationale: El testimonio hebreo pide consumar o llevar a término la lamentación; el griego es difícil, pero el sentido auditado en inglés favorece 'complete'. 'Completa el lamento' mantiene el valor de ejecutar plenamente el rito de duelo.
- source_word: מספד
  english_pob_choice: mourning / lament
  chosen_spanish: duelo / lamento
  alternatives_spanish:
  - lamentación
  - mournición
  - funeral
  lexicon: HALOT
  rationale: El término hebreo refiere al llanto ritual por un muerto. En español, 'duelo' y 'lamento' permiten reflejar ambos aspectos del par hebreo 'mourning / lament' sin repetir una sola palabra de manera plana.
- source_word: יום ושנים
  english_pob_choice: for a day or two
  chosen_spanish: por un día o dos
  alternatives_spanish:
  - por uno o dos días
  - durante un día o dos
  lexicon: HALOT; LXX ἡμέραν μίαν καὶ δύο
  rationale: La expresión indica un período breve y limitado. 'Por un día o dos' es natural en español y preserva la restricción temporal del texto.
- source_word: בעבור דמעה
  english_pob_choice: shed tears
  chosen_spanish: a causa de la calumnia, derrama lágrimas
  alternatives_spanish:
  - por la calumnia, derrama lágrimas
  - por causa de la difamación, llora
  - a causa del reproche, derrama lágrimas
  lexicon: HALOT; revisión inglesa sobre 'slander'
  rationale: La revisión inglesa fijó 'slander', y el griego apoya la idea de reproche/calumnia. En español, 'calumnia' comunica bien ese campo semántico y mantiene la razón social del luto breve.
- source_word: הנחם / παρακλήθητι
  english_pob_choice: be comforted
  chosen_spanish: recibe consuelo
  alternatives_spanish:
  - consuélate
  - sé consolado
  - toma consuelo
  lexicon: HALOT; LXX παρακλήθητι
  rationale: El imperativo apunta a pasar del llanto a la consolación. 'Recibe consuelo' conserva el matiz pasivo/recibido mejor que una forma totalmente reflexiva, y suena natural en español contemporáneo.
- source_word: בעבור עון / λύπης ἕνεκα
  english_pob_choice: because of grief
  chosen_spanish: por la tristeza
  alternatives_spanish:
  - por la aflicción
  - por el dolor
  - a causa de la pena
  lexicon: HALOT; LXX λύπης
  rationale: El hebreo es semánticamente difícil aquí, pero el paralelo griego favorece el campo de la tristeza/aflicción, no el de 'iniquidad'. 'Por la tristeza' es conciso y fiel al sentido contextual.
theological_decisions:
- issue: Hijo mío como apelativo sapiencial
  english_pob_reading: My son
  chosen_spanish_reading: Hijo mío
  alternative_spanish_readings:
  - Hijo
  - Hijo mío, hijo
  rationale: El vocativo sapiencial se mantiene de manera directa y reverente. 'Hijo mío' reproduce el tono de instrucción personal del texto sin añadir interpretaciones pastorales ajenas.
  doctrine_reference: Sabiduría exhortativa en Sirácides; preservación del vocativo filial sapiencial
- issue: 'Final clause: grief vs. iniquity'
  english_pob_reading: because of grief
  chosen_spanish_reading: por la tristeza
  alternative_spanish_readings:
  - por la aflicción
  - por la iniquidad
  - por el dolor
  rationale: 'Se preserva la tensión textual documentada: el hebreo podría sonar como ''iniquidad'', pero el griego y el audit trail favorecen la lectura emocional de duelo/tristeza. La traducción no borra la dificultad, sino que sigue el sentido preferido por la evidencia conjunta.'
  doctrine_reference: Principio de primacía del hebreo con control del griego en Sirácides; PHILOSOPHY.md
- issue: Calumnia / reproche como motivo social del duelo breve
  english_pob_reading: because of slander
  chosen_spanish_reading: a causa de la calumnia
  alternative_spanish_readings:
  - a causa del reproche
  - por difamación
  - por la vergüenza
  rationale: El audit trail inglés revisó 'reproach' a 'slander', y el griego habla de διαβολή, campo de calumnia/acusación. 'Calumnia' comunica esa presión social que explica el luto limitado sin suavizar el texto.
  doctrine_reference: Correspondencia semántica con διαβολή / 'slander' y el hebreo ambiguo
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que cambió 'reproach' por 'slander' para afinar la motivación social del pasaje. También mantuve la decisión auditada de leer la cláusula final con el apoyo del griego como tristeza/aflicción, sin imponer una solución tradicional que oculte la dificultad del hebreo.
  spanish_consistency_notes:
  - Se conservó el vocativo 'Hijo mío' para mantener el tono sapiencial.
  - '''Duelo'' y ''lamento'' se distribuyen para reflejar el doblete hebreo sin redundancia excesiva.'
  - '''Calumnia'' traduce el campo de διαβολή y armoniza con la revisión auditada ''slander''.'
  - '''Por la tristeza'' sigue el apoyo del griego λύπης ἕνεκα y evita fijar prematuramente la lectura de עון como ''iniquidad''.'
