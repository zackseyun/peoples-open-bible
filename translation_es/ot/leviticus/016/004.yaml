revisions:
- from: Se pondrá la túnica de lino santo[a], y los calzoncillos de lino estarán sobre su cuerpo; se ceñirá el cinturón de lino alrededor de sí y se envolverá el turbante de lino alrededor de sí. Estas son prendas santas[b]. Lavará su cuerpo con agua y las pondrá.
  to: Se pondrá la túnica santa de lino, y la ropa interior de lino estará sobre su cuerpo; se ceñirá con una faja de lino y se pondrá el turbante de lino. Estas son vestiduras santas[a]. Lavará su cuerpo con agua[b] y se las pondrá.
  rationale: Se corrigió la ubicación de la nota léxica para que corresponda a בִּגְדֵי קֹדֶשׁ, se elevó el registro de 'calzoncillos' a 'ropa interior', se reemplazó 'cinturón' por 'faja' para reflejar mejor el valor de אַבְנֵט, se hizo idiomática la frase del turbante, y se refinó el cierre a 'se las pondrá'. Se conserva 'santa/santas' para קדש y 'cuerpo' para בשרו conforme al audit trail.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido básico del hebreo: túnica de lino, prenda inferior de lino sobre el cuerpo, ceñirse el cinto/faja, ponerse el turbante, declarar que son vestiduras santas, lavarse con agua y vestirse con ellas. Sin embargo, hay varios puntos donde el español no representa de la mejor manera las decisiones léxicas auditadas ni suena natural: ''calzoncillos'' resulta demasiado coloquial para un contexto cultual; ''cinturón'' debilita el matiz de אבנט como banda/faja sacerdotal; ''se envolverá el turbante alrededor de sí'' es una construcción poco idiomática; y la nota [a] está anclada en ''túnica'' aunque la alternativa ''prendas sagradas'' corresponde a ''holy garments / בִּגְדֵי קֹדֶשׁ'', no a ''holy linen tunic''.'
  spanish_quality_summary: El texto es mayormente legible, pero necesita ajustes de registro y naturalidad para un español bíblico moderno y digno. 'Vestiduras' o 'prendas' funciona mejor que la repetición de formulaciones forzadas; 'se ceñirá con una faja de lino' y 'se pondrá el turbante de lino' suenan naturales y fieles. También conviene evitar el giro torpe 'alrededor de sí' dos veces. La secuencia final 'y se las pondrá' mejora la referencia pronominal a las vestiduras.
  glossary_alignment: No hay términos del glosario mayor afectados como Yahvé/Mesías. En léxico sacerdotal, el borrador se aparta de la rationale inglesa al usar 'cinturón' donde la evidencia favorece 'faja' o equivalente de sash, y al elegir 'calzoncillos', que aunque concreto, rebaja demasiado el registro. 'Santo' para קֹדֶשׁ y 'cuerpo' para בשרו sí están bien alineados. La nota alternativa debe reubicarse para corresponder a 'vestiduras santas'.
  issues:
  - severity: high
    issue: La nota [a] está mal ubicada y no corresponde al segmento correcto.
    rationale: 'La nota dice ''También: "prendas sagradas"'', alternativa de בִּגְדֵי קֹדֶשׁ / ''holy garments'', pero el ancla está en ''túnica de lino santo''. Eso distorsiona la evidencia y la trazabilidad del audit trail.'
  - severity: medium
    issue: '''Calzoncillos de lino'' es demasiado coloquial para el registro cultual.'
    rationale: Aunque intenta reflejar מִכְנְסֵי בַד como prenda inferior, en español general suena informal e incluso trivializante. 'Ropa interior de lino' o 'calzones de lino' sería más digna; 'ropa interior' es la opción más neutra y ampliamente legible.
  - severity: medium
    issue: '''Cinturón'' no refleja tan bien el valor sacerdotal de אַבְנֵט.'
    rationale: La rationale inglesa distingue 'sash' de un simple belt. En español, 'faja' transmite mejor una banda ceñida ceremonial que 'cinturón', que sugiere un accesorio moderno rígido.
  - severity: medium
    issue: '''Se envolverá el turbante de lino alrededor de sí'' es poco idiomático.'
    rationale: El hebreo expresa la acción de enrollar/ponerse el tocado, pero en español esa construcción reflexiva con objeto directo suena forzada. 'Se pondrá el turbante de lino' o 'se envolverá la cabeza con un turbante de lino' comunica mejor.
  - severity: low
    issue: '''Estas son prendas santas'' es aceptable, pero ''Estas son vestiduras santas'' encaja mejor con el registro bíblico del contexto.'
    rationale: No es un error de sentido, pero 'vestiduras' armoniza mejor con la escena sacerdotal y con la alternativa nota 'prendas sagradas'.
  - severity: low
    issue: La clausula final 'y las pondrá' puede afinarse a 'y se las pondrá'.
    rationale: El pronombre reflexivo hace más natural en español la acción de ponerse las vestiduras ya mencionadas.
  revised_spanish_text: Se pondrá la túnica santa de lino, y la ropa interior de lino estará sobre su cuerpo; se ceñirá con una faja de lino y se pondrá el turbante de lino. Estas son vestiduras santas[a]. Lavará su cuerpo con agua[b] y se las pondrá.
  revised_footnotes:
  - marker: a
    text: 'También: «prendas sagradas».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «sobre su carne» y «lavará su carne con agua».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación de la nota léxica para que corresponda a בִּגְדֵי קֹדֶשׁ, se elevó el registro de 'calzoncillos' a 'ropa interior', se reemplazó 'cinturón' por 'faja' para reflejar mejor el valor de אַבְנֵט, se hizo idiomática la frase del turbante, y se refinó el cierre a 'se las pondrá'. Se conserva 'santa/santas' para קדש y 'cuerpo' para בשרו conforme al audit trail.
