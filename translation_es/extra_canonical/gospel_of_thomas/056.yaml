base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/056.yaml
  text: 'Jesus said: Whoever has come to know the world has found a corpse[a]; and whoever has found the corpse[c][b], the world is not worthy of him.'
  footnotes:
  - marker: a
    text: The first clause uses the indefinite article (“a corpse”), while the second uses the definite (“the corpse”), probably referring back to the same discovered corpse. Some English versions flatten both as “a corpse,” but the Coptic distinction is kept here.
    reason: dialect_note
  - marker: b
    text: “Come to know” renders the perfective nuance of ⲥⲟⲟⲩⲛ in the ⲡⲉⲧⲉⲣⲉ-relative; “know” would be a plainer alternative.
    reason: lexical_alternative
  - marker: c
    text: Compare Hebrews 11:38 (“of whom the world was not worthy”). This is not a Synoptic parallel and is cited only for thematic resonance.
    reason: cross_reference
