review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: comparación con el ladrón, vergüenza/descrédito de la casa de Israel, y la lista enfática de sus estratos dirigentes. Conserva correctamente «la casa de Israel», «sus reyes», «sus sacerdotes» y «sus profetas». Sin embargo, «Como la vergüenza de un ladrón» resulta menos fiel al giro idiomático adoptado por el POB inglés y menos natural en español que una cláusula verbal comparativa; el hebreo con כ + בֹשֶׁת puede expresarse mejor como «Como un ladrón se avergüenza…».'
  spanish_quality_summary: El texto es comprensible y digno, pero la apertura «Como la vergüenza de un ladrón cuando es hallado» suena algo rígida y nominalizada. En español bíblico natural, «Como un ladrón se avergüenza cuando es hallado» fluye mejor y comunica con más claridad la comparación. El resto del versículo es claro; «ha sido avergonzada» es aceptable, aunque «ha sido puesta en vergüenza» sería más literal y menos idiomático. No hacen falta notas en español para este ajuste.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé, Mesías/Cristo, espíritu, etc. «Oficiales» para שָׂרִים es coherente con la decisión auditada en inglés, aunque «príncipes» sigue siendo una alternativa posible de nota, no necesaria aquí.
  issues:
  - severity: medium
    issue: 'Apertura demasiado nominalizada: «Como la vergüenza de un ladrón»'
    rationale: Aunque formalmente posible, esta construcción suena menos natural en español y se aleja de la decisión POB de expresar la comparación como cláusula verbal. «Como un ladrón se avergüenza cuando es hallado» preserva mejor el sentido comparativo y la legibilidad.
  revised_spanish_text: 'Como un ladrón se avergüenza cuando es hallado, así ha sido avergonzada la casa de Israel: ellos, sus reyes, sus oficiales, sus sacerdotes y sus profetas.'
  revision_rationale: Se ajusta la primera frase para reflejar de manera más natural y fiel en español la comparación hebrea y la decisión auditada del POB, evitando una nominalización rígida. No se requieren cambios adicionales ni notas.
