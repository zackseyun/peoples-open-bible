id: 2MA.3.33
reference: 2 Maccabees 3:33
source:
  edition: lxx-swete-1909
  text: ποιουμένου δὲ τοῦ ἀρχιερέως τὸν ἱλασμὸν οἱ αὐτοὶ νεανίαι πάλιν ἐφάνησαν τῷ Ἡλιοδώρῳ ἐν ταῖς αὐταῖς ἐσθήσεσιν ἐστολισμένοι, καὶ στάντες εἶπαν Πολλὰ Ὀνία τῷ ἀρχιερεῖ χάριτας ἔχε, διὰ γὰρ αὐτὸν σοὶ κεχάρισται τὸ ζῆν Κύριος.
  language: Greek
  pages:
  - 693
  confidence: high
  validation: agree
translation:
  text: And while the high priest was making atonement[a], the same young men appeared again to Heliodorus, clothed in the same garments, and standing there they said, “Give many thanks to Onias the high priest, for because of him the Lord has graciously granted you your life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was performing the expiation'; more technically, 'was making propitiation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιουμένου ... τὸν ἱλασμόν
  chosen: was making the atonement
  alternatives:
  - was performing the expiation
  - was making propitiation
  lexicon: LSJ
  rationale: The genitive absolute with ποιέω plus ἱλασμός denotes the act of carrying out an atoning/expiatory rite. 'Making the atonement' is idiomatic English, preserves sacrificial-religious force, and avoids the more technical 'propitiation' in the main text while keeping the cultic sense.
- source_word: οἱ αὐτοὶ νεανίαι
  chosen: the same young men
  alternatives:
  - the same youths
  lexicon: LSJ
  rationale: νεανίαι refers to young men/youths; 'young men' is natural modern English and preserves the masculine reference. αὐτοὶ is rendered 'the same' to link them with the previously appearing figures.
- source_word: ἐν ταῖς αὐταῖς ἐσθήσεσιν ἐστολισμένοι
  chosen: clothed in the same garments
  alternatives:
  - arrayed in the same clothing
  - dressed in the same attire
  lexicon: LSJ
  rationale: ἐσθής denotes clothing/garment, and ἐστολισμένοι conveys being adorned or clothed. 'Clothed in the same garments' keeps the visual continuity with the earlier appearance without sounding overly ornate.
- source_word: στάντες
  chosen: standing by him
  alternatives:
  - having stood there
  - standing
  lexicon: LSJ
  rationale: The participle marks their posture as they speak. 'Standing by him' makes the scene natural in English and reflects their presence before Heliodorus.
- source_word: Πολλὰ ... χάριτας ἔχε
  chosen: Give many thanks
  alternatives:
  - Be very grateful
  - Have much gratitude
  lexicon: LSJ
  rationale: The idiom means to be deeply thankful. 'Give many thanks' preserves the plural χάριτας and the emphatic πολλὰ more closely than a flattened paraphrase.
- source_word: διὰ γὰρ αὐτὸν
  chosen: for because of him
  alternatives:
  - for on account of him
  - for through him
  lexicon: LSJ
  rationale: διά with accusative indicates cause or reason here. 'Because of him' is the clearest rendering; the initial 'for' preserves the explanatory γάρ.
- source_word: σοὶ κεχάρισται τὸ ζῆν
  chosen: has graciously granted you your life
  alternatives:
  - has granted you to live
  - has given you life as a favor
  lexicon: LSJ
  rationale: χαρίζομαι carries the sense of granting freely or graciously. Rendering it with 'graciously granted' preserves the favor/grace nuance, and 'your life' expresses the infinitive τὸ ζῆν idiomatically in English.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Per project doctrine, κύριος is rendered 'Lord.' With English syntax here, 'the Lord' is the most natural expression for the subject.
