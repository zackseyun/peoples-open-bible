translation:
  language: es
  text: Y tenía grebas[a] de bronce en las piernas, y un venablo[b] de bronce entre sus hombros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Grebas» es el nombre técnico de la armadura para la parte baja de la pierna; también podría entenderse de manera más general como protecciones para las espinillas.
    reason: lexical_alternative
  - marker: b
    text: O «una lanza de bronce»; el término hebreo puede referirse a un arma semejante a una lanza más ligera. Algunos también lo han entendido como otra clase de arma, pero «venablo» encaja bien en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְחַת
  english_pob_choice: greaves
  chosen_spanish: grebas
  alternatives_spanish:
  - protecciones para las espinillas
  - armadura para las piernas
  lexicon: HALOT
  rationale: El término designa una pieza de armadura para la parte baja de las piernas. «Grebas» conserva el valor técnico e histórico del arma, como en el inglés POB, y es más preciso que una paráfrasis general.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En contexto militar antiguo, נְחֹשֶׁת suele referirse al metal de armas y armaduras, normalmente bronce. «Latón» sería anacrónico y «cobre» es posible pero menos probable aquí.
- source_word: עַל רַגְלָיו
  english_pob_choice: on his legs
  chosen_spanish: sobre sus piernas
  alternatives_spanish:
  - sobre sus piernas
  - en sus piernas
  lexicon: HALOT
  rationale: Con grebas, el sentido apunta a la parte baja de las piernas. «Sobre sus piernas» mantiene el dato anatómico sin restringirlo indebidamente solo a los pies.
- source_word: כִידוֹן
  english_pob_choice: javelin
  chosen_spanish: jabalina
  alternatives_spanish:
  - lanza
  - venablo
  lexicon: HALOT
  rationale: El término puede referirse a un arma ligera para arrojar o a una lanza más liviana. «Jabalina» comunica bien esa función y conserva la distinción con una lanza grande.
- source_word: בֵּין כְּתֵפָיו
  english_pob_choice: between his shoulders
  chosen_spanish: entre sus hombros
  alternatives_spanish:
  - entre sus hombros
  - a la espalda
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «entre sus hombros». Se conserva esa imagen sin añadir explícitamente que estaba colgada o sujeta, porque la revisión inglesa quitó «slung» al no estar en el texto.
translation_notes:
  revision_awareness: La base inglesa revisada eliminó «slung» porque no está explícito en el hebreo; por eso el español mantiene solo «entre sus hombros» y no añade una idea de suspensión o correaje. También se preservó el tono técnico de «grebas» y «jabalina» para seguir de cerca las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - Se usó «bronce» de forma consistente para נְחֹשֶׁת, como en el tramo inglés auditado.
  - Se evitó «lanza» porque podría difuminar la diferencia entre כִידוֹן y otras armas del contexto.
  - Se mantuvo la imagen corporal concreta «entre sus hombros» en vez de una equivalencia interpretativa como «a la espalda».
