base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/027/006.yaml
  text: And now I have given all these lands into the hand of Nebuchadnezzar king of Babylon[a], my servant[b]; and I have also given him the beasts of the field to serve him.
  footnotes:
  - marker: a
    text: Or 'Nebuchadrezzar,' reflecting another common transliteration of the king's name.
    reason: lexical_alternative
  - marker: b
    text: '''My servant'' means that Nebuchadnezzar is being used as God''s instrument, not that he is morally approved.'
    reason: cultural_note
