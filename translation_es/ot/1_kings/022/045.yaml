    rationale: Aunque intenta reflejar literalmente 'made peace', en español moderno y eclesialmente legible la forma natural es 'hizo la paz con' o 'hizo las paces con'. El proyecto pide evitar calcos de madera cuando el español resulta antinatural.
  - severity: low
