translation:
  language: es
  text: No descubrirás la desnudez de una mujer y de su hija[a]. No tomarás a la hija de su hijo ni a la hija de su hija para descubrir su desnudez; ellas son parientes cercanos[c][b]. Es una infamia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'parientes cercanos'; más literalmente, 'su carne'.
    reason: lexical_alternative
  - marker: b
    text: '''Descubrir la desnudez'' es un modismo hebreo para relaciones sexuales prohibidas.'
    reason: cultural_note
  - marker: c
    text: O 'maldad', 'desenfreno' o 'un acto escandaloso'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת ... תְגַלֵּה
  english_pob_choice: uncover the nakedness of
  chosen_spanish: descubrir la desnudez de
  alternatives_spanish:
  - tener relaciones sexuales con
  - exponer la desnudez de
  lexicon: HALOT
  rationale: Conservo el giro idiomático legal del hebreo para mantener la fuerza intertextual y la terminología coherente en Levítico, sin borrar su sentido sexual en el contexto.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: HALOT
  rationale: Aquí el término es más amplio que 'esposa'; 'mujer' refleja mejor el alcance del mandato y evita restringir indebidamente el referente.
- source_word: וּבִתָּהּ
  english_pob_choice: and her daughter
  chosen_spanish: y de su hija
  alternatives_spanish:
  - y su hija
  lexicon: HALOT
  rationale: La relación posesiva se mantiene de forma natural en español con 'de su hija', preservando el vínculo con la mujer mencionada.
- source_word: תִקַּח
  english_pob_choice: take
  chosen_spanish: tomarás
  alternatives_spanish:
  - casarás con
  - tomarás en matrimonio
  lexicon: HALOT
  rationale: Mantengo 'tomar' porque el hebreo es literalmente 'tomar' y el contexto legal permite esa amplitud sin reducir el alcance a un simple matrimonio formal.
- source_word: בַּת בְּנָהּ
  english_pob_choice: her son's daughter
  chosen_spanish: la hija de su hijo
  alternatives_spanish:
  - la nieta por medio de su hijo
  lexicon: HALOT
  rationale: Prefiero la estructura genealógica explícita del hebreo para conservar la precisión jurídica del parentesco.
- source_word: בַּת בִּתָּהּ
  english_pob_choice: her daughter's daughter
  chosen_spanish: la hija de su hija
  alternatives_spanish:
  - la nieta por medio de su hija
  lexicon: HALOT
  rationale: Como arriba, reproduzco la relación de parentesco de manera transparente y sobria.
- source_word: לְגַלּוֹת עֶרְוָתָהּ
  english_pob_choice: to uncover her nakedness
  chosen_spanish: para descubrir su desnudez
  alternatives_spanish:
  - para tener relaciones sexuales con ella
  lexicon: HALOT
  rationale: Conservo el mismo modismo en una forma española natural; el infinitivo final deja claro el propósito sexual prohibido sin explicitarlo en exceso.
- source_word: שַׁאֲרָה
  english_pob_choice: her close relatives
  chosen_spanish: parientes cercanas
  alternatives_spanish:
  - parientes próximos
  - su misma parentela
  lexicon: HALOT
  rationale: שַׁאֲרָה expresa parentesco consanguíneo; 'parientes cercanas' comunica de manera clara y breve la relación de sangre señalada por el hebreo.
- source_word: הֵנָּה
  english_pob_choice: they are
  chosen_spanish: ellas son
  alternatives_spanish:
  - son
  lexicon: HALOT
  rationale: El pronombre femenino plural se refiere a las descendientes mencionadas; en español, 'ellas son' hace explícito el sujeto sin alterar el sentido.
- source_word: זִמָּה
  english_pob_choice: depravity
  chosen_spanish: una infamia
  alternatives_spanish:
  - perversidad
  - desvergüenza
  - una maldad
  lexicon: HALOT
  rationale: El término designa una acción moralmente abominable, especialmente en el ámbito sexual; 'infamia' preserva el peso condenatorio con un registro digno y comprensible.
theological_decisions:
- issue: Referente del sufijo en 'para descubrir su desnudez'
  english_pob_reading: The suffix refers to the original woman, so taking her granddaughter is treated as uncovering the woman's nakedness as well.
  chosen_spanish_reading: El posesivo 'su' remite a la mujer mencionada al inicio, de modo que la prohibición se extiende a sus descendientes como parte del mismo vínculo familiar.
  alternative_spanish_readings:
  - El posesivo podría leerse de modo distributivo respecto de cada descendiente mencionada.
  - Podría explicitarse como 'su propia desnudez'
  rationale: Mantener el referente al primer miembro de la relación conserva la lógica del argumento legal y evita diluir la conexión kinship-sexual que estructura la cláusula.
  doctrine_reference: Levítico 18:17; parentesco prohibido en la ley de santidad
- issue: Alcance de 'tomar' en esta ley de incesto
  english_pob_reading: Retain the broader verb 'take' rather than specifying marriage alone.
  chosen_spanish_reading: Conservo 'tomar' sin limitarlo a matrimonio, porque el mandato regula una unión sexual/kinship prohibida más amplia que un acto jurídico de boda.
  alternative_spanish_readings:
  - casarse con
  - tomar en matrimonio
  rationale: El hebreo no se restringe a un contrato matrimonial; mantener la amplitud del verbo evita estrechar el mandato más allá de la evidencia textual.
  doctrine_reference: Levítico 18:17; prohibición de uniones incestuosas
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el posesivo antes de 'close relatives' para reflejar mejor שַׁאֲרָה הֵנָּה ('they are close relatives'). En español se sigue esa misma línea con 'ellas son parientes cercanas', sin posesivo añadido, y se mantiene el resto de la cláusula en continuidad con el texto auditado.
  spanish_consistency_notes:
  - Se conserva 'descubrir la desnudez' para mantener la fórmula legal de Levítico, en paralelo con el inglés POB.
  - '''Mujer'' se usa en lugar de ''esposa'' por el valor amplio de אִשָּׁה en este contexto.'
  - '''Parientes cercanas'' reproduce el valor de parentesco consanguíneo de שַׁאֲרָה sin sobreexplicar.'
  - '''Infamia'' traduce זִמָּה con un registro solemne y condenatorio, coherente con la gravedad del término en la ley.'
  - Se mantiene la secuencia relacional 'la hija de su hijo / la hija de su hija' para preservar la especificidad genealógica del hebreo.
