translation:
  language: es
  text: Así que Betsabé entró a ver al rey en la cámara[a]. Ahora bien, el rey estaba muy anciano, y Abisag la sunamita atendía[b] al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entró al cuarto donde estaba el rey».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «servía al rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue
  - ingresó
  lexicon: HALOT
  rationale: El wayyiqtol de בוא avanza la narración; en español, 'entró' comunica de forma natural la entrada al espacio privado del rey sin perder el movimiento narrativo. 'Ingresó' es más formal; 'fue' es demasiado general.
- source_word: בַת־שֶׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Bathsheba
  lexicon: Transliteración bíblica estándar en español
  rationale: Se conserva el nombre propio en la forma usual española 'Betsabé', que es legible en ámbito eclesial y auditable como transliteración del hebreo.
- source_word: אֶל־הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: donde el rey
  alternatives_spanish:
  - al rey
  - a la presencia del rey
  lexicon: HALOT
  rationale: El hebreo marca movimiento hacia el rey; en español, por el contexto inmediato, 'donde el rey' expresa con naturalidad que ella entra al recinto donde él está. 'Al rey' es posible, pero en español puede sonar menos preciso cuando el complemento de destino se entiende espacialmente.
- source_word: הַחַדְרָה
  english_pob_choice: in the chamber
  chosen_spanish: en la cámara
  alternatives_spanish:
  - en el cuarto
  - en la habitación interior
  lexicon: HALOT
  rationale: '''Cámara'' conserva el valor de חדר como cuarto privado o aposento de un palacio y evita rebajar el registro con ''cuarto'' o ''habitación''. La POB inglesa preserva la noción de espacio privado; en español ''cámara'' la refleja bien.'
- source_word: וְהַמֶּלֶךְ זָקֵן מְאֹד
  english_pob_choice: Now the king was very old
  chosen_spanish: Ahora bien, el rey estaba muy anciano
  alternatives_spanish:
  - y el rey era muy viejo
  - el rey era muy anciano
  lexicon: HALOT
  rationale: Se mantiene el valor de fondo explicativo del waw inicial con 'Ahora bien'. 'Anciano' comunica edad avanzada con dignidad y evita el tono coloquial de 'viejo'. La elección refleja el matiz descriptivo de זָקֵן מְאֹד.
- source_word: וַאֲבִישַׁג הַשּׁוּנַמִּית
  english_pob_choice: and Abishag the Shunammite
  chosen_spanish: Abisag la sunamita
  alternatives_spanish:
  - Abisag la shunamita
  lexicon: Transliteración bíblica estándar en español
  rationale: Se translitera el nombre como 'Abisag' y el gentilicio como 'sunamita', forma establecida en español bíblico y plenamente comprensible.
- source_word: מְשָׁרַת
  english_pob_choice: was attending
  chosen_spanish: atendía
  alternatives_spanish:
  - servía
  - asistía
  lexicon: HALOT
  rationale: El participio expresa acción continua. 'Atendía' reproduce el servicio de cuidado personal propio del contexto de una joven atendiendo al rey anciano, y evita el registro eclesiástico de 'ministraba'.
- source_word: אֶת־הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al monarca
  lexicon: HALOT
  rationale: El objeto directo con preposición se expresa naturalmente como 'al rey'; conserva el referente sin añadir matiz interpretativo.
translation_notes:
  revision_awareness: Se revisó el pasaje frente al hebreo consonántico y la pauta inglesa auditable. No hubo cambios textuales en la revisión reciente; la concordancia general del pasaje fue alta y no se registraron objeciones sustantivas.
  spanish_consistency_notes:
  - Se mantiene Betsabé/Abisag como formas españolas estándar de nombres propios bíblicos.
  - Se preserva 'cámara' para el aposento privado, en línea con el valor de חדר y con el matiz de la traducción inglesa.
  - '''Atendía'' se usa como equivalente funcional de una acción continua de servicio personal, sin trasladar un tecnicismo eclesiástico.'
