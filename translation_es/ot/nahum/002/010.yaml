    text: Or 'There is no end to the store/supply.' The Hebrew noun translated 'treasure' is rare and may emphasize accumulated stores rather than treasure in the abstract.
    reason: lexical_alternative
  - marker: b
    text: Or 'all kinds of precious articles.' The Hebrew phrase can refer broadly to desirable valuables, not only vessels in a narrow sense.
    reason: lexical_alternative
