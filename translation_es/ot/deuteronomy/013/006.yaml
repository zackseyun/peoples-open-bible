    text: Or 'apostasy.' The Hebrew phrase 'spoken rebellion' denotes defection from covenant loyalty to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'the house of bondage'; literally 'the house of slaves.'
    reason: lexical_alternative
