lexical_decisions:
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - u
  lexicon: HALOT
  rationale: La conjunción disyuntiva simple se mantiene como «o», sin añadir énfasis no presente en el hebreo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - una persona
  lexicon: HALOT
  rationale: En este contexto legal sacerdotal, el singular masculino se conserva de forma directa y natural en español.
- source_word: אֲשֶׁר יִהְיֶה בוֹ
  english_pob_choice: who has
  chosen_spanish: que tenga
  alternatives_spanish:
  - en quien haya
  - que tenga en sí
  lexicon: HALOT
  rationale: El hebreo expresa literalmente una condición de posesión o presencia («que haya en él»), pero en español legal suena más natural y fiel decir «que tenga», sin perder el sentido de condición física.
- source_word: שֶׁבֶר
  english_pob_choice: broken
  chosen_spanish: fracturado
  alternatives_spanish:
  - roto
  - con fractura
  lexicon: HALOT
  rationale: El sustantivo denota una ruptura o fractura. En español, «fracturado» conserva ese valor léxico con un registro digno y claro; «roto» sería más coloquial.
- source_word: רָגֶל
  english_pob_choice: foot
  chosen_spanish: pie
  alternatives_spanish:
  - pie
  - pierna
  lexicon: HALOT
  rationale: La equivalencia más directa aquí es «pie»; aunque en algunos contextos bíblicos el término puede abarcar la pierna, no hay razón contextual para ampliar el alcance.
- source_word: שֶׁבֶר יָד
  english_pob_choice: a broken hand
  chosen_spanish: una mano fracturada
  alternatives_spanish:
  - una mano rota
  - un brazo fracturado
  lexicon: HALOT
  rationale: Se mantiene la correspondencia directa con יָד como «mano», y con שֶׁבֶר como «fracturada», evitando ampliar innecesariamente a «brazo».
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa concuerdan plenamente; no se detectaron variantes textuales ni revisiones aplicadas que requieran ajuste especial en español.
