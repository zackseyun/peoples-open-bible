id: 2SA.16.14
reference: 2 Samuel 16:14
source:
  edition: WLC
  text: וַ/יָּבֹ֥א הַ/מֶּ֛לֶךְ וְ/כָל הָ/עָ֥ם אֲשֶׁר אִתּ֖/וֹ עֲיֵפִ֑ים וַ/יִּנָּפֵ֖שׁ שָֽׁם־־׃
translation:
  text: The king and all the people who were with him arrived weary[b][a], and they refreshed themselves there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came ... and rested there.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew verb is singular (''he refreshed himself''), though some understand it collectively: ''they refreshed themselves.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: arrived
  alternatives:
  - came
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come' or 'enter,' but in English narrative 'arrived' fits the endpoint sense naturally here, since the verse focuses on reaching a place and resting there.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; the referent is David in context, but the Hebrew uses the title, so the translation preserves that.
- source_word: וְכָל הָעָם אֲשֶׁר אִתּוֹ
  chosen: and all the people who were with him
  alternatives:
  - and all the people with him
  lexicon: HALOT
  rationale: This preserves the relative clause explicitly present in Hebrew while remaining natural English.
- source_word: עֲיֵפִים
  chosen: weary
  alternatives:
  - exhausted
  - faint
  lexicon: HALOT
  rationale: The adjective denotes weariness or fatigue. 'Weary' is concise and idiomatic, matching the physical exhaustion implied by the context.
- source_word: וַיִּנָּפֵשׁ
  chosen: he refreshed himself
  alternatives:
  - he rested
  - they refreshed themselves
  lexicon: HALOT
  rationale: From נפשׁ in the Niphal/related stem, the sense is to recover breath, refresh oneself, or be restored. 'He refreshed himself' preserves the singular verbal form and the nuance of renewal better than the flatter 'rested.' The singular likely refers to the king as representative focal subject after the collective arrival.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Standard adverbial rendering indicating the place where the refreshment occurred.
