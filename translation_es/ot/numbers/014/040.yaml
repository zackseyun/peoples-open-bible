revisions:
- from: 'Se levantaron temprano por la mañana y subieron a la cumbre de la montaña[a], diciendo: «Aquí estamos, y subiremos al lugar que Yahvé ha dicho, porque hemos pecado».'
  to: 'Se levantaron temprano por la mañana y subieron a la cumbre de la montaña[a], diciendo: «Aquí estamos, y subiremos al lugar del que Yahvé ha hablado, porque hemos pecado».'
  rationale: Se revisa la cláusula relativa para que el español suene natural y fiel al sentido contextual de אָמַר sin convertirlo en «prometió». También se corrige la nota al pie, cuya literalidad estaba mal formulada en español. El resto del versículo puede mantenerse.
