base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/007.yaml
  text: He tore down the altars and the Asherim[a], and he crushed the carved images to powder; he cut down all the incense altars throughout all the land of Israel[b]. Then he returned to Jerusalem.
  footnotes:
