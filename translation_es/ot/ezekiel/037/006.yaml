translation:
  language: es
  text: Pondré tendones sobre ustedes, y haré subir carne sobre ustedes, y los cubriré con piel, y pondré aliento[a] en ustedes, y vivirán. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "espíritu" o "viento"; el hebreo רוּחַ puede abarcar los tres sentidos, y Ezequiel 37 juega con toda esa amplitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּדִים
  english_pob_choice: sinews
  chosen_spanish: tendones
  alternatives_spanish:
  - sinews
  - nervios
  lexicon: HALOT
  rationale: El término hebreo designa las bandas anatómicas que unen y sostienen el cuerpo restaurado en la visión. En español, “tendones” es el equivalente técnico más claro y natural; “sinews” sería un calco poco usual, y “nervios” no corresponde con precisión anatómica.
- source_word: וְהַעֲלֵתִי עֲלֵיכֶם בָּשָׂר
  english_pob_choice: I will bring flesh up over you
  chosen_spanish: haré subir carne sobre ustedes
  alternatives_spanish:
  - pondré carne sobre ustedes
  - haré venir carne sobre ustedes
  lexicon: HALOT
  rationale: La forma causativa conserva la imagen de hacer que la carne ascienda o aparezca sobre el cuerpo en restauración. “Haré subir” mantiene mejor la vividez del hebreo que un simple “pondré”, sin perder naturalidad en español.
- source_word: וְקָרַמְתִּי עֲלֵיכֶם עוֹר
  english_pob_choice: I will cover you with skin
  chosen_spanish: los cubriré con piel
  alternatives_spanish:
  - extenderé piel sobre ustedes
  - los revestiré de piel
  lexicon: HALOT
  rationale: El verbo expresa cobertura o revestimiento. “Cubrir con piel” comunica con claridad la secuencia corporal de la visión y evita una formulación demasiado literal que sonaría extraña en español.
- source_word: רוּחַ
  english_pob_choice: breath
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió “breath” para el contexto inmediato, en español “espíritu” preserva mejor la tensión semántica de רוּחַ en Ezequiel 37, donde el término oscila entre espíritu, aliento y viento. Aquí, el texto final “y vivirán” permite conservar esa amplitud sin forzar una reducción demasiado física.
- source_word: וִחְיִיתֶם
  english_pob_choice: you will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - recobrarán la vida
  - volverán a vivir
  lexicon: HALOT
  rationale: Es una promesa futura directa. “Vivirán” es breve, fiel y natural, y mantiene el paralelismo con la secuencia de restauración corporal.
- source_word: וִידַעְתֶּם כִּי אֲנִי יְהוָה
  english_pob_choice: Then you will know that I am Yahweh
  chosen_spanish: Entonces sabrán que yo soy Yahvé
  alternatives_spanish:
  - y sabrán que yo soy Yahvé
  - entonces reconocerán que yo soy Yahvé
  lexicon: HALOT
  rationale: La secuencia resultativa se expresa bien con “Entonces”. Se conserva “Yahvé” por la convención del proyecto para el nombre divino, en lugar de sustituirlo por una máscara reverencial.
theological_decisions:
- issue: Sentido de רוּחַ en una visión de reanimación corporal
  english_pob_reading: breath
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - aliento
  - viento
  rationale: La secuencia inmediata sugiere animación de cuerpos, pero Ezequiel 37 explota deliberadamente la polisemia de רוּחַ. En español, “espíritu” permite conservar esa tensión sin cerrar prematuramente el campo semántico a una sola lectura fisiológica.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Uso del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para יהוה como transliteración reverente y auditable, evitando la máscara “SEÑOR” y manteniendo coherencia con la política terminológica establecida.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de WLC y el audit trail inglés. Se mantuvo la secuencia corporal de restauración, pero en español se prefirió una forma natural y publicable (“haré subir carne”, “los cubriré con piel”) sin perder la imagen original. La decisión más sensible es רוּחַ: aunque el inglés POB optó por “breath”, en español se priorizó “espíritu” para preservar la polisemia teológica del pasaje; la alternativa se documenta en nota.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se evita “SEÑOR” como sustituto del nombre divino.
  - 'La secuencia verbal conserva el paralelismo de acciones divinas: poner, hacer subir, cubrir, poner, vivir, saber.'
  - “Ustedes” mantiene un registro neutro latinoamericano y concordancia plural con el destinatario colectivo.
  - La nota sobre רוּחַ preserva la tensión semántica sin imponer una interpretación única.
