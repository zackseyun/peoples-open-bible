translation:
  language: es
  text: Lava tu corazón de maldad[a], Jerusalén, para que seas salvada. ¿Hasta cuándo morarán dentro de ti pensamientos perversos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pensamientos perversos»; también puede entenderse «tus perversos planes» o «tus perversas maquinaciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבְּסִי
  english_pob_choice: Wash your heart
  chosen_spanish: Lava tu corazón
  alternatives_spanish:
  - Lava...
  - Límpiate
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente lavar o lavar ropa; en español, "lava tu corazón" conserva la metáfora concreta sin endurecerla. Se evita agregar "limpia" porque el audit trail inglés retiró esa intensificación no explícita en el hebreo.
- source_word: מֵרָעָה
  english_pob_choice: from evil
  chosen_spanish: de maldad
  alternatives_spanish:
  - de mal
  - de perversidad
  - de maldad y perversión
  lexicon: HALOT
  rationale: La preposición expresa separación de aquello de lo cual debe ser lavada la interioridad. "Maldad" refleja bien el campo moral del término y suena natural en español sin desplazar el sentido a calamidad o desastre.
- source_word: לִבֵּךְ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  - tu ser interior
  lexicon: HALOT
  rationale: '"Corazón" conserva la antropología bíblica del centro interior de pensamientos y voluntad. Es la correspondencia más directa y auditable para el hebreo.'
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: nombre propio
  rationale: Nombre propio estándar en español; se mantiene el vocativo directo dirigido a la ciudad personificada.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Expresa claramente la finalidad en español actual, preservando la relación causal-final del hebreo.
- source_word: תִּוָּשֵׁעִי
  english_pob_choice: you may be saved
  chosen_spanish: seas salvada
  alternatives_spanish:
  - seas librada
  - seas rescatada
  - seas salva
  lexicon: HALOT
  rationale: '"Ser salvada" retiene la amplitud teológica de ישע, tal como el inglés POB optó por "saved" para no restringir el alcance a mera libración temporal. Se usa la forma femenina por el vocativo a Jerusalén.'
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Hasta cuándo?
  - ¿Hasta cuándo será esto?
  lexicon: HALOT
  rationale: Equivalente idiomático natural en español para la fórmula profética de lamento y reprensión.
- source_word: תָּלִין
  english_pob_choice: will lodge
  chosen_spanish: morarán
  alternatives_spanish:
  - pasarán la noche
  - habitarán
  - se quedarán
  lexicon: HALOT
  rationale: El hebreo alude a alojarse o pasar la noche, con una imagen de permanencia. En español, "morarán" comunica esa residencia persistente en un registro bíblico y literario adecuado.
- source_word: בְּקִרְבֵּךְ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en tu interior
  - en medio de ti
  lexicon: HALOT
  rationale: '"Dentro de ti" expresa la localización interior con naturalidad en español y mantiene el foco en la interioridad de Jerusalén personificada.'
- source_word: מַחְשְׁב֥וֹת
  english_pob_choice: wicked thoughts
  chosen_spanish: pensamientos perversos
  alternatives_spanish:
  - pensamientos malvados
  - planes perversos
  - malos pensamientos
  lexicon: HALOT
  rationale: El sustantivo puede ser pensamientos, planes o maquinaciones. "Pensamientos perversos" conserva la amplitud semántica y el matiz moral sin forzar una sola opción como "planes".
- source_word: אוֹנֵךְ
  english_pob_choice: your wicked
  chosen_spanish: perversos
  alternatives_spanish:
  - malvados
  - iniquos
  - malos
  lexicon: HALOT
  rationale: El hebreo funciona como calificación moral de los pensamientos. En español, el adjetivo se integra naturalmente con "pensamientos"; se evita añadir un posesivo que el texto hebreo no exige aquí, siguiendo la revisión inglesa.
theological_decisions:
- issue: Alcance de תִּוָּשֵׁעִי en contexto profético
  english_pob_reading: Rendered as 'you may be saved' without narrowing it to either purely temporal deliverance or fully developed soteriological salvation.
  chosen_spanish_reading: '"seas salvada" sin restringirlo a mera liberación temporal ni a una formulación soteriológica más técnica.'
  alternative_spanish_readings:
  - seas librada
  - obtengas salvación
  rationale: El contexto de Jeremías mezcla juicio inminente, llamado al arrepentimiento y posibilidad real de rescate. "Salvada" conserva esa amplitud, igual que la decisión inglesa, y no resuelve la tensión teológica a favor de una sola lectura.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB: se mantuvo la eliminación de ''clean'' y del posesivo añadido antes de ''wicked thoughts''. La versión española evita igualmente intensificar la metáfora de lavado y no introduce un posesivo innecesario en ''pensamientos perversos''.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el tetragrámaton cuando aparezca, según el estándar del proyecto; este versículo no lo contiene.
  - '"Corazón" se usa en sentido bíblico de centro interior, no como mero sentimiento.'
  - '"Salvada" conserva la amplitud de la salvación/liberación sin precisar más allá del texto.'
  - El adjetivo "perversos" se usa como equivalente moral de רָע/אוֹן en este contexto, sin cambiar la referencia a pensamientos interiores.
