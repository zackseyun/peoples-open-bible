    rationale: El hebreo וַתּוֹרִדֵם lleva sufijo 3mp ('los'). El texto se refiere a los espías en plural. 'La bajó' cambia el sentido y produce un error de referencia.
  - severity: medium
    issue: La nota al pie está anclada en un lugar y con un contenido poco pertinentes
    rationale: La nota inglesa preserva una alternativa para la descripción espacial de la casa en el muro, no para 'con una cuerda'. En español, la ambigüedad relevante también está en 'en el muro de la ciudad / sobre la muralla'.
  - severity: low
    issue: Posible mejora estilística en 'Entonces'
    rationale: '''Entonces'' es aceptable para el waw narrativo, aunque ''Luego'' o omitirlo también serían posibles. No requiere cambio obligatorio.'
  revised_spanish_text: Entonces los bajó con una cuerda por la ventana, porque su casa estaba en el muro de la ciudad[a], y ella habitaba en el muro.
  revised_footnotes:
  - marker: a
    text: O «su casa estaba sobre la muralla de la ciudad, y ella vivía sobre la muralla». El hebreo describe su vivienda como situada en/dentro de la estructura del muro.
    reason: lexical_alternative
