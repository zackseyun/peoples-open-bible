review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo en conjunto: mantiene רֵאשִׁית בִּכּוּרֵי como una expresión de prioridad cultual, conserva בֵּית como “casa”, usa “Yahvé” para יְהוָה conforme al proyecto, y transmite correctamente la prohibición de no hervir/cocer un cabrito en la leche de su madre. Sin embargo, la colocación española actual altera ligeramente el énfasis del hebreo al anteponer “a la casa de Yahvé tu Dios” antes del objeto directo, cuando el texto fuente inicia con “lo primero de las primicias…”.'
  spanish_quality_summary: El español es claro y digno, pero la sintaxis suena menos natural y menos fiel al orden informativo del original por comenzar con el complemento de destino. Además, la nota al pie es redundante porque repite exactamente la misma frase ya puesta en el texto; una nota de alternativa debe aportar una opción real o suprimirse. El resto del verso es legible y apropiado para un registro bíblico moderno.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: “Yahvé” para יהוה, “primicias” para בִּכּוּרֵי, “casa” para בֵּית, “cabrito” para גְּדִי. “Suelo” es defendible para אַדְמָתְךָ, aunque “tierra” sería más idiomático en muchas Biblias; no requiere cambio. “Cocerás” es aceptable, aunque “hervirás” sería más estrechamente léxico; dado el uso bíblico amplio y la naturalidad de “cocer”, tampoco exige adjudicación superior.'
  issues:
  - severity: medium
    issue: Orden sintáctico menos fiel y menos natural en la primera cláusula
    rationale: 'El hebreo comienza con el objeto ofrecido: “lo primero de las primicias de tu suelo”, y luego añade “traerás a la casa de Yahvé tu Dios”. En español, conservar ese orden mejora la correspondencia con la fuente y suena más equilibrado.'
  - severity: medium
    issue: Nota al pie redundante e inválida como alternativa
    rationale: 'La nota [a] dice exactamente lo mismo que el texto principal: “lo primero de las primicias de tu suelo”. Una nota léxica debe ofrecer una alternativa real o una aclaración distinta; aquí conviene sustituirla por la alternativa documentada “las primeras primicias…”.'
  revised_spanish_text: Lo primero[a] de las primicias de tu suelo traerás a la casa de Yahvé tu Dios. No cocerás un cabrito en la leche de su madre.
