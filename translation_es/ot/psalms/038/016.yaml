translation:
  language: es
  text: Porque en ti[a] he esperado, Yahvé; tú responderás[b], oh Señor, Dios mío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Porque para ti, oh Yahvé, he esperado/aguardado». El verbo también puede entenderse como «he esperado con esperanza» o «he puesto mi esperanza».'
    reason: lexical_alternative
  - marker: b
    text: O «contestarás» o «responderás». El hebreo no expresa explícitamente el objeto; en español podría suplirse «me», pero aquí se deja implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón o fundamento de la afirmación previa. «Porque» conserva bien esa relación causal/explicativa en español sin sobreespecificarla.
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - por ti
  - a ti
  - en ti
  lexicon: HALOT
  rationale: Con יחל en el hebreo, la preposición ל expresa la orientación del esperar/esperar en esperanza hacia la persona mencionada. «Para ti» mantiene esa dirección de manera natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo, siguiendo la convención POB de transliterar el Tetragrámaton como «Yahvé» en el texto principal, en lugar de sustituirlo por un título.
- source_word: הוֹחָלְתִּי
  english_pob_choice: I wait
  chosen_spanish: he esperado
  alternatives_spanish:
  - espero
  - he aguardado
  - he esperado con esperanza
  lexicon: HALOT
  rationale: El hiphil de יחל tiene el sentido de esperar con esperanza/aguardar. El perfecto hebreo se vierte mejor con perfecto español para conservar el valor aspectual y el tono de confianza perseverante.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - tú
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. En español, el orden y el uso explícito de «tú» antes del verbo preservan adecuadamente ese énfasis sin añadir una paráfrasis pesada.
- source_word: תַעֲנֶה
  english_pob_choice: will answer
  chosen_spanish: responderás
  alternatives_spanish:
  - contestarás
  - responderás tú
  - me responderás
  lexicon: HALOT
  rationale: ענה aquí puede significar «responder» o «contestar». «Responderás» es natural en español y mantiene la ambigüedad saludable del hebreo, que no explicita el objeto directo.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Soberano
  - Mi Señor
  lexicon: HALOT
  rationale: Como vocativo divino, «Señor» es el equivalente español más claro y reverente. Aunque la forma hebrea funciona como título de dirección, no se fuerza «mi Señor» en el texto principal porque el paralelismo ya incluye la apelación personal.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  - Dios mío
  lexicon: HALOT
  rationale: El sufijo posesivo se conserva de manera directa y natural. «Mi Dios» mantiene la súplica personal del salmista y el paralelo vocativo con «Señor».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En la tradición POB en español se adopta «Yahvé» como transliteración del nombre propio divino, preservando la distinción entre nombre y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Objeto no expresado en תַעֲנֶה
  english_pob_reading: you will answer
  chosen_spanish_reading: tú responderás
  alternative_spanish_readings:
  - tú me responderás
  - tú contestarás
  rationale: El hebreo no expresa objeto directo; por eso la traducción no añade «me» en el texto principal. Así se conserva la apertura del enunciado y la correspondencia con la observación auditada en la POB inglesa.
  doctrine_reference: Principio de transparencia textual y no explicitación innecesaria del sujeto/objeto implícito
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior anclando ambas notas al texto principal mediante los marcadores [a] y [b]. También alinea el nombre divino con la convención española del proyecto («Yahvé») y mantiene sin explicitar el objeto de תַעֲנֶה, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה, consistente con el estándar español del proyecto.
  - Se conservó el paralelismo vocativo con «Señor, mi Dios».
  - Se evitó añadir un objeto explícito a «responderás» para respetar la elipsis del hebreo.
  - Los marcadores de nota [a] y [b] aparecen exactamente donde se apoyan lexicalmente en el texto.
