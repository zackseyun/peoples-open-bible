translation:
  language: es
  text: Los primogénitos de los pobres pastarán[a], y los necesitados se recostarán en seguridad; y yo mataré tu raíz con hambruna, y matará[b] a tu remanente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los más pobres de los pobres». El hebreo dice literalmente «los primogénitos de los pobres», que puede funcionar como una intensificación idiomática.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo tiene «él matará» con sujeto singular ambiguo. Puede dejarse indefinido, o entenderse como la hambruna o el juicio personificado, sin hacerlo explícito en la traducción.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרָעוּ
  english_pob_choice: will graze
  chosen_spanish: pastarán
  alternatives_spanish:
  - pastorearán
  - comerán del pasto
  lexicon: HALOT
  rationale: רעה en qal se aplica aquí con imagen pastoral; en español, «pastarán» conserva el cuadro de animales comiendo en el campo sin volverlo abstracto.
- source_word: בְּכוֹרֵי דַלִּים
  english_pob_choice: the firstborn of the poor
  chosen_spanish: los primogénitos de los pobres
  alternatives_spanish:
  - los más pobres de los pobres
  - los hijos primogénitos de los pobres
  lexicon: HALOT
  rationale: Se mantiene la literalidad de בכור como «primogénitos», porque el hebreo permite una intensificación idiomática sin obligarla en el texto principal.
- source_word: דַלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los débiles
  - los humildes
  lexicon: HALOT
  rationale: דלים designa de forma natural a los pobres; «los pobres» es la opción más directa y clara en español.
- source_word: וְאֶבְיוֹנִים
  english_pob_choice: and the needy
  chosen_spanish: y los necesitados
  alternatives_spanish:
  - y los pobres
  - y los indigentes
  lexicon: HALOT
  rationale: אביון resalta necesidad o indigencia; «necesitados» conserva esa distinción frente a דלים.
- source_word: לָבֶטַח
  english_pob_choice: in safety
  chosen_spanish: con seguridad
  alternatives_spanish:
  - en seguridad
  - seguramente
  lexicon: HALOT
  rationale: בטח expresa seguridad/reposo confiado; «con seguridad» suena natural junto con «se recostarán».
- source_word: יִרְבָּצוּ
  english_pob_choice: will lie down
  chosen_spanish: se recostarán
  alternatives_spanish:
  - se echarán
  - descansarán
  lexicon: HALOT
  rationale: רבץ tiene el matiz de echarse/recostarse, a menudo de animales; «se recostarán» preserva el cuadro pastoral.
- source_word: וְהֵמַתִּי
  english_pob_choice: I will kill
  chosen_spanish: yo mataré
  alternatives_spanish:
  - yo haré morir
  - yo daré muerte a
  lexicon: HALOT
  rationale: La Hifil de מות significa causar la muerte; «mataré» es directo y fiel al tono de juicio.
- source_word: בָרָעָב
  english_pob_choice: with famine
  chosen_spanish: con hambre
  alternatives_spanish:
  - por hambre
  - mediante el hambre
  lexicon: HALOT
  rationale: El ב expresa instrumento/medio; «con hambre» mantiene la construcción simple y natural en español.
- source_word: שָׁרְשֵׁךְ
  english_pob_choice: your root
  chosen_spanish: tu raíz
  alternatives_spanish:
  - tu raíz misma
  - tu linaje
  lexicon: HALOT
  rationale: שורש es literalmente «raíz»; se conserva la metáfora de origen y fundamento del pueblo o poder aludido.
- source_word: וּשְׁאֵרִיתֵךְ
  english_pob_choice: your remnant
  chosen_spanish: tu remanente
  alternatives_spanish:
  - lo que te queda
  - tu resto
  lexicon: HALOT
  rationale: שארית se refiere a lo que queda después del juicio; «remanente» conserva la conexión con el lenguaje profético.
- source_word: יַהֲרֹג
  english_pob_choice: it will slay
  chosen_spanish: ella matará
  alternatives_spanish:
  - lo matará
  - matará
  lexicon: HALOT
  rationale: Se deja implícito un sujeto femenino concordando con «hambre» para reflejar la lectura revisada del POB, donde el hambre funciona como agente personificado del juicio.
theological_decisions:
- issue: Sujeto implícito del verbo final singular
  english_pob_reading: it will slay your remnant
  chosen_spanish_reading: ella matará tu remanente
  alternative_spanish_readings:
  - lo matará tu remanente
  - matará tu remanente
  rationale: El hebreo pasa de la primera persona a una tercera singular; la revisión inglesa favorece entender el hambre como sujeto implícito. En español se puede hacer explícita esa personificación con «ella» para evitar ambigüedad gramatical sin cambiar el sentido del juicio.
  doctrine_reference: Translation philosophy §3; preserve textual tension while allowing an informed clarification of the implied agent.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB: se cambió la conjunción final a «y» y se resolvió el sujeto del último verbo como el hambre personificada. La versión española refleja esa decisión revisada sin perder la metáfora hebrea de raíz/remanente.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» no aplicable aquí; no aparece el nombre divino en este verso.
  - «Primogénitos de los pobres» mantiene la literalidad del hebreo y deja la alternativa idiomática en nota.
  - Se evitó traducir דלים y אביונים ambos como «pobres» para no borrar la distinción léxica.
  - «Remanente» preserva el vocabulario profético de שְׁאֵרִית.
  - La personificación del hambre se expresa en la forma femenina «ella» por concordancia con «hambre» en español.
