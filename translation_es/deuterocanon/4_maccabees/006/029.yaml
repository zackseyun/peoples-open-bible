  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Purificación», «sangre», «vida» y «toma» están bien alineados con las decisiones léxicas y teológicas documentadas. La revisión propuesta mantiene la tensión cultual y sustitutiva sin convertirla en «expiación» ni «rescate».
