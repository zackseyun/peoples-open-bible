translation:
  language: es
  text: Guarda tus pasos cuando vayas a la casa de Dios[a], y acércate para escuchar[b] en vez de ofrecer el sacrificio de los necios[c], porque no saben que hacen el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Guarda tus pies cuando vayas a la casa de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «para oír» en lugar de «para escuchar».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo literalmente: «pues no saben hacer el mal»; probablemente significa que no se dan cuenta de que su acción es mala.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמֹר
  english_pob_choice: Guard
  chosen_spanish: Guarda
  alternatives_spanish:
  - Cuida
  - Vigila
  lexicon: HALOT
  rationale: El imperativo pide vigilancia cuidadosa; «guarda» conserva el tono admonitorio y suena natural con «tus pasos».
- source_word: רגליך
  english_pob_choice: your steps
  chosen_spanish: tus pasos
  alternatives_spanish:
  - tus pies
  lexicon: HALOT
  rationale: Aunque literalmente es «pies», en este contexto la imagen apunta al modo de aproximarse y conducirse; «pasos» mantiene la concreción sin perder naturalidad.
- source_word: כַּאֲשֶׁר תֵּלֵךְ
  english_pob_choice: when you go
  chosen_spanish: cuando vayas
  alternatives_spanish:
  - mientras vayas
  - cada vez que vayas
  lexicon: HALOT
  rationale: 'El valor temporal es el más natural aquí: la advertencia aplica al momento de ir a la casa de Dios.'
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - la casa de Dios[a]
  - el templo
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea directa. «Templo» sería interpretativo; «casa de Dios» mantiene la forma y el alcance del original.
- source_word: וְקָרוֹב
  english_pob_choice: and draw near
  chosen_spanish: y acércate
  alternatives_spanish:
  - y llega cerca
  - y ven cerca
  lexicon: HALOT
  rationale: La forma exhortativa encaja de manera idiomática con «acércate», que expresa la aproximación reverente al acto de culto.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to listen
  chosen_spanish: para escuchar
  alternatives_spanish:
  - para oír
  lexicon: HALOT
  rationale: «Escuchar» transmite mejor la atención activa y obediente propia de la sabiduría bíblica que el más pasivo «oír».
- source_word: מִתֵּת
  english_pob_choice: rather than to offer
  chosen_spanish: antes que para ofrecer
  alternatives_spanish:
  - más bien que para ofrecer
  - en vez de ofrecer
  lexicon: HALOT
  rationale: Con זבח, נתן funciona en sentido de presentar/ofrecer un sacrificio. «Antes que para ofrecer» preserva la comparación y suena fluido en español.
- source_word: הַכְּסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los necios
  lexicon: HALOT
  rationale: En literatura sapiencial, כְּסִילִים designa a personas moral y espiritualmente torpes, no solo intelectualmente limitadas; «necios» comunica bien ese valor.
- source_word: זָבַח
  english_pob_choice: the sacrifice
  chosen_spanish: el sacrificio
  alternatives_spanish:
  - la ofrenda
  - el sacrificio
  lexicon: HALOT
  rationale: 'Se conserva la construcción definida como clase: el tipo de sacrificio que ofrecen los necios.'
- source_word: כִּי אֵינָם יוֹדְעִים
  english_pob_choice: for they do not know
  chosen_spanish: porque no saben
  alternatives_spanish:
  - porque no conocen
  - pues no saben
  lexicon: HALOT
  rationale: ידע aquí indica falta de conciencia moral/espiritual; «no saben» es cercano al hebreo y suficientemente amplio.
- source_word: לַעֲשׂוֹת רָע
  english_pob_choice: that they are doing evil
  chosen_spanish: que hacen el mal
  alternatives_spanish:
  - que están haciendo el mal
  - que obran mal
  lexicon: HALOT
  rationale: La frase hebrea es comprimida; en español, «que hacen el mal» comunica que no advierten que su acción es mala, sin sobrecargar el aspecto verbal.
theological_decisions:
- issue: Relación entre escuchar y el sacrificio en el culto
  english_pob_reading: The verse critiques unreflective sacrificial worship and prioritizes attentive listening before God, without rejecting sacrifice as such.
  chosen_spanish_reading: El versículo critica el culto sacrificial irreflexivo y pone por delante la escucha atenta delante de Dios, sin rechazar el sacrificio como tal.
  alternative_spanish_readings:
  - El versículo rechaza todo sacrificio
  - El versículo solo contrasta dos formas rituales
  rationale: La estructura contrapone escuchar con el sacrificio de los necios, y la clausula final identifica su acción como mal por ignorancia. La lectura es una crítica sapiencial a la adoración vacía, no una abolición del sacrificio.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Conforme al último pase de revisión, no hubo cambios necesarios; se mantiene alta concordancia con el control cruzado y solo se ajustó el español para una lectura pública natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantuvo «casa de Dios» para conservar la expresión hebrea directa.
  - Se eligió «necios» para כְּסִילִים por coherencia con el registro sapiencial.
  - Se usó «escuchar» y no «oír» para preservar el matiz de atención activa.
  - Se evitó «templo» y «ofrenda» para no introducir interpretaciones no exigidas por el texto.
