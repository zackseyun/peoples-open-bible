translation:
  language: es
  text: Y Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: Y ... habló
  alternatives_spanish:
  - Entonces ... habló
  - Y ... dijo
  lexicon: HALOT
  rationale: El hebreo con waw consecutiva avanza la narración; en español, «Y» conserva ese encadenamiento sin sobreexplicar. «Habló» es más preciso que «dijo» para דָּבַר, porque mantiene el matiz de discurso formal introducido por לֵאמֹר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto del texto hebreo, siguiendo la política del POB de no enmascarar el Tetragrámaton con un título. «Yahvé» es la forma española estable y legible para יְהוָה.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la equivalencia natural y directa para el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español; se mantiene la forma usual de transliteración tradicional para claridad y reconocimiento.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria de habla se conserva con «diciendo», que reproduce bien el valor de infinitivo constructo sin forzar una paráfrasis.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura auditada del POB preserva el nombre divino como nombre propio. En español, «Yahvé» comunica esa misma decisión teológica y textual sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones y fue confirmado con alta concordancia; esta versión española sigue esa misma lectura, manteniendo el nombre divino, la estructura narrativa y la fórmula introductoria de habla sin ampliaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en coherencia con la política terminológica del proyecto.
  - Se usa «Moisés» como nombre propio habitual en español, sin alterar el referente.
  - «Habló ... diciendo» conserva la fórmula bíblica sin añadir contenido interpretativo.
  - La nota al pie explica la alternativa tradicional «el SEÑOR» sin reemplazarla en el texto principal.
