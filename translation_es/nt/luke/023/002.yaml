  text: ἤρξαντο δὲ κατηγορεῖν αὐτοῦ λέγοντες· Τοῦτον εὕραμεν διαστρέφοντα τὸ ἔθνος ⸀ἡμῶν καὶ κωλύοντα ⸂φόρους Καίσαρι⸃ διδόναι ⸀καὶ λέγοντα ⸀αὑτὸν χριστὸν βασιλέα εἶναι.
base_translation:
  language: en
  yaml_path: translation/nt/luke/023/002.yaml
  text: And they began to accuse him[a], saying, “We found this man misleading our nation and forbidding us to pay taxes to Caesar, and saying that he himself is Messiah[c][b], a king.”
