revisions:
- from: Y ahora Yahvé, Dios de Israel, ha desposeído[a] a los amorreos de delante de su pueblo Israel; ¿y tú vas a poseerlo[b]?
  to: Y ahora Yahvé, Dios de Israel, ha despojado[a] a los amorreos de delante de su pueblo Israel; ¿y tú vas a tomar posesión de ella[b]?
  rationale: Se ajusta el verbo principal para que el español exprese con más naturalidad la pérdida de posesión territorial implicada por הוֹרִישׁ, y se explicita el referente femenino territorial del objeto en la pregunta final para evitar ambigüedad. Se conserva 'Yahvé' y la estructura retórica del original.
