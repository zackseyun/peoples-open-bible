translation:
  language: es
  text: 'Y Jesús lo reprendió[a], diciendo: «¡Calla y sal de él!». Y, después de arrojarlo en medio de la gente, el demonio salió de él sin hacerle ningún daño[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «¡Sé amordazado!».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sin haberle hecho ningún daño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: lo reprendió
  alternatives_spanish:
  - lo increpó
  - lo reprendió con severidad
  lexicon: BDAG
  rationale: ἐπιτιμάω expresa reprensión con autoridad; «reprendió» conserva bien ese tono en español y es natural en un contexto de exorcismo.
- source_word: αὐτῷ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: BDAG
  rationale: El referente es el demonio/espíritu inmundo en el contexto inmediato. En español, el objeto directo masculino «lo» evita suavizar la referencia personal del ser espiritual.
- source_word: Φιμώθητι
  english_pob_choice: Be silent
  chosen_spanish: ¡Calla!
  alternatives_spanish:
  - ¡Enmudece!
  - ¡Cállate!
  lexicon: BDAG
  rationale: La idea literal de «ser amordazado» o «enmudecer» está detrás del verbo, pero en español el imperativo breve «¡Calla!» comunica con fuerza la orden directa y permite conservar la nota de alternativa literal.
- source_word: ἔξελθε ἀπ’ αὐτοῦ
  english_pob_choice: come out of him
  chosen_spanish: sal de él
  alternatives_spanish:
  - sal de su interior
  - sal de él fuera
  lexicon: BDAG
  rationale: «Salir de él» reproduce con naturalidad la orden exorcística y mantiene la dirección del movimiento sin añadir explicaciones no presentes.
- source_word: ῥίψαν αὐτὸν
  english_pob_choice: after throwing him
  chosen_spanish: después de arrojarlo
  alternatives_spanish:
  - habiéndolo arrojado
  - tras arrojarlo
  lexicon: BDAG
  rationale: El participio aoristo acompaña la acción principal; «después de arrojarlo» comunica bien la secuencia sin sobrecargar la sintaxis.
- source_word: εἰς τὸ μέσον
  english_pob_choice: into the midst
  chosen_spanish: en medio
  alternatives_spanish:
  - al medio
  - en el centro
  lexicon: BDAG
  rationale: «En medio» es la equivalencia más idiomática en español y conserva la imagen de exposición pública o centralidad implícita en la frase.
- source_word: τὸ δαιμόνιον
  english_pob_choice: the demon
  chosen_spanish: el demonio
  alternatives_spanish:
  - el espíritu inmundo
  - el espíritu demoníaco
  lexicon: BDAG
  rationale: δαιμόνιον se traduce directamente por «demonio»; aunque el contexto habla de un espíritu inmundo, aquí el sustantivo es el más preciso y directo.
- source_word: μηδὲν βλάψαν αὐτόν
  english_pob_choice: without harming him at all
  chosen_spanish: sin dañarlo en nada
  alternatives_spanish:
  - sin hacerle ningún daño
  - sin herirlo en absoluto
  lexicon: BDAG
  rationale: La frase participial resalta que no sufrió perjuicio alguno. «Sin dañarlo en nada» es fiel, breve y mantiene el énfasis total de μηδέν.
theological_decisions:
- issue: Naturaleza del ser expulsado en un exorcismo
  english_pob_reading: Render as 'demon' and preserve the text's presentation of a personal evil spirit being directly addressed by Jesus.
  chosen_spanish_reading: Traducir como «demonio» y mantener la escena como la expulsión de un ser espiritual personal, directamente reprendido por Jesús.
  alternative_spanish_readings:
  - espíritu maligno
  - fuerza maligna
  rationale: El griego presenta una interacción personal, con mandato directo y salida del ser. No conviene despersonalizar el episodio, porque eso reduciría lo que el texto afirma.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió una formulación más natural para la cláusula final sin cambiar el sentido. En español se reflejó ese mismo equilibrio: fidelidad al participio aoristo y claridad idiomática en «sin dañarlo en nada».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no lo contiene.
  - Se eligió «demonio» en coherencia con el término griego δαιμόνιον y con el audit trail inglés.
  - Se mantuvo un tono sobrio y publicable, sin añadir glosas explicativas al texto principal.
  - Los marcadores de nota [a] y [b] están colocados solo donde la alternativa literal aporta valor textual.
