translation:
  language: es
  text: Se confabulan[a] contra la vida del justo, y condenan la sangre inocente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se agrupan en banda contra la vida del justo».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «y la sangre inocente condenan» o «declaran culpable».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגוֹדּוּ
  english_pob_choice: band together
  chosen_spanish: Se juntan
  alternatives_spanish:
  - se agrupan
  - se confabulan
  - se alían
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar reunirse en banda o actuar concertadamente contra alguien. En español, "se juntan" comunica la acción colectiva y hostil sin añadir un matiz militar más fuerte de lo que exige el texto.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: HALOT
  rationale: Con un verbo hostil, el valor relacional de עַל se expresa naturalmente con "contra".
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - persona
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ apunta a la vida amenazada del justo. "Vida" conserva el sentido concreto y evita espiritualizar indebidamente el término.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: del justo
  alternatives_spanish:
  - del hombre justo
  - del justo y recto
  - de la persona justa
  lexicon: HALOT
  rationale: El hebreo usa un singular adjetival sustantivado con valor representativo. "Del justo" mantiene esa forma breve y general sin introducir una especificación masculina innecesaria.
- source_word: דָם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  - sangre inocente
  lexicon: HALOT
  rationale: El hebreo es literalmente "sangre". En español, "condenar sangre inocente" conserva la imagen forense y violenta del original.
- source_word: נָקִי
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin culpa
  - sin delito
  - inocente de culpa
  lexicon: HALOT
  rationale: '"Inocente" es la equivalencia más directa y natural en la expresión "sangre inocente".'
- source_word: יַרְשִׁיעוּ
  english_pob_choice: condemn
  chosen_spanish: condenan
  alternatives_spanish:
  - declaran culpable
  - juzgan culpable
  - sentencian
  lexicon: HALOT
  rationale: 'El hifil de רשע tiene fuerza forense: tratar como culpable o declarar culpable. "Condenan" comunica bien ese juicio injusto en español y encaja con el paralelo del verso.'
theological_decisions:
- issue: Singular representativo en צַדִּיק
  english_pob_reading: the righteous
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - la persona justa
  - los justos
  rationale: El hebreo singular funciona de modo representativo o genérico. Mantener "el justo" preserva esa estructura sin convertirla en plural ni ampliar el referente más allá de lo que el verso dice.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (gender-accurate over gender-neutral)
- issue: Forense en יַרְשִׁיעוּ con objeto "sangre inocente"
  english_pob_reading: they condemn innocent blood
  chosen_spanish_reading: condenan sangre inocente
  alternative_spanish_readings:
  - declaran culpable sangre inocente
  - sentencian sangre inocente
  rationale: 'El paralelo hebreo es judicial y violentamente irónico: la sangre inocente es tratada como culpable. "Condenan" conserva esa dimensión forense sin añadir una formulación más interpretativa que el texto no exige.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2 (lexical transparency)
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el audit trail inglés y no requiere revisión adicional: la elección española sigue el mismo perfil óptimo-equivalente, conservando el paralelismo hostil y forense del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo "justo" para צַדִּיק, en línea con el valor sustantivado singular del hebreo.
  - Se tradujo נֶפֶשׁ como "vida" por su sentido concreto en este contexto.
  - Se preservó la imagen de "sangre inocente" y el matiz judicial de יַרְשִׁיעוּ con "condenan".
  - Se evitó "SEÑOR" o lenguaje de sustitución nominal, pues no aparece el Tetragrámaton en este verso.
