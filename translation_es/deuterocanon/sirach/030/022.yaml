translation:
  language: es
  text: El gozo del corazón es vida para el hombre, y el regocijo del varón prolonga sus días.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo conservado para este versículo es difícil y difiere notablemente del paralelo griego. Aquí se sigue el sentido claro del griego: “El gozo del corazón es vida para el hombre, y el regocijo de un varón prolonga sus días.”'
    reason: textual_variant
lexical_decisions:
- source_word: εὐφροσύνη καρδίας
  english_pob_choice: gladness of heart
  chosen_spanish: el gozo del corazón
  alternatives_spanish:
  - la alegría del corazón
  - el regocijo del corazón
  lexicon: LSJ
  rationale: La combinación griega expresa una alegría interior o estado de contentamiento del corazón. "Gozo" suena natural en español bíblico y conserva el matiz afectivo sin endurecer el registro.
- source_word: ζωὴ ἀνθρώπου
  english_pob_choice: is a man's life
  chosen_spanish: es vida para el hombre
  alternatives_spanish:
  - es la vida de un hombre
  - es vida humana
  lexicon: LSJ
  rationale: El griego presenta una afirmación breve de valor general. "Vida para el hombre" transmite el sentido sentencioso y mantiene el alcance representativo del singular.
- source_word: ἀγαλλίαμα
  english_pob_choice: rejoicing
  chosen_spanish: el regocijo
  alternatives_spanish:
  - la exultación
  - el júbilo
  lexicon: LSJ
  rationale: '"Regocijo" reproduce bien el carácter activo y expresivo del sustantivo griego, y encaja con el paralelismo poético del verso.'
- source_word: ἀνδρὸς
  english_pob_choice: a man's
  chosen_spanish: del varón
  alternatives_spanish:
  - del hombre
  - de un hombre
  lexicon: LSJ
  rationale: '"Varón" conserva el singular masculino del griego ἀνδρός sin volverlo genérico en exceso. En este contexto poético funciona como equivalente digno de ἀνήρ/ἀνδρός.'
- source_word: μακροημέρευσις
  english_pob_choice: prolongs his days
  chosen_spanish: prolonga sus días
  alternatives_spanish:
  - alarga sus días
  - le añade días
  lexicon: LSJ
  rationale: La idea idiomática es la de vida prolongada. "Prolonga sus días" es una equivalencia española clara y bíblicamente reconocible, sin perder la relación causal del paralelismo.
theological_decisions:
- issue: Divergencia entre la tradición hebrea transmitida y el paralelo griego
  english_pob_reading: Translate the verse according to the Greek sense, while acknowledging the Hebrew witness is difficult and does not yield the same clear wording.
  chosen_spanish_reading: Seguir el sentido griego, pues el testimonio hebreo conservado es difícil y no ofrece una lectura clara equivalente.
  alternative_spanish_readings:
  - Una traducción literal del hebreo conservado sería muy incierta.
  - Traducir según el hebreo produciría un texto probablemente engañoso para este versículo.
  rationale: El texto griego de la paráfrasis sapiencial ofrece un proverbio coherente y completo, mientras que el hebreo conservado en el expediente no corresponde claramente a ese sentido. En un draft español auditable, es mejor hacer visible la base griega y no fingir una concordancia que el expediente no respalda.
  doctrine_reference: 'PHILOSOPHY.md: use the Greek parallel as actual translation input when the Hebrew witness is difficult, and preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: El expediente de revisión muestra que existió una propuesta previa basada en una lectura hebrea ajena al sentido del paralelo griego, pero el contexto auditado más sólido para este versículo es la tradición griega de Sirácida 30:22. Por eso el español final sigue el proverbio griego y deja constancia de la divergencia textual en una nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé en la tradición POB, pero este versículo no contiene el nombre divino en el texto griego seguido aquí.
  - Se evitó "Cristo/Mesías" porque no corresponde al contenido del versículo.
  - 'Se conservó la estructura poética binaria del griego: afirmación sobre el corazón / afirmación sobre el regocijo y la duración de la vida.'
