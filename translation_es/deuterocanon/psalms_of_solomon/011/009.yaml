translation:
  language: es
  text: Que Yahvé haga lo que ha hablado acerca de Israel y de Jerusalén[a]; que Yahvé levante a Israel en el nombre de su gloria[b]. Sea la misericordia de Yahvé sobre Israel por siempre y para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cumpla lo que ha hablado acerca de Israel y de Jerusalén».
    reason: lexical_alternative
  - marker: b
    text: O «restaure a Israel».
    reason: alternative_reading
  - marker: c
    text: Lit. «por siempre y aún»; la frase intensifica la idea de duración continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσαι
  english_pob_choice: do
  chosen_spanish: haga
  alternatives_spanish:
  - cumpla
  - realice
  lexicon: LSJ
  rationale: 'El optativo aoristo expresa un deseo o súplica: en español, «que Yahvé haga» conserva ese valor benedictivo sin forzar una paráfrasis. «Cumpla» sería posible, pero ya interpreta el verbo hacia la idea de cumplimiento profético.'
- source_word: ἐλάλησεν ἐπὶ
  english_pob_choice: has spoken concerning
  chosen_spanish: ha hablado acerca de
  alternatives_spanish:
  - ha hablado sobre
  - ha declarado respecto de
  lexicon: LSJ
  rationale: Con ἐπί y acusativo, el sentido es referencial respecto de Israel y Jerusalén. «Acerca de» reproduce bien esa referencia en español sin introducir un matiz más técnico de proclamación profética.
- source_word: ἀναστήσαι
  english_pob_choice: raise up
  chosen_spanish: levante
  alternatives_spanish:
  - restaure
  - alce
  lexicon: LSJ
  rationale: «Levante» mantiene la imagen verbal de elevar/poner en pie y deja abierta la amplitud semántica de restaurar, vindicar o reconstituir. Se evita estrechar el sentido a una sola lectura interpretativa.
- source_word: ἐν ὀνόματι δόξης αὐτοῦ
  english_pob_choice: in the name of his glory
  chosen_spanish: en el nombre de su gloria
  alternatives_spanish:
  - por el nombre glorioso de él
  - por causa de su nombre glorioso
  lexicon: LSJ
  rationale: Se conserva la estructura comprimida del griego con «nombre» y «gloria» ambos presentes. «En el nombre de su gloria» suena natural en español y preserva la densidad retórica del original.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - clemencia
  lexicon: LSJ
  rationale: «Misericordia» es el equivalente más transparente y reverente en español bíblico. Mantiene el valor general del término sin añadir una especificación pactual que el griego aquí no explicita.
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y aún más
  alternatives_spanish:
  - por los siglos y todavía
  - para siempre y aún
  lexicon: LSJ
  rationale: La fórmula griega intensifica «para siempre» con «y aún/más». «Por siempre y aún más» recoge ese incremento y también conserva el eco retórico del cierre repetido en la sección inmediata. Se evita una formulación excesivamente litúrgica que borre el matiz de continuación adicional.
theological_decisions:
- issue: Sentido de que Israel sea «levantado»
  english_pob_reading: Kept as 'raise up' without specifying resurrection or merely political restoration.
  chosen_spanish_reading: Se mantiene «levante a Israel» sin cerrar el sentido en resurrección ni en restauración política.
  alternative_spanish_readings:
  - restaure a Israel
  - reestablezca a Israel
  rationale: El griego permite una amplitud teológica que puede incluir restauración, vindicación o elevación. La traducción española conserva esa tensión en lugar de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica cuando el texto fuente no obliga a una sola interpretación.
translation_notes:
  revision_awareness: La decisión final inglesa revisó la clausula temporal varias veces y terminó en «forever and ever» por ser más natural y por mantener el eco retórico del griego. En español, «por siempre y aún más» busca reflejar ese cierre intensificado sin perder la repetición enfática del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio POB para el nombre divino, en lugar de una sustitución por «Señor» que ocultaría la forma subyacente.
  - «Mesías» no aparece en este verso; no se requiere decisión de equivalencia adicional.
  - «Misericordia» traduce ἔλεος de forma estándar y coherente con el resto del proyecto.
  - La puntuación mantiene dos miembros benedictivos y una clausula final de bendición, siguiendo la cadencia del griego.
