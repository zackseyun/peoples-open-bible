  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Descendencia', 'descendientes', 'de tu cuerpo', 'destruido' y 'de delante de mí' son opciones fieles y naturales. 'Su nombre' funciona bien en español para conservar la ambigüedad del singular hebreo con referente colectivo.
  issues:
