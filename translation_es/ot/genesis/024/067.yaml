translation:
  language: es
  text: E Isaac la llevó[a] a la tienda de Sara, su madre, y tomó a Rebeca, y ella llegó a ser su esposa, y la amó. Así Isaac fue consolado[b] después de la muerte de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la tienda de su madre Sara». El orden de las palabras en hebreo permite ambas formulaciones, con el mismo sentido básico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «después de su madre». El sentido es después de la pérdida o muerte de su madre, aunque «muerte» no se expresa explícitamente en hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִאֶהָ
  english_pob_choice: brought her
  chosen_spanish: la llevó
  alternatives_spanish:
  - la trajo
  - la condujo
  lexicon: HALOT
  rationale: El causativo de בוא expresa hacer entrar o llevar a un lugar. En español, «la llevó» comunica con naturalidad la acción de introducirla en la tienda sin forzar un calco.
- source_word: הָאֹהֱלָה
  english_pob_choice: into the tent
  chosen_spanish: a la tienda
  alternatives_spanish:
  - dentro de la tienda
  - a la carpa
  lexicon: HALOT
  rationale: El he direccional marca movimiento hacia el lugar. «A la tienda» preserva el sentido direccional de entrada con español fluido; «tienda» mantiene la referencia concreta del texto hebreo.
- source_word: שָׂרָה אִמּוֹ
  english_pob_choice: of Sarah his mother
  chosen_spanish: de Sara, su madre
  alternatives_spanish:
  - de Sara su madre
  - de Sara, la madre de él
  lexicon: HALOT
  rationale: La construcción en aposición identifica la tienda con Sara, madre de Isaac. Se conserva la relación posesiva sin añadir explicaciones. El nombre se adapta a la forma habitual en español bíblico como «Sara».
- source_word: וַיִּקַּח אֶת־רִבְקָה
  english_pob_choice: he took Rebekah
  chosen_spanish: tomó a Rebeca
  alternatives_spanish:
  - tomó Rebeca
  - desposó a Rebeca
  lexicon: HALOT
  rationale: לקח significa literalmente «tomar». Se mantiene ese verbo para no absorber de antemano el matiz matrimonial que el versículo siguiente expresa explícitamente con la cláusula de esposa.
- source_word: וַתְּהִי לוֹ לְאִשָּׁה
  english_pob_choice: she became his wife
  chosen_spanish: ella vino a ser su esposa
  alternatives_spanish:
  - ella llegó a ser su esposa
  - se convirtió en su esposa
  lexicon: HALOT
  rationale: El hebreo describe un cambio de estado mediante היה + ל + אשה. «Vino a ser» conserva bien el movimiento narrativo y evita una formulación demasiado estática.
- source_word: וַיֶּאֱהָבֶהָ
  english_pob_choice: he loved her
  chosen_spanish: la amó
  alternatives_spanish:
  - la quiso
  - la amaba
  lexicon: HALOT
  rationale: אהב se traduce de forma directa como «amar». El pretérito simple funciona bien en narración histórica y preserva la secuencia del relato.
- source_word: וַיִּנָּחֵם
  english_pob_choice: was comforted
  chosen_spanish: fue consolado
  alternatives_spanish:
  - recibió consuelo
  - se consoló
  lexicon: HALOT
  rationale: El nifal de נחם aquí expresa recibir consuelo, no arrepentirse. «Fue consolado» conserva la pasividad del hebreo y la conexión con el consuelo recibido tras la pérdida.
- source_word: אַחֲרֵי אִמּוֹ
  english_pob_choice: after his mother
  chosen_spanish: después de su madre
  alternatives_spanish:
  - después de la muerte de su madre
  - tras su madre
  lexicon: HALOT
  rationale: אַחֲרֵי significa «después de». El inglés POB explicó que el sentido es posterior a la pérdida/muerte de su madre, aunque el hebreo no lo dice explícitamente; por eso el texto principal conserva la expresión breve y la nota aclara la implicación contextual.
theological_decisions:
- issue: Relación entre el consuelo de Isaac y la muerte implícita de Sara
  english_pob_reading: The sense is after the loss/death of his mother, though 'death' is not stated explicitly in Hebrew.
  chosen_spanish_reading: Isaac fue consolado después de su madre, con la nota de que el sentido contextual es después de la muerte/pérdida de su madre.
  alternative_spanish_readings:
  - Isaac fue consolado después de la muerte de su madre
  - Isaac fue consolado tras la pérdida de su madre
  rationale: La redacción principal no añade una palabra que el hebreo omite, pero tampoco deja la frase en español con un sentido demasiado enigmático. La nota preserva la tensión textual señalada por el POB en inglés.
  doctrine_reference: Cuidado de la precisión textual; no aplica una doctrina específica.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en la última pasada para aclarar que אַחֲרֵי אִמּוֹ se entiende como «after his mother's death» aunque no se diga explícitamente. En español se mantiene el dato sobrio del hebreo en el cuerpo del texto y se explicita la implicación en nota, para respetar tanto la literalidad como la claridad contextual.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se conserva la distinción entre el acto de «tomó» y la cláusula separada «vino a ser su esposa», siguiendo la estructura hebrea y la decisión inglesa de no fusionarlas.
  - «Sara» y «Rebeca» siguen la forma habitual en español bíblico, sin alterar el referente original.
  - Se mantiene el estilo narrativo en pretérito simple, adecuado para el hebreo waw consecutivo en español bíblico contemporáneo.
