theological_decisions:
- issue: Nature of the listed observances
  chosen_reading: The verse refers to Israel's cultic/religious celebrations being terminated in judgment.
  alternative_readings:
  - The list could be read more broadly as all occasions of social joy, not only formal worship observances.
  rationale: The sequence 'feasts, new moons, Sabbaths, and all appointed festivals' is standard cultic calendar language, so the translation reflects religious observances while retaining the broader heading 'all her rejoicing.'
