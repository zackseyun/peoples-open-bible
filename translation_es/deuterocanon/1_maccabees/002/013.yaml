review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido básico del griego ἵνα τί ἡμῖν ἔτι ζῇν; como pregunta idiomática de lamento sobre seguir con vida. Sin embargo, «hemos de seguir viviendo» introduce un matiz de obligación/deber más fuerte de lo necesario para ἵνα τί ... ζῇν y se aleja ligeramente del lamento simple que preserva el inglés POB.
  spanish_quality_summary: El español es claro y natural, pero «¿Por qué hemos de seguir viviendo?» suena algo más normativo o deliberativo que lamentativo. Una formulación como «¿Por qué hemos de vivir todavía?» conserva mejor el valor de ἔτι con un equivalente explícito y evita que «seguir viviendo» absorba tanto el sentido de continuidad como el matiz modal.
  glossary_alignment: 'No hay términos del glosario mayor implicados. La decisión principal es idiomática: preservar la pregunta de lamento sin añadir una noción excesiva de obligación. La nota alternativa debe sonar natural en español y no calcar de forma extraña «nos es vivir».'
  issues:
  - severity: medium
    issue: «hemos de» añade un matiz de obligación algo marcado
    rationale: El griego expresa una pregunta idiomática de lamento ('¿por qué vivir todavía?'), no primariamente una obligación moral o deber. «Hemos de» puede tolerarse, pero aquí endurece innecesariamente el tono.
  - severity: medium
    issue: La nota al pie alternativa es demasiado calcada y poco idiomática
    rationale: «¿Por qué nos es aún vivir?» no es español natural ni digno de una nota explicativa. La nota debe explicar la literalidad/formalidad sin producir una frase prácticamente inusable.
  - severity: low
    issue: «seguir viviendo» hace implícito ἔτι, pero puede sobreinterpretar la continuidad
    rationale: Es una opción posible, pero dado que el inglés POB preserva 'still', en español «todavía» o «aún» mantiene mejor la correspondencia y la sencillez del original.
  revised_spanish_text: ¿Por qué hemos de vivir todavía?[a]
  revised_footnotes:
