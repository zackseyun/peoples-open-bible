translation:
  language: es
  text: 'Y para la tribu de los hijos de Efraín[a], un jefe: Kemuel hijo de Shiphtan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Efraín»; es decir, los miembros o descendientes de la tribu de Efraín.'
