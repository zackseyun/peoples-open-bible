translation:
  language: es
  text: Y encerró a todos los judíos para el espectáculo[a], y, irrumpiendo en la ciudad con armas, ocasionó una considerable matanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al festival» o «al espectáculo público»; el griego θεωρία puede designar una ocasión de observación pública o un festival-espectáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρίαν
  english_pob_choice: the spectacle
  chosen_spanish: el espectáculo
  alternatives_spanish:
  - la vista
  - el festival
  - el espectáculo público
  lexicon: LSJ
  rationale: El contexto requiere una reunión pública o exhibición; «espectáculo» conserva el matiz de acto público visible sin reducirlo a una mera «vista», y sigue de cerca la decisión auditada en inglés.
- source_word: συνεκέκλεισεν
  english_pob_choice: confined
  chosen_spanish: encerró
  alternatives_spanish:
  - confinó
  - cerró dentro
  - aprisionó
  lexicon: LSJ
  rationale: El verbo expresa la acción de meter o retener por la fuerza. «Encerró» es natural en español y mantiene la coerción del griego.
- source_word: εἰσδραμὼν
  english_pob_choice: rushing into
  chosen_spanish: irrumpiendo en
  alternatives_spanish:
  - entrando precipitadamente en
  - corriendo hacia dentro de
  - arremetiendo en
  lexicon: LSJ
  rationale: La forma participial señala una entrada rápida y violenta; «irrumpiendo» comunica mejor ese impulso agresivo que un simple «entrando».
- source_word: σὺν τοῖς ὅπλοις
  english_pob_choice: with weapons
  chosen_spanish: con armas
  alternatives_spanish:
  - armado
  - con sus armas
  - portando armas
  lexicon: LSJ
  rationale: El griego menciona explícitamente las armas; «con armas» preserva esa concreción mejor que una paráfrasis más general como «armado».
- source_word: ἱκανὰ πλήθη / κατέστησεν πλήθη
  english_pob_choice: caused a considerable slaughter
  chosen_spanish: ocasionó una considerable matanza
  alternatives_spanish:
  - causó una gran matanza
  - produjo una considerable matanza
  - hizo caer a muchos
  lexicon: LSJ
  rationale: La construcción compacta del griego apunta a una matanza masiva causada por la irrupción armada. «Ocasionó una considerable matanza» conserva el resultado violento sin añadir elementos no presentes.
translation_notes:
  revision_awareness: La redacción sigue la lectura inglesa revisada que prefiere «caused a considerable slaughter» frente a formulaciones más literales o menos naturales, pero vuelve al griego para mantener la fuerza compacta de πλήθη y el carácter violento de εἰσδραμὼν σὺν τοῖς ὅπλοις.
  spanish_consistency_notes:
  - Se usó «judíos» en minúscula por tratarse del etnónimo común en español bíblico narrativo.
  - «Espectáculo» se mantiene en el cuerpo con nota alternativa porque el griego admite varias matizaciones léxicas y el audit trail en inglés preservó esa ambigüedad.
  - No se introdujo lenguaje interpretativo adicional sobre el evento; la frase final se limita a expresar el resultado violento que el griego da de forma comprimida.
