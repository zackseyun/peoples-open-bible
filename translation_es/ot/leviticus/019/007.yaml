translation:
  language: es
  text: Pero si se come al tercer día[a], es una cosa contaminada[b]; no será aceptada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «en el tercer día». La frase hebrea marca el día en que ocurre el consumo; en español, «al tercer día» suena más natural en este contexto.
    reason: alternative_rendering
  - marker: b
    text: O «impura» o «manchada». El término hebreo se refiere a carne sacrificial vuelta inaceptable por comerse después del tiempo permitido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción condicional aquí introduce una restricción en contraste con la instrucción anterior; «Pero si» conserva el matiz adversativo sin perder la fuerza condicional.
- source_word: הֵאָכֹל יֵאָכֵל
  english_pob_choice: it is eaten at all
  chosen_spanish: se come
  alternatives_spanish:
  - se llegara a comer
  - se come en absoluto
  - es comido
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la acción. En español, la forma simple «se come» transmite de manera natural que el caso supuesto es que efectivamente sea ingerido, sin sobrecargar la frase.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: en el tercer día
  alternatives_spanish:
  - al tercer día
  - en día tercero
  lexicon: HALOT
  rationale: La expresión temporal se mantiene directa y precisa. «En el tercer día» es clara y fiel al hebreo.
- source_word: פִּגּוּל
  english_pob_choice: a defiled thing
  chosen_spanish: cosa profanada
  alternatives_spanish:
  - cosa contaminada
  - cosa impura
  - cosa abominable
  lexicon: HALOT
  rationale: El término apunta a un estado ritual de invalidez o profanación del sacrificio, no simplemente a suciedad física ni a una categoría moral más amplia. «Cosa profanada» conserva la fuerza cultual y la descalificación ritual que el contexto exige.
- source_word: לֹא יֵרָצֶה
  english_pob_choice: it will not be accepted
  chosen_spanish: no será aceptada
  alternatives_spanish:
  - no será recibida
  - no agradará
  - no será aprobada
  lexicon: HALOT
  rationale: El nifal de רצה en contexto sacrificial expresa aceptación ante Dios. «No será aceptada» es la equivalencia española más clara y conserva el sentido cultual del pasaje.
theological_decisions:
- issue: Estado ritual de la ofrenda comida al tercer día
  english_pob_reading: The verse declares such meat ritually unacceptable rather than making a broader moral-metaphysical statement.
  chosen_spanish_reading: El versículo declara que la ofrenda queda ritual/cultualmente descalificada, no que describa una corrupción moral absoluta.
  alternative_spanish_readings:
  - La carne está simplemente dañada o echada a perder
  - Se trata de una abominación en sentido total
  rationale: El contexto inmediato es sacrificial. La última cláusula interpreta el término como algo que no es aceptable ante Yahvé. Por eso se preserva el valor cultual de la descalificación sin ampliarlo indebidamente.
  doctrine_reference: Principio de primacía del idioma original; conservar la tensión teológica sin resolverla por paráfrasis
- issue: Traducción de פִגּוּל sin neutralizar la tensión lexical
  english_pob_reading: The term refers to sacrificial meat rendered unacceptable by being eaten beyond the permitted time.
  chosen_spanish_reading: «Cosa profanada» mantiene el matiz de algo sacrificialmente invalidado por haber sido comido fuera del tiempo permitido.
  alternative_spanish_readings:
  - cosa impura
  - cosa contaminada
  - ofrenda inválida
  rationale: En español, «profanada» comunica mejor la pérdida de carácter sagrado en el marco levítico y evita reducir el término a solo impureza higiénica o a una valoración moral genérica.
  doctrine_reference: Lectura cultual de Levítico; respeto al campo semántico de pureza/profanación
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó 'an offensive thing' a 'a defiled thing' para reflejar mejor פִּגּוּל. La versión española adopta una solución equivalente en registro cultual («cosa profanada») y conserva la cláusula final de aceptación negativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con el estándar español del proyecto.
  - Se mantiene un registro bíblico moderno y sobrio, evitando calcos excesivos.
  - Se conserva el sentido sacrificial de aceptación/rechazo cultual en vez de moralizar el texto.
