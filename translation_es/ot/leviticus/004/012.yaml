review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia básica del hebreo: sacar/llevar todo el toro fuera del campamento, a un lugar limpio, al sitio de cenizas, y quemarlo allí. Sin embargo, hay pequeños problemas de fidelidad léxica y naturalidad: «Traerá» debilita el matiz de sacar/llevar hacia afuera de וְהוֹצִיא; «montón de ceniza» suena poco natural y en singular pierde idiomaticidad frente a «montón de cenizas» o una expresión de sitio de depósito; y la nota b tiene comillas y puntuación poco cuidadas. La repetición final del lugar sí debe mantenerse.'
  spanish_quality_summary: El español es generalmente claro, pero «Traerá todo el toro fuera del campamento» suena menos natural que «Sacará» o «Llevará ... fuera del campamento». «Montón de ceniza» resulta extraño en español general; «montón de cenizas» es más idiomático. También conviene pulir la puntuación y estilo de la nota b. El resto mantiene un tono digno y legible.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Lugar limpio» refleja bien מָקוֹם טָהוֹר con nota ritual. La expresión para שֶׁפֶךְ הַדֶּשֶׁן debe sonar más natural en español sin perder la idea de sitio designado de desecho; «montón de cenizas» funciona mejor que «montón de ceniza».
  issues:
  - severity: medium
    issue: «Traerá» para וְהוֹצִיא
    rationale: El hiphil de יצא aquí expresa sacar/llevar fuera. «Traerá» en español no comunica con la misma claridad el movimiento de extracción hacia fuera del campamento.
  - severity: medium
    issue: «montón de ceniza» es poco idiomático
    rationale: Aunque intenta seguir «ash heap», en español natural se dice «montón de cenizas». La forma singular suena extraña y reduce la legibilidad.
  - severity: low
    issue: Nota b con formato deficiente
    rationale: Empieza con una comilla simple innecesaria y puede redactarse con español más limpio y natural.
  revised_spanish_text: Sacará todo el toro fuera del campamento, a un lugar limpio[a], al montón de cenizas[b]; lo quemará sobre madera con fuego; será quemado sobre el montón de cenizas.
  revised_footnotes:
  - marker: a
    text: O, más explícitamente, «un lugar ritualmente limpio».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el lugar donde se vierten las cenizas»; es decir, un lugar designado para desechar las cenizas del altar.'
    reason: lexical_alternative
