  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: pregunta retórica, matiz de contienda con ריב, acusación colectiva, rebelión contra Yahvé, y preserva el nombre divino como «Yahvé». Sin embargo, la forma verbal «contendéis» desentona con «ustedes» y con el registro meta indicado; además, las notas a pie están cruzadas respecto de los marcadores del inglés auditado y conviene anclarlas al término correspondiente en español.'
  spanish_quality_summary: La redacción es clara y fiel, pero mezcla voseo/castellano peninsular («contendéis») con «ustedes», lo que afecta la naturalidad en español neutro latinoamericano. «Todos ustedes» es aceptable, aunque «todos ustedes» + «se han rebelado» funciona mejor con «contienden» o «disputan». «Dice Yahvé» es entendible, pero «declara Yahvé» mantiene mejor la dignidad formulaica de נְאֻם.
  glossary_alignment: Correcto en «Yahvé» para יְהוָה y en «se han rebelado» para פשע, preservando la fuerza covenantal. No hay conflicto terminológico mayor; la principal corrección es de registro y anclaje de notas.
  issues:
