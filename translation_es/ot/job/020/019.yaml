    issue: «Ha arrebatado» podría también haberse expresado como «ha despojado/ha robado»
    rationale: No es un error. «Arrebatado» transmite bien la idea de tomar por fuerza, aunque algunos lectores podrían asociarlo más con un acto súbito que con despojo estable de propiedad. La opción actual sigue siendo fiel y natural.
