base_translation:
  language: en
  yaml_path: translation/ot/1_kings/003/006.yaml
  text: And Solomon said[a], “You have shown great covenant faithfulness to your servant David my father, because he walked before you in faithfulness, in righteousness, and in uprightness of heart with you; and you have kept for him this great covenant faithfulness and have given him a son sitting on his throne[c][b], as it is this day.”
  footnotes:
