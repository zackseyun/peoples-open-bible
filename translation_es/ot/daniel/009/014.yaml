revisions:
- from: Así que Yahvé estuvo atento al desastre y lo trajo sobre nosotros, porque Yahvé nuestro Dios es justo en todas las obras que ha hecho, y no hemos escuchado su voz.
  to: Entonces Yahvé estuvo atento a la calamidad[a][b] y la trajo sobre nosotros, porque Yahvé nuestro Dios es justo en todas las obras que ha hecho, y no hemos escuchado[c] su voz.
  rationale: Se ajusta el texto para mejorar la fidelidad al referente femenino de הָרָעָה mediante «la calamidad ... la trajo», se reemplaza «Así que» por «Entonces» para evitar una inferencia añadida, y se incorporan notas léxicas que preservan las alternativas y matices documentados en la auditoría inglesa sin sobrecargar el texto principal.
