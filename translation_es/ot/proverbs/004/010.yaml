translation:
  language: es
  text: Escucha[a], hijo mío, y recibe mis palabras[b], y los años de tu vida serán muchos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Escucha, hijo mío’.
    reason: lexical_alternative
  - marker: b
    text: O ‘y toma mis palabras’.
    reason: lexical_alternative
  - marker: c
    text: O ‘los años de tu vida aumentarán’ o ‘se multiplicarán’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Oye con atención
  lexicon: HALOT
  rationale: El imperativo 2ms de שמע pide atención receptiva. "Escucha" conserva la dimensión auditiva y la idea sapiencial de atender obedeciendo, sin endurecer el verso con un calco como "oye".
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: La vocativa masculina singular se expresa de modo natural en español con "hijo mío". Mantiene el tono paternal de Proverbios y evita la rareza de un posesivo previo a un sustantivo vocativo.
- source_word: וְקַח
  english_pob_choice: and receive
  chosen_spanish: y recibe
  alternatives_spanish:
  - y toma
  - y acepta
  lexicon: HALOT
  rationale: לקח en este contexto pide una recepción activa de la instrucción. "Recibe" comunica bien la incorporación obediente de las palabras, y evita la ambigüedad de "toma" en español contemporáneo.
- source_word: אֲמָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis dichos sapienciales
  lexicon: HALOT
  rationale: El plural con sufijo de primera persona se vierte de manera directa como "mis palabras". Es natural en español y suficientemente cercano al campo semántico de אמר sin introducir una expansión innecesaria.
- source_word: וְיִרְבּוּ
  english_pob_choice: will be many
  chosen_spanish: serán muchos
  alternatives_spanish:
  - se multiplicarán
  - aumentarán
  lexicon: HALOT
  rationale: El imperfecto plural con sujeto "años" expresa abundancia futura. "Serán muchos" reproduce el sentido resultativo de manera idiomática en español; "se multiplicarán" es más literal pero menos natural.
- source_word: לְךָ
  english_pob_choice: of your life
  chosen_spanish: de tu vida
  alternatives_spanish:
  - para ti
  - para tu vida
  lexicon: HALOT
  rationale: 'La preposición con pronombre marca beneficio/posesión respecto de los años. En español se integra naturalmente con el sintagma siguiente: "los años de tu vida", evitando un calco duro como "para ti".'
- source_word: שְׁנוֹת חַיִּים
  english_pob_choice: the years of your life
  chosen_spanish: los años de tu vida
  alternatives_spanish:
  - años de vida
  - años vitales
  lexicon: HALOT
  rationale: La construcción de estado constructo significa "años de vida". Dado el לְךָ precedente, la forma plena "los años de tu vida" expresa con claridad y fidelidad la relación posesiva/benefactiva.
theological_decisions:
- issue: Forma de la exhortación sapiencial y referencia masculina
  english_pob_reading: my son
  chosen_spanish_reading: hijo mío
  alternative_spanish_readings:
  - mi hijo
  - hijo
  rationale: El hebreo es masculino singular y Proverbios conserva una instrucción paterna típica. "Hijo mío" mantiene ese marco literario y evita neutralizarlo sin base textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El examen comparado con la versión inglesa POB muestra alta concordancia y no requiere cambios sustantivos. Se preserva el paralelismo del verso, la fuerza imperativa de שמע, el valor receptivo de לקח y la cláusula final como afirmación de abundancia futura.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico natural y contemporáneo, sin arcaísmos innecesarios.
  - Se conserva la referencia masculina singular del vocativo sapiencial.
  - Se evita el uso de ‘Señor’ o equivalentes porque el texto no contiene el Nombre divino.
  - Las notas al pie señalan alternativas legítimas sin alterar el texto principal.
