revisions:
- from: ¿Por qué[a], Yahvé, te mantienes lejos? ¿Por qué te ocultas en tiempos de angustia?
  to: ¿Por qué[a], Yahvé, estás lejos? ¿Por qué te ocultas en tiempos de angustia?
