theological_decisions:
- issue: Unspecified subject of τρέφωσιν
  chosen_reading: 'Retain the indefinite active sense: ''they might nourish her.'''
  alternative_readings:
  - '''she might be nourished there'''
  - '''God might nourish her there'''
  rationale: The Greek uses a third person plural active verb without an explicit subject. Supplying 'God' would over-interpret; converting to passive improves English but removes the indefinite active construction. The chosen rendering preserves the textual ambiguity and avoids importing a doctrinally loaded agent.
  doctrine_reference: Preserve theological tension rather than resolve it.
