revisions:
- from: El necio se asoma a la casa desde la entrada, pero el hombre honorable permanecerá afuera y hablará.[a][b]
  to: El necio se asoma dentro de una casa desde la puerta, pero el hombre honorable[a] se quedará afuera y hablará.[b]
  rationale: Se ajustó la primera cláusula para expresar mejor la idea de mirar hacia el interior de la casa; se reemplazó «permanecerá» por «se quedará» para evitar una sobreinterpretación del verbo fuente; y se movieron los marcadores de notas a los puntos exactos que comentan.
