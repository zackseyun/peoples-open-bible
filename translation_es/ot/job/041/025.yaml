    rationale: El referente es una criatura, no necesariamente humana. 'No hay nadie como él' es idiomático; no requiere cambio, pero 'no hay ninguno como él' sería otra posibilidad.
  revised_spanish_text: En la tierra no hay nadie como él[a], hecho sin temor[b].
  revised_footnotes:
