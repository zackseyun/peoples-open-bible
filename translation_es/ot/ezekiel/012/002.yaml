revisions:
- from: Hijo de hombre[a], tú habitas en medio de una casa rebelde, que tiene ojos para ver, pero no ve; y oídos para oír, pero no oye[b], porque son una casa rebelde.
  to: Hijo de hombre[a], tú habitas en medio de una casa rebelde, que tiene ojos para ver, pero no ven; y oídos para oír, pero no oyen[b], porque son una casa rebelde.
  rationale: Se ajusta la cláusula relativa al plural semántico del hebreo para reflejar mejor que 'casa' es una designación corporativa del pueblo. Se mantiene 'casa rebelde' en el texto principal por consistencia teológica y léxica con Ezequiel. También se alisa la nota literal para que sea más comprensible en español sin dejar de indicar la forma fuente.
