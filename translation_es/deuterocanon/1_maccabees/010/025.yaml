translation:
  language: es
  text: 'para que estén conmigo para ayuda[a]. Y el rey Demetrio envió a la nación de los judíos según estas palabras: Saludos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para asistencia» o «como ayuda» para la expresión εἰς βοήθειαν.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: LSJ
  rationale: Expresa con naturalidad en español la finalidad introducida por ὅπως, manteniendo el valor purposivo del texto griego.
- source_word: ὦσιν
  english_pob_choice: they may be
  chosen_spanish: estén
  alternatives_spanish:
  - sean
  - puedan estar
  lexicon: LSJ
  rationale: El subjuntivo presente en español conserva la intención o finalidad del griego sin recargar la frase.
- source_word: σὺν ἐμοί
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  - a mi lado
  lexicon: LSJ
  rationale: «Conmigo» es la equivalencia directa y natural para compañía o presencia junto al hablante.
- source_word: εἰς βοήθειαν
  english_pob_choice: for help
  chosen_spanish: como ayuda
  alternatives_spanish:
  - para ayuda
  - en ayuda
  - para asistencia
  lexicon: LSJ
  rationale: La frase griega funciona aquí con valor de función o propósito; «como ayuda» preserva la idea de estar en calidad de auxilio. Se mantiene la tensión léxica frente a «para ayuda/para asistencia» porque el griego no fija una sola paráfrasis idiomática.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: En contexto epistolar, «envió» es el equivalente natural y fiel para el acto de remitir una carta o mensaje.
- source_word: κατὰ τοὺς λόγους τούτους
  english_pob_choice: according to these words
  chosen_spanish: según estas palabras
  alternatives_spanish:
  - de acuerdo con estas palabras
  - con estas palabras
  lexicon: LSJ
  rationale: «Según estas palabras» reproduce de cerca la fórmula introductoria del contenido de la carta y mantiene el nexo con la cita que sigue.
- source_word: Βασιλεὺς Δημήτριος
  english_pob_choice: King Demetrius
  chosen_spanish: el rey Demetrio
  alternatives_spanish:
  - Rey Demetrio
  - Demetrio, el rey
  lexicon: LSJ
  rationale: Se conserva el título regio con orden natural en español, sin perder la identificación formal del remitente.
- source_word: τῷ ἔθνει τῶν Ἰουδαίων
  english_pob_choice: to the nation of the Jews
  chosen_spanish: a la nación de los judíos
  alternatives_spanish:
  - al pueblo de los judíos
  - a la nación judía
  - al pueblo judío
  lexicon: LSJ
  rationale: ἔθνος se entiende aquí como un pueblo/nación; «nación de los judíos» sigue de cerca la estructura griega y evita sustituirla por terminología más teológica o eclesial.
- source_word: χαίρειν
  english_pob_choice: Greetings
  chosen_spanish: Saludos
  alternatives_spanish:
  - ¡Salud!
  - Que se alegren
  - Rejocijaos
  lexicon: LSJ
  rationale: En cartas griegas, χαίρειν funciona como fórmula de salutación; «Saludos» transmite el valor epistolar sin forzar el verbo «alegrarse» en español.
theological_decisions:
- issue: Valor de εἰς βοήθειαν como función/ayuda en vez de una mera etiqueta nominal
  english_pob_reading: for help
  chosen_spanish_reading: como ayuda
  alternative_spanish_readings:
  - para ayuda
  - para asistencia
  - en ayuda
  rationale: 'El griego permite un matiz funcional: que estén presentes en calidad de auxilio. «Como ayuda» conserva esa función sin convertirla en una frase extraña en español.'
  doctrine_reference: No doctrinal issue; lexical nuance in Hellenistic epistolary Greek.
translation_notes:
  revision_awareness: El texto griego y el aparato inglés coinciden en el sentido general. Se conserva la lectura epistolar de χαίρειν como saludo formal y la relación purposiva de ὅπως ὦσιν σὺν ἐμοὶ εἰς βοήθειαν. La revisión inglesa favoreció «for help» frente a «as help»; en español se optó por «como ayuda» para mantener la función de auxilio con mayor naturalidad idiomática.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; aquí no aparece.
  - Se evita «Cristo» porque el pasaje no lo contiene.
  - «Nación de los judíos» reproduce el valor colectivo de ἔθνος sin cargarlo con terminología moderna ajena al contexto.
