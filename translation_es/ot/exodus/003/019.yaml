translation:
  language: es
  text: Pero yo sé que el rey de Egipto no los dejará ir[a], excepto por una mano fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el rey de Egipto no los dejará ir, ni aun por una mano fuerte», o «el rey de Egipto no los dejará ir, salvo por una mano fuerte». La cláusula hebrea es elíptica y puede subrayar que solo una fuerza abrumadora hará ceder al rey.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Ahora yo
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente introduce contraste o énfasis discursivo. En español, «Pero yo» conserva ese giro adversativo de forma natural.
- source_word: יָדַעְתִּי
  english_pob_choice: know
  chosen_spanish: sé
  alternatives_spanish:
  - he sabido
  - conozco
  lexicon: HALOT
  rationale: El perfecto hebreo expresa conocimiento firme y actual; en español, el presente «sé» comunica mejor una certeza estable y vigente.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el monarca de Egipto
  - el rey egipcio
  lexicon: HALOT
  rationale: La construcción posesiva es directa y natural en español; «el rey de Egipto» mantiene la referencia sin artificio.
- source_word: לֹא יִתֵּן אֶתְכֶם ... לַהֲלֹךְ
  english_pob_choice: will not let you go
  chosen_spanish: no los dejará ir
  alternatives_spanish:
  - no les permitirá irse
  - no les dará permiso para ir
  lexicon: HALOT
  rationale: נתן con infinitivo tiene aquí el sentido idiomático de permitir. «Dejar ir» es la forma más natural en español y preserva el valor verbal sin sobreexplicarlo.
- source_word: וְלֹא בְּיָד חֲזָקָה
  english_pob_choice: except by a strong hand
  chosen_spanish: sino por una mano fuerte
  alternatives_spanish:
  - excepto por una mano fuerte
  - salvo por una mano fuerte
  - no sin una mano fuerte
  lexicon: HALOT
  rationale: La cláusula hebrea es elíptica y admite más de una lectura. En español, «sino por» refleja bien la oposición implícita y mantiene la imagen literal de «mano fuerte» sin diluirla en paráfrasis.
theological_decisions:
- issue: Interpretación de la cláusula elíptica וְלֹא בְּיָד חֲזָקָה
  english_pob_reading: Pharaoh will not let Israel go except by a strong hand.
  chosen_spanish_reading: Faraón no los dejará ir sino por una mano fuerte.
  alternative_spanish_readings:
  - Faraón no los dejará ir, no sin una mano fuerte.
  - Faraón no los dejará ir, excepto por una mano fuerte.
  - Faraón no los dejará ir, ni aun por una mano fuerte.
  rationale: La frase es comprimida y ha sido entendida de varias maneras. El contexto inmediato (v. 20) apunta a una liberación provocada por una intervención divina poderosa. La redacción elegida conserva esa fuerza narrativa y deja visible la imagen bíblica de la «mano fuerte».
  doctrine_reference: Conservar la tensión interpretativa y documentar alternativas donde el hebreo es elíptico.
translation_notes:
  revision_awareness: La redacción sigue la revisión más literal y concisa del audit trail, que prefirió «except by» frente a una expansión interpretativa. En español se refleja con «sino por», evitando añadir una explicación que el hebreo no expresa de forma explícita.
  spanish_consistency_notes:
  - Se mantuvo «mano fuerte» para conservar el motivo de Éxodo y la conexión intertextual con el lenguaje de liberación poderosa.
  - Se evitó «SEÑOR» u otra sustitución, porque el versículo no contiene el Nombre divino ni un caso de κύριος en este segmento.
  - «Rey de Egipto» conserva la estructura del constructo hebreo con naturalidad en español.
  - La nota textual reproduce las alternativas documentadas por el audit trail sin resolver artificialmente la ambigüedad.
