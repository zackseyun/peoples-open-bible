translation:
  text: And I saw written upon them that generation after generation will transgress[a], until a generation of righteousness
    arises, and iniquity is destroyed, and sin passes away from the earth[b], and every good thing comes upon it, .
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez witness for this verse consists only of the brief vision formula 'And I saw.' If a fuller wording is reflected
      in other witnesses or editions, that expansion is not present in the supplied base text.
