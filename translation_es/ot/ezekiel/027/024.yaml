    text: O «en arcones de cedro» / «forrados de cedro»; el término hebreo es difícil y algunos lo relacionan con la palabra para «cedro» más que con otra descripción del embalaje.
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea traducida «tesoros de telas multicolores» es incierta; puede referirse a bienes valiosos almacenados, arcones o bultos de textiles de vivos colores.
    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación de la nota sobre la posible lectura relacionada con «cedro», anclándola al segmento de embalaje que corresponde a אֲרֻזִים. También se ajustó «mantos de azul y de bordado» a «envolturas de azul y tela bordada» para reflejar mejor el valor textil/empacado del hebreo y mejorar la naturalidad del español. Se mantuvo el resto del inventario comercial en línea con el English POB.
