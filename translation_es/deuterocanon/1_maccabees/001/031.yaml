translation:
  language: es
  text: Y tomó el botín de la ciudad y la quemó con fuego, y derribó sus casas y sus murallas de alrededor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se apoderó de
  - capturó
  lexicon: BDAG
  rationale: Lambdáno aquí mantiene la secuencia narrativa de una acción ya consumada. «Tomó» es natural en español y conserva el sentido simple de recibir o llevarse lo obtenido sin añadir una matiz de violencia no explicitado por el verbo mismo.
- source_word: τὰ σκῦλα
  english_pob_choice: the plunder
  chosen_spanish: el botín
  alternatives_spanish:
  - los despojos
  - el saqueo
  lexicon: LSJ
  rationale: σκῦλα designa los bienes tomados en guerra. «Botín» es el equivalente español más claro y directo, y conserva el carácter militar del término mejor que una paráfrasis más general.
- source_word: τῆς πόλεως
  english_pob_choice: of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la ciudad tomada
  - procedente de la ciudad
  lexicon: BDAG
  rationale: El genitivo especifica la ciudad relacionada con el botín. En español, «el botín de la ciudad» reproduce de forma natural la relación nominal del original y mantiene la referencia urbana concreta.
- source_word: ἐνεπύρισεν
  english_pob_choice: burned
  chosen_spanish: la quemó
  alternatives_spanish:
  - la incendió
  - la puso en llamas
  lexicon: LSJ
  rationale: El verbo expresa el acto de quemar o incendiar. «La quemó» es una solución sobria y fiel; el complemento «con fuego» conserva la explicitud del griego πυρί.
- source_word: πυρί
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - mediante fuego
  lexicon: BDAG
  rationale: El dativo instrumental se expresa de manera directa con «con fuego». Aunque la idea ya está contenida en «quemó», la repetición explícita sigue la énfasis del texto fuente.
- source_word: καθεῖλεν
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - destruyó
  - echó abajo
  lexicon: BDAG
  rationale: El verbo indica demolición o abatimiento violento. «Derribó» es natural en español y mantiene la fuerza destructiva sin introducir un sentido excesivamente técnico.
- source_word: τοὺς οἴκους
  english_pob_choice: its houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus viviendas
  - sus edificios
  lexicon: BDAG
  rationale: οἴκους se refiere a casas o edificios domésticos. «Casas» es el equivalente más directo y conserva la imagen concreta de la destrucción urbana.
- source_word: τὰ τείχη
  english_pob_choice: its walls
  chosen_spanish: sus muros
  alternatives_spanish:
  - sus murallas
  - sus paredes
  lexicon: BDAG
  rationale: τείχη puede referirse a muros defensivos de la ciudad. «Muros» es claro y amplio; evita restringir demasiado el término a una sola estructura fortificada, aunque «murallas» también sería posible.
- source_word: κύκλῳ
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en torno
  - por todas partes
  lexicon: BDAG
  rationale: El adverbio indica la totalidad del contorno. «Alrededor» comunica bien la idea de destrucción circundante y funciona con fluidez junto a «sus muros».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de 1 Macabeos 1:31 y el audit trail inglés: conserva la secuencia narrativa, el paralelismo entre fuego y demolición, y el alcance total de la destrucción sin añadir matices interpretativos no presentes en el texto.'
  spanish_consistency_notes:
  - Se prefirió «botín» por ser el equivalente español natural de σκῦλα en contexto bélico.
  - 'Se mantuvo el paralelismo verbal con dos acciones fuertes: «quemó» y «derribó».'
  - «Muros alrededor» reproduce de forma sencilla κύκλῳ sin forzar una expresión más arcaica.
