revisions:
- from: 'Y puso capitanes de guerra sobre el pueblo[a], y los reunió consigo en la plaza de la puerta de la ciudad, y habló a su corazón, diciendo:'
  to: 'Y designó comandantes militares sobre el pueblo, y los reunió consigo en la plaza de la puerta de la ciudad, y les habló al corazón[a], diciendo:'
  rationale: Se corrige el modismo final para mantener el sentido hebreo y una formulación idiomática natural en español ('les habló al corazón'), dejando en nota la forma más literal plural preservada por el POB inglés. Además, se mejora la claridad y fidelidad funcional con 'designó comandantes militares', que representa mejor el valor administrativo de וַיִּתֵּן y la referencia de שָׂרֵי מִלְחָמוֹת en español moderno y eclesial legible.
