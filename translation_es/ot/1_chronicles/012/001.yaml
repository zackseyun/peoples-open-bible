review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: introducción de lista, llegada a David en Siclag, estado continuo de restricción por causa de Saúl, y descripción de estos hombres como parte de los gibbôrîm y como auxiliares militares. Sin embargo, hay un desajuste menor pero importante en la nota [a]: la nota presenta «retenido» como alternativa aunque ya es la lectura del texto, y omite la alternativa más cercana al rastro inglés revisado («hecho mantenerse atrás» / «mantenido a distancia» / «confinado»).'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y preciso. «Ahora bien» funciona, aunque «Y estos son» o «Estos son» sería más directo; no exige cambio. La mejora principal está en «ellos estaban entre los valientes», que en español suena algo estático y menos marcado militarmente que el hebreo. «estaban entre los guerreros valientes» preserva mejor el valor marcial de gibbôrîm y armoniza con «ayudantes en la guerra».
  glossary_alignment: No hay términos del glosario principal especialmente conflictivos en este versículo. El tratamiento de גִּבּוֹרִים como «valientes» es aceptable, pero «guerreros valientes» alinea mejor con la decisión POB inglesa «mighty warriors» y con la explicación léxica documentada. El resto de las elecciones terminológicas está alineado.
  issues:
  - severity: medium
    issue: La nota [a] repite la lectura principal en lugar de ofrecer alternativas reales.
    rationale: El texto principal ya dice «retenido[a]», pero la nota dice «O “retenido”, “contenido” o “confinado”». Una nota de alternativa no debe repetir la forma ya adoptada; además, el rastro inglés preserva «held back / confined» como alternativas relevantes.
  - severity: medium
    issue: «entre los valientes» atenúa el matiz militar de בַּגִּבּוֹרִים.
    rationale: Aunque «valientes» no es incorrecto, el hebreo y la auditoría inglesa apuntan a combatientes valerosos, no solo a personas valientes en general. «guerreros valientes» o similar preserva mejor la fuerza marcial.
  revised_spanish_text: Ahora bien, estos son los hombres que vinieron a David en Siclag, mientras aún estaba retenido[a] por causa de Saúl hijo de Cis; y ellos estaban entre los guerreros valientes[b], ayudantes en la guerra.
  revised_footnotes:
  - marker: a
    text: O «mantenido a distancia» o «confinado» por causa de Saúl hijo de Cis.
    reason: lexical_alternative
  - marker: b
    text: O «entre los valientes»; hebreo gibbôrîm se refiere a guerreros valientes o héroes.
    reason: lexical_alternative
  revision_rationale: Se ajusta la nota [a] para que ofrezca alternativas verdaderas y acordes con el rastro inglés, y se fortalece «gibbôrîm» en el texto principal como «guerreros valientes» para preservar mejor el sentido militar del hebreo. El resto del versículo se mantiene porque es fiel y natural en español.
