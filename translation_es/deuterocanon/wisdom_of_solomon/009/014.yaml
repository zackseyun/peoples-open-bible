  rationale: El paralelismo griego distingue λογισμοί de ἐπίνοιαι. La versión española conserva esa diferencia para no borrar la tensión léxica documentada en el original.
  doctrine_reference: 'DOCTRINE.md: no aplanar distinciones léxicas del texto fuente'
