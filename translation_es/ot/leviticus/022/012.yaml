translation:
  language: es
  text: Pero si la hija de un sacerdote llega a ser esposa de un hombre ajeno al sacerdocio[a], ella no comerá de la contribución de las cosas santas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «casada con un no sacerdote»; literalmente, «de un hombre extraño/ajeno». Aquí se refiere a alguien fuera del ámbito sacerdotal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de las ofrendas santas» o «de los dones sagrados» para «la contribución de las cosas santas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַת
  english_pob_choice: But ... a daughter
  chosen_spanish: Pero ... la hija
  alternatives_spanish:
  - Y ... la hija
  - Ahora ... la hija
  lexicon: HALOT
  rationale: El waw inicial contrasta esta disposición con la anterior, por eso «Pero» transmite mejor el valor adversativo. Se conserva explícitamente «la hija» para reflejar בַת.
- source_word: כֹּהֵן
  english_pob_choice: of a priest
  chosen_spanish: de un sacerdote
  alternatives_spanish:
  - de un sacerdote
  - sacerdotal
  lexicon: HALOT
  rationale: 'La relación de constructo indica pertenencia: «hija de un sacerdote». En español, la forma natural es «la hija de un sacerdote».'
- source_word: כִּי תִהְיֶה
  english_pob_choice: if ... becomes
  chosen_spanish: si ... llega a ser
  alternatives_spanish:
  - cuando ... sea
  - si ... sea
  lexicon: HALOT
  rationale: כִּי con היה introduce una condición. «Llega a ser» expresa adecuadamente el cambio de estado matrimonial sin perder la fuerza condicional de «si».
- source_word: לְ/אִישׁ זָר
  english_pob_choice: the wife of an outsider
  chosen_spanish: esposa de un hombre extraño
  alternatives_spanish:
  - esposa de un no sacerdote
  - casada con un hombre extraño
  - esposa de un outsider
  lexicon: HALOT
  rationale: El hebreo literalmente dice «para/ a un hombre extraño», pero el contexto legal apunta a una relación matrimonial. «Hombre extraño» conserva el valor lexical de זָר sin convertirlo en una traducción eclesiástica interpretativa. No se usa «extranjero» para no imponer una lectura étnica que el contexto de sacerdocio no exige.
- source_word: הִוא
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - ella misma
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; en español se expresa naturalmente con «ella».
- source_word: בִּ/תְרוּמַת
  english_pob_choice: from the contribution
  chosen_spanish: de la contribución
  alternatives_spanish:
  - de la ofrenda
  - de la contribución ofrecida
  - de la porción
  lexicon: HALOT
  rationale: תְרוּמָה se rinde como «contribución», siguiendo la decisión auditada del inglés. En español, la construcción preposicional fluye mejor con «de la contribución».
- source_word: הַ/קֳּדָשִׁים
  english_pob_choice: of the holy things
  chosen_spanish: de las cosas santas
  alternatives_spanish:
  - de las cosas sagradas
  - de las cosas consagradas
  - de los bienes santos
  lexicon: HALOT
  rationale: «Holy things» puede sonar más natural en español como «cosas santas»; mantiene la categoría cultual amplia del plural hebreo sin estrecharla indebidamente.
- source_word: לֹא תֹאכֵל
  english_pob_choice: shall not eat
  chosen_spanish: no comerá
  alternatives_spanish:
  - no deberá comer
  - no podrá comer
  lexicon: HALOT
  rationale: 'En español jurídico-bíblico, el futuro simple comunica bien la prohibición: «no comerá». Preserva el carácter normativo del hebreo legal.'
theological_decisions:
- issue: Sentido de זָר en legislación sacerdotal
  english_pob_reading: outsider, meaning someone outside the priestly family/eligibility circle rather than necessarily ethnically foreign
  chosen_spanish_reading: hombre extraño, entendido como alguien fuera del círculo sacerdotal
  alternative_spanish_readings:
  - extranjero
  - forastero
  - laico
  - no sacerdote
  rationale: La cláusula trata del acceso a lo santo dentro del sistema sacerdotal. «Hombre extraño» preserva la rareza/extrañeza lexical de זָר y permite explicar en nota que el referente es alguien fuera de la casa sacerdotal, no necesariamente un extranjero étnico.
  doctrine_reference: Principio de primacía del texto original y preservación de la restricción cultual tal como aparece en Levítico 22.
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente hebreo y el audit trail inglés sin cambios de revisión posteriores; se mantiene la tensión lexical de זָר y la terminología cultual de תְרוּמָה/הַקֳּדָשִׁים en español readable.
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כֹּהֵן y «contribución» para תְרוּמָה, en coherencia con decisiones POB previas.
  - «Cosas santas» conserva el plural cultual de הַקֳּדָשִׁים sin sustituirlo por una forma litúrgica no sustentada por el hebreo.
  - La prohibición se expresa con futuro simple («no comerá») por consistencia legal en español bíblico moderno.
