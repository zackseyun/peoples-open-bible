translation:
  language: es
  text: Porque entonces les daré a los pueblos un habla pura[a], para que todos ellos invoquen el nombre de Yahvé[b] y le sirvan de común acuerdo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''volveré a los pueblos un labio puro'' o ''un labio puro para los pueblos''. La expresión puede entenderse como habla purificada, labios purificados o una lengua restaurada.'
    reason: lexical_alternative
  - marker: b
    text: YHWH es el Nombre divino. En esta serie se vierte como Yahvé.
    reason: theological_note
  - marker: c
    text: 'Hebreo literalmente: ''con un solo hombro'', un modismo para servicio unido o acción conjunta, como actuar hombro con hombro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶהְפֹּךְ
  english_pob_choice: I will change
  chosen_spanish: cambiaré
  alternatives_spanish:
  - transformaré
  - volveré
  lexicon: HALOT
  rationale: El verbo hebreo puede significar girar, volver o cambiar. En este contexto, con objeto referido al habla/lengua, ‘cambiaré’ comunica bien una acción divina de alteración sin sobrecargarla con una idea de conversión interior que el hebreo no explicita.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos de las naciones
  lexicon: HALOT
  rationale: El plural hebreo subraya colectivos humanos diversos. ‘Los pueblos’ conserva esa amplitud mejor que una formulación más política como ‘las naciones’.
- source_word: שָׂפָה
  english_pob_choice: speech
  chosen_spanish: lenguaje
  alternatives_spanish:
  - habla
  - labio
  lexicon: HALOT
  rationale: Literalmente es ‘labio’, pero aquí funciona de modo metonímico como habla o lenguaje. ‘Lenguaje’ resulta natural en español y mantiene abierta la tensión entre habla purificada y restauración lingüística.
- source_word: בְרוּרָה
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - claro
  - purificado
  lexicon: HALOT
  rationale: La idea es de algo depurado o limpio. ‘Puro’ encaja con el lenguaje religioso del pasaje y preserva el matiz moral/cultual mejor que ‘claro’.
- source_word: לִקְרֹא
  english_pob_choice: may call on
  chosen_spanish: invoquen
  alternatives_spanish:
  - llamen
  - clamen a
  lexicon: HALOT
  rationale: Con ‘el nombre de Yahvé’, קרא tiene el sentido de invocar en adoración. ‘Invoquen’ recoge bien ese uso bíblico en español.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre del Señor
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se vierte como ‘Yahvé’. La expresión fija ‘en/por el nombre de’ se conserva como ‘el nombre de Yahvé’ para mantener la fórmula bíblica.
- source_word: לְעָבְדוֹ
  english_pob_choice: and serve him
  chosen_spanish: y le sirvan
  alternatives_spanish:
  - y lo adoren
  - y le rindan servicio
  lexicon: HALOT
  rationale: עבד tiene un campo de servir y prestar servicio cultual. ‘Le sirvan’ mantiene la amplitud covenantal sin reducirlo solo a ‘adorar’, aunque la acción incluye ese trasfondo.
- source_word: שְׁכֶם אֶחָד
  english_pob_choice: with one accord
  chosen_spanish: con un solo hombro
  alternatives_spanish:
  - con un mismo propósito
  - unidos en una misma labor
  - hombro con hombro
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente ‘un hombro’. A diferencia del inglés auditado, aquí se conserva la metáfora para no perder la tensión del hebreo, dejando la idiomaticidad implícita en el contexto.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo usa el Nombre divino directamente. Conforme a la terminología del proyecto en español, se traduce ‘Yahvé’ para evitar el ocultamiento del Tetragrámaton y mantener la trazabilidad al original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nature of the promised transformation
  english_pob_reading: change the speech of the peoples to a pure speech
  chosen_spanish_reading: cambiaré a los pueblos un lenguaje puro
  alternative_spanish_readings:
  - restauraré un lenguaje puro a los pueblos
  - purificaré los labios de los pueblos
  rationale: El hebreo permite leer tanto una purificación del habla como una restauración idiomática. La versión elegida mantiene abierta la ambigüedad sin resolverla hacia un solo sentido, y el adjetivo ‘puro’ conserva el eje cultual/moral del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
- issue: Corporate unity in service
  english_pob_reading: with one accord
  chosen_spanish_reading: con un solo hombro
  alternative_spanish_readings:
  - con un mismo acuerdo
  - hombro con hombro
  - unidos como uno
  rationale: La metáfora hebrea de ‘un hombro’ es significativa y no debe diluirse. En español suena marcada, pero preserva el valor figurado del original y la imagen de servicio conjunto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo y el audit trail inglés sin depender mecánicamente de la redacción inglesa. Se conservan las tensiones documentadas: שָׂפָה puede ser habla o lengua; לְעָבְדוֹ puede abarcar servicio y adoración; שְׁכֶם אֶחָד se mantiene como metáfora corporal de unidad. No se aplicaron revisiones adicionales en el último pase, y el consenso de revisión fue alto.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera uniforme para יְהוָה.
  - ‘Pueblos’ mantiene el plural colectivo de עַמִּים.
  - Se evitó ‘SEÑOR’ para no ocultar el nombre divino.
  - La metáfora de ‘un solo hombro’ se conservó deliberadamente como nota de tensión textual.
  - 'El orden y la sintaxis siguen el flujo del hebreo: causa, cambio divino, propósito y resultado comunitario.'
