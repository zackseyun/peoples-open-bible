    rationale: La nota actual está marcada solo en 'Yahvé', pero la variante afecta a toda la cláusula 'y que Yahvé esté contigo'. Además, 'También' sobra y 'Yahvé sea contigo' suena menos natural que una formulación más explícita sobre valor optativo/futuro.
  revised_spanish_text: Para el oro, la plata, el bronce[a] y el hierro, no hay número[b]. Levántate y trabaja, y que Yahvé esté contigo[c].
