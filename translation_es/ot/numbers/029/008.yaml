translation:
  language: es
  text: 'Presentarán a Yahvé un holocausto[a], aroma agradable: un novillo de la vacada, un carnero y siete corderos machos de un año; deberán ser sin defecto para ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aroma sosegante». La expresión hebrea es una fórmula sacrificial fija para una ofrenda aceptable ante Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: You shall present
  chosen_spanish: Presentarás
  alternatives_spanish:
  - Ofrecerás
  - Harás presentar
  lexicon: HALOT
  rationale: El verbo en contexto sacrificial expresa traer/presentar una ofrenda ante Dios. «Presentar» conserva la acción cultual con español natural y digno; el singular en español funciona como mandato colectivo implícito.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - una ofrenda ascendente
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» sigue siendo el equivalente establecido para la ofrenda totalmente consumida por el fuego. «Ofrenda quemada» sería más explicativa, pero menos idiomática en este registro.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a YHWH
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en la forma editorial del POB: «Yahvé». La preposición ל marca dirección/dedicación de la ofrenda, bien expresada por «a» en español culto y bíblico.'
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma placentero
  - fragancia agradable
  lexicon: HALOT
  rationale: La frase fija sacrificial se vierte de manera idiomática. «Aroma agradable» preserva el valor de aceptación cultual sin sugerir una literalidad física inapropiada.
- source_word: פַּר בֶּן בָּקָר אֶחָד
  english_pob_choice: one bull from the herd
  chosen_spanish: un novillo de la vacada
  alternatives_spanish:
  - un toro de la vacada
  - un becerro del ganado
  lexicon: HALOT
  rationale: La expresión hebrea indica un macho bovino del ganado; «novillo» es natural y preciso en español. «De la vacada» preserva la procedencia/relación de «ben baqar» sin sonar forzado.
- source_word: אַיִל אֶחָד
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho de oveja
  - un ram
  lexicon: HALOT
  rationale: «Carnero» es el equivalente estándar y claro en español para אַיִל en listas sacrificiales.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה שִׁבְעָה
  english_pob_choice: seven male lambs a year old
  chosen_spanish: siete corderos machos de un año
  alternatives_spanish:
  - siete corderos de un año
  - siete corderos machos de edad de un año
  lexicon: HALOT
  rationale: Se mantiene la especificación de sexo y edad del hebreo. «Corderos machos» refleja כְּבָשִׂים en esta ofrenda, y «de un año» comunica la edad idiomática de manera natural.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - sin defecto alguno
  lexicon: HALOT
  rationale: En contexto sacrificial, el término indica animales sin imperfección física. «Sin defecto» es claro, directo y fiel al requisito cultual.
- source_word: יִהְי֥וּ לָכֶם
  english_pob_choice: they shall be for you
  chosen_spanish: serán para ustedes
  alternatives_spanish:
  - deberán ser para ustedes
  - les serán requeridos
  lexicon: HALOT
  rationale: La frase final conserva el dativo explícito «para ustedes», que marca la responsabilidad de quienes presentan las víctimas. El futuro simple reproduce el valor exhortativo/legislativo del hebreo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - YHWH
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. El POB inglés opta por la transliteración del nombre divino; en español se mantiene la misma decisión editorial con la forma establecida «Yahvé».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor sacrificial de רֵיחַ נִיחֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: aroma agradable
  alternative_spanish_readings:
  - aroma de sosiego
  - aroma placentero
  rationale: Se preserva la expresión sacrificial fija sin convertirla en una descripción meramente sensorial. La redacción mantiene el matiz de aceptación delante de Dios.
  doctrine_reference: Lexical note on sacrificial acceptability
translation_notes:
  revision_awareness: Se corrigió el problema anterior asegurando que el marcador [a] aparezca exactamente en el texto principal junto al término al que remite la nota. No se introdujeron notas sin ancla textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יהוה, conforme al estándar del proyecto.
  - Se mantiene «holocausto» para עֹלָה por su valor bíblico asentado en español.
  - 'Se conserva la precisión de sexo y edad en las víctimas: «corderos machos de un año».'
  - Se traduce לָכֶם con «para ustedes» para no perder el dativo explícito del hebreo.
