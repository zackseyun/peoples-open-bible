revisions:
- from: Y meterás los varales[a] en los anillos, sobre los lados del arca, para llevar el arca con ellos.
  to: Y pondrás los varales[a] en los anillos, en los costados del arca, para llevar el arca con ellos.
  rationale: Se ajusta el registro de «meterás» a «pondrás» para un español más digno y acorde con el POB, y se mejora la locución espacial a «en los costados del arca» para reflejar mejor el hebreo en español natural. Se simplifica la nota para conservar alternativas útiles en español sin introducir anglicismos innecesarios.
