translation:
  language: es
  text: Escucha la oración de tus siervos[b][a], conforme a tu favor hacia tu pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a tu voluntad». El hebreo רצון puede significar tanto «voluntad» como «favor / beneplácito»; aquí se eligió «favor» porque la frase continúa «hacia tu pueblo», lo que apunta a una disposición benévola.'
    reason: lexical_alternative
  - marker: b
    text: 'El testimonio griego paralelo de este versículo lee algo muy distinto: «El que busca la ley será saciado de ella, y el hipócrita tropezará en ella». Esto señala una divergencia textual importante entre las tradiciones hebrea y griega de Sirácides.'
    reason: textual_variant
lexical_decisions:
- source_word: תשמע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Que escuches
  - Escucha, por favor
  lexicon: HALOT
  rationale: El hebreo funciona como una súplica dirigida a Dios; en español, el imperativo de cortesía religiosa 'Escucha' conserva la petición directa sin forzar una paráfrasis.
- source_word: תפלת
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  - la oración
  lexicon: HALOT
  rationale: El sustantivo singular se conserva en español; 'oración' es natural, digno y fiel al sentido de תפלה como súplica devocional.
- source_word: עבדיך
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: En una dirección a Dios, el término expresa pertenencia y servicio reverente. 'Siervos' mantiene mejor la resonancia bíblica en español que 'esclavos', sin borrar el vínculo de dependencia.
- source_word: כרצונך
  english_pob_choice: according to your favor
  chosen_spanish: conforme a tu favor
  alternatives_spanish:
  - conforme a tu voluntad
  - según tu beneplácito
  - de acuerdo con tu favor
  lexicon: HALOT
  rationale: Se preserva el matiz de רצון como benevolencia/favor, no solo como voluntad abstracta. 'Conforme a' reproduce la relación de medida o correspondencia de manera natural en español.
- source_word: על
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - sobre
  - para
  - en favor de
  lexicon: HALOT
  rationale: Con un objeto personal/colectivo, 'hacia' expresa orientación favorable de modo claro en español y evita la dureza literal de 'sobre'.
- source_word: עמך
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: '''Pueblo'' preserva el sentido pactual y colectivo del hebreo sin introducir un matiz étnico o político excesivo.'
theological_decisions:
- issue: Sentido de רצון en una oración dirigida a Dios
  english_pob_reading: according to your favor
  chosen_spanish_reading: conforme a tu favor
  alternative_spanish_readings:
  - conforme a tu voluntad
  - según tu beneplácito
  rationale: La opción 'favor' mantiene la idea de benevolencia divina que el propio contexto sugiere al añadir 'hacia tu pueblo'. 'Voluntad' es posible, pero en español puede sonar más abstracta y menos relacional.
  doctrine_reference: 'DOCTRINE.md: preserve source plain sense over translation tradition'
- issue: Tratamiento de עבדיך al dirigirse a Dios
  english_pob_reading: your servants
  chosen_spanish_reading: tus siervos
  alternative_spanish_readings:
  - tus esclavos
  rationale: Aunque el campo semántico de עבד puede incluir esclavitud, aquí la forma de oración hace que el énfasis recaiga en la relación devota con Dios. 'Siervos' comunica esa relación sin borrar la dependencia implícita.
  doctrine_reference: 'DOCTRINE.md: δοῦλος / servant-slave context-dependent principle applied analogically to Hebrew עבד'
- issue: Divergencia textual entre el hebreo conservado y el griego paralelo en este versículo
  english_pob_reading: The Greek parallel tradition at this verse reads very differently
  chosen_spanish_reading: El testimonio griego paralelo de este versículo dice algo muy distinto
  alternative_spanish_readings:
  - La tradición griega paralela de este versículo difiere mucho
  rationale: 'Se conserva la advertencia textual: el hebreo de este registro y el griego de Swete no coinciden. La nota evita armonizar artificialmente ambas formas y deja visible la tensión documental.'
  doctrine_reference: Crítica textual de Sirácides / principio POB de auditar variantes mayores
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios sustantivos; se mantiene la lectura hebrea base con la nota explícita de la fuerte divergencia respecto del griego paralelo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino; por eso no aparece en el texto.
  - '''Siervos'' se usa aquí por el contexto de oración, en coherencia con la política del proyecto para עבד cuando el acento recae en servicio reverente.'
  - 'La puntuación y el orden reflejan la estructura breve del hebreo: petición + especificación de correspondencia + complemento orientado al pueblo.'
