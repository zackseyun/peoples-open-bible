- from: Entonces Saúl subió de perseguir a los filisteos[a], y los filisteos fueron a su propio lugar.
  to: Entonces Saúl dejó de perseguir a los filisteos[a], y los filisteos fueron a su propio lugar.
  rationale: Se reemplaza «subió de perseguir» por «dejó de perseguir» para expresar con español natural el sentido idiomático de ויעל... מאחרי en este contexto militar. La nota conserva la alternativa más formal y la literalidad hebrea, de modo que se preserva tanto el significado fuente como el rastro auditado del POB inglés.
