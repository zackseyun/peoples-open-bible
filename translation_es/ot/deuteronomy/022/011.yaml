- from: No vestirás tela[a] de lana y lino juntos.
  to: No vestirás ropa[a] tejida con lana y lino juntos.
  rationale: Se ajusta «tela» a «ropa ... tejida con» para reflejar mejor el sentido específico de שעטנז como prenda o tejido confeccionado con la mezcla prohibida, y para lograr un español más natural sin perder la precisión del hebreo ni de la auditoría inglesa.
