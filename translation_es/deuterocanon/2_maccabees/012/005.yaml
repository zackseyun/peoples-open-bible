translation:
  language: es
  text: Pero cuando Judas supo de la crueldad que había ocurrido contra su misma gente, después de dar órdenes a los hombres que lo rodeaban,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μεταλαβὼν
  english_pob_choice: when ... learned
  chosen_spanish: cuando Judas supo
  alternatives_spanish:
  - cuando Judas se enteró
  - habiendo sabido Judas
  lexicon: LSJ
  rationale: El participio aoristo expresa que Judas recibe noticia del hecho antes de la acción principal. «Supo» mantiene esa recepción de información con naturalidad en español; «se enteró» también es posible, pero algo más coloquial. «Habiendo sabido» conserva más la forma participial, pero suena menos fluido.
- source_word: τὴν γεγονυῖαν
  english_pob_choice: that had occurred
  chosen_spanish: que había ocurrido
  alternatives_spanish:
  - que había sucedido
  - que había tenido lugar
  lexicon: LSJ
  rationale: El participio perfecto de γίνομαι señala un hecho ya acaecido. «Había ocurrido» sigue de cerca ese valor y corresponde al ajuste reciente del POB inglés hacia «had occurred».
- source_word: εἰς τοὺς ὁμοεθνεῖς
  english_pob_choice: against his own people
  chosen_spanish: contra su propio pueblo
  alternatives_spanish:
  - contra sus compatriotas
  - contra los de su misma nación
  lexicon: LSJ
  rationale: Ἐἰς con sentido hostil aquí puede expresarse naturalmente como «contra». Ὁμοεθνεῖς designa a los de la misma nación/raza; «su propio pueblo» conserva la referencia colectiva y es idiomático en español.
- source_word: ὠμότητα
  english_pob_choice: cruelty
  chosen_spanish: crueldad
  alternatives_spanish:
  - brutalidad
  - savagidad
  lexicon: LSJ
  rationale: Ὠμότης denota dureza cruel y trato brutal. «Crueldad» es el equivalente más directo y sobrio, sin intensificar indebidamente el matiz.
- source_word: παραγγείλας
  english_pob_choice: after giving orders
  chosen_spanish: después de dar órdenes
  alternatives_spanish:
  - tras dar órdenes
  - habiendo dado órdenes
  lexicon: LSJ
  rationale: El participio indica una acción anterior a la principal implícita en el verso siguiente. «Después de dar órdenes» conserva el orden temporal y el matiz militar.
- source_word: τοῖς περὶ αὐτὸν ἀνδράσιν
  english_pob_choice: to the men around him
  chosen_spanish: a los hombres que estaban con él
  alternatives_spanish:
  - a los hombres a su alrededor
  - a sus hombres
  lexicon: LSJ
  rationale: La expresión literal es «los hombres alrededor de él», es decir, su grupo acompañante. «Que estaban con él» resulta más natural en español y mantiene el sentido de compañía sin perder la referencia al entorno cercano.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que prefirió «had occurred» en lugar de «had been committed» para reflejar más directamente γεγονυῖαν. Por eso se eligió «había ocurrido» en vez de una formulación más judicial o pasiva.
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo sobrio y formal, sin añadir explicaciones no presentes en el griego.
  - «Pueblo» traduce de modo colectivo y natural ὁμοεθνεῖς en este contexto de pertenencia nacional.
  - No se introducen términos eclesiásticos tradicionales que oscurezcan el sentido histórico del pasaje.
