translation:
  language: es
  text: Y tus valles más escogidos se llenaron de carros[a], y los jinetes se apostaron en la puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomaron posiciones en la puerta»; el hebreo usa un infinitivo absoluto con un verbo finito para intensificar la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְחַר
  english_pob_choice: choicest
  chosen_spanish: más escogidos
  alternatives_spanish:
  - escogidos
  - selectos
  - los mejores
  lexicon: HALOT
  rationale: El sustantivo en constructo expresa lo selecto o escogido. En español, «más escogidos» conserva el matiz superlativo sin volver la frase artificial.
- source_word: עֲמָקַיִךְ
  english_pob_choice: your valleys
  chosen_spanish: tus valles
  alternatives_spanish:
  - tus valles
  - tus quebradas
  - tus valles más profundos
  lexicon: HALOT
  rationale: El plural con sufijo de 2ª f. sg. se refiere a Jerusalén personificada. «Valles» es claro y natural en español.
- source_word: מָלְאוּ רָכֶב
  english_pob_choice: were filled with chariots
  chosen_spanish: fueron llenos de carros
  alternatives_spanish:
  - se llenaron de carros
  - quedaron llenos de carros
  - se llenaron de carros de guerra
  lexicon: HALOT
  rationale: La imagen es de llenarse con carros de guerra. «Carros» comunica el referente militar y mantiene una formulación cercana al hebreo; «carros de guerra» aclara, pero añade más de lo requerido.
- source_word: הַפָּרָשִׁים
  english_pob_choice: the horsemen
  chosen_spanish: los jinetes
  alternatives_spanish:
  - los caballeros
  - la caballería
  - los soldados a caballo
  lexicon: HALOT
  rationale: El término alude a tropas montadas. «Jinetes» es transparente y evita la ambigüedad moderna de «caballería» como arma o cuerpo militar.
- source_word: שֹׁת שָׁתוּ
  english_pob_choice: took their positions
  chosen_spanish: se apostaron
  alternatives_spanish:
  - se colocaron
  - tomaron posiciones
  - se estacionaron
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto y verbo finito intensifica la acción. En español, «se apostaron» recoge bien la idea de emplazamiento deliberado y su tono militar.
- source_word: הַשָּׁעְרָה
  english_pob_choice: at the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - a la puerta
  - junto a la puerta
  - en la entrada
  lexicon: HALOT
  rationale: Aunque el hebreo puede marcar dirección o ubicación, el contexto de despliegue militar favorece una ubicación establecida. «Puerta» es la equivalencia más natural en español bíblico para la puerta de la ciudad.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa muestran alto acuerdo y no registran revisiones aplicadas; por eso la redacción española sigue de cerca la escena militar sin introducir matices no atestiguados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - «Carros» conserva el referente militar de רָכֶב sin especificar más allá de lo que exige el contexto.
  - La nota conserva la alternativa verbal importante derivada de la construcción hebrea enfática.
