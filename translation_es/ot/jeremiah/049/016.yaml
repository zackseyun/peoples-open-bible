translation:
  language: es
  text: El terror que inspiras[a] te ha engañado, la arrogancia de tu corazón[b]— tú que habitas en las hendiduras de la peña[c], que ocupas la altura de la colina. Aunque pongas tu nido en lo alto, como el águila, desde allí te haré bajar, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu terror» o «tu horror»; el hebreo puede referirse tanto al terror que Edom inspira como a su carácter temible o reputación.'
    reason: alternative_reading
  - marker: b
    text: 'O: «la soberbia de tu corazón»; el hebreo permite un matiz de orgullo o presunción insolente.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «en las hendiduras de la peña», evocando las fortalezas montañosas aparentemente inexpugnables de Edom.'
    reason: cultural_note
lexical_decisions:
- source_word: תִּפְלַצְתְּ/ךָ
  english_pob_choice: the terror you inspire
  chosen_spanish: el terror que inspiras
  alternatives_spanish:
  - tu terror
  - tu horror
  lexicon: HALOT
  rationale: En contexto, el sustantivo no describe solo un estado interno, sino la impresión temible que Edom produce. «El terror que inspiras» conserva ese valor relacional y evita reducirlo a miedo subjetivo.
- source_word: הִשִּׁיא אֹתָךְ
  english_pob_choice: has deceived you
  chosen_spanish: te ha engañado
  alternatives_spanish:
  - te ha extraviado
  - te ha seducido
  lexicon: HALOT
  rationale: El hifil de נשׁא aquí expresa desvío por engaño. «Te ha engañado» es natural en español y mantiene la fuerza causal del hebreo.
- source_word: זְדוֹן לִבֶּךָ
  english_pob_choice: the arrogance of your heart
  chosen_spanish: la arrogancia de tu corazón
  alternatives_spanish:
  - el orgullo de tu corazón
  - la presunción de tu corazón
  lexicon: HALOT
  rationale: זְדוֹן comunica soberbia insolente o presuntuosa. «Arrogancia» preserva el matiz moral; «de tu corazón» mantiene la expresión antropológica hebrea.
- source_word: שֹׁכְנִי בְּחַגְוֵי הַסֶּלַע
  english_pob_choice: you who dwell in the clefts of the rock
  chosen_spanish: tú que habitas en las hendiduras de la peña
  alternatives_spanish:
  - tú que vives en las hendiduras de la peña
  - moradora de las hendiduras de la peña
  lexicon: HALOT
  rationale: La frase describe el lugar fortificado de Edom. «Hendiduras de la peña» comunica el sentido de «clefts of the rock» con un español claro y digno.
- source_word: תֹּפְשִׂי מְרוֹם גִּבְעָה
  english_pob_choice: who occupy the height of the hill
  chosen_spanish: que ocupas la altura de la colina
  alternatives_spanish:
  - que tomas la altura de la colina
  - que te apoderas de la altura de la colina
  lexicon: HALOT
  rationale: El participio expresa poseer/ocupar una elevación. «Ocupas la altura de la colina» sigue el ajuste revisado en el inglés POB y suena más natural que un verbo de asalto en español.
- source_word: כִּי
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Incluso si
  - Pues
  lexicon: HALOT
  rationale: Aquí la partícula introduce sentido concesivo. «Aunque» reproduce bien esa relación sin perder la dependencia de la acción divina posterior.
- source_word: תַגְבִּיהַ כַּנֶּשֶׁר קִנֶּךָ
  english_pob_choice: you make your nest as high as the eagle
  chosen_spanish: pongas tu nido tan alto como el águila
  alternatives_spanish:
  - eleves tu nido como el águila
  - hagas tu nido tan alto como el águila
  lexicon: HALOT
  rationale: El hifil de גבה conserva la idea de elevar. En español, «pongas tu nido tan alto como el águila» mantiene la imagen y evita una calca pesada.
- source_word: מִשָּׁם אֽוֹרִידְךָ
  english_pob_choice: from there I will bring you down
  chosen_spanish: desde allí te haré bajar
  alternatives_spanish:
  - desde allí te bajaré
  - desde allí te derribaré
  lexicon: HALOT
  rationale: El hifil de ירד expresa causar el descenso. «Te haré bajar» conserva la direccionalidad y la reversión del orgullo exaltado.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: «Yahvé» en el texto principal. «Declara» reproduce la fórmula profética נְאֻם de manera solemne y natural.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - dice Yahvé
  rationale: El paquete fuente y las normas del proyecto mandan transliterar el Tetragrámaton como «Yahvé» en el texto principal, conservando la identidad del nombre pactal sin el disfraz de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the opening noun phrase
  english_pob_reading: The terror you inspire
  chosen_spanish_reading: El terror que inspiras
  alternative_spanish_readings:
  - Tu terror
  - Tu horror
  rationale: La ambigüedad hebrea puede apuntar al terror que Edom inspira o al carácter terrible de Edom. En español, la forma elegida mantiene abierta esa tensión y evita resolverla unilateralmente.
  doctrine_reference: HALOT; English POB footnote a
- issue: Concessive force of כִּי
  english_pob_reading: Though
  chosen_spanish_reading: Aunque
  alternative_spanish_readings:
  - Incluso si
  - Porque
  rationale: La cláusula no es meramente causal; expresa concesión frente a la soberbia fortificada. «Aunque» preserva esa relación sin añadir contenido interpretativo.
  doctrine_reference: HALOT; English POB contextual reading
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB en el ajuste de תֹּפְשִׂי מְרוֹם גִּבְעָה, prefiriendo «ocupar»/«habitas» en vez de un verbo de asalto. También mantengo la tensión léxica documentada para תִּפְלַצְתְּ/ךָ y זְדוֹן לִבֶּךָ sin simplificarlas a una sola lectura.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «corazón» para לֵב/לִבֵּךָ, siguiendo el valor antropológico hebreo.
  - Se traduce el lugar fortificado con lenguaje geográfico concreto («hendiduras de la peña», «altura de la colina») sin espiritualizarlo.
  - La cláusula final mantiene la asimetría del descenso divino frente a la autoexaltación humana.
