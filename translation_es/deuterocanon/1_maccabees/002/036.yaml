translation:
  language: es
  text: Y no les respondieron[a], ni les arrojaron una piedra, ni bloquearon los escondites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los lugares ocultos» o «los lugares secretos». La expresión griega probablemente se refiere a lugares de ocultamiento más que a personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: did not answer
  chosen_spanish: no les respondieron
  alternatives_spanish:
  - no les contestaron
  - no les dieron respuesta
  lexicon: LSJ
  rationale: El verbo griego significa responder o contestar. En español, «no les respondieron» mantiene la relación directa con el complemento indirecto «les» y conserva el tono de confrontación breve del contexto.
- source_word: λίθον
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - piedra
  lexicon: LSJ
  rationale: Se conserva el singular, como en el griego y en la auditoría inglesa, para reflejar la imagen concreta de un solo proyectil arrojado o no arrojado.
- source_word: ἐνετίναξαν
  english_pob_choice: hurl
  chosen_spanish: arrojaron
  alternatives_spanish:
  - lanzaron
  - tiraron
  lexicon: LSJ
  rationale: El verbo expresa una acción violenta de lanzar. «Arrojaron» comunica bien esa fuerza en español sin sonar forzado.
- source_word: ἐνέφραξαν
  english_pob_choice: block up
  chosen_spanish: cerraron
  alternatives_spanish:
  - taparon
  - obstruyeron
  - cerraron por completo
  lexicon: LSJ
  rationale: Aquí el objeto son los lugares de ocultamiento; «cerraron» es una forma natural y fiel de expresar la idea de bloquear o clausurar el acceso, sin añadir más de lo que el griego exige.
- source_word: τοὺς κρυφούς
  english_pob_choice: the hiding places
  chosen_spanish: los lugares de escondite
  alternatives_spanish:
  - los lugares ocultos
  - los lugares secretos
  - los escondites
  lexicon: LSJ
  rationale: La expresión griega apunta a lugares de ocultamiento más que a personas. «Lugares de escondite» mantiene ese sentido espacial y táctico, evitando reducirlo a una mera abstracción.
translation_notes:
  revision_awareness: El texto griego y el auditable inglés concuerdan estrechamente; se ha mantenido la secuencia negativa triple y el singular de «piedra». La única zona de variación relevante es τοὺς κρυφούς, donde se optó por una solución española natural que conserva el matiz espacial de escondite.
  spanish_consistency_notes:
  - Se preservó la negación repetida con «ni... ni... ni...» para reflejar la estructura del griego.
  - Se evitó una paráfrasis expansiva; cada miembro del paralelismo corresponde a un elemento del original.
  - Se usó «respondieron» en plural concordando con el sujeto implícito del contexto y «les» para αὐτοῖς.
  - «Lugares de escondite» mantiene el sentido táctico de refugio u ocultamiento documentado en la nota inglesa.
