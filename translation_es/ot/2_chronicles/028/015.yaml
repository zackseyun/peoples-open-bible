  text: וַ/יָּקֻ֣מוּ הָ/אֲנָשִׁים֩ אֲשֶׁר נִקְּב֨וּ בְ/שֵׁמ֜וֹת וַ/יַּחֲזִ֣יקוּ בַ/שִּׁבְיָ֗ה וְ/כָֽל מַעֲרֻמֵּי/הֶם֮ הִלְבִּ֣ישׁוּ מִן הַ/שָּׁלָל֒ וַ/יַּלְבִּשׁ֣וּ/ם וַ֠/יַּנְעִלוּ/ם וַ/יַּאֲכִל֨וּ/ם וַ/יַּשְׁק֜וּ/ם וַ/יְסֻכ֗וּ/ם וַ/יְנַהֲל֤וּ/ם בַּ/חֲמֹרִים֙ לְ/כָל כּוֹשֵׁ֔ל וַ/יְבִיא֛וּ/ם יְרֵח֥וֹ עִיר הַ/תְּמָרִ֖ים אֵ֣צֶל אֲחֵי/הֶ֑ם וַ/יָּשׁ֖וּבוּ שֹׁמְרֽוֹן־־־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/028/015.yaml
  text: Then the men who had been designated by name stood up and took charge of the captives[a], and from the spoil they clothed all who were naked among them. They clothed them, put sandals on them, fed them, gave them drink, anointed them, and led all the feeble among them on donkeys. They brought them to Jericho, the city of palm trees, to their brothers; then they returned to Samaria.
  footnotes:
