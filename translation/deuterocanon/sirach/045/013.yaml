translation:
  text: Before him there had not been such garments[a], and no foreigner will ever wear them; only his sons and his descendants throughout their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult in the latter half of the verse: literally, something like ''He entrusted/confirmed [it] to him and to his sons likewise, and so his sons for their generations.'' The Greek parallel clarifies the sense as an exclusion of any foreigner and an inclusion of Aaron''s sons and descendants alone.'
    reason: alternative_reading
lexical_decisions:
- source_word: לפניו
  chosen: Before him
  alternatives:
  - In his presence
  - Prior to him
  lexicon: HALOT
  rationale: 'The Hebrew preposition with pronominal suffix most naturally marks temporal priority here: no one before Aaron had such vestments. ''Before him'' preserves the compact Hebrew while allowing the temporal sense. The Greek parallel πρὸ αὐτοῦ supports this.'
- source_word: לא היה כן
  chosen: there had not been such
  alternatives:
  - there was nothing like this
  - it had not been so
  lexicon: HALOT
  rationale: The idiom states that nothing comparable had existed previously. 'There had not been such' is concise and idiomatic in English, matching both the Hebrew and the Greek τοιαῦτα.
- source_word: ὡραῖα / implied Hebrew sense of the priestly attire
  chosen: beautiful garments
  alternatives:
  - splendid things
  - beautiful vestments
  - glorious attire
  lexicon: BDAG/HALOT
  rationale: The extant Hebrew line is compressed and the Greek explicitly supplies ὡραῖα ('beautiful/fine things'). In context, the referent is the high-priestly clothing described in the surrounding verses, so 'beautiful garments' makes the implicit object explicit for readable English without overparaphrasing.
- source_word: זר / ἀλλογενής
  chosen: foreigner
  alternatives:
  - outsider
  - stranger
  - one of another family
  lexicon: HALOT/BDAG
  rationale: Both the Hebrew and Greek indicate someone outside the authorized priestly line. 'Foreigner' is the most natural concise rendering, while the following clause clarifies that only Aaron's line may wear the garments.
- source_word: לעולם
  chosen: ever
  alternatives:
  - for eternity
  - forever
  lexicon: HALOT
  rationale: In the negative clause 'will ever wear them' conveys the force of perpetual exclusion in idiomatic English.
- source_word: ילבשם
  chosen: will wear them
  alternatives:
  - will put them on
  - will be clothed in them
  lexicon: HALOT
  rationale: The verb לבש means to wear or put on clothing. 'Will wear them' is the most natural English expression in this context.
- source_word: האמין לו
  chosen: only his sons
  alternatives:
  - he entrusted it to him and to his sons
  - he confirmed it for him and his sons
  lexicon: HALOT
  rationale: 'The Hebrew as transmitted is difficult here and appears shorter than the Greek. The Greek parallel explicitly reads ''except his sons only, and his descendants continually.'' Because the verse''s sense is about restricted priestly inheritance, the main text follows the clearer combined sense: exclusion of outsiders, inclusion of Aaron''s sons alone. The more literal but uncertain Hebrew wording is preserved in a footnote.'
- source_word: לבניו... בניו לדורותם / τὰ ἔκγονα αὐτοῦ διὰ παντός
  chosen: and his descendants continually
  alternatives:
  - and his offspring for all generations
  - and his descendants forever
  lexicon: HALOT/BDAG
  rationale: The Hebrew mentions 'his sons ... for their generations,' and the Greek expands with 'his descendants continually.' 'His descendants continually' captures the ongoing hereditary force in smooth English.
