    issue: El período condicional en español usa subjuntivo imperfecto + condicional
    rationale: '«Si subiera un zorro, derribaría...» introduce una hipótesis potencial más remota que el hebreo y que la traducción inglesa auditada. La burla funciona mejor con presente/futuro: «si un zorro se sube..., derribará...».'
  - severity: medium
    issue: La nota al pie a está anclada en «él» pero en el POB inglés la nota a corresponde a פרץ / la acción de derribar o abrir brecha
    rationale: La evidencia inglesa preserva una alternativa léxica para el verbo «break through / break down», no para «was beside him». En español debe mantenerse esa razón documentada.
  - severity: low
    issue: No se explicita el referente implícito de «sube»
    rationale: El inglés hizo explícito «on it» para claridad. En español, «se sube a él» o «se sube encima» evita una leve aspereza referencial sin añadir significado.
  - severity: low
    issue: «Aun eso que están construyendo» es entendible pero algo menos idiomático
    rationale: «Hasta lo que están construyendo» o «Incluso lo que están construyendo» suena más natural en español actual y conserva el tono despectivo.
