translation:
  language: es
  text: Por sus labios el pecador será atrapado[a], y el injuriador y el orgulloso tropezarán por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será dejado atrás» o «será abandonado». El verbo griego también puede entenderse más literalmente así, pero aquí el contexto sugiere la idea de quedar atrapado o arruinado por sus propias palabras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τοῖς χείλεσιν αὐτοῦ
  english_pob_choice: By his lips
  chosen_spanish: Por sus labios
  alternatives_spanish:
  - En sus labios
  - Con sus labios
  - Por su boca
  lexicon: BDAG
  rationale: 'La preposición ἐν admite un matiz instrumental o locativo según el contexto. Aquí, como en la decisión inglesa, conviene un español idiomático de medio/agencia: «por sus labios». «Labios» conserva la imagen concreta del habla mejor que «boca».'
- source_word: καταλειφθήσεται
  english_pob_choice: will be caught
  chosen_spanish: será atrapado
  alternatives_spanish:
  - será dejado atrás
  - será abandonado
  - será enredado
  lexicon: LSJ
  rationale: El verbo puede significar literalmente «ser dejado» o «abandonado», pero en este contexto sapiencial, unido al paralelismo con «tropezarán», la idea probable es quedar atrapado o arruinado por las propias palabras. «Será atrapado» comunica esa fuerza idiomática sin exagerar.
- source_word: ἁμαρτωλός
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - un pecador
  - el hombre pecador
  lexicon: BDAG
  rationale: El sustantivo singular funciona de modo genérico y proverbial. En español, «el pecador» mantiene ese valor sentencioso y la concisión del original.
- source_word: λοίδορος
  english_pob_choice: the reviler
  chosen_spanish: el calumniador
  alternatives_spanish:
  - el injuriador
  - el insultador
  - el ultrajador
  lexicon: BDAG
  rationale: «Loídoros» apunta a quien habla con abuso o insulto. Dado el contexto de palabras destructivas, «calumniador» comunica bien el habla dañina y es natural en español, aunque también puede leerse en sentido más amplio como injurioso.
- source_word: ὑπερήφανος
  english_pob_choice: the proud
  chosen_spanish: el orgulloso
  alternatives_spanish:
  - el arrogante
  - el altivo
  - el soberbio
  lexicon: BDAG
  rationale: «El orgulloso» es claro y fiel al sentido moral de autoexaltación. Se conserva el tono proverbial y no se fuerza un término más técnico que el texto no exige.
- source_word: σκανδαλισθήσονται
  english_pob_choice: will stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - serán hechos tropezar
  - caerán
  - se escandalizarán
  lexicon: BDAG
  rationale: En contexto sapiencial, el verbo expresa caída o fracaso más que el sentido técnico de «escandalizarse». «Tropezarán» mantiene la metáfora corporal de caída y es natural en español.
- source_word: ἐν αὐτοῖς
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - en ellos
  - a causa de ellos
  - por medio de ellos
  lexicon: BDAG
  rationale: El pronombre remite a los labios/las palabras. «Por ellos» expresa la idea instrumental y conserva el paralelismo con la primera mitad del versículo.
theological_decisions:
- issue: Sentido de la caída provocada por la propia խոսa / speech
  english_pob_reading: the sinner will be caught; the reviler and the proud will stumble by them
  chosen_spanish_reading: el pecador será atrapado… tropezarán por ellos
  alternative_spanish_readings:
  - el pecador será dejado atrás… tropezarán en ellos
  - el pecador será abandonado… caerán por ellos
  rationale: 'No hay una decisión doctrinal específica, pero sí una tensión lexical: el griego permite «ser dejado/abandonado», mientras que el contexto favorece una imagen de ruina causada por las propias palabras. La traducción española conserva esa lectura contextual sin convertirla en una paráfrasis libre.'
  doctrine_reference: Sabiduría proverbial; ninguna doctrina explícita
translation_notes:
  revision_awareness: Se siguió la lectura óptimo-equivalente del audit trail inglés y se mantuvo el posible doble valor de καταλειφθήσεται en una nota, sin perder la imagen sapiencial de ruina provocada por el habla.
  spanish_consistency_notes:
  - Se preserva el plural instrumental «por ellos» para vincularlo con «labios»/palabras.
  - Se evitó «boca» para mantener la concreción del original y la coherencia con el audit trail.
  - Se eligieron términos de uso bíblico amplio y contemporáneo, sin recurrir a una máscara litúrgica innecesaria.
