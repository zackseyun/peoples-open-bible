  - Se conservan imágenes políticas concretas («tronos», «cetros», «reinéis») en lugar de suavizarlas, para respetar la fuerza del original.
  - La nota sobre τύραννοι preserva la tensión semántica sin resolverla artificialmente en el texto principal.
