    changes_summary: Changed 'raise a battle cry' to 'sound an alarm' to more accurately reflect וְהָרִיעוּ in this warning context and to fit the parallel with blowing the horn.
translation:
  language: es
  text: Toquen un cuerno en Sion, y den la alarma en mi monte santo; tiemblen todos los habitantes del país[a], porque viene el día de Yahvé; ciertamente, está cerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los habitantes de la tierra». El hebreo אֶרֶץ puede significar «país» o «tierra», según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּקְעוּ
  english_pob_choice: Blow
  chosen_spanish: Tocad
  alternatives_spanish:
  - Haced sonar
  - Tocad con fuerza
  lexicon: HALOT
  rationale: Con שׁוֹפָר, el hebreo pide la acción de hacer sonar el instrumento. En español, 'tocad' comunica de forma natural y bíblica la acción instrumental sin cargarla con un calco excesivo.
- source_word: שׁוֹפָר
  english_pob_choice: horn
  chosen_spanish: trompeta
  alternatives_spanish:
  - cuerno
  - cuerno de carnero
  lexicon: HALOT
  rationale: Aunque el objeto es el shofar, 'trompeta' resulta más inteligible en español general y conserva la función de señal. Se evita 'cuerno' por posible ambigüedad y 'cuerno de carnero' por pesadez innecesaria en esta línea.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: '''Sion'' es la forma asentada en español bíblico y sigue siendo plenamente comprensible; mantiene la referencia locativa sin introducir una grafía menos usual.'
- source_word: וְהָרִיעוּ
  english_pob_choice: sound an alarm
  chosen_spanish: dad la alarma
  alternatives_spanish:
  - clamad
  - tocad la alarma
  - levantad un clamor
  lexicon: HALOT
  rationale: El verbo tiene fuerza de alarma o grito de aviso, no solo de 'gritar'. 'Dad la alarma' reproduce bien el matiz de urgencia del contexto junto al sonido del shofar.
- source_word: בְּהַר קָדְשִׁי
  english_pob_choice: on my holy mountain
  chosen_spanish: en mi monte santo
  alternatives_spanish:
  - sobre mi monte santo
  - en mi monte sagrado
  lexicon: HALOT
  rationale: '''Monte santo'' mantiene el sintagma bíblico natural en español y conserva el referente de Sion como lugar consagrado a Yahvé. ''En'' refleja mejor la localización que ''sobre'' en este contexto.'
- source_word: יִרְגְּזוּ
  english_pob_choice: let ... tremble
  chosen_spanish: tiemblen
  alternatives_spanish:
  - estremézcanse
  - se estremezcan
  - tiemblen de miedo
  lexicon: HALOT
  rationale: El hebreo expresa temblor/agitación ante el anuncio. 'Tiemblen' transmite tanto el sobresalto físico como el temor inminente sin añadir una emoción no explicitada.
- source_word: כֹּל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: all the inhabitants of the land
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todos los habitantes de la tierra/país
  - todos los moradores de la tierra
  - todos los habitantes del país
  lexicon: HALOT
  rationale: '''אָרֶץ'' admite ''tierra'' o ''país/land''. Dado el alcance profético de Joel y la amplitud del giro, ''tierra'' preserva la posible extensión general sin perder la coherencia con Sion y el monte santo.'
- source_word: כִּי בָא
  english_pob_choice: for ... is coming
  chosen_spanish: porque viene
  alternatives_spanish:
  - pues viene
  - porque está viniendo
  lexicon: HALOT
  rationale: El perfecto profético en este contexto anuncia llegada inminente. 'Viene' es natural en español y conserva la inmediatez de la acción.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahveh
  - el día de Yavé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: ''Yahvé''. En español bíblico, ''el día de Yahvé'' comunica con claridad la fórmula profética.'
- source_word: כִּי קָרוֹב
  english_pob_choice: indeed, it is near
  chosen_spanish: porque está cerca
  alternatives_spanish:
  - pues está cerca
  - sí, está cerca
  - porque es inminente
  lexicon: HALOT
  rationale: La repetición causal/enfática de כִּי se preserva con 'porque'. 'Está cerca' reproduce el valor temporal de קָרוֹב sin sobreinterpretar con 'inminente'.
theological_decisions:
- issue: Extensión de הָאָרֶץ
  english_pob_reading: land, with earth preserved as an alternative
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - land
  rationale: El texto puede referirse al ámbito local de Judá y también resonar universalmente. 'Tierra' conserva esa ambigüedad entre territorio y mundo habitado, sin cerrar el sentido en una sola dirección.
  doctrine_reference: Preservar la tensión interpretativa documentada por POB.
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se aplica el estándar del proyecto para el nombre pactual divino. 'Yahvé' mantiene la referencia al Nombre propio sin ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del audit trail inglés, especialmente la corrección de la acción de alarma en וְהָרִיעוּ. También conserva la decisión revisada de expresar יְהוָה con el Nombre divino y no con una máscara titulada.
  spanish_consistency_notes:
  - 'Se mantuvo la coordinación imperativa del hebreo con dos llamados paralelos: tocar y dar la alarma.'
  - '''Sion'' y ''monte santo'' siguen el registro bíblico habitual en español sin perder la precisión topográfica y cultual.'
  - Se evitó 'Señor' para יְהוָה conforme al estándar del proyecto.
  - 'El cierre con ''porque'' reproduce la doble motivación del hebreo: causal y enfática.'
