translation:
  language: es
  text: Cuando Esaú tenía cuarenta años, tomó por esposas[a] a Judit, hija de Beeri el hitita, y a Basemat, hija de Elón el hitita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «tomó una esposa: Judit ... y Basemat ...». El hebreo usa el singular «esposa/mujer» antes de nombrar a dos mujeres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: When ... was
  chosen_spanish: Cuando ... tenía
  alternatives_spanish:
  - Y aconteció que ... tenía
  - Ahora ... tenía
  lexicon: HALOT
  rationale: La forma narrativa introduce una circunstancia temporal. En español, 'Cuando Esaú tenía...' expresa con naturalidad el marco temporal sin forzar una calca de 'y aconteció'.},{
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el análisis auditado en inglés: mantiene la referencia temporal, conserva el valor matrimonial de וַיִּקַּח אִשָּׁה y refleja la identificación étnica con ''el hitita''. No hay revisiones aplicadas en el pasaje fuente.'
  spanish_consistency_notes:
  - Se usó 'Esaú' para el nombre propio, conforme a la convención española usual.
  - Se tradujo הַחִתִּי como 'el hitita' por la fuerza del artículo en la identificación gentilicia.
  - '''tomó por esposas'' preserva el sentido matrimonial plural que el contexto inmediato exige.'
  - Se mantuvieron 'Judit', 'Basemat', 'Beeri' y 'Elón' como transliteraciones estándar en español.
