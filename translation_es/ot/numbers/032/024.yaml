translation:
  language: es
  text: Construyan para ustedes ciudades para sus niños pequeños[a], y cercados[b] para sus rebaños, y hagan lo que ha salido de sus bocas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cumplan lo que han prometido». El hebreo dice literalmente: «hagan lo que ha salido de sus bocas», un modismo para poner por obra la palabra dada.'
    reason: lexical_alternative
  - marker: b
    text: «Cercados» también puede traducirse «corrales» o «cercos» para el ganado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנוּ
  english_pob_choice: Build
  chosen_spanish: Construyan
  alternatives_spanish:
  - Levanten
  - Construyan
  lexicon: HALOT
  rationale: El imperativo plural pide una orden directa. «Construyan» conserva el valor de mandato y funciona de manera natural en español, sin perder la fuerza de construcción física del hebreo.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para ustedes mismos
  - para ustedes
  lexicon: HALOT
  rationale: El hebreo expresa beneficio/encargo para el propio grupo. En español, «para ustedes» comunica bien la destinación; añadir «mismos» sería posible, pero no necesario para mantener la naturalidad.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - ciudades
  lexicon: HALOT
  rationale: «Ciudades» es la correspondencia directa y habitual de עָרִים en este contexto de asentamiento. «Pueblos» sería más interpretativo y menos preciso aquí.
- source_word: לְטַפְּכֶם
  english_pob_choice: for your little ones
  chosen_spanish: para sus pequeños
  alternatives_spanish:
  - para sus pequeños hijos
  - para sus niños
  lexicon: HALOT
  rationale: La base semántica es «los pequeños / los de corta edad». «Sus pequeños» preserva la concreción y evita ampliar innecesariamente a «dependientes» o restringirlo demasiado a «niños».
- source_word: וּגְדֵרֹת
  english_pob_choice: and enclosures
  chosen_spanish: y cercados
  alternatives_spanish:
  - y enclosures
  - y corrales
  - y cercados
  lexicon: HALOT
  rationale: «Cercados» comunica un espacio vallado para ganado y mantiene la amplitud de «enclosures». «Corrales» sería posible, pero más específico y menos abarcador que el hebreo.
- source_word: לְצֹנַאֲכֶם
  english_pob_choice: for your flocks
  chosen_spanish: para sus rebaños
  alternatives_spanish:
  - para sus ganados
  - para sus rebaños
  lexicon: HALOT
  rationale: צֹאן designa ganado menor, especialmente ovejas y cabras, colectivamente. «Rebaños» es idiomático en español y conserva la referencia pastoral.
- source_word: וְהַיֹּצֵא מִפִּיכֶם
  english_pob_choice: and what has gone out from your mouth
  chosen_spanish: y hagan lo que ha salido de su boca
  alternatives_spanish:
  - y hagan lo que ha salido de su boca
  - y cumplan lo que han prometido
  - y hagan lo que salió de su boca
  lexicon: HALOT
  rationale: El hebreo usa una idiomática imagen de la palabra que «sale de la boca». Se conserva la imagen literal en el texto para no borrar la tensión entre idioma y sentido; la frase permite entenderse como compromiso verbal sin sustituirla por una paráfrasis.
- source_word: תַּעֲשׂוּ
  english_pob_choice: do
  chosen_spanish: hagan
  alternatives_spanish:
  - hagan
  - cumplan
  - realicen
  lexicon: HALOT
  rationale: «Hagan» mantiene la brevedad y la relación directa con el complemento verbal. «Cumplan» explicita el sentido de fidelidad a la promesa, pero ya queda sugerido por el idiomismo anterior.
theological_decisions:
- issue: La cláusula final es un modismo de obligación de palabra dada, no solo una acción genérica.
  english_pob_reading: The Hebrew reads literally, 'do what has gone out from your mouth,' an idiom for carrying out one's spoken word.
  chosen_spanish_reading: 'Se mantiene la imagen literal: «hagan lo que ha salido de su boca», de modo que el lector perciba el carácter de palabra comprometida.'
  alternative_spanish_readings:
  - cumplan lo que han prometido
  - hagan lo que dijeron
  rationale: El hebreo no solo pide hacer algo, sino ser fiel a lo ya dicho. Traducirlo directamente conserva la fuerza moral y pactal del dicho sin borrar la metáfora corporal de la boca.
  doctrine_reference: Fidelidad al voto / integridad de la palabra dada (cf. Núm 30; Dt 23:21-23)
- issue: La referencia a los destinatarios puede entenderse como hijos pequeños o miembros vulnerables del grupo.
  english_pob_reading: for your little ones
  chosen_spanish_reading: para sus pequeños
  alternative_spanish_readings:
  - para sus hijos pequeños
  - para sus niños
  rationale: El hebreo טַף es más amplio que «hijos» y apunta a los pequeños del clan o casa. «Sus pequeños» deja abierto ese alcance sin exagerarlo.
  doctrine_reference: Cuidado del hogar / protección de los vulnerables
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido consolidado del texto hebreo y del control de calidad en inglés, sin cambios sustantivos respecto del consenso auditado. Se mantiene la imagen idiomática de «lo que ha salido de su boca» y la referencia pastoral de «cercados» para no perder la tensión lexical documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí no aparece, por lo que no se introduce.
  - Se conserva el imperativo plural español con sujeto implícito, acorde con el hebreo.
  - «Pequeños» mantiene el matiz de טַף mejor que una traducción más interpretativa.
  - La imagen de la boca se deja literal para respetar el modismo y permitir la lectura de promesa o voto.
  - «Cercados» evita imponer de antemano una sola clase de estructura ganadera.
