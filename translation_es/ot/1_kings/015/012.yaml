translation:
  language: es
  text: Quitó de la tierra[a] a los prostitutos de culto[b], y quitó todos los ídolos[c] que sus padres[d] habían hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expulsó». El verbo hebreo puede significar hacer salir de un lugar; por eso la idea es quitar o expulsar.
    reason: lexical_alternative
  - marker: b
    text: Hebreo קְדֵשִׁים, varones asociados con práctica sexual cultual ilícita. La traducción tradicional «sodomitas» es menos precisa para este término.
    reason: lexical_alternative
  - marker: c
    text: El término hebreo para «ídolos» es despectivo y puede sugerir «ídolos detestables» o incluso «ídolos de estiércol».
    reason: lexical_alternative
  - marker: d
    text: O «sus antepasados» / «sus antecesores». «Sus padres» es un modismo hebreo para generaciones anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֵר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - expulsó
  - hizo salir
  lexicon: HALOT
  rationale: El hifil de עבר aquí puede expresar hacer salir de un lugar o remover. En español, «quitó» comunica bien la acción de sacar del territorio sin obligar a una imagen demasiado técnica; «expulsó» sería posible, pero sugiere más claramente expulsión violenta, y «removió» suena algo más abstracto.
- source_word: הַקְּדֵשִׁים
  english_pob_choice: the male cult prostitutes
  chosen_spanish: a los hombres dedicados al culto sexual ilícito
  alternatives_spanish:
  - a los prostitutos cultuales
  - a los hombres cultuales
  - a los sodomitas
  lexicon: HALOT
  rationale: El término hebreo designa varones vinculados a práctica sexual cultual ilícita. En español, una traducción literal como «prostitutos cultuales» es precisa pero dura; «hombres dedicados al culto sexual ilícito» conserva la referencia masculina y la función cultual sin introducir un término técnico poco natural. Se evita «sodomitas» por ser más interpretativo y menos exacto lexicalmente.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: del país
  alternatives_spanish:
  - de la tierra
  - de la región
  - del territorio
  lexicon: HALOT
  rationale: «Land» en este contexto apunta al territorio nacional de Judá. «País» es una forma natural en español para ese sentido político-territorial. «Tierra» conserva más literalmente el hebreo, pero en español puede sonar más ambigua.
- source_word: וַיָּסַר
  english_pob_choice: he took away
  chosen_spanish: apartó
  alternatives_spanish:
  - quitó
  - eliminó
  - removió
  lexicon: HALOT
  rationale: El segundo verbo intensifica la acción de apartar/eliminar objetos idolátricos. «Apartó» evita repetir «quitó» y comunica la remoción de aquello que debía ser apartado del culto y de la comunidad.
- source_word: כָּל הַגִּלֻּלִים
  english_pob_choice: all the idols
  chosen_spanish: todos los ídolos
  alternatives_spanish:
  - todos los ídolos detestables
  - todos los ídolos de estiércol
  - todas las imágenes ídolas
  lexicon: HALOT
  rationale: גִּלּוּלִים es un término despectivo para ídolos. En el texto principal, «ídolos» es claro y publicable; el matiz peyorativo se conserva en la decisión teológica/lexical y podría expresarse en nota. «Ídolos detestables» o imágenes más fuertes sonarían poco naturales en español.
- source_word: אֲשֶׁר עָשׂוּ אֲבֹתָיו
  english_pob_choice: that his fathers had made
  chosen_spanish: que sus padres habían hecho
  alternatives_spanish:
  - que sus antepasados habían hecho
  - que sus antecesores habían hecho
  - que sus padres hicieron
  lexicon: HALOT
  rationale: «Sus padres» reproduce el hebreo idiomático para generaciones anteriores. «Antepasados» explicita el sentido pero pierde el eco del texto fuente; «habían hecho» refleja anterioridad respecto a la reforma de Asa.
theological_decisions:
- issue: Término despectivo גִּלּוּלִים
  english_pob_reading: all the idols
  chosen_spanish_reading: todos los ídolos
  alternative_spanish_readings:
  - todos los ídolos detestables
  - todos los ídolos de estiércol
  rationale: 'La POB inglesa conserva el referente principal en «idols» y traslada el matiz fuerte a una nota. En español se sigue el mismo criterio: el cuerpo del texto permanece claro y readable, mientras que el desprecio implícito del hebreo se documenta sin forzar una expresión extraña.'
  doctrine_reference: Principio POB de claridad pública con notas para matices lexicográficos
- issue: אֲבֹתָיו como idiom de generaciones anteriores
  english_pob_reading: his fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus forefathers
  rationale: En español, «sus padres» puede seguir funcionando como idiomático y fiel al hebreo. No se neutraliza el plural masculino porque el texto apunta a los predecesores varones en la línea generacional. «Antepasados» sería más explícito, pero menos cercano al fraseo original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Renderización del grupo cultual masculino
  english_pob_reading: male cult prostitutes
  chosen_spanish_reading: hombres dedicados al culto sexual ilícito
  alternative_spanish_readings:
  - prostitutos cultuales
  - varones cultuales
  rationale: Se preserva la referencia a varones y al ámbito cultual, evitando tanto el eufemismo como el término tradicional «sodomitas», que puede desplazar el sentido lexical hacia una categoría moral posterior. El español elegido comunica la función sin perder la tensión del hebreo.
  doctrine_reference: HALOT / criterio POB de precisión léxica
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y la decisión inglesa auditada, sin cambios relevantes respecto del sentido básico: remoción de los varones vinculados al culto sexual ilícito y de todos los ídolos fabricados por las generaciones anteriores. Se mantiene la tensión léxica de קְדֵשִׁים y גִּלּוּלִים mediante notas, como en la POB inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque el hebreo de este tramo no lo contiene.
  - Se usa «padres» como equivalente idiomático de אֲבֹתָיו, coherente con el español bíblico pero sin recurrir automáticamente a «antepasados» en el texto principal.
  - La estructura verbal española evita repetir el mismo verbo para ambos movimientos, siguiendo el matiz diferenciado de los dos verbos hebreos.
  - No se introduce lenguaje eclesiástico tradicional ajeno al hebreo; se prioriza la precisión léxica y la legibilidad pública.
