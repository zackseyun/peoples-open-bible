translation:
  language: es
  text: Entonces Hananías el profeta tomó el yugo del cuello de Jeremías el profeta y lo quebró[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la barra» o «la barra del yugo». El término hebreo puede referirse a la pieza de madera del yugo; aquí se traduce «yugo» porque el acto simbólico del pasaje gira en torno a un yugo puesto sobre Jeremías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - llevó
  - quitó
  lexicon: HALOT
  rationale: לקח en narración con waw consecutiva expresa la acción simple de tomar; en español, «tomó» comunica bien la acción sin añadir violencia que no está explícita en el verbo.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Ananías
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio con la forma española más reconocible y transparente, Hananías, sin alterar la identidad del personaje.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: נָבִיא se traduce de manera directa como «profeta». Se mantiene el aposición definida en ambos casos para preservar el énfasis retórico del hebreo.
- source_word: הַמּוֹטָה
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - la barra
  - la barra del yugo
  - el yugo-barra
  lexicon: HALOT
  rationale: Aunque el término hebreo puede designar una barra o vara, el contexto inmediato del signo profético exige «yugo», porque Jeremías lo llevaba sobre sí. Esa elección sigue la decisión auditada en inglés.
- source_word: מֵעַל
  english_pob_choice: from off
  chosen_spanish: de sobre
  alternatives_spanish:
  - de encima de
  - de sobre de
  - de encima
  lexicon: HALOT
  rationale: La preposición comunica remoción desde encima de algo. «De sobre» conserva la imagen espacial del hebreo y su fuerza física sin sonar excesivamente rígido.
- source_word: צַוַּאר
  english_pob_choice: the neck
  chosen_spanish: el cuello
  alternatives_spanish:
  - el cuello de
  lexicon: HALOT
  rationale: «Cuello» es el equivalente natural en español para צַוַּאר. Evita un calco innecesario y mantiene la imagen corporal concreta del texto.
- source_word: יִרְמְיָה
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías el profeta
  lexicon: transliteración estándar
  rationale: Se usa la forma española tradicional del nombre propio, sin perder la identificabilidad del personaje bíblico.
- source_word: וַיִּשְׁבְּרֵהוּ
  english_pob_choice: and broke it
  chosen_spanish: y lo quebró
  alternatives_spanish:
  - y lo rompió
  - y lo partió
  - y lo destruyó
  lexicon: HALOT
  rationale: שׁבר significa «romper/quebrar». «Quebró» conserva mejor la contundencia verbal y la correspondencia léxica con el hebreo que «rompió», sin exagerar la violencia con «destrozó» o «shattered».
translation_notes:
  revision_awareness: La versión inglesa revisada suavizó «from off the neck» a «from the neck» por naturalidad, sin cambiar el sentido. La redacción española conserva esa naturalidad con «de sobre el cuello», manteniendo la imagen espacial del hebreo y la claridad narrativa.
  spanish_consistency_notes:
  - Se conserva la repetición de «el profeta» en ambos nombres, como en el hebreo y en la auditable estrategia inglesa.
  - Se evita «Señor» u otros sustitutos porque este versículo no contiene el Nombre divino.
  - «Yugo» se usa como término principal por el contexto; la alternativa más literal queda documentada en la nota.
  - «Quebró» mantiene el paralelo con el verbo hebreo de romper sin recargar el verso con una intensificación innecesaria.
