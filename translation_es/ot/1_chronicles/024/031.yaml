translation:
  language: es
  text: 'Estos también echaron suertes[a] junto a sus hermanos, los hijos de Aarón, ante el rey David, Sadoc, Ahimelec, y los jefes de las casas paternas de los sacerdotes y de los levitas: las casas paternas de los principales, por igual con las de sus hermanos menores.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «correspondiendo a sus hermanos, los hijos de Aarón». La expresión hebrea puede denotar estar enfrente de, corresponder a, o estar junto a.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «las casas paternas del principal, correspondiendo a su hermano menor». Los singulares probablemente son distributivos y expresan que las ramas familiares principales y las menores fueron tratadas por igual al echar las suertes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפִּילוּ ... גּוֹרָלוֹת
  english_pob_choice: cast lots
  chosen_spanish: echaron sus suertes
  alternatives_spanish:
  - lanzaron suertes
  - sortearon
  lexicon: HALOT
  rationale: El hebreo expresa el acto de sorteo mediante el verbo causativo con 'suertes'; en español, 'echar suertes' es idiomático, claro y conserva el procedimiento sin volverlo mecánico.
- source_word: גַם הֵם
  english_pob_choice: These also
  chosen_spanish: Estos también
  alternatives_spanish:
  - Ellos también
  - Aun ellos
  lexicon: HALOT
  rationale: Retoma a los grupos levíticos mencionados antes y subraya que ellos igualmente participaron en el sorteo. 'Estos también' mantiene el enlace discursivo natural.
- source_word: לְעֻמַּת אֲחֵיהֶם בְּנֵי אַהֲרֹן
  english_pob_choice: alongside their brothers, the sons of Aaron
  chosen_spanish: junto a sus hermanos, los hijos de Aarón
  alternatives_spanish:
  - correspondiendo a sus hermanos, los hijos de Aarón
  - enfrente de sus hermanos, los hijos de Aarón
  lexicon: HALOT
  rationale: לְעֻמַּת puede significar 'correspondiente a', 'opuesto a' o 'junto a'. En este contexto administrativo de reparto por suertes, 'junto a' comunica la disposición paralela sin imponer una tecnicidad que el español no exige.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: en presencia de
  alternatives_spanish:
  - delante de
  - ante
  lexicon: HALOT
  rationale: Indica el carácter público y oficial del acto. 'En presencia de' suena natural en español y conserva la idea de un testimonio formal.
- source_word: דָוִיד הַמֶּלֶךְ
  english_pob_choice: King David
  chosen_spanish: David, el rey
  alternatives_spanish:
  - el rey David
  - David el rey
  lexicon: HALOT
  rationale: Se mantiene la identificación real, pero se elige un orden natural en español que sigue el valor del título sin perder la referencia histórica.
- source_word: וְצָדוֹק וַאֲחִימֶלֶךְ
  english_pob_choice: Zadok, Ahimelech
  chosen_spanish: de Sadoc y de Ahimelec
  alternatives_spanish:
  - Zadoc y Ahimelec
  - Sadoc y Ahimelec
  lexicon: HALOT
  rationale: Los nombres se transliteran en forma española usual; se conserva la coordinación de testigos del acto.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los cabezas de las casas paternas
  - los jefes de las familias
  lexicon: HALOT
  rationale: '''Casas paternas'' refleja la estructura clánica hebrea; ''jefes'' comunica liderazgo sin borrar la organización genealógica.'
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  english_pob_choice: of the priests and of the Levites
  chosen_spanish: de los sacerdotes y de los levitas
  alternatives_spanish:
  - para los sacerdotes y los levitas
  - de los sacerdotes y de los levitas
  lexicon: HALOT
  rationale: La preposición 'de' expresa la relación de pertenencia o referencia de las casas paternas sin sobreinterpretar la función.
- source_word: אָבוֹת הָרֹאשׁ
  english_pob_choice: the fathers’ houses of the chief
  chosen_spanish: las casas paternas de los principales
  alternatives_spanish:
  - las casas paternas de los jefes
  - las casas paternas principales
  lexicon: HALOT
  rationale: El hebreo es compacto y distributivo; el español necesita explicitar que se trata de las ramas principales o mayores del linaje. 'Principales' evita confundirlo con un adjetivo meramente honorífico.
- source_word: לְעֻמַּת אָחִיו הַקָּטָן
  english_pob_choice: equally with those of their younger brothers
  chosen_spanish: por igual con las de sus hermanos menores
  alternatives_spanish:
  - correspondientes a su hermano menor
  - igualmente con las de su hermano menor
  lexicon: HALOT
  rationale: Se preserva la tensión distributiva entre las ramas principales y las menores. El plural español sigue el sentido colectivo del contexto y evita perder la comparación entre ramas familiares.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada del inglés POB, especialmente en el cierre distributivo: se conserva la oposición entre las casas paternas de los principales y las de sus hermanos menores, evitando una paráfrasis más libre que borraría la estructura del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto cuando el hebreo contiene el nombre divino, pero este versículo no lo incluye.
  - '''Casas paternas'' se mantiene de forma consistente para traducir la estructura social de אָבוֹת.'
  - '''Suertes'' conserva el lenguaje bíblico del sorteo y evita modernizarlo excesivamente.'
  - 'Los nombres propios se adaptan a formas españolas estándar: David, Sadoc, Ahimelec.'
