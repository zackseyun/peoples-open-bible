translation:
  language: es
  text: Desde allí Abraham partió hacia el Negev y se estableció entre Cades y Sur[a]; residió como forastero en Gerar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el sur». El hebreo puede referirse tanto a la región meridional llamada Negev como a un movimiento general hacia el sur; el texto principal conserva la referencia geográfica más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  english_pob_choice: journeyed
  chosen_spanish: partió
  alternatives_spanish:
  - viajó
  - se puso en camino
  - se trasladó
  lexicon: HALOT
  rationale: El hebreo נסע en esta forma narrativa expresa salir de un lugar y emprender viaje. «Partió» transmite el movimiento sin sonar forzado en español y mantiene la progresión narrativa.
- source_word: מִשָּׁם
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - Desde ese lugar
  - De allí
  lexicon: HALOT
  rationale: Es un deíctico simple que remite al sitio anterior. «Desde allí» es natural en español y conserva la referencia espacial.
- source_word: אַרְצָה הַנֶּגֶב
  english_pob_choice: toward the Negev
  chosen_spanish: hacia el Negev
  alternatives_spanish:
  - hacia el sur
  - a la región del Negev
  - en dirección al Negev
  lexicon: HALOT
  rationale: La forma direccional de אַרצה indica movimiento hacia una región. «Negev» se conserva como nombre geográfico; «hacia» mantiene el valor direccional. Se evita reducirlo a «sur» para no borrar la referencia territorial.
- source_word: וַיֵּשֶׁב
  english_pob_choice: settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - se quedó
  - residió
  lexicon: HALOT
  rationale: ישב puede significar habitar o establecer residencia. «Se estableció» comunica asentamiento de manera natural y refleja mejor que un simple «vivió» la idea de fijar residencia.
- source_word: בֵּין קָדֵשׁ וּבֵין שׁוּר
  english_pob_choice: between Kadesh and Shur
  chosen_spanish: entre Cades y Sur
  alternatives_spanish:
  - entre Kadesh y Shur
  - entre Cades y Shur
  lexicon: HALOT
  rationale: 'Se transliteran los topónimos con adaptación española habitual: Cades y Sur. Esto favorece la lectura en español sin perder la identificación geográfica.'
- source_word: וַיָּגָר
  english_pob_choice: sojourned
  chosen_spanish: habitó como forastero
  alternatives_spanish:
  - sojournó
  - residió como extranjero
  - vivió temporalmente
  lexicon: HALOT
  rationale: גור incluye la idea de residir como extranjero o residente temporal. «Habitó como forastero» conserva esa tensión semántica mejor que solo «habitó» o «vivió», y evita perder el matiz de extranjería que el POB inglés preserva con «sojourned».
- source_word: בִּגְרָר
  english_pob_choice: in Gerar
  chosen_spanish: en Gerar
  alternatives_spanish:
  - en Guerar
  - en Gerar
  lexicon: HALOT
  rationale: Se mantiene el nombre de lugar con la forma más reconocible en español bíblico. La preposición locativa simple «en» corresponde al hebreo.
translation_notes:
  revision_awareness: El registro coincide sustancialmente con la versión inglesa auditada; no se observaron revisiones aplicadas en el pass más reciente. Se conserva la decisión principal de tratar אַרץ/הַנֶּגֶב como referencia geográfica y no como mera dirección cardinal.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis narrativa simple y en pasado perfecto simple, acorde con el hebreo wayyiqtol.
  - «Negev» se conserva como topónimo/región; «Sur» solo aparece en la nota como alternativa interpretativa.
  - «Forastero» se emplea para reflejar el matiz de residencia temporal/extranjera de גור, en continuidad con el valor lexical documentado.
