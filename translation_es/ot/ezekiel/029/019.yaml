revisions:
- from: 'Por tanto, así dice el Señor Yahvé: He aquí, estoy entregando la tierra de Egipto a Nabucodonosor, rey de Babilonia; él se llevará su multitud[a], saqueará su botín y arrebatará su presa; y será salario para su ejército.'
  to: 'Por tanto, así dice el Señor, Yahvé: He aquí, estoy entregando la tierra de Egipto a Nabucodonosor, rey de Babilonia; él se llevará su multitud[a], saqueará su botín y arrebatará su presa; y servirá de paga para su ejército.'
