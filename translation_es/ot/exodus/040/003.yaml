translation:
  language: es
  text: Y pondrás allí el arca del testimonio[a], y pondrás delante del arca la cortina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, en algunas versiones, 'el arca del pacto', pero el hebreo aquí dice 'del testimonio'.
    reason: alternative_reading
  - marker: b
    text: O 'el velo'. El hebreo פָּרֹכֶת se refiere a la cortina interior del tabernáculo que hacía separación delante del arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  english_pob_choice: And you shall place
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - y colocarás
  - y pondrás allí
  lexicon: HALOT
  rationale: El hebreo introduce una instrucción en secuencia; en español, el futuro con valor imperativo expresa bien el mandato. 'Pondrás' es natural y fiel, y mantiene el tono cultual de la orden.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Conserva la referencia deíctica al lugar ya mencionado en el contexto del tabernáculo. 'Allí' es claro y no añade especificación innecesaria.
- source_word: אֲרוֹן הָעֵדוּת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del pacto
  - el arca del testimonio
  lexicon: HALOT
  rationale: Se sigue el sustantivo hebreo עֵדוּת ('testimonio') en lugar de armonizar con la frase tradicional 'del pacto'. 'Arca' es el término español bíblico normal para אֲרוֹן.
- source_word: וְסַכֹּתָ
  english_pob_choice: and you shall screen
  chosen_spanish: cubrirás
  alternatives_spanish:
  - cubrirás con un separador
  - resguardarás
  - pondrás como pantalla
  lexicon: HALOT
  rationale: Aunque el POB inglés usa 'screen', en español 'cubrir' transmite de forma natural la función de la cortina como barrera cultual sin sonar artificial. Se evita 'pantalla', que sería moderno pero poco bíblico; el matiz de separación queda explicado en la nota.
- source_word: הַפָּרֹכֶת
  english_pob_choice: the curtain
  chosen_spanish: la cortina
  alternatives_spanish:
  - el velo
  lexicon: HALOT
  rationale: פָּרֹכֶת designa la cortina interior del tabernáculo. 'Cortina' comunica con claridad su función espacial; 'velo' se conserva como alternativa tradicional por su resonancia intertextual.
theological_decisions:
- issue: Nombre tradicional del arca
  english_pob_reading: the ark of the testimony
  chosen_spanish_reading: el arca del testimonio
  alternative_spanish_readings:
  - el arca del pacto
  rationale: La decisión preserva el término explícito del hebreo עֵדוּת. Se evita la formulación tradicional 'del pacto' porque no es la expresión del texto base aquí y podría ocultar el matiz de 'testimonio'.
  doctrine_reference: Éxodo 40:3; filosofía de traducción POB §1, §5
- issue: Función de פָּרֹכֶת
  english_pob_reading: the curtain
  chosen_spanish_reading: la cortina
  alternative_spanish_readings:
  - el velo
  rationale: No hay diferencia doctrinal, pero sí una tensión lexical entre claridad moderna y resonancia tradicional. 'Cortina' es más transparente para la función arquitectónica del tabernáculo; 'velo' queda como alternativa válida.
  doctrine_reference: Éxodo 40:3; filosofía de traducción POB §6
translation_notes:
  revision_awareness: El texto inglés auditado está en concordancia alta con el hebreo y no muestra cambios revisados. La versión española sigue esa misma lectura, conservando la diferencia entre עֵדוּת (‘testimonio’) y la designación tradicional ‘pacto’, y manteniendo el valor funcional de סכך mediante ‘cubrir’ con nota explicativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefiere 'arca' para אֲרוֹן y 'cortina' para הַפָּרֹכֶת, con 'velo' como alternativa tradicional documentada.
  - Se conserva un registro bíblico claro y moderno, sin calco excesivo del inglés ni sustitución por formulaciones eclesiales no motivadas por el hebreo.
