base_translation:
  language: en
  yaml_path: translation/ot/proverbs/012/004.yaml
  text: A wife of noble character is her husband's crown[b][a], but she who brings shame is like rot in his bones.
  footnotes:
  - marker: a
    text: Or 'a capable wife,' 'a valiant wife,' or 'an excellent wife.' The Hebrew חַיִל carries a broad sense including strength, worth, competence, and excellence.
    reason: lexical_alternative
  - marker: b
    text: Literally 'like rot in his bones,' a figure for deep inward ruin or corrosive disgrace.
    reason: cultural_note
