translation:
  language: es
  text: Degollaron a los hijos de Sedequías delante de sus ojos[a], y le sacó los ojos a Sedequías, lo ató con grillos de bronce y lo llevó a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cegaron a Sedequías». El verbo hebreo puede significar «cegar», pero en este contexto probablemente alude al acto físico de sacar los ojos.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁחֲטוּ
  english_pob_choice: slaughtered
  chosen_spanish: mataron
  alternatives_spanish:
  - degollaron
  - sacrificaron
  lexicon: HALOT
  rationale: El hebreo expresa una muerte violenta y brutal. En español, «mataron» conserva la referencia básica sin sonar artificial; «degollaron» añade una especificidad que el contexto no exige, y «sacrificaron» sería engañoso.
- source_word: לְעֵינָיו
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - en su presencia
  lexicon: HALOT
  rationale: La idiomática hebrea indica que la acción ocurrió en la vista directa de Sedequías. «Delante de sus ojos» preserva la vividez y la relación corporal con la escena.
- source_word: עִוֵּר
  english_pob_choice: put out ... eyes
  chosen_spanish: le sacó los ojos
  alternatives_spanish:
  - lo dejó ciego
  - lo cegó
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «cegar», en este contexto narrativo violento y unido explícitamente a «los ojos», la referencia más concreta es a la mutilación física. «Le sacó los ojos» conserva esa fuerza sin suavizarla.
- source_word: וַיַּאַסְרֵהוּ
  english_pob_choice: bound him
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo sujetó
  - lo encadenó
  lexicon: HALOT
  rationale: El verbo expresa atar o sujetar. Como el complemento inmediato especifica el tipo de restricción, «lo ató» funciona de forma directa y natural en español.
- source_word: בַנְחֻשְׁתַּיִם
  english_pob_choice: with bronze fetters
  chosen_spanish: con cadenas de bronce
  alternatives_spanish:
  - con grillos de bronce
  - con esposas de bronce
  lexicon: HALOT
  rationale: El término designa una forma de sujeción metálica. «Cadenas de bronce» comunica la idea con claridad en español moderno; «grillos» o «esposas» podrían resultar demasiado específicos o menos naturales según el lector.
- source_word: וַיְבִאֵהוּ בָּבֶל
  english_pob_choice: brought him to Babylon
  chosen_spanish: lo llevó a Babilonia
  alternatives_spanish:
  - lo trajo a Babilonia
  - lo condujo a Babilonia
  lexicon: HALOT
  rationale: El verbo hebreo es un bring/common motion verb. «Lo llevó a Babilonia» es la forma más natural y fiel para la secuencia narrativa.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del texto inglés que añadió el pronombre singular «he» para reflejar el cambio desde el plural en la primera cláusula. En español también se refleja ese cambio, aunque de manera más natural mediante la repetición del sujeto implícito con verbos en tercera persona singular.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como nombre propio del destino final.
  - Se conserva el nombre «Sedequías» para el rey de Judá.
  - Se evitó el calco mecánico de «blindó»; el contexto exige una acción física más concreta.
  - La secuencia verbal respeta el contraste entre el sujeto plural implícito de la primera cláusula y el singular de las siguientes.
