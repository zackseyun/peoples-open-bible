translation:
  language: es
  text: No obstante[a], a causa de este asunto has despreciado por completo a Yahvé, el hijo que te ha nacido ciertamente morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Muchas traducciones entienden esta cláusula como «has despreciado a los enemigos de Yahvé» o como «has dado ocasión a los enemigos de Yahvé para blasfemar» o «para despreciar», siguiendo una lectura interpretativa o una enmienda del hebreo difícil.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶפֶס
  english_pob_choice: Nevertheless
  chosen_spanish: No obstante
  alternatives_spanish:
  - Sin embargo
  - Pero
  lexicon: HALOT
  rationale: Conserva el giro concesivo fuerte que introduce una afirmación que matiza lo dicho antes. En español, «No obstante» suena natural y solemne sin debilitar la fuerza adversativa.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la consecuencia anunciada; «porque» expresa con claridad la relación causal en español moderno.
- source_word: נִאֵץ נִאַצְתָּ
  english_pob_choice: you have utterly despised
  chosen_spanish: has despreciado por completo
  alternatives_spanish:
  - has menospreciado totalmente
  - has mostrado un desprecio absoluto
  lexicon: HALOT
  rationale: La forma intensiva exige un refuerzo en español. «Despreciado por completo» conserva el valor de desprecio/contempto sin sobrecargar con una expresión demasiado interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio POB de transliterar el nombre divino como «Yahvé», preservando el nombre propio del texto hebreo en lugar de sustituirlo por un título.
- source_word: בַּדָּבָר הַזֶּה
  english_pob_choice: by this matter
  chosen_spanish: por este asunto
  alternatives_spanish:
  - por esta causa
  - en este asunto
  lexicon: HALOT
  rationale: דָבָר aquí apunta al hecho o asunto en cuestión. «Por este asunto» resulta natural y suficientemente amplio para el incidente narrado.
- source_word: הַבֵּן הַיִּלּוֹד לְךָ
  english_pob_choice: the son born to you
  chosen_spanish: el hijo que te ha nacido
  alternatives_spanish:
  - el hijo nacido para ti
  - el hijo nacido de ti
  lexicon: HALOT
  rationale: Se mantiene «hijo» para בן. La construcción relativa «que te ha nacido» suena natural en español y conserva la relación de nacimiento hacia David.
- source_word: מוֹת יָמוּת
  english_pob_choice: will surely die
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - morirá sin falta
  - morirá de seguro
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito expresa certeza enfática. «Ciertamente morirá» preserva esa fuerza sin sonar arcaico.
theological_decisions:
- issue: Lectura difícil de «אֹיְבֵי יְהוָה» en el contexto
  english_pob_reading: 'MT-based reading: David''s action has scorned ''the enemies of the LORD.'' The English audit later revised toward ''despised Yahweh'' as more likely in context.'
  chosen_spanish_reading: «has despreciado por completo a Yahvé»
  alternative_spanish_readings:
  - «has despreciado a los enemigos de Yahvé»
  - «has dado ocasión a los enemigos de Yahvé para despreciar»
  rationale: 'Dado el estado del audit trail y la revisión más reciente, la traducción principal sigue la lectura contextual más probable en español: el agravio recae sobre Yahvé. Las alternativas se preservan como posibilidad textual/interpretiva en una nota.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El primer borrador en inglés conservaba una lectura literal difícil sobre «los enemigos de Yahvé»; la revisión posterior del audit trail decidió que el sentido más probable en contexto es que David ha despreciado a Yahvé. La presente versión española sigue esa revisión, manteniendo la advertencia concesiva y la certeza enfática de la muerte.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» según el criterio del proyecto.
  - Se conserva «hijo» para בן, no «niño» ni «cría», por fidelidad al término hebreo y al contexto dinástico.
  - Se evita una paráfrasis expansiva en la cláusula causal para no borrar la dificultad textual documentada.
