translation:
  language: es
  text: Pero el rey de los amonitas no escuchó[a] las palabras que Jefté le envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Escuchó» aquí refleja el hebreo שָׁמַע; según el contexto, también puede entenderse como «no hizo caso de» o «no obedeció».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But ... did not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Sin embargo ... no
  lexicon: HALOT
  rationale: La negación con וְלֹא continúa la narración y añade contraste; en español, «Pero» transmite bien ese giro adversativo sin volver el texto forzado.
- source_word: שָׁמַע
  english_pob_choice: listen to
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - obedeció
  lexicon: HALOT
  rationale: En este contexto, el verbo rige un objeto directo de discurso («las palabras»), por lo que «escuchó» comunica mejor la idea de no prestar atención al mensaje. «Obedeció» sería más fuerte de lo que el hebreo exige aquí.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  english_pob_choice: the king of the Ammonites
  chosen_spanish: el rey de los amonitas
  alternatives_spanish:
  - el rey de los hijos de Amón
  - el rey del pueblo de Amón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «rey de los hijos de Amón», pero en español bíblico natural y claro la equivalencia idiomática es «el rey de los amonitas».
- source_word: אֶל דִּבְרֵי יִפְתָּח
  english_pob_choice: to the words that Jephthah sent
  chosen_spanish: las palabras que Jefté le envió
  alternatives_spanish:
  - las palabras de Jefté
  - el mensaje de Jefté
  lexicon: HALOT
  rationale: '«דִּבְרֵי» es literalmente «palabras de». Siguiendo el ajuste auditado del inglés, el relativo se integra de forma natural en español: «las palabras que Jefté le envió». '
- source_word: אֲשֶׁר שָׁלַח אֵלָיו
  english_pob_choice: that he sent to him
  chosen_spanish: que Jefté le envió
  alternatives_spanish:
  - que él le envió
  - que había enviado a él
  lexicon: HALOT
  rationale: El antecedente es Jefté; el español puede explicitarlo para evitar ambigüedad y conservar el sentido narrativo del hebreo sin añadir contenido nuevo.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por el texto hebreo y por la revisión inglesa más reciente: se mantiene el sujeto explícito («el rey de los amonitas») y la relación natural entre «las palabras» y el acto de Jefté de enviarlas, evitando una formulación ambigua. La elección de «escuchó» conserva la amplitud semántica de שָׁמַע sin sobretraducirlo.'
  spanish_consistency_notes:
  - Se usa «Jefté» como forma habitual y transparente del nombre propio.
  - Se prefirió «amonitas» por claridad idiomática, manteniendo el referente étnico del constructo hebreo.
  - La nota de pie de página preserva la tensión semántica de שָׁמַע sin imponer una sola lectura.
