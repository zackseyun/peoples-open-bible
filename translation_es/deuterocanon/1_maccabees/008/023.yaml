translation:
  language: es
  text: Que les vaya bien a los romanos y a la nación de los judíos, en el mar y en la tierra[a] para siempre; y que la espada[b] y el enemigo estén lejos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el mar y en tierra». El griego usa un par convencional de ámbitos para expresar bienestar en toda esfera.'
    reason: lexical_alternative
  - marker: b
    text: «Espada» probablemente funciona por metonimia para la guerra; el texto principal conserva el término concreto del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλῶς γένοιτο
  english_pob_choice: May it go well
  chosen_spanish: Que les vaya bien
  alternatives_spanish:
  - Que les sea bien
  - Que prospere para ellos
  lexicon: LSJ
  rationale: La forma optativa expresa un deseo o bendición. En español, «Que les vaya bien» transmite de manera natural ese valor volitivo sin perder solemnidad ni añadir interpretaciones ajenas.
- source_word: Ῥωμαίοις
  english_pob_choice: the Romans
  chosen_spanish: a los romanos
  alternatives_spanish:
  - a los Romanos
  lexicon: LSJ
  rationale: El dativo plural apunta al pueblo romano; en español, la preposición «a» marca adecuadamente el destinatario del deseo.
- source_word: τῷ ἔθνει τῶν Ἰουδαίων
  english_pob_choice: the nation of the Jews
  chosen_spanish: a la nación de los judíos
  alternatives_spanish:
  - al pueblo de los judíos
  - a la nación judía
  lexicon: LSJ
  rationale: ἔθνος conserva un sentido étnico-político de pueblo/nación. «Nación de los judíos» sigue de cerca la construcción griega y evita sustituirla por una formulación más interpretativa.
- source_word: ἐν τῇ θαλάσσῃ καὶ ἐπὶ τῆς ξηρᾶς
  english_pob_choice: on sea and on land
  chosen_spanish: en el mar y en la tierra
  alternatives_spanish:
  - en el mar y sobre la tierra
  - en el mar y en tierra
  lexicon: LSJ
  rationale: La expresión funciona como merismo para abarcar todas las esferas. «En el mar y en la tierra» es la forma más natural en español y conserva la oposición de ámbitos.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por los siglos
  lexicon: LSJ
  rationale: En este contexto de bendición/alianza, la expresión indica duración indefinida. «Para siempre» es claro y fiel sin volverla artificial.
- source_word: ῥομφαία
  english_pob_choice: sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada larga
  - la espada de guerra
  lexicon: LSJ
  rationale: El término griego nombra un arma concreta; «espada» preserva la imagen material que el texto mantiene, sin explicitar la función metonímica en el cuerpo del versículo.
- source_word: ἐχθρός
  english_pob_choice: enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - el adversario
  - el enemigo hostil
  lexicon: LSJ
  rationale: El singular funciona de modo colectivo o representativo. «El enemigo» es el equivalente más directo y mantiene la fuerza general del término.
- source_word: μακρυνθείη ἀπ' αὐτῶν
  english_pob_choice: be far from them
  chosen_spanish: estén lejos de ellos
  alternatives_spanish:
  - se alejen de ellos
  - se mantengan lejos de ellos
  lexicon: LSJ
  rationale: La optativa pasiva expresa un deseo de alejamiento. En español, «estén lejos de ellos» suena natural y conserva la idea de distancia sin introducir un agente no presente en el griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisión sustantiva; se mantiene la estructura de bendición y el paralelismo final entre «espada» y «enemigo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se usa «judíos» en coherencia con la referencia étnico-nacional del griego Ἰουδαίων; no se introduce lenguaje eclesial posterior.
  - Se preserva el tono de deseo/juramento en una formulación española idiomática, sin añadir interpretación doctrinal.
