review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: un futuro/resultativo profético, dos miembros paralelos, y los frutos de צדקה como paz, quietud y seguridad duradera. Sin embargo, se aparta innecesariamente del expediente inglés y de la evidencia léxica al convertir מַעֲשֵׂה en «efecto» en el texto principal y עֲבֹדַת en «fruto». El inglés auditado preserva deliberadamente «work»/«effect» y deja la alternativa de resultado en nota; en español conviene mantener esa misma lógica con «obra» y «efecto».'
  spanish_quality_summary: El español es natural y legible, con tono digno. «Quietud y seguridad para siempre» funciona bien. No obstante, la nota b está mal formulada porque ofrece como alternativa el mismo término ya usado en el texto («justicia»), cuando la verdadera alternativa documentada frente a צדקה es «rectitud» o, según el expediente inglés, la tensión «righteousness/justice». Además, «fruto» añade una imagen no explicitada por el hebreo y reduce la trazabilidad con el POB inglés.
  glossary_alignment: 'Alineación parcial. «Justicia» para הַצְּדָקָה es defendible en español por contexto profético, aunque el expediente inglés privilegia «righteousness» con nota sobre «justice»; por tanto no es error, pero debe explicarse mejor en nota. «Paz», «quietud», «seguridad» y «para siempre» están bien alineados. El problema principal es léxico-poético: «fruto» no corresponde al registro documentado de עֲבֹדַת ni a la revisión inglesa final.'
  issues:
  - severity: medium
    issue: מַעֲשֵׂה se tradujo como «efecto» en el texto principal.
    rationale: El expediente inglés escogió «work» como término principal y reservó «effect/result» para nota. En español, «obra» preserva mejor la amplitud de acción/resultado sin cerrar prematuramente el sentido.
  - severity: medium
    issue: וַעֲבֹדַת se tradujo como «fruto».
    rationale: «Fruto» suena natural, pero introduce una metáfora no auditada y se aleja del campo semántico documentado (service/labor/effect). «Efecto» o «resultado» mantiene mejor la relación con la revisión inglesa final y el paralelismo del versículo.
  - severity: medium
    issue: La nota b no ofrece una alternativa real al término del texto principal.
    rationale: 'Dice «O: ‘justicia’» cuando el texto ya usa «justicia». La nota debe aclarar que צדקה también puede entenderse como «rectitud», o explicar su amplitud semántica social y moral.'
  revised_spanish_text: Y la obra de la justicia será paz[a], y el efecto de la justicia[b], quietud y seguridad para siempre.
  revised_footnotes:
  - marker: a
    text: 'O: «el efecto/resultado de la justicia será paz». El hebreo מַעֲשֵׂה puede referirse tanto a la obra como a lo que produce.'
    reason: lexical_alternative
  - marker: b
    text: «Justicia» también puede traducirse «rectitud» aquí, ya que צדקה en contextos proféticos puede incluir tanto la rectitud moral como la justicia social.
    reason: alternative_reading
  revision_rationale: Se restauró «obra» para מַעֲשֵׂה, siguiendo la decisión auditada de mantener en el texto principal el valor amplio de acción/obra y reservar el matiz resultativo para nota. Se cambió «fruto» por «efecto» para reflejar mejor la revisión inglesa final de עֲבֹדַת y evitar una metáfora añadida. Se corrigió la nota sobre צדקה para que presente una alternativa real y útil en español.
