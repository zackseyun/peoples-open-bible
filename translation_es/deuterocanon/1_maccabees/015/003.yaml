  glossary_alignment: No hay términos teológicos de proyecto en juego. La revisión propuesta mantiene la decisión auditada de ἀντιποιήσασθαι como «recuperar» y conserva en notas las alternativas para λοιμοί, ἐξενολόγησα y κατεσκεύασα.
