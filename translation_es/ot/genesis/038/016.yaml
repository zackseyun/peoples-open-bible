base_translation:
  language: en
  yaml_path: translation/ot/genesis/038/016.yaml
  text: So he turned aside to her by the road and said[a], “Please, let me come in to you,” for he did not know that she was his daughter-in-law. And she said, “What will you give me[b], that you may come in to me?”
  footnotes:
  - marker: a
    text: Hebrew 'come in to you / me,' a euphemistic expression for sexual relations.
    reason: lexical_alternative
  - marker: b
    text: Or 'What will you pay me, that you may come in to me?' The Hebrew more literally says, 'What will you give me...?'
    reason: alternative_reading
