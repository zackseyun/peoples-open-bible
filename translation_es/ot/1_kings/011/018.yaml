revisions:
- from: Se levantaron de Madián y fueron a Parán, y tomaron hombres con ellos de Parán, y llegaron a Egipto, a Faraón, rey de Egipto; y él le dio una casa, le dijo[a] el pan, y le dio tierra.
  to: Se levantaron de Madián y fueron a Parán, y tomaron hombres con ellos de Parán, y fueron a Egipto, a Faraón, rey de Egipto, y él le dio una casa, le asignó alimento[a], y le dio tierra.
  rationale: 'Se corrige el único problema sustancial de fidelidad y legibilidad: el modismo hebreo sobre el pan no debe quedar como calco literal en el texto principal, sino expresarse como provisión asignada, conservando el literal en nota. También se ajusta «llegaron» a «fueron» para reflejar mejor la repetición narrativa hebrea y se suaviza la puntuación para una lectura más natural en español.'
