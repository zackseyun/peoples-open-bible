translation:
  language: es
  text: Un tercio de ti morirá por pestilencia y será consumido por la hambruna en medio de ti, y un tercio caerá a espada alrededor de ti, y un tercio yo esparciré a todo viento[a], y desenvainaré una espada tras ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a todo viento», un modismo que significa en todas direcciones.'
    reason: cultural_note
  - marker: b
    text: 'O: «sacaré una espada tras ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלִשִׁתֵיךְ / הַשְּׁלִשִׁית / הַשְּׁלִישִׁית
  english_pob_choice: a third
  chosen_spanish: un tercio
  alternatives_spanish:
  - una tercera parte
  - un tercio de ti
  lexicon: HALOT
  rationale: El hebreo repite la misma idea fraccionaria tres veces para estructurar el juicio en tres partes iguales. «Un tercio» es natural en español y conserva la repetición. En el primer miembro, «un tercio de ti» explicita el objeto del juicio sin alterar el sentido.
- source_word: דֶּבֶר
  english_pob_choice: pestilence
  chosen_spanish: pestilencia
  alternatives_spanish:
  - plaga
  - enfermedad
  lexicon: HALOT
  rationale: En contextos proféticos de juicio, el término denota enfermedad epidémica enviada como castigo. «Pestilencia» conserva mejor ese peso formal que «enfermedad» y es cercano al valor de «pestilence» del POB inglés.
- source_word: יָמוּתוּ
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirán
  - habrán de morir
  lexicon: HALOT
  rationale: El imperfecto profético se puede expresar en futuro simple. En español, el singular concuerda con el antecedente elíptico «un tercio» y mantiene la claridad.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  - famine
  lexicon: HALOT
  rationale: El sustantivo apunta a una situación de escasez devastadora. «Hambre» comunica el estado resultante de forma clara; «hambruna» sería también posible, pero «hambre» sigue de cerca el registro del texto y funciona bien con «será consumido».
- source_word: יִכְלוּ
  english_pob_choice: be consumed
  chosen_spanish: será consumido
  alternatives_spanish:
  - se agotará
  - perecerá
  lexicon: HALOT
  rationale: El verbo expresa quedar acabado o consumido. «Será consumido» conserva la fuerza del juicio y encaja de manera natural con «por el hambre».
- source_word: בְּתוֹכֵךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  - en tu interior
  lexicon: HALOT
  rationale: Dirigido a Jerusalén personificada en segunda persona femenina singular. «En medio de ti» es un giro natural en español bíblico contemporáneo y evita una literalidad menos idiomática.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - por guerra
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la espada como metonimia de muerte violenta en guerra. En español, «caer a espada» suena natural y mantiene el denso lenguaje profético.
- source_word: יִפְּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - caerán
  - será abatido
  lexicon: HALOT
  rationale: «Caer» es la traducción convencional y suficientemente transparente en contextos de juicio y batalla. Se ajusta aquí al antecedente singular elíptico en español.
- source_word: סְבִיבוֹתָיִךְ
  english_pob_choice: all around you
  chosen_spanish: alrededor de ti
  alternatives_spanish:
  - en torno a ti
  - a tu alrededor
  lexicon: HALOT
  rationale: El plural intensifica la idea de rodear. «Alrededor de ti» comunica bien esa fuerza distributiva en español.
- source_word: לְכָל רוּחַ
  english_pob_choice: to every wind
  chosen_spanish: a todo viento
  alternatives_spanish:
  - a cada viento
  - en todas direcciones
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal, que es un modismo para dispersión en cualquier dirección. El POB inglés también retiene esta imagen; en español, «a todo viento» resulta comprensible y poético.
- source_word: אֱזָרֶה
  english_pob_choice: I will scatter
  chosen_spanish: yo esparciré
  alternatives_spanish:
  - yo dispersaré
  - yo los esparciré
  lexicon: HALOT
  rationale: El verbo describe dispersar, con posible trasfondo de aventar o cribar. «Esparcir» es claro y conserva la imagen; el sujeto explícito «yo» reproduce el énfasis divino del hebreo.
- source_word: אָרִיק
  english_pob_choice: I will draw out
  chosen_spanish: desenvainaré
  alternatives_spanish:
  - sacaré
  - desenvainaré una espada
  lexicon: HALOT
  rationale: Con «espada» como complemento implícito en la línea siguiente, el idioma sugiere sacar o desenvainar la espada en persecución. «Desenvainaré» hace visible la imagen bélica que el inglés mantiene con «draw out» y evita una abstracción excesiva.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: detrás de ellos
  alternatives_spanish:
  - tras ellos
  - en pos de ellos
  lexicon: HALOT
  rationale: La preposición indica seguimiento o persecución de los dispersados. «Detrás de ellos» es literal y mantiene la secuencia imagética; la idea de persecución queda implícita por el contexto.
theological_decisions:
- issue: Dirección del discurso y personificación de Jerusalén
  english_pob_reading: Retain second-person feminine singular ('you/your') addressing Jerusalem as a personified city.
  chosen_spanish_reading: Mantener la segunda persona femenina singular («ti/te») dirigida a Jerusalén personificada.
  alternative_spanish_readings:
  - Nombrar explícitamente a «Jerusalén» dentro del versículo
  - Reformular en tercera persona
  rationale: El hebreo interpela directamente a la ciudad con formas femeninas singulares. Conservar ese discurso preserva la retórica profética sin añadir un sustantivo ausente del versículo.
  doctrine_reference: Principio de primacía del original; no explicar en el texto lo que el original deja implícito
- issue: Imagen concreta de juicio
  english_pob_reading: Preserve concrete images ('pestilence,' 'the sword,' 'to every wind') rather than flattening them into abstract paraphrase.
  chosen_spanish_reading: Conservar las imágenes concretas («pestilencia», «espada», «a todo viento») en vez de reducirlas a paráfrasis abstracta.
  alternative_spanish_readings:
  - «enfermedad», «guerra» y «en todas direcciones»
  - Omitir la imagen del viento
  rationale: La fuerza del pasaje depende de su imaginería profética. La equivalencia óptima en español aquí favorece retener esa concreción, porque es inteligible y no resuelve la tensión retórica del juicio.
  doctrine_reference: La traducción debe preservar la tensión profética y no neutralizarla
- issue: Antropomorfismo y lenguaje bélico sobre Yahvé
  english_pob_reading: I will draw out a sword after them.
  chosen_spanish_reading: «desenvainaré una espada detrás de ellos» mantiene el gesto bélico atribuido a Yahvé.
  alternative_spanish_readings:
  - «sacaré una espada tras ellos»
  - «perseguiré con espada»
  rationale: El hebreo usa una imagen corporal y militar. El español elegido conserva la acción sin suavizarla; así se respeta el tono de juicio divino sin convertirlo en mera abstracción.
  doctrine_reference: Lenguaje figurado del juicio divino; evitar atenuaciones innecesarias
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente más reciente; el estado de la traducción inglesa quedó sin cambios y con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino por defecto cuando el texto lo requiera en el contexto mayor; en este versículo no aparece explícitamente en la superficie española por no estar presente en el hebreo.
  - Se conserva el paralelismo de los tres tercios, con imágenes concretas de juicio.
  - «Pestilencia» se usa para el valor profético de דֶּבֶר; «hambre» traduce רָעָב sin convertirlo en un término más técnico que el texto no exige.
  - «A todo viento» conserva el modismo semítico y su sentido de dispersión universal.
