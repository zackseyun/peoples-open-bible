translation:
  language: es
  text: Porque las estrellas de los cielos y sus constelaciones[a] no darán su luz; el sol se oscurecerá al salir, y la luna no hará resplandecer su luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sus Orión(es)». El término hebreo puede referirse específicamente a Orión, pero aquí quizá funcione de modo más amplio para las constelaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación o fundamento del anuncio previo de juicio. «Porque» conserva bien la relación causal/discursiva en español y mantiene el tono profético.
- source_word: כוֹכְבֵי הַשָּׁמַיִם
  english_pob_choice: the stars of the heavens
  chosen_spanish: las estrellas de los cielos
  alternatives_spanish:
  - las estrellas del cielo
  - las estrellas celestiales
  lexicon: HALOT
  rationale: Respeta la construcción hebrea de genitivo y el plural solemne. «De los cielos» conserva el matiz elevado sin forzar una lectura técnica distinta.
- source_word: וּכְסִילֵיהֶם
  english_pob_choice: and their constellations
  chosen_spanish: y sus constelaciones
  alternatives_spanish:
  - y sus Oriones
  - y sus estrellas principales
  lexicon: HALOT
  rationale: כְּסִיל puede aludir específicamente a Orión, pero aquí el plural con sufijo favorece una referencia más amplia. «Constelaciones» preserva la amplitud del término sin cerrar la ambigüedad lexical.
- source_word: לֹא יָהֵלּוּ אוֹרָם
  english_pob_choice: will not give their light
  chosen_spanish: no darán su luz
  alternatives_spanish:
  - no harán brillar su luz
  - no resplandecerán con su luz
  lexicon: HALOT
  rationale: El verbo causativo comunica la emisión de luz. «Dar su luz» es idiomático en español y conserva la fuerza del original sin volverlo demasiado técnico.
- source_word: חָשַׁךְ הַשֶּׁמֶשׁ
  english_pob_choice: the sun will be darkened
  chosen_spanish: el sol será oscurecido
  alternatives_spanish:
  - el sol se oscurecerá
  - el sol quedará oscurecido
  lexicon: HALOT
  rationale: Mantiene el valor pasivo/eventivo del hebreo y refleja la solemnidad poética. «Oscurecido» corresponde bien al campo semántico de חָשַׁךְ.
- source_word: בְּצֵאתוֹ
  english_pob_choice: at its rising
  chosen_spanish: al salir
  alternatives_spanish:
  - al nacer
  - al levantarse
  lexicon: HALOT
  rationale: El hebreo literalmente dice «al salir/venir fuera», con referencia idiomática al amanecer. «Al salir» conserva esa imagen básica y evita resolverla de manera demasiado interpretativa.
- source_word: וְיָרֵחַ
  english_pob_choice: and the moon
  chosen_spanish: y la luna
  alternatives_spanish:
  - y la luna
  lexicon: HALOT
  rationale: Correspondencia directa y estándar del sustantivo.
- source_word: לֹא יַגִּיהַ אוֹרוֹ
  english_pob_choice: will not cause its light to shine
  chosen_spanish: no hará resplandecer su luz
  alternatives_spanish:
  - no causará que brille su luz
  - no hará que su luz alumbre
  lexicon: HALOT
  rationale: El causativo de נגהּ se conserva con una construcción natural en español. «Hará resplandecer» mantiene el matiz de causar brillo sin sonar mecánico.
theological_decisions:
- issue: Lenguaje de oscurecimiento cósmico
  english_pob_reading: Render as direct cosmic imagery without interpreting it in the translation as either purely literal astronomical collapse or merely metaphorical political upheaval.
  chosen_spanish_reading: Mantener la imagen cósmica directa, sin decidir en el texto principal si se trata de un colapso astronómico literal o de una figura profética de juicio histórico.
  alternative_spanish_readings:
  - Interpretarlo como lenguaje puramente figurado de derrota política
  - Interpretarlo como oscuridad cósmica literal al final de los tiempos
  rationale: El hebreo presenta una escena de des-creación en juicio. La traducción debe preservar la tensión teológica y la fuerza imagética sin resolverla en la redacción principal.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail en los verbos causativos y en el valor prospectivo del hebreo imperfecto, pero en español adopta un presente profético naturalizado con futuro donde corresponde: «no darán», «será oscurecido», «no hará resplandecer». Se conserva la ambigüedad lexical de כְּסִילֵי־הֶם con nota, como en el POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino explícito; este versículo no lo contiene.
  - Se mantiene «constelaciones» en vez de «Oriones» para no cerrar una ambigüedad lexical documentada.
  - «Cielos» se usa en plural por fidelidad al hebreo poético y por consistencia con el tono elevado del pasaje.
  - 'El orden y la puntuación reproducen el paralelismo del hebreo: estrellas/constelaciones, sol, luna.'
