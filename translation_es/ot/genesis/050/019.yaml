translation:
  language: es
  text: 'Pero José les dijo: «No teman, porque ¿acaso estoy yo en lugar de Dios?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Acaso estoy yo bajo Dios?». La expresión hebrea es idiomática; aquí lo más probable es que signifique «¿acaso estoy yo en el lugar de Dios?»
    reason: Preservar la alternativa léxica documentada en la POB inglesa y explicar el sentido idiomático del hebreo.
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les habló
  - respondió
  lexicon: HALOT
  rationale: En narrativa española, el wayyiqtol de אמר se expresa con naturalidad como «dijo». Mantiene el avance narrativo sin añadir matices no presentes en el hebreo.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El complemento indirecto pronominal «les» reproduce con naturalidad el destinatario del habla y evita una construcción más pesada sin perder el sentido del hebreo.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: convención onomástica
  rationale: Se usa la forma española establecida del nombre propio, equivalente a la convención inglesa auditada.
- source_word: אַל תִּירָאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se asusten
  lexicon: HALOT
  rationale: La negación imperativa conserva la fuerza directa del hebreo. «No teman» es breve, formal y fiel; además mantiene el registro solemne del discurso.
- source_word: הֲתַחַת אֱלֹהִים
  english_pob_choice: in the place of God
  chosen_spanish: ¿acaso estoy yo en lugar de Dios?
  alternatives_spanish:
  - ¿estoy yo en el lugar de Dios?
  - ¿estoy yo bajo Dios?
  lexicon: HALOT
  rationale: El hebreo es idiomático y la POB inglesa opta por «in the place of God». En español, «en lugar de Dios» comunica mejor la idea de ocupar el puesto o prerrogativa divina. Se conserva la interrogación retórica con «¿acaso...?» para reflejar el matiz enfático de אָֽנִי y la fuerza idiomática de הֲ.
theological_decisions:
- issue: Sentido del idiomático הֲתַחַת אֱלֹהִים
  english_pob_reading: Joseph denies that he occupies God's place as judge or avenger.
  chosen_spanish_reading: José niega que él ocupe el lugar de Dios como juez o vengador.
  alternative_spanish_readings:
  - José pregunta si está bajo la autoridad de Dios.
  - José se sitúa bajo Dios.
  rationale: La lectura más natural en contexto es la negación de usurpar el papel de Dios. El español «en lugar de Dios» preserva esa tensión teológica sin explicitar más de lo que el versículo dice. Se evita suavizar el dicho a una mera afirmación de subordinación.
  doctrine_reference: Preservar la distinción entre la prerrogativa divina y la acción humana; no resolver en exceso la pregunta retórica del texto.
translation_notes:
  revision_awareness: Alineado con la revisión más reciente sin cambios sustantivos; la redacción española sigue la lectura auditada de la POB inglesa y el hebreo masorético, especialmente en el giro idiomático de הֲתַחַת אֱלֹהִים.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים por sentido singular en este contexto.
  - Se usa «José» como forma española del nombre propio, en coherencia interna.
  - No se añade nota al pie porque la opción idiomática queda suficientemente expresada en el texto principal y no se requiere variante textual adicional.
