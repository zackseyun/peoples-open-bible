translation:
  text: Even earlier[a], letters were sent to Onias the high priest from Areus, who was ruling among you, saying, ‘You are our brothers,’ as the copy laid out here shows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as the copy below shows.' The Greek expression indicates that a copy of the earlier letter is being presented or appended.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι πρότερον
  chosen: Even earlier
  alternatives:
  - Previously
  - Before this
  lexicon: LSJ
  rationale: The phrase is comparative/temporal, indicating an earlier point before the present correspondence. 'Even earlier' preserves the emphatic sense of ἔτι with πρότερον in natural English.
- source_word: ἀπεστάλησαν ἐπιστολαὶ
  chosen: letters were sent
  alternatives:
  - a letter was sent
  - letters were dispatched
  lexicon: LSJ
  rationale: The Greek is plural, so 'letters' should be retained rather than singularizing. 'Were sent' is straightforward and idiomatic.
- source_word: πρὸς Ὀνίαν τὸν ἀρχιερέα
  chosen: to Onias the high priest
  alternatives:
  - to Onias, the high priest
  lexicon: LSJ
  rationale: Direct object of destination with title apposition. The English keeps the personal name transliterated and the title translated per project philosophy.
- source_word: παρὰ δʼ Ἀρείου
  chosen: from Areus
  alternatives:
  - by Areus
  lexicon: LSJ
  rationale: παρά with genitive here marks source/origin of the letters. 'From Areus' is the clearest rendering.
- source_word: τοῦ βασιλεύοντος ἐν ὑμῖν
  chosen: who was ruling among you
  alternatives:
  - your reigning king
  - who reigned over you
  - who was king among you
  lexicon: LSJ
  rationale: The participle modifies Areus. 'Who was ruling among you' preserves the verbal force without over-specifying constitutional nuance. 'Among you' follows ἐν ὑμῖν more closely than 'over you,' though the latter is possible.
- source_word: ὅτι ἐστὲ ἀδελφοὶ ἡμῶν
  chosen: that you are our brothers
  alternatives:
  - that you are our kindred
  - that you are our brothers and kin
  lexicon: LSJ
  rationale: ἀδελφοί here expresses claimed kinship between peoples. 'Brothers' is the direct lexical equivalent and preserves the source's masculine plural form per gender-accurate policy.
- source_word: ὡς τὸ ἀντίγραφον ὑπόκειται
  chosen: as the copy laid out here shows
  alternatives:
  - as the copy below shows
  - as the copy appended here shows
  - as the transcript lies before us
  lexicon: LSJ
  rationale: ἀντίγραφον is a copy/document transcript; ὑπόκειται idiomatically indicates something set forth or appended. 'Laid out here shows' communicates that a documentary copy follows or is presented, without forcing a specific physical layout.
