base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/044/017.yaml
  text: Noah was found righteous[a], blameless; at the time of destruction he became a substitute. Because of him a remnant remained[b], and by his covenant the flood ceased.
  footnotes:
  - marker: a
    text: The Greek parallel differs in the final clause, with a reading that points toward the coming of the flood rather than its cessation. The Hebrew witness used here reads, 'and by his covenant the flood ceased.'
    reason: textual_variant
  - marker: b
    text: Or 'an exchange,' 'compensation,' or 'ransom' for 'a substitute.' The Hebrew תחליף and Greek ἀντάλλαγμα both carry the idea of something given in place of another.
    reason: lexical_alternative
