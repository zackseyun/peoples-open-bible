translation:
  language: es
  text: '¡Ay de mí, por mi quebranto[a]! Mi herida es grave[b]. Pero yo dije: «Ciertamente esto es mi enfermedad[c], y la soportaré»[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Quebranto» traduce el sentido amplio de שבר: puede aludir a fractura, rotura o ruina, no solo a una lesión física.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «mi herida es incurable» o «mi herida es severa». La forma hebrea permite matices de gravedad, enfermedad o debilitamiento.
    reason: lexical_alternative
  - marker: c
    text: 'O: «esto es mi dolencia» o «esto es mi mal». חֳלִי puede referirse a enfermedad literal o a una aflicción comparada con enfermedad.'
    reason: lexical_alternative
  - marker: d
    text: El final puede leerse como «y la soportaré» o «y tendré que soportarla». El hebreo admite tanto simple futuro como resignación u obligación.
    reason: lexical_alternative
lexical_decisions:
- source_word: א֥וֹי
  english_pob_choice: Woe is me
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay de mí, pobre de mí!
  - ¡Ay de mí, por mí!
  lexicon: HALOT
  rationale: La interjección expresa lamento intenso. En español, «¡Ay de mí!» comunica de forma natural y solemne el clamor de aflicción sin suavizar el tono.
- source_word: עַל שִׁבְרִי
  english_pob_choice: because of my brokenness
  chosen_spanish: por causa de mi quebranto
  alternatives_spanish:
  - por mi herida
  - por mi ruina
  - a causa de mi fractura
  lexicon: HALOT
  rationale: שבר puede abarcar quebranto, fractura o ruina. «Quebranto» mantiene la imagen de ruptura y funciona bien en español, sin restringir indebidamente el sentido solo a una lesión física.
- source_word: נַחְלָה
  english_pob_choice: is grievous
  chosen_spanish: es grave
  alternatives_spanish:
  - es incurable
  - se ha debilitado
  - es severa
  lexicon: HALOT
  rationale: El verbo/forma comunica gravedad, enfermedad o debilidad. «Es grave» preserva la seriedad del cuadro y evita afirmar «incurable», que sería más interpretativo.
- source_word: מַכָּתִי
  english_pob_choice: my wound
  chosen_spanish: mi herida
  alternatives_spanish:
  - mi golpe
  - mi lesión
  - mi aflicción
  lexicon: HALOT
  rationale: מכה denota golpe, herida o plaga. «Mi herida» es el equivalente más natural en español dentro del contexto médico-metafórico del versículo.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - En verdad
  - Sin duda
  lexicon: HALOT
  rationale: Aquí introduce una evaluación afirmativa y resignada. «Ciertamente» reproduce bien el matiz aseverativo sin cargar el texto con interpretación adicional.
- source_word: חֳלִי
  english_pob_choice: my sickness
  chosen_spanish: mi enfermedad
  alternatives_spanish:
  - mi dolencia
  - mi mal
  - mi padecimiento
  lexicon: HALOT
  rationale: חלי designa enfermedad o dolencia. «Enfermedad» conserva el paralelismo con la imagen física del versículo y es claro para el lector contemporáneo.
- source_word: וְאֶשָּׂאֶנּוּ
  english_pob_choice: and I must bear it
  chosen_spanish: y la soportaré
  alternatives_spanish:
  - y tendré que soportarla
  - y la llevaré
  - y debo cargarla
  lexicon: HALOT
  rationale: נשא significa llevar, cargar o soportar. El perfecto/imperfectivo aquí admite tanto futuro como necesidad/resignación. «La soportaré» mantiene la ambigüedad entre aceptación y futuro, y suena natural en español.
translation_notes:
  revision_awareness: 'La versión inglesa auditada ya refleja una decisión estable: traducir el lamento inicial con valor exclamativo, mantener el campo semántico médico de las dos hemistiquios, y dejar abierto el final entre futuro y obligación/resignación. No se requieren revisiones textuales respecto al último pase.'
  spanish_consistency_notes:
  - Se mantuvo un registro solemnemente bíblico pero con español natural.
  - Se preservó la serie léxica de quebranto/herida/enfermedad para reflejar la progresión del hebreo.
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - El pronombre y los verbos se ajustaron al español para que el lamento suene idiomático, no calco del inglés.
