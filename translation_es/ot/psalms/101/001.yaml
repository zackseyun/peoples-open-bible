translation:
  language: es
  text: De David[a]. Un salmo. Cantaré de amor fiel y justicia[b]; te cantaré alabanzas, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «De David». En un título de salmo, la preposición puede indicar autoría, dedicación o asociación.'
    reason: alternative_reading
  - marker: b
    text: O «misericordia y juicio». Los términos hebreos también pueden traducirse más estrechamente así, pero «amor fiel y justicia» refleja mejor aquí su sentido más amplio de lealtad de pacto y rectitud ética.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los títulos de salmos puede indicar autoría, dedicación o asociación. «De David» conserva esa ambigüedad mejor que una formulación más específica como «por David», y suena natural en un encabezado español.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un cántico
  - Una composición musical
  lexicon: HALOT
  rationale: Es el término técnico normal para el encabezado del salmo. «Un salmo» comunica con claridad la categoría literaria y evita añadir matices no explícitos en el hebreo.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor constante
  alternatives_spanish:
  - amor leal
  - misericordia
  - amor fiel
  lexicon: HALOT
  rationale: חֶסֶד abarca amor de pacto, lealtad y misericordia. En español, «amor constante» mantiene el sentido relacional y duradero sin reducirlo a «misericordia» ni cargarlo de una fórmula eclesial menos transparente.
- source_word: וּמִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: En este paralelismo con חֶסֶד, el término apunta al orden recto y a la rectitud judicial/gubernamental. «Justicia» es la equivalencia española más natural y ampla, y evita estrechar el campo semántico a «juicio».
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: Cantaré
  alternatives_spanish:
  - Cantaré con gozo
  - Quiero cantar
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención o resolución. En español, «cantaré» transmite adecuadamente la decisión volitiva sin sonar forzado.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  lexicon: HALOT
  rationale: La preposición marca el destinatario directo del canto. «A ti» es la forma española más clara y natural para una dirección personal en segunda persona.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», siguiendo el criterio del proyecto de no enmascarar יְהוָה con un título. La forma es reconocible en español bíblico y mantiene el nombre personal del pacto.
- source_word: אֲזַמֵּרָה
  english_pob_choice: I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - haré música
  - entonaré alabanzas
  lexicon: HALOT
  rationale: זמר denota hacer música o cantar alabanza, con posible acompañamiento instrumental. «Cantaré alabanzas» refleja bien el valor de alabanza sin reducirlo a una simple repetición de אָשִׁירָה; además conserva un registro poético natural en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la línea doctrinal del proyecto, se translitera como «Yahvé» para preservar el nombre personal de Dios y evitar la sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de חֶסֶד en el paralelismo
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor constante
  alternative_spanish_readings:
  - misericordia
  - amor leal
  - fidelidad amorosa
  rationale: El par חֶסֶד / מִשְׁפָּט no se reduce adecuadamente a «misericordia y juicio». En este contexto de alabanza y carácter de Dios, «amor constante y justicia» preserva la amplitud de pacto, lealtad y rectitud ética sin borrar la tensión lexical.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve covenantal force where present'
translation_notes:
  revision_awareness: El auditorio inglés revisó la última cláusula de «I will make music» a «I will sing praise» para reflejar mejor אֲזַמֵּרָה y mantener el registro poético. La versión española sigue esa decisión con «cantaré alabanzas», diferenciándola de «cantaré» en אָשִׁירָה para conservar el paralelismo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, sin sustituirlo por «SEÑOR».
  - «amor constante» se usa para חֶסֶד, evitando un calco rígido y preservando su fuerza de pacto.
  - 'La duplicación poética entre אָשִׁירָה y אֲזַמֵּרָה se conserva en español con verbos distintos: «cantaré» / «cantaré alabanzas».'
