translation:
  language: es
  text: Yahvé retribuirá a cada hombre su rectitud y su fidelidad[a], porque Yahvé te entregó hoy en mi mano, pero no quise extender mi mano contra el ungido de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé devolverá a cada hombre su rectitud y su fidelidad». El hebreo puede leerse con un matiz de «devolver/retornar» además de retribuir.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el ungido de Yahvé»; es decir, el rey ungido por Yahvé.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיהוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: WLC / nombre divino
  rationale: 'Se sigue la directriz del proyecto para YHWH: en español se usa «Yahvé» para conservar el nombre pactual, en vez de ocultarlo con una sustitución reverencial. La forma «Yahvé» mantiene la identificación directa del Tetragrámaton.'
- source_word: יָשִׁיב
  english_pob_choice: will repay
  chosen_spanish: retribuirá
  alternatives_spanish:
  - volverá
  - recompensará
  - devolverá
  lexicon: HALOT
  rationale: El hiphil de שוב aquí tiene valor retributivo. «Retribuirá» comunica bien la idea de corresponder conforme a la conducta, sin perder el matiz de retribución justa que el contexto exige.
- source_word: לָאִישׁ
  english_pob_choice: each man
  chosen_spanish: a cada hombre
  alternatives_spanish:
  - a cada persona
  - al hombre
  lexicon: HALOT
  rationale: El hebreo singular genérico conserva fuerza representativa. «A cada hombre» preserva ese valor masculino-genérico documentado por el inglés POB, sin neutralizarlo.
- source_word: צִדְקָתוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia recta
  lexicon: HALOT
  rationale: Aquí צִדְקָה se refiere a conducta moral/integridad. En español, «justicia» es natural y fiel; se preserva el campo ético-jurídico que el contexto sugiere, sin forzar «rectitud» si resulta menos idiomática.
- source_word: אֱמֻנָתוֹ
  english_pob_choice: his faithfulness
  chosen_spanish: su fidelidad
  alternatives_spanish:
  - su fe
  - su confianza
  - su lealtad
  lexicon: HALOT
  rationale: אֱמוּנָה expresa confiabilidad, constancia y lealtad en la conducta. «Fidelidad» es la equivalencia más clara en español y acompaña bien a «justicia».
- source_word: אֲשֶׁר נְתָנְךָ יְהוָה הַיּוֹם בְּיָד
  english_pob_choice: because Yahweh gave you into my hand today
  chosen_spanish: porque Yahvé te entregó hoy en mi mano
  alternatives_spanish:
  - cuando Yahvé te entregó hoy en mi mano
  - aunque Yahvé te entregó hoy en mi mano
  lexicon: HALOT
  rationale: La cláusula explica la situación concreta de prueba. «Entregó... en mi mano» conserva la imagen hebrea de dominio/opción de daño; «porque» explicita la relación causal o explicativa que el contexto demanda.
- source_word: וְלֹא אָבִיתִי
  english_pob_choice: but I was not willing
  chosen_spanish: pero no quise
  alternatives_spanish:
  - y no quise
  - pero no estuve dispuesto
  lexicon: HALOT
  rationale: אבה expresa disposición/willingness. En español, «no quise» es natural y transmite la negativa volitiva; «pero» marca el contraste con la oportunidad presente.
- source_word: לִשְׁלֹחַ יָדִי
  english_pob_choice: to stretch out my hand
  chosen_spanish: extender mi mano
  alternatives_spanish:
  - alargar mi mano
  - levantar mi mano
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de actuar violentamente contra alguien. «Extender mi mano» es idiomático en español y mantiene la metáfora sin aclararla en exceso.
- source_word: בִּמְשִׁיחַ יְהוָה
  english_pob_choice: against Yahweh’s anointed
  chosen_spanish: contra el ungido de Yahvé
  alternatives_spanish:
  - contra el Mesías de Yahvé
  - contra el ungido del Señor
  lexicon: HALOT
  rationale: En este contexto histórico מָשִׁיחַ designa a Saúl como rey ungido, no un título mesiánico desarrollado. «Ungido de Yahvé» conserva la referencia real y evita introducir una resonancia cristológica no exigida por el texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto para preservar el nombre divino en la lengua meta. Esto mantiene visible la identidad pactual del Dios de Israel y evita una máscara reverencial que el español no necesita en este record.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor genérico de אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: a cada hombre
  alternative_spanish_readings:
  - a cada persona
  rationale: El hebreo usa un singular masculino con sentido representativo. Se conserva esa forma para no desdibujar la estructura del original ni neutralizar un rasgo que el POB inglés decidió mantener.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: בִּמְשִׁיחַ יְהוָה como título real, no mesiánico
  english_pob_reading: the LORD’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el Mesías de Yahvé
  - el ungido del Señor
  rationale: En 1 Samuel 26:23 la expresión se refiere a Saúl como rey consagrado por ungimiento. Traducir «ungido» conserva la función histórica sin importar un sentido mesiánico posterior que el contexto no afirma.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se consultó el paquete fuente hebreo (WLC), la traducción auditada en inglés y sus notas. No se registraron revisiones aplicadas en el ciclo más reciente; el borrador sigue el consenso de alta concordancia sin introducir cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el nombre divino.
  - Se conserva «ungido» y no «Cristo»/«Mesías» en este contexto histórico.
  - La cláusula causal se vierte con «porque» para reflejar la explicación del acto de David sin añadir elementos ajenos al hebreo.
  - Se preserva la metáfora de la mano como posibilidad de violencia, pero con español natural.
