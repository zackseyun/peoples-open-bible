review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido global del hebreo: prohibición de tocar directamente al transgresor, pena de ejecución a distancia, inclusión de animal u hombre, y levantamiento de la restricción al toque prolongado del cuerno. Sin embargo, dos elecciones no preservan del todo la fuerza del audit trail inglés ni la semántica fuente: «atravesado» debilita la idea de ser ejecutado por disparo/proyectil en יָרֹה יִיָּרֶה, y «ellos subirán» expresa futuro más que permiso, mientras el POB documenta sentido permisivo en הֵמָּה יַעֲלוּ.'
  spanish_quality_summary: El español es generalmente claro y legible, pero puede mejorarse para mayor naturalidad y fidelidad. «Nadie tocará[a] con su mano» suena algo incompleto sin objeto explícito; «Nadie lo tocará[a] con la mano» es más natural y mantiene el referente personal. «Cuando se prolongue el toque del cuerno» es aceptable, pero conviene armonizar mejor con la nota cultural sobre cuerno de carnero. Las notas b y c necesitan español completo y consistente; la nota b no debe dejar inglés sin traducir.
  glossary_alignment: No hay conflictos con los términos de proyecto principales. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. La principal cuestión léxica es mantener la decisión auditada de יָרֹה יִיָּרֶה como ejecución por disparo/proyectil, mejor en español como «lanzado con flechas» o similar, con nota para «atravesado/herido por proyectil» si se desea. También conviene reflejar el permiso en «podrán subir al monte».
  issues:
  - severity: medium
    issue: «o seguramente atravesado[b]» no refleja bien la decisión auditada «surely shot»
    rationale: El hebreo ירה en este contexto de ejecución a distancia apunta a disparar/proyectar, probablemente flechas. «Atravesado» describe resultado posible pero no el medio; pierde la claridad del POB y desplaza el énfasis léxico.
  - severity: medium
    issue: «ellos subirán al monte» no expresa claramente el valor permisivo documentado
    rationale: El audit trail inglés escogió «they may go up on the mountain» por el levantamiento de la restricción. En español, «podrán subir al monte» comunica mejor permiso/habilitación que un simple futuro.
  - severity: low
    issue: «Nadie tocará[a] con su mano» suena elíptico y algo duro en español
    rationale: Aunque comprensible, falta el objeto directo explícito y «con su mano» no suena tan natural en registro jurídico español. «Nadie lo tocará[a] con la mano» mantiene el sentido y mejora la fluidez.
  - severity: low
    issue: La nota b conserva una frase en inglés
    rationale: 'La nota dice «O: «surely pierced»», lo cual rompe la consistencia del aparato en español. Debe traducirse como «O: «seguramente atravesado»» o equivalente.'
  revised_spanish_text: Nadie lo tocará[a] con la mano, porque seguramente será apedreado o lanzado con flechas[b]; sea animal o sea hombre, no vivirá. Cuando se prolongue el toque del cuerno[c], podrán subir al monte.
  revised_footnotes:
