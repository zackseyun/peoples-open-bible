- from: Y estableceré mi pacto entre yo y tú, y tu descendencia[a] después de ti, por sus generaciones, como pacto perpetuo, para ser Dios para ti y para tu descendencia después de ti.
  to: Y estableceré mi pacto entre mí y ti y tu descendencia[a] después de ti, por sus generaciones, como pacto perpetuo, para ser Dios para ti y para tu descendencia después de ti.
