translation:
  language: es
  text: Pero ellos codiciaron[a] en el desierto[b], y pusieron a prueba a Dios en la tierra árida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «anhelaron con codicia»; el hebreo usa una expresión enfática de la misma raíz, literalmente «desearon un deseo» o «codiciaron una codicia».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la región desierta»; el hebreo usa un término que puede traducirse «desierto» o «wilderness», mientras que el segundo término del versículo subraya más la desolación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַוּוּ תַאֲוָה
  english_pob_choice: they craved greedily
  chosen_spanish: anhelaron con codicia
  alternatives_spanish:
  - codiciaron
  - desearon con intensidad
  - tuvieron un deseo vehemente
  lexicon: HALOT
  rationale: El hebreo usa un verbo de fuerte anhelo seguido de un sustantivo cognado que intensifica la acción. En español, "anhelaron con codicia" comunica la fuerza del deseo y conserva el tono negativo sin limitarlo a una connotación sexual como podría ocurrir con "lujuriaron".
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en la región desierta
  lexicon: HALOT
  rationale: '"מִדְבָּר" puede referirse a desierto o región agreste. "Desierto" es natural en español y preserva el contexto narrativo del éxodo; el matiz de aridez queda reforzado por el segundo término paralelo.'
- source_word: וַיְנַסּוּ
  english_pob_choice: tested
  chosen_spanish: pusieron a prueba
  alternatives_spanish:
  - probaron
  - tentaron
  - examinaron
  lexicon: HALOT
  rationale: El verbo נסה aquí expresa probar a Dios de manera provocadora. "Pusieron a prueba" mantiene el sentido bíblico habitual en español y evita suavizar el acto negativo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios fuerte
  - el Poderoso
  lexicon: HALOT
  rationale: '"אֵל" es un título divino; "Dios" es la equivalencia más clara y fiel en español en este contexto.'
- source_word: בִּישִׁימוֹן
  english_pob_choice: in the wasteland
  chosen_spanish: en la tierra árida
  alternatives_spanish:
  - en el yermo
  - en el desierto árido
  - en la tierra desolada
  lexicon: HALOT
  rationale: El segundo término hebreo añade la idea de sequedad y desolación. "Tierra árida" conserva ese matiz distintivo sin repetir exactamente "desierto", reflejando la diferencia entre מִדְבָּר y יְשִׁימוֹן.
theological_decisions:
- issue: Cómo reflejar el intensificador cognado del hebreo sin volver el español torpe
  english_pob_reading: Rendered idiomatically as 'craved greedily'
  chosen_spanish_reading: anhelaron con codicia
  alternative_spanish_readings:
  - codiciaron intensamente
  - desearon con vehemencia
  - tuvieron una codicia insaciable
  rationale: El hebreo literalmente aproxima "desear un deseo". El español debe sonar natural y, a la vez, conservar la condena moral del texto. "Anhelaron con codicia" expresa el exceso del deseo y mantiene la gravedad del pecado.
  doctrine_reference: Principio de equivalencia óptima; fidelidad al efecto retórico y moral del hebreo.
- issue: Diferenciar dos términos hebreos cercanos para lugares despoblados
  english_pob_reading: in the wilderness ... in the wasteland
  chosen_spanish_reading: en el desierto ... en la tierra árida
  alternative_spanish_readings:
  - en el desierto ... en el yermo
  - en la región desierta ... en la tierra desolada
  rationale: El inglés POB distingue "wilderness" y "wasteland" para no aplanar dos vocablos hebreos relacionados pero no idénticos. En español, "desierto" y "tierra árida" conservan esa distinción y la progresión poética del versículo.
  doctrine_reference: Respeto a la distinción léxica del texto fuente y a la resonancia narrativa del éxodo.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la lectura intensificada del cognado hebreo y, tras revisión, prefirió un adverbio de fuerza ('greedily'). En español, se optó por una equivalencia natural que conserve esa intensidad sin sonar mecánica; también se mantuvo la distinción entre מִדְבָּר y יְשִׁימוֹן mediante dos expresiones distintas.
  spanish_consistency_notes:
  - Se usa "Dios" para אֵל, conforme al criterio estándar del proyecto.
  - Se evitó "SEÑOR" porque aquí el texto hebreo no contiene el Tetragrámaton.
  - Se eligió "desierto" para מִדְבָּר y "tierra árida" para יְשִׁימוֹן para preservar la diferencia semántica.
  - '"Pusieron a prueba" conserva el valor negativo de נסה en contexto de rebelión.'
