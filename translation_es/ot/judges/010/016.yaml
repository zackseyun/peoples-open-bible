translation:
  language: es
  text: Entonces quitaron de entre ellos los dioses extranjeros y sirvieron a Yahvé, y él se impacientó[a] por la angustia de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «ya no pudo soportar la angustia de Israel». El hebreo dice literalmente: «su alma se acortó sobre la angustia de Israel», un modismo que expresa impaciencia o incapacidad de seguir soportando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסִירוּ
  english_pob_choice: removed
  chosen_spanish: quitaron de en medio
  alternatives_spanish:
  - removieron
  - apartaron
  - sacaron
  lexicon: HALOT
  rationale: El hiphil de סור expresa hacer que algo se aparte o se retire. En español, "quitaron de en medio" conserva la acción concreta y el matiz comunitario de retirar los ídolos del ámbito del pueblo, sin sonar demasiado mecánico.
- source_word: אֱלֹהֵי הַנֵּכָר
  english_pob_choice: the foreign gods
  chosen_spanish: los dioses extranjeros
  alternatives_spanish:
  - los dioses foráneos
  - los dioses ajenos
  - los dioses extraños
  lexicon: HALOT
  rationale: La expresión hebrea designa deidades no israelitas. "Dioses extranjeros" es natural en español bíblico moderno y evita el tono arcaico de "extraños", que podría sonar ambiguo o peyorativo de forma no necesaria.
- source_word: מִקִּרְבָּם
  english_pob_choice: from among them
  chosen_spanish: de en medio de ellos
  alternatives_spanish:
  - de su interior
  - de su seno
  - de entre ellos
  lexicon: HALOT
  rationale: La literalidad es "de su medio". "De en medio de ellos" mantiene el sentido colectivo y espacial de que los ídolos fueron retirados del ámbito común del pueblo.
- source_word: וַיַּעַבְדוּ אֶת יְהוָה
  english_pob_choice: served Yahweh
  chosen_spanish: sirvieron a Yahvé
  alternatives_spanish:
  - adoraron a Yahvé
  - obedecieron a Yahvé
  - rindieron culto a Yahvé
  lexicon: HALOT
  rationale: עבד con Dios abarca servicio/lealtad cultual y obediencia de pacto. "Sirvieron" conserva mejor ese campo semántico que "adoraron", que estrecha el sentido a culto בלבד. Se mantiene "Yahvé" conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir el nombre divino como "Yahvé", en lugar de ocultarlo con una sustitución convencional.
- source_word: וַתִּקְצַר נַפְשׁוֹ
  english_pob_choice: he became impatient
  chosen_spanish: se impacientó
  alternatives_spanish:
  - su alma se acortó
  - se cansó de sufrir
  - ya no pudo soportarlo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que "su alma se acortó", un modismo antropopático. En español, "se impacientó" preserva el valor idiomático y la respuesta personal de Yahvé sin forzar una imagen extraña; el matiz de tensión se mantiene en la nota.
- source_word: בַּעֲמַל יִשְׂרָאֵל
  english_pob_choice: over the misery of Israel
  chosen_spanish: por la angustia de Israel
  alternatives_spanish:
  - por la miseria de Israel
  - por el sufrimiento de Israel
  - a causa del afán de Israel
  lexicon: HALOT
  rationale: עָמָל puede denotar penuria, aflicción o fatiga. En este contexto de opresión, "angustia" comunica bien el peso del sufrimiento de Israel en español contemporáneo sin añadir una interpretación más específica de la que ofrece el hebreo.
theological_decisions:
- issue: Lenguaje antropopático aplicado a Yahvé en וַתִּקְצַר נַפְשׁוֹ
  english_pob_reading: The Hebrew literally says, 'his soul grew short over the misery of Israel,' an idiom expressing impatience or inability to endure further.
  chosen_spanish_reading: '"se impacientó" conserva la reacción personal de Yahvé ante la aflicción de Israel sin diluir el antropopatismo.'
  alternative_spanish_readings:
  - '"su alma se acortó"'
  - '"ya no pudo soportar la angustia de Israel"'
  - '"se dolió de la angustia de Israel"'
  rationale: 'La traducción evita resolver el tropo bíblico en una explicación abstracta. Mantener un verbo personal permite preservar la tensión teológica del texto: Yahvé responde activamente al clamor y la opresión de su pueblo, sin que la versión tenga que armonizar o neutralizar el antropopatismo.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue el sentido del texto hebreo y el auditoría inglesa más reciente, que prefirió una forma más natural de expresar el modismo de נַפְשׁוֹ/תִּקְצַר. En español se optó por "se impacientó" como equivalente idiomático conciso, manteniendo el nombre divino "Yahvé" y el valor de servicio de עבד.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente con el estándar del proyecto para יְהוָה.
  - Se conserva "sirvieron" para עבד con Dios, evitando reducirlo a mero culto o adoración.
  - '"Dioses extranjeros" refleja el plural y la alteridad religiosa sin carga arcaizante.'
  - La cláusula final preserva el carácter antropopático del hebreo mediante un verbo personal en español.
