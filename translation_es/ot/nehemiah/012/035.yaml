    text: 'O: «y de los hijos de los sacerdotes, con trompetas». La expresión hebrea es partitiva y también puede traducirse de manera más formal.'
    reason: lexical_alternative
  revision_rationale: Se repone explícitamente «hijos» para reflejar בני y se usa «de entre» para expresar con naturalidad el valor partitivo de מן en español. Se conserva «con trompetas» como instrumental y la genealogía repetida con «hijo de». La nota se ajusta para seguir reflejando la alternativa más formal sin contradecir el texto revisado.
