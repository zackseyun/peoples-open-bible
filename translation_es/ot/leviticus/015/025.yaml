translation:
  language: es
  text: Si una mujer tiene un flujo de sangre por muchos días[a], fuera del tiempo de su impureza menstrual, o si tiene un flujo más allá de su impureza menstrual[b], todos los días de su flujo impuro ella será impura, como en los días de su impureza menstrual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "fuera del tiempo de su menstruación". El término hebreo incluye el estado de impureza ritual asociado con la menstruación, no solo el sangrado en sí.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "si tiene un flujo además de su impureza menstrual", es decir, que se extiende más allá del período menstrual normal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָזוּב / תָזוּב + זוֹב
  english_pob_choice: has a discharge / has a discharge beyond
  chosen_spanish: tiene un flujo / tiene un flujo más allá
  alternatives_spanish:
  - tiene una descarga
  - tiene una emisión
  - fluye
  lexicon: HALOT
  rationale: El hebreo usa el verbo זוב con el sustantivo זוב para un derrame o flujo corporal anormal. En español, “flujo” es natural y conserva el sentido físico-ritual sin suavizarlo en exceso. En la segunda cláusula, “más allá” refleja bien el valor de עַל en contexto, como extensión o adición respecto del período normal.
- source_word: דָּמָהּ
  english_pob_choice: of blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - sangre
  lexicon: HALOT
  rationale: El sufijo posesivo indica “su sangre”; en español, unido a “flujo”, lo más natural y fiel es “flujo de sangre”.
- source_word: יָמִים רַבִּים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - muchos días
  - durante muchos días
  lexicon: HALOT
  rationale: La duración temporal se expresa de forma clara y idiomática con “por muchos días”, manteniendo el valor de prolongación del hebreo.
- source_word: בְּלֹא עֶת נִדָּתָהּ
  english_pob_choice: not at the time of her menstrual impurity
  chosen_spanish: fuera del tiempo de su impureza menstrual
  alternatives_spanish:
  - no en el tiempo de su impureza menstrual
  - fuera del tiempo de su menstruación
  - no durante su período
  lexicon: HALOT
  rationale: עֵת es “tiempo” y נִדָּה, en este contexto legal, incluye el estado ritual asociado a la menstruación. “Impureza menstrual” conserva ese sentido cultual y evita reducirlo solo al sangrado biológico.
- source_word: נִדָּה
  english_pob_choice: menstrual impurity
  chosen_spanish: impureza menstrual
  alternatives_spanish:
  - menstruación
  - período
  - impureza mensual
  lexicon: HALOT
  rationale: La frase hebrea designa aquí una categoría ritual; “impureza menstrual” mantiene explícita la dimensión de estado impuro sin convertirlo en una connotación moral.
- source_word: עַל נִדָּתָהּ
  english_pob_choice: beyond her menstrual impurity
  chosen_spanish: más allá de su impureza menstrual
  alternatives_spanish:
  - en adición a su impureza menstrual
  - sobre su impureza menstrual
  lexicon: HALOT
  rationale: עַל expresa aquí extensión o añadido. “Más allá de” comunica con precisión que el flujo excede el período normal.
- source_word: כָּל יְמֵי זֹב טֻמְאָתָהּ
  english_pob_choice: all the days of her unclean discharge
  chosen_spanish: todos los días de su flujo impuro
  alternatives_spanish:
  - todos los días de su flujo de impureza
  - todos los días de su derrame impuro
  lexicon: HALOT
  rationale: La cadena constructa une el flujo con su estado de impureza. “Flujo impuro” comunica ambas ideas de manera breve y natural en español, conservando el carácter ritual del término.
- source_word: טְמֵאָה
  english_pob_choice: unclean
  chosen_spanish: impura
  alternatives_spanish:
  - inmunda
  - ritualmente impura
  lexicon: HALOT
  rationale: En lenguaje levítico, el término describe un estado ritual. “Impura” es la forma más natural en español moderno; mantiene la categoría cultual sin sugerir necesariamente culpa moral. “Ritualmente impura” sería más explícito, pero menos fluido en el verso.
- source_word: כִּימֵי נִדָּתָהּ
  english_pob_choice: as in the days of her menstrual impurity
  chosen_spanish: como en los días de su impureza menstrual
  alternatives_spanish:
  - como en los días de su menstruación
  - como durante los días de su período
  lexicon: HALOT
  rationale: La comparación indica que su condición durante el flujo anormal coincide con la de la impureza menstrual ordinaria. Repetir “impureza menstrual” mantiene consistencia léxica con la primera mitad del verso.
theological_decisions:
- issue: Lenguaje de pureza ritual sin moralizar la condición
  english_pob_reading: Use 'unclean' and 'menstrual impurity' as ritual-status language
  chosen_spanish_reading: Usar 'impura' e 'impureza menstrual' como lenguaje de estado ritual
  alternative_spanish_readings:
  - usar 'inmunda'
  - usar solo 'menstruación' sin referencia a impureza
  - usar 'ritualmente impura' en todo el verso
  rationale: El pasaje trata de impureza ceremonial en la ley levítica, no de culpa moral personal. La traducción preserva esa categoría cultual con vocabulario claro y sobrio en español.
  doctrine_reference: Principios de traducción POB sobre precisión léxica y distinción entre pureza ritual y pecado moral
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios en el último pase; la presente propuesta sigue ese estado de alta concordancia y conserva las dos notas alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene 'impureza menstrual' de manera uniforme para נִדָּה en ambas apariciones.
  - Se usa 'impura' para טְמֵאָה siguiendo el valor ritual del término y evitando una carga moral indebida.
  - '''Flujo'' se reserva para זוב/זוֹב, en coherencia con el patrón bíblico de emisión corporal anormal.'
  - Las notas [a] y [b] están ancladas en los dos puntos donde el hebreo admite una lectura alternativa documentada.
