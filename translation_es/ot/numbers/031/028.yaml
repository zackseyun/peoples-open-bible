translation:
  language: es
  text: 'Y cobrarás un tributo para Yahvé[a] de los hombres de guerra que salieron a la batalla: una de cada quinientas, de las personas[b], del ganado, de los asnos y del rebaño.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa aquí el nombre divino יהוה; se vierte como Yahvé conforme al criterio del proyecto.
    reason: source_note
  - marker: b
    text: 'Hebreo: «del ser humano» o «de la parte humana». Aquí contrasta la porción humana del botín con los animales enumerados después.'
    reason: cultural_note
lexical_decisions:
- source_word: וַהֲרֵמֹתָ
  english_pob_choice: you shall levy
  chosen_spanish: y establecerás una contribución
  alternatives_spanish:
  - y levantarás
  - y apartarás
  - y imponerás una contribución
  lexicon: HALOT
  rationale: El verbo hifil de רום expresa apartar/elevar una porción para un fin sagrado. En este contexto militar y de botín, 'establecerás una contribución' comunica una porción obligatoria destinada a Yahvé sin sonar demasiado administrativo.
- source_word: מֶכֶס
  english_pob_choice: tribute
  chosen_spanish: contribución
  alternatives_spanish:
  - tributo
  - impuesto
  - cuota
  lexicon: HALOT
  rationale: El sustantivo designa una porción debida o tasada. 'Contribución' mantiene la idea de una porción dedicada; 'tributo' también sería posible, pero en español puede sonar más político y menos apto para una ofrenda tasada.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', conforme al criterio del proyecto. 'Para Yahvé' expresa que la porción queda destinada a él.
- source_word: מֵאֵת אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: from the men of war
  chosen_spanish: de parte de los hombres de guerra
  alternatives_spanish:
  - de parte de los guerreros
  - de parte de los hombres que pelearon
  lexicon: HALOT
  rationale: '''Hombres de guerra'' preserva la fuerza militar y la referencia masculina del hebreo. ''De parte de'' refleja que la porción se toma de ese grupo.'
- source_word: הַיֹּצְאִים לַצָּבָא
  english_pob_choice: who went out to battle
  chosen_spanish: que salieron a la batalla
  alternatives_spanish:
  - que salieron al ejército
  - que salieron para el servicio militar
  lexicon: HALOT
  rationale: '''Salir a la batalla'' es una equivalencia natural y fiel al participio, sin perder el matiz de participación en la campaña.'
- source_word: אֶחָד נֶפֶשׁ מֵחֲמֵשׁ הַמֵּאוֹת
  english_pob_choice: one out of five hundred
  chosen_spanish: una de cada quinientas
  alternatives_spanish:
  - una alma de cada quinientas
  - una vida de cada quinientas
  - una persona de cada quinientas
  lexicon: HALOT
  rationale: El hebreo aquí funciona como una proporción de conteo, no como una afirmación metafísica sobre 'alma'. En español, 'una de cada quinientas' expresa con naturalidad la misma proporción sin introducir una palabra que podría oscurecer el sentido.
- source_word: מִן הָאָדָם
  english_pob_choice: from the people
  chosen_spanish: de las personas
  alternatives_spanish:
  - de la gente
  - de los humanos
  lexicon: HALOT
  rationale: אָדָם contrasta con los animales en la lista. 'De las personas' comunica el conjunto humano de forma natural en español y evita un masculino genérico innecesariamente duro.
- source_word: וּמִן הַבָּקָר
  english_pob_choice: and from the cattle
  chosen_spanish: del ganado
  alternatives_spanish:
  - de los bovinos
  - de las reses
  lexicon: HALOT
  rationale: בקר denota ganado/bovinos. 'Ganado' es la forma más natural y abarcadora en español para inventarios de botín.
- source_word: וּמִן הַחֲמֹרִים
  english_pob_choice: and from the donkeys
  chosen_spanish: de los asnos
  alternatives_spanish:
  - de los burros
  - de los burros y asnas
  lexicon: HALOT
  rationale: El hebreo nombra los animales de modo concreto; 'asnos' es una correspondencia precisa y sobria, más cercana al registro bíblico que 'burros'.
- source_word: וּמִן הַצֹּאן
  english_pob_choice: and from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de la grey
  - de los pequeños ganados
  lexicon: HALOT
  rationale: צאן es un colectivo para ganado menor, especialmente ovejas y cabras. 'Rebaño' es breve y natural en español; 'grey' sería más eclesiástico que ganadero.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la decisión del proyecto de traducir el Tetragrámaton como 'Yahvé' en el texto principal, preservando el nombre pactal en vez de ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de נֶפֶשׁ en la proporción
  english_pob_reading: one out of five hundred
  chosen_spanish_reading: una de cada quinientas
  alternative_spanish_readings:
  - una alma de cada quinientas
  - una vida de cada quinientas
  rationale: Aquí נֶפֶשׁ funciona como término de conteo para un individuo o unidad contable. En español, omitir el sustantivo evita imponer una lectura espiritual o metafísica que el contexto no exige.
  doctrine_reference: HALOT / uso contextual en listas de botín
translation_notes:
  revision_awareness: El borrador inglés revisado eliminó 'life' tras 'one' porque la expresión hebrea indica una proporción contable, no específicamente 'una vida'. El español sigue esa revisión al decir 'una de cada quinientas' y no introducir 'alma' ni 'vida' en el texto principal.
  spanish_consistency_notes:
  - Se conservó Yahvé en el texto principal, según la terminología base del proyecto.
  - '''Una de cada quinientas'' refleja la proporción sin añadir sustantivos interpretativos.'
  - '''Asnos'' y ''rebaño'' se mantienen como equivalentes naturales y sobrios para los listados de animales.'
