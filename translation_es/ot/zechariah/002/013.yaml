base_translation:
  language: en
  yaml_path: translation/ot/zechariah/002/013.yaml
  text: For behold[a], I am about to wave my hand over them, and they will become plunder for their own slaves[c][b]. Then you will know that Yahweh of Armies has sent me.
  footnotes:
  - marker: a
    text: Or 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will become plunder for their servants.' The Hebrew עבד can mean 'servant' or 'slave'; 'slaves' is chosen here to preserve the force of the reversal.
    reason: lexical_alternative
  - marker: c
    text: The speaker says, 'the LORD of Armies has sent me,' without explicitly identifying himself; the text leaves that identity open in context.
    reason: alternative_reading
