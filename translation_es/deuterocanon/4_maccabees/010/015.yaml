  yaml_path: translation/deuterocanon/4_maccabees/010/015.yaml
  text: By the blessed death of my brothers[a], and by the tyrant’s eternal destruction, and by the everlasting life of the godly[b], I will not renounce my noble brotherhood.
  footnotes:
