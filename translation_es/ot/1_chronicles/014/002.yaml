translation:
  language: es
  text: Y David supo que Yahvé lo había establecido como rey sobre Israel, porque su reino había sido grandemente exaltado[a] por el bien de su pueblo Israel.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había sido elevado en lo alto».
    reason: lexical_alternative
  - marker: b
    text: Es decir, Israel como pueblo de Yahvé; algunos entienden «su pueblo» como referencia al pueblo de David.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - reconoció
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de ידע expresa aquí que David llegó a saber o reconoció la realidad de la acción de Yahvé. En español, «supo» comunica ese conocimiento adquirido con naturalidad narrativa. No conviene forzar «conoció», que suena menos idiomático, ni «reconoció» como si implicara solo identificación.
- source_word: הֱכִינוֹ
  english_pob_choice: had established him
  chosen_spanish: lo había establecido
  alternatives_spanish:
  - lo había afirmado
  - lo había confirmado
  - lo había hecho firme
  lexicon: HALOT
  rationale: El hiphil de כון transmite la idea de establecer, fijar o hacer firme. «Lo había establecido» preserva bien la imagen de instalación real sin añadir matices no evidentes. En contexto de entronización, el complemento «como rey» aclara la función.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de usar la transliteración del nombre divino. «Yahvé» mantiene la referencia al nombre personal revelado a Israel y evita la sustitución por un título.
- source_word: לְמֶלֶךְ
  english_pob_choice: as king
  chosen_spanish: como rey
  alternatives_spanish:
  - para rey
  - a rey
  lexicon: HALOT
  rationale: La preposición ל con מלך expresa aquí función/nombramiento. «Como rey» es la forma más natural en español para indicar investidura en el cargo.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - encima de Israel
  lexicon: HALOT
  rationale: En contexto real, עַל comunica autoridad sobre. «Sobre Israel» conserva el valor de dominio sin calco extraño.
- source_word: נִשֵּׂאת
  english_pob_choice: had been exalted
  chosen_spanish: había sido exaltado
  alternatives_spanish:
  - había sido levantado
  - había sido elevado
  lexicon: HALOT
  rationale: 'El niphal de נשׂא aquí es pasivo: algo fue levantado/exaltado. «Había sido exaltado» mantiene el tono de elevación de estatus que el contexto exige.'
- source_word: לְמַעְלָה
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - altamente
  lexicon: HALOT
  rationale: La combinación נִשֵּׂאת לְמַעְלָה es idiomática para una elevación intensa. En español, «muy exaltado» comunica la fuerza adverbial con claridad y naturalidad; «en gran manera» sería más literal, pero menos fluido.
- source_word: מַלְכוּתוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su realeza
  - su reinado
  lexicon: HALOT
  rationale: מַלְכוּת puede referirse al reino o al ejercicio real. Aquí «su reino» expresa el dominio real de David de manera directa y concordante con el contexto histórico.
- source_word: בַּעֲבוּר
  english_pob_choice: for the sake of
  chosen_spanish: por causa de
  alternatives_spanish:
  - por amor a
  - a favor de
  lexicon: HALOT
  rationale: בַּעֲבוּר suele indicar propósito/beneficio. «Por causa de» conserva esa relación de beneficio sin convertirla en mera causalidad física.
- source_word: עַמּוֹ יִשְׂרָאֵל
  english_pob_choice: his people Israel
  chosen_spanish: su pueblo Israel
  alternatives_spanish:
  - su pueblo, Israel
  - Israel su pueblo
  lexicon: HALOT
  rationale: El posesivo en el hebreo y en la lectura POB se refiere a Yahvé, no a David. «Su pueblo Israel» preserva la relación de pacto y evita sugerir que Israel pertenece a David. La apposición «Israel» mantiene la identificación explícita.
theological_decisions:
- issue: Referente del posesivo en «su pueblo Israel»
  english_pob_reading: '''his'' refers to the LORD, not David'
  chosen_spanish_reading: «su» se refiere a Yahvé, no a David
  alternative_spanish_readings:
  - «su» se refiere a David
  - ambigüedad deliberada sin aclaración
  rationale: El contexto de las Crónicas presenta a Israel como el pueblo de Yahvé. Mantener el posesivo referido a Yahvé evita una lectura posesiva inapropiada respecto de David y conserva la teología del pacto reflejada en la fuente y en la auditoría inglesa.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Fuerza de la segunda כִּי
  english_pob_reading: 'causal: ''for'''
  chosen_spanish_reading: 'causal: «porque»'
  alternative_spanish_readings:
  - 'explicativo: «pues»'
  - 'resultativo: «de modo que»'
  rationale: 'La segunda cláusula explica por qué David sabía que Yahvé lo había establecido: el reino había sido altamente exaltado. «Porque» mantiene esa relación lógica de causa/explicación de forma clara en español.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa auditada, que ajustó el orden para lograr «had been greatly exalted». En español se reflejó ese énfasis con «había sido muy exaltado», manteniendo la naturalidad sintáctica y la relación causal del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se traduce δοῦλος no aplica aquí; no hay términos de esclavitud en este versículo.
  - Se preserva «reino» para מַלְכוּת, evitando «reinado» para no desviar el foco del dominio real en este contexto.
  - La puntuación separa la cláusula causal final con coma, acorde con el español bíblico contemporáneo.
