translation:
  language: es
  text: He pecado[a], Señor, he pecado, y conozco mis actos contra la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis iniquidades». El término griego denota actos contra la ley, es decir, violación de la ley de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμάρτηκα
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Pecé
  lexicon: BDAG
  rationale: El perfecto griego presenta la acción como realizada con relevancia presente; en español, el perfecto compuesto «he pecado» comunica mejor esa vigencia confesional que el pretérito simple.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Oh Señor
  lexicon: BDAG
  rationale: Se conserva el vocativo directo con el equivalente habitual y reverente «Señor», sin añadir una partícula exclamativa que el griego no exige.
- source_word: τὰς ἀνομίας μου
  english_pob_choice: my lawless deeds
  chosen_spanish: mis actos de iniquidad
  alternatives_spanish:
  - mis actos sin ley
  - mis transgresiones
  - mis iniquidades
  lexicon: BDAG
  rationale: ἀνομία denota falta de ley o violación de la ley divina. «Actos de iniquidad» mantiene la carga moral y evita el término más eclesiástico «iniquidades» como opción principal, aunque se reconoce como alternativa posible.
- source_word: γινώσκω
  english_pob_choice: know
  chosen_spanish: conozco
  alternatives_spanish:
  - reconozco
  - sé
  lexicon: BDAG
  rationale: 'El sentido básico es cognitivo: saber/conocer. En este contexto penitencial, «conozco» deja que la fuerza de la confesión surja del conjunto sin añadir una paráfrasis interpretativa.'
- source_word: ἐγώ
  english_pob_choice: I
  alternatives_spanish:
  - yo
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito griego aporta énfasis, pero en español no se requiere expresar para que la frase sea natural; el énfasis queda implícito en la estructura confesional.
theological_decisions:
- issue: Cómo rendir ἀνομία en una confesión penitencial
  english_pob_reading: lawless deeds
  chosen_spanish_reading: actos de iniquidad
  alternative_spanish_readings:
  - iniquidades
  - transgresiones
  - actos sin ley
  rationale: La POB inglesa opta por una expresión que transparenta la idea de violación de la ley. En español, «actos de iniquidad» conserva el peso moral sin reducir el término a un tecnicismo tradicional; «iniquidades» queda como alternativa válida pero más cargada de uso eclesiástico.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; consistencia terminológica con términos morales y legales'
- issue: Tratamiento del vocativo κύριε en oración
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Oh Señor
  rationale: Se mantiene el vocativo simple y directo. Añadir «Oh» intensificaría el tono devocional, pero no es requerido por el griego y podría introducir una solemnidad no necesaria.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor/Lord según idioma objetivo'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el énfasis explícito de «I myself» porque resultaba forzado en inglés. En español también se omite el pronombre enfático explícito, ya que la naturalidad de la confesión y el contraste con «he pecado... he pecado» ya comunican el énfasis del griego ἐγώ sin sobrecargar la línea.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε, en consonancia con la pauta del proyecto para κύριος.
  - Se evita «Cristo» y cualquier fórmula eclesiástica no presente en el texto fuente.
  - «He pecado» conserva el valor perfectivo del griego mejor que un pretérito simple.
  - La nota de pie marca la alternativa léxica principal para ἀνομία sin borrar la lectura transparente del texto.
