revisions:
- from: 'Mientras ellos bajaban[a] hacia la orilla de la ciudad, Samuel dijo a Saúl: «Di al joven que siga adelante de nosotros». Él siguió adelante. «Pero tú, quédate de pie ahora[b], y yo te haré oír la palabra de Dios».'
  to: 'Mientras ellos bajaban[a] hacia el borde de la ciudad, Samuel dijo a Saúl: «Di al joven que vaya delante de nosotros». Y él fue delante. «Pero tú, quédate aquí por ahora[b], y te haré oír la palabra de Dios».'
  rationale: La revisión corrige dos giros poco naturales («orilla», «adelante de nosotros») y suaviza la orden idiomática a un español más claro sin perder el sentido del hebreo ni la línea del POB inglés. Se conserva «joven» y «la palabra de Dios», junto con la nota sobre el hebreo idiomático.
