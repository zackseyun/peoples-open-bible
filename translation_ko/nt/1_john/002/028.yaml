  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ νῦν, τεκνία, μένετε ἐν αὐτῷ, ἵνα ⸀ἐὰν φανερωθῇ ⸀σχῶμεν παρρησίαν καὶ μὴ αἰσχυνθῶμεν ἀπ’ αὐτοῦ ἐν τῇ παρουσίᾳ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/028.yaml
  text: And now[a], little children, remain in him, so that if he is revealed[c][b], we may have confidence and not shrink away from him in shame at his coming.
  footnotes:
  - marker: a
    text: Or 'if he appears.' The Greek verb is passive ('is revealed'/'is made manifest').
    reason: lexical_alternative
  - marker: b
    text: Or 'be ashamed before him.' The phrase may also be understood more literally as shame in his presence rather than shrinking away from him.
    reason: alternative_reading
  - marker: c
    text: Or 'at his presence.' In this context, 'coming' reflects the eschatological sense of the Greek term.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 이제 자녀들이여, 그분 안에 머무십시오. 그래야 그분이 나타나실 때 우리가 담대함을 가지고, 그분의 오심에서 그분 앞에 부끄러움으로 물러나지 않을 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρρησίαν
  english_pob_choice: confidence / boldness
  chosen_korean: 담대함
  alternatives_korean:
  - 확신
  - 거리낌 없음
  lexicon: BDAG
  rationale: παρρησία는 자유롭게 말하고 나아갈 수 있는 자유·확신. 「담대함」이 한국어에서 그 의미를 담는다.
- source_word: παρουσίᾳ
  english_pob_choice: coming
  chosen_korean: 오심
  alternatives_korean:
  - 임재
  - 강림
  lexicon: BDAG
  rationale: παρουσία는 그리스도의 재림을 가리키는 신약의 전문어. 「오심」으로 단순·직접적으로 옮기되 종말론적 함의를 살린다.
