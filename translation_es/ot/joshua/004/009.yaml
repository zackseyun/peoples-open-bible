review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: Josué erige doce piedras en medio del Jordán, en el lugar relacionado con la posición de los sacerdotes que llevaban el arca, y la cláusula final preserva la continuidad narratorial de עַד הַיּוֹם הַזֶּה. Sin embargo, «donde se detuvieron los pies» introduce una idea de movimiento/pausa que no está en תַּחַת מַצַּב רַגְלֵי; el hebreo habla del lugar donde estaban/paraban de pie los pies de los sacerdotes, no de que ''se detuvieron''.'
  spanish_quality_summary: El español es claro y legible, pero el punto y coma es innecesario y algo rígido. La nota al pie está bien orientada, aunque puede alinearse mejor con el matiz de 'lugar donde estaban de pie'. También conviene mantener una formulación más directa y natural en español para la localización.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto. «Jordán», «Josué», «arca del pacto» y la continuidad «allí están hasta hoy» son aceptables. No hay incidencia con Yahvé en este versículo. La única desviación significativa es léxica: «se detuvieron» no representa fielmente מַצָּב.'
  issues:
  - severity: medium
    issue: «donde se detuvieron los pies» añade un matiz no presente en el hebreo
    rationale: מַצָּב רַגְלֵי הַכֹּהֲנִים describe el lugar/posición donde los sacerdotes estaban de pie con el arca, no el momento en que sus pies 'se detuvieron'. La redacción actual sugiere una pausa en el movimiento más que una ubicación estable.
  - severity: low
    issue: Puntuación algo forzada con punto y coma antes de la cláusula final
    rationale: La coordinación con «y allí están hasta hoy» fluye mejor con coma en español bíblico moderno.
  - severity: low
    issue: La nota al pie puede reflejar mejor la alternativa literal
    rationale: La alternativa debe apuntar más claramente a «debajo del lugar donde estaban de pie los sacerdotes» o «del sitio donde estaban los pies», evitando ambigüedad innecesaria.
  revised_spanish_text: Y Josué levantó doce piedras en medio del Jordán, debajo del lugar donde estaban de pie los pies de los sacerdotes que llevaban el arca del pacto, y allí están hasta hoy[a].
  revised_footnotes:
  - marker: a
    text: O «debajo del lugar donde estaban los pies de los sacerdotes». La expresión hebrea es muy literal y se refiere al sitio donde los sacerdotes estaban de pie mientras llevaban el arca.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «se detuvieron» por «estaban de pie» para reflejar con mayor fidelidad מַצָּב y evitar un matiz de detención no presente en el hebreo. También se suaviza la puntuación para un español más natural, manteniendo la nota léxica sobre la literalidad de la expresión.
