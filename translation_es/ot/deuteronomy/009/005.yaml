base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/009/005.yaml
  text: It is not because of your righteousness or the uprightness of your heart that you are going in to possess their land[a], but because of the wickedness of these nations Yahweh your God is driving them out before you, and in order to confirm the word that Yahweh swore to your fathers, to Abraham, to Isaac[c][b], and to Jacob.
  footnotes:
  - marker: a
    text: Or 'is dispossessing them before you.' The Hebrew verb can emphasize causing them to lose possession of the land, not only expelling them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the promise that the LORD swore.' Hebrew 'word' here carries the sense of a pledged word in an oath context.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew ''your fathers'' refers specifically to the patriarchs named here: Abraham, Isaac, and Jacob.'
    reason: cultural_note
