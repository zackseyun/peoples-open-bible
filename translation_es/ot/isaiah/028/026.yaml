translation:
  language: es
  text: Porque su Dios le instruye para lo correcto[a]; le enseña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque se le instruye en justicia»; o «Porque se le instruye apropiadamente». El hebreo לַמִּשְׁפָּט puede referirse a justicia/juicio, pero en este contexto también permite un sentido más adverbial o procedimental: «apropiadamente» o «conforme al debido orden».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִסְּרוֹ
  english_pob_choice: instructs him
  chosen_spanish: le instruye
  alternatives_spanish:
  - le disciplina
  - le corrige
  - le entrena
  lexicon: HALOT
  rationale: El piel de יסר con sufijo de objeto puede abarcar instrucción, corrección o disciplina. En este contexto agrícola, la idea no es castigo sino aprendizaje guiado; por eso 'le instruye' conserva el sentido pedagógico del audit trail inglés sin sugerir reprensión.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: in justice
  chosen_spanish: en justicia
  alternatives_spanish:
  - según el debido orden
  - conforme a la regla correcta
  - de manera apropiada
  lexicon: HALOT
  rationale: Aunque en contextos prácticos מִשְׁפָּט puede apuntar al 'orden correcto' o al 'procedimiento adecuado', la revisión inglesa optó por 'in justice' para reflejar de modo más directo el campo semántico del hebreo. En español, 'en justicia' mantiene la formalidad y la tensión semántica entre justicia y procedimiento correcto.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - Dios de él
  lexicon: HALOT
  rationale: Se conserva el posesivo para reflejar que la habilidad del labrador se atribuye a Dios. 'Su Dios' es la forma natural y fiel en español.
- source_word: יוֹרֶנּוּ
  english_pob_choice: he teaches him
  chosen_spanish: le enseña
  alternatives_spanish:
  - le instruye
  - le dirige
  lexicon: HALOT
  rationale: De ירה en hiphil, con valor de enseñar/instruir/dirigir. 'Le enseña' reproduce bien el paralelismo con el primer verbo y evita redundancia innecesaria en español.
theological_decisions:
- issue: Dios como fuente del saber práctico
  english_pob_reading: The verse attributes the farmer's practical knowledge to God as teacher.
  chosen_spanish_reading: El versículo atribuye a Dios el conocimiento práctico del labrador como maestro.
  alternative_spanish_readings:
  - El versículo puede entenderse de forma más general como providencia divina que guía la pericia humana.
  rationale: El sujeto explícito 'su Dios' y el doble lenguaje de instrucción presentan a Dios como fuente de la habilidad agrícola. La traducción española conserva esa atribución directa sin convertirla en una afirmación doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió la revisión final del audit trail inglés que sustituyó una formulación más explicativa por 'in justice', por lo que la nota española conserva la alternativa adverbial sin diluir la lectura principal. La traducción evita mecanicismo y mantiene el paralelismo de dos miembros.
  spanish_consistency_notes:
  - Se usó 'le instruye' para יסר y 'le enseña' para ירה, preservando el matiz pedagógico y el paralelismo.
  - '''En justicia'' mantiene la tensión entre justicia y procedimiento correcto señalada en el audit trail inglés.'
  - Se evitó 'SEÑOR' para יהוה porque este versículo no contiene el tetragrámaton; tampoco hay necesidad de máscara divina.
  - No se introdujo terminología eclesiástica ajena al campo semántico agrícola del verso.
