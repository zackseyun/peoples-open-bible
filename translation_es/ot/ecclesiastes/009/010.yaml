revisions:
- from: Todo lo que tu mano halle para hacer[a], hazlo con todo tu poder, porque no hay obra ni planeación ni conocimiento ni sabiduría en el Seol, adonde tú vas.
  to: Todo lo que tu mano halle para hacer, hazlo con todas tus fuerzas, porque no hay obra ni planificación ni conocimiento ni sabiduría en el Seol[a], adonde vas.
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad idiomática y legibilidad en español sin alterar el sentido auditado: «con todas tus fuerzas» expresa mejor בְּכֹחֲךָ en contexto exhortativo; «planificación» es más natural que «planeación» para un público panhispánico; «adonde vas» elimina un énfasis innecesario. También se movió la marca de nota al término «Seol», que es el elemento explicado por la nota.'
