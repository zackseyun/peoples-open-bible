  text: מֵ/חֶ֨בֶל֙ בְּנֵ֣י יְהוּדָ֔ה נַחֲלַ֖ת בְּנֵ֣י שִׁמְע֑וֹן כִּֽי הָיָ֞ה חֵ֤לֶק בְּנֵֽי יְהוּדָה֙ רַ֣ב מֵ/הֶ֔ם וַ/יִּנְחֲל֥וּ בְנֵֽי שִׁמְע֖וֹן בְּ/ת֥וֹךְ נַחֲלָתָֽ/ם־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/joshua/019/009.yaml
  text: From the portion of the sons of Judah came the inheritance of the sons of Simeon[a], because the share of the sons of Judah was too large for them[c][b]; so the sons of Simeon received their inheritance within Judah's inheritance.
  footnotes:
  - marker: a
    text: Or 'from the territory of the sons of Judah.' The Hebrew חֶבֶל can denote a measured tract or region of land.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Judah' and 'the sons of Simeon,' a literal tribal designation that may also be rendered 'the tribe of Judah' and 'the tribe of Simeon.'
    reason: lexical_alternative
  - marker: c
    text: That is, Simeon's allotted land was located inside Judah's allotted territory.
    reason: cultural_note
