review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido general del griego: temporalidad (''Después de esto''), acción personal (''se levantará''), retribución y el modismo ''sobre su cabeza''. Sin embargo, ''les pagará'' y especialmente ''su paga'' suenan demasiado económicos/contractuales en español y debilitan la conexión léxica de ἀνταποδώσει / ἀνταπόδομα. Conviene usar ''retribuirá'' / ''retribución'' para preservar mejor el campo semántico judicial-retributivo del original.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero 'su paga' resulta poco natural en este contexto bíblico y puede leerse como salario. La frase mejora en fidelidad y legibilidad con 'les retribuirá' y 'su retribución'. El resto del verso funciona bien en español e idiomáticamente mantiene el antropomorfismo y el modismo bíblico.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La mejora propuesta alinea mejor el español con la decisión léxica auditada de conservar el campo de 'repay/repayment' mediante un par cognado español ('retribuirá' / 'retribución') en vez de 'pagar' / 'paga', que introduce una connotación menos adecuada.
  issues:
  - severity: medium
    issue: '''les pagará'' es semánticamente posible pero demasiado económico/coloquial para ἀνταποδώσει en un contexto de juicio divino.'
    rationale: El griego expresa retribución o devolución en respuesta a la conducta previa; 'retribuirá' preserva mejor el tono judicial y teológico documentado en el POB.
  - severity: high
    issue: '''su paga'' es una elección deficiente para τὸ ἀνταπόδομα.'
    rationale: En español, 'paga' se asocia fuertemente con salario o pago monetario. Aquí puede distorsionar el sentido y pierde el matiz de recompense/retribution. 'Su retribución' es más fiel y claro.
  - severity: low
    issue: La nota [a] no añade una alternativa real.
    rationale: El texto dice 'O se levantará', que repite exactamente la traducción principal. Debe ofrecer una verdadera alternativa, por ejemplo 'se alzará' o 'se pondrá en pie'.
  revised_spanish_text: Después de esto, se levantará y les retribuirá, y hará recaer sobre su cabeza[a] su retribución.
  revised_footnotes:
