translation:
  language: es
  text: 'Diles[a]: «Así dice el Señor Dios, Yahvé: Este oráculo[b] trata del príncipe en Jerusalén y de toda la casa de Israel que están en medio de ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Di a ellos».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Esta carga» o «este pronunciamiento». El hebreo usa מַשָּׂא, que puede referirse a un oráculo profético.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר אֲלֵיהֶם
  english_pob_choice: Say to them
  chosen_spanish: Di a ellos
  alternatives_spanish:
  - Diles
  - Habla con ellos
  lexicon: HALOT
  rationale: El imperativo de אמר con אל introduce discurso directo; «di» conserva la fuerza del mandato profético con español natural. «A ellos» mantiene la referencia plural explícita del hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Se conserva la fórmula profética mensajera con registro bíblico claro y sobrio en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT; DOCTRINE.md (YHWH → Yahvé)
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: «Yahvé». En la combinación con אֲדֹנָי, «el Señor Yahvé» evita la duplicación artificial y mantiene el título compuesto con naturalidad en español.'
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el gobernante
  - el líder
  lexicon: HALOT
  rationale: «Príncipe» preserva el valor titular y político de נָשִׂיא, especialmente en Ezequiel, mejor que un término más genérico.
- source_word: הַמַּשָּׂא הַזֶּה
  english_pob_choice: This oracle
  chosen_spanish: Este oráculo
  alternatives_spanish:
  - Esta carga
  - Esta profecía
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «oracle» por naturalidad contextual; en español, «oráculo» mantiene el sentido de pronunciamiento profético sin perder la resonancia de מַשָּׂא. Se evita «carga» por sonar demasiado literal y oscuro en este contexto.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  lexicon: HALOT
  rationale: La preposición בְּ es locativa; no hay base en el hebreo para introducir «contra». Se mantiene el referente geográfico tal como está en el texto.
- source_word: וְכָל בֵּית יִשְׂרָאֵל
  english_pob_choice: and all the house of Israel
  chosen_spanish: y toda la casa de Israel
  alternatives_spanish:
  - y toda la casa de Israel entera
  - y todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática «casa de Israel», importante como fórmula bíblica y no se reduce a un «pueblo» más genérico.
- source_word: אֲשֶׁר הֵמָּה בְתוֹכָם
  english_pob_choice: who are in its midst
  chosen_spanish: que están en medio de ella
  alternatives_spanish:
  - que están en su interior
  - que están entre ellos
  lexicon: HALOT
  rationale: El sufijo singular del contexto apunta a Jerusalén como referente cercano; por eso «de ella» armoniza con la revisión inglesa «its midst». «En medio de ella» mantiene la ubicación interna sin sobreexplicar.
theological_decisions:
- issue: Uso del nombre divino YHWH en la traducción española
  english_pob_reading: the Lord GOD / Yahweh in doctrine, with the compound title אֲדֹנָי יְהוִה
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: El proyecto establece Yahvé para YHWH. En esta combinación titulativa con אֲדֹנָי, «el Señor Yahvé» conserva ambas piezas del hebreo y evita ocultar el nombre divino tras una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé; distinción entre título y nombre propio'
- issue: Sentido de מַשָּׂא en contexto profético
  english_pob_reading: This oracle
  chosen_spanish_reading: Este oráculo
  alternative_spanish_readings:
  - Esta carga
  - Este pronunciamiento
  rationale: Aunque מַשָּׂא puede significar «carga», aquí el contexto profético favorece un pronunciamiento/oráculo. «Oráculo» preserva la categoría profética sin forzar una paráfrasis extensa.
  doctrine_reference: HALOT; revisión inglesa que actualiza burden → oracle
- issue: Referente de 'en medio de ella'
  english_pob_reading: in its midst
  chosen_spanish_reading: en medio de ella
  alternative_spanish_readings:
  - en medio de ellos
  - en medio de Jerusalén
  rationale: La revisión inglesa ajusta el referente singular a Jerusalén; el español sigue esa lectura para mantener la concordancia contextual y no introducir ambigüedad innecesaria.
  doctrine_reference: Lectura contextual del antecedente singular Jerusalén
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió «burden» a «oracle» por mayor naturalidad contextual, y «their midst» a «its midst» para concordar con Jerusalén como antecedente singular. La redacción española refleja esas decisiones: usa «oráculo» y «en medio de ella».'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - «Casa de Israel» se conserva como fórmula bíblica estable.
  - No se traduce מַשָּׂא mecánicamente como «carga» en el texto principal, pero se deja la alternativa en nota por la tensión lexical documentada.
  - La puntuación con dos puntos y comillas angulares sigue un estilo bíblico moderno y legible en español.
