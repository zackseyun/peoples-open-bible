translation:
  language: es
  text: Y se enojó mucho[a], y convocó a todos los gobernantes de Moab, a los generales de Amón y a todos los sátrapas de la costa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gran furia»; el intensificador griego se expresa de manera idiomática en el texto principal como «mucho».
    reason: lexical_alternative
  - marker: b
    text: O «el litoral» o «la región costera».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠργίσθη
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se irritó
  - se enfureció
  - se airó
  lexicon: BDAG
  rationale: El aoristo de ὀργίζω expresa la entrada en un estado de ira. «Se enojó» comunica ese cambio de estado de manera natural en español y evita forzar una intensidad mayor que la del texto base.
- source_word: θυμῷ σφόδρα
  english_pob_choice: very
  chosen_spanish: muchísimo
  alternatives_spanish:
  - con gran furia
  - en extremo
  - muy
  lexicon: BDAG
  rationale: La combinación intensifica fuertemente la ira. «Muchísimo» integra la intensificación de forma idiomática en español, sin perder la carga enfática del griego.
- source_word: ἐκάλεσεν
  english_pob_choice: summoned
  chosen_spanish: convocó
  alternatives_spanish:
  - llamó
  - mandó llamar
  - reunió
  lexicon: BDAG
  rationale: En un contexto de autoridad política, «convocó» comunica mejor que «llamó» la acción de reunir oficialmente a los funcionarios.
- source_word: ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: jefes
  alternatives_spanish:
  - gobernantes
  - príncipes
  - líderes
  lexicon: BDAG
  rationale: El término designa autoridades dirigentes. «Jefes» es amplio y comprensible en español, manteniendo el valor de oficiales principales sin imponer un matiz nobiliario no requerido por el griego.
- source_word: στρατηγοὺς
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes
  lexicon: BDAG
  rationale: El sentido militar es directo; «generales» conserva la jerarquía militar alta que el texto presenta.
- source_word: σατράπας
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores
  - funcionarios provinciales
  lexicon: LSJ
  rationale: Se conserva el préstamo histórico «sátrapas» para no perder el color político persa del cargo, tal como lo preserva la POB inglesa.
- source_word: τῆς παραλίας
  english_pob_choice: of the coastland
  chosen_spanish: de la costa
  alternatives_spanish:
  - del litoral
  - de la región costera
  - del seacoast
  lexicon: LSJ
  rationale: παραλία denota la zona costera. «De la costa» es natural en español y mantiene la referencia geográfica sin sobreespecificar.
- source_word: Μωὰβ
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: N/A
  rationale: Transliteración estándar del nombre propio.
- source_word: Ἀμμὼν
  english_pob_choice: Ammon
  chosen_spanish: Amón
  alternatives_spanish:
  - Ammon
  lexicon: N/A
  rationale: Se adapta el nombre propio a la forma usual en español bíblico, conservando la referencia geográfica y étnica.
translation_notes:
  revision_awareness: La fuente griega y el texto auditado en inglés coinciden sustancialmente; no se detectan revisiones aplicadas que alteren la traducción. Se mantuvo la intensificación del enojo y la secuencia de cargos políticos y militares sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - 'Se preserva el orden de los funcionarios: jefes de Moab, generales de Amón y sátrapas de la costa.'
  - Se mantiene «sátrapas» como tecnicismo histórico, coherente con la decisión inglesa.
  - «Se enojó muchísimo» refleja el valor intensivo de θυμῷ σφόδρα sin recurrir a una paráfrasis excesiva.
