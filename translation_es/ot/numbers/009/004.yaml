translation:
  language: es
  text: Moisés habló a los hijos de Israel para observar la Pascua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas»; literalmente, «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke to
  chosen_spanish: habló a
  alternatives_spanish:
  - dijo a
  - se dirigió a
  lexicon: HALOT
  rationale: El hebreo דבר con אֶל indica hablar a alguien; en español, «habló a» conserva esa relación directa sin añadir una precisión que el texto no exige.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión masculina y familiar «hijos de Israel», que corresponde literalmente al hebreo y preserva la forma del original; «israelitas» sería más idiomático pero atenúa esa literalidad.
- source_word: לַעֲשֹׂת
  english_pob_choice: to keep
  chosen_spanish: para celebrar
  alternatives_spanish:
  - para hacer
  - para observar
  - para guardar
  lexicon: HALOT
  rationale: Con פֶּסַח en contexto ritual, עשה no se traduce de forma mecánica como «hacer», sino como la acción de celebrar/observar la Pascua. «Celebrar» comunica naturalmente el cumplimiento ritual en español sin perder el sentido de observancia.
- source_word: הַפָּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua
  - el rito de la Pascua
  - el sacrificio pascual
  lexicon: HALOT
  rationale: Aquí פֶּסַח designa la observancia festiva en general, no solo el sacrificio. «Pascua» es la forma natural y suficiente en español.
translation_notes:
  revision_awareness: El inglés POB pasó de «told» a «spoke to» para ajustarse mejor al verbo hebreo; la versión española sigue esa preferencia con «habló a». También se conserva el complemento de propósito con el valor ritual de לַעֲשֹׂת הַפָּסַח mediante «para celebrar la Pascua».
  spanish_consistency_notes:
  - Se mantuvo «Moisés» y no se introdujo terminología confesional ajena al hebreo.
  - «Hijos de Israel» conserva la fuerza literal del source packet y coincide con la nota de alternativa léxica.
  - «Pascua» se usa en sentido festivo/ritual amplio, coherente con el audit trail en inglés.
