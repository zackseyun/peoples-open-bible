translation:
  language: es
  text: Pero dejó consigo[a] tres mil hombres; dejó unos dos mil en Galilea, y mil fueron con él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «consigo mismo».
    reason: lexical_alternative
  - marker: b
    text: O «se unieron a él»; el verbo griego más literalmente significa «vinieron juntamente con él».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó atrás
  - retuvo
  lexicon: LSJ
  rationale: El verbo griego σημαίνει dejar, abandonar o dejar atrás. En este contexto narrativo militar, «dejó» reproduce con naturalidad la acción sin introducir una idea más fuerte como «destacó» o «estacionó».
- source_word: μεθʼ ἑαυτοῦ
  english_pob_choice: with himself
  chosen_spanish: consigo
  alternatives_spanish:
  - con él
  lexicon: LSJ
  rationale: La expresión griega es literalmente reflexiva, «con él mismo». En español, «consigo» conserva ese matiz reflexivo de manera natural; «con él» sería menos preciso respecto de la forma griega.
- source_word: ἄνδρας τρισχιλίους
  english_pob_choice: three thousand men
  chosen_spanish: tres mil hombres
  alternatives_spanish:
  - tres mil soldados
  lexicon: LSJ
  rationale: ἄνδρας es literalmente «hombres». Aunque el contexto es militar, «hombres» mantiene la correspondencia directa con el griego, y el contexto ya aclara el grupo armado.
- source_word: ὡς δισχιλίους
  english_pob_choice: about two thousand
  chosen_spanish: unos dos mil
  alternatives_spanish:
  - aproximadamente dos mil
  - como dos mil
  lexicon: LSJ
  rationale: ὡς con numeral expresa aproximación. «Unos dos mil» es una equivalencia idiomática y fiel en español.
- source_word: ἀφῆκεν
  english_pob_choice: he left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó atrás
  - retuvo
  lexicon: LSJ
  rationale: Aquí el verbo vuelve a significar dejar o dejar atrás. «Dejó» conserva la repetición del verbo del primer miembro y evita sobreinterpretar una acción formal de mando.
- source_word: ἐν τῇ Γαλιλαίᾳ
  english_pob_choice: in Galilee
  chosen_spanish: en Galilea
  alternatives_spanish:
  - en la Galilea
  lexicon: LSJ
  rationale: La preposición ἐν con nombre de región se rinde de forma directa con «en». «Galilea» es la forma natural en español.
- source_word: χίλιοι
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil hombres
  - un millar
  lexicon: LSJ
  rationale: En español narrativo, «mil» es la forma más natural e idiomática, y conserva el valor numérico del griego.
- source_word: συνῆλθον αὐτῷ
  english_pob_choice: went with him
  chosen_spanish: se fueron con él
  alternatives_spanish:
  - se unieron a él
  - fueron con él
  lexicon: LSJ
  rationale: El verbo indica literalmente «llegaron juntos» o «vinieron con». En este contexto, la idea resultante es acompañarlo en movimiento. «Se fueron con él» conserva esa dinámica; «se unieron a él» sería una interpretación posible, pero más interpretativa que el griego inmediato.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se requieren notas textuales o alternativas adicionales. La única tensión relevante es la fuerza reflexiva de μεθʼ ἑαυτοῦ y el matiz de συνῆλθον αὐτῷ, resueltos en español con formulación natural y cercana al griego.
  spanish_consistency_notes:
  - Se mantiene la repetición de «dejó» para reflejar ambos verbos griegos relacionados.
  - Se evita «SEÑOR» u otra terminología teológica no presente en el versículo.
  - El registro es narrativo y militar, con léxico simple y directo.
  - «Consigo» preserva mejor el matiz reflexivo que una simple preposición personal.
