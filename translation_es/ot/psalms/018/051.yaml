translation:
  language: es
  text: Él da grandes victorias a su rey[a] y muestra amor leal a su ungido[b], a David y a su descendencia[c] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es una torre de salvaciones para su rey»; la forma hebrea al comienzo del versículo es textualmente y sintácticamente difícil, y 2 Samuel 22:51 tiene una lectura estrechamente relacionada: «hace grandes las salvaciones/victorias de su rey».'
    reason: textual_variant
  - marker: b
    text: «Ungido» también puede traducirse «Mesías». Aquí se refiere de inmediato a David/el rey davídico, aunque conserva resonancia mesiánica más amplia.
    reason: alternative_reading
  - marker: c
    text: «Descendencia» traduce un sustantivo singular colectivo, que puede referirse a la línea de David en conjunto y, en contexto canónico, también abre la lectura mesiánica.
    reason: lexical_alternative
lexical_decisions:
- source_word: מגדל
  english_pob_choice: gives great
  chosen_spanish: da grandes
  alternatives_spanish:
  - es torre de
  - engrandece
  lexicon: HALOT
  rationale: El hebreo inicial es difícil y la POB inglesa resuelve la idea como un acto de hacer grandes las victorias/salvaciones. En español, "da grandes" conserva ese valor verbal sin introducir la imagen de una torre en el texto principal, que resultaría menos natural con el plural "victorias".
- source_word: יְשׁוּעוֹת
  english_pob_choice: victories
  chosen_spanish: victorias
  alternatives_spanish:
  - salvaciones
  - liberaciones
  lexicon: HALOT
  rationale: En un contexto real y militar, "victorias" expresa bien los actos repetidos de salvación o liberación, manteniendo la fuerza del plural hebreo.
- source_word: מַלְכּוֹ
  english_pob_choice: his king
  chosen_spanish: su rey
  alternatives_spanish:
  - su rey ungido
  - su rey propio
  lexicon: HALOT
  rationale: '"Su rey" reproduce con naturalidad la relación posesiva y real entre Yahvé y el rey davídico.'
- source_word: וְעֹשֶׂה חֶסֶד
  english_pob_choice: and shows steadfast love
  chosen_spanish: y muestra amor leal
  alternatives_spanish:
  - y hace misericordia
  - y actúa con fidelidad amorosa
  - y muestra amor constante
  lexicon: HALOT
  rationale: חֶסֶד es un término de alianza. "Amor leal" comunica de forma clara esa lealtad pactal en español, sin perder la dimensión afectiva y fiel que la POB inglesa expresa con "steadfast love".
- source_word: לִמְשִׁיחוֹ
  english_pob_choice: to his anointed
  chosen_spanish: a su ungido
  alternatives_spanish:
  - a su Mesías
  lexicon: HALOT
  rationale: En el contexto inmediato el referente es David/el rey davídico, por lo que "ungido" es la opción más precisa. Se conserva así la tensión mesiánica sin resolverla prematuramente en el cuerpo principal.
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  lexicon: HALOT
  rationale: Nombre propio transliterado según el estándar del proyecto.
- source_word: וּלְזַרְעוֹ
  english_pob_choice: and to his offspring
  chosen_spanish: y a su descendencia
  alternatives_spanish:
  - y a su simiente
  - y a sus descendientes
  lexicon: HALOT
  rationale: El sustantivo singular colectivo זֶרַע se rinde bien con "descendencia", que conserva la idea de línea dinástica y permite la resonancia mesiánica sin restringirla.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: '"Para siempre" es la forma española más natural y fiel para expresar duración indefinida y continua.'
theological_decisions:
- issue: Sentido de מְשִׁיחוֹ en un salmo real davídico
  english_pob_reading: Render as 'his anointed' in the main text, with the title-like alternative 'his Messiah' preserved in a footnote.
  chosen_spanish_reading: Traducir como "su ungido" en el texto principal, con la posibilidad de "su Mesías" preservada en una nota.
  alternative_spanish_readings:
  - su Mesías
  rationale: El referente inmediato es histórico-davídico, así que "ungido" es la opción más exacta. Sin embargo, el término mantiene resonancia mesiánica en el marco canónico, y esa tensión debe conservarse sin sobreinterpretar el versículo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Preserve theological tension rather than resolve it.'
- issue: Alcance de זַרְעוֹ ('su descendencia')
  english_pob_reading: Keep the collective singular 'offspring' rather than specifying either a dynastic line only or a single messianic descendant.
  chosen_spanish_reading: Mantener "descendencia" como colectivo singular, sin reducirlo solo a la dinastía ni solo a un descendiente mesiánico.
  alternative_spanish_readings:
  - sus descendientes
  - su simiente
  rationale: El hebreo permite tanto la línea davídica como una extensión mesiánica posterior. La traducción debe preservar esa tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se mantuvo el sentido del último pase de revisión sin cambios sustantivos; la solución española sigue la misma decisión principal del POB inglés: resolver la primera cola difícil de modo verbal, conservar el valor covenantal de חֶסֶד, y mantener abierta la tensión mesiánica de מְשִׁיחוֹ y זַרְעוֹ.'
  spanish_consistency_notes:
  - Se usó "Yahvé" en el sistema del proyecto solo cuando el nombre divino aparezca explícitamente; en este versículo no aparece en la forma hebrea conservada.
  - '"Ungido" se mantuvo como término principal para no sustituir de forma automática la terminología contextual por "Mesías".'
  - '"Descendencia" preserva el singular colectivo del hebreo mejor que un plural estrictamente numérico.'
