translation:
  language: es
  text: y para el pan del arreglo[a], y para la flor de harina para la ofrenda vegetal, y para las obleas sin levadura, y para lo que se cocina en la plancha, y para lo que está bien mezclado, y para toda medida y tamaño,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pan de la disposición', 'el pan de la Presencia' o 'el pan de la proposición'. El hebreo dice literalmente 'el pan del arreglo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם הַמַּעֲרֶכֶת
  english_pob_choice: the bread of the arrangement
  chosen_spanish: el pan del arreglo
  alternatives_spanish:
  - el pan de la disposición
  - el pan de la presencia
  - el pan de la proposición
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'pan del arreglo/orden'. En español, 'arreglo' conserva la idea de disposición ordenada sin imponer una denominación eclesiástica tradicional que oscurezca el valor léxico del término. Se mantiene una nota para alternativas cultuales conocidas.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina cernida
  lexicon: HALOT
  rationale: '''Flor de harina'' es una equivalencia natural y estable en español bíblico para la harina refinada usada en ofrendas. Comunica bien el matiz técnico sin sonar mecánico.'
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  lexicon: HALOT
  rationale: En español, 'ofrenda vegetal' es la forma tradicional y clara para la minjá cultual, y evita reducirla a un simple 'don'. Aunque en lenguaje moderno puede sonar poco común, preserva el valor técnico del rito.
- source_word: רְקִיקֵי הַמַּצּוֹת
  english_pob_choice: the wafers of unleavened bread
  chosen_spanish: las tortas del pan sin levadura
  alternatives_spanish:
  - las obleas del pan sin levadura
  - las galletas de pan sin levadura
  - las tortas sin levadura
  lexicon: HALOT
  rationale: '''רְקִיקִים'' son tortas delgadas; ''tortas'' es suficientemente amplio y claro en español. Se conserva ''pan sin levadura'' para expresar explícitamente el calificativo del hebreo.'
- source_word: מַּחֲבַת
  english_pob_choice: what is cooked on the griddle
  chosen_spanish: lo que se cocina en la plancha
  alternatives_spanish:
  - lo cocido en la sartén
  - la torta de plancha
  - lo que se cuece en la plancha
  lexicon: HALOT
  rationale: El sustantivo designa el utensilio de cocción, pero la sintaxis del pasaje enumera preparaciones. 'Lo que se cocina en la plancha' sigue la solución auditada en inglés y suena natural en español.
- source_word: מֻּרְבָּכֶת
  english_pob_choice: what is well-mixed
  chosen_spanish: lo que está bien mezclado
  alternatives_spanish:
  - lo que está mezclado
  - la mezcla bien preparada
  - lo que se amasa y mezcla bien
  lexicon: HALOT
  rationale: El participio pasivo apunta a una preparación mezclada. 'Bien mezclado' mantiene el matiz de preparación cuidada reflejado en la revisión inglesa, sin concretar indebidamente el proceso.
- source_word: מְשׂוּרָה
  english_pob_choice: measure
  chosen_spanish: medida
  alternatives_spanish:
  - medida exacta
  - porción medida
  lexicon: HALOT
  rationale: '''Medida'' es la traducción directa y natural para la unidad o cantidad medida.'
- source_word: מִדָּה
  english_pob_choice: size
  chosen_spanish: tamaño
  alternatives_spanish:
  - dimensión
  - medida
  - magnitud
  lexicon: HALOT
  rationale: En la pareja con מְשׂוּרָה, 'tamaño' ayuda a distinguir la segunda palabra como extensión/dimensión, evitando que ambas queden como sinónimos idénticos en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, especialmente en la equivalencia de מֻּרְבָּכֶת como preparación ya bien mezclada. También conserva el artículo implícito en 'flor de harina' como frase nominal natural en español, y mantiene la lista cultual completa sin reinterpretarla.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma editorial solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conservó la distinción léxica entre 'medida' y 'tamaño' para reflejar la pareja hebrea מְשׂוּרָה / מִדָּה.
  - '''Ofrenda vegetal'' sigue la terminología POB para מִנְחָה, evitando la paráfrasis genérica ''ofrenda'' sin adjetivo.'
