translation:
  language: es
  text: Pero se comportaron con infidelidad contra el Dios de sus padres y se prostituyeron[a] tras los dioses de los pueblos de la tierra, a quienes Dios había destruido delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se fueron en pos de los dioses»; el hebreo usa una metáfora sexual para la idolatría y la infidelidad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְעֲלוּ
  english_pob_choice: acted unfaithfully
  chosen_spanish: se comportaron con infidelidad
  alternatives_spanish:
  - actuaron infielmente
  - fueron infieles
  - traicionaron
  lexicon: HALOT
  rationale: מעל expresa una ruptura de fidelidad, especialmente en contexto de pacto. «Se comportaron con infidelidad» conserva la idea relacional y suena natural en español bíblico moderno sin debilitar el matiz covenantal.
- source_word: בֵּאלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: against the God of their fathers
  chosen_spanish: contra el Dios de sus padres
  alternatives_spanish:
  - frente al Dios de sus padres
  - respecto del Dios de sus padres
  lexicon: HALOT
  rationale: La preposición ב con מעל marca a la parte contra quien se comete la infidelidad. «Contra el Dios de sus padres» hace explícita esa relación de ruptura.
- source_word: וַיִּזְנוּ
  english_pob_choice: prostituted themselves
  chosen_spanish: se prostituyeron
  alternatives_spanish:
  - anduvieron en prostitución
  - se fueron en pos de la prostitución
  - fornicaron
  lexicon: HALOT
  rationale: זנה es un metáfora sexual y de pacto para la idolatría. «Se prostituyeron» conserva esa fuerza en español y evita suavizar el lenguaje.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - en pos de
  - siguiendo a
  lexicon: HALOT
  rationale: En esta construcción idiomática, אַחֲרֵי expresa seguimiento idolátrico. «Tras» permite reflejar el valor de persecución/seguimiento con un español claro y sobrio.
- source_word: אֱלֹהֵי עַמֵּי הָאָרֶץ
  english_pob_choice: the gods of the peoples of the land
  chosen_spanish: los dioses de los pueblos de la tierra
  alternatives_spanish:
  - los dioses de las naciones de la tierra
  - los dioses de la gente de la tierra
  lexicon: HALOT
  rationale: La cadena nominal es plural y se refiere a deidades de los pueblos locales. «Pueblos» traduce עַמֵּי con mayor cercanía que «naciones» en este contexto; «tierra» mantiene הָאָרֶץ sin explicación añadida.
- source_word: אֲשֶׁר הִשְׁמִיד אֱלֹהִים מִפְּנֵיהֶם
  english_pob_choice: whom God had destroyed before them
  chosen_spanish: a quienes Dios había destruido delante de ellos
  alternatives_spanish:
  - a quienes Dios había exterminado delante de ellos
  - que Dios había destruido delante de ellos
  - a quienes Dios destruyó delante de ellos
  lexicon: HALOT
  rationale: El verbo שׁמד admite «destruir» o «exterminar»; «destruido» sigue de cerca el inglés POB y evita intensificar sin necesidad. «Delante de ellos» refleja idiomáticamente מִפְּנֵיהֶם.
theological_decisions:
- issue: Conservación de la metáfora sexual para la idolatría
  english_pob_reading: prostituted themselves after the gods
  chosen_spanish_reading: se prostituyeron tras los dioses
  alternative_spanish_readings:
  - se entregaron a los dioses
  - fueron infieles a los dioses
  - se desviaron tras los dioses
  rationale: El hebreo usa deliberadamente lenguaje sexual para la infidelidad de pacto. Mantener «se prostituyeron» preserva la carga teológica y no la reduce a simple desobediencia.
  doctrine_reference: Translation philosophy §3, §6
- issue: Lectura singular de אֱלֹהִים en la cláusula relativa
  english_pob_reading: whom God had destroyed before them
  chosen_spanish_reading: a quienes Dios había destruido delante de ellos
  alternative_spanish_readings:
  - a quienes los dioses habían destruido delante de ellos
  - a quienes un dios había destruido delante de ellos
  rationale: Aunque אֱלֹהִים es morfológicamente plural, el verbo singular הִשְׁמִיד exige entender al único Dios verdadero. En español, «Dios» comunica esa lectura sin ambigüedad.
  doctrine_reference: 'Gramática hebrea: concordancia verbal con אֱלֹהִים; teología bíblica del monoteísmo'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que restauró «after the gods» para reflejar אַחֲרֵי. En español, se preserva el seguimiento idolátrico con «tras», y se ancla la metáfora sexual en una nota breve para no perder la fuerza del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» en singular en la cláusula relativa por la concordancia verbal hebrea y por el sentido del texto.
  - «Pueblos» traduce עַמֵּי de modo más cercano que «naciones» en este contexto local.
  - Se evita «SEÑOR» porque aquí el término hebreo es אֱלֹהִים, no el Tetragrámaton.
