revisions:
- from: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: Tomen estos documentos, este documento de compra, tanto el sellado como este abierto, y pónganlos en una vasija de barro[b], para que permanezcan por muchos días.'
  to: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: Toma estos documentos, este documento de compra, tanto el sellado como este abierto[b], y ponlos en una vasija de barro, para que permanezcan por muchos días.'
  rationale: Se corrige la persona verbal al singular para reflejar fielmente el mandato del hebreo en su contexto inmediato. Se repara la nota [a] para que contenga una alternativa léxica real y útil en español. Se añade una nota en [b] para preservar la alternativa documentada en la auditoría inglesa sobre 'abierto/no sellado'.
