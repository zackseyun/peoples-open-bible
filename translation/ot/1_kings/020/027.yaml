id: 1KI.20.27
reference: 1 Kings 20:27
source:
  edition: WLC
  text: וּ/בְנֵ֣י יִשְׂרָאֵ֗ל הָתְפָּקְדוּ֙ וְ/כָלְכְּל֔וּ וַ/יֵּלְכ֖וּ לִ/קְרָאתָ֑/ם וַ/יַּחֲנ֨וּ בְנֵֽי יִשְׂרָאֵ֜ל נֶגְדָּ֗/ם כִּ/שְׁנֵי֙ חֲשִׂפֵ֣י עִזִּ֔ים וַ/אֲרָ֖ם מִלְא֥וּ אֶת הָ/אָֽרֶץ־־׃
translation:
  text: And the sons of Israel were mustered and supplied[a], and they went to meet them. The sons of Israel camped opposite them like two little flocks of goats[c][b], but Aram filled the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' a traditional covenantal designation for the people.
    reason: lexical_alternative
  - marker: b
    text: Or 'were provisioned' or 'were sustained.' The verb likely refers to being supplied for the campaign.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew simile is literally 'like two חֲשִׂפֵי of goats,' an unusual expression conveying very small groups in contrast to the vast Aramean army.
    reason: cultural_note
lexical_decisions:
- source_word: הָתְפָּקְדוּ
  chosen: were mustered
  alternatives:
  - were numbered
  - were reviewed
  lexicon: HALOT
  rationale: The hitpael/passive-reflexive sense of פקד here refers to being assembled or enrolled for military action. 'Were mustered' fits the battle context better than the more wooden 'were numbered.'
- source_word: וְכָלְכְּלוּ
  chosen: supplied
  alternatives:
  - provisioned
  - sustained
  lexicon: HALOT
  rationale: From כלכל, the sense is being provided with provisions or support. 'Supplied' is concise, natural English in a military setting, likely referring to being furnished for the campaign.
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - to confront them
  - to face them
  lexicon: HALOT
  rationale: The preposition plus קרא in this construction commonly means going out to meet someone, often in encounter or opposition. 'To meet them' preserves the wording while allowing the military context to imply confrontation.
- source_word: נֶגְדָּם
  chosen: opposite them
  alternatives:
  - before them
  - facing them
  lexicon: HALOT
  rationale: נגד denotes position in front of or opposite. 'Opposite them' clearly conveys the opposing camps' placement.
- source_word: כִּשְׁנֵי חֲשִׂפֵי עִזִּים
  chosen: like two little flocks of goats
  alternatives:
  - like two scraps of goats
  - like two small bands of goats
  lexicon: HALOT
  rationale: The phrase is idiomatic and vivid, emphasizing the smallness of Israel's forces compared with Aram. 'Little flocks of goats' communicates the simile naturally in English. 'Scraps' is too obscure, though it reflects the underlying image of small separated groups.
- source_word: וַאֲרָם מִלְאוּ אֶת־הָאָרֶץ
  chosen: but Aram filled the land
  alternatives:
  - and Aram filled the land
  - while Aram covered the land
  lexicon: HALOT
  rationale: The verb מלא with הארץ expresses that the Aramean forces spread over the land in overwhelming numbers. 'But' brings out the strong contrast with Israel's tiny appearance, though the Hebrew conjunction is simply waw. 'Filled the land' preserves the imagery.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew idiom and collective identity. 'The Israelites' is possible, but 'sons of Israel' maintains source-text texture and remains understandable in context.
