translation:
  language: es
  text: En el primer año de Darío hijo de Ahasuero, de la descendencia de los medos, que fue constituido rey sobre el reino de los caldeos[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los babilonios». «Caldeos» es el término hebreo, pero en este contexto puede funcionar como designación del reino babilónico.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת אַחַת
  english_pob_choice: In the first year
  chosen_spanish: En el primer año
  alternatives_spanish:
  - En el año primero
  - En el año uno
  lexicon: HALOT
  rationale: La fórmula cronológica de entronización se expresa de manera idiomática en español como «el primer año»; conserva el valor regnal sin sonar forzado.
- source_word: לְדָרְיָוֶשׁ
  english_pob_choice: of Darius
  chosen_spanish: de Darío
  alternatives_spanish:
  - perteneciente a Darío
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula de datación indica relación de período o reinado; «de Darío» es la forma natural y fiel en español.
- source_word: בֶּן אֲחַשְׁוֵר֖וֹשׁ
  english_pob_choice: son of Ahasuerus
  chosen_spanish: hijo de Ahasuero
  alternatives_spanish:
  - hijo de Asuero
  lexicon: HALOT
  rationale: בֶּן expresa filiación directa. Se mantiene la transliteración tradicional del nombre propio en forma española naturalizada, «Ahasuero».
- source_word: מִזֶּרַע מָדָי
  english_pob_choice: of the offspring of the Medes
  chosen_spanish: de la descendencia de los medos
  alternatives_spanish:
  - de la raza de los medos
  - de la progenie de los medos
  lexicon: HALOT
  rationale: זֶרַע aquí refiere linaje o descendencia, no semilla literal. «Descendencia» preserva el sentido genealógico y evita una metáfora demasiado cruda o ambigua en español.
- source_word: הָמְלַךְ
  english_pob_choice: was made king
  chosen_spanish: fue hecho rey
  alternatives_spanish:
  - llegó a ser rey
  - fue constituido rey
  - fue puesto como rey
  lexicon: HALOT
  rationale: 'La forma hophal tiene valor pasivo/causativo: no solo reinó, sino que recibió el reinado. «Fue hecho rey» refleja esa pasividad sin añadir elementos no presentes.'
- source_word: עַל מַלְכ֥וּת
  english_pob_choice: over the kingdom
  chosen_spanish: sobre el reino
  alternatives_spanish:
  - sobre el reino
  - sobre la soberanía
  lexicon: HALOT
  rationale: מַלְכוּת puede significar reino o realeza; aquí el paralelo con el objeto gobernado favorece «reino» en español, y עַל se rinde naturalmente con «sobre».
- source_word: כַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo hebreo «caldeos» en el texto principal. En este contexto puede funcionar como designación del reino babilónico, pero el término literal queda mejor fijado en la línea base.
theological_decisions:
- issue: Identidad política de «los caldeos»
  english_pob_reading: '''Chaldeans'' is the Hebrew term, but in this context it can function as a designation for the Babylonian kingdom.'
  chosen_spanish_reading: «los caldeos» se mantiene en el texto principal, con la posibilidad contextual de entenderlo como referencia al reino babilónico.
  alternative_spanish_readings:
  - «los babilonios»
  - «el reino de Babilonia»
  rationale: El hebreo usa el etnónimo כַּשְׂדִּים; la POB inglesa preserva ese término y solo señala la equivalencia contextual. En español conviene no sustituirlo en el cuerpo principal sin perder la huella lexical del original.
  doctrine_reference: Ninguno; decisión léxico-histórica, no doctrinal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la frase a «of the offspring of the Medes» para conservar la relación genealógica natural; por eso en español se usa «de la descendencia de los medos» y no una construcción más literal pero menos idiomática como «desde la descendencia».
  spanish_consistency_notes:
  - Se mantuvo «Darío» para Darius y «Ahasuero» para Ahasuerus con transliteración española estable.
  - Se eligió «descendencia» para זֶרַע para evitar la imagen de semilla literal y conservar el valor de linaje.
  - «Fue hecho rey» refleja el matiz pasivo del hebreo y el choice inglés «was made king».
  - Se conservó la pausa final con raya larga, siguiendo el cierre enunciativo del verso fuente.
