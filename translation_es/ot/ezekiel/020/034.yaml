translation:
  language: es
  text: Los sacaré de entre los pueblos y los reuniré de entre las tierras[a] donde han sido dispersados,[b] con mano fuerte y con brazo extendido, y con ira derramada.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tierras» traduce el hebreo אֲרָצוֹת; también puede entenderse como «países», pero «tierras» conserva mejor el alcance geográfico amplio.
    reason: lexical_alternative
  - marker: b
    text: 'O: «en las cuales fueron dispersados».'
    reason: alternative_reading
  - marker: c
    text: 'O: «con furor derramado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתִי
  english_pob_choice: I will bring you out
  chosen_spanish: Yo los sacaré
  alternatives_spanish:
  - Yo los haré salir
  - Yo los traeré fuera
  lexicon: HALOT
  rationale: La forma causativa expresa que Yahvé actúa para hacer salir al pueblo; en español, «sacar» comunica esa fuerza de manera natural y directa, sin perder el matiz exódico.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: Se mantiene «pueblos» para reflejar el plural étnico-político del hebreo y la decisión de la POB en inglés, evitando borrar la distinción con «tierras».
- source_word: וְקִבַּצְתִּי
  english_pob_choice: and gather
  chosen_spanish: y los reuniré
  alternatives_spanish:
  - y los juntaré
  - y los congregaré
  lexicon: HALOT
  rationale: «Reunir» conserva la idea de regathering de exiliados con un registro claro y bíblicamente reconocible en español.
- source_word: הָאֲרָצוֹת
  english_pob_choice: the lands
  chosen_spanish: las tierras
  alternatives_spanish:
  - los países
  - las regiones
  lexicon: HALOT
  rationale: «Tierras» reproduce el sentido geográfico amplio de אֲרָצוֹת sin modernizarlo excesivamente a «países».
- source_word: אֲשֶׁר נְפוֹצֹתֶם בָּם
  english_pob_choice: where you have been scattered
  chosen_spanish: a las cuales fueron dispersados
  alternatives_spanish:
  - en las cuales fueron dispersados
  - donde ustedes han sido dispersados
  lexicon: HALOT
  rationale: La pasiva refleja española «fueron dispersados» conserva el hecho de la dispersión. Se evita sobrecargar la frase con un presente perfecto que no es necesario en español bíblico-formal.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - con mano vigorosa
  lexicon: HALOT
  rationale: «Mano fuerte» está muy cerca del hebreo y conserva la resonancia exódica; en español suena idiomática y solemne.
- source_word: וּבִזְרֹעַ נְטוּיָה
  english_pob_choice: and an outstretched arm
  chosen_spanish: con brazo extendido
  alternatives_spanish:
  - con brazo alzado
  - con brazo tendido
  lexicon: HALOT
  rationale: «Brazo extendido» reproduce la fórmula fija sin perder naturalidad en español. Se conserva el paralelismo con «mano fuerte».
- source_word: וּבְחֵמָה שְׁפוּכָה
  english_pob_choice: and with wrath poured out
  chosen_spanish: con furor derramado
  alternatives_spanish:
  - con ira derramada
  - con ira derramada sobre ellos
  lexicon: HALOT
  rationale: «Furor» refleja el campo semántico de חֵמָה y mantiene la tensión de juicio. «Derramado» preserva la metáfora de algo vertido/expulsado, siguiendo la decisión inglesa de no suavizar el elemento punitivo.
theological_decisions:
- issue: Mantener la tensión entre restauración y juicio en la fórmula exódica
  english_pob_reading: Retain the exodus-formula language ('strong hand,' 'outstretched arm') while also preserving 'wrath poured out' without softening it.
  chosen_spanish_reading: Conservar «mano fuerte» y «brazo extendido» como fórmula exódica, y al mismo tiempo mantener «furor derramado» sin atenuarlo.
  alternative_spanish_readings:
  - Reducirlo a lenguaje general de rescate
  - Suavizar la clausula final como mera severidad retórica
  rationale: El hebreo evoca deliberadamente el éxodo, pero en Ezequiel 20 la reunión del pueblo está enmarcada por juicio de pacto. La traducción española debe preservar ambas dimensiones sin resolver la tensión a favor de una sola lectura.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; el pasaje quedó sin cambios en el último pase, con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en la voz divina sin añadirlo, conforme al estilo del versículo en primera persona.
  - Se prefirió «pueblos» frente a «naciones» para conservar la distinción terminológica del hebreo y de la POB en inglés.
  - Se eligió «furor» antes que «ira» para evitar que la clausula final suene neutralizada; la nota conserva la alternativa.
  - La puntuación reproduce una sola oración extensa, acorde con el paralelismo hebreo y la sintaxis profética.
