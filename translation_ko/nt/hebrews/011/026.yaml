base_translation:
  language: en
  yaml_path: translation/nt/hebrews/011/026.yaml
  text: He considered the reproach of Messiah greater wealth than the treasures of Egypt[b][a], for he was looking to the reward.
  footnotes:
  - marker: a
    text: Or 'the reproach of Christ.' The Greek title Χριστοῦ can be rendered 'Christ,' but 'Messiah' is used here because the term functions as a title.
    reason: alternative_reading
  - marker: b
    text: The phrase 'the reproach of the Messiah' may mean reproach borne for the Messiah, reproach shared with God's anointed one, or reproach that Hebrews sees as fulfilled in the Messiah; the Greek wording is preserved without narrowing it.
    reason: lexical_alternative
