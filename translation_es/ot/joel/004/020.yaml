translation:
  language: es
  text: Pero Judá será habitada para siempre[a], y Jerusalén de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Judá morará para siempre'. El verbo hebreo puede traducirse más literalmente como 'habitar' o 'sentarse', pero en este contexto de tierra y ciudad probablemente significa 'ser habitada' o 'permanecer habitada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִ/יהוּדָה
  english_pob_choice: But Judah
  chosen_spanish: Pero Judá
  alternatives_spanish:
  - Y Judá
  - Judá
  lexicon: HALOT
  rationale: Conservo el valor conjuntivo de waw como contraste discursivo con el juicio anterior, de modo que 'Pero' comunica mejor la oposición implícita que un simple 'Y'. 'Judá' se mantiene como topónimo/territorio, tal como en la audiencia profética.
- source_word: לְ/עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - perpetuamente
  lexicon: HALOT
  rationale: עוֹלָם expresa continuidad indefinida; 'para siempre' es la opción natural y digna en español, sin estrechar el horizonte de la promesa.
- source_word: תֵּשֵׁב
  english_pob_choice: will be inhabited
  chosen_spanish: será habitada
  alternatives_spanish:
  - vivirá
  - morará
  - 'dwell: ''habitará'''
  lexicon: HALOT
  rationale: En este contexto de tierra/ciudad, ישׁב funciona mejor como estado de ser habitada o poblada. 'Será habitada' conserva el sentido de permanencia territorial que el inglés POB captó con 'will be inhabited'.
- source_word: וִ/ירוּשָׁלִַ֖ם
  english_pob_choice: and Jerusalem
  chosen_spanish: y Jerusalén
  alternatives_spanish:
  - pero Jerusalén
  - Jerusalén
  lexicon: HALOT
  rationale: La waw aquí es aditiva; por eso 'y' es la traducción más directa. 'Jerusalén' se conserva como nombre propio reconocido en español.
- source_word: לְ/ד֥וֹר וָ/דֽוֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación y generación
  - para todas las generaciones
  - a través de todas las generaciones
  lexicon: HALOT
  rationale: La fórmula idiomática דּוֹר וָדוֹר se expresa con la equivalencia natural 'de generación en generación', que preserva el movimiento repetitivo y la continuidad sucesiva.
theological_decisions:
- issue: Promesa de permanencia para Judá y Jerusalén
  english_pob_reading: Render the verse as a straightforward prophetic promise of enduring habitation without specifying whether the fulfillment is exclusively literal, typological, or eschatological.
  chosen_spanish_reading: Presentar el versículo como promesa profética de permanencia habitada, sin resolver si su cumplimiento es solo literal, tipológico o escatológico.
  alternative_spanish_readings:
  - Una permanencia geopolítica estrictamente literal
  - Un cumplimiento principalmente simbólico o eclesiológico
  rationale: El hebreo afirma la permanencia habitada de Judá y Jerusalén, pero no define el modo completo de su cumplimiento. La redacción española debe conservar esa tensión interpretativa, no cerrarla.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del estado más reciente, y la solución española mantiene el mismo perfil de equivalencia óptima del audit trail inglés.'
  spanish_consistency_notes:
  - Conservo 'Judá' y 'Jerusalén' como nombres propios, sin introducir terminología eclesiástica que no está en el texto.
  - '''Será habitada'' evita masculinizar el sujeto y respeta el acuerdo femenino de תֵּשֵׁב con Judá.'
  - '''De generación en generación'' mantiene la cadencia idiomática y la idea de continuidad indefinida.'
  - La nota al pie conserva la alternativa lexical documentada entre 'habitar', 'sentarse' y 'ser habitada'.
